抱龍丸二方見傷寒薄荷湯方見瘰癧人參羌活散方見驚風咳嗽錢仲陽云嗽者肺感微寒八九月間肺氣正旺若面赤身熱其病為實當用葶藶丸下之久嗽者不宜下若在冬月乃傷風嗽當用麻黃湯汗之面赤飲水咳嗽唾膿痰咽喉不利者以甘橘湯清之先咳後喘面腫身熱肺氣盛也以瀉白散平之嗽而唾痰涎乳者以白餅子下之潔古云嗽而兩脅痛者屬肝經用柴胡湯咳而嘔苦水者屬膽經用黃芩半夏生薑湯咳而喉中如梗者屬心經用甘桔湯咳而失氣者屬小腸用芍藥甘草湯咳而右脅痛者屬脾經用升麻湯咳而嘔長蟲者屬胃經用烏梅丸咳而喘息吐血者屬肺經用麻黃湯咳而遺尿者屬大腸用赤石脂湯咳而腰背痛甚則咳涎者屬腎經用麻黃附子細辛湯咳而遺尿者屬膀胱用茯苓甘草湯咳而腹滿不欲食面腫氣逆者屬三焦用異功散若咳嗽流涕外邪傷肺也先用參蘇飲喘嗽面赤心火刑肺也用人參平肺散及六味地黃丸嗽而吐青緑水肝木乘脾也用異功散加柴胡桔梗嗽而吐痰乳脾肺氣傷也用六君子加桔梗若咳膿痰者熱蘊於肺而成肺癰也用桔梗湯凡風邪外傷法當表散而實腠理其用下藥非邪傳於內及胃有實熱者不宜輕用面色白脈短澀者肺之本證也易治面色赤脈洪數者火刑金也難治治驗一小兒潮熱煩渴大便乾實氣促咳嗽右腮色赤此肺與大腸有熱用柴胡飲子一服諸症頓退後又發搐咬牙頓悶此肝脾氣血虛也用四君芎歸鉤藤鉤而愈一小兒咳嗽噁心塞鼻流涕右腮青白此脾肺氣虛而外邪所乘也先用惺惺散咳嗽頓愈但飲食不思手足指冷此外邪雖去而元氣尚虛也當調補脾土而生肺金遂用六君升麻治之而愈大凡外邪所侵而痰涎壅塞者宜表散之外邪既去而喘嗽未愈或更氣促肺氣虛也屬形病俱虛須用六君子之類調補脾土以生肺金為善設徑補肺氣則反益其邪況肺乃脆嫩之臟而司腠理以脾為母若腠理不密風邪外侵蘊結於肺而變咳嗽諸症乃形氣不足病氣有餘也最難調理設或嘔吐傷其胃氣汗下損其津液必變肺痿肺癰吳江史萬言子六歲感冒咳嗽發散過度喘促不食痰中有血用桔梗湯而愈後因元氣未復清氣不升大便似痢或用五淋散黃連枳實之類痰喘目札四肢抽搐變慢風而歿一小兒傷風咳嗽發熱服解表之劑加喘促出汗余謂肺脾氣虛欲用補中益氣湯加五味子補之不信乃自服二陳桑皮枳殼而發搐痰湧余仍用前藥加鉤藤鉤而痊一小兒有哮病其母遇勞即發兒飲其乳亦嗽用六君桔梗桑皮杏仁治之母子並愈一小兒傷食發熱抽搐嘔吐喘嗽屬脾肺氣虛有熱用六君炒黑黃連山梔而愈一小兒咳嗽因乳母素食膏粱炙煿所致用清胃散而愈後其母因怒咳嗽脅痛其子亦然母服小柴胡湯子亦隨愈吳江史萬洲子傷風咳嗽或用散表化痰之藥反加痰盛腹脹面色㿠白余謂脾肺氣虛也用六君桔梗一劑頓愈三日後仍嗽鼻流清涕此後感於風寒也仍用前藥加桑皮杏仁而愈一小兒發熱咳嗽右腮赤色此肺金有熱用瀉白散而愈次日重感風邪前症復作聲重流涕用參蘇飲加杏仁桑皮而愈但右腮與額微赤此心火乘肺也用人參平胃散一劑遂痊一小兒咳嗽發熱右臉赤色作渴煩悶倦怠少食肚腹作脹此風邪傷肺飲食傷脾先用六君桔梗杏仁柴胡一劑諸症少愈後去杏仁柴胡又一劑而安一小兒發熱右臉赤咳嗽痰盛余謂風邪蘊結於肺而痰作也用二陳加桑皮杏仁桔梗治之將愈自用發散降火之劑風痰不退發熱益甚余曰此脾肺俱虛也用五味異功散加桔梗四劑漸愈又用六君子湯而愈一小兒三歲痰涎上湧氣喘胸滿大便不實睡而露睛手足指冷此屬形病俱虛也用六君桔梗一劑諸症稍緩至四劑將愈復傷風寒前症仍作又以前藥加紫蘇杏仁桑皮而安一小兒傷風咳嗽痰盛雜用化痰等藥寒熱益甚面色或青或赤此風熱相搏也用牛黃清心丸一服又六君桔梗二服而痊麥煎散治夾驚傷寒吐逆壯熱表裡不解氣粗喘急面赤自汗或狂語驚叫或不語自汗又治癮疹搔癢往來潮熱或時行麻痘餘毒未盡痰涎咳嗽或變驚風手足搐搦眼目上視或傷風頭痛並宜服之滑石地骨皮赤芍藥石膏白茯苓杏仁人參知母甘草葶藶子炒各半兩麻黃去節一兩半小麥五六十粒上為末每服一錢麥子煎湯調下若久嗽傳於五臟或唾痰涎或厥冷驚悸甚則目眶腫黑白睛色赤用生地黃黑豆濕研或膏掩目眶上服麥煎散久嗽成癇服散癇之藥小青龍湯治傷寒表不解惡寒體熱心下停水乾嘔咳嗽喘急或肺脹胸滿鼻塞清涕噯逆氣喘仲景所謂表不解心下有水氣乾嘔發熱而咳或渴或噎或小便不利或小腹脹滿此湯主之麻黃去節赤芍藥半夏湯炮各七錢細辛乾薑炮甘草炙桂枝各三錢五味子半兩杵上每服二錢水煎理中湯治脾胃虛寒胸膈痞滿或心腹疼痛痰逆嘔吐飲食減少氣短羸困或霍亂吐利手足厥冷不喜飲水者人參白朮乾薑炮各等分甘草炒減半上每服三錢水煎熱服或研末白湯調下惺惺散治外感風寒鼻塞痰嗽發熱桔梗細辛人參白朮甘草栝蔞根白茯苓上為末每服二錢入薄荷五葉水煎服參蘇飲治感冒發熱頭痛傷風咳嗽傷寒嘔吐胸膈不袂痰飲凝結紫蘇前胡陳皮半夏泡七次乾葛茯苓枳殼炒桔梗各三錢甘草一錢人參三錢上為末每服一二錢薑棗水煎服保肺湯治肺胃受風熱痰盛咳嗽喘吐不止及治久嗽不愈山藥白茯苓紫蘇葉各一錢白殭蠶去絲嘴炒二錢藿香五分百部六分黃芩防風杏仁去皮尖麩炒各一錢百合五分五味子一錢桔梗一錢上水煎食後服天麻防風丸治驚風咳嗽身體壯熱多睡驚悸手足抽掣精神昏憒痰涎不利及風邪溫熱天麻防風人參辰砂雄黃麝香甘草炙各二錢半全蠍炒殭蠶各半兩炒牛黃一方有膽南星無麝香上為末煉蜜丸桐子大每服一二丸薄荷湯下麻黃湯治太陽症頭疼發熱身頭惡風無汗喘滿脈浮緊八九日不解當發汗汗已煩悶瞑目者必衄衄乃解所以然者陽氣重故也甘草半兩麻黃去節一兩半桂枝一兩杏仁去皮三十五個上每服三錢水煎柴胡石膏湯治時行瘟疫壯熱惡風頭痛體疼鼻塞心胸煩滿寒熱往來咳嗽涕唾稠黏桑白皮黃芩各三錢半升麻二錢半石膏前胡赤芍藥乾葛柴胡各五錢荊芥穗三錢上為末每服一二錢薑二片淡豉十粒水煎葶藶丸治脾熱熏肺或傷風咳嗽面赤痰盛身熱喘促葶藶子隔紙略炒防己黑牽牛略炒杏仁去皮尖雙仁麩炒搗膏一兩上為末研入杏膏拌勻取蒸棗肉搗和丸麻子大每服五七丸淡薑湯下量兒加減黃芩半夏生薑湯治膽腑咳嘔苦水若膽汁黃芩生薑各一錢甘草炙芍藥各六分大棗二個半夏一錢五分上水煎服甘橘湯治心臟咳咳而喉中如梗狀甚則咽腫喉痹粉草一錢苦梗一錢上水煎食後服芍藥甘草湯治小腸腑咳咳而失氣芍藥甘草炙各一錢上水煎服升麻湯治脾臟咳咳而右脅下痛痛引肩背甚則不可以動動則咳涎方見傷寒烏梅丸治胃腑咳咳而嘔嘔甚則長蟲出烏梅三十個細辛附子掣桂枝人參黃柏各六錢乾薑黃連各一兩當歸蜀椒各四兩上為末用酒浸烏梅一宿去核蒸之與米飯搗和丸桐子大每服十丸白湯下赤石脂禹餘糧湯治大腸咳咳而遺屎赤石脂禹餘糧各二兩並打碎上每服二錢水煎麻黃附子細辛湯治腎臟咳咳則腰背相引而痛甚則咳涎又治寒邪犯齒致腦齒痛宜急用之緩則不救麻黃細辛各二錢附子一錢上每服一錢水煎茯苓甘草湯治膀胱咳咳而遺溺茯苓二錢桂枝二錢半生薑五大片上每服二錢水煎牛黃清心丸方見急驚瀉白散方見肺臟二陳丸方見吐噦補中益氣湯方見虛羸小柴胡湯方見痙症桔梗湯方見肺癰四君子湯六君子湯清胃散異功散四方並見內釣地黃丸方見腎臟五苓散方見五淋人參平肺散方見夜啼白餅子方見發搐百晬內嗽百晬內嗽者名乳嗽甚難調理當審其虛實若氣粗痰盛口瘡眼熱先用比金丸嘔吐驚悸困倦自汗用補肺散驚嗽用琥珀散乳嗽用天麻丸若脾胃內熱用抱龍丸風邪外感者用惺惺散痰熱既去而氣粗痰盛或流涎者脾肺氣虛也用異功散加桔梗口瘡眼熱大便堅實者用三黃丸大便不實者用白朮散若嘔吐不乳困倦自汗或自利腹脹者脾胃氣虛也用六君子加柴胡若驚悸困倦痰盛不乳者心脾血虛也用四君子加芎歸酸棗仁或因乳母食五辛厚味致兒為患者仍參喘嗽諸症治驗一小兒外感風邪服表散之劑汗出作喘此邪氣去而脾肺虛也用異功散而汗喘止再劑而乳食進一小兒咳嗽服抱龍丸反吐瀉不乳腹脹發熱用六君子湯母子並服而瘥後因母飲酒仍嗽用清胃散加麴櫱母服而子亦愈一小兒患嗽或用清痰等藥反吐乳發搐熱搦腹脹此脾胃復傷而內虛熱也用異功散加鉤藤鉤漸愈又用前藥加當歸而安一小兒患咳嗽服牛黃清心丸加喘促腹脹此脾肺氣虛也用六君子湯頓愈補肺散一名阿膠散治肺虛噁心喘急久患咳嗽有痰阿膠一兩半炒鼠黏子炒馬兜鈴各半兩杏仁七粒糯米一兩甘草三分上每服一錢水煎服天麻丸治未滿百晬咳嗽不止天麻蟬蛻白殭蠶炒人參川芎甘草辰砂天竺黃各三錢牛膽南星白附子砒雄黃各一錢金箔五片硼砂五分上為末蜜丸芡實大金箔為衣每服一丸用薄荷湯下愚按前方乃金石大毒之劑不可輕用況百晬小兒多是乳母飲食厚味或母有肺病傳兒昔一婦人服截瘧丹內有砒者兒飲其乳良久子母昏憒遍身發赤翌日方蘇又一婦人亦服前藥其子吐瀉大作大人尚不能勝況小兒乎凡服砒石之藥中毒遍身發赤昏憒或吐瀉者急灌醋碗許即蘇小兒數滴足矣琥珀散治急慢驚風涎潮昏冒目瞪驚搐內釣腹痛或驚癇時發辰砂一錢半琥珀牛黃殭蠶炒去絲嘴牛膽南星全蠍白附子代赭石天麻乳香蟬殼各一錢上為末每服一二分白湯調下黃芩清肺飲治肺燥而小便不通黃芩一錢梔子一個打破上水煎服不利加鹽豉二十粒異功散四君子湯六君子湯清胃散四方見內釣白朮散方見積痛比金丸方見驚癇三黃丸方見疝症惺惺散方見咳嗽抱龍丸方見傷寒牛黃清心丸方見急驚作喘喘急之症有因暴驚觸心者有因寒邪壅盛者有因風邪外客者有因食鹹酸而痰滯者有因膏粱積熱熏蒸清道者然喘與氣急有輕重之別喘則欲言不能隘於胸臆氣急但息短心神迷悶耳治法因驚者用雄朱化痰定喘丸佐以天麻定喘飲寒傷肺氣者用小青龍湯風邪傷肺者用三拗湯加減之食鹹酸傷肺者啖以生豆腐熱傷肺氣者當涼肺定喘哮喘喉聲如鋸者梅花飲兼用半夏丸前症多因脾胃氣虛腠理不密外邪所乘真氣虛而邪氣實者為多若已發則散邪為主未發則補脾為主設概攻其邪則損真氣徑補其肺而益其邪凡喘嗽之症若小便不利則必生脹脹則必生喘要分標本先後先喘而後脹者主於肺先脹而後喘者主於脾蓋肺金司降外主皮毛肺朝百脈通調水道下輸膀胱肺既受邪則失降下之令故小便漸短致水溢皮膚而生脹滿此則喘為本而脹為標也治當清金降火為主而行水次之脾土惡濕而主肌肉土能剋水若脾土受傷不能制水則水濕妄行浸潰肌肉水既上溢則邪反侵肺氣不能降而生喘矣此則脹為本而喘為標也治當實脾行水為主而清金次之苟肺症而用燥脾之藥則金燥而喘愈甚脾病而用清金之藥則脾寒而脹益增觀其症若中氣虛弱者用六君子湯中氣虛寒者前方加炮薑鬱結氣滯者用歸脾湯加柴胡山梔肝木克脾土者用六君柴胡山梔肺氣壅滯者用紫蘇飲加白朮食鬱壅滯者用養胃湯加木香肺中伏熱水不能生而喘者用黃芩清肺飲及五淋散脾胃虛弱不能通調水道者用補中益氣湯及六味丸膏粱厚味脾肺積熱而喘者用清胃散及滋腎丸心火刑金不能生水者用人參平肺散亦用滋腎丸腎水虧虛火鑠金小便不利者用六味丸及補中益氣湯肝木乘脾不能相制而喘者用六君柴胡升麻脾胃虛寒臍凸腹脹者用八味地黃丸脾腎虛寒不能攝水如蠱脹者用加減腎氣丸凡虧損足三陰而致喘脹或二便不調及牽引作痛者俱用六味八味加減腎氣等丸治之仍參傷風咳嗽症治驗一小兒嘔吐發熱胸痞脅痛作喘發搐內乳恚怒母服加味逍遙散子服異功散加鉤藤鉤山梔並愈一小兒痰喘鼻塞用惺惺散而愈後因傷乳服消導之劑痰喘腹脹益甚余謂脾虛不能生肺而痰喘脾氣不能運化而腹脹用異功散而痊一小兒患喘服發汗之劑汗不出而喘益甚用異功散頓愈又用六君子湯而痊愈後復痰喘服下痰丸前症愈甚更腹脹作嘔此脾肺復傷也再用異功散而漸愈半載後患喘嗽面赤此心火克肺金用人參平肺散及六味地黃丸而痊一小兒傷風喘急不能臥服參蘇飲之類不痊余用小青龍湯一劑而愈後復感寒嗽喘益甚服發表之藥手足並冷腹脹少食余謂脾肺俱虛也用六君子加桔梗杏仁而愈一小兒患喘面赤服牛黃清心丸面色㿠白手足不熱余謂脾胃復傷用六君子湯不半杯而愈又傷風寒而喘面色仍白用五味異功散加桔梗生薑治之頓安一小兒七歲患前症久不愈或用下痰等藥連瀉數次飲食不入手足並冷喘急不得臥先用六君桂薑益甚用人參五錢附子一錢二劑少緩又二劑十減三四乃用獨參將愈卻用四君子而瘥雄朱化痰定喘丸治因驚發喘逆觸心肺暴急張口虛煩神困雄黃硃砂各一錢研蟬蛻全蠍少許白殭蠶天南星白附子炮各二錢輕粉五分上為末糊丸麻子大每服數丸茶清送下梅花飲治五臟積熱喉中有痰面色赤白鼻流清涕氣逆喘急目赤咳嗽或因驚夜啼硼砂馬牙硝片腦人參各一兩甘草五錢芒硝辰砂麝香各一方上各另為末瓷器收貯每服半匙麥門冬湯調服氣急喘嗽桑白皮湯下常服薄荷湯下天麻定喘飲治喘嗽驚風天麻防風羌活甘草炒人參桔梗白朮川芎半夏曲各等分上每服二錢水煎服三拗湯治感冒風邪鼻塞聲重語音不出或傷風寒頭痛目眩四肢拘倦咳嗽多痰胸滿氣短麻黃不去節杏仁不去皮尖甘草生用各等分上每服二三錢薑水煎服半夏丸治肺氣不調咳嗽喘滿痰涎壅塞心下堅滿及風痰嘔吐噁心涕唾稠黏白礬一兩半焙半夏三兩湯泡七次薑汁製一宿上為末生薑自然汁丸赤豆大每服十丸薑湯下紫蘇飲子治肺受風寒喘熱痰嗽紫蘇葉桑白皮青皮五味子杏仁麻黃甘草炙陳皮各二分人參半夏各三分上薑三片水煎溫服小青龍湯惺惺散二方見咳嗽異功散清胃散六君子湯加味逍遙散歸脾丸五方見內釣人參平胃散方見夜啼平胃散方見胃氣虛冷八味丸即六味丸加肉桂五味子方見腎臟牛黃清心丸方見急驚養胃丸方見瘧症黃芩清肺散方見百晬內嗽五淋散方見五淋滋腎丸方見發熱補中益氣湯方見虛羸六味丸方見腎臟金匱加減腎氣丸方見腹脹黃疸經曰中央黃色入通於脾故黃疸者脾之色也夫人身之神貴於藏而默用見於外則內虛矣其症皆因脾氣有虧運化失職濕熱留於肌膚發而為疸錢仲陽所謂身痛背疆二便澀滯遍身面目爪甲皆黃是也小便褐色者難治療法宜固脾為先如專用克伐寬中淡泄利水之藥則鮮有不至危者矣若初生及百日半年之間不因病而身黃者胃熱苔黃也腹大食上為脾疳兼作渴飲冷者用瀉黃散小便不利者茵陳湯病後發黃肢體浮腫者用白朮散清便自調肢冷嗜臥者益黃散身淡黃白者調中丸及補中益氣湯加茵陳身熱膈滿肌膚面目皆黃者加減瀉黃散辨其所以若閉目壯熱多哭不已大小便赤澀口中熱氣者乃妊娠厚味貽毒之候也母子並服生地黃湯仍忌酒面五辛熱物設不自慎誤傷脾土急則變為驚風吐瀉緩則肢體浮腫小便不利眼目障閉多成疳疾矣又有脾虛發黃者當於脾胃中求之治驗一小兒旬日內先兩目發黃漸及遍身用瀉黃散一服而瘥一小兒生旬日面目青黃此胃熱苔黃也用瀉黃散乳調服少許即愈後復身黃吐舌仍用前藥而安一小兒因乳母食鬱而致飽脹咽酸遍身皆黃余以越鞠丸治其母瀉黃散治其子並愈一小兒患前症服五苓散消食丸之類其黃不退作渴飲湯腹膨少食余謂胃氣虛津液少故喜飲湯脾氣虛故腹脹少食也先用白朮散漸愈又用補中益氣湯而痊一小兒飲食不調腹脹身黃小便金色雜用自治之劑作渴飲水余謂胃氣實熱先用瀉黃散二劑其渴頓止用梔子柏皮湯其黃亦退用白朮散而飲食進茵陳湯治陽明病發熱汗出者此為熱越不能發黃也但頭汗出至頸而還小便不利渴飲水漿此瘀熱在裡而發黃也或傷寒七八日小便不通腹微黃身黃如橘色者茵陳蒿嫩者一兩大黃三錢半梔子大者三枚上每服一錢水煎服犀角散治黃疸一身盡黃犀角一兩茵陳葛根升麻龍膽草酒炒甘草生地黃各半兩寒水石三錢上每服三錢水煎服一方栝蔞根汁和蜜服小半夏湯治黃疸小便色不變自利腹滿而喘者不可除熱熱去必噦半夏湯洗七次上每服二三錢薑三片水煎服消食丸治胸膈氣痞乳食不消身後黃者方見嘔吐乳茵陳五苓散即五苓散加茵陳每服一錢溫水調下日三服導赤散二方見五淋越鞠丸方見天釣承氣湯小柴胡湯二方見痙症調中丸即理中丸方見冷瀉平胃散方見脾胃虛冷使君子丸方見蛔蟲益黃散方見脾臟地黃湯即濟生地黃湯白朮散方見積滯四味肥兒丸方見嘔吐瀉黃散方見脾臟嘔吐乳嘔吐皆主脾胃古人謂脾虛則嘔胃虛則吐是也嘔者有聲無物吐者有物無聲也蓋乳哺過飽則胃不能受而溢出銜乳多食睡則脾不能運而作瀉脾胃漸傷疾病纏綿甚至慢驚之患矣若手足指熱喜飲熱湯或睡而露睛皆胃氣虛弱也用異功散若手足指熱飲冷或睡不露睛屬胃經實熱也用瀉黃散若作瀉少食或小便色赤胃經虛熱也用七味白朮散大凡嬰兒在乳母尤當節飲食若乳母停食亦能致兒吐瀉故不可不慎也治驗一小兒傷食嘔吐發熱面赤服消導清熱之劑飲食已消熱赤未退余以為胃經虛熱用六君升麻柴胡四劑而痊一小兒傷食嘔吐服克伐之藥嘔中見血用清熱涼血反大便下血唇色白而或青余謂脾土虧損肝木所乘令空心服補中益氣湯食遠服異功散使涎血各歸其源果愈一小兒吐酸乳食用四君吳萸黃連木香補脾平肝而愈後口中有酸水仍用前藥隨愈後吐苦水而口亦苦用龍膽湯以清肝火四君子湯以補脾土而痊一小兒吐黃水所食之物悉皆甘味用瀉黃散清其胃火而愈後因停食服克伐之藥口甘不食形氣殊弱用補中益氣湯養其中氣而痊一小兒傷食噯腐用平胃散一服宿滯頓化余云不必多藥但節其飲食自愈不信別用克滯之藥更加吐瀉以致不救一小兒傷食發熱面赤抽搐嘔吐氣喘唾痰此飲食傷脾肺氣虛弱所致用六君子湯炒黑黃連山梔各二分一劑頓愈消乳丸治嘔吐消乳食脈沉者傷食不化也香附子炒宿砂仁陳皮去白甘草炙神麯炒麥芽炒各等分上為末米糊丸黍米大每服二十丸薑湯下又方治百晬內嘔吐乳奶或大便青色用少婦乳汁一盞入丁香十粒陳皮一錢瓷器內煮數沸稍熱空心以綿球吮服楊氏消食丸治乳食過多胃氣不能消化宿砂橘皮三稜蓬朮神麯炒麥芽炒各半兩香附炒一兩上為末曲糊丸麻子大白湯送下量兒加減局方觀音散治外感風寒內傷脾胃嘔逆吐瀉不進飲食漸至羸食人參一兩神麯炒茯苓甘草炒木香綿黃耆白扁豆白朮各一錢石蓮肉去心二錢半上為末每服一錢入藿香三葉棗水煎服香附散治積冷嘔吐藿香葉陳皮厚朴薑汁製各七錢半夏一兩湯泡七次甘草炙一錢上每服三錢薑棗水煎瀉甚加木香肉豆蔻香薷散治寒溫不適飲食不調或外因風寒暑邪致吐利心腹疼痛霍亂氣逆發熱頭痛或轉筋拘急或疼痛嘔噦四肢逆冷香薷一兩茯苓白扁豆炒厚朴薑汁製各五錢上每服二三錢水煎加酒半杯冷服立效竹茹湯治胃受邪熱心煩喜冷嘔吐不止葛根七錢半半夏炮半兩甘草炙三錢上每服一二錢入竹茹棗許大薑水煎取清汁微冷細細服加茯苓三錢尤妙蘇合香丸治傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐痢驚癇客忤等症蘇合香油入安息香膏內熏陸香另研龍腦研木香白朮白檀香丁香硃砂研水飛沉香香附子炒烏犀屑蓽茇安息膏另為末用無灰酒梓膏麝香研訶黎勒煨取皮各二兩上為末研勻用安息香膏並蜜和丸桐子大井花水空心化服一二丸溫酒亦得更用蠟紙裹彈子大一丸緋絹袋盛當心帶之闢一切邪及治胸膈噎塞腸中虛鳴宿食不消青州白丸子治驚風吐乳天南星三兩白附子一兩半夏浸洗七次川烏頭去皮臍半兩上用井花水浸曬過次日早晨再換新水春五日夏三日秋七日冬十日曬乾為末以糯米粉煎粥清為丸緑豆大薄荷湯調下瀉白散方見脾臟白朮散方見積痛異功散六君子湯四君子湯三方見內釣千金龍膽湯方見噤風平胃散方見脾胃虛冷補中益氣湯方見虛羸吐舌弄舌舌屬心脾二經小兒舌微露而即收者名弄舌此屬心脾虧損用溫胃散補之舌舒長而良久不收者名吐舌乃心脾積熱用瀉黃散主之或兼口舌生瘡作渴飲冷屬胃經實熱亦用前散作渴飲熱屬胃經虛熱用四君子湯食少作渴或大便不實脾腎虛弱也用七味白朮散口角流涎或腮頰患腫胃虛風熱也先用人參安胃散次用七味白朮散若午後甚者脾血虛也四物多加參朮茯苓未應用補中益氣湯及審五臟相勝若因疳瘦所致當參諸疳門治驗一小兒弄舌發搐手指不冷余謂肝脾虛熱用異功散加升麻柴胡而愈後傷乳腹脹服克滯作瀉弄舌手指發熱審乳母肝火與小柴胡湯加升麻白朮治之母子並愈一小兒乳食過多患吐瀉用大劑異功散加柴胡升麻母子服之而愈後因驚服至寶丹之類發搐弄舌幾至慢驚余用六君子湯加白附子服之而愈一小兒吐舌發熱飲冷額鼻黃赤吐舌流涎余謂心脾實熱用導赤瀉黃二散而愈後復作別服清熱等藥更弄舌余用異功散加鉤藤鉤而安又用六君子湯痊愈一小兒七歲食生冷之物腹痛便祕服峻利之劑連瀉五次噫氣腹痛余謂心脾虛寒用異功散加薑桂木香治之不從反治胃火更加吃逆余仍以前藥加附子一片一服諸症頓退乃去附子又三劑而愈其時同患是症用清胃化痰者歿而手足俱黯四物湯方見急驚補中益氣湯方見虛羸小柴胡湯方見痙症導赤散方見心臟瀉黃散人參安胃散二方見脾臟七味白朮散方見積痛異功散六君子湯四君子湯三方見天釣五苓散方見五淋
