body:
  text: 卷六發熱小兒之熱有心肝脾肺腎五臟之不同虛實溫壯四者之不一及表裡血氣陰陽浮陷與夫風濕痰食各當詳之心熱者額上先赤心煩心痛掌中熱而噦或壯熱飲水已午時益甚肝熱者左頰先赤便難轉筋尋衣捻物多怒多驚四肢困倦寅卯時益甚脾熱者鼻上先赤怠惰嗜臥身熱飲水遇夜益甚肺熱者右頰先赤手掐眉目喘咳寒熱飲水日西熱甚腎熱者頦下先赤兩足熱甚骨蘇蘇如蟲蝕熱甚不能起於床夜間益甚仍當辨其虛實實則面赤氣粗口燥唇腫作渴飲冷大小便難或掀衣露體煩啼暴叫伸體而臥睡不露睛手足指熱宜用表下虛則面色青白恍惚神緩口中虛冷噓氣軟弱喜熱惡寒泄瀉多尿或乍涼乍溫怫鬱驚惕上盛下泄夜則虛汗屈體而臥睡露睛手足指冷宜用調補壯熱者肢體大熱熱不已則發驚癇溫熱者手體微熱熱不已則發驚搐陰虛則內熱陽盛則外熱以手輕捫之則熱重按之不熱此皮毛血脈之熱熱在表也重按之筋骨之分則熱輕手則不熱此筋骨之熱熱在裡也不輕不重按之而熱此肌肉之熱熱在表裡之間也以虛實分屬表裡而言之壯熱惡風寒為元氣不充表之虛熱也壯熱不惡風寒為外邪所客表之實熱也壯熱飲湯為津液短少里之虛熱也壯熱飲水為內火銷爍里之實熱也若夫內外皆熱則喘而渴齒乾煩冤腹滿四肢熱逢風寒如炙於火能冬不能夏是皆陽盛陰虛也脈尺寸俱滿為重實尺寸俱弱為重虛脈洪大或緩而滑或數而鼓此熱盛拒陰雖形症似寒實非寒也熱而脈數按之不鼓此寒盛格陽雖形症似熱實非熱也發熱惡熱大渴不止煩躁肌熱不欲近衣其脈洪大按之無力或兼目痛鼻乾者此血虛發躁也當補其血如不能食而熱自汗者氣虛也當補其氣仲景論內外不足發熱自汗之症禁不可發汗加飲食勞役雖病發熱誤發其汗則表必虛也身熱而汗出者風也發熱身疼而身重黃者濕也增寒發熱惡風自汗脈浮胸痞者痰也發熱頭痛脈數者食也寸口脈微為陽不足陰氣上入陽中則惡寒尺脈弱為陰不足陽氣下入陰中則發熱陰陽不歸其分則寒熱交爭也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也晝則發熱煩躁夜則安靜是重陽無陰也當急瀉其陽峻補其陰至若身熱脈弦數戰栗而不惡寒者疸瘧也發熱惡寒脈浮數者溫病也若四肢發熱口舌咽乾是火熱乘土位濕熱相合故煩躁悶亂也若身體沉重走注疼痛乃濕熱相搏風熱鬱而不得伸也心熱則用瀉心湯導赤散安神丸肝熱則用瀉青丸柴胡飲子脾熱則用瀉黃散肺熱輕則用瀉白散重則用涼膈散及地骨皮散腎熱則用滋腎丸實熱則宜疏下虛熱則宜調補壯熱者導赤散溫熱者瀉黃散若肢體熱輕則用惺惺散重則用羌活散之類大便祕者二黃犀角散餘熱不退者地骨皮散骨節疼痛者梔子仁湯宿滯內作者紫霜丸肝火內熱者龍膽草湯陰盛隔陽而熱者人參理中湯肝經血虛生風而搐者用四物天麻鉤藤鉤若熱蘊便祕者四順清涼飲熱而二便調和風邪蘊結於表而發者用惺惺散加麻黃汗之汗後血虛而熱益甚者六神散加粳米汗後氣虛而惡寒發熱者補中益氣湯汗後陰虛陽無所附而熱者用四物湯加參耆汗後陽虛陰無所附而熱者用四君湯加芎歸嬰兒諸熱其因別症而作者當從所重而治之或乳母七情厚味飲食停積遺熱於兒或見嗜食甘肥衣衾過暖或頻浴熱湯積熱於內為患者各當詳之蓋小兒臟腑脆弱元氣易虛補泄宜用輕和之劑庶無變症若乳下嬰兒當兼治其母仍參諸熱症治之治驗一小兒夜間發熱天明如故或小腹作痛飲食少思面色痿黃熱時面赤不時飲食此食積所致用下積丸治之而消又用白朮散調理而安一小兒飲食停滯腹痛作嘔用大安丸而愈飲食雖進其腹仍痛用六君山楂神麯痛少止余以為脾氣傷而飲食難化乃去前二味服六君子四劑而愈後又傷食仍服前藥痛止而至暮發熱用六君柴胡升麻而痊此由脾虛下陷不能升發故至暮發熱也一小兒發熱飲食少思大便不實常服蘆薈等丸視其鼻赤此寒涼之劑復傷脾土而虛熱也用五味異功散數劑而愈一小兒十三歲內熱晡熱形體倦怠食少作渴此稟賦怯弱之虛熱也用地黃丸異功散補之不越月而痊一小兒十四歲而近女色發熱吐痰至有室兩目羞明頭覺脹大用地黃丸料加五味子當歸黃耆煎服及補中益氣湯得慎疾而瘥一小兒十四歲肢體倦怠發熱晡熱口乾作渴吐痰如湧小便淋漓或面目赤色身不欲衣此稟腎不足而虛熱也用補中益氣湯六味地黃丸尋愈一小兒五歲發熱作渴右腮鼻準微赤或與冷水涼藥即時嘔吐余曰右腮微赤肺經虛熱也鼻準微赤胃經虛熱也先用四君升麻一劑吐止又用白朮散二劑而不渴更用四君子湯四劑而安一小兒九歲發熱作渴用瀉黃散大便重墜口角流涎彼欲瀉火余曰鼻準青白脾胃虛寒肝木所侮也口角流涎脾氣不能攝也大便重墜胃氣不能升也不信竟服涼藥眉唇微動四肢微搐復求治余曰此虛極而變慢脾風矣用六君炮薑當歸木香鉤藤鉤二劑益甚欲求更劑余曰藥力未及耳又加炮附子一片即安後去附子二劑而愈一小兒四歲停滯腹痛發熱用大安丸而飲食進又用六君山楂神麯四劑而痛止後傷食至暮復熱用六君柴胡山梔升麻而痊此脾虛兼肝火之治法也一小兒發熱體瘦夜間遺尿日間頻數此稟脾腎不足用補中益氣湯加補骨脂及地黃丸加鹿茸治之而痊畢姻後小便頻數作渴發熱服補陰丸等藥發熱尤甚小便如淋用補中益氣湯六味地黃丸而愈一小兒體瘦腹大發熱嗜臥作渴引飲先用白朮散為主佐以四味肥兒丸諸症漸愈又用異功散六味丸而愈一小兒十四歲傷食發熱服消食丸胸腹膨脹發熱作渴此脾氣復傷也先用四君升麻柴胡飲食漸進用補中益氣湯而愈後因勞心發熱少食用四君升麻柴胡而愈一小兒傷風咳嗽服參蘇飲加痰盛喘急腹脹不食此脾肺虛而復傷也用六君柴胡桔梗一劑諸症頓息用六君子湯而痊一女子十四歲發熱至夜益甚久不愈左關脈弦數右關脈微按之亦弦此肝火血熱脾胃虛弱先用四物二連湯加柴胡山梔牡丹皮二劑熱稍退又二劑熱頓退再用加味逍遙散加白朮三錢數劑而痊嘉靖癸丑閏三月渠下第北歸大子麟孫方病瀉不食遍體如焚胸滿腹冷痛日夜不成寢或投以山楂枳殼中氣愈弱瀉愈甚不食至纍月日進米飲一半甌或糕餌棗栗少許稍過節度則肢體熱益壯腹痛不解奄奄喘息旦暮不保矣立齋先生枉視之則曰此胃虛不能納脾濕不能運病在戊巳深且久兼木氣所乘脫服攻治之藥則殆矣亟用補中益氣湯數裡熱稍退瀉不食如初先生復曰此勿亟惟胃氣漸復濕漸除當自得效耳改用六君兼補中湯仍服八味丸生命門火以滋脾土如是三月諸症悉退納穀倍常日惟稍遇形役或記誦心勞則潮熱遄發先生復授以歸脾方加梔柴二種熱尋止形氣日充甲寅七月偶觸暑飲冷前症復作間發瘧疾熱晝夜不止先生曰此虛寒逼陽法當舍時從症用補中湯多加炮薑益以生薑二兩及口而瘧止面色青黃相錯更患痢或謂參耆炮薑不宜先生哂之且曰此固虛弱自利耳往嘗謂戊巳受病木氣乘之此青黃二色非正形耶仍用補中益氣多加柴胡參術數日而痢止餘症亦漸解脫惟吾兒襁褓失母渠每姑息之故其性外溫而中易怒渠少孤遭家多難藜藿恆不充兒幼多病失調養故形怯而胃弱致疾之原其所由來者漸矣先生洞微燭幽知其病深且久而堅持獨見以祛攻治之惑吾兒再造之慈何幸得此於先生哉先生之曾大父與先廷評公為中表兄弟先君與先生同宦遊京師末年尤敦泉石之雅先生盛德及於犬子能使先人後嗣永存區區志感誠不能盡萬分之一也是歲冬十月望眷晚生張慕渠頓首頓首嘉靖甲寅敬臣之女年十二患脾胃素弱自夏入秋時瀉時止小腹微痛至八九月間遂成疳積之症發熱凡二十餘日不止汗泄熱解汗已復熱自中脘至小腹膨脹堅直大便溏氣喘咳嗽作噯俱晝輕夜重徹夜煩躁不睡鼻塞眼暗譫語其母以為必死矣立齋先生診之曰脈浮大而無根此大虛證也非獨參湯不可乃用參一兩加熟附三分煨生薑三片日進二劑仍並渣服之大下疳積其氣甚惺腹漸寬熱漸減脈漸斂然手猶尋捻不已鼻孔出血先生曰此肝證也煎六味丸料與之一服如脫乃晝服獨參薑附湯夜服六味丸料脈漸有根諸症漸退先此手足恆熱至是乃始覺寒先生喜曰此病邪盡退而真氣見矣然猶飲食不進乃單用六君子湯加炮薑遂能食咳嗽獨甚與補中益氣湯嗽遂止夜始有睡凡弱女之得生皆先生力也向非先生卓有定見專治其本而其末自愈則奄奄一息之軀豈堪雜劑之攻擊哉其為丘中之骨蓋必然矣敬臣感激之餘無由以報敬書施療之顛末以附醫録庶不泯先生之功且以告同患此者幸無所誤亦推廣先生一念之仁於萬一云爾孟冬望日眷晚生王敬臣頓首拜書敗毒散治傷風瘟疫風濕頭目昏眩四肢作痛增寒壯熱項強睛疼或惡寒咳嗽鼻塞聲重柴胡前胡川芎枳殼炒羌活獨活茯苓桔梗人參各一兩甘草半兩上每服二錢生薑薄荷水煎滋腎丸治腎熱黃柏酒拌炒焦三錢知母二錢肉桂五分上為末熟水丸桐子大每服二十丸至三十丸食前百沸湯下四順清涼飲治小兒血脈壅實臟腑蓄熱頰赤作渴五心煩熱睡臥不安四肢擎掣及因乳哺不時寒溫失度令兒血氣不順腸胃不調大小便澀欲發驚癇或風熱結核頭面生瘡目赤咽痛瘡疹餘毒一切壅滯挾熱泄瀉不止加木香煨大黃赤芍藥當歸甘草大黃各等分上每服一錢水煎作兩服消風散治小兒解脫致令風邪客於皮毛入於臟腑則令惡風發熱胸膈痰涎目澀多睡方見驚癇胎症小柴胡湯治傷寒溫熱身熱惡風頭痛項強四肢煩疼往來寒熱脅痛耳聾嘔噦痰實中暑瘧疾並服之方見天釣愚按前方若肝膽經風熱肝火瘰癧寒熱往來日晡發熱潮熱不欲飲食或怒火口苦耳聾咳嗽或脅痛胠滿小便不利或泄瀉吐酸苦水或肢體搐動唇目抽掣及乳母有前症致兒為患者並宜服之抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡眠不安方見肝臟梔子清肝散一名柴胡梔子散治三焦及足少陽經風熱發熱耳內作癢生瘡或出水疼痛或胸乳間作痛寒熱往來柴胡梔子炒牡丹皮各一錢茯苓川芎芍藥當歸牛蒡子炒各七分甘草三分上水煎服柴胡清肝散治肝膽三焦風熱怒火或乍寒乍熱往來寒熱發熱或頭髮瘡毒等症柴胡一錢半黃芩炒人參川芎各一錢山梔炒一錢半連翹甘草各五分桔梗八分上水煎服柴胡飲子解肌熱蒸熱積熱或汗後餘熱脈洪實弦數大便堅實黃芩七分甘草四分大黃八分芍藥七分柴胡人參各五分當歸一錢上每服一錢薑水煎當歸補血湯治肌熱躁熱目赤面紅煩渴晝夜不息其脈洪大而虛重按全無此脈虛血虛也若誤服白虎湯必死宜此主之黃耆當歸各等分上水煎服三黃丸治三焦積熱眼目赤腫頭項腫痛口舌生瘡心膈煩躁不美飲食大小便祕澀五臟實熱或下鮮血瘡節熱症黃連黃芩大黃煨各等分上為末煉蜜丸桐子大每服三十丸白滾湯下量大小加減服白虎湯治傷寒或吐或下後七八日邪毒不解熱結在裡表裡作熱時時惡風大渴舌上乾燥而煩欲飲數升者宜服之又治夏月中暑汗出惡風寒身熱而渴知母三兩甘草一兩炙石膏八兩另研糯米三合上每服二三錢水煎至米熟為度瀉黃散方見脾臟瀉心湯方見心臟地黃散方見腎臟清涼飲柴苓散二黃犀角散牛黃散黃龍湯牛黃膏梔子仁湯六物黃芩湯五物人參飲地骨皮散十方見潮熱惺惺散理中湯二方見咳嗽加人參即人參理中湯龍膽湯紫霜丸二方見噤風撮口四物湯方見急驚六神散方見夜啼白朮散方見積痛羌活散方見驚風下積丸方見積滯補中益氣湯大安丸即保和丸加白朮六君子湯四君子湯加味逍遙散異功散六方見內釣瀉白散方見肺臟瀉青丸方見肝臟涼膈散方見瘡瘍八珍湯方見寒熱潮熱錢仲陽曰潮熱者時間發熱過時即退來日依時而至有風寒疳積食癖之分陰陽虛實五臟之異如汗出身熱呵欠面赤者風熱也傷寒時疫陰陽相勝外感熱也肌瘦口乾骨蒸盜汗疳熱也大小便祕澀汗下不解積熱也腹背先熱夜發旦止食熱也涎嗽飲水乳食不消癖熱也又有煩熱者氣粗喘促心躁不安頰赤口瘡兼發癇症瘡疹熱者耳鼻尖冷血熱者巳午間發至夜則涼虛熱者困倦少力發於病後陽邪於心則來去不定陰陽相勝則寒熱如瘧前症在小兒有因乳母或妊娠七情厚味遺熱或飲食停積衣衾過暖及頻浴熱湯而為患若寅卯辰時熱而力盛飲水者肝經實熱也用柴胡清肝散熱而力怯飲湯者肝經虛熱也用六味地黃丸巳午時熱心經也實用導赤散虛用祕旨安神丸申酉戌時熱肺經也實用瀉白散虛用祕旨保脾湯亥子丑時熱腎經也用地黃丸大凡壯熱飲水大便祕結屬實熱用二黃犀角散下之熱渴飲湯大便如常屬血虛用四物湯補之若下後陰虛陽無所附而仍熱用四物參耆汗後陰陽虛無所生而仍熱用四君芎歸若汗下後煩渴面赤血虛發躁也用當歸補血湯若見驚搐等症肝血虛而內生風也用四物天麻鉤藤鉤頰赤口乾小便赤澀大便焦黃表裡俱實熱也用清涼飲子如大便已利或熱未止表邪未解也惺惺散未應加麻黃微汗之既汗而仍熱此表裡俱虛氣不歸源陽浮於外而虛熱也六神散加粳米陽氣下陷於陰中而發熱者用補中益氣湯若乳下嬰兒當兼治其母治驗一小兒潮熱煩渴大便乾實氣促咳嗽右腮色赤此肺與大腸有熱用柴胡飲子一服頓愈後因微驚發搐咬牙頓悶此肝脾氣血虛也用四君芎歸鉤藤鉤而愈一小兒潮熱發躁左腮青赤此心肝血虛用祕旨安神丸及四物防風酸棗仁漸愈又用六味地黃丸調補肝腎而痊一小兒潮熱發搐痰涎上湧手足指冷左腮至申酉時青中隱白手足時搐此肝經虛弱肺金所勝而潮搐脾土虛弱而手足冷也用補中益氣湯調補脾肺用六味地黃丸滋補肝腎而愈蓋病氣有餘當認為元氣不足若用瀉金伐肝清熱化痰則誤矣一小兒寅卯時發熱或兼搐有痰服抱龍瀉青二丸而愈後復患服前藥兼咳嗽氣喘不時發搐面赤色或青黃或浮腫或流涎余謂咳嗽氣喘脾肺氣虛也不時發搐肝木乘脾也面青黃肝入心脾也浮腫流涎脾氣虛也用益智丸以養心血補中益氣湯以補脾氣而愈一小兒腹滿作嘔飲食少思至暮腹脹發熱此脾虛下陷朝用補中益氣湯夕用六君柴胡升麻而愈後因勞不時寒熱夜間盜汗用十全大補湯而愈一小兒夜間發熱腹脹余謂脾虛肝盛朝用五味異功散夕用四味肥兒丸熱止乃朝用六味地黃丸夕用異功散而痊一小兒巳午時發熱驚悸發時形氣倦怠面黃懶食流涎飲湯余謂心氣不足所致不信反服涼心之藥更加吐瀉睡而露睛手足並冷幾至慢脾風先用六君薑桂佐以地黃丸而愈一小兒亥子時患前症用益黃散而愈後復發服前藥及清熱之劑病發不時嗜臥露睛作渴少食大便頻黃余謂脾虛而肝木勝之兼元氣下陷也用補中益氣湯佐以地黃丸而愈一小兒先停食服克伐之藥致面色痿黃體倦少食申酉時潮熱或用清熱消導之劑更加泄瀉余先用六君子湯數劑後用補中益氣湯漸愈一小兒申酉時發熱面赤腹中作痛或用峻利之劑下之致發搐吐痰作渴腹痛按之即止此脾胃傷而變症也用七味白朮散補中益氣湯頓安柴苓散治壯熱來去柴胡麥門冬去心焙人參赤茯苓甘草各半兩黃芩一兩上為末每服二錢入小麥二十粒青竹葉二片水煎服二黃犀角散治溫壯熱心神不安大腑祕結犀角屑大黃酒浸蒸鉤藤鉤梔子仁甘草黃芩各半兩上為末每服五分熱湯調下量兒加減牛黃散治溫壯常熱或寒熱往來牛黃研甘草各半兩柴胡梔子酒炒龍膽草酒炒黃芩炒各二錢半上為末每服半錢以金銀薄荷湯調下黃龍湯治發熱不退或寒熱往來柴胡五錢黃芩炒甘草炙各二錢赤芍藥三錢上每服三錢薑棗水煎牛黃膏治壯熱咽喉涎響或不省人事或左右手偏搐或唇口眼鼻顫動此涎熱內蓄風邪外感也宜急服之蠍尾四十九枚巴豆肉去油膜一錢半梅花腦半匙辰砂研二錢鬱金一錢皂角水煮牛黃少許麝香一匙上為末每服一匙蜜水調下量兒虛實用之梔子仁湯治陽毒壯熱百節疼痛下後熱不退者梔子仁酒炒赤芍藥大青知母各一兩升麻黃芩酒炒石膏各二兩柴胡一兩半甘草五錢杏仁二兩浸去皮麵炒微黃上每服三錢生薑三片水煎服六物黃芩湯治壯熱腹大短氣往來寒熱飲食不化黃芩酒炒大青甘草炙麥門冬去心石膏各半兩桂二錢上每服一二錢水煎服五物人參飲治壯熱咳嗽心腹脹滿人參甘草各半兩麥門冬去心生地黃各一兩半茅根半握上每服二三錢水煎服益智丸治脾腎虛熱心氣不足益智仁茯苓茯神各等分上為末煉蜜丸桐子大每服五六十丸空心白滾湯下亦治白濁四物二連湯治血虛勞五心煩熱晝則明瞭夜則發熱脅肋並一身盡熱日晡肌熱當歸生地黃白芍藥川芎黃連胡黃連各等分上水煎服地骨皮散治虛熱壯熱知母柴胡甘草人參地骨皮茯苓半夏各等分上薑水煎有驚熱加蟬退天麻黃芩抱龍丸方見傷寒六味丸方見腎臟七味白朮散方見積痛導赤散祕旨安神丸二方見