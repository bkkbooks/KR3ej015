body:
  text: 卷十自汗自汗者汗無時而自出也經曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾又云陰虛而陽必輳則發熱而自汗陽虛而陰必乘則發厥而自汗東垣云表虛自汗秋冬用桂春夏用黃耆丹溪云汗者心之液也自汗之症未有不因心腎俱虛而得之者巢氏云虛勞病若陽氣偏虛則津液發泄而為汗天自心為主陽之藏火也陽主氣人身津液隨其陽氣所在之處而生亦隨其火所擾之處而泄則為自汗矣治法當用參耆甘溫益氣之藥使陽氣外固而津液內藏則汗止矣若元氣虛者夏月用六君子湯加山藥山茱萸冬月用加減八味丸十全大補湯血虛者四物加參耆有熱者當歸六黃湯氣血俱虛者十全大補湯心腎虛熱者六味丸虛寒者八味丸心經血虛者團參湯胃經氣虛者六君子湯飲食勞倦者補中益氣湯嗜臥倦怠者升陽益胃湯熱傷元氣者清燥湯暑干心胞絡者清暑益氣湯外傷風邪者惺惺散虛勞羸瘦者人參養榮湯思慮傷脾者歸脾湯怒動肝火者小柴胡湯肝經虛熱者加味逍遙散肝經濕熱者龍膽瀉肝湯泄瀉脈微者人參理中湯手汗者補中益氣湯胸腹汗者四君子湯當心一片有汗者茯苓補中湯黃汗者茵陳五苓散血汗者血餘散敷之此皆云汗之大法也仍推五臟相勝主之若汗出如油喘而不休此為命絶柔汗發黃此為脾絶汗出不流如貫珠者為絶汗數者並不治若六陽虛則汗出上至頭下至項亦多主難治治驗一小兒四歲因驚自汗左關無脈以此為憂余曰肝主驚此稟肝氣不足因驚則氣散脈必在臂腕於尺部盡處候之果得用補中益氣湯六味地黃丸半載脈復本位其脈在合谷之間者皆自幼被驚而然也一小兒五歲因驚自汗發熱虛證悉具右寸脈短此胃氣復傷也用獨參湯月餘又用補中益氣湯仍佐以六君子及加味地黃湯半載而愈一小兒自汗目直項強頓悶余謂肝經實熱先用柴胡梔子散隨用六味地黃丸而愈後因驚自汗咬牙呵欠屬肝經虛熱生風用六味地黃丸補中益氣湯而痊後又驚自汗怔悸面赤發熱悉屬肝經虛熱用六味丸而愈一小兒自汗面青善怒小便頻數睡間驚悸或發搐目直此肝火血燥生風也先用加味四物湯加味逍遙散各四劑與間服諸症漸愈又用四君山梔而痊一小兒自汗盜汗頸間結核兩目連札此兼肝脾疳症也用四味肥兒丸及大蕪荑湯而痊後每傷食發熱便血自汗用五味異功散加升麻柴胡漸愈又用六味地黃丸而痊一女子十四歲自汗寒熱月經先期余謂肝火血熱用加味逍遙散地黃丸而痊後因怒經行不止自汗盜汗先用加味小柴胡湯次用加味逍遙散而愈一小兒自汗叫哭發熱作渴飲水抽搐仰睡乃心經實熱也用導赤散治之而愈後又自汗發熱飲湯抽搐無力驚竄咬牙覆睡面赤心經虛熱也用茯苓補心湯而愈一小兒自汗惡風用補中益氣湯加炒浮麥而止因飲食停滯患吐瀉用六君子湯而愈又用四君當歸浮麥而汗止出痘時自汗盜汗用十全大補湯而痘愈後因風咳嗽自汗腹脹余謂脾肺俱虛宜用六君桔梗因惑於人言先服發表之劑更加氣喘盜汗余用四君五味子炮薑四劑不應每劑又加人參五錢炮薑一錢稍止又三劑而痊十全大補湯治諸虛不足自汗不食時發潮熱等症白茯苓人參當歸白朮黃耆炒川芎肉桂白芍藥炒熟地黃甘草炒各等分上三五錢薑棗水煎服八珍湯前方去肉桂黃耆治驗見各門人參養榮湯治病後時自汗或發潮熱口乾食少心虛驚悸咳而下痢前方去川芎加陳皮五味子遠志百解散治感冒風邪發熱自汗者荊芥白芷麻黃去節陳皮蒼朮甘草炒各三分上薑三片蔥白三根水煎服清暑益氣湯治暑邪干衛身熱自汗黃耆蒼朮泔浸去皮各一錢升麻七分人參白朮陳皮炒神麯炒澤瀉各五分甘草炙黃柏酒浸炒當歸身麥門冬去心青皮炒葛根各三分五味子九粒杵上水煎服茵陳五苓散治伏暑發黃煩渴小便不利赤茯苓豬苓澤瀉白朮茵陳各三分上水煎服血餘散治汗不止用男子亂髮一握煅存性為細末以絹袋盛置干撲之清燥湯治小兒自汗或因熱傷元氣大小便祕澀黃耆炒蒼朮各五分白朮陳皮澤瀉人參白茯苓升麻麥門冬當歸身生地黃神麯炒豬苓黃柏酒拌炒各三分五味子五粒杵黃連炒甘草炙各二分上薑一片水一鍾水煎服升陽益胃湯方見諸痢六君子湯加味歸脾湯四君子湯加味逍遙散五味異功散五方見內釣柴胡梔子散方見發熱小柴胡湯方見肝臟補中益氣湯方見虛羸龍膽瀉肝湯人參理中湯茯苓補心湯三方見喑團參湯當歸六黃湯二方見盜汗惺惺散四物湯二方見急驚六味丸方見腎臟四味肥兒丸方見寒吐加味八味丸即六味丸加肉桂五味子方見腎臟大蕪荑湯方見疳症導赤散方見心臟盜汗盜汗者睡則汗出寤則汗收也自汗屬陽虛盜汗屬陰虛蓋陽為衛氣陰為榮血血之所主心也所藏肝也熱搏於心故液不能內斂而外泄於皮膚人臥則靜而為陰覺則動而為陽故曰自汗屬陽盜汗屬陰也多因心腎不交水火不能既濟腎虛則閉藏之令失守故有是症宜用六味丸十全大補湯血虛內熱者當歸六黃湯心經有熱者導赤散肝經虛熱者六味地黃丸血脫盜汗者當歸補血湯肝膽風熱者柴胡清肝散食積內熱者二陳枳實山梔胃氣虛熱者六君子湯及浮麥散血氣俱虛者人參養榮湯餘症見自汗當參覽之治驗一小兒十一歲面色青白或惡寒發熱鼻間黃白盜汗自汗胸膈不利飲食少思常懷畏懼用二陳黃連酸棗茯神之類不應余以為脾肺俱虛不信自用硃砂安神丸更寒熱往來泄瀉不食余用六君當歸黃耆而愈一小兒五歲腹中作痛大便不實患盜汗鼻間左腮皆白此脾肺俱虛而食積所致也用六君山楂神麯四劑腹痛頓止去查曲又四劑大便調和乃用四君歸耆而汗止一小兒十二歲患盜汗形氣瘦弱面色或赤或白右腮白兩頰赤鼻間微青此稟足三陰經虛也朝用補中益氣湯夕用六味地黃丸而愈一小兒久患盜汗夜熱晝涼飲食少思大便酸臭此食積內作也先用三稜散消導積滯又用五味異功散補脾進食而瘥一女子十四歲自汗寒熱肝脈弦洪此肝火所致用加味逍遙散而愈後飲食停滯吐痰眩暈頭面不時汗出兩寸脈不及本位用補中益氣湯加半夏蔓荊子而痊一小兒三歲盜汗不食聞藥即嘔此胃氣傷也用浮麥炒為末以乳調服錢許旬余嘔止食進佐以六君子湯而愈一小兒發熱呵欠頓悶咬牙至夜盜汗屬肝膽火症用小柴胡湯加山梔二劑又用地黃丸料煎服而愈一小兒盜汗甚多久不愈寸口脈沉伏飲食少思稍多食則腹痛汗不止余謂脾虛食積用六君升麻柴胡月餘脾氣漸健飲食漸加汗亦少止乃佐以異功散乃痊一小兒苦盜汗肢體消瘦因功課勞役更加自汗余用補中益氣十全大補二湯而愈次年因勞心前症復作更加夢遺仍用前二湯各五十餘劑而愈畢姻後前症俱作手足並冷前藥又各加薑桂一錢數劑少應至六十餘劑而愈因大勞盜汗如雨手足如冰再以前二藥加桂附各一錢數劑方愈當歸六黃湯治血虛盜汗內熱晡熱者當歸熟地各五分生地黃炒三錢黃連炒黑黃柏炒黑黃芩炒黑各三分黃耆炒五分上水煎服團參湯治虛汗盜汗新羅人參三兩當歸三錢上為末用雄豬心一個切三片每服以豬心一片煎湯調服二錢白朮散治自汗盜汗白朮三兩小麥一合炒上用水一鍾半煮乾去麥為末以炒黃耆煎湯量兒大小調服忌蘿蔔辛辣炙煿之類乳母尤忌六味地黃丸方見腎臟人參養榮湯十全大補湯二方見自汗導赤散方見心臟柴胡清肝散當歸補血湯二方見發熱二陳湯方見寒吐六君子湯四君子湯五味異功散加味逍遙散四方見內釣小柴胡湯方見癍症三稜散方見白濁補中益氣湯方見虛羸噫氣經曰脾病則面黃善噫噫者寒氣客於胃厥逆從下上散復出於胃而為噫又善思善味其症當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收經曰脾主四肢有是者脾也又曰二陽一陰發病主驚駭背痛善噫何謂也竊謂上焦受氣於中焦中焦氣未和不能消穀故為噫耳中焦亦脾胃之分也脾土虛寒由命門火衰不能溫蒸水穀古人有服菟絲子旬日間飲食如湯沃雪亦此義也補脾宜人參理中湯補右腎宜用八味丸胃氣虛不能運化水穀者六君子加木香鬱結傷脾者加味歸脾湯木剋土者四君柴胡升麻兼嘈雜者加吳茱萸半夏治者審之治驗一小兒稟賦虛羸時常作痢年十三歲泄瀉不食手足並冷諸藥不應余謂命門火衰六君子湯八味丸治之尋愈畢姻後勞心過甚飲食頓少發熱下氣先用參術各五錢薑棗煎服諸症稍愈又用六君子湯加炮薑肉桂參術各一兩一劑諸症頓愈又因勞心發熱煩渴用補中益氣湯加附子一錢渴止用參耆各一兩歸術各五錢附子一錢三劑痊瘥一小兒十五歲喜噫面黃腹脹飲食難化用六君益智木香漸愈後因怒兼脅痛少食下氣噫氣用補中益氣湯加附子益智漸愈後飲食過多腹脹吞酸服保和丸熱渴痰甚用二陳黃連石膏之劑大便不止吃逆不食手足並冷余用六君附子四劑稍愈又以補中益氣湯加附子及八味丸而遂安一女子十九歲患前症用六君子湯送四味茱萸丸而愈但怒即發服此藥亦即愈後因怒氣勞役前症復作血崩不止先用柴胡梔子散一劑隨用補中益氣湯加山梔而痊仍參虛羸治驗本事枳殼散治心下痞悶或作痛多噫枳殼白朮各半兩香附子炒一兩檳榔三錢上為末每服一錢空心米飲調下四味茱連丸治腹脹噫氣吞酸食不能化吳茱萸炒黃連炒神麯荷葉各等分上為末水煮神麯糊丸桐子大每服二十丸白湯下黃連當量病微甚或炒黑炒黃用之八味丸即六味丸加五味子肉桂方見腎臟四君子湯加味歸脾湯六君子湯三方見內釣補中益氣湯方見虛羸下氣劉河間云腸胃鬱結穀氣內發而不能宣通於腸胃之外故喜噫下氣也若癲癇勞瘵氣下泄而不止者必死乃真氣竭絶腠理閉塞穀氣不能宣通於腸胃之外故從腸胃中泄出婁全善云下氣屬心虛經云夏脈者心也心脈不及下氣為泄者是也經又云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行此平人也若七情內傷六淫外侵飲食失節房勞過度致脾土之陰受傷轉運之官失職不能輸化故下氣也又曰陰精所奉其人壽陽精所降其人夭陰精者乃五穀之精上榮心肺以降腎肝故曰其人壽陽精者乃胃中之清氣陷入腎肝不能升浮上輸心肺故曰其人夭若飲食過多腸胃鬱結用平胃散癲癇勞瘵用補中益氣湯心氣虛弱用補心丸心氣虛寒用補心湯脾胃虛寒用理中湯肝木乘脾用六君子湯加木香脾氣鬱結用加味歸脾湯脾氣下陷用補中益氣湯命門火衰用八味丸腎氣不足用六味地黃丸大凡噫氣下氣者其脈不及本位內經云短則氣病以其無胃氣也諸病見此脈難治但純補胃氣為善治驗兼仍參虛羸治驗一小兒脾氣素弱飲食少思常患虛弱畢姻後噫氣右關脈弱不及本部左關脈弦數而長此脾氣虛肝木勝之也用六君柴胡炒黑山梔治之尋愈後因勞復作用補中益氣湯加益智二劑而痊後又勞復頭暈仍用前湯更加蔓荊子而愈一女子十四歲性悉多怒噫氣常服木香檳榔丸胸中爽快次年出嫁孀居前症復發服清氣化痰丸發熱痰甚服芩連等藥經行如崩發熱作渴四肢抽搐唇口自動此因肝盛脾虛不能統血歸經虛火動而類風也用加味逍遙散內歸術各用五錢加鉤藤鉤二錢治之諸症頓愈又用加味歸脾湯久服而愈一女子早喪母噫氣下氣出嫁後患吞酸胸痞用六君子送越鞠丸漸愈又用加味歸脾湯而安後因怒兼脅痛腹脹小便淋澀用加味逍遙散加車前子龍膽草而愈一小兒十一歲稟胃氣充實飲食過多胸滿噫氣用枳殼散漸愈又用六君子湯痊愈至十七歲飲食停滯腹脹兼痛自用枳殼散肢體倦怠噫氣下氣余用六君乾薑肉桂而愈一女子年十六患此先用參術之藥不應用六君子湯送四味茱連丸而愈後又因怒氣勞役前症益甚更兼發熱用柴胡梔子散二劑隨以補中益氣湯而痊平胃散方見虛寒補心湯方見喑補心丸即茯神散為丸方見驚悸補中益氣湯方見虛羸人參理中湯方見驚瀉越鞠丸六君子湯加味歸脾湯加味逍遙散四方見內釣本事枳殼散方見前症柴胡梔子散方見發熱四味茱連丸方見噫氣八味地黃丸方見腎臟不寐經曰陽明胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也又曰胃不和則臥不安夫人身之衛氣晝則行於陽夜則行於陰陽主動陰主靜寤則魂魄志意散於腑臟發於耳目動於肢體而為人身指使之用寐則神氣各歸五官而為默運之妙矣若脾胃氣盛則臟腑調和水穀之精各各融化以為平和之氣若胃氣一逆則氣血不得其宜臟腑不得其所不寐之症由此生焉當用四君遠志酸棗仁肝腎虛熱者六味丸心血不足者真珠母丸思慮過度者歸脾湯精神短乏者人參養榮湯病後餘熱者酸棗仁湯膽虛不得眠者人參竹葉湯肝火不寧者加味小柴胡湯振悸不得眠者四君生薑酸棗仁夜啼驚哭不寐各詳別症當參求之治驗一小兒患瘡潰後飲食少思倦怠不寐先用四君茯神當歸陳皮飲食頓加乃佐以八珍散為末時服錢許漸得寐又因驚汗出發熱不寐用異功散加柴胡山梔汗熱頓止仍服四君八珍之藥得寐後又飲食停滯腹痛吐痰不寐汗出用六君柴胡升麻山楂而安一小兒十四歲勤於功課徹夜不寐飲食無味早間用補中益氣湯午後用異功散飲食漸有味夜稍得寐仍用補中益氣湯八味湯而愈畢姻後不寐兼遺精盜汗用補中益氣湯六味地黃丸而愈一小兒痢後不食少寐或兼盜汗先用異功散加升麻當歸飲食漸進佐以補中益氣湯稍得寐四年後因用心記誦患自汗不寐飲食甚少用補中益氣湯加味異功散而愈一女子十七歲喪母過哀不寐發熱或寒熱此脾血虛而火動也用加味逍遙散加味歸脾湯治之尋愈後因飲食怒氣不寐腹痛先用六君柴胡升麻而痛止仍用前二藥而得寐仲景酸棗湯治虛勞虛煩不得眠酸棗仁炒一錢甘草知母炒茯苓芎藭生薑各五分上水煎服本事鱉甲丸治膽虛不得眠四肢無力鱉甲酸棗仁炒羌活黃耆炒牛膝酒炒人參各一兩五味子上為末煉蜜丸梧子大每服三四十丸溫酒下聖惠治骨蒸勞熱煩心不得眠用酸棗仁三錢水煎熟下地黃汁一蛤蜊食之本事真珠母丸治肝膽二經因虛內受風邪臥則魂散而不守狀若驚悸真珠三分另研細當歸熟地黃各一兩半人參酸棗仁炒柏子仁各一兩犀角茯神沉香龍齒各半兩上為末煉蜜丸小豆大辰砂為衣每服二十丸白湯下日午夜臥各一服人參竹葉湯治虛煩不得寐人參竹葉甘草各二錢半夏小麥麥門冬各一錢半上每服二三錢薑二片粳米一撮水煎服四君子湯六君子湯加味歸脾湯加味逍遙散五味異功散五方見內釣補中益氣湯方見虛羸人參養榮湯方見自汗加味小柴胡湯方見痙症八珍散十全大補去黃耆肉桂六味地黃丸方見腎臟驚悸人身有九藏心藏神肝藏魂二經皆主於血血虧則神魂失寧而生驚悸也經曰東方青色入通於肝其病發驚駭又曰二陽一陰發病主驚駭驚者心卒動而恐怖也悸者心跳動而怔忡也二者因心虛血少故健忘之症隨之用四物安神之類丹溪謂亦有屬痰者宜用溫膽湯加辰砂遠志之類若思慮便動虛也用養心湯時作時止痰也用茯苓丸觸事易驚心膽虛怯也用溫膽湯臥驚多魘血不歸源也用真珠母丸夢寐不寧肝魂失守也用定志丸恐畏不能獨處膽氣虛冷也用茯神湯睡臥煩躁膽氣實熱也用酸棗仁丸眩暈驚悸風痰內作也用本事辰砂遠志丸思慮鬱結脾虛氣滯用歸脾湯前症雖曰屬心與肝而血之所統實主於脾脾之志曰思思慮多則血耗損而不能滋養於肝心者脾使之也思慮內動未嘗有不役其心者夫心為君火之藏十二官之主也夫君之德不怒而威無為而治故宜鎮之以靜謐戒之以妄動動則相火翕合煽爍陰精精血既虧則火空獨發是以驚悸怔忡之所由生五志之火心所不能制者矣故治脾者不可不知養心養心者不可不知鎮靜而寡欲然人孰無思也思之正則無妄動之欲矣朱子曰必使道心常為一身之主而人心每聽命焉此善養於心者也治驗一女子素血虛驚悸出嫁後更怔忡晡熱月經過期用八珍湯加遠志山藥酸棗仁三十餘劑漸愈佐以歸脾湯痊愈後因勞怒適經行不止前症復作先用加味逍遙散熱退經止又用養心湯而痊一小兒十五歲徹夜用功記誦去後少寐仍不戒勞患怔忡發熱不止用歸脾湯為主佐以八珍湯諸症漸愈後復作服歸脾定志二藥即愈一小兒十五歲因用心太過少寐驚悸怔忡惡寒先用補中益氣湯茯苓酸棗仁遠志惡寒漸止又用加味歸脾湯驚悸稍安又用養心湯而愈一小兒驚悸睡臥不安發熱飲冷用治要茯苓散而愈又因勞役恚怒發熱吐痰自汗用溫膽湯二劑而安又用歸脾湯寧志丸而愈一小兒十三歲善思多憂體倦發熱心懷畏懼必多人相伴乃止用茯神湯佐以歸脾湯兩月餘漸愈畢姻後前症復作加寒熱頭暈先用前二湯而驚悸愈後用十全大補湯補中益氣湯諸症漸愈後因科舉入場勞役朝寒暮熱自服前二湯各三十餘劑不應時仲秋脈虛大按之微細面白腹痛亦用前方倍加肉桂乾薑四劑亦不應遂以八味丸料煎服四劑稍緩又四劑漸愈乃用八味丸十全大補湯而安一女子十五歲性沉靜被盜所恐遂驚悸腹脅脹痛寒熱往來不食無寐善思恐懼用酸棗仁丸歸脾湯加味逍遙散而尋愈出嫁後因喪子兼大勞驚悸無寐吐痰發熱飲食少思胸腹膨脹服化痰藥日吐痰四五碗時考續至京請治余謂脾肺虛寒不能攝涎化食而為痰也用六君乾薑六劑痰益甚手足並冷用前藥每加附子一錢仍不應乃用人參一兩附子二錢四劑始稍緩又二劑仍用六君加薑附各五分數劑後易桂治之而愈溫膽湯治心膽虛怯觸事易驚或夢寐不祥遂致心驚膽攝氣鬱生涎涎與氣搏變生諸症或短氣悸乏或復自汗膽虛不能制脾則脾之水飲作矣半夏湯洗竹茹枳實麩炒各二兩橘皮二兩去白甘草炙一兩白茯苓一兩半上每服四錢水一盞半薑五片棗一枚煎七分食前服寧志丸治心虛多驚若有痰宜吐之人參白茯苓茯神柏子仁琥珀當歸酸棗仁溫酒浸半日去殼遠志炒各半兩乳香硃砂石菖蒲各三錢上為末蜜丸桐子大每服三十丸食後棗湯下茯神散治五臟氣血虛弱驚悸怔忡宜用此安神定志茯神去木人參龍齒另研遠志去心桂心防風獨活酸棗仁細辛白朮炒各三錢乾薑炮三兩上為末每服四五錢水煎服蜜丸亦可治要茯苓補心湯治心氣不足喜悲愁怒衄血面黃五心煩熱或咽喉間痛舌本作強方見喑茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中煩悶茯神去木酸棗仁炒黃耆炒梔子仁炒白芍藥炒五味子杵炒桂心熟地自制人參各一兩甘草五錢炒上每服五錢薑水煎酸棗仁丸治膽氣實熱不得睡臥神志不安驚悸怔忡茯神去木酸棗仁炒遠志去心柏子仁炒防風各一兩枳殼麩炒生地黃杵膏各半兩青竹茹二錢五分上為末蜜丸梧子大每服七八十丸滾湯下定志丸治心神虛怯所患同前或語言鬼怪喜笑驚悸人參茯苓各一兩五錢菖蒲遠志去心各一兩上為末蜜丸如前服治要茯苓散治心經實熱口乾煩渴眠臥不得心神恍惚茯神麥門冬各一兩半通草升麻各一兩二錢半紫菀桂心各七錢五分知母一兩大棗十二枚淡竹茹五錢赤石脂一兩七錢五分上每服一兩水煎服朱雀丸治心病怔忡不止白茯苓二兩沉香半兩上為末蜜丸小豆大每服三十丸人參煎湯下世傳密陀僧散治驚氣入心絡不能語者昔有人為狼及犬蛇所驚皆以此而安密陀僧研極細末如粉上茶清調一錢七分丹溪硃砂丸治勞役心跳硃砂當歸身白芍藥側柏葉各三錢川芎陳皮甘草黃連炒各一錢半上用豬心血為丸粟米大每服百丸龍眼湯下本事辰砂遠志丸消風化痰鎮心安神人參石菖蒲去毛遠志去心茯神各一兩川芎山藥白附子麥門冬細辛鐵粉辰砂各五錢上為末用生薑汁入水糊丸緑豆大以硃砂為衣每服一二十丸臨睡生薑湯下歸脾湯六君子湯加味逍遙散三方見內釣補中益氣湯方見虛羸真珠母丸方見不寐十全大補湯八珍湯二方見自汗養心湯方見驚癇吞酸吞酸之症有二熱與寒也經曰諸嘔吐酸皆屬於熱東垣曰病機作熱攻之誤矣濁氣不降寒藥豈能治之二説似乎矛盾而實一也素問言熱者所以指其末也東垣言寒者所以指其本也丹溪用吳茱萸之法亦嘗謂之寒矣然亦當分其虛實而治之若煩熱作渴好食啖物飲食易化是為實火內熾而胃經熱也宜用清涼飲之類若不渴喜食熱物飲食難化是為虛火所致而胃經寒也宜用香砂六君子湯之類故東垣云邪熱不殺穀苟誤認為實熱概用寒涼之劑而變為中滿嘔吐反胃之症者皆末傳寒中之敗症也可不慎歟治驗一小兒吞酸用六君子湯而愈後傷食復作兼瀉先用五味異功散加升麻乾薑瀉頓止又以六君子煎送四味茱萸丸而愈一小兒吞酸噯腐發熱口渴先用保和丸二服以消宿滯又用六君木香乾薑以溫養中氣而愈後傷冷粉腹脹痛余用異功散加乾薑諸症漸愈用補中益氣湯加木香將愈又傷食吞酸腹痛用六君木香二劑痛止又四劑而愈一小兒吞酸喘嗽腹脹面白兼青余謂脾肺之氣虛先用補中益氣湯加茯苓半夏二劑喘脹悉愈又用六君子湯及五味異功散而愈一小兒十三歲吞酸每食碗許稍多則瀉或腹脹面色黃或青白此脾肺虛肝木所勝用六君乾薑柴胡升麻間佐以補中益氣湯而痊畢姻後兼勤於功課仍吞酸唾痰服清熱藥大便不實嗜臥少食而似肉痿用前藥各百餘劑而痊一女子吞酸唾痰恪用清氣化痰之藥余謂屬中氣虛不信後覺肚腹腫脹大小便淋瀝而歿六君子湯加木香砂仁名香砂六君子湯異功散二方見內釣補中益氣湯保和丸二方見虛羸四味茱連丸方見噫氣脾弱多困丹溪云脾具坤靜之德而有干健之運夫胃陽也主氣脾陰也主血胃司納受脾司運化一納一運化生精氣清氣上升糟粕下降納五穀化津液其清者為榮濁者為衛陰陽得此謂之橐籥故東垣以脾胃為五臟之根本也脾氣既弱則健運之令不行化生之功已失職而嗜臥多困所由生焉法當溫補其脾脾氣既旺則臟腑清陽之氣升舉易於運行又何困倦之有海藏用四君子加木香半夏白朮倍之薑棗煎服誠良法也若脾虛好睡多驚則是心血虛而火動之宜安神養血若因心脾氣虛有痰者宜用人參五味子茯苓以補心氣當歸芍藥酸棗仁以養心血橘紅半夏以開痰若因脾肺氣虛胸膈有痰用補中益氣湯以健脾胃膽星天竺丸以化痰涎若因飲食停滯而作用四君子湯以益脾土山楂神麯以消飲食若因脾虛而好睡用五味異功散以補脾氣當歸芍藥以生脾血芍藥須用酒拌炒黃不則酸寒傷脾此假熱以對假寒也若乳母飲酒致兒昏醉好睡者以乾薑陳皮煎湯解之不應用異功散加乾葛即愈矣治驗楊永興子年七歲嗜臥兼驚久不愈余曰好睡是脾氣虛困也善驚是心血虛怯也此心火不能生脾土子母俱病用補中益氣湯及六味地黃丸加鹿茸而愈一小兒母因醉後飲乳困睡不醒遍身如丹瘤先君謂酒毒為患用葛花解醒湯令母子俱服而愈一小兒病後嗜臥飲食少思面色痿黃中隱青色用五味異功散加柴胡升麻為末每服錢許日二三次月餘稍愈又飲食過多更患嘔吐手足並冷飲食頓減先用六君子湯加升麻柴胡木香乾薑二劑諸症漸愈又用補中益氣湯為末日服二三次月餘而安一小兒九歲患痢後嗜臥唾痰服化痰藥吐痰益甚而臥床三年矣面色痿黃兼白或時青赤右關脈微細左關脈弦數余謂肝火乘脾用六君升麻柴胡三十餘劑而稍健乃以補中益氣湯間服又各三十餘劑而少坐又五十餘劑而痊一女子十一歲患痢後嗜臥唾痰飲食難化胸腹膨脹服化痰利氣之劑益甚余謂悉屬脾胃氣虛而飲食化痰也朝用補中益氣湯夕用五味異功散兩月而愈又傷食吐瀉用六君子湯月餘不應乃以人參五錢乾薑五分薑棗煎服百餘劑始應仍用補中益氣異功散而痊膽星天竺丸治小兒痰涎上壅喘嗽不休牛膽南星一兩半夏湯泡去皮臍薑汁製白附子湯泡去皮臍各五錢天竺黃三錢天麻防風各二錢辰砂一錢另研水飛上為末甘草湯為丸芡實大每服一丸空心薄荷淡薑湯化下五味異功散六君子湯四君子湯三方見內釣補中益氣湯方見虛羸六味地黃丸方見腎臟葛花解醒湯方見熱吐尋衣撮空尋衣撮空許叔微謂之肝熱夫肝主筋筋脈血枯而風引之故手指為之撮斂也宜確服六味地黃丸間有回生之功錢仲陽用瀉青丸此治肝經實熱蓋尋衣撮空皆病後之敗症耳求其實熱則百無一二矣治者審之王海藏治血脫尋衣撮空摸床手揚搖頭錯語失神脈弦浮而虛血脫內躁熱之極也氣粗鼻乾此為難治用生地黃連湯主之治驗王少參孫女年十二歲脾胃素弱後成疳症發熱小腹膨脹堅直大便溏瀉氣喘咳嗽徹夜煩躁不睡鼻塞眼暗譫語其脈大而無根用人參一兩附子三分腹脹漸減脈漸斂然猶尋衣撮空鼻孔出血用六味地黃丸料二服如脫乃晝服獨參薑附湯及服六味地黃丸料脈漸有根諸症漸愈又用六君子補中益氣湯而痊詳見發熱一小兒停食夜驚腹痛服消食丸瀉數次尋衣撮空面青黃或色白此脾土受傷肺金休囚肝火旺而然耳先用異功散加升麻以補脾土用六味地黃丸料以滋肝血稍定各二劑漸愈卻用補中益氣湯六味地黃丸間以異功散而痊一小兒受驚駭恪服鎮驚化痰等藥忽患前症眼上面痿黃或兼青赤此肝經陰血虛陰氣旺而生風耳當滋肝腎益脾肺遂用異功散而痊一小兒面痿黃患瘰癧忽發麵色青赤此脾氣虛木火相搏而為患也用補中益氣湯佐以柴胡山梔散二劑加味逍遙散三服諸症漸退又以地黃丸而遂痊一小兒流注出膿甚多患前症此元氣虛弱內熱而變耳用八珍湯異功散各數劑方稍緩又數劑而安又補中益氣湯而愈一小兒膝癰誤觸其膝出血甚多患前症惡寒面白此陽隨陰散而虛寒用十全大補湯加附子三分四劑未應用人參一兩附子五分薑棗煎服稍退又二劑頓退乃朝用異功散夕用八珍湯而安一小兒傷風表汗後患前症惡風面白手足冷用補中益氣湯加五味子汗頓止而諸症漸退又用四劑而安乃十全大補湯而愈生地黃連湯治血脫尋衣撮空搖頭妄語川芎生地黃當歸各七錢赤芍藥梔子黃芩黃連各三錢防風一錢五分上每服三錢水煎服加味逍遙散異功散六君子湯三方見內釣地黃丸方見腎臟補中益氣湯方見虛羸柴胡梔子散方見發熱瀉青丸方見肝臟八珍湯十全大補湯二方見自汗喜笑不休經曰心藏神有餘則笑不休又曰在臟為心在聲為笑在志為喜又火太過曰赫曦赫曦之紀其病笑謔狂妄又云少陰所至為喜笑又云精氣升於心則喜此數者皆言屬心火也若笑不休呻而為腹痛此水乘於火陰擊於陽陽伏熱生狂妄譫語不可聞心之損矣扁鵲云其人唇口赤色者可治青黑者死若腎水虧涸不勝心火而喜笑不休者用六味地黃丸肝火熾盛能生心火而喜笑不休者用柴胡清肝散余兼別症各從其症而參治之治驗一小兒喜笑常作不安面赤飲冷手足並熱先用黃連瀉心湯未二服稍定又用六味地黃丸料煎服頓愈常服此丸則安月許不服仍前復作又服愈矣一小兒患前症面青赤此肝心二經風熱所致也用柴胡梔子散六味地黃丸漸愈又因乳母大怒發熱先用加味柴胡湯又用加味逍遙散母子服之並愈一小兒患前症因乳母大怒患血崩寒熱先用加味逍遙散一劑用當歸補血湯三劑如此治之各數劑母子並愈一小兒年十四歲用心過度飲食失節患喜笑不休脈洪大而虛面色赤而或白余用補中益氣湯而愈次秋科舉飲食勞倦前症復作或兼譫語脈洪大按之微細如無用人參一兩薑棗煎服稍定又三劑而愈又勞役用心自汗作渴煩躁似癇症先用當歸補血湯二劑頓安又十全大補湯而尋愈一女子十六歲面色痿黃素沉靜喜笑不休月經先期用柴胡梔子散加味逍遙散而愈次年出嫁不時復作但作時面赤勇力發後面黃體倦朝用補中益氣湯夕用加味逍遙散而愈後每發悉用前藥即愈當歸補血湯柴胡梔子散柴胡清肝散三方見發熱黃連瀉心湯方見煩躁地黃丸方見腎臟
