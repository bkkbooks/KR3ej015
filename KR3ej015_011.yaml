body:
  text: 卷十一腫瘍腫瘍者以瘡瘍未潰而言也經云形傷痛氣傷腫又云榮氣不從逆於肉裡乃生癰腫皆因稟受胎毒或乳母膏粱厚味七情陰火或兒食炙煿甘美積毒氣血不和所致當分其經絡所屬五臟相勝與元稟虧損預為審用攻補調和之劑速令散潰尤當審其勢之腫漫色之赤白與痛有微甚毒有表裡若腫高焮痛便利調和邪在表也宜表散之腫硬痛深大便祕澀邪在內也宜下之外無拘急內則便利調和者邪在經絡也宜調榮衛腫焮大痛或麻木不痛邪氣凝滯也用隔蒜灸或活命飲若煩躁飲冷赤痛發熱二便不通者火熱內熾也用清涼飲活命飲加大黃尤善若微腫微痛或不痛陽氣虛弱也用參耆托裡散微黯微赤或不赤陽氣虛寒也用加味托裡散若惡寒而不作膿或濃熟而不潰者陽氣虛也用加味托裡散如此則未成者自能消散已成者自能潰腐尤當別其屬陰屬陽或半陰半陽而治之若泥於腫瘍禁用辛熱之說不分受症之因兼症之經概行敗毒泛擾諸經誅伐無過以致不能起發或不能腐潰收斂變症莫能枚舉癰疽論云腫瘍內外皆壅宜以托裡表散為主但見腫痛參之脈症虛弱便與滋補氣血無虧可保終吉嬰兒有疾兼調其母若腫瘍之際治失其法必致潰瘍之變症此推內經之微旨而生平之徵驗者尤當觸類而長愚奚庸贅潰瘍潰瘍者以瘡瘍膿潰而言也膿潰而腫消痛止者為順若膿潰腫痛或發寒熱者氣血虛也用十全大補湯膿潰欲嘔少食脾胃虛弱也用六君炮姜手足並冷者脾氣虛寒也用六君薑桂如不應急加附子膿潰而仍痛或二便祕澀者熱毒未解也用清熱消毒散熱退而渴不退津液不足也用八珍加黃耆麥門山茱萸熱止而小便頻數腎虛也用加減八味丸料若熱不止或腫痛反甚虛熱內作也用人參黃耆湯或熱退而肌肉不生者氣血俱虛也用十全大補湯瘡色夭白或陷下不斂寒氣所襲也用五味異功散佐以豆豉餅膿血過多煩躁不安乃亡陽也急用獨參湯尤當審其腫之軟硬飲食冷熱與膿之稀稠多少肉之赤色微甚青黯及瘡口之收斂遲速而投以托裡消毒調補之劑庶無變症癰疽論云潰瘍內外皆虛宜以托裡補接為主蓋潰瘍之變症因由於腫瘍之際治失其宜虧損元氣之所致治者誠能謹之於始則無後變之患矣胎毒發丹胎毒發丹者因胎毒內伏或頻浴熱湯或著烘衣或乳母飲食七情內熱助邪為患發於頭面四肢延及胸腹色赤遊走不定古人云從四肢起入腹囊者皆不治當急令人隨患處遍吮毒血各聚一處砭出之急服活命飲惟百日內忌砭以其肌肉難任也若發散過劑表虛熱而赤不退者用補中益氣湯加防風白芷寒涼過劑胃氣受傷而熱赤不退者用異功散加柴胡升麻或兼發搐等症用四君升麻當歸鉤藤鉤若復行攻毒必致不起頭額間患者當臥鐮砭之史少參孫二歲丙申正月陰囊赤腫余作胎毒治瘥後患發熱痰盛等症診其母有鬱火血熱用解鬱涼血之藥子母俱服而愈至六月初患吐瀉兩眼瞤動或投參術之類不應以為慢驚欲用附子藥請余議視其寅卯關脈赤此屬風熱傷脾用柴胡清肝散加鉤藤鉤木賊草一劑即愈丁酉正月初旬頸患熱毒膿出貼藥忽暴風啓戶即時發熱翌日頭面黯腫如斗兩耳厚寸許此風邪上攻血得熱而沸騰也急砭兩額出黑血三盞許隨用清熱化毒湯黯腫十退七八翌日復砭則血不甚黑矣仍以前藥去牛蒡子加熟地黃而愈此症若不行砭法或作破傷風治必死一小兒四肢患之外勢雖輕內則大便祕結此患在臟也服大連翹飲敷神效散而瘥一小兒患之赤暈走徹遍身難以悉砭令人吮四肢胸背數處使毒血各凝聚而砭之先用活命飲米酒調二服又以金銀花甘草節為末用人乳汁調服漸愈月餘後兩足皆腫仍砭之服前藥而痊數日後兩足復赤或用犀角解毒丸之類致乳食不進肚腹膨脹此復傷脾胃而然也敷神功散服補中益氣湯加茯苓而痊一小兒腿如霞片遊走不定先以麻油塗患處砭出惡血其毒即散用九味解毒散而安一小兒臂患之砭出毒血而愈惑於人言服護心散以杜後患服之吐瀉腹脹患處復赤手足並冷余謂此脾胃虛弱前藥復傷用六君子湯一劑頓愈又以異功散加升麻柴胡而痊一小兒患此砭之而愈但作嘔不食流涎面黃余謂此脾氣虛弱用異功散加升麻治之吐止食進又用補中益氣湯涎收而安一小兒患此砭之而愈翌日發搐作嘔手足並冷此胃氣虛而肝木侮之用異功散加藿香木香諸症頓止又用異功散加升麻柴胡而痊一小兒患此砭之而愈但面赤作嘔飲冷余謂胃經熱毒未解先用仙方活命飲又用清熱消毒散各一劑而愈一小兒腿上患之神思如故乳食如常余謂毒發於肌表令急砭出毒血自愈不信外敷寒涼內服峻劑腹脹不乳而死一小兒遍身皆赤砭之投以解毒藥而愈一小兒患此二便不利陰囊肚腹俱脹急用砭法隨以活命飲加漏蘆木通大黃為末時用熱酒調服至兩許二便俱通諸症頓退卻去三味仍前時服而愈一小兒患此二便不利腹脹咳嗽用活命飲加漏蘆木通麻黃為末時時熱酒調服二便隨通遍身出汗諸症頓退鼻息似絶氣無以動時或似躁此邪氣去而元氣虛也急用當歸補血湯而愈砭法治丹毒赤色遊走不定令口吮毒血各聚一處用細瓷器擊碎取有鋒芒者以箸頭劈開夾之用線縛定兩指輕撮箸頭稍令磁芒對聚血處再用箸一根頻擊刺出毒血輕者止用口吮出毒用藥敷之如患在頭者不用砭法止宜用針臥倒挑患處以出毒血遲則毒血入腹而難起矣神功散治丹毒最效若砭後毒甚者宜用如毒輕者砭後不可用恐砭後皮膚既破草烏能作痛也仙方活命飲方見熱毒瘡瘍清熱化毒湯清熱消毒散方見熱毒口瘡柴胡清肝散方見脅癰補中益氣湯方見內釣小柴胡湯方見痙症大連翹飲方見臂癰柴芍參苓飲方見天蛇毒九味解毒散方見黃水黏瘡傷食發丹傷食發丹者因脾胃之氣未充乳食過多不能運化蘊熱於內而達於肌表也若因食乳停滯者先用保和丸消之大便祕結者量加大黃通之乳食既消而丹尚作者用清中解鬱湯治之丹邪既去而乳食不思者用五味異功散補之發熱作渴或飲食少思者用七味白朮散補之大凡飲食厚味所致者赤暈或行而緩慢若飲燒酒或誤吞信石所致者遍身赤暈其行甚速又有瘡瘍發焮周圍有赤暈其熱消散或膿出自退凡此俱忌砭法皆宜安里為主不可攻伐若自吐瀉亦不可止之吐瀉中有發散之意因飲燒酒者飲冷米醋一二杯解之此神妙之法也因母多食炙煿膏粱或飲燒酒或服辛熱燥藥或鬱怒傷肝脾致兒為患者當參胎熱毒瘡瘍治之一小兒面赤皎白手足常冷傷食患丹余謂此因脾胃虛弱不信另用克伐之劑更吐瀉腹痛吐涎不乳口舌生瘡此脾胃復傷而虛寒格陽在外非實熱也先用六君乾薑又用五味異功散而愈一小兒每停食發赤暈此脾虛食鬱用清中解鬱湯而愈越月忽搖頭咬牙痰甚發搐嘔吐酸腐此食鬱傷脾也待其吐盡翌日少與白朮散而愈又服前散月餘遂不復患一小兒停食便祕四肢赤色此飲食蘊毒於內用枳實黃連厚朴山楂神麯而便通赤解更頭暈咳嗽此脾氣虛而不能生肺金也用六君桔梗以補脾肺山楂神麯以消飲食而痊一小兒患此服發表之劑手足抽搐服驚風之藥目瞤痰甚余謂脾胃虧損肝木所勝之虛象無風可祛無痰可逐用六君子湯一劑而安再劑而瘥一小兒停食服通利之劑患丹作嘔腹脹此脾氣復傷也用補中益氣湯五味異功散而愈一小兒因母食炙煿酒面兩臂前臁各漫腫一塊有根四畔赤暈相圍余謂患處屬胃經因胃經積熱而為患也用清胃瀉黃二散治之而消設謂丹毒輒用砭法及敗毒之藥反促其危矣一小兒因母飲燒酒其子身赤如丹毒三日間皮膚皆潰煩躁發熱飲冷作渴令飲冷米醋即日並安卻服金銀花甘草未而愈一小兒患瘧服信石之藥遍身赤痛煩躁昏憒用米醋一杯徐灌而蘇良久遍身如故又用金銀花甘草為末每服一錢米醋調下三服而安一小兒五歲忽吐瀉又俄頃胸腹赤色見遂遍身俱赤余意其中信石之毒而然若胎瘤食毒則無此急速乃灌冷米醋一杯吐瀉即止少刻赤漸退半日始蘇其形尚似死又用羊血接其元氣而愈保和丸方見虛羸瀉黃散方見脾臟清胃散加味歸脾湯六君子湯三方見天釣清中解鬱湯方見丹毒七味白朮散方見積滯胎毒瘡瘍寶鑑云初生芽兒一塊血也無形症也無脈有驚即系是胎驚有熱即系是胎熱嬰兒實與乳母一體凡患瘡疾但審乳母肝經有熱用加味小柴胡湯之類肝經虛熱用加味逍遙散之類腎水不能生肝用地黃丸心經積熱用柴胡梔子散心經虛熱用茯苓補心湯膏粱積熱用東垣清胃散脾經鬱熱用錢氏瀉黃散脾經虛熱用錢氏異功散若服犀角丸化毒丹外敷寒涼之藥復傷生氣乃促其危也一小兒生下耳前腫一塊如小栗旬余色赤腫高觸之則哭此屬膽經部位診乳母果肝膽經脈數此稟生母肝火所致乳母有肝火而益甚也又數日作吵不安手足時搐此因作膿焮痛而然又三日早間以手指微按瘡頭腫隨指復起其膿已成也至午瘡頂起薄皮膿已熟也點代針膏將晚出膿兒頓安腫赤頓消此瘡家最善症也貼太乙膏以護風寒乳母服逍遙散而愈一小兒生下臂外臁腫一塊寸許月餘忽赤腫二寸許外赤暈勢欲走散此膿毒內焮針之隨出膿赤暈退兒即安診乳母肝膽脈弦數按之有力先用加味小柴胡湯加黃連二劑去黃連又二劑卻用加味逍遙散與乳母服兒尋愈一小兒生下大腿腫寸許一塊面目色白將期敷藥而潰膿水清稀二期而未愈後呵缺咬牙此稟腎虛朝用補中益氣湯夕用地黃丸料與母子同服半杯年餘而愈一小兒生下左脅間一塊漫腫無頭肉色不變敷鐵箍散潰而膿清欲嘔余謂稟肝經氣滯而脾氣虛不能愈也先用異功散加柴胡升麻以補脾胃又以托裡散加柴胡山梔以托裡清肝其子亦飲數匙三月而愈一小兒生下小腹患腫一塊年餘不潰寒熱往來此稟肝火而然也其母果經事不調內熱體倦用地黃丸八珍湯與母服子日服半杯尋愈一小兒生下胸脅間腫赤年餘不消余謂稟肝血熱但治其母不信另用鐵箍散犀角丸作嘔不乳此胃氣虛而復傷余用五味異功散救子之胃氣用加味逍遙散治母之肝火頓愈一小兒生下遍身無皮色赤原母素食膏粱之物以寒水石一兩炒焦黃柏二兩淨黃土四兩俱為細末時敷遍身母服清胃散加漏蘆五日赤少淡卻用黃土五兩炒焦黃柏一兩敷之母服加味逍遙散又三日赤頓淡水頓少又三日但敷黃土一味母服八珍湯加牡丹皮柴胡而愈一小兒生下有疥審其母素鬱怒用消毒散以當歸膏調敷母服加味逍遙散加漏蘆及加味歸脾湯而愈後復發為母食膏粱用清胃散及敷前藥而愈一小兒生下有痔瘡三歲後作痛服化毒丹犀角丸以治大腸之火更腹痛作瀉咬牙呵缺仍欲治火余曰呵缺咬牙屬肝經之症內經云因而飽食筋脈橫解腸澼為痔此稟肝火為患兒服地黃丸母服逍遙散加漏蘆而愈一小兒陰囊赤癢或時如無皮狀兩目常閉服化毒丹益甚余曰化毒丹犀角丸治脾胃實火之劑前症乃稟肝腎經陰虛也不信仍服之幾危余用六味地黃丸四味肥兒丸母服加味逍遙散而痊一小兒生下陰囊赤腫余謂稟腎肝陰虛不信另用化毒丹之類前症益甚更嘔吐不乳手足並冷此脾胃被傷先用五味異功散母用大劑地黃丸料加炒黑黃柏及漏蘆與數劑而消其時患是症服化毒丹敷涼藥者俱不救一小兒生下臀尖微腫寸許一塊敷鐵箍散服化毒丹越月腫起色赤啼聲不絶以指按之隨手復起此膿內熟而痛也遂針之出稠膿啼聲即止余謂血氣無虧不必用藥彼欲速效另服犀角丸致吐瀉發搐欲投驚藥余曰此因脾胃虧損而內生風耳急以人參一兩細切和壯婦乳一鍾置粥釜中煮良久取出絞乳汁以綿作乳頭樣者蘸乳頻與兒吮之一日吮盡卻服乳化地黃丸母日服八珍湯加漏蘆不月而愈一小兒生下臀內臁赤腫二寸許一塊有膿內潰遂針之出膿甚多隨眼閉咬牙余謂眼閉脾氣虛不能開也發搐咬牙乃脾氣虛而肝火動也以人參如前漬乳兒吮母服八珍湯加漏蘆月餘而瘡愈一小兒生旬余頭患毒高寸許有赤暈勢危急臥鐮砭出黑血兒即安翌日眉間有患亦有赤暈余意宜即砭之衆議第二日砭之果血凝不出腹脹而歿敷藥鐵箍散治一切瘡癤癰疽芙蓉葉黃柏大黃五倍子白芨上為末用水調搽四圍按前方乃寒涼解熱收斂之劑或有用白蘞商陸根者有用寒水石天花粉者有用蒼耳金銀花者有用芭蕉赤小豆者有用草烏白芷之類者皆不分寒熱溫涼之雜餌內經云先腫而後痛者形傷氣也先痛而後腫者氣傷形也又云五臟不和九竅不通六腑不和瘤結為癰外科精義云凡瘡腫高而軟者發於血脈腫下而堅者發於筋脈肉色不變發於骨髓蓋必有諸中而後形諸外故受症之經與所患之位各有不同豈宜一概外敷涼藥惟脾胃無虧血氣不和者庶幾有效若服化毒之類脾胃復傷運氣凝滯亦不能消矣至如疔瘡之類正欲宜拔其毒若復用前藥肌肉受寒血氣凝滯必致毒氣入內而不救治法必察其腫之高漫色之赤白痛之微甚作膿之難易出膿之稠薄生肌之遲速以別其屬陰屬陽或半陰半陽或純陰純陽而用相宜之藥以涼之熱之和之又當審受症之傳變五臟之相勝而以調補脾胃為主庶不致變惡症也五福化毒丹治胎毒及痘後頭面生瘡眼目腫痛生地黃杵膏熟地黃自制杵膏天門冬去心杵膏麥門冬去心杵膏玄參各三兩甘草甜硝各一兩青黛一兩五錢上為末煉蜜丸如芡實大每服一丸白滾湯化下甜硝即朴硝以滾湯制過者便是按前症服此而痰喘發搐者皆中氣受傷而變虛熱也急服五味異功散若手足並冷者中氣虛寒也前湯加薑桂多有生者犀角消毒丸治積熱及痘疹後餘毒生瘡生地黃防風當歸犀角屑鎊荊芥穗各一兩牛蒡子杵炒赤芍藥連翹桔梗各七錢薄荷黃芩甘草各五錢上為末煉蜜丸如芡實大每服一丸薄荷湯化下按前二方善損中氣傷陰血若大人形病俱實脾胃健旺者庶可用之恐芽兒臟腑脆嫩不能勝此經云氣主噓之血主濡之氣者胃中衝和之元氣若胃氣一傷不能噓濡消散膿已成者不能腐潰膿已潰者不能生肌收斂因而難治甚致不起不可不慎也八味茯苓補心湯治心氣不足血氣不和而患瘡症愚制茯苓五分酸棗仁炒各二錢五味子炒當歸各一錢人參一錢五分白朮炒一錢菖蒲五分遠志去心六分甘草炒五分上作二三服水煎柴胡梔子散方見脅癰托裡散方見熱毒熱毒瘡瘍熱毒瘡瘍因食膏粱厚味或乳母七情鬱火所致若腫骨作痛氣血凝滯也用仙方活命飲口渴便祕熱毒內蘊也用四順清涼飲佐以如聖餅腫硬色赤熱毒凝聚也用活命飲佐以隔蒜灸腫焮不消欲作膿也用托裡消毒散不成膿或成膿不潰氣血虛也用八珍湯潰而肉赤不斂脾血虛也用四物參術肉白而不斂脾氣弱也用四君芎歸食少體倦而不斂脾氣虛也用六君當歸升麻凡藥對症無有不愈設或妄行攻毒元氣虧損則變惡症而難治矣大抵瘡瘍屬腑者易治元氣無虧者不治自愈屬臟者難治元氣虧損者則變為惡症誤行克伐元氣虧損尤難療理故切不可用峻厲之劑觀東垣丹溪云但見腫痛參之脈症虛弱便與滋補血氣無虧可保終吉若用驅逐敗毒不免有虛虛之禍矣一小兒患之腫焮敷服敗毒之藥腫益甚更作嘔視其寅關脈青赤此肝經風熱之毒中氣復傷而然也用五味異功散加柴胡升麻再用補中益氣湯加白芷桔梗而愈一女子十歲余耳下連項赤腫寒熱頭痛恪敷鐵箍散此少陽膽經火症內作非鐵箍散所能愈余用梔子清肝散而愈一小兒所患同前右關脈數按之則弦作嘔懶食此肝木克脾土所致用小柴胡湯去黃芩加茯苓芍藥而愈一小兒患之余謂稟肝脾氣滯不信用鐵箍散犀角丸而嘔吐少食手足並冷此脾胃復傷也子用五味異功散加木香母用加味逍遙散加味歸脾湯而消一小兒缺盆患之內外敷服敗毒之藥發熱腫痛按之則軟此膿內潰也喜其右腮白左腮黃乃脾胃相生其病易愈遂針出膿用托裡散而愈一小兒頭面患之服清胃之藥腫痛益甚余謂毒氣熾盛而瘀血不散也用仙方活命飲二劑而愈後因傷食朝寒暮熱頭面仍患之服降火之劑口舌赤腫手足並冷余謂胃氣復傷而虛寒也用五味異功散而愈一小兒頭患癤甚多寒熱作痛時季夏乃形病俱實先用人參敗毒散加黃連香薷一劑其痛頓止次用仙方活命飲末三服大者出膿小者自消後食厚味復發用清胃散活命飲各一服而愈一小兒素食炙煿不時患之此膏粱積熱所致用清胃瀉黃二散將愈又停食服巴豆之藥口舌赤爛頭面生瘡此胃氣復傷而內熱也用人參安胃散而愈一小兒不時患之兼頰側結核此肝疳之症先用龍膽瀉肝湯二劑以治肝火又用四味肥兒丸五味異功散加升麻柴胡消疳健脾而愈一小兒素有肝脾之症患癤甚多用仙方活命飲二劑腫痛頓退又用四味肥兒丸五味異功散加柴胡升麻而愈其時同患此症用犀角丸化毒丹傷其脾胃者俱致不起一小兒頭面患之腫痛焮作屬胃經熱毒先用仙方活命飲末次用清胃散而痊後口舌生瘡別搽末藥腹痛重墜作嘔不食手足指冷余謂脾胃虛寒用異功散加升麻而痊一小兒十二歲胸前患此腫焮作痛外敷鐵箍散內服犀角丸腹中寒痛驗之膿已成先用五味異功散再用托裡消毒散膿自出卻用托裡散而愈一小兒臂患毒漫腫微痛敷鐵箍散時欲嘔吐胸腹痞滿手足並冷此脾氣虛寒也症屬半陰半陽鐵箍散乃純陽之藥非其所宜遂敷沖和膏服六君乾薑而消蓋小兒元氣易實易虛用寒藥敷貼逼毒入臟而不能救者多矣仙方活命飲金銀花陳皮各三錢皂角刺炒穿山甲蛤粉同炒防風沒藥白芷乳香當歸各一錢貝母天花粉甘草節各七分上每服五錢酒煎服嬰兒每服一兩子母同服為末酒調服亦可毒在表者加麻黃散下毒在內者加大黃下之當臨症制宜此解毒回生起死之良劑托裡消毒散治胃經虛弱或因克伐致瘡不能潰散瘡未成即消已成即潰腐肉自去新肉自生人參黃耆當歸酒拌川芎芍藥炒白朮炒茯苓各一錢金銀花白芷甘草炙連翹各五分上作二劑水煎徐徐服托裡散治瘡瘍因氣血虛不能起發腐潰收斂及惡寒發熱宜用此補托之人參氣虛倍用黃耆炒當歸血虛倍用白朮倍用茯苓芍藥酒炒各五分熟地黃二錢生者自制上作二三劑水煎服替針丸治瘡疽膿已成不潰者陳壞米一錢硇砂五錢雄雀糞四十九粒直細者是也上為末米粥丸麥粒大每用一粒黏瘡頭上以膏藥貼之半晌其膿自出若瘡頭透而膿不出或出而愈痛或發熱血氣虛也用托裡散或作嘔吐痰食少體倦脾氣虛也用六君子湯五福化毒丹治熱毒蘊積赤咽乾口舌生瘡或頭面瘡癤譫語不寧方見胎毒瘡瘍按前方生血涼血解毒寒中之劑形病俱實者殊有良驗但一二丸即止不可過多則反傷元氣變症不可勝言也天烏散天南星赤小豆草烏黃柏各等分上為末薑汁米醋調貼患處四物湯治發熱煩躁或日晡熱若因脾虛不能生血者則用六君子湯之類忌用前藥方見腋癰四君子湯治腸胃虛熱唇口生瘡或瘡不消不潰不斂或食少作嘔大便不實若因肝木乘脾土而致者宜加軟柴胡炒黃芍藥方見腹癰六君子湯治脾胃虛弱飲食少思或大便不調肢體消瘦面色痿黃即四君子湯加陳皮半夏八珍湯治氣血俱虛成者不能潰潰者不能斂或惡寒發熱或晡熱作渴飲食少思者即用四君四物二湯合用如聖餅治氣虛瘡瘍硬腫不能消散若大人發背等症肉死不知痛加蟾酥方見流注四順清涼飲四君子湯二方見腹癰加味歸脾湯小柴胡湯梔子清肝散三方見脅癰托裡沖和湯方見敷涼藥五味異功散方見敗毒之藥加味逍遙散方見發熱不止人參敗毒散方見發癍四味肥兒丸方見貼骨癰隔蒜灸法方見流注清胃散方見熱毒口瘡補中益氣湯方見肌肉不生胎毒瘰癧胎毒瘰癧者乃稟肝膽二經鬱火氣滯所致蓋肝膽經行人身之側若因肝火動而受患故發於肝膽二經部分當審其因而藥之或因乳母恚怒或血虛內熱者當審其所因而調其母不可用峻厲之藥恐傷元氣也一小兒落草頸間有癧五枚審其母素多怒時常寒熱或乳間作痛或脅肋微腫悉屬肝膽經症先用小柴胡湯加當歸芍藥寒熱頓透又用加味逍遙散母服兩月餘其兒亦愈一小兒因乳母肝經有熱耳前後患之用加味逍遙散治其母其兒自愈一小兒頸間耳下各結核三歲久服消毒之劑患處益甚元氣益虛診乳母素鬱怒致肝脾血虛而有熱用加味歸脾湯為主佐以加味逍遙散母熱漸退卻與兒日各數匙兩月餘而愈一小兒自落草時頸間患有四枚至五歲耳前後如貫珠元氣虛甚寒熱往來飲乳不徹此稟肝膽經氣滯之症用八珍逍遙二散與壯年婦人服之兒飲其乳半載之後兒體漸充其核漸消又服地黃丸逍遙散而全愈一小兒頸間結核或發寒熱左頰青額間赤此稟肝心二經之症用加味逍遙散加漏蘆與母服兒日服半蛤許兩月餘核漸消後因母怒發熱兒病仍作先用加味小柴胡湯加漏蘆又用加味逍遙散加漏蘆與母服兩月餘母子俱安一小兒頸間前後各有一核色如故至周歲母有怒氣各核變赤用加味逍遙散加漏蘆五分十餘劑將愈後因母大怒寒熱往來四肢瘈瘲其子亦然又用加味逍遙散加漏蘆鉤藤鉤母子並服而安一小兒生下頸間瘰癧三枚將期敷藥延及耳前余謂此稟肝膽二經所致診其母肝膽脈尚洪數余謂母子一體治其母兒自愈不信另用必效散一服吐瀉並至一夕而歿小柴胡湯加味歸脾湯二方見脅癰加味逍遙散方見發熱不止六味地黃丸方見作渴不止熱毒瘰癧熱毒瘰癧乃手足少陽足厥陰二經風熱之症或肝疳食積所致其症發於項腋或耳前後或如貫珠當分表裡虛實若焮赤腫者肝經熱毒也用人參敗毒散作痛寒熱者肝火內作也用加味小柴胡湯不痛而小便黃肝血虛也用六味地黃丸隱於肉裡而色不變者肝疳內作也用九味蘆薈丸膿成而不潰或潰而不斂者脾氣虛弱也用益氣養榮湯凡此腫焮疼痛寒熱作渴者屬病氣有餘形氣不足治宜清肝火生肝血腫硬不潰潰而不斂者屬病氣形氣俱虛治宜補腎水實脾土若因乳母恚怒肝火遺患者又當隨所因而治之一小兒膿水淋漓其核未消發熱憎寒此肝經氣血虛而有熱也用補陰八珍湯為主間以清肝益榮湯而愈後復核結小便赤澀晡熱作渴用參朮柴苓湯為主佐以六味地黃丸料加柴胡山梔及四味肥兒丸而斂一小兒十五歲患此發熱作渴日晡頰赤脈數無力屬陰虛而有熱用補陰八珍湯五十劑加參耆又二十劑而潰但膿水清稀肌肉不生此脾氣虛弱也以參耆歸術為主佐以芍藥熟地麥門五味氣血乃復遂進必效散一服毒下而痊一小兒十三歲久不愈寒熱兼作飲食少思此肝火熾而脾胃虛也用益脾清肝散佐以九味蘆薈丸而愈至十六歲陰莖忽痿服溫補之藥莖竅出臭津舊痕腫痛余用清肝火之藥而愈一小兒十五歲患此恪用攻痰前症益甚虛症悉至仍議前法余曰小便頻數肝經陰虛也兩目連札肝經風熱也作嘔懶食胃氣虛弱也泄瀉後重脾氣虛陷也遂用補中益氣湯六味地黃丸漸愈又用九味蘆薈丸而消一小兒項間及四肢結核久潰不斂形體骨立大便不調小便頻數此肝脾疳症用九味蘆薈丸補中益氣湯而愈一小兒十四歲患此膿水清稀肌體骨立晡熱盜汗口乾咳痰此腎水不能生肝木也用六味地黃丸補中益氣湯三月餘元氣漸復佐以四味肥兒丸而愈畢姻後唾痰體倦發熱作渴此脾肺虛不能生腎水水泛而為痰用地黃丸補中益氣湯而痊一小兒患此服克治之藥致寒熱腹膨此肝脾疳症先用五味異功散加柴胡升麻佐以九味蘆薈丸漸退又用四味肥兒丸五味異功散而消一小兒患此服化痰散堅之藥面色赤白少陽三焦部分見青筋又目札出淚此肝膽風熱所致脾土虛而肝木所侮也先用補中益氣湯柴胡清肝散加蕪荑核漸消佐以五味異功散加蕪荑而愈一小兒九歲患此面色常青腫硬不潰肉色不變乃伐肝化痰余曰常調補肝脾不信果虛症蜂起復請治仍欲伐肝余曰面帶青色肝虛而本色見也面色變白肺虛而本色見也痰涎上湧脾虛而不能攝也兩目連札肝血虛而生風也經云胃為五臟之本當先救胃氣遂用五味異功散加升麻柴胡元氣稍復乃朝用補中益氣湯夕用五味異功散佐以九味蘆薈丸面色始黃而核漸消又以四味肥兒丸間服地黃丸而愈一小兒五歲患此小便白色此肝脾疳症用九味蘆薈丸四味肥兒丸而消因食橙橘二便俱白拗間結核亦用前丸而愈後目連札頸間耳後結核用柴胡清肝散蘆薈丸而愈張閣老侄孫患此久服化痰削堅之劑夜熱吐痰時季夏脈大按之而澀余曰夏月肝症而見肺脈至金旺之時其病必進矣至八月疾甚果不治一女子十四歲耳下患此服化痰泄氣藥前症益甚諸症竝臻余曰此肝膽經虛火之症也前藥乃泛擾諸經無臟不傷者不悟仍服之更四肢發搐目閉口噤余曰此肺經虛肝木動而脾土復傷也當補脾土滋肺金養腎水亦不信後果歿一小兒四歲患此泛服軟堅伐肝之劑益甚余曰此稟肝經之虛羸兼乳母鬱怒所致當調補乳母肝脾滋子之腎水不悟仍用前藥以致不起四味肥兒丸治食積脾疳面耳口舌生瘡目障雲翳牙齒腐爛等症方見貼骨癰柴芍參苓飲治肝火血熱遍身搔癢或起赤暈或筋攣結核柴胡芍藥人參白朮茯苓陳皮當歸各五分牡丹皮山梔炒甘草炒各三分上薑棗水煎服神功散治瘡瘍初起腫焮者用之可消加血竭更好丹毒未砭者亦可用之黃柏炒草烏生用上各另為末等分用漱口水調敷常漱口水潤之清肝益榮湯治肝膽經風熱血燥筋攣結核或作瘊子柴胡山梔炒各五分龍膽草酒拌炒黑五分當歸川芎芍藥各一錢熟地黃自制白朮炒木瓜不犯鐵器茯苓薏苡仁各五分甘草三分上水煎服加味小柴胡湯山梔牡丹皮治肝膽經風熱耳前後腫痛或結核焮痛或寒熱晡熱口苦耳聾等症前方去山梔丹皮即小柴胡湯柴胡二錢黃芩炒二錢人參半夏各七分甘草炙五分山梔牡丹皮各一錢上姜水煎徐徐服九味蘆薈丸治肝脾疳熱患瘰癧結硬或三焦目生雲翳耳內生瘡或肢體消瘦熱渴少食或肚腹不調牙齦蝕頰腐爛下部生瘡等症方見喉痹必效散治瘰癧元氣無虧者宜用此方若元氣怯弱者宜先補而後服之癧毒已下便與滋補庶無他患若孕婦及虛勞氣鬱所致者尤不可服世以此方為良劑故並注之南硼砂二錢五分輕粉一錢麝香五分巴豆五粒去皮心膜白檳榔一個斑蝥四十個去頭足翅用糯米炒上為末取雞子二個去黃用清調藥入殼內以濕紙數重糊口甑蒸熟取出曝乾研末每服五分用炒生薑酒五更調服如毒出小便澀痛用益元散一服其毒出而不痛益氣養榮湯方見鶴膝風梔子清肝散方見脅癰補陰八珍湯即八珍湯加黃柏知母益脾清肝散方見黃水瘡驚風結核驚風結核屬肝膽二經風木相火用事木旺生風熱同化其病抽掣擾動此乃風熱血燥而然耳蓋風動則肝火盛火盛則肝血內消血不能養筋故筋攣結核如貫珠然頸項兩側正屬肝膽經部分治宜滋腎水清肝火養陰血壯脾土蓋腎水旺則肝火自清肝火清則陰血自生陰血生則相火自寧火既寧則無熱傷元氣火乘土位之疾矣一小兒因驚項間結核目札唇動搖頭抽搐此風木凌於脾土也用皂角子丸補中益氣湯漸愈又用九味蘆薈丸而痊一小兒甫周歲項間結核兩臂反張索敗毒之藥余意此屬肝經血燥詢之果前患驚風曾服硃砂等藥遂與六味地黃丸滋其肝血數服而愈一小兒項側結核痰盛發搐服金石香燥之劑手足筋攣此肝血復傷即急驚也遂用加味小柴胡湯加鉤藤鉤山梔芎歸六味丸料加五味麥門而痊一小兒每受驚項間結核發熱減食睡間四肢微搐此肝木侮脾土也用五味異功散加柴胡升麻鉤藤鉤隨愈畢姻後腿臂腕間結核誤服行氣破血藥腿臂筋攣肌體消瘦如瘵症余考績到京用地黃丸生肝腎之血佐以補中益氣湯補脾肺之氣而愈一小兒耳前後結核遇驚即痰盛咬牙抽搐搖頭恪服香燥之藥以致慢驚而卒皂角子丸治肝膽經風熱項脅兩側結核皂角子仁炒二兩連翹八錢當歸柴胡芍藥炒山梔炒川芎各一兩桔梗炒龍膽草酒拌炒黑甘草炒各四錢上為末米糊丸緑豆大量兒大小滾湯下人參敗毒散治小兒風熱瘙癢頑核毒瘡或解脫衣裳風邪所傷惡風發熱胸膈生涎頭目不清方見發癍九味柴胡湯治肝經熱毒下注患便毒腫痛或小腹脅間結核凡肝膽經部分一切瘡瘍或風毒惡核瘰癧柴胡五分黃芩炒五分人參山梔炒半夏龍膽草炒當歸芍藥炒各三分甘草二分上水煎服若腫痛色赤元氣無虧者宜用潰後腫消痛止者不宜用大凡腫硬不潰或潰後不愈因元氣虛也午前宜用四君歸耆升麻午後宜用四君芎歸柴胡為主佐以九味蘆薈丸若飲食少思者宜用五味異功散專補胃氣若膿水清稀而見一切諸症皆因血氣內虧但溫補脾胃飲食加進血氣化生諸症自退設治瘡邪是虛其虛也禍不旋踵矣琥珀膏治瘰癧不潰或潰而不愈變成漏症琥珀木通桂心當歸白芷防風松香硃砂丁香木香木鱉子各二兩上先用琥珀丁香桂心硃砂木香為末其餘㕮咀以麻油二斤六兩慢火煎至白芷焦黑濾去渣徐下黃丹一斤以柳枝不住手攪至黑色滴水捻軟硬得中卻入琥珀等末攪勻干瓷器盛之用時取少許攤貼益脾清肝散治肝火侮脾飲食少思發熱或寒熱往來瘡不能消散方見黃水瘡補陰八珍湯治元氣虛弱不能潰斂或內熱晡熱肌體消瘦即八珍湯加酒炒黑黃柏知母五味異功散方見敗毒之藥胎毒瘡疥胎毒瘡疥因稟胎熱或娠母飲食之毒七情之火初如干癬後則膿水淋漓或結靨成片如發於兩耳眉或耳前後髮際之間屬手少陽經若發於四肢屬脾胃經發於兩脅屬肝經發於額屬心經發於腦屬膀胱經發於頦頰屬腎經當隨各經所主五臟勝負及乳母食啖厚味鬱怒所傳致而調治之不可徹用化毒犀角等丸設元氣復傷傳變他症尤為難療一小兒遍身患之服牛黃解毒丸皆愈惟頭結痂作癢出水此稟腎經虛熱用地黃丸解毒散而愈一小兒患於髮際之間作癢診其母有肝火用加味逍遙散加漏蘆用牛黃解毒丸解毒散而愈解毒散一名托毒散一小兒患於左耳髮際漸延上頭作癢此稟肝膽二經熱毒用柴胡清肝散母子竝服而愈後不戒膏粱復發膿水淋漓右頰赤色此胃經有熱先用清胃散仍用柴胡清肝散治肝火母子俱服又用立效散牛黃解毒丸而愈一小兒兩眉患之延及遍身四肢為患膿水淋漓寒熱往來屬肝脾積熱用清胃散小柴胡湯立效散而愈後眉間復患兩目連札小便白濁用四味肥兒丸九味蘆薈丸而愈一小兒因乳母不戒七情厚味患此久不愈母用清胃逍遙二散子用牛黃解毒丸愈後兒食甘味眉間生瘡痛癢目札用四味肥兒丸為主佐以加味逍遙散清胃散而愈一小兒遍身患之兩脅為甚子用四味肥兒丸立效散母用柴胡梔子散加味逍遙散而愈牛黃解毒丸治胎毒瘡癤及一切瘡瘍牛黃三錢甘草金銀花一兩草紫河車五錢上為末煉蜜丸量兒服立效散治鬢瘡耳瘡及一切瘡疥定粉末松香末黃柏末黃連末枯礬末各一兩上各另為末用清油燭油調搽敷藥解毒散治一切毒瘡風疹癢痛大黃黃柏山梔寒水石各等分上為末水調搽若破而膿水淋漓用當歸膏或清燭油調尤善柴胡梔子散即梔子清肝散方見脅癰四味肥兒丸方見熱毒瘰癧九味蘆薈丸方見諸疳口瘡金黃散方見天泡瘡熱毒瘡疥熱毒瘡疥因乳哺過早或嗜甘肥臟腑積熱或母食膏粱厚味或七情內火所致當分臟腑所屬之因病之虛實調其血氣平其所勝如肝經實熱用柴胡清肝散虛熱用六味地黃丸心經實熱用導赤散虛熱用補心湯脾經實熱用瀉黃散虛熱用補中湯肺經實熱用瀉白散虛熱用五味異功散腎經熱用六味地黃丸大凡手足冷者屬虛寒手足熱者屬實熱脈沉數有力作渴飲冷大便乾實此邪在裡宜內疏若脈浮數有力作渴飲冷此邪在表宜發散若脈浮大按舉無力或作渴飲湯乳食少思此真氣虛而發熱也調理脾胃其病自愈切不可用寒冷之劑復損真氣嬰兒宜調治乳母為主一小兒脅間患此寒熱如瘧小便頻數此稟肝火所致先用柴胡清肝散又用加味逍遙散而愈後因乳母肝火動而復發用加味逍遙散及八珍湯加丹皮山梔母子服之並愈一小兒腹間患此發熱便血面黃少食或作嘔或作瀉手足時冷右關脈弦數此脾土虛弱肝火為患先用五味異功散加升麻柴胡山梔益脾氣清肝火後用地黃丸滋腎水生肝血而愈一小兒腿內股患此色赤不愈發熱面色或赤或青此稟腎陰不足而水火熾盛先用柴胡梔子散以清肝心後用地黃丸以補肝腎而愈一小兒肘間患此作渴飲冷右寸關脈數而無力此胃經積熱傳於肺經也先用瀉黃瀉白二散漸愈後用五味異功散四味肥兒丸而愈一小兒嗜膏粱甘味先患背胛後沿遍身淋漓此飲食之熱而傷脾血也先用清胃瀉黃二散而愈但形氣怯弱用五味異功散而元氣復柴胡清肝散方見脅癰五味異功散方見用敗毒之藥導赤散瀉白散二方見臂癰瀉黃散方見頭面瘡諸疳瘡疥諸疳瘡疥因脾胃虧損內亡津液虛火妄動或乳母六淫七情飲食起居失宜致兒為患當分其因審其經而平之如面青寒熱或白翳遮睛肝經之症也面赤身熱或作渴驚悸心經之症也面黃體瘦或作渴泄瀉脾經之症也面白咳嗽或鼻中生瘡肺金之症也面黧體瘦或喜臥濕地腎經之症也嬰兒宜調治乳母若不審五臟勝負形病虛實妄行敗毒多致不救一小兒患此小便頻數左頰青色或時目札此肝脾之症也先用五味異功散加當歸升麻柴胡調補脾氣又用九味蘆薈丸清理肝火末用地黃丸滋腎水生肝木而疥愈後復發不經意兼兩目生翳小便頻數大便泄瀉此肝邪侮脾而作也用四味肥兒丸五味異功散加蕪荑脾氣健而肝病愈一小兒患此面黃作渴大便酸臭腹脹青筋此肝脾之症用五味異功散為主佐以四味肥兒丸而愈一小兒患此面赤作渴心脈洪大此心經之症內用柴胡梔子散外用六仙散而愈後驚悸發熱疥焮作痛先用導赤散二服又用柴胡梔子散與子服母服逍遙散而愈一小兒患此大便酸臭肚腹膨脹手足時冷此脾經之症用五味異功散四味肥兒丸漸愈後因母食炙煿仍發母服清胃散黃連瀉心湯子服一味甘草而愈一小兒嗜甘肥之物患之或癢或痛咳嗽飲冷此脾胃積熱傳於肺經先用清胃散以治胃熱少用瀉白散以清肺火漸愈出痘後仍患之口乾飲湯用五味異功散兼大楓膏而愈一小兒年十五遍身患此腿足為甚發熱飲冷兩尺脈數洪按之無力此稟腎虛所致用六味地黃丸而愈後用心力學復發尤甚兼盜汗遺精用地黃丸為主佐以補中益氣湯八珍湯而痊一小兒患此發熱飲冷痰涎上湧此稟腎虛用地黃丸料煎服月餘漸愈又佐以八珍湯而愈次年畢姻後發熱唾痰盜汗咳血仍用前藥而愈敷藥大楓子膏治瘡疥真輕粉一兩枯礬一兩黃連二兩大楓子膏二兩研膏蛇床子二兩柏油六兩上各另入大楓膏和勻更入柏油杵百餘即成膏矣每用少許塗患處敷藥六仙散治諸疳瘡疥苦參獨活大楓子去殼油蛇床子各一兩枯礬五錢上為細末柏油調敷五味異功散方見用敗毒之藥清胃散方見熱毒口瘡諸疳口瘡諸疳口瘡因乳哺失節或母食膏粱積熱或乳母七情鬱火所致其症口舌齒齦如生瘡狀若發熱作渴飲冷額間色赤左寸脈洪數者此屬心經先用導赤散清心火次用地黃丸滋腎水若寒熱作渴左頰青赤左關脈弦洪者屬肝經先用柴胡梔子散清肝火次用六味地黃丸生肝血若兩腮黃赤牙齦腐爛大便酸臭右關脈洪數按之則緩者屬脾經用四味肥兒丸治脾火以五味異功散補脾氣若發熱咳嗽右腮色赤右寸脈洪數按之澀者屬肺經先用清肺飲治肺火用五味異功散補脾胃若發熱作渴兩額黧色左尺脈數者屬腎經不足先用六味地黃丸以生腎水次用補中益氣湯以生肺氣又有走馬疳者因病後脾胃氣血傷損虛火上炎或痘疹餘毒上攻其患甚速急用銅碌散大蕪荑湯輕則牙齦腐爛唇吻腮腫重則牙齦蝕露頰腮透爛若飲食不入喘促痰甚此脾胃虛而肺氣敗也頰腮赤腐不知痛者此胃氣虛甚而肉死也竝不治一小兒口瘡嘔血便血兩腮微腫唇白麵青此脾土虧損木所乘也朝用補中益氣湯食遠用異功散而愈一小兒右腮鼻準微赤此脾肺二經虛熱用四君升麻及白朮散而愈一小兒口瘡久不愈診其母右關脈弦緩乃木剋土之症先用六君柴胡又用加味逍遙散治其母子自愈一小兒齒齦蝕爛年餘不愈用大蕪荑湯治其疳邪五味異功散健其脾氣尋愈後復作兼項間結核另服敗毒藥口舌生瘡余用四味肥兒丸而愈一小兒患口瘡寒熱嗜臥作瀉引飲此脾疳氣虛發熱而津液不足也先用白朮散以生胃氣再用四味肥兒丸治以疳症兩月餘又用異功散而安一小兒口瘡身熱如炙肚腹脹大此脾疳內作朝用五味異功散夕用四味肥兒丸稍愈又以地黃蝦蟆二丸兼服而愈一小兒齒齦腐爛頭面生瘡體瘦發熱此脾疳所致先用大蘆薈丸又用四味肥兒丸大楓膏而愈東垣大蕪荑湯一名梔子茯苓湯治黃疳土色為濕為熱當利小便今反利知黃色中為燥胃經熱也發黃脫落知膀胱腎俱受土邪乃大濕熱之症鼻下斷作瘡上逆行營氣伏火也能乳胃中有熱也寒則食不入喜食土胃不足也面黑色為寒為痹大便清寒也褐色熱蓄血中間黃色腸胃有熱治當滋榮潤燥外致津液山梔仁三分黃柏甘草炙各二分大蕪荑五分黃連麻黃根各一分羌活二分柴胡三分防風一分白朮茯苓各五分當歸四分上水煎服葛花解醒湯治乳母酒醉後乳兒遺熱為患白豆蔻砂仁葛花各五錢乾生薑白朮澤瀉神麯炒黃各二錢白茯苓陳皮人參豬苓木香青皮三分上為末每服二錢白湯調服愚按前湯先哲不得已而用之蓋醉酒耗氣又服辛散重損真陰折人長命可不慎哉大蘆薈丸治疳殺蟲和胃止瀉胡黃連黃連白蕪荑去扇蘆薈木香青皮白雷丸破開赤者不用鶴蝨微炒各半兩麝香二錢另研上為末粟米飯丸緑豆大每服一二十丸米飲下蝦蟆丸治無辜疳症一服虛熱退二服煩渴止三服渴痢住蟾蜍一枚夏月溝渠中腹大不跳不鳴身多癩𤸔者上取糞蛆一杓置桶中以尿浸之桶上要干不令蟲走出卻將蟾蜍撲死投蛆中食一晝夜以布袋盛置浸急水中一宿取出瓦上焙為末入麝一字粳米飯揉丸麻子大每服二十丸米飲下六味肥兒丸消疳化蟲退熱若脾疳飲食少思肌肉消瘦肚大頸細發稀成穗項間結核發熱作渴精神怠倦大便酸臭嗜食泥土或口鼻頭瘡肚腹青筋齧下痢便白宜用此丸即四味肥兒丸加乾蟾一兩蕪荑五錢四味肥兒丸方見熱毒瘰癧地黃丸方見作渴不止熱毒口瘡經云手少陰之經通於舌足太陰之經通於口因心脾二經有熱則口舌生瘡也當察面圖部位分經絡虛實而藥之若元氣無虧暴病口生白屑或重舌者用亂髮纏指醮井水揩之或刺出毒血敷以柳花散敷之上以腫脹或有泡者竝令刺破敷前散或以青黛搽之刺後又生又刺若唇吻熱烈者用當歸膏調柳花散敷之若元氣虧損或服寒涼之藥或兼作嘔少食者此虛熱也用五味異功散加升麻柴胡若泄瀉作渴者脾胃虛弱也用七味白朮散若腹痛惡寒者脾胃虛寒也用六君薑桂若因母食酒面煎煿者用清胃散若因母飲食勞役者用補中益氣湯肝脾血氣者用加味逍遙散鬱怒內熱者用加味歸脾湯子母竝服若泥用降火必變慢脾風矣仍參吐舌弄舌治之凡針重舌以線針直刺不可橫挑恐傷舌絡致言語不清也一小兒口舌生瘡手熱飲冷屬胃經實熱用柳花散加味解毒散而愈後因傷食吐血不時弄舌屬脾經虛熱用四君子湯而痊一小兒口舌生瘡延及頭面胸背膿水淋漓此胎毒也內用牛黃解毒丸外以當歸膏調黃柏末塗之而愈一小兒發熱飲冷口患瘡額鼻黃赤吐舌流涎余用導赤瀉黃二散而愈後復作自服清熱化毒之藥益甚更加弄舌余用五味異功散加鉤藤鉤及六君子湯而愈蓋吐舌為脾之實熱也弄舌為脾之虛熱也治者審之一小兒患前症久不愈恪服清涼之劑痰喘不已口開流涎手足竝冷又欲治痰余謂經云脾主涎肺主氣此因脾土虛寒不能生肺金而然非痰火為患也先用溫中丸二服痰喘頓止又用五味異功散而痊一小兒口內生瘡用寒涼之劑更發熱飲湯不絶此中氣虛寒隔陽於外非實熱也用補中益氣湯加炮姜一劑而愈陳湖陸欽若子患前症敷服寒劑手足竝冷口唇時動余曰此中氣虛寒而變慢脾風也後果歿東垣清胃散治胃經有熱牙齒作痛或飲冷作渴口舌生瘡或唇口腫痛焮連頭面或重舌馬牙吐舌流涎若因服克伐之劑脾胃虛熱口舌生瘡或弄舌流涎或嘔吐困睡大便不實者用五味異功散升麻五分生地黃四分黃連牡丹皮各三分當歸稍四分上水煎服嬰兒母亦服清熱消毒散治實熱口舌生瘡及一切瘡瘍腫痛形病俱實者黃連炒山梔炒連翹當歸各五分川芎芍藥炒生地黃各六分金銀花一錢甘草二分上水煎服嬰兒母同服四君子湯治脾氣虛熱口舌生瘡或但胃氣復傷飲食少思或食而難化若作嘔泄瀉尤宜用之如兼痰嗽氣逆肢體倦怠面目浮腫宜用六君子湯六君子湯治脾胃氣虛吐瀉不食肌肉消瘦或肺虛痰嗽喘促惡寒或驚搐口直口噤諸症二方見腹癰五味異功散治脾胃虛熱口舌生瘡或因誤服克伐之劑脾胃復傷而口舌生瘡或弄舌流涎吐瀉不止飲食少思或驚搐痰嗽睡而露睛手足竝冷若母有病致兒患者子母並服方見用敗毒之劑人參理中湯人參白朮炒乾薑泡甘草炙各等分上每服一二錢水煎蜜丸即人參理中丸加附子即人參理中湯四物湯治瘡瘍血虛發熱煩躁或晡熱作渴頭目不清若因脾虛不能生血者用四君子湯方見腹癰柳葉散治熱毒口瘡黃柏炒蒲黃青黛真正者人中白煅各等分上為末敷之加味解毒散牛黃解毒丸二方見胎毒瘡疥
