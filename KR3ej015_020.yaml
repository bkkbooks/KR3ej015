body:
  text: 卷二十痘小便不利痘疹方云痘疹未出之先熱盛恐欲起驚小便不利導赤散微解之熱入膀胱如有血淋犀角湯初出不快小便赤色生聖散已出未愈之間白朮散或五苓散加木通收靨之後小便不利煩熱而渴豬苓湯竊謂前症當分所因若小腸熱結用導赤散肝經熱用柴胡麥門冬湯脾經熱用犀角湯肺經熱用生地黃湯腎經熱地黃丸靨後氣血虛弱用八珍湯中氣虛弱用五味異功散一小兒小便不利口舌生瘡乾渴用導赤散加味四物湯而膿貫又用白朮散去木香治之而愈一小兒小便不通口舌如靡作渴面赤左尺脈數此膀胱熱結先用五淋散而小便利又用地黃清肺飲參耆四聖散而愈一小兒小便數而欠利面赤口渴兩足發熱此稟陰虛也地黃滋腎二丸煎服用四劑而愈又用地黃丸料加黃耆當歸而痊愈一小兒痘將愈小便不利服五苓散之類小便愈少喘咳唾痰此脾肺復傷也先用補中益氣湯二劑送滋腎丸卻用補中益氣五味異功二藥而痊八正散治下焦積熱大小便不通或小便淋澀脈症俱實者大黃酒炒車前子炒瞿麥萹蓄山梔炒木通各一錢甘草一錢滑石煨二錢上每服二錢水煎滋腎丸黃柏炒黑知母炒黑各二兩肉桂二錢上為末水糊丸益元散治痘疹初起煩躁作渴小便不通滑石六錢甘草一錢每服五六分白湯調下導赤散治小腸實熱生瘡作渴發熱小便祕赤或小便不利者方見作癢搔破柴苓湯治疹瀉小便不利方見癍症五苓散茯苓豬苓白朮澤瀉各等分肉桂減半上為末每服四分白湯調下黃芩清肺飲黃芩炒山梔炒等分上每服二錢水煎生地黃湯生地黃五錢杏仁去皮尖二錢麥門冬七錢款冬花陳皮各三錢甘草二錢五分上每服二三錢水煎紫草木通湯治痘疹不快小便不利紫草人參木通茯苓糯米各等分甘草減半柴胡麥門冬散方見作癢抓破犀角湯方見頂陷心煩生聖散方見痘瘡出遲加味四物湯方見痘入目白朮散即七味白朮散六味地黃丸二方見發熱屬陰陽痘便血或黑屎聞人氏云痘瘡大便下血或黑糞若睡而不醒是為惡候乃內熱盛也用犀角地黃湯抱龍丸小柴胡湯加生地黃主之竊謂前症若寒熱作渴小柴胡加生地黃發熱體倦用五味異功散加當歸口乾作渴用人參白朮散大凡作渴引飲發熱者屬實熱作渴飲湯手足不熱者屬虛熱手足逆冷者屬虛寒治者審之一小兒出痘便血痘赤痛如錐或瘡內出血余謂肝火熾盛用小柴胡湯加生地黃一劑隨用犀角地黃湯一劑而痊一小兒痘瘡下血且不起發先君謂氣血不足用紫草快癍湯加參耆歸術血頓止瘡頓起用八珍湯而愈一小兒痘瘡下血小便赤色瘡色如赭發熱飲冷二便不利先君謂心小腸實熱用八正散後用解毒防風湯及飲芹菜汁而痊一小兒痘疹便血倦怠作渴飲湯余謂倦怠便血脾虛下陷也少食作渴津液枯涸也用五味異功散加紫草而愈一小兒便血腹脹困倦身熱口乾飲湯四肢逆冷先君謂脾氣虛寒不能攝血用五味異功散加丁香乾薑二劑血止痘貫而靨一小兒痘將愈而便血面白惡寒大便欲去而不去余謂此元氣虛而下陷也用益氣湯不信服涼血之劑致吐瀉腹痛而歿一小兒痘將愈患便血面白惡寒手足並冷脈沉細如無余謂陽氣虛寒欲用人參薑桂不從翌日而死手足青黑惜哉解毒防風湯治痘瘡毒氣熾盛便血防風地骨皮黃耆荊芥白芍藥炒牛蒡子各等分上每服四錢水煎或為末白湯調下紫草快癍湯治痘疹下血不能起發出不快色不紅活等症即紫草湯方見頂陷心煩聖濟犀角地黃湯治熱毒內蘊煩躁作渴面色赤大便黑屎或神昏便血方見頂陷心煩小柴胡治肝經有熱不能藏血而便血方見痘身疼五味異功散治脾胃氣虛不能統血而大便下血方見寒戰咬牙八珍湯治氣虛不能懾血而便血方見頂陷灰白八正散治心小腸有熱小便赤並大便下血方見痘小便不利七味白朮散即人參白朮散方見痘發熱痘瘡焮裂出血聞人氏云痘瘡大便不通小便如血或結癰毒身痘破裂乃內火熾盛失於解利急用犀角地黃湯小柴胡湯加生地黃四順飲之類治之竊謂前症若心脾熱盛用犀角地黃湯心肝熱盛用小柴胡湯加生地黃若大便不通先用四順飲次用犀角湯若色赤焮痛二便不通急用活命飲加硝黃若色赤焮痛惡寒發熱用活命飲加麻黃若因乳母怒火用加味逍遙散加味歸脾湯一小兒痘根赤色寒熱作痛此肝經有熱也先用加味小柴胡湯二劑諸症漸退又用加味逍遙散三劑而貫膿末用八珍湯而愈一男子痘根赤痛發熱作渴服紫草飲痘裂出血余謂心肝二經風火相搏先用小柴胡湯加生地黃犀角二劑用聖濟犀角地黃湯而愈一小兒患前症大便不利小便赤澀作渴飲冷先君謂腸胃實熱先用涼膈散一劑漸愈又用犀角地黃湯芹菜汁而痊一小兒患此診乳母有鬱火用加味逍遙散加味歸脾湯而痊同時患是痘而用雜藥者俱致不救涼膈散治上焦實熱煩渴面赤咽燥喉痛便溺赤澀狂言譫語睡臥不安大黃朴硝甘草連翹山梔黃芩薄荷葉各等分上為細末每服少許煎竹葉蜜湯調乳母同服加味清胃飲方見痘癰加味逍遙散方見痘潮熱犀角地黃湯方見頂陷心煩加味小柴胡湯即小柴胡湯加山梔地黃方見痘身疼八珍湯方見頂陷灰白聖濟歸脾湯方見痘癰痘衄血吐血痘疹方云若痘發之際正宜微見與發汗同體然血與汗雖殊其源其一蓋痘疹乃穢血所發邪結肺胃毒氣自然上越也若見此症不可妄投以藥恐治失其宜瘀蓄者不出而已出者復傷反生變症也若作渴飲冷手足並熱此毒氣熾盛而血上溢也宜用聖濟犀角地黃湯若肺經熱毒而鼻衄用地黃清肺飲胃經熱毒而吐血亦用聖濟犀角地黃湯若腸胃熱毒而便血亦用之作渴飲湯手足不熱者肝肺氣虛不能攝血而妄行也宜用五味異功散若出血作渴煩躁面赤色者血脫也宜用當歸補血湯一小兒出痘三四日大便下血日有數滴至八日不能止瘡不能起御醫錢春林謂其脾氣虛寒用木香散二劑加丁香十一粒人參五錢次日痘起有膿由是血止二十餘日而愈一小兒痘瘡紅活但不時作癢口渴便血面赤先君謂腸胃有熱用聖濟犀角地黃湯加柴胡一劑諸症漸退用四君加當歸紅花而愈一小兒痘瘡赤痛煩熱作渴或便血衄血先君用犀角地黃湯而血止又用紫草快斑湯而痛愈後瘡痕色白用四君黃耆當歸而痊一小兒衄血右寸脈數此肺金有火也用瀉白散而血止但四肢倦怠用益氣湯而愈一小兒痘痛赤色吐血發熱此胃經熱毒也先用聖濟犀角地黃湯諸症漸愈又用五味異功散而痊一小兒痘後衄吐面色黃白因脾肺氣虛弱用麥門冬散而愈後因勞衄血發熱痘痕赤色用四君歸耆而衄止用五味異功散而熱退一小兒痘後衄血發熱則痕赤熱止則痕白此脾胃氣虛也朝用補中益氣湯加乾薑夕用五味異功散加當歸而愈一小兒痘後衄血頭暈唇白噁心此中氣虛而清陽不能上升也用補中益氣湯加蔓荊子稍愈去蔓荊子又數劑而痊一小兒痘後非衄血即便血痘痕赤白靡定手指冷熱無常余謂此元氣虛而無根之火倏往忽來也朝用補中益氣湯夕用五味異功散各二十餘劑而愈後因勞心復發仍用前二藥為主佐以十全大補湯而愈瀉白散桑白皮炒甘草地骨皮上每服二三錢水煎人參竹葉湯治虛煩不得寐或兼自汗人參竹葉甘草各二錢半夏二錢五分小麥麥門冬各一錢半上每服二三錢薑二片粳米二撮水煎服八珍湯十一味木香散二方見頂陷灰白五味異功散當歸補血湯二方見寒戰咬牙紫草快癍湯方見便血屎黑十全大補湯方見腹脹氣促四君子湯即六君子湯去陳皮半夏方見不靨悶亂痘煩躁東垣云火入於心則煩入於腎則躁皆心火為之蓋火旺則金爍水虧故心腎合而為躁也宜用梔子豆豉湯凡痘瘡盛作之時必令心火有所導引苟或毒氣出而未盡遂生煩躁以生黑豆煎湯或生犀磨汁飲之亦可若津液不足虛煩不得臥者活人酸棗仁湯此症多因脾胃氣虛或服克伐之劑所致但當調補中氣為善一小兒患此飲冷不止或作脹痛余謂胃火所致用犀角地黃湯芹菜汁而頓愈一小兒煩躁作渴飲冷不止先君謂脾胃熱毒用犀角地黃湯而愈後復作喜飲熱湯面目赤色用當歸補血湯而痊惟倦怠少食用白朮散而愈一小兒貫膿之際煩躁不寧肝脾脈數用聖濟犀角地黃湯一劑稍止用八珍湯加牡丹皮而止又二劑漿漸貫卻用內托散倍用參耆歸術而靨一小兒痘將貫膿煩躁面赤脈數大而虛此氣血虛也先用參耆四聖散又用當歸補血湯而愈一小兒出痘煩躁作渴面赤口乾脈洪而大按之無力兩尺為甚此稟腎不足陰虛而火動也用大劑地黃丸料加五味子煎與恣飲諸症頓減乃佐以補中益氣湯二劑痘齊乃用參耆四聖散而靨一小兒出痘煩躁作渴飲湯面目赤色脈數無力兩尺為甚此稟足三陰虛也用益氣湯及地黃丸料加五味子大劑始末服而靨一男子出痘煩躁作渴虛症不能悉舉先君用益氣湯地黃丸料加五味子各三十餘劑更用人參五斤煎湯代茶飲兩月餘而靨又用參耆歸術各數斤半載始能步履得元氣充實且慎調攝而痊一小兒十五歲痘將愈而煩躁脈數而無力勞則益甚且無寐或驚悸余用歸脾補中二湯漸愈後因勞仍作或用四物化痰之劑前症益甚更發熱惡寒頭暈而歿一小兒痘愈後煩躁面赤脈洪大按之如無余謂血虛朝用補中湯夕用歸脾湯將愈因飲食過多功課勞心吐瀉腹痛頭暈惡寒反服藿香正氣散發熱如炙汗出如雨手足並冷而歿活人酸棗仁湯治痘疹虛煩驚悸不得眠酸棗仁炒甘草炙知母炒白茯苓麥門冬去心川芎乾薑炒各三分上水煎溫服兒大倍之梔子豆豉湯山梔四個豆豉半兩上水二盞先煮梔子一盞內豆豉煎至七分去滓溫服得快吐即止後服當歸六黃湯治血氣不足虛火內動或煩躁盜汗不止熟地黃當歸黃耆炒黃柏以下俱炒黑黃芩黃連生地黃上每服三五錢水煎八珍湯治氣血俱虛或用克伐之劑脾胃虛損肌肉消瘦發熱惡寒飲食少思等症方見頂陷灰白補中益氣湯當歸補血湯二方見寒戰咬牙六味地黃丸方見痘發熱屬陰陽聖濟犀角地黃湯方見頂陷心煩內托散即托裡散方見痘癰七味白朮散方見痘發熱屬陰陽痘腹痛婁全善先生云痘腹痛多是熱毒為患當臨症消息之又云痘出腹痛或身痛脈洪數者用解毒涼藥加芍藥甘草竊謂前症若痘未出而發熱煩躁或作渴飲冷大便堅實此熱毒壅滯也用疏利之藥若痘已出而不熱躁不飲冷大便不實此元氣虛弱也用白朮散之類補之若噯腐吞酸大便穢臭乳食停滯也用保和丸消之凡腹痛作渴飲冷手足並熱者屬實熱作渴飲湯手足並冷者屬虛寒虛寒者當溫補脾胃虛弱者當調補脾胃一小兒善食作渴腹痛便祕痘痕赤色先用加味四物湯而愈後仍痛惡食此脾胃受傷用白朮散而痊一小兒痘將靨腹脹發熱面赤午後益甚按其腹不痛余謂脾虛用五味異功散而痊一小兒出痘腹痛大便似利寒熱往來余以為脾氣虛用白朮散而痊一小兒出痘腹痛作渴飲食如常光澤紅活此胃經實熱先用瀉黃散一劑頓安又用白木散而痊一小兒痘後腹痛作渴飲冷便祕用清涼飲末五分頓安後腹痛吐瀉發搐用白朮散加鉤藤鉤而愈一小兒出痘腹痛噯腐吞酸此飲食停滯先用保和丸二服續用五味異功散而痛止又用托裡散而靨人參理中湯治脾胃虛寒胸膈痞滿或心腹疼痛痰逆嘔吐少氣或霍亂吐利手足厥冷不喜飲水加附子名附子理中湯人參白朮乾薑炮各等分甘草炒減半上每服三錢水煎或研末白湯調下一味異功散治小兒諸般釣症角弓反張胸膈臍凸以透明沒藥為末薑湯調下桔梗枳殼湯治氣壅痞結腹脅疼痛桔梗枳殼炒各二兩甘草炙半兩上每服二三錢薑水煎七味白朮散治肚腹作痛和胃氣生津液若脾胃氣虛作渴飲湯或因吐瀉津液虧損煩渴引飲或脾胃氣虛腹脹瀉渴弄舌流涎手足指冷並宜服之以溫補脾氣化生津液方見發熱屬陰陽保和丸治飲食停滯腹痛或惡寒發熱不可多服神麯炒山楂半夏茯苓陳皮各一兩連翹蘿蔔子各五錢上為末粥飯丸小豆丸每服二三十丸白湯送下化服亦可加白朮名大安丸六君子湯治脾胃氣虛肚腹作痛或吐瀉不食或肺虛痰喘氣促惡寒或肝虛驚搐眩暈自汗諸症並宜服即四君子湯加陳皮半夏方見不靨悶亂瀉黃散方見痘瀉渴五味異功散方見寒戰咬牙聖濟犀角地黃湯方見頂陷心煩托裡散方見痘癰四物湯方見痘瘡出遲清涼飲方見痘大便不通痘腰痛經曰腰者腎之腑若痘瘡而見前症者皆因腎經虛怯相火內燥真陰不能勝邪故腰作痛也急服地黃丸以防變黑歸腎乃克有濟大抵此痘因稟賦腎家精氣不足故目睛多白俗謂之折腰痘是也若平素面白眼白睛多行遲語遲者出痘必歸腎經預為調補腎氣庶免此患一小兒十三歲眼睛多白或時面赤常患頸痛尺脈洪數先君謂稟腎氣虛用地黃丸料煎服而愈至十五歲出痘先君雲鬚多服前藥仍用地黃丸益氣湯更加倦怠乃以地黃丸大劑煎與恣飲又用大劑八珍湯痘漸出如式恪服前藥至期歲二藥計十七斤余而愈先君每見嬰兒白睛多面色白或色赤令其預補脾腎以防出痘但信者少耳一小兒出痘腰痛足熱發渴此稟腎虛火動也先君用大劑加減八味丸料煎與恣飲諸症漸退佐以大劑八珍加紫草糯米數劑膿漸貫仍以前藥而結痂用八珍湯而靨一小兒出痘將愈因停食泄瀉作渴腰痛此脾腎虛弱也先君用加減八味丸料及五味異功散渴瀉頓止又與六味丸料及八珍湯而靨一小兒出痘愈後腰足作痛此稟足三陰虛也用六味丸料煎服及補中益氣湯而愈後又傷食作瀉腰痛用四神丸六味丸而愈一小兒面色常白目睛多白時常腰痛兩足時熱冬不衣綿年九歲先君謂稟腎虛令每日服地黃丸至十歲出痘腰痛發渴面赤飲冷用地黃丸每劑加肉桂半錢煎與恣飲數劑之後熱渴頓止腰痛頓愈卻去肉桂仍與服之至五十餘劑而靨一小兒痘愈後腰痛口渴兩足生瘡飲水不絶此稟足三陰虛先君用地黃丸益氣湯至畢姻後不慎起居復患瘰癧以致不起一小兒面素白發熱作渴或面生瘡先君謂腎虛用加味地黃丸補中益氣湯而愈後出痘腰痛仍用前藥而痊次年畢姻患腎瘻而卒加味地黃丸熟地黃酒浸蒸丸曬乾八兩酒杵杵膏山茱萸肉乾山藥五味子炒各四兩澤瀉白茯苓牡丹皮鹿茸炙各三兩肉桂厚者去皮取肉一兩發熱者以此加之引虛火歸腎經而熱自止也上各另為末入地黃和勻量入米糊丸服煎服更好六味地黃丸五味異功散補中益氣湯八珍湯方見頂陷灰白二神丸四神丸二方見痘作瀉八味丸即六味丸加附子肉桂各一兩方見痘作渴痘面青聞人氏云痘疹屬火症其面色赤者為順甚者為熱若肝木剋制脾土致面色青者是為逆也急用四君升麻柴胡調補脾胃色正才治竊謂前症若傷食而嘔吐搐搦脾氣受傷而瀉利搐搦或厥逆皆慢脾風之漸也用人參理中湯加柴胡鉤藤鉤治之或有少誤多致不起若有痘毒內外鬱蒸發出遇風寒相搏凝滯於肌肉遍身皮膚青色者用透肌散胃傷則生風嘔吐脾傷則生風厥逆用五味異功散加天麻若瘡密熱盛便祕飲冷麵赤者用犀角解毒散貫漿之後發熱煩躁作渴面赤者用當歸補血湯足熱腰痛目睛赤者地黃丸皆要法也一小兒痘瘡紅活起發因飲食過多吐瀉腰痛唇面青色手足並冷此脾胃虛寒而受克也先君用六君薑桂一劑前病不退痘色欠赤再劑加附子二分諸症頓退翌日用參耆四聖散二劑將愈更用八珍湯內參耆各五錢四劑而靨一小兒出痘飲冷過多腹痛面青手足並冷此寒邪傷脾而虛寒也用附子理中湯一劑而痛止用人參一兩薑一錢二劑而膿貫又用人參煎湯代茶與飲月餘而靨一小兒出痘面青腹痛手足並冷此脾氣虛寒也先用五味異功散加木香肉桂又用內托散參耆四聖散貫膿痂靨一小兒出痘面青腹痛手足並冷此脾土虛寒也先服益黃散末三錢再用六君木香而安又傷食作瀉面青用五味異功散而痊一小兒出痘面色青手足冷此寒水侮土非十二味異功散不能救不信乃服疏通之藥歿而遍身皆青悔無及矣六君子湯四君子湯二方見不靨悶亂人參理中湯加附子名附子理中湯方見痘腹痛五味異功散當歸補血湯二方見寒戰咬牙內托散即托裡散方見痘癰十二味異功散方見頂陷灰白參耆四聖散方見腹脹氣促六味地黃丸方見發熱屬陰陽犀角地黃湯方見頂陷心煩痘痕赤白痘痕赤白各有所因治法亦異凡痕赤而作癢血虛而有熱也用五味牡丹皮赤而作痛餘熱也用四君連翹金銀花若發熱而大便調和者脾胃虛熱也用五味異功散若發熱而大便祕結者腸胃內熱也用聖濟犀角地黃湯若母有肝火用加味逍遙散若母有鬱怒用加味歸脾湯佐以加味逍遙散治之痕白者多屬氣虛而血衰也宜固元氣為本癢而作渴者氣血俱虛也十全大補湯之類乳食減少四肢倦怠者中氣虛也五味異功散之類氣虛發熱者補中益氣湯之類血虛發熱者當歸補血湯之類須參兼變之症治之此症若服藥而漸紅活者可治色不轉者不治雖經年後多患瀉利而死若妄投攻伐禍在反掌一小兒痘瘡如期而愈痕赤如赭余謂此乳母有熱也診之果有肝脾鬱火先用加味逍遙散四劑與母服之子各飲少許而並愈一小兒痘痕色赤作痛熱渴喜冷大便不利先用前胡枳殼散便利渴止再用聖濟犀角地黃湯而安又用芹菜汁而靨一小兒痘痕色赤大便不利小便赤澀作渴飲冷此上焦實熱也先君用瀉黃散一劑頓愈又用聖濟犀角地黃湯及芹菜汁而痊一小兒痘愈而痕赤作痛內熱作渴二便不利先君謂胃經熱毒用濟生犀角地黃湯及芹菜汁而痊一小兒痘痕色白時痛時癢作渴飲湯大便稀溏此脾胃虛熱也用五味異功散加當歸黃耆而瘥一小兒十六歲痘痕白用獨參湯數斤色漸如舊又用地黃丸大補湯而安一小兒痘後因母怒痕赤時或作痛先用加味小柴胡湯加味逍遙散治其母而愈一小兒因乳母食膏粱之味痘痕色赤用清胃散治其母而兒自愈一小兒痘痕色白作癢發熱大便不實諸藥不應余用五味異功散每劑用人參一兩四劑之後其熱稍退仍用前藥兼服四神丸而愈一小兒痘痕白色時或作癢先君謂氣血俱虛不信反服解毒之藥後變慢脾風而歿一男子患此色白作癢搔破膿水淋漓惡寒體倦余謂脾肺氣虛不信反祛風敗毒果發搐而死一小兒患此惡寒發熱或癢或痛或白或赤余謂氣血俱虛不悟反降火祛風發痙而死一小兒痘痕色白服克伐之劑致瀉不止余謂此脾氣下陷也不信果歿遍身如白敷粉信氣虛矣葛花解醒湯治乳母酒醉後乳兒遺熱為患白豆蔻砂仁葛花各五錢乾生薑白朮炒澤瀉神麯炒黃各一錢白茯苓陳皮人參豬苓木香各五分青皮三分上為末每二錢白湯調服四順清涼飲治血脈壅實臟腑蓄熱頰赤作渴五心煩熱睡臥不安四肢驚掣或頭面生瘡目赤咽痛痘疹餘毒方見大便不通四君子湯方見不靨悶亂前胡枳殼湯方見痘涕唾加味逍遙散方見痘潮熱瀉黃散方見痘渴瀉獨參湯方見腹脹氣促六味地黃丸方見發熱屬陰陽十全大補湯方見腹脹氣促五味異功散方見寒戰咬牙四物湯方見痘出遲聖濟歸脾湯方見痘癰犀角地黃湯即聖濟犀角地黃湯方見頂陷心煩清胃散方見痘癰痘喑王海藏先生云痘疹初出後聲音洪亮形病而氣不病也痘疹未發聲音不出形不病而氣病也瘡疹既發聲音不出形氣俱病也宜用八風湯或涼膈散去硝黃主之竊謂前症若心火上炎形爍肺金者宜用人參平肺散若津液不足虛火熏蒸者宜用六味地黃丸凡小兒面素白善哭足熱腰痛或解顱面白黑睛淡者出腎虛痘面青善怒或兩頭赤者出肝脾虛也蓋邪之所湊其氣必虛當預為調補若在乳下尤當補其母及慎飲食起居為善此余之親驗者也一小兒仲冬出痘呻吟煩躁焮痛作渴音啞便實先君謂心肺實熱之症令急與水飲之遂恣啜始定大便稍和更食梨子數枚得生夫梨者利也能令人作渴今食之而安乃內有實熱而應用也一小兒痘愈而聲喑面赤五心發熱小便赤少先君謂腎經虛熱用地黃湯益氣湯而愈其時患是症者用清熱解毒之藥俱致不起一小兒痘愈而聲喑面白兩睛多白兩足發熱作瀉飲湯脈浮數左尺更數而無力余謂稟腎經陰虛朝用益氣湯夕用地黃丸加五味子兩月餘聲漸出又服兩月餘而效一小兒出痘聲喑脈息如前余用前藥治之聲漸復清又飲食過多泄瀉復喑朝用益氣湯夕用異功散地黃丸聲始如舊一小兒痘後聲喑半載以為廢人余詢之但云頭暈其聲即喑脈浮而緩按之不及一寸此中氣虛不能上接清陽之氣耳用補中益氣湯地黃丸俱加五味子不半載聲音漸復一男子痘後患喑惡寒體倦勞則頭暈余謂元氣虛而不能上升不信乃服清痰降火之藥而歿一小兒十四歲痘後勞而喉喑頭暈脈洪數而無力惡寒發熱大便欲去而不去余謂元氣下陷也宜用益氣湯不悟乃雜用疏導之藥泄瀉不止而歿八風散即八風湯藿香半兩去土白芷一兩前胡去蘆一兩黃耆二兩甘草炙二兩人參二兩羌活二兩防風三兩上為末每服入薄荷少許煎湯調服涼膈散方見痘瘡焮裂人參平肺散治心火克肺金而聲喑方見頂陷心煩六味地黃丸治腎虛聲喑方見發熱屬陰陽補中益氣湯治中氣不足不能上接清陽之氣而喑五味異功散二方見寒戰咬牙痘瘡痛王海藏先生云痘瘡出而煩痛用木香五物主之更用芒硝為末以豬膽汁調敷之若身後痛屬膀胱經也用羌活荊芥甘草湯身前痛屬肺金也用升麻葛根紫草湯身側痛屬膽經也用連翹防風湯四肢痛屬胃經也用防風芍藥甘草湯以急止之蓋恐叫號傷氣忍痛傷血而變症也若熱毒盛者用東垣消毒散或仙方活命飲食雞魚葡萄酒物者用東垣清胃散生犀汁若發熱飲冷大便調和用四物連翹牡丹皮若發熱飲冷大便祕結脾胃實熱也用清涼飲若發熱作渴飲湯者脾胃虛熱也用七味白朮散大凡痘切不可食毒物恐作痛致傷元氣輕者反重重者難治大人亦然一小兒痘瘡作痛色赤飲冷此熱毒熾盛也用活命飲末二服痛止用東垣消毒散一服諸症悉退而瘥若非此藥必作疔毒之類一小兒痘焮痛出血診其母有肝火用小柴胡湯加山梔生地母子服之頓愈又用加味逍遙散而痊一小兒痘痛不止色淡欲陷此痛傷元氣也先用仙方活命飲一劑而痛止用八珍湯而靨一婦人時疫將愈出痘發熱體倦痛甚昏憒飲湯脈洪數按之如絲用十全大補湯調硃砂末一錢二劑其痛頓止食進體健仍用前湯十餘劑而愈一男子痘瘡痛甚先用仙方活命飲一劑其痛頓止又用東垣消毒散一劑精神如常而靨一小兒痘瘡痛甚脈有力此邪氣實也用活命飲末二錢痛止起發又用東垣消毒散而靨一小兒痘赤痛用活命飲末二錢痛止用當歸黃耆金銀花將愈用四君當歸芍藥而靨一小兒痘赤痛發熱飲冷大便不通脈洪數而有力用活命飲加大黃一服痛亦頓減更用東垣消毒散一服如期而愈一小兒痘瘡紅活焮痛作渴飲冷手足並熱余謂此痘屬形病俱實非清熱解毒不能殺其勢當用活命飲化癍湯不信另服鼠黏子湯痘焮脹大其色如赭先用前藥二劑腫痛悉止乃用鼠黏子湯而愈一小兒痘瘡焮痛服鼠黏子湯之類患痘疔三枚甚苦用隔蒜灸服活命飲痛止貫膿又用東垣消毒散而靨一小兒遍身發熱兩足猶甚作渴飲湯脈洪數而無力此稟腎經虛熱也用地黃丸料加當歸黃耆大劑煎與恣次三日服數劑熱渴全止又數劑而愈一小兒痘瘡熱痛服敗毒藥四肢患痘癰寒熱發渴余謂當補元氣不信果歿木香五物湯治出痘煩痛青木香四兩丁香一兩熏陸香白礬各一兩麝香一錢上每服五錢水煎熱盛加犀角一兩施銀臺常用此方其效如神鼠黏子湯治痘瘡欲出未透皮膚髮熱眼赤心煩咽痛不利等症減地骨皮防風名消毒散鼠黏子四錢炒杵荊芥二錢防風五分地骨皮一錢上為末每服一二錢白湯調下仙方活命飲治痘瘡焮痛熱盛者服之頓衰勢弱者服之頓愈真聖藥也東垣清胃散托裡消毒散三方見痘癰射干鼠黏子湯方見痘咽痛東垣消毒散方見夾疹痘一名救苦湯羌活荊芥甘草湯即此三味等分柴胡山梔連翹防風湯即此四味等分連翹防風湯方見痘疔防風芍藥甘草湯即此二味等分化癍湯方見水痘麻痘清涼飲消毒散二方見大便不通四聖散方見痘出不快犀角消毒飲隔蒜灸法二方見痘疔痘身疼經云癢則為虛痛則為實內快外痛為外實內虛外快內痛為內實外虛今痘瘡身痛者是膚厚理密或外寒相搏或熱毒內作或血虛不能榮養若熱毒而血瘀者先用活命飲次用東垣消毒散血虛而瘀者用四物湯之類遍身齧而色黑者毒氣壅滯而血凝也乃是危症若二便祕結喘急煩躁用梔子仁湯或豬尾膏血調片腦治之自利不食者不治一小兒痘未發遍身作痛余謂熱毒勢盛先用仙方活命飲一劑痛緩痘出用東垣消毒散一劑末用四聖散而靨一小兒痘未出透遍身作痛此熱毒鬱滯而未盡發於外也先用活命飲一劑而痛愈用參耆四聖散而結靨一小兒痘瘡遍身作痛用東垣消毒散而痛愈用紫草快癍湯而膿貫用托裡散而愈一小兒痘癰肢體作痛發熱惡寒此氣虛而寒邪客於表也用人參羌活散而表解用參耆四聖散而起發用參耆內托散而膿潰一妊婦發熱作渴遍身疼痛用活命飲二劑諸症稍愈形氣甚倦用紫草木香散痘出少許用白朮散貫膿而愈一男子出痘根窠赤痛發熱作渴痘裂出血肝火熾也用小柴胡湯加生地犀角諸症頓減又用聖濟犀角地黃湯而結痂黃耆六一湯治痘瘡氣虛作渴愈後作渴尤宜服之黃耆炙六錢甘草炙一錢水煎服參耆四聖散參耆內托散治痘瘡疼痛或裡虛發癢或不潰膿或為倒靨等症二方見寒戰咬牙小柴胡湯加牡丹皮生地黃即加味小柴胡湯治發熱惡風身痛或四肢徑強寒熱往來方見癍症紫草癍湯方見便出血或黑屎七味白朮散方見發熱屬陰陽四物湯方見痘出遲八珍湯聖濟犀角地黃湯二方見頂陷心煩仙方活命飲托裡散東垣消毒散三方見夾疹痘五苓散方見小便不利製附子法將附子重一兩三四錢有蓮花瓣頭圓底平者先備童便五六碗將附子放在灶上熱處或炭火烘炙乘熱投童便中浸五七日候潤透揭去皮切四塊用粗紙裹數層埋灰火中煨候熱取出切片如有白星瓦上炙至無星為度如急用切大片用熱瓦炙熟亦可
