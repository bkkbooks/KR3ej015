body:
  text: 卷十三喉痹附五臟虛羸傳變喉間內潰或鼻中垂出息肉或鼻外患瘡一小兒喉痹因膏粱積熱或稟賦有熱或乳母七情之火飲食之毒當分其邪蓄表裡與症之輕重經之所主而治之若左腮色青赤者肝膽經風熱也用柴胡梔子散右腮色赤者肺經有熱也用瀉白散額間色赤者心與小腸經熱也用導赤散若兼青色風熱相搏也用加味逍遙散鼻間色黃脾胃經有熱也用瀉黃散若兼青色木乘土位也用加味逍遙散兼赤色心傳土位也用柴胡梔子散頦間色赤腎經有熱也用地黃丸凡此積熱內蘊二便不通者當疏利之風邪外客而發寒熱者當發散之外感風邪大便閉結煩渴痰盛者當內疏外解若因乳母膏粱積熱者母服東垣清胃散若因乳母恚怒肝火者母服加味逍遙散稟賦陰虛者兒服地黃丸大概當用輕和之劑以治其本切不可用峻利之藥以傷真氣也一小兒喉間腫痛驚悸飲水服驚風降火之藥益甚仍欲攻風痰余曰驚悸飲水心經虛症也蓋胃為五臟之本先用五味異功散以補胃加桔梗甘草以消毒諸症頓退後用牛蒡子湯加柴胡而愈一小兒喉間腫痛左腮色青赤此心肝二經之熱也用柴胡清肝散而愈後因驚服至寶丹吐痰發搐手足指冷此肝木虛而肺金乘之用補中益氣湯以補脾肺六味地黃丸以滋肝腎而愈一小兒發熱飲冷大便黃色手足並熱不能吮乳視口內無患捫其喉間則哭此喉內作痛乃脾胃實熱也用瀉黃清胃二散各一劑母子並服而愈後因乳母飲酒兒躁不安口內流涎仍用前二散而愈一小兒喉間腫痛口角流涎手足並熱用瀉黃清胃二散母子服之而愈後因母大怒兒憎寒發熱仍復流涎用柴胡清肝散加漏蘆母子服之而愈一小兒喉間腫痛發熱咳嗽大便秘結此肺與大腸有熱也先用牛蒡子湯加硝黃一服大便隨通乃去硝黃再劑頓愈審其母有肝火發熱用柴胡清肝散母子並服而愈一小兒嗜膏粱之味喉間腫痛痰涎壅盛服巴豆丸前症益甚口鼻出血唇舌生瘡大便不實余用犀角地黃湯解膏粱之熱用東垣安胃散解巴豆之毒又用甘桔湯而愈一小兒喉腫作渴大便乾實右腮赤色此肺與大腸經實熱也用柴胡飲子一服而愈後因飲食停滯服峻厲之藥喉間仍腫腹中脹痛此脾氣復傷也用異功散加升麻當歸而痊一小兒因母忿怒患前症兼咬牙呵欠余謂肝經虛熱之症子用桔梗湯加柴胡山梔牛蒡子母服加味逍遙散而愈一小兒肌體瘦弱嗜土炭煤灰後鼻間不利恪服清熱之劑肌體愈瘦食少熱甚善驚善怒小便良久變白鼻中出息肉二寸許耳下頸間結小核隱於筋肉之間余謂肝脾虛羸之變症不信乃內清肺火外用腐蝕喉間亦腐余先用五味異功散加升麻柴胡蕪荑為主更用四味肥兒丸為佐脾氣漸健夕用九味蘆薈丸為主以五味異功散為佐而愈一女子六歲喉間腫痛鼻中息肉寒熱往來小便頻數良久變白此肝疳之症先用加味逍遙散加炒黑焦龍膽草熱癢漸退乃去龍膽草佐以四味肥兒丸而愈一女子七歲鼻生息肉搽攻毒之藥成瘡腫痛外用黃連甘草黃柏末敷之以解熱毒更以加味逍遙散清肝火佐以四味肥兒丸而愈一女子鼻中及下部常出息肉屢用毒藥蝕之各挺出一條三寸許先與龍膽草湯為主以加味逍遙散為佐而愈一小兒額間赤足心熱喉中常痛服清胃敗毒之藥余謂稟腎水不足而心火熾甚也當用地黃丸壯水之主以制陽光不悟口舌赤烈小便如淋而歿一女子十四歲患前症雜用清熱敗毒等藥前症益甚患陰挺詳見下疳瘡牛蒡子湯治風熱上壅咽喉腫痛或生乳蛾牛蒡子炒杵玄參升麻桔梗炒犀角鎊黃芩木通甘草各等分上每服一二錢水煎服拔萃桔梗湯治熱腫喉痹桔梗炒甘草炒連翹梔子炒薄荷黃芩各等分上為末每服一二錢水煎服柴胡飲解肌熱積熱或汗後餘熱脈洪實弦數大便堅實者黃芩七分甘草四分大黃八分芍藥炒七分柴胡人參各五分當歸一錢上每服一錢姜水煎東垣人參安胃散治脾胃虛熱口舌生瘡或傷熱乳食嘔吐瀉痢人參一錢黃耆炒二錢生甘草炙甘草各五分白芍藥酒炒七分白茯苓四分陳皮三分黃連炒二分上為末每服二錢水煎三因玉鑰匙治風熱喉閉及纏喉風焰硝一兩半鵬硝半兩片腦一字白殭蠶一錢上研勻用半錢吹入喉中立愈九味蘆薈丸治肝經積熱咽喉口舌生瘡或牙齦蝕爛兩目生翳耳中出水或肝積瘰癧下疳陰腫或莖出白津拗中結核或小水良久變白大便不調肢體消瘦等症胡黃連宣黃連蘆薈木香白蕪荑炒青皮白雷丸鶴蝨草各一兩麝香三錢上各另為末米糊丸麻子大每服半錢空心米湯下仍量兒大小用甘桔湯治風熱上攻咽喉疼痛及喉痹妨悶苦梗一兩甘草炒二兩上每服二錢水煎濟生犀角地黃湯治膏粱積毒脾胃有熱咽喉腫痛或口舌生瘡犀角牡丹皮各一兩生地黃八錢赤芍藥七錢上每服一二錢水煎五味異功散方見敗毒之藥六味地黃丸方見作渴不止柴胡清肝散方見脅癰即柴胡梔子散補中益氣湯方見肌肉不生瀉黃散方見頭面瘡腮癰附耳症腮屬足陽明胃經其生癰者多因兒食甘甜厚味脾胃積熱所致亦有乳母鬱怒兒受其患者若因熱積於內二便不通者用涼膈散風邪相搏二便如常者用漏蘆湯胃經風熱或兼咽喉腫痛用升麻防風湯若稟賦陰虛火動頦間或兩耳內生瘡或出膿不止者宜用地黃丸若因乳母肝火乘脾用加味逍遙散脾經鬱熱用加味歸脾湯膏粱積熱用東垣清胃散脾胃風熱用清咽利膈湯仍參口瘡治之一小兒腮腫肉色不變大便不實屬胃經虛熱用五味異功散加升麻柴胡而愈又乳母飲酒兼怒兩腮赤腫憎寒發熱用加味清胃散二劑加味逍遙散一劑治其母兒亦飲數滴而愈一小兒嗜炙煿腮腫發熱作渴飲冷用加味清胃散而消後仍不戒厚味腮腫赤痛焮連舌本先用瀉黃散而退次用加味清胃散而消一小兒腮患瘡作渴飲湯飲食少思服敗毒散益甚余謂此胃經虛熱先用七味白朮散次用五味異功散而渴止後因母怒兩腮赤腫作渴發熱用加味逍遙散治其母兒患亦愈一小兒十六歲腮患此三年不愈色黯下陷此胃經症也宜滋化源以生腎水外散寒邪以接陽氣不信妄用雜方元氣益虛七惡蜂起始信余言後用前藥果驗一小兒頰腫敷寒涼之藥色白腫硬久而不愈此胃氣虛而寒邪凝滯也用蔥熨法以散寒邪異功散以助元氣遂愈若用攻毒之劑則誤矣一小兒酷嗜甘味藥餌惟甘者乃服後患腮腫余知其胃症也經曰酸能勝甘當用酸味之藥遂以烏梅肉作丸甘草末為衣服至二兩許始惡甘味腮腫漸消一小兒腮腫痛外敷鐵箍散內服寒涼藥日久堅硬其色不變夫藥之寒涼者外敷則氣色凝滯內服則脾胃有傷故氣血有虧而肉不潰色不赤也用四君加柴胡升麻白芷當歸外散寒邪內補脾氣更用蔥熨法不數日膿潰而愈一小兒腮頦常焮腫服清熱敗毒之藥更口渴足熱面色微黑余謂腎肝症用六味地黃丸與子服母服加味逍遙散而愈後因別服伐肝之藥前症復作寒熱面青小便頻數此肝火血燥耳用柴胡梔子散以清肝六味地黃丸以滋腎遂痊一小兒腮頦腫痛後耳內出膿久而不愈視其母兩臉青黃屬鬱怒所致朝用加味歸脾湯夕用加味逍遙散母子皆愈一小兒腮間發熱手足並熱用清胃瀉黃二散而愈後頦間腫痛焮連耳內余謂此腎經所屬之地不信雜用降火之藥耳出膿水或癢或痛稍加用心即發熱倦怠兩腿乏力用補中益氣湯及六味地黃丸稍愈畢姻後朝寒暮熱形氣倦怠足心發熱氣喘唾痰仍用前二藥佐以六君子湯而愈後不守禁惡寒發熱頭暈唾痰余謂腎虛不能攝水而為痰清氣不能上升而頭暈陽氣不能護守肌膚而寒熱遂用補中益氣湯各加蔓荊子附子各一錢不應乃用人參一兩附子二錢二劑而應乃用十全大補湯百餘劑而痊一小兒先頦間腫痛用敗毒之藥耳中流膿項間結核兩目或連札或赤痛小便或作癢或赤澀皆肝膽二經風熱用四味肥兒丸悉愈一小兒腮頦腫痛服敗毒藥後耳出穢水余謂肝腎之症先用九味蘆薈丸而痊畢姻後面黃發熱用黃柏知母等藥更胸膈痞滿食少痰壅乃利氣化痰加噫氣下氣用六君子補中益氣二湯加乾薑木香尋愈一小兒腮腫搽石灰末久而不散余用四君子加升麻白芷及蔥熨之法漸消又用仙方活命一劑而瘥夫石灰乃辛熱燥血之藥小兒氣血虛者搽之反致難治慎之一小兒腮間腫痛用鐵箍散敗毒散之類出膿久不愈面色黧足心熱口舌乾余謂此稟腎水不足之虛症當補肺金滋腎水為主不信仍服前劑脾土益虛絕生氣而歿升麻防風湯治胃經實熱咽痛口燥腮癰等症升麻防風黃柏炒茯苓芍藥炒陳皮各五分連翹當歸各七分上每服二錢水煎仍量大小用之清咽利膈湯治心脾蘊熱或咽喉腮舌腫痛玄參升麻桔梗炒甘草炒茯苓防風黃芩炒黃連炒牛蒡子炒杵芍藥炒各等分上每服一二錢水煎東垣清胃散方見腹癰異功散方見用敗毒之藥地黃丸方見作渴不止神效蔥熨法方見流注仙方活命飲方見瘡瘍熱毒臂癰臂癰之症當分經絡所屬受症之因而治之上廉屬手陽明經下廉屬手太陽經外廉屬手少陽經內廉屬手厥陰經內之上廉屬手太陰經內之下廉屬手少陰經或經絡熱鬱風邪外干氣血有乘即生癰毒若因心經有熱者導赤散加黃連心胞絡有熱者柴胡梔子散肺經有熱者瀉白散大腸經有熱者大連翹飲焮腫作痛者血氣凝結也用仙方活命飲腫痛不消者欲作膿也用托裡消毒散膿熟不出者氣血虛也用托裡消毒散膿出反痛者氣血虛甚也肌肉不生者脾胃氣虛也用五味異功散不可外敷生肌散恐反助其邪而肌肉難長也一小兒臂上生癰腫連肘間此屬手少陰三焦二經先用仙方活命飲殺其大勢次用柴胡清肝散以清心肝之熱諸症頓退又用托裡消毒散出膿而愈一小兒臂外側患毒此屬肺經部分先用神效解毒散加桔梗二劑腫痛頓減次用托裡消毒散而膿潰將愈因母食炙煿之味患處復腫兼發熱咳嗽子服瀉白散母服清胃散而痊一小兒臂腕漫腫敷寒涼藥又常以冷水潤之腫熱以上至肩兩月餘而潰四月餘不斂膿出清稀面色痿黃余曰此氣血虛不能充榮於肌肉也先用異功散加升麻柴胡脾胃漸健又用托裡散而愈一小兒臂患癰久不愈手足時冷用異功散加木香佐以八珍湯手足溫和乃用托裡散將斂因飲食停滯傷脾患處腫硬用六君木香及托裡散而愈一小兒臀癰久不愈潰出碎骨飲食少思不時寒熱膿水清稀此氣血俱虛也用八珍散加肉桂桔梗漸消又用托裡散加肉桂及豆豉而愈一小兒臂膊赤腫發熱作渴飲冷症屬胃火先用加味清胃散而愈後因母食厚味復腫痛先用瀉黃散二服再用清胃散母子服之並愈一女子臂瘡腫焮作痛用仙方活命飲痛止成膿用加味八珍湯而膿潰漸斂用加味逍遙散與母服而痊一小兒因母食膏粱臂瘡潰而作痛脈洪數有力用清胃散與母服子服瀉黃散漸愈又用加味逍遙散母子俱服而愈一小兒臂瘡服敗毒散嘔吐腹脹作痛手足並冷用六君薑桂諸症漸退飲食漸進次用五味異功散而愈一小兒臂癰腫硬色白寒熱倦怠此血氣虛弱而不能潰散先用五味異功散加乾薑其腫漸退飲食漸進又用托裡散如聖餅膿潰而愈一小兒臂患癰腫硬不消食少自汗此脾肺氣虛而不能潰先用六君子湯而汗止乃佐以蔥熨法而膿成又用八珍湯而膿潰用托裡散而瘡斂一小兒臂患瘡敷寒涼之藥腫硬不消用補中益氣湯加木香薄桂及如聖餅助其陽氣而消一小兒臂患瘡腫硬作嘔面色痿黃飲食少思此脾氣虛也用六君子湯嘔止食進又用五味異功散如聖餅而消一小兒臂瘡作痛不止肌肉不生先用托裡消毒散而痛止用五味異功散托裡散而肉生一小兒臂患瘡久而不斂肌肉消瘦日晡體熱此脾氣虛而不能生肌肉也朝用補中益氣湯夕用五味異功散諸症漸愈又用托裡散如聖餅而愈一小兒臂瘡腫痛焮赤右腮赤色敷服皆敗毒之藥余謂此肺胃二經之症也當用瀉黃瀉白二散主之不信恪用前藥泛擾諸經虛症蜂起而歿神效解毒散治一切瘡瘍初起腫者即消已潰仍腫者即散已潰毒不解者即愈金銀花一兩甘草節五錢黃耆皂角刺炒當歸各三錢乳香沒藥各二錢上為散每服二錢酒煎溫酒調服亦可嬰兒病乳母亦服如瘡已潰腫痛已止者去乳沒金銀花倍加黃耆甘草白芷升麻湯治手陽明經分臂上生瘡白芷升麻桔梗各一錢黃耆炒黃芩酒炒各二錢生黃芩五分紅花甘草炙各五分上水酒半鍾煎食後溫服瀉白散治肺經有熱生瘡又化痰止嗽治氣進食地骨皮桑白皮炒各一兩甘草炙五錢上為末每服一二錢入粳米百粒水煎瀉心散治心經實熱生瘡作渴發熱飲冷手足並熱者詳見心臟瀉心湯導赤散治小腸實熱生瘡作渴發熱小便秘赤生地黃木通甘草等分上為末每服一錢入淡竹葉水煎大連翹飲即大連翹湯治肺熱生瘡連翹瞿麥荊芥木通赤芍藥當歸防風柴胡滑石蟬殼甘草炒山梔子黃芩各等分上為末每服二錢加紫草水煎服之大便不通量加大黃補中益氣湯方見肌肉不生加味逍遙散六味地黃丸二方見發熱不止十全大補湯方見便癰四味肥兒丸方見貼骨癰九味蘆薈丸方見喉痹柴胡梔子散方見腹癰東垣清胃散方見腹癰五味異功散方見敗毒之藥托裡消毒散托裡散二方見熱毒瘡瘍腋癰謂癰生於脅之前膚之傍白者五下皆是也腋癰屬足少陽手少陰手厥陰三經小兒患之多稟賦肝火所致初起先用活命飲次用柴胡梔子散五七日間作膿焮腫作痛者亦用活命飲殺其大勢雖潰亦輕而易斂若膿已成用托裡消毒散已出用托裡散如有變症當隨症治之一小兒患前症腫痛用仙方活命飲而痛止用托裡消毒散而潰因母飲酒後加腫痛母服清胃散兒服活命飲托裡散而愈一小兒患之因乳母恚怒所致子用仙方活命飲母用柴胡梔子散加味逍遙散並愈後復患令母仍服前藥子服托裡消毒散而膿潰用托裡散而斂一小兒腋下常患一枚此稟肝膽怒火也用牛黃解毒丸母服柴胡梔子散逍遙散而愈後每發即服前藥而愈或用荊防敗毒散外敷鐵箍散以杜後患幾至不救一小兒十四歲患之內外皆用寒涼敗毒之藥腫硬作痛上連肩胛膿成不潰或用針之膿仍不出余曰此氣血虛甚當峻補之不信半載後肩骨潰解惟皮相連瀝盡氣血而歿一小兒患之恪服敗毒之藥久不潰色不變腫硬如石余用蔥熨之法及托裡散二十餘劑患處微赤作痛又數劑腫起針出穢膿氣息奄奄用人參一兩乾薑一錢棗子十枚四劑仍用前散尋愈一小兒患之膿內潰久不出色不變亦不痛余謂氣血虛甚當先大補而用火針不信或用冷針膿果不出更氣喘自汗余用獨參湯二劑喘汗少止膿仍未出又二劑膿出甚多喘汗大作又用前湯四劑諸症悉退乃用八珍湯漸愈後因傷風咳嗽誤用表散之藥煩躁自汗面目赤色脈洪大無倫按之如無此血脫髮躁也先用當歸補血湯諸症頓愈再用八珍湯而安又飲食過多發厥手足並冷用五味異功散加升麻柴胡生薑一劑而愈一小兒患之色黯不斂三年不愈用十全大補湯及豆豉餅三月餘將愈後勞倦怒氣腋下腫痛以加味逍遙散十全大補湯相間服之月餘而愈豆豉餅治瘡瘍腫痛硬而不潰及潰而不斂並一切頑瘡惡瘡用江西豆豉為末唾津和成餅大如銅錢厚如三四錢置患處以艾壯於餅上灸之灸干則再易如瘡大作大餅覆患處以艾鋪餅上灸之瘡未成者即消已成者祛毒間有不效者乃氣血虛敗之症也參疔瘡類灸法用之方見腋癰四物湯治瘡瘍血虛發熱日晡益甚或煩躁不寐當歸熟地黃各二錢芍藥炒川芎各一錢上水煎服參朮柴苓湯治瘡瘍脾氣虛弱肝氣內動肢體抽動者人參白朮茯苓陳皮各一錢山梔炒鉤藤鉤子各七分甘草炒五分柴胡升麻各三分上每服一二錢薑棗水煎嬰兒用大劑與母服子少服之黃連安神丸治心經血熱發熱驚悸不安黃連五分生甘草二錢五分生地黃五錢當歸硃砂三錢上為末飯糊丸小豆大每服十五丸滾湯下如二三服不應當服歸脾湯嬰兒乳母並服柴胡梔子散方見脅癰一名柴胡清肝散托裡消毒散托裡散二方見熱毒瘡瘍清胃散方見腹癰加味逍遙散方見發熱不止牛黃解毒散方見胎毒瘡疥十全大補湯方見便癰脅癰脅肋者足厥陰少陽之經相火之司也乃木之主肝膽之氣不平則風火內搏榮逆血鬱熱聚為膿而癰腫之所由生也亦有稟賦母氣肝膽之熱恚怒之火而致然初患焮腫作痛者宜用柴胡梔子散未消者用仙方活命飲其熱既殺而腫不消者則必成膿也乃用托裡消毒散其膿既成以代針膏決之仍用托裡散自愈若膿出而痛止腫消則不必用藥也一小兒四歲脅間漫腫一塊甚痛色如故服流氣敗毒等藥加寒熱作嘔食少作瀉此稟肝脾氣滯之症元氣復傷而甚耳乃擇乳母氣血壯盛者與加味歸脾湯加味逍遙散服之兒飲其乳半載而消一小兒左脅生瘡寒熱作嘔右關脈弦數此肝症傳於脾也先用柴胡清肝散次用五味異功散又用托裡散瘡斂而愈其時同患是症專用敗毒者俱致不起一小兒左脅下生瘡漫腫色赤此肝膽經形傷氣也先用托裡散消毒散加味小柴胡湯間服腫漸減又用托裡消毒散加味小柴胡湯瘡潰而愈一小兒四歲患脅癰色赤腫痛肝脈弦而遲此肝膽經血虛有熱先用加味逍遙散數劑大勢已消中間成膿又用托裡消毒散加柴胡山梔膿潰而斂一小兒肩患癰痛甚腫至背乃膀胱經部分血瘀滯也先用仙方活命飲毒解痛止又用加味小柴胡湯加連翹山梔金銀花其勢漸退乃用加味逍遙散加金銀花黃耆漫腫悉消但中間不退此欲作膿也用托裡消毒散膿成而潰又用托裡散地黃丸補氣血滋腎水而痊一小兒患之久不愈左關脈弦數右尺脈按之而弱此稟腎虛而然也用地黃丸為主佐以八珍湯托裡散而愈一小兒未期脅間赤腫此稟肝火所致用加味逍遙散數劑與母服子日服數匙漫腫悉退佐以托裡消毒散加山梔柴胡瘡潰而愈後因母恚怒勞役子脅復腫赤用加味逍遙散加味歸脾湯母子服之並愈一小兒脅癰服伐脾之藥膿清不斂呵欠呀咬飲食少思仍用伐脾余曰此脾虛之症也胃為五臟之主當補脾胃則肝不侮而肌肉自生矣不信乃伐肝木遂致不救加味歸脾湯治小兒因乳母憂思鬱怒胸脅作痛或肝脾經分患瘡瘍之症或寒熱驚悸無寐或便血盜汗瘡口不斂等症人參黃耆炒茯神去木各二兩甘草炒白朮炒一兩木香五分遠志去心酸棗仁龍眼肉當歸牡丹皮山梔炒各一錢上水煎乳母服兒亦服之小柴胡湯治肝膽經分一切瘡瘍發熱潮熱或飲食少思加山梔牡丹皮名加味小柴胡湯柴胡一錢五分人參五分黃芩七分半夏五分甘草炒三分上作二三服薑棗水煎柴胡清肝散治肝經風熱或乳母怒火患一切瘡瘍柴胡黃芩炒人參川芎各一錢山梔炒一錢五分連翹甘草各五分桔梗炒八分上水煎母子服之梔子清肝散一名梔子柴胡散治三焦及足少陽經風熱生瘡或發熱耳內生瘡作癢或出水疼痛柴胡梔子炒牡丹皮茯苓川芎芍藥炒當歸牛蒡子炒各七分甘草二分上水煎母子並服龍膽瀉肝湯治肝膽經有熱小腹脅間患瘡瘍或玉莖便毒懸癰囊癰腫痛或潰爛作痛小便澀滯或睪丸懸掛方見下疳陰痿加味逍遙散治小兒肝脾血虛內熱脅腹作痛頭目昏黑怔忡頰赤口燥咽乾或發熱盜汗食少不寐或口舌生瘡胸乳膨脹小便不利或女子患前症經候不調發熱咳嗽寒熱往來等症方見發熱不止六味地黃丸治肝經血虛發熱或風客淫氣瘰癧結核或四肢發搐眼目抽動痰涎上湧或傷損出血發熱抽搐等症方見作渴不止仙方活命飲托裡消毒散托裡散三方見熱毒瘡瘍八珍湯方見發熱不止腹癰腹癰者患於臍下或傍二寸許屬脾經近脅屬膽經蓋因脾經陰虛氣滯血凝或因脾虛飲食積熱所患若焮腫作痛者瀉黃散堅硬腫痛者清胃散腫痛便秘者清涼飲如此而仍痛者瘀血凝滯也活命飲既用此藥而不消則內欲作膿也用托裡消毒散若膿出而痛不減者毒未解也亦用前藥若膿出而反加痛及膿水清稀者氣血虛也用參耆托裡散若食少體倦者脾氣虛也用五味異功散加當歸柴胡升麻哺熱內熱者脾血虛也用四君當歸丹皮如有他症當隨症治之一小兒患此漫腫微痛肉色不變面色痿黃飲食少思此脾氣虛而食積內熱也用五味異功散加升麻當歸及如聖餅其腫漸消又用托裡散而愈一小兒患此腫痛寒熱活命飲未二服腫痛頓止用托裡散如聖餅而腫漸消又用神效散及托裡消毒散數劑而痊一小兒患之內潰作渴飲食少思屬元氣虛弱先用托裡消毒散四劑膿潰而發熱惡寒肢體倦怠此邪氣去而真氣虛也用八珍升麻補之稍愈又用托裡散異功散間服而痊一小兒腹瘡大便秘結發熱飲冷此熱蓄於裡也用內疏黃連湯一劑大便通而痛止又用清熱消毒散內熱退而瘡愈一小兒腹患瘡敷寒涼之藥其腫益甚腹中陰痛手足並冷此陽氣虛寒之症也余用回陽湯抑陰散而腫漸消毒漸散又用托裡散而斂一小兒患此膿成不潰面色黃白噁心少食發熱惡寒大便不實此脾胃虛弱也先用六君升麻柴胡諸症漸退飲食漸進又朝用益氣湯夕用異功散而潰又用八珍湯而愈一小兒腹中作痛肉色不變三月矣診其脈滑數而有力此腹癰內潰也用托裡散大便出膿甚多乃用薏苡仁湯及托裡散而愈一小兒小腹赤腫服流氣敗毒等藥肉色如故食少體倦余謂此肝脾氣血虛而藥傷之也用六君肉桂及蔥熨之法飲食漸進其腫漸消又佐以八珍湯而愈一小兒患此而潰腫不消恪服敗毒之藥飲食少思膿清發熱余謂脾胃之氣復傷不信仍行氣清熱腫痛益甚服消導化痰之藥腹脹作瀉余先用異功散加升麻柴胡木香佐以二神丸二十餘劑諸症漸愈乃用異功散加當歸黃耆元氣漸復卻用八珍湯內芍藥炒黃數劑改用托裡散而愈次年因勞心發熱作渴用當歸補血湯而安畢姻後寒熱往來患處作癢用十全大補湯六味地黃丸而愈四君子湯加陳皮半夏即六君子湯治脾胃虛弱或因寒涼傷胃致腫不能消或潰而不能斂者但以此藥溫補脾胃諸症自退如誤用攻伐則七惡隨至矣若脾胃氣虛瘡口出血或吐血便血則加當歸脾胃充健則血自歸經若脾虛血弱不生肌或晡熱內熱者更加熟地黃不可投四物沉陰之劑能傷脾胃也若胃氣虛弱克伐傷脾飲食少思或食而難化若作嘔作泄者尤宜用之如兼痰嗽氣逆肢體倦怠面目浮腫者亦因脾虛不能生肺而然也最宜用之人參白朮炒茯苓甘草各等分上每服二錢薑棗水煎清胃散治脾胃有熱生瘡或胃火牙痛或連頭面升麻五分生地黃牡丹皮黃連炒當歸各三分上水煎服加柴胡山梔即加味清胃散六君子湯治瘡瘍脾胃虛弱腫痛不消或不潰斂宜用此藥以壯營氣諸症自愈即四君加半夏陳皮清涼飲治瘡瘍脾胃實熱煩躁飲食焮痛脈實大便秘結小便赤澀赤芍藥當歸甘草大黃各等分上每服一錢水煎當歸補血湯治瘡瘍肌熱面赤煩渴脈洪大而虛重按全無此血虛脈也誤服白虎湯必死方見發熱不止益氣養榮湯治氣血損傷四肢頸項等處患腫不問堅軟赤白痛否日晡發熱或潰而不斂者方見鶴膝風十全大補湯治諸瘡血氣虛不能潰腐收斂或膿出發熱惡寒汗出煩眩口眼歪斜或肌瘦少食發熱口乾等症須多服之為善方見便癰參耆托裡散方見痘癰補中益氣湯方見肌肉不止托裡消毒散托裡散二方見熱毒瘡瘍五味異功散方見用敗毒之藥如聖餅方見流注神效散方見胎毒發丹八珍湯方見發熱不止臀癰臀癰屬膀胱經濕熱或稟賦陰虛若腫硬作痛用內托羌活湯微腫微痛用托裡消毒散若初起大痛或五日之間似消不消似潰不潰者先用仙方活命飲後用托裡消毒散若已潰食少體倦瘡不生肌脾胃虛弱者用五味異功散加柴胡升麻稟賦陰虛小便數而不斂者加減八味丸氣虛久不生肌收口用豆豉餅及補中益氣湯培養元氣若用解熱攻毒及敷圍寒冷之劑則氣血受傷必成敗症矣一小兒患此腫硬不赤旬余矣面赤痿黃飲食少進此脾氣虛弱也先用異功散飲食漸進漫腫漸消乃用托裡散少加肉桂而潰又用八珍湯而斂一小兒患此久不收斂四圍微黯瘡口黑色膿水清稀寒熱晡熱脈浮而數兩寸按之如無此陽氣虛而陰血弱也朝用補中益氣湯夕用異功散半載而愈一小兒臀瘡潰而不斂面色時赤此稟肝腎陰虛朝用八珍湯加五味子夕用加減八味丸諸症漸退又用托裡散間服而愈一小兒臀瘡久不收斂肢體倦怠晡熱作渴此稟足三陰虛也用五味異功散加減八味丸漸愈又用托裡散而斂一小兒臀癰久不生肌面色痿黃仍欲敗毒以收斂余曰脾主肌肉腱健則肉生遂朝用補中益氣湯夕用五味異功散及蔥熨法脾氣壯肌肉生而愈一小兒腫硬不消肉色不變此脾胃之氣虛怯不能運及患處耳朝用補中益氣湯夕用五味異功散以接虛怯之氣月餘而消其時同患是症外敷寒涼之藥內服犀角丸者無不受害一小兒十五歲久不愈發熱體瘦面白噯氣恪服消食清熱藥等余謂心火虛而脾氣弱也先用八味丸為主佐以六君子湯補中益氣湯尋愈畢姻後臀間患疽漫腫堅硬肉色不變手足時冷脈浮大按之微細兩尺為甚先用八味丸料四劑又用十全大補湯患處色正而消內托羌活湯治尻腎生癰堅硬腫痛羌活黃柏酒製各一錢防風藁本當歸尾各五分肉桂連翹甘草炙蒼朮陳皮各三分黃耆八分上作二劑水一杯煎空心服仙方活命飲托裡消毒散托裡散三方見熱毒瘡瘍神效解毒散方見臂癰加味八味丸方見作渴八珍湯方見發熱不止蔥熨法方見流注腿癰腿癰之症所主之經不同而所治之法亦異發於內側者屬肝脾二經發於外側者屬膽胃二經漫腫堅硬者元氣虛弱也用內補黃耆湯腫勢高焮者元氣未虛也用內托柴胡黃耆湯外並用隔蒜熨法若瘀血凝結而不消或不作膿者用活命飲血氣虛弱而不能潰及不生肌肉者用托裡散此其梗概云爾一小兒內臁腫痛惡寒發熱此屬肝膽經分乃用神效解毒散加柴胡白芷二劑漫腫頓消惟中央一塊尚腫又二劑而成膿以托裡消毒散潰膿而愈一小兒腿內側前臁患毒潰後腫硬色黯膿清不斂面色青黃此脾虛肝旺兼寒邪襲於患處也當壯元氣為主先用異功散加柴胡升麻及蔥熨法脾氣漸復患處漸愈佐以八珍湯豆豉餅而愈一小兒腿內焮赤大腫發熱此血熱內郁而欲為膿耳當先殺其大勢用隔蒜灸法灼艾試蒜熱移患處二十餘炷痛始減再三十餘炷腫漸消又用仙方活命飲瘡頭出水而愈一小兒腿內側患此膿內潰噁心倦怠面色萎黃右關脈弦大按之微細此脾胃虛弱肝木所乘也先用六君升麻柴胡四劑元氣漸復乃佐以托裡散而愈一小兒腿外側痛腫肉色如故用托裡消毒散二劑而腫始赤又四劑而腫赤亦退又六劑潰而膿出清稀食少體倦用異功散加芎歸仍用托裡散補其元氣而愈一小兒漫腫堅硬肉色不變此陽氣虛而不能成膿也用托裡散如聖餅腫起色赤用托裡消毒散而膿成針之用八珍湯加肉桂漸愈因傷食吐瀉患處夭白飲食少思先用六君乾薑次用八珍湯及蔥熨法而愈一小兒患此久不愈膿水清稀面色痿黃腹大青筋此脾氣虛而肝所侮也朝用補中益氣湯夕用五味異功散元氣稍復乃佐以四味肥兒丸及蔥熨之法兩月餘而愈一小兒腿外臁腫一塊服消毒之藥其腫益甚肢體羸瘦飲食少思更加作痛余曰先腫而後痛者形傷氣也先痛而後腫者氣傷形也當補接陽氣不信仍投疏泄之藥後果歿機要云榮衛之氣充滿抑遏不能行故閉塞氣血腐而為癰者當泄之以奪盛熱之氣若人飲食疏精神衰氣血弱肌肉消薄故榮衛之氣短促而澀滯故寒搏腠理閉鬱而為癰者當補之以接虛怯之氣信矣四味肥兒丸治肝脾不和患瘡瘍久不愈或兼疳症腹脹作瀉或食積脾疳發熱瘦怯遍身生瘡黃連炒蕪荑神麯麥芽炒各等分上為末水糊丸桐子大每服一二十丸空心白滾湯送下附子餅治潰瘍氣虛不能收斂或風邪所襲氣血不能運於瘡口以致不能收斂者用炮附子去皮臍研末以唾津和為餅置瘡口上將艾壯於餅上灸之每日灸數壯但令微熱勿至熱痛如餅炙乾用唾津再和灸之以瘡口活潤為度六君子湯治瘡瘍因脾氣虛弱不能生肌以致瘡口不斂若脾氣既充而瘡口不能生肌肉者此寒邪所襲也更用豆豉餅或附子餅熨之仙方活命飲托裡消毒散二方見熱毒瘡瘍蔥熨法如聖餅二方見流注內托羌活湯方見臀癰五味異功散方見用敗毒之藥附子餅方見腹癰十全大補湯方見便癰補中益氣湯方見肌肉不生八珍湯即四君四物豆豉餅方見腋癰鶴膝風鶴膝風者其腿漸細其膝愈粗狀如鶴膝是以名之此因稟腎經不足外邪所乘而患之初則膝內作痛外色不變伸屈艱難若一二月間焮腫色赤而作膿者可治腫硬色白而不作膿者難治初起者用大防風湯為主佐以益氣養榮湯膿成者用補中益氣湯為主佐以大防風湯切勿用十宣流氣等藥若不潰不斂或發熱等症者須調補脾胃為善否則必變敗症矣一小兒九歲患此作痛用蔥熨法及大防風湯腫起色赤用仙方活命飲補中益氣湯間服腫漸消又以獨活寄生湯與補中益氣湯間服二三日用蔥熨一次至兩月餘而消一小兒患此大潰不斂體倦食少口乾發熱日晡尤甚此脾氣虛甚也用補中益氣湯五劑以補元氣乃用大防風湯一劑以治其瘡如是月餘諸症悉退遂用十全大補湯佐以大防風湯而斂一小兒患此潰而不斂不時寒熱小便赤澀此血氣虛也用十全大補湯加麥門冬五味諸症頓退乃去桂令常服佐以和血定痛丸而愈一女子左腿作痛服流氣飲之類左膝腫硬頭暈吐痰余謂此鶴膝風也其脈弦數而無力乃稟賦肝脾腎三經之症此形氣病氣俱虛者當先調脾胃為主不信仍攻邪氣諸症蜂起余先用五味異功散加升麻乾薑肉桂脾氣稍健又用異功散八珍湯而潰卻間服大防風湯地黃丸而痊一小兒兩膝漸腫敷服皆消毒之藥足頸赤腫此稟父腎氣不足用地黃丸八珍湯而消若用流氣敗毒等藥必致不起大防風湯治鶴膝風腫痛不消或潰而不斂附子炮牛膝酒炒各一錢白朮羌活人參防風各二錢杜仲去皮薑製川芎肉桂去皮黃耆炒熟地黃自制芍藥炒各一錢五分甘草一錢上每服三五錢水煎仍量兒大小用之益氣養榮湯治氣血虛弱四肢頸項等處患腫不問腫潰日久不斂俱宜服之人參茯苓陳皮貝母香附炒當歸酒洗川芎黃耆炒熟地黃自制芍藥炒各一錢甘草炙桔梗各五分白朮炒柴胡六分上每服二三錢姜水煎獨活寄生湯獨活桑寄生杜仲炒細辛牛膝酒炒去土秦艽茯苓白芍藥桂心川芎防風甘草人參熟地黃當歸各等分上每服二三錢水煎空心乳母同服八珍湯方見發熱不止十全大補湯方見便癰補中益氣湯方見肌肉不生和血定痛丸蔥熨法二方見流注
