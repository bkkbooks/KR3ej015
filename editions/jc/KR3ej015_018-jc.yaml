body:
  text: 卷十八不靨悶亂哽氣腹脹之症陳文宿先生云痘瘡十一日至十二日當靨不靨身熱悶亂不寧臥則哽氣腹脹泄瀉寒戰咬牙急用異功散加木香當歸以救陰陽表裡助其收靨竊謂前症若手足並冷屬脾胃虛寒宜用十二味異功散手足微冷屬脾胃虛弱宜用五味異功散加木香若手足熱大便秘屬脾胃實熱宜用清涼飲救其陰以抑其陽一小兒痘寒戰咬牙瀉渴腹脹手足冷時仲夏飲沸湯口不知熱先君謂脾氣虛寒用十二味異功散一劑頓安又用五味異功散調補而愈再用參耆四聖散而痊一小兒痘不結痂發熱飲湯哽氣腹脹此脾氣虛弱用五味異功散參耆四聖散而愈後噫氣下氣欲服枳殼之類余謂噫氣屬心火虛下氣屬脾氣虛朝用六君子湯加薑桂夕用補中益氣湯而愈一小兒哽氣喘咳腹脹下氣手足不冷不熱此脾虛不能攝氣而腹脹下氣肺虛不能攝氣而哽氣喘咳用五味異功散加升麻而愈一小兒痘將愈足冷哽氣腹痛手冷至腎唇青面白屬脾胃虛寒也用五味異功散加附子二劑足稍溫又用六君薑桂一劑諸症漸退乃去薑桂服之而痊一小兒痘不結痂作渴飲冷大便秘結此腸胃有熱也先用清涼飲末一錢大便和而頓靨又用人參麥門冬散八珍湯而痊一小兒痘不結痂用補中益氣湯地黃丸料煎服而愈次年畢姻後寒熱作渴頭暈脈洪數按之微細此脾腎虛火上炎也以前藥各加肉桂五分引火歸經而愈一小兒痘不靨發熱因乳母有肝火用加味逍遙散人參白朮散母子俱服而熱止又用柴胡麥門冬散而痊一小兒十五歲久而結痂寒熱往來脈洪數按之無力用十全大補湯而痊後因勞寒熱復發用補中益氣湯而安六君子湯治脾氣虛弱或因克伐之劑虧損中氣飲食少思或痘瘡不起發灌漿結痂人參白朮炒茯苓陳皮炒半夏湯洗甘草炒各等分上三五錢薑棗水煎徐徐服四君子湯即六君子湯去陳皮半夏四順清涼飲王海藏先生云痘疹膿貫而不焦者由治失清涼之法內外熱毒無以收斂譬如五穀得陽氣而成熟得陰氣而結實用清涼飲子下之方見大便不通十二味異功散方見頂陷灰白人參麥門冬散方見發熱口渴柴胡麥門冬散方見作癢搔破加味逍遙散方見欲靨不靨補中益氣湯五味異功散二方見寒戰咬牙參耆四聖散十全大補湯二方見腹脹氣促人參白朮散即七味白朮散地黃丸二方見發熱屬陰屬陽兩目生翳痕黯凹凸之症陳文宿先生云痘瘡十二日至十三日瘡痂漸落其瘢猶黯或凹或凸肌肉尚嫩不可澡洗並忌五辛煎煿之物恐熱毒上熏肝膈眼生障翳或有是患用穀精草散治之竊謂前症目為肝之竅或肝經風熱或肝經血虛或肝經風熱相搏或肝疳內熱或乳母肝經有熱或食膏粱厚味故多犯其目若失於早治多成廢疾一小兒出痘兩目不開先君謂肝經有熱用消毒化癍湯母子服之而愈一小兒兩目不開先君謂肝經熱毒先用柴胡麥門冬散又用四物湯加山梔而愈一小兒痘瘡目赤腫痛此肝火為患用柴胡麥門冬散穀精散而愈一小兒痘將靨目不開脈浮而無力右關按之緩弱此脾氣虛耳用補中益氣湯加蔓荊子二劑去蔓荊子又數劑而愈後每勞役目中作脹不能開合朝用補中益氣湯夕用五味異功散而愈一小兒眼痛不開屬肝經風熱用柴胡麥門冬散犀角地黃湯加柴胡各一劑開而見赤翳迷漫仍用前藥加穀精草而愈一小兒出痘目閉二十餘日用清肝解熱之藥兩目雖開其睛已傷此失於早治也一小兒目中出痘作痛肝脈弦洪有力先用小柴胡加龍膽草生地黃一劑而痛稍止乃用四物柴胡山梔一劑痛全止再用加味逍遙散蟬菊散而愈一小兒目中出痘肝脈弦數此木火相搏用四物山梔牡丹皮柴胡二劑再用加味逍遙散二劑肝脈平和又用四物牡丹皮而靨但目有青翳用蛇蛻散三味穀精草散而痊一小兒素食膏粱目中出痘作痛口渴大便堅實左右關洪數有力弦長此形病脈俱實先用柴胡梔子散瀉黃散各一服又用柴胡梔子散柴胡麥門冬散而痊一痘兒眼不開肝脈數按之有力用柴胡梔子散子母服之眼漸開又因母勞怒仍閉用加味逍遙散而愈後復閉用柴胡麥門冬散而痊一小兒目中生翳診其肝腎疳症用九味蘆薈丸六味地黃丸及粉丹散翳漸退又用柴胡麥門冬散而痊羊肝散治痘瘡入眼或無辜疳入目密蒙花青箱子決明子車前子上為末用密蒙花末三錢余藥各一錢以羊肝一葉薄批摻上濕用紙裹煨熟空心食之蛇蛻散治痘毒目翳蛇蛻二錢為末栝蔞仁五錢研爛上為末用羊肝一片批開入末二錢用線紮緊米泔煮熟頻與兒食外用粉丹散三味穀精草散治痘疹翳膜遮睛瘴瞳子穀精草一兩蛤粉黑豆各二兩上為末用雄豬肝一葉竹刀批開摻藥在內以麻線縛定入砂罐內水煮熟令兒食之蟬菊散治斑痘入眼或病後生翳障蟬蛻洗白菊花各等分上每服一錢水煎入蜜少許量兒服二味穀精草散治痘瘡已靨目翳膜障瞳神隱澀淚出久而不退穀精草一兩生蛤粉二兩上為末用獖豬肝一葉竹刀批片子摻藥在內以綿扎入砂器內水煮令兒熟食之粉丹散即吹耳丹治眼生翳膜輕粉黃丹上為末竹筒吹耳內左眼有翳吹右耳右患吹左耳即退通神散治癍瘡入目內生翳障白菊花綠豆末生用穀精草各等分上為末每服一錢乾柿一個米泔水一盞煮乾末不拘時但食柿餅五七次至七日可見效黃柏膏治痘瘡初出就塗面則痘瘡不生於面目用之若遲雖出亦稀黃柏一兩綠豆甘草各四兩生用上為細末清油調如膏從耳前眼唇面並塗之日三五度羊肝丸治痘瘡入目不能開羯羊肝一具生用黃連炒為末上先將羊肝去筋膜於石器內搗爛入黃連末丸如桐子大每服二三十丸食後茶清送下蟬蛻散治癍疹入目半年已過者一月取效蟬蛻一兩豬懸蹄甲二兩瓦罐內用鹽泥封燒存性上二味為末入羚羊角末五錢每服五分白湯調下九味蘆薈丸治肝經積熱面目生翳耳中出水大便不調肢體消瘦等症方見疳蝕症小柴胡湯方見癍症柴胡麥門冬散方見作癢搔破四物湯方見痘瘡出遲六味地黃丸方見痘瘡發熱屬陰屬陽瀉黃散方見靨後發熱咽痛消毒化癍湯即消毒救苦湯方見夾疹痘加味逍遙散方見欲靨不靨柴胡梔子散即柴胡清肝散方見作癢搔破補中益氣湯五味異功散二方見寒戰咬牙一名小異功散靨後發熱咽痛不利之症陳文宿先生云痘瘡收靨之後渾身壯熱經日不除別無他症用柴胡麥門冬散如不退服人參白朮散若風熱咳嗽咽喉不利用桔梗甘草防風湯竊謂前症有因熱毒未解者有因胃氣虛熱者有因胃氣實熱者其因不能枚舉當臨症制宜而藥之一小兒咽痛壯熱痘痕色赤手微熱此餘毒未解用柴胡麥門冬散而安七日之後復熱手指初捏似熱久捏則冷此脾氣虛也用五味異功散而痊一小兒痘咽痛大便不實口渴飲湯手足不熱此脾胃虛弱也用人參白朮散而大便實但不時寒熱用加味逍遙散而愈一小兒痘咽痛發熱作渴面赤飲冷此胃經實熱也用射干鼠黏子湯而愈因食厚味復發手足並熱用瀉黃散一劑而痊一小兒痘咽痛發熱飲冷大便黃色手足指熱此脾胃實熱也用瀉黃清胃二散各一劑而愈後因乳母食厚味兒口角流涎不能吮乳仍用前藥治母而愈一小兒痘咽痛足熱余謂此稟足三陰虛而無根之火上炎也古人有云痘歸腎經必不可救當用壯水之劑亦有生者奈彼不悟翌日果腰痛咽啞始信余言乃用大劑地黃丸料加五味子並補中益氣湯而愈一男子出痘上體甚熱兩足俱冷喉痛作渴瘡亦不起發此稟腎經虛熱也以六味地黃丸料煎與恣飲漸愈又與八珍湯而痊一小兒面色素白出痘咽痛發熱面赤作渴飲湯手足指冷此稟足三陰虛也用大劑加減八味丸料煎與恣飲又以益氣湯助其脾胃以滋化源痛止熱退而愈射干鼠黏子湯治痘疹咽喉作痛及痘疹後癰疽瘡毒鼠黏子即牛蒡子甘草升麻射干各二錢上水煎量服之瀉黃散治脾胃實熱患瘡口渴飲冷藿香葉七葉石膏煅五錢甘草三錢防風山梔仁炒各一兩上為末每二錢水煎入蜜少許嬰兒乳母服之六味地黃丸方見痘瘡發熱屬陽屬陰清胃散方見痘不結痂八珍湯方見頂陷灰白人參白朮散即七味白朮散柴胡麥門冬散方見作癢抓破加減八味丸即六味丸加五味子肉桂加味逍遙散方見欲靨不靨五味異功散補中益氣湯二方見寒戰咬牙頂陷心煩狂躁氣喘之症陳文宿先生云痘紫色頂陷心煩狂躁氣喘妄語或如見鬼神內熱便秘者宜用龍腦膏子豬尾膏如無內熱大便不實不可輕服竊謂前症多因初起熱盛之時失於解利所致亦有因痘毒未盡有因胃經有熱有因肺胃有熱有因心脾有熱煩躁痘裂出血便血衄血屎黑痕赤詳見各症大凡作渴發熱手足指冷或大便秘結者內有熱也切不可禁其飲水觀張子和述水中兒事良可驗矣蓋熱極故得水而生也一小兒痘症狂喘熱渴飲冷痰涎不利先君用十六味清膈飲犀角地黃湯而痊一小兒痘紫發熱小便不利手足發熱此肺經有熱用人參清肺飲小便隨利又用犀角地黃湯而靨一小兒痘紫作渴手足並熱余謂胃經有熱用竹葉石膏湯一劑諸症頓退而愈用人參白朮散而痊一小兒痘紫作痛又頂欲陷發熱飲冷作渴痰喘小便秘結此肺胃有熱用十六味清膈散一劑諸症頓減又用葛根麥門冬散一劑而愈一小兒出痘發狂作渴飲冷此上焦熱熾也用黃連解毒湯芹菜汁而止又用紫草快癍湯將靨因間藥餌三日色黑倒靨用紫草散渴止又用人參白朮散而痊一小兒出痘喘咳面赤其脈洪數右寸脈尤甚此心火克肺金用人參平肺散以清心肺再用地黃丸以壯腎水喘嗽頓止一小兒痘將愈喘躁作渴面赤此稟足三陰虛也用地黃丸料數劑諸症稍可又佐以益氣湯諸症漸愈後因沐浴出汗仍喘咳煩躁面赤脈洪大按之如無此汗多亡陽也用當歸補血湯而愈畢姻後喘咳音啞用地黃丸益氣湯各百餘劑得遠幃幕而生一小兒痘愈後時發狂兼喘發過面色黃白手足並冷此脾胃虛弱也余用補中八珍二湯各三十餘劑或云當先降火邪而後補元氣乃服芩連朴硝之類汗吐不止而歿十六味清膈散治涕唾稠黏喘嗽痰盛身熱鼻乾大便如常小便黃赤人參柴胡當歸芍藥知母桑白皮白朮黃耆紫菀地骨皮茯苓甘草桔梗黃芩炒半兩石膏煅滑石上每服三錢姜水煎量兒服之葛根麥門冬湯治痘疹胃經熱甚頭疼悶煩或痘後餘毒麥門冬乾葛人參赤芍藥升麻茯苓各二分石膏末五分甘草二分上水煎服犀角地黃湯治鬱熱不解氣血湧為衄血或流入胃脘而吐血或余血停滯面色痿黃大便色黑犀角生地黃白芍藥牡丹皮各一錢上水煎乳母同服人參平肺散治心火克肺金傳為癰痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參陳皮甘草地骨皮茯苓各一錢知母五味子各一錢青皮四分天門冬去心四分桑白皮上水煎徐徐服竹葉石膏湯治痘瘡胸中煩悶小便赤澀口乾作渴兼有赤癍又宜服犀角散方見泄瀉咬牙龍腦膏子治時氣踠痘瘡及赤疹子未透心煩狂躁氣喘妄語或見鬼神或已發而陷伏宜速治否則毒入臟必死生龍腦上研細滴雄豬心血丸綠豆大每服一丸心煩狂躁紫草湯下瘡陷伏溫酒化下一方加辰砂五分尤妙服後少時心神清爽得睡瘡疹發透豬尾膏治痘瘡黑陷倒靨用小豬尾尖刺血兩三點入腦子少許辰砂末一錢同研膏以木香湯化下紫草快癍湯治痘疹下血不止不能發出血氣不足色不紅活等症即紫草湯紫草人參白朮茯苓當歸川芎芍藥木通甘草糯米上每服二錢水煎人參清肺散方見痘喘八珍湯方見頂陷灰白瀉渴黃連解毒湯方見癍症地黃丸即六味地黃丸人參白朮散即七味白朮散二方見發熱屬陰屬陽補中益氣湯當歸補血湯二方見寒戰咬牙作癢抓破膿水淋漓之症陳文宿先生云痘瘡作癢抓破成瘡膿水淋漓者由氣血衰肌肉虛也宜用木香散加丁香肉桂及敗草散切忌用牛糞灰竊謂前症皆因氣血虛弱所致預為調護使氣血和平庶無此患又必察其外症色白者用四君之類色赤者用四物之類若因鹹味宜用蟬蛻散之類一小兒口乾作渴脈浮而數此血氣虛而有熱也用參耆四聖散加蟬蛻而癢止用托裡散加蟬蛻而膿貫又用托裡散將靨忽發熱作渴而癢此血虛也用八珍湯當歸補血湯而愈一小兒痘赤作癢脈弦按之則數此乃肝火血燥生風先用柴胡麥門冬散加蟬蛻而癢止又用托裡散而痂脫後仍癢痕用八珍湯倍加參耆而愈一小兒痘瘡作癢色赤心肝二脈數而弦此風熱相搏而血熱也用四物黃連柴胡丹皮而癢止用八珍湯當歸補血湯而瘡愈一小兒痘後作癢夜甚不寐此脾經氣血俱虛用四君歸耆數劑而止後傷食作瀉復癢不寐仍用前藥及五味異功散而愈一小兒痘瘡愈後身癢膿水淋漓內熱口乾用四君歸耆及補中益氣湯並六味地黃丸而痊一小兒痘痕作癢服祛風藥遍身皆癢膿水淋漓口噤發搐而面色皎白此氣血俱虛余用大補湯參耆四聖散而愈一小兒痘瘡已愈而犯色欲遍身作癢痘痕赤色氣息奄奄脈洪數無力左尺為甚先用大補湯內用人參五錢數劑形氣稍復佐以大劑加減八味丸料又五十餘劑而痊一小兒痘將靨身癢脈浮數按之無力此真氣不能榮於腠理用補中益氣湯漸愈因功課勞心自汗用六味湯而愈後煩躁面赤自汗如雨用當歸補血十全大補二湯而愈一小兒汗出如雨手足發熱作渴飲冷右關洪數有力此胃經實熱也用清胃散一劑頓退因食膏粱復癢發熱飲冷用瀉黃散末一錢渴止又用白朮散去木香而痊一女子靨後身癢脈浮大此脾肺氣虛也朝用補中益氣湯夕用黃耆六一湯而愈經行復癢發熱用加味逍遙八珍湯而痊一男子痘愈而入房身癢昏憒脈大而無倫次按之如無用獨參湯十五劑而蘇又大補湯二十餘劑脈斂又二十餘劑脈微細而畏寒此火歸經又五十餘劑而痊一婦人痘方愈因勞發癢服消風散口噤流涎余謂此日元氣復傷不信乃服前藥更四肢發搐余用十全大補加味逍遙而愈一小兒痘愈後作癢服消風散四肢發搐口噤流涎余謂脾土虧損而肝木所克果歿一小兒痘膿未滿面赤作癢余謂氣血虛而有熱欲行溫補不信乃服清熱之藥而歿柴胡麥門冬散治肝膽經有熱靨後不解柴胡麥門冬各一錢人參玄參龍膽草各五分甘草炒上水煎量兒大小服參耆四聖散治痘瘡不能長滿生膿或色白作癢方見腹脹氣促五味異功散治痘瘡元氣虛弱肌肉消薄榮衛短促而患瘡瘍不能消散或脾肺氣虛不能生肌收口大凡諸症因脾氣虛而不能愈者皆宜服之調補元氣則自愈矣方見寒戰咬牙黃耆六一湯治瘡瘍後氣虛作渴愈後作渴尤宜服之黃耆炙六錢甘草炙一錢上水煎服柴胡梔子散治肝膽經有熱瘡毒不愈或發熱不止柴胡山梔牡丹皮各一錢川芎芍藥茯苓各七分白朮炒甘草各五分當歸牛蒡子炒各七分上水煎母子同服十全大補湯獨參湯參耆四聖散治痘瘡不起不能長滿生膿或作癢方見腹脹氣促補中益氣湯治痘瘡中氣虛弱或因克伐以致身癢惡寒發熱煩渴體倦飲食少思或不能結痂作癢者當歸補血湯二方見寒戰咬牙加味逍遙散方見欲靨不靨四君子湯方見不靨悶亂六味地黃丸方見痘瘡發熱屬陰陽四物湯方見痘瘡出遲瀉黃散方見靨後發熱咽痛托裡散方見痘癰加減八味丸即六味丸加用五味子肉桂八珍湯即四君四物二方相合清胃散方見痘癰風邪搏於肌肉患疳蝕之症陳文宿先生云痘疹已靨未愈之間五臟未實肌肉尚虛血氣未定忽被風邪搏於肌肉膚肌之間則津液澀滯故成疳蝕瘡也宜用雄黃散綿繭散治之久而不愈則潰蝕筋蝕以致殺人竊謂雄黃散清肝殺蟲解毒綿繭散治膿水淋漓皆治外之良方內無餘毒者宜用此法若因肝脾疳火上炎或食甘肥而胃火內動或手足陽明經蘊熱或腎經虛熱各有不同皆元氣不足病氣有餘乘虛而發也焮痛作腫用仙方活命飲大蕪荑湯疳熱為患用大蕪荑湯四味肥兒丸腎經虛熱用地黃丸當臨制宜分五臟相勝審乳母之氣何如扶助胃氣為善一女子患疳症因浴熱湯發熱如炎體強如痓此腠理間泄邪熱乘虛而內作用十全大補湯一劑頓安同時亦有患此症不用補劑者甚至不救一小兒痘後遍身津淫作癢此兼因疳為患用大蕪荑湯及蟾蜍丸而愈後作渴口中作痛用蟾蜍丸人中白散而安一小兒痘後毒蝕腮余謂肝脾有熱助疳而患也用大蕪荑湯大蘆薈丸為主以五味異功散為佐月餘漸愈卻以五味異功散佐以大蕪荑湯而痊一小兒臀間痘毒蝕爛恪敷雄黃散益甚余謂兼肝脾疳也先用大蕪荑湯活命飲各二劑又用九味蘆薈丸為主以五味異功散為佐月餘諸症漸愈一小兒患前症發熱作渴兩足晡熱余謂稟腎經陰虛不信恪服清熱敗毒而歿一小兒痘出甚密先四肢患毒膿潰而愈後口患疳延蝕牙齦余先用大蕪荑湯活命飲各一劑又用蟾蜍丸人中白散而安一小兒痘毒蝕陷敷雄黃散服加味解毒散而愈一小兒臉患之作痛用仙方活命飲又敷雄黃散大蕪荑湯而愈韶粉散治痘瘡毒氣未散瘡痂雖落其瘢猶黯或凹或凸此藥塗之韶粉一兩輕粉一兩上煉豬脂油拌勻如膏塗之如痘痂欲落不落當用後方羊𩩅骨髓上入輕粉研成膏塗之如痘癢搔成瘡及瘡痂欲落不落用上等白蜜塗之其痂自落亦無瘢痕神效雄黃散治痘毒牙齦生疳蝕瘡雄黃一錢銅綠二錢上研細量瘡大小乾摻綿繭散治痘毒蝕瘡膿水不絕出蛾綿繭不拘多少上用生礬末碎貫繭內以炭灰燒礬汁干取出為末干貼之九味蘆薈丸治痘毒成疳齒蝕爛齦或透頰腮或肝脾疳熱結核耳內生瘡兩目生翳耳中出水或小便出津拗中結核或大便不調肢體消瘦等症胡黃連宣黃連炒蘆薈木香白蕪荑炒青皮白雷丸鶴蝨草各一兩麝香三錢上各另為末糊丸麻子大每服半錢空心米湯下仍量兒用之大蕪荑湯一名梔子茯苓湯治痘瘡上攻口齒成疳發熱作渴大便不調發黃脫落面黑便清鼻下生瘡乳食嘔吐等症山梔仁三分黃柏甘草炙各二分大蕪荑五分黃連麻黃根一分羌活二分柴胡三分防風一分白朮茯苓各五分當歸四分上水煎服導赤散生地黃木通甘草各等分上為末每服一錢淡竹葉水煎敗草散治痘瘡撾搔成瘡膿血淋漓用屋爛草或蓋牆爛茅年遠者佳如無曠野生者尤佳為末搽之如遍身患者須多摻鋪席上令兒坐臥其瘡即愈丹粉散治痘毒膿水淋漓輕粉黃丹各一錢黃連末三錢上研勻搽患處立效散治一切胎毒瘡疥及風疹痛大黃黃柏山梔寒水石煅各等分上為末用清油燭調搽若破而膿水淋漓用當歸膏大楓膏治一切瘡疥大楓子肉研膏黃連各二兩真輕粉枯礬蛇床子各一兩柏油六兩上各另為末入大楓膏和勻更入柏油杵百餘即成膏矣每用少許塗患處加味小柴胡湯方見癍疹加味逍遙散方見欲靨不靨人參平肺散犀角地黃湯二方見頂陷心煩柴胡梔子散方見作癢抓破三黃散方見癍爛八珍散方見頂陷灰白地黃丸方見發熱屬陰陽十全大補湯方見腹脹氣促補中益氣湯當歸補血湯五味異功散竹葉石膏湯四方見泄瀉咬牙四味肥兒丸加味解毒散人中白散東垣消毒救苦湯四方見夾疹痘蟾蜍丸清胃散仙方活命飲三方見痘癰癍症陳文宿先生云癍疹之症俗言疹子是肺胃有熱或時氣所作發於皮膚遍體狀如蚊蚤所咬凡色赤者十生一死色黑者十無一生錢氏云癍症初發類似傷寒發熱五六日或七八日而出或乍涼乍熱或咳嗽泄瀉不食面赤眼光如水生眵或噴嚏痰涎或熱渴乾嘔或大便急而小便澀余竊謂前症若身熱煩渴者用升麻湯自汗煩渴者化癍湯煩瀉熱瀉白虎蒼朮湯熱盛譫語導赤散咳嗽不已生地黃散吐血衄血或大小便血犀角湯喉間作痛甘桔防風湯咽喉腫痛玄參升麻湯乍涼乍熱小柴胡湯喘嗽不已柴胡五味子湯小便不利柴苓湯熱盛乾嘔解毒湯停食嘔吐或腹脹作瀉平胃散大便不利加枳實飲食已消或仍作嘔四君子湯大便秘或喘滿者先用前胡枳殼湯下之乃用春澤湯瘥後熱毒不除葛根黃連湯餘毒成瘡射干鼠黏子湯消毒飲又有夾痘而出者其勢最速乃血乘其勢而為患也如大便硬用清涼飲少許下之癍退四君歸耆固其元氣肢體疼痛用活命飲一服殺其毒氣仍用托裡散治之一小兒七日不消頭痛發熱防其內熱此表邪未解用葛根麥門冬湯一劑頓解再劑而痊一小兒惡寒發熱頭痛拘急先用人參羌活散一劑外邪頓散又用五味異功散而安一小兒月餘不消增寒壯熱頭痛拘急此表邪未解也用人參敗毒散一劑而表邪退再用惺惺散而痊一儒者年踰二旬患前症煩渴飲冷用竹葉石膏湯化癍湯各一劑熱渴頓愈用快癍湯痘瘡頓起用八珍湯而痊一產婦患此乃風熱所致用惺惺散而風熱散用六味活血湯而瘡起發用八珍湯而痊一小兒患此鼻塞聲重發熱身癢用人參消風散而表症愈後發熱搔破膿水淋漓脈浮大按之無力此脾胃氣虛不能榮於腠理朝用補中益氣湯夕用黃耆六一湯而愈後因感冒服表散之劑煩躁發熱面目俱赤脈大而虛用當歸補血湯而痊一小兒發熱作渴二便秘澀用大連翹飲二便隨通但嘔吐痰涎腹痛不食此邪氣去而真氣復傷也用五味異功散而痊惺惺散治風熱時氣瘡疹頭疼壯熱目澀多睡咳嗽喘粗桔梗真細辛人參甘草白茯苓川芎白朮各五分薄荷上水一盞姜三片煎服黃連解毒湯治疹毒吐血乾嘔黃連黃柏黃芩梔子各三錢上水煎量大小服柴胡五味子湯治癍疹喘嗽即小柴胡湯內加五味子小柴胡湯治癍疹乍涼乍熱似瘧喘嗽柴胡三錢人參黃芩各二錢半夏一錢甘草上生薑三片水一盞煎至六分溫服柴芩湯治痘疹小便不利柴胡黃芩豬苓澤瀉茯苓白朮各一錢五分上姜水煎量大小服人參消風散治癍疹等症人參三錢荊芥穗甘草炙陳皮各五錢白殭蠶茯苓防風芎藭藿香蟬蛻各三錢厚朴薑製三錢羌活二錢上每服一錢水煎服人參敗毒散治癍疹發熱惡寒咳嗽等症人參茯苓川芎羌活獨活前胡柴胡枳殼麩皮炒桔梗甘草炒各等分上每服二三錢水煎生地黃散治痘疹煩熱咳嗽生地黃麥門冬各一錢半杏仁陳皮各一錢甘草五分上水煎服忌酒醋鹽酸之物白虎蒼朮湯治痘疹癍症玄參升麻湯化癍湯三方見水痘麻痘升麻葛根湯方見後乾葛麥門冬湯犀角湯二方見頂陷心狂快癍湯方見頂陷心煩六味活血散活命飲二方見痘癰大連翹飲春澤湯人參羌活散葛根黃連湯四方見夾疹痘五味異功散當歸補血湯補中益氣湯三方見寒戰咬牙黃耆六一湯方見作癢抓破竹葉石膏湯方見泄瀉咬牙射干鼠黏子湯方見靨後發熱甘桔防風湯方見痘寒戰前胡枳殼湯方見痘涕唾稠黏四君子湯方見不靨悶亂四順清涼飲方見大便不通水痘麻痘陳文宿先生云水痘之症身熱二三日而止或咳嗽面赤眼光如水或噴嚏咳唾稠黏與痘不同易出易靨不能為害湯民望先生云麻痘乃天行時氣熱積於胃胃主肌肉故發於遍身狀如蚊子所齧色赤者十生一死色黑者十死一生此症亦與癍症不同其癍症如錦紋而但空缺處如雲路之狀麻症乃遍身而無空處但以疏密之不同耳麻痘初出咳嗽煩悶嘔逆清水眼赤咽喉口舌生瘡用黃連杏仁湯若催出而成癍爛如錦紋或膿水腥臭心胸咳悶嘔吐清水不時身熱用黃芩知母湯初起發熱疑似之間可服升麻湯然麻症始終宜用麻黃湯表之痘症表與下皆不可大抵發熱煩渴用升麻葛根湯發熱咳嗽人參麥門冬湯發熱煩躁小便不通大連翹飲冬寒腠理閉塞葛根橘皮湯一小兒患之發熱作渴遍身作痛大小便乾澀此熱毒鬱滯於內用葛根麥門冬湯一劑頓安又用解毒湯而愈一小兒患此身痛發熱煩躁此風邪搏於表也用玄參升麻湯諸症頓解但倦怠發搐此脾虛為肝所侮也用和肝補脾湯而安一小兒患此腹痛煩渴面赤咳嗽痰涎用升麻湯一劑遍身如錦用化癍湯一劑而安又用人參麥門冬散而愈一小兒疹隱於肉裡而不現煩渴躁熱衄血吐血或便血用解毒湯犀角湯各一劑而血止又用導赤散而愈一小兒患此寒熱乾嘔先用小柴胡湯加生地黃而寒熱止用解毒湯而發用生料四物湯而痊愈一小兒患此五日不消發熱煩躁右關脈洪數而有力此胃經實熱先用化癍湯一劑又用參滑散而愈三豆飲治天行痘瘡始覺即服之多者必少少者不出小赤豆黑豆綠豆各一百粒甘草節五錢上水煮熟任食之七日自不發參滑散治水痘地骨皮麻黃去節一分人參滑石大黃煨一分知母羌活甜葶藶炒一分甘草炙半分上為末每服半錢水一小盞小麥七粒煎數沸每服三五匙不可多服按前方發表散邪疏通內熱之峻劑若遍身作痛壯熱煩躁作渴飲冷大便秘結小便澀滯喘嗽等症宜用此方然水痘多屬表邪或發熱引飲小便赤澀者當用升麻葛根湯知無他症不必用藥和肝補脾湯治風熱瘡疹脾土不及肝木太過人參陳皮川芎各五分白朮茯苓芍藥各七分柴胡甘草炙各三分山梔炒四分上作二劑水煎服白虎蒼朮湯石膏四錢蒼朮一錢五分知母一錢甘草五分粳米一撮上水煎服黃連杏仁湯治麻痘漸出咳嗽煩悶嘔逆清水眼赤咽喉口舌生瘡作瀉黃連一兩陳皮麻黃去節杏仁去皮尖麩炒枳殼炒葛根各五錢上每服二錢作瀉者加厚朴甘草黃芩知母湯治麻症癍爛隱疹如錦紋或膿腥臭心胸閉悶嘔吐清水溫壯不時葛根知母洗黃芩麻黃去節陳皮杏仁去皮尖甘草各等分上每服二錢若不嘔逆去陳皮加芍藥如吐則用之升麻葛根湯治瘡疹初起發熱咳嗽似傷寒未辨麻疹白芍藥川升麻甘草乾葛各等分上水煎每服三錢化癍湯治癍疹渴熱最良人參知母各一錢甘草五分石膏末四錢上加粳米一撮水煎量服之葛根橘皮湯治發癍煩悶嘔吐清汁兼治麻痘等症葛根陳皮杏仁去皮尖麻黃去節知母炒甘草黃芩各半兩上每服二三錢水煎玄參升麻湯治癍疹已發未發或身如錦紋甚則語言煩躁喉閉腫痛玄參升麻甘草炙各等分上每服二三錢水煎服烏梅丸烏梅三十個酒浸肉研爛細辛乾薑附子泡各一兩蜀椒四兩黃連一兩當歸四兩上為末烏梅肉與米飯和丸桐子大每服數丸白湯下羌活散即人參敗毒散加天麻地骨皮葛根麥門冬湯方見頂陷心狂升麻葛根湯方見痘寒戰解毒湯小柴胡湯二方見癍症人參麥門冬湯一名麥門冬散方見發熱口渴犀角湯方見頂陷心狂大連翹飲方見夾疹痘四物湯方見癍痘出遲導赤散方見疳蝕之症痘瘡生癰毒之症陳文宿先生云痘疹首尾不宜與水吃若誤與之瘡靨之後其痂遲落或生癰針之而成疳蝕以致難愈蓋脾胃外主肌肉飲水過多濕損脾胃搏於肌膚則津液衰少氣血不能周流凝結不散故瘡痂遲落而身生癰腫也張潔古先生云癰腫發於身前手陽明經也發於四肢足陽明經也丹溪先生云痘癰多是餘毒血熱所致當分上下用藥而以涼血為主大便燥實加大黃如不應當分經絡所屬血氣虛實其膿成否竊謂前症初起未成膿者用活命飲隔蒜灸治而消之欲成膿者用活命飲解而潰之氣血虛者八珍湯實而潰之虛而不能斂者托裡散補而斂之大凡發熱腫痛大便不結用仙方活命飲及隔蒜灸法大便秘結用仙方活命飲加大黃大便已通腫痛未退再用活命飲一服用托裡散補其元氣若發熱倦怠大便調和用補中益氣湯未應亦用隔蒜灸若潰而發熱口乾肢體倦怠用東垣聖愈湯膿水淋漓不時發熱用四君參耆若因乳母肝經血虛發熱用加味小柴胡湯肝脾鬱怒發熱用加味歸脾湯膏粱厚味積熱用加味清胃散如專與涼血用敗毒等藥復傷元氣必致成者不能潰潰者不能斂矣一小兒腿內側患之痛甚作渴大便不通小腹作脹此表裡俱有毒未盡用活命飲加硝黃一服諸症頓退卻去硝黃再劑而痊一小兒左脅近腹患之甚痛惡寒發熱肢體亦痛此餘毒兼外邪也用活命飲加麻黃一服外邪悉退瘡毒亦減仍用前劑去麻黃及聖愈湯而痊一小兒赤腫作痛內服外敷皆寒涼之藥用活命飲一服痛頓止而腫未消此涼藥血凝而然也用六味活血散及隔蒜灸而痊一小兒痘出甚密先四肢患腫余謂脾經熱毒用活命飲之類而愈後患口疳流涎牙齦蝕傷用大蕪荑活命飲各二劑卻用蟾蜍丸搽人中白散而愈一小兒臂患腫痛色赤此欲作膿也用托裡消毒散二劑而膿成又二劑而膿潰用托裡散將愈而發熱惡寒用十全大補湯而愈一小兒兩腿臂膝俱腫不能舉動而痛用黃豆末熱水調敷服活命飲而消一小兒痘毒潰而腫不消煩躁作渴小便如淋手數尋空此肝脾虛熱也用八珍湯加減八味丸料各二劑而安又用大補湯而愈一小兒痘毒腿膝腫此脾腎虛而毒流注也用如聖餅及活命飲四劑腫痛頓減再用益氣湯地黃丸而痊一小兒腿膝腫潰膿水不止晡熱體倦先君謂元氣復傷陰虛所致用補陰八珍湯地黃丸而愈一小兒痘毒敷寒涼藥內潰不愈清膿甚多此元氣虛也朝用益氣湯夕用八珍湯各五十餘劑佐以豆豉餅而愈一小兒腮患毒用活命飲腫痛已退肢體甚倦此邪氣去而元氣虛也用聖愈湯元氣少復用托裡散而痊一小兒左耳下連項赤腫作痛此少陽膽經火症用梔子清肝湯治其母用活命飲治其子而痊後復作誤服敗毒散潰而不斂瘡口色白余用托裡散而痊一小兒出痘七日寒熱作渴兩脅及臂外患痘疔此屬膽經也挑出黑血以小柴胡湯加生地黃一劑熱渴頓止又用活命飲而痊一小兒患此面腫肉色如故脈浮而大按之微細余謂此元氣虛而邪從之也當補元氣為善不信乃服犀角丸化毒丸而歿神效隔蒜灸法治痘癰大痛或麻木痛者灸至不痛不痛者灸至痛其毒隨火散用大蒜頭切三分厚安上用小艾炷於蒜上灸之每五壯易蒜再灸痛不止尤宜多灸小兒須將蒜切片著肉一面略剜小空灼艾燃蒜先置大人臂上試其冷熱得宜然後著瘡上又別灼如前法試之以待相易勿令歇仙方活命飲治痘疔痘毒及一切瘡毒未成即消已成即潰此消毒敗膿止痛之聖藥金銀花陳皮各三錢皂角刺炒穿山甲用蛤粉炒乳香沒藥白芷防風當歸各一錢貝母天花粉甘草節各七分上每服五錢酒煎嬰兒母同服為末酒調服亦可若勢甚而邪在表者加麻黃散之而毒在內者加大黃下之當臨症制宜此解毒回生起死之劑但元氣脫者不治六味活血散治癰疽瘡痛初起紅腫不散當歸川芎赤芍藥生地黃紅花蘇木各等分上水煎量服之托裡散治痘毒元氣虛弱不能潰散未成用之自消已成用之自潰人參黃耆炒各二錢當歸酒洗白朮陳皮熟地黃茯苓芍藥炒各一錢五分甘草炙五分上三五錢水煎服托裡消毒散治痘毒氣血虛弱不起發腐潰收斂或發寒熱肌肉不生人參黃耆當歸酒洗川芎芍藥炒白朮陳皮茯苓各一錢金銀花連翹白芷各七分甘草五分上每服三五錢水煎東垣聖愈湯治膿潰心煩無寐體倦少食熟地黃自制者佳生地黃各二分人參川芎各二分當歸黃耆各五分上水煎服濟生歸脾湯治脾血虛損健忘驚悸或心氣虛不能攝血歸源以致妄行或吐血下血或因乳母心脾二經有熱瘡不結痂或瘡痕赤色加柴胡山梔即加味歸脾湯人參白茯苓黃耆白朮龍眼肉當歸遠志酸棗仁炒各二錢木香一錢甘草五分當歸身一錢上薑棗水煎母子同服東垣清胃散治胃經有熱齒牙作痛或飲冷作渴口舌生瘡或唇口腫痛焮連頭面或重舌馬牙吐舌流涎若因服克伐之劑脾胃虛熱口舌生瘡或弄舌流涎或嘔吐困睡大便不實者用五味異功散升麻五分生地黃四分黃連牡丹皮各三分當歸梢四分上水煎服嬰兒母亦服替針丸治痘癰膿已成不潰陳壞米一錢硇砂五錢雄雀糞四十九粒真雄雀糞直者是也上為末米粥丸如麥粒大每用一粒黏瘡頭上以膏藥貼之半晌其膿自出若瘡頭透而膿不出或出而愈痛或發熱血氣虛也用托裡散或作嘔吐痰食少體倦脾氣虛也用六君子湯神效太乙膏治一切瘡疽潰爛玄參白芷當歸肉桂赤芍藥大黃生地黃各一兩上㕮咀用麻油四十兩入銅鍋內煎至藥黑濾去渣徐入淨黃丹一斤再煎滴水成珠捻軟硬得中即成膏矣神效當歸膏治痘毒津淫或湯火等症及瘡腐不能生肌收斂者當歸黃蠟生地黃各一兩麻油六兩先將當歸地黃入油煎去渣入蠟溶化候溫攪勻即成膏矣豆豉餅治瘡瘍腫痛或硬而不潰及潰而不斂並一切頑毒毒癤用江西豆豉為末唾津和成餅大如銅錢厚如三四錢置患處以艾鋪餅上灸之未成者即消已成者祛逐餘毒間有不效者乃氣血虛敗之症參疔瘡論灸法用之神功散治瘡瘍初起腫痛者用之可消加血竭更效黃柏炒為末二錢草烏生為末二錢上用漱口水調敷常以漱水潤之飛龍奪命丹治痘疔痘毒痘癰或麻木嘔吐重者昏憒咬牙真蟾酥乾者酒化輕粉各一錢枯白礬寒水石銅綠乳香沒藥麝香各二錢硃砂六錢蝸牛四十二個另研如無亦可上各為末入蟾酥蝸牛或加酒少許糊丸綠豆大每服一丸溫酒或蔥湯送下重者外用隔蒜灸法甚者多灸或著肉灸五福化毒丹治痘毒實熱腫痛生地黃熟地黃天門冬去心麥門冬去心玄參各二兩甘草甜硝各三兩青黛一兩五錢上為末蜜丸芡實大每服一丸白湯化下犀角消毒丸治痘疹餘毒及一切瘡毒生地黃荊芥當歸犀角屑防風牛蒡子杵炒赤芍藥連翹桔梗各七錢薄荷黃芩甘草各五錢上為末蜜丸芡實大每服一丸白湯化下按化毒丹降火涼血解毒寒中之劑消毒丸清熱解毒破血之劑蓋小兒臟腑脆嫩元氣易傷況痘後氣血皆虛豈能勝當此劑若胃氣一傷則未成者不能消散已成者不能腐潰已潰者不能生肌殊不知痘瘡乃臟腑所發遍身之血皆化為膿況此方愈而患此乃脾胃虛怯肌肉消弱榮衛短澀所致治者審之蟾蜍丸蟾蜍一枚夏月溝渠中腹大不跳不鳴身多癩𤸔者上取糞蛆一杓置桶中以尿浸之桶上要干不令蟲走出卻將蟾蜍撲死投蛆中食一晝夜以布袋盛置浸急流水中一宿取出瓦上焙為末入麝一字粳米飯丸麻子大每服二十丸米飲下八珍湯方見頂陷灰白小柴胡湯方見癍症加生地黃山梔即加味小柴胡湯梔子清肝散即柴胡梔子散方見作癢搔破十全大補湯方見腹脹氣喘當歸補血湯補中益氣湯二方見寒戰咬牙六味地黃丸加五味子肉桂名加減八味丸四君子湯方見痘不靨悶亂加味逍遙散方見欲靨不靨加味歸脾湯方見痘疳加味清胃散方見痘不結痂大蘆薈丸方見風邪搏於肌膚人中白散如聖餅補陰八珍湯三方見夾疹痘痘疔痘疔又謂之賊痘或三五枚或五七枚間雜於諸症之間其色紫黯作痛不寧以致諸症蜂起不能貫膿甚至不救乃熱毒勢甚並結也用仙方活命飲如二便秘澀量加大黃遍身拘急加麻黃外必用線針挑破出黑血或吮出毒血以泄其毒余痘才得貫膿否則其毒無從而解必致不起如未應急用隔蒜灸若毒氣甚者或不知痛者不用蒜隔就著肉灼艾灸之若灸後瘡頭紅腫發焮用針挑破出毒血灼艾尤好雖此法未出方書余屢用屢驗者世多用至寶丹之類亦不可恃一小兒有疔二枚諸痘焮赤作癢而不貫先君以針挑破隔蒜灸至五十餘炷而貫又十餘壯而痛止用活命飲末二錢熱血調服出紫血又二服疔毒悉退痘漿悉貫更用犀角消毒散而愈一小兒患痘疔挑出毒血服活命飲而痘愈但疔處或癢或痛用活命飲隔蒜灸而愈用參耆四聖散而靨一小兒痘內有疔數枚雖挑出毒血餘毒不解先君用仙方活命飲一劑徐徐灌之毒解漿貫而愈一小兒患痘疔遍身焮如丹毒內紫色者三枚用活命飲隔蒜灸其勢漸退又用活命飲末二錢漿漸貫更用四聖散犀角消毒散而愈一小兒出痘第七日寒熱作渴兩脅及臂外側膽經各患痘疔先用針挑出黑血乃用小柴胡湯加生地黃一劑熱渴頓止又用活命飲一劑而痊一小兒出痘稠密痛甚色赤翌日變黑索水飲之神思稍清先用活命飲未冷酒調服三錢痛雖稍緩其痘如指色赤腫高又用奪命丹一粒腫痛十減六七又用活命飲末一服溫酒調又得減三四再服而漿貫卻用四聖散而痊犀角消毒散治癍疹丹毒發熱痛癢及瘡疹等症牛蒡子甘草荊芥防風各五分犀角鎊三分金銀花三分上水煎熱入犀角傾出服仙方活命飲飛龍奪命丹隔蒜灸法三方見痘癰四聖散方見腹脹氣促小柴胡湯方見癍症夾疹痘夫疹乃風邪外患痘為胎毒內發二症並作臟腑俱病也二者相雜赤暈發焮痘瘡愈盛誤謂痘出大密多不可救然此乃疹夾痘也當治以人參羌活散疹毒即解痘勢亦退其元氣虧損不能結痂當補脾胃為急也人參羌活散治時氣痘疹兼於發表人參羌活獨活柴胡前胡桔梗茯苓枳殼川芎天麻甘草地骨皮各三分上入薄荷五葉姜水煎服東垣消毒救苦湯治癍疹悉自消化使令不出已出稀者再不生癍十一月立此方隨四時加減通造化明藥性者能之麻黃根羌活防風升麻各五分柴胡川芎藁本葛根酒黃芩生地黃各二分細辛生黃芩各一分黃連酒黃柏紅花少許蘇木當歸身吳茱萸五分白朮蒼朮二分生甘草一分橘皮連翹半分初出減出大盛者加之上每服三五錢水煎熱服人中白散人中白煅一兩黃柏炒黑二錢上為末搽口內如聖餅治一切瘡瘍硬腫不能消散或毒不能解散乳香沒藥木香血竭當歸等分麝香少許上各另為末酒糊和為餅炙熱頻熨患處惡瘡加蟾酥等分四味肥兒丸一名小肥兒丸治食積脾疳目生雲翳口舌生瘡牙瘡腐爛發熱瘦怯遍身生瘡等症或症後患之黃連炒蕪荑炒神麯炒麥芽炒等分上為末水糊丸桐子大每服二三十丸空心白湯下加味解毒散治癍疹癢痛寒熱甚者煩躁譫語並痘毒發熱咽乾犀角鎊五錢連翹炒二錢牛蒡子炒二錢薄荷一錢甘草五分上為末每服一二錢滾湯調下補陰八珍湯即八珍湯加黃柏知母炒黑葛根黃連湯治疹後身熱不除葛根五錢黃連三錢黃芩二錢甘草一錢半上水煎服獨參湯人參一兩薑棗同煎春澤湯人參白朮茯苓澤瀉豬苓上水煎服大連翹飲連翹黃芩瞿麥木通滑石柴胡防風荊芥甘草蟬蛻山梔赤芍藥上每服三四錢水煎服
