body:
  text: 卷二面上症錢仲陽云左腮為肝右腮為肺額為心鼻為脾頦為腎色青主驚積不散欲發風候紅主痰積驚悸黃者食積症傷欲作疳癖白主泄瀉水穀更欲作嘔黑主臟腑欲絕印堂青主初患驚瀉紅主大驚夜啼黑主客忤山根青主二次驚瀉後發躁黑黃甚者死年壽平陷主天青主發熱生驚黑主利死紅主躁死微黃曰平黃甚曰霍亂承漿青主食時被驚黃主吐逆亦主血利黑主驚風面眼黑睛黃主有熱白睛黃主食積疳痐白睛青主驚風黑睛黃主傷寒眉上青吉忽紅主煩躁夜啼黃主霍亂久病紅者死風氣二池青主風候紫主吐逆或發熱黃主吐逆赤主煩躁夜啼兩顴赤主肺有客熱兩太陽青主二次受驚青自太陽入耳者死紅主血淋兩臉青主客忤黃主痰溢赤主風熱兩頰赤主傷寒兩頤青主吐蟲兩金匱青主第三次驚風黑繞口三日死青連目入耳七日死兩風門紅主風熱黑主疝青主水驚黑從眉入耳即日死唇黑不食者死面青眼青肝病面赤心病面白肺病面黃脾病面黑腎病額間赤色主心經有熱煩躁驚悸若飲水或叫哭屬本經實熱用瀉心散以清心火微赤困臥驚悸熱渴飲湯屬虛熱用秘旨安神丸以生心血青黑主驚風腹痛或瘛瘲啼叫用五味異功散加木香柴胡鉤藤鉤補脾肝青黑主心腹作痛此寒水乘心用益黃散微黃主驚疳用安神丸左臉青或兼赤主肝經風熱項強頓悶目札瘛瘲用柴胡清肝散色微赤倏熱咬牙屬虛熱用地黃丸青黑主肝克脾而驚搐腹痛用六君子加薑桂微赤主潮熱血虛心躁先用秘旨安神丸次用地黃丸右臉赤主風邪氣粗咳嗽發熱飲水為實熱用瀉白散若哽氣出氣唇白氣短屬虛熱用五味異功散若脾熱所傳用清胃散心火所刑用人參平肺散淡赤主潮熱心躁或大便堅秘用宣明柴胡飲子以疏導如潮熱未止更用鉤藤飲以清肝色青白主咳嗽噁心先用惺惺散解表邪健脾土更以六君子湯調補中氣色青黑主驚風腹痛盤腸內釣用六君鉤藤鉤平肝補脾鼻微黃為平赤主脾胃實熱身熱飲水乳食如常用瀉黃散清熱理脾微赤主脾經虛熱身涼飲湯乳食少思用五味異功散補中健脾色深黃主小便不通鼻中乾燥氣粗衄血乃脾熱傳於肺腎先用濟生犀角地黃湯後用地黃丸色淡白乃脾虛泄瀉乳食不化用六君子湯調補中氣青色主脾土虛寒肝木所勝用五味異功散加木香炮姜溫中平肝黑為死候頦間色赤主腎與膀胱氣滯熱結而小便不通用五苓散以分利鼻準微黃兼右腮微赤乃脾肺燥熱不能生化腎水用黃芩清肺飲膀胱陰虛陽無所主用滋腎丸若頦間微赤乃膀胱陽虛陰無所化用六味地黃丸若小腹脹滿或陰囊腫脹屬陰虛濕熱壅滯用六味丸加車前牛膝脾肺氣虛不能通調水道者亦用前藥其小便赤色久而尿血亦屬肝腎氣虛有熱用六味地黃丸如不應則用補中益氣湯益脾肺生肝腎若小便後出白津或莖中作痛屬肝經濕熱先用龍膽瀉肝湯後用六味地黃丸印堂青黑主腹痛夜啼此脾氣虛寒也脾為至陰故夜間腹痛而啼用鉤藤飲色淡白主泄瀉乳食不化屬脾氣虛弱用五味異功散加木香人中黃主傷乳胃逆青主下利乳食不化噯氣酸腐此脾虛停滯先用大安丸消食後用異功散健脾黑主蛔蟲咬痛唇色白主吐涎嘔逆或吐血便血乃脾氣虛弱不能攝涎統血歸源急用六君子湯色赤乾燥而皺者主脾經熱渴大便不通煩熱不寐先以清胃散治其熱次以四君黃連山梔調其脾黃主食積泄瀉乳食不化以六君子湯健脾色赤兼白主衄血乃脾肺虛熱不能攝血歸源用聖濟犀角地黃湯清熱補血用四君子湯以補脾氣如久不應用麥門冬散或人參安胃散口畔色黃主脾經積熱用清胃散久病用四味肥兒丸以治疳熱唇口抽動主驚熱不安用異功散加山梔鉤藤鉤補脾平肝若口流涎唇色紫乃脾氣虛寒用異功散加炮薑木香若腹中痛口吐涎乃蟲作痛先用蕪荑散後用調中丸不吐涎是積痛也用異功散手足厥冷用理中湯加烏梅溫補中氣而痛自止或吐後或大便去後而痛止者先用下積丸後用異功散白主失血死青主驚風死黑色繞口者不治耳後微赤此少陽經風熱用柴胡飲子清肝生血微黃主睡中驚悸咬牙用四君子加芎歸升麻以調理脾氣耳乾燥主骨疳蒸熱作渴盜汗用地黃丸若小便後出白津或玉莖癢痛屬肝經濕熱先用龍膽瀉肝湯後用地黃丸若稟賦腎氣不足或早近女色致小便濕滯或作痛如淋者急用地黃丸補中益氣湯滋其化源或大小便去後穀道牽痛者其虛尤甚用前丸加牛膝車前肉桂如手足逆冷或畏寒少食陽氣虛寒也急加附子多可得生大抵多因稟賦臟氣不平或乳食寒暑失節或妊娠乳母飲食起居六淫七情所致若初病元氣無虧乳食如常發熱壯熱二便秘結作渴飲水睡不露睛者悉屬形病俱實當治邪氣若病久元氣已虧食少發熱口乾飲湯嘔吐泄瀉肢體畏寒而露睛者悉屬形病俱虛當補正氣更宜審胎氣之虛實臟腑之相勝而治之庶無誤矣瀉心散方見心臟秘旨安神丸方見心臟五味異功散方見內釣硃砂安神丸方見發搐柴胡清肝散方見諸熱地黃丸方見腎臟症六君子湯方見內釣瀉白散方見肺臟清胃散方見內釣補中益氣湯方見虛羸人參安胃散方見脾臟宣明柴胡飲子方見發熱鉤藤飲方見慢驚惺惺散方見咳嗽瀉黃散方見脾臟五淋散方見五淋濟生犀角地黃湯方見便血發搐錢仲陽云驚癇發搐男左視無聲右視有聲女右視無聲左視有聲此相勝也蓋左為肝部右為肺部金木相勝故耳若寅卯辰時身熱目上視手足動口流涎項強急此肝旺也巳午未時身熱發搐心神驚悸目上視牙緊流涎手足搐動此心旺也申酉戌時身熱微搐而喘目微斜睡露睛手足冷大便淡黃水此肺旺也亥子丑時微搐臥而不安身微熱目緊斜喉中有痰大便色白困睡流涎此腎虛也若握拳拇指在內女為順拇指在外男為順順則易治逆則難愈若涎入心肝則不能言用涼心鎮驚下痰逆搐者不治吐瀉後變症者亦不治如手足冷汗搐眉搐肚日夜不止名真搐當用人參湯川烏全蠍等藥平其胃氣傷風發搐口中氣熱呵欠手足動者名假搐用大青膏發散風邪傷食後發搐身熱困睡嘔吐不思乳食者當先定搐後用白丸子下之百日內發搐真者內生風二三次必死假者外生風雖頻發不死外傷風者用大青膏塗囟門及浴體法寅卯辰時搐而發熱作渴飲冷便結屬肝膽經虛熱用柴芍參苓散作渴引飲自汗盜汗屬肝膽經血虛用地黃丸口吻流涎屬肝木克脾土用六君子湯巳午未時發搐若兼作渴飲水屬風火相搏以地黃丸補肝導赤散涼驚丸治心若作渴飲湯體倦不乳土虛而木旺也用地黃丸以補腎六君子湯以補脾申酉戌時微搐而喘目微斜身似熟睡而露睛大便淡黃屬脾肺虛熱用異功散手足逆冷或喘瀉不食屬脾肺虛寒用六君炮薑木香久病而元氣虛者用六君子六味丸二藥主之亥子丑時微搐身熱目睛緊斜吐瀉不乳厥冷多睡屬寒水侮土用益黃散未應用六君薑桂傷風發搐口氣不熱肢體倦怠用異功散補脾土鉤藤飲清肝木若因風邪內郁發熱而變諸症者當理肺金清風邪若外邪既解而內症未除當理肺補脾若脾經虧損而致驚搐等症者當補脾肺以平肝心則驚搐自止矣若停食發搐嘔吐乳食者宜用消食丸若食既消而前症仍作或變他症者脾土傷而肝木乘之也用六君子加鉤藤鉤以健脾平肝若百日內搐者因胎氣所稟亦有乳母七情厚味所致者當兼治其母而以固胃為先不可逕治其兒也治驗一小兒寅卯時發熱痰搐服抱龍丸而愈後復患因自用前藥更加咳嗽氣喘不時發搐面赤或青黃或浮腫或流涎余謂咳嗽氣喘乃脾肺氣虛不時發搐乃木乘土位面青而黃赤乃肝助心脾浮腫流涎乃脾氣虛弱用益智丸以補心神補中益氣湯以補脾肺頓愈少參王陽湖孫跌傷股骨正體科已續余視其面色青黃口角微動此肝木侮脾之症且氣血筋骨皆資脾土以生但壯脾氣則所傷自愈遂用六君鉤藤當歸三十餘劑諸症悉痊一小兒兩目連札手足發搐服天麻防風丸之類每發飢時益甚得飲食稍定此肝木製脾土也用六君升麻柴胡鉤藤鉤二劑而病痊又用補中益氣湯而全效一小兒巳午時搐熱驚悸發時形氣倦怠面黃懶食流涎飲湯此心火虛而不能生脾土也不信自服涼心之藥更加吐瀉睡而露睛幾成慢脾風用六君薑桂佐以地黃丸而愈一小兒七歲驚搐發熱不已巳午未時益甚形氣殊倦熱定飲湯此心脾氣虛朝用補中益氣湯加益智仁夕用六君當歸鉤藤鉤尋愈後飲食過多復作嘔瀉或治以保和丸反加寒熱發搐此脾土復傷而肝木所侮也用六君柴胡寒熱止而飲食進但午未時仍泄用補中益氣湯加茯苓半夏鉤藤鉤而愈一小兒百日內患搐痰涎自流用驚風藥益甚視其面色黃中隱白乃脾虛不能攝涎也用六君子補中益氣二湯而愈後復患兼氣喘自欲表散行痰余謂此肺虛不能納氣歸源耳用五味異功散加鉤藤鉤柴胡調補脾肺清理肝火而安一小兒患前症面青黑或痿黃審其母素有鬱怒用加味逍遙散加味歸脾湯治其母而子亦愈矣一小兒月內發搐鼻塞乃風邪所傷以六君子湯加桔梗細辛子母俱服更以蔥頭七莖生薑二片細擂攤紙上合置掌中令熱急貼囟門少頃鼻利搐止一小兒未滿月發搐嘔乳腹脹作瀉此乳傷脾胃用五味異功散加漏蘆令母服之子亦服匙許遂愈一小兒驚悸痰盛瀉乳不消此感風邪夾驚肝侮脾而氣虛先以天麻防風丸祛風定驚後用五味異功散壯脾止搐而愈一小兒發搐啼叫手足指冷左腮青黑此脾土虛弱腎水反所侮也用六君薑桂一劑頓安又以四君芎歸及補肝散而愈一小兒發熱拘急四肢瘛瘲左腮赤此心肝二經風熱先用柴胡清肝散次用六味地黃丸而愈一小兒發熱作渴用瀉黃散大便重墜口角流涎仍欲瀉火余曰鼻準青白多而黃色少屬脾胃虛寒肝木所侮蓋口角流涎脾氣虛而不能攝也大便重墜脾氣陷而不能升也不信另用涼驚之劑果眉唇微動四肢微搐余曰此虛極而變慢風也始用六君當歸木香炮薑鉤藤鉤二劑未效意欲更藥余曰此藥力未至也仍加附子一片服之即安後去附子又二劑而愈一小兒目內色青發搐目直上視叫哭不已或用牛黃清心丸更加咬牙頓悶小便自遺余謂此肝脾虛甚用補中益氣湯六味地黃丸而愈一小兒發搐目札屬肝膽經風熱先用柴胡清肝散以清肝後用六味地黃丸以補腎而愈涼驚丸治驚疳熱搐心神驚悸白睛赤色牙關緊急潮熱流涎手足動搐黃連五錢龍腦一錢研龍膽草酒拌炒黑防風青黛三錢研鉤藤鉤子二錢牛黃麝香各一字上各另為末麵糊丸粟米大每服三五丸至一二十丸煎金銀湯下愚按前方治心肝二經風熱若心肝虛而見驚搐潮熱用秘旨安神丸肝木乘脾者用異功散加柴胡鉤藤鉤心脾虛弱而潮熱流涎者用異功散若虛寒更加木香不應更加炮姜詳見滯頤擦牙通關散治風搐搦關竅不通痰塞中脘留滯百節南星二錢麝香一字牙皂二鋌燒存性赤腳蜈蚣一條殭蠶一錢上為末薑汁蘸藥少許擦牙或調服二三點涎自出至聖保命丹治胎驚內釣腹肚緊硬啼叫不安及急慢驚風眼目上視手足抽掣不省人事全蠍十四個去毒防風二錢白附子炮南星蟬殼殭蠶去絲嘴炒天麻硃砂各一錢麝香五分金箔上為末米糊和每兩作四十丸每服一丸白湯化下有熱者以膽星易炮星白餅子治傷食嘔吐肚疼噯氣先用此藥一服推下食積卻用惺惺散加減參蘇飲不可服冷藥滑石半夏膽南星各一錢輕粉巴豆二十四粒去皮膜用水一升煮乾研爛上以三味為末入巴豆輕粉研勻飯丸綠豆大每服三五丸紫蘇湯下忌熱物量兒加減十味安神丸治驚人參茯神麥門冬山藥各二錢片腦二分龍齒一錢硃砂甘草寒水石各五分金箔二片上為末蜜丸雞頭大燈心湯調下一方有馬牙硝浴體丸天麻二錢蠍尾去毒硃砂各五分烏蛇以酒浸焙白礬各二錢麝香一字青黛二錢上為末每服三錢水三碗桃枝一握煎至數沸溫浴之勿浴背塗囟法治發搐麝香一字蠍尾去毒薄荷葉三分蜈蚣青黛末牛黃各一字上同研用熟棗肉劑為膏新綿上塗勻貼囟上四方可出一指許火上炙手頻熨百日裡外小兒可用此瀉青丸方見肝臟導赤散方見心臟地黃丸方見腎臟益黃散方見脾臟蘇青膏方見慢驚大青膏方見肝臟目睛瞤動目者肝之竅也肝膽屬風木二經兼為相火肝藏血血不足則風火內生故目睛為之瞤動經曰曲直動搖風之象也宜用四物益其血柴胡山梔清其肝陰血內榮則虛風自息矣若因肝經血燥而目病者用六味丸以滋其源因肺金克肝木者用瀉白散以平金邪若眼眶瞤動者肝木乘脾土也用抱龍丸若愈後驚悸不寐或寐中發搐咬牙目睛瞤動者血虛不能榮筋脈也用補中益氣湯或歸脾湯加茯苓五味蓋有餘者邪氣實也不足者真氣虛也凡病氣有餘當認為不足況此症兼屬肝脾多為慢驚之漸尤當審之治驗一小兒三歲因驚抽搐發熱久服抱龍丸等藥面色或赤或青余曰始因肝有實邪故宜用前藥今面色青赤乃肝經虛熱傳心矣遂用六味丸以養肝腎佐以六君升麻柴胡以補脾胃諸症頓痊大尹周應昌子患瘰癧恪服化痰之劑虛宜用六君子湯瀉青丸方見肝臟六味丸方見腎臟四君子湯方見天釣瀉白散方見肺臟唇口蠕動唇為脾之華口乃肺之竅又陽明之脈環唇口而交人中陽明胃也是以脾胃虛者多有此症不獨病後而已夫脾主涎脾虛則不能收攝多兼流涎或誤認為痰而用祛逐之藥則津液益枯不能滋養筋脈遂致四肢抽搐病勢愈甚原其治法與慢脾風相同當用大補脾胃之藥加升麻柴胡切勿用青皮龍膽草之類兼察其色黃者脾弱也青者肝勝也青黃不澤木來剋土也青赤相兼木火風熱也黑為寒水反來侮土白為氣虛亡陽凡此宜用六君子湯加小柴胡湯若四肢微搐或潮熱往來或泄瀉嘔吐面色痿黃皆脾胃有傷也宜用白朮黃耆川芎當歸人參陳皮肉豆蔻神麯甘葛白芍藥黃連炙甘草白茯苓以補胃氣若脾胃虛弱者用五味異功散虛寒加木香炮姜若脾氣下陷者用補中益氣湯以升其陽作渴者用七味白朮散以生津液若肝木侮脾者用補中益氣湯加茯苓半夏芍藥以治肝補脾治驗一小兒傷食發熱唇動或用養胃湯枳實黃連山楂之類更加腹脹午後發熱按其腹不痛余以為服前藥飲食雖化而脾胃復傷也用六君子湯數劑而痊一小兒傷食發熱嘔吐唇動服消導清熱之劑飲食已消熱亦如故余曰此胃經虛熱耳用四君子升麻柴胡四劑而愈一小兒素面白忽然目唇微動時面色黃青良久其唇口手足亦微動此脾虛而肝侮之也用五味異功散加鉤藤鉤白附子一劑而面青少退再二劑唇口動亦止又用異功散加升麻柴胡四劑而痊一小兒暑月吐瀉目唇微動面色青白手足並冷仍用玉露散余謂已變慢脾風也當溫補脾腎不信後果歿五味異功散方見天釣內釣補中益氣湯方見虛羸七味白朮散方見積痛六君子湯方見天釣小柴胡湯方見痓症四君子湯方見天釣驚搐目直小兒忽然驚搐目直者皆肝之風熱也若肝虛生風則目連札而不搐及多欠咬牙若肝經風實則目直大叫呵欠項急頓悶若肝經有熱則目直視不搐得心熱則搐氣熱則外生氣溫則內生其症手尋衣領及亂捻物宜用瀉青丸壯熱飲水喘悶宜用瀉白散凡病之新久皆能引肝風風內動則上入於目故目為之連札若熱入於目牽其筋脈兩眥俱緊不能轉視故目直也亦有飲食停滯中焦致清陽不升濁陰不降肝木生髮之氣不得升致生虛風者須詳審之若胸滿腹痛嘔吐惡食輕則消導化痰重則探吐滯積更須審其所傷寒物熱物亦有因感冒吐瀉致使土敗木侮而生虛風者不可遽服驚藥宜用六君子加芍藥木香柴胡制肝補脾若因脾土虛而自病者用五味異功散凡飲食停滯痰涎壅滿而見驚症者實因脾土虛弱不能生金金虛不能平木故木邪妄動也宜健脾消食其症自愈若輒用驚風之藥反成其風而益其病也況臟腑脆嫩不可投以竣厲之劑治者慎之治驗姚儀部子每停食則身發赤暈此飲食內停不消鬱熱發外用清中解鬱湯而愈後患搖頭咬牙痰盛發搐吐出酸味伺其吐盡翌日少以七味白朮散調理脾胃遂不復患一小兒停食服通利之劑作嘔腹脹此脾胃復傷也用補中益氣湯而愈一小兒兩目動札手足發搐數服天麻防風丸之類前症不愈其痰益甚得飲食稍愈視其準頭及左頰色青黃余曰脾主涎此肝木克脾土不能統攝其涎非痰盛也遂用六君升麻柴胡鉤藤二劑飲食漸進諸症漸愈又用補中益氣湯而安九味養脾湯治小兒大病後面黃肌瘦目動咬牙發少未能強步因誤服解表瀉利傷克諸藥而致者宜長緩調理全復胃氣白朮一錢二分白芍藥酒炒白茯苓各八分人參陳皮川芎各六分甘草炙黃耆蜜炙當歸酒洗各四分半夏山楂麥門冬各六分上用薑棗水煎服六君子湯五味異功散二方見天釣清中解鬱湯方見丹毒七味白朮散方見積痛補中益氣湯參苓白朮散二方見虛羸天麻防風丸方見傷風咳嗽睡中驚動小兒睡中驚動由心腎不足所致蓋心主血與神肝藏血與魂肺主氣與魄腎主精與恐小兒臟腑脆弱易為驚恐恐則氣下驚則心無所依神無所歸且夫人之神氣寤則行於目寐則棲於腎今心腎既虛則不能寧攝精神故睡中驚動也治宜清心安神用茯苓補心湯加酸棗仁茯神五味亦有驚嚇而作者因擊動其肝故魂不安也治宜鎮驚定魂用安神鎮驚丸若飲食間因驚而停滯者用六君子加神麯厚朴食既消而驚未定用茯苓補心湯若木火太過而心神不寧者用導赤散風熱相搏者用柴胡梔子散食鬱生痰驚動不安者用四君以健脾神麯半夏以化痰山梔芍藥以清熱治驗一小兒夜睡忽然驚動如搐大便酸臭而色青此飲食傷脾而肝旺也先用異功散加柴胡升麻山梔又用四味肥兒丸而愈一小兒不時睡中驚動發搐作渴飲冷左腮青額間赤先用柴胡清肝散加鉤藤鉤四劑以治肝火後用五味異功散以健脾又用地黃丸補腎肝而安導赤散方見心臟柴胡梔子散方見諸熱症即梔子清肝散六味丸方見腎臟四君子湯六君子湯五味異功散三方見天釣茯苓補心湯方見喑安神鎮驚丸方見急驚目動咬牙小兒驚後目微動咬牙者皆病後亡津液不能榮其筋脈也亦有肝驚虛熱而生風者當審其氣血有餘不足而治之其日中發熱飲冷而動者氣有餘也用瀉青丸夜間盜汗及睡不寧而動者血不足也用地黃丸或因肝經風邪傳於脾腎者亦令咬牙先用柴胡清肝散次用五味異功散六味地黃丸若因脾胃虛熱用補中益氣湯加芍藥山梔實熱用瀉黃散蓋牙床屬手足陽明故也若肝腎熱用六味地黃丸治驗奚氏女六歲忽然發驚目動咬牙或睡中驚搐痰涎壅盛或用化痰祛風等藥益甚余曰面青而見前症乃屬肝木克脾土不能攝涎而上湧也當滋腎水生肝血則風自息而痰自消矣遂用六味丸而愈一小兒患前症痰涎自流用驚風之藥其症益甚脾胃益虛視其面色痿黃口中吐痰用六君子補中益氣湯而愈導赤散方見心臟地黃丸方見腎臟瀉青丸方見肝臟補中益氣湯方見虛羸六味地黃丸方見腎臟六君子湯方見天釣搖頭便血經曰諸風掉眩皆屬肝木木得風則搖動乃肝經火盛而生虛風也湯氏治鄭都承子搖頭便血七年用祛風藥止血藥百試無效此肝經風熱所乘土受木克不能攝血而潰入大腸故便血不止遂制清肝益胃湯以平肝益脾祛風熱兼服胃風湯旬余諸症悉愈便血者風木搖動則土受凌虐而不能統血也或食酸味過多以益其肝致令陰結經曰結陰者便血一升再結二升三結三升又邪在五臟則陰脈不和陰脈不和則血留之結陰之病陰氣內結不得外行滲入腸間故便血也血亦有乳母恚怒風熱熾盛或肝木傷脾使清氣不升或風邪侵入大腸者治法若因風熱用柴胡清肝散若因怒火用加味小柴胡湯若清氣不升脾氣下陷者用補中益氣湯若風邪侵於大腸者用清肝益胃丸肝經血熱妄行者用六味地黃丸脾土不能培肝木者用六君柴胡鉤藤鉤肝木勝脾土者用四君芍藥鉤藤鉤結陰者用平胃地榆湯治驗一小兒傷風咳嗽痰湧余謂脾虛肺弱腠理不密風邪外乘用六君子湯加桔梗桑皮杏仁而愈後飲食停滯作瀉腹脹仍用六君子加山楂厚朴而安又停食作瀉服消導之藥更加咳嗽余謂當調補脾土不信自用發表克滯前症益甚更加搖頭余以天麻散倍加鉤藤鉤及異功散而愈一小兒項間結核面色痿黃肌體消瘦咬牙抽搐頭搖目札此肝木克脾土也用六君子湯及九味蘆薈丸頓愈一小兒病後遇驚即痰甚咬牙抽搐搖頭作瀉恪服腦麝硃砂等藥以致慢驚而卒清肝益胃丸犀角屑甘草全蛇蛻炙黃鉤藤鉤子麻黃去節一錢黃耆蜜炙羌活防風白芍藥天花粉各半兩上為末棗肉杵丸桐子大每服五十丸食後薄荷湯下海藏食療云蛇蛻主去風邪明目治小兒一百二十種驚癇寒熱等症蠱毒安胎炒用又治風癇弄舌搖頭故前方用之平胃地榆湯治結陰便血白朮陳皮茯苓厚朴葛根各五分地榆七分乾薑五分炙甘草當歸炒神麯白芍藥人參益智各三分升麻附子炮各一錢上每服一錢水煎服胃風湯方見偏風口噤柴胡清肝散方見諸熱症加味小柴胡湯方見肝臟補中益氣湯方見虛羸六味地黃丸方見腎臟瀉白散方見肺臟六君子湯四君子湯二方見天釣天麻散方見內嗽異功散方見天釣九味蘆薈丸方見疳症偏風口噤小兒偏風者屬少陽厥陰肝膽二經症也噤者筋急由風木太甚而乘於脾以勝水濕則筋太燥然燥金主於收斂勁切故也又曰風之為病善行而數變或左或右其因一也治須審而藥之若足陽明胃經氣虛風邪所乘其筋脈偏急者屬外因若足厥陰肝經風熱乘脾筋脈偏急者屬內因若脾肺虛弱腠理不密外邪所乘或服金石之劑耗損肝血或吐瀉後內亡津液不能養肝致口眼歪斜或半身不遂諸症皆屬肝血不足肝火生風宜滋腎水養肝血壯脾土治法脾胃虛而動風者異功散加柴胡鉤藤鉤脾肺虛而外邪所乘者用鉤藤飲肝火血燥者用六味地黃丸津液不足者用白朮散若兼目緊上視寒熱往來小便淋瀝面色青潔兩脅脹痛之類皆肝經之本病也或唇口歪斜腹痛少食目胞浮腫面色青黃肢體倦怠之類皆肝木乘脾之症也當審五臟相勝而主之設執其見症概投風藥反成壞症者有矣治驗一小兒口眼喎斜面色或青或赤此肝心風火乘脾也朝用柴胡清肝散夕用異功散加鉤藤鉤而愈其時有患前症服祛風導痰之藥者皆不能起一小兒痢後患前症發搐面色痿黃肢體倦怠此元氣虛克伐多矣余用補中益氣湯加鉤藤鉤子服而漸愈後因乳母七情飲食失宜或兒乳食過多前症仍作服補中益氣湯五味異功散而應錢氏全蠍散治驚風口眼歪斜言語不正手足偏廢不舉全蠍去毒炒殭蠶直者炒川芎黃芩甘草桂枝赤芍麻黃去節各二錢天麻六錢天南星去臍二錢上為末每服二三錢姜五片水煎服胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒下如豆汁或瘀血日夜無度人參白茯苓芎藭桂當歸白芍白朮各等分上散每服二錢入粟米數粒同煎食前服異功散方見天釣六味丸方見腎臟白朮散方見積痛柴胡清肝散方見諸熱補中益氣湯方見虛羸角弓反張錢仲陽曰角弓反張者由風邪客於太陽經也經曰風從上受足太陽主周身之氣其脈起於目內眥而行於背肝屬木主風所以風邪易侵也夫小兒肌膚未密外邪易傷肝為相火其怒易發若身反張強直髮熱不搐者風傷太陽也宜用人參羌活散小續命湯若因暴怒而擊動其肝火者宜用瀉青丸若飲前劑其症益甚者此邪氣已去而脾氣虧也宜用異功散加芎歸補之若因肝經虛熱或因克伐真氣虛熱生風者宜用異功散地黃丸補之若因下而脾氣困備腹肚膨脹者此中氣損也宜用白朮散補之若氣血素弱或服攻伐之劑而手尋衣領咬牙呵欠者肝經虛甚也急用地黃丸以補之仍與肝臟參覽治驗一小兒忽腰背反張目上視面青赤曰青屬肝主風赤屬心主火此風火相搏用柴胡梔子散倍加鉤藤鉤頓安而痰如舊又用抱龍丸而愈一小兒忽腰背反張服治驚之藥後不時舉發面色黃白肢體甚倦余用五味異功散十餘劑而愈後因驚兼飲食不節不時舉發隨用前藥即愈遂日以參朮末每服五七分炮薑大棗煎湯調下服至二兩而不發以上二症元氣虛而病氣實也若用攻邪之藥皆誤矣一小兒素患前症痰盛面色素白而兼青余謂肺氣不能平肝肝氣乘脾脾氣虛而生痰耳先用抱龍丸二服以平肝隨用六君子湯以補脾肺月餘而痊半載之後復發謂非逐痰不能痊愈遂用下劑痰涎甚多而咽喉如鋸聲余曰乃脾不能攝涎也咽間鳴乃肺氣虛甚也遂用人參五錢炮姜三分水煎服而醒至第四劑後加棗二枚人參服數兩而愈後每發非獨參湯不應若執常方鮮不有誤者人參羌活散方見驚風小續命湯方見五硬
