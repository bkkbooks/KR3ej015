body:
  text: 卷十四肺癰肺痿齊氏云肺癰肺痿因脾肺氣虛腠理不密外邪所乘或母食辛辣厚味遺熱於兒或兒有病過於汗下內亡津液虛火爍肺或服克伐之藥虧損脾胃不能生肺金其症惡風咳嗽鼻塞項強呼吸不利甚則四肢微腫咳唾膿血若吐臭穢胸中隱痛脈數而實者為肺癰咳唾涎沫脈數而虛者為肺痿惡寒喘嗽者寒邪內蘊也小青龍湯咳唾膿穢者肺癰內潰也桔梗湯竊謂前症若喘咳短氣者脾胃氣虛也五味異功散咳唾膿痰左尺脈數而無力者腎氣虛也六味地黃丸咳唾膿痰右關脈數而無力者脾氣虛也七味白朮散若發熱喘嗽唾膿不食者脾肺虛甚也難治大要補脾肺滋腎水為善仍審五臟相勝乳母七情後症仿此一小兒感冒停食吐瀉用疏利之劑咳嗽膿血此中氣復傷而變肺癰也用桔梗湯而愈後咳嗽吐血仍用前藥佐以異功散而痊一小兒停食服瀉藥而變肺癰余先用異功散以救脾肺次用桔梗湯以治肺癰而瘥一小兒停食服克伐之藥唾痰腥氣面赤氣喘此元氣復傷而成肺癰也用桔梗湯膿痰頓止翌日喘甚此脾氣虛而不能生肺也用異功散加杏仁百合而愈後小便澀滯服八正散小便愈澀咳嗽吐痰面赤盜汗余謂肺氣虛熱前藥虧損真陰虛火爍肺金而然用異功散以補脾土地黃丸以滋腎水遂愈一小兒肺癰愈後咳嗽面色白或痿黃手足冷小便頻此因脾虛不能生金也服參蘇飲之類自汗盜汗昏憒發搐遺尿下氣手足如冰面色青白此陽氣脫而虛寒也用人參一兩乾薑二錢大棗五枚米泔煎沸先灌一杯將熟又灌二杯連用二劑而蘇更朝用補中益氣湯夕用異功散而愈一小兒十五歲因勞傷元氣而咳嗽誤用表散之劑復傷肺氣成癰咳嗽膿血用桔梗湯為主佐以異功散膿漸少專用異功散膿止而愈後因書課過勞自汗時嗽服外感藥咳嗽益甚胸膈痞滿呼吸不利余謂脾肺之氣虛甚而然用參耆補脾湯而痊一小兒咳嗽服參蘇飲而益甚右寸之關脈浮散余謂此風傷皮毛熱傷血脈血氣羈留蘊結於肺而成癰也不信乃服表散唾咳膿血余曰此因肺虛不能攝氣脾虛不能攝涎耳當補脾土以生肺金又不信果歿一小兒感冒咳嗽發散過度喘促不食痰中有血余用桔梗湯而愈後元氣未復大便似痢或用芩連枳實之類變慢脾風而卒小青龍湯治傷風冒寒咳嗽喘急肺脹胸滿鼻塞流涕或乾嘔熱咳或作喝或作噎或小便不利或小腹脹滿此仲景之法審有是症用之及時殊有良驗麻黃去節赤芍藥半夏各七錢細辛乾薑炮甘草炙桂枝各三錢五味子半兩杵附子二錢脈浮不用上每服二錢水煎桔梗湯治咳嗽膿血腥穢已成癰症桔梗炒貝母去心知母炒桑白皮炒枳殼各二錢地骨皮栝蔞仁薏苡仁杏仁炒五分當歸黃耆炒各一錢五味子杵炒百合炒各一錢五分防己一錢甜葶藶炒五分上每服二三錢水煎升麻湯治肺癰膿血穢臭胸乳皆痛升麻桔梗炒薏苡仁地榆條芩炒牡丹皮芍藥炒甘草各等分上每服二三錢水煎排膿散治肺癰此方排膿補肺黃耆鹽水拌炒白芷人參五味子炒研碎各等分上為末每服一二錢蜜湯調下射干湯治胃脘癰吐膿血射干去毛梔子仁赤茯苓升麻赤芍藥一兩三錢白朮五錢上每服三五錢水煎入地黃汁少許再煎服人參平肺散治心火克肺金傳為肺癰咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參陳皮甘草地骨皮茯苓各一錢知母炒七分五味子青皮天門冬去心四分桑白皮炒一錢上每服二三錢參耆補脾湯治肺癰脾氣虧損咳吐膿涎或中滿不食必服此藥補脾土以生肺金否則不治人參白朮各二錢茯苓陳皮當歸各一錢黃耆炒二錢五分升麻三分麥門冬七分五味子杵四分桔梗炒六分甘草炙五分上作三服薑棗水煎人參補肺湯治肺症咳喘短氣或腎水不足虛火上炎痰涎壅盛或吐膿血發熱小便短澀人參黃耆炒白朮茯苓陳皮當歸各一錢山茱萸乾山藥五味子杵麥門冬去心甘草炙熟地黃自制牡丹皮各五分上每服五錢水煎服五味異功散方見用敗毒之藥七味白朮散方見發熱不止腸癰張仲景云腸癰之症因飲食積熱或母食辛熱之物所致小腹按之則痛小便數似淋腹急惡寒身皮甲錯或自汗惡寒若脈遲緊未有膿者用仙方活命飲以解其毒脈洪數已有膿者服太乙膏以下其膿小腹疼痛小便不利者膿壅滯也牡丹皮散主之竊謂經云腸癰為病不可驚驚則腸斷而死故坐臥轉側之間須令徐緩時少飲薄粥及用八珍湯固其元氣靜養調理庶可保也一小兒小腹作痛小便如淋身皮甲錯此腸癰也膿已成用薏苡仁湯排膿散而痊一小兒腹中作痛時或汗出身皮甲錯小便如淋脈滑數膿已成也用大黃湯一劑下膿甚多又用薏苡仁湯而痊一小兒小腹脹痛脈浮數按之遲緊不時畏寒大便或欲去而不去小便頻而短此為腸癰但膿未成耳不信或作痢症恪用清熱分利之劑諸症蜂起而歿一小兒停食腹脹痛二便不利服草果良薑之類更加發熱作渴脈洪大而數余曰此飲食滯而蘊熱將成膿矣前藥非其治也不信仍服之腹發赤暈大便下膿而歿一小兒患腸癰先用太乙膏後服牡丹皮散下膿而愈後因跌腹內作痛遍身皆赤良久身黯而歿蓋腸斷故也大黃湯治腸癰小腹堅腫按之則痛肉色如常或焮赤微腫小便頻數汗出憎寒脈遲緊膿未成也急服之大黃炒朴硝各二錢牡丹皮栝蔞仁桃仁去皮尖各二錢上每服二三錢水煎薏苡仁湯治腸癰腹中痛煩躁不安或脹滿不食小便澀滯薏苡仁牡丹皮桃仁各三兩栝蔞仁四兩上每服四錢水煎桃仁湯治腸癰腹中痛煩躁不安壅痛大便閉澀亦有繞臍生瘡者但用此藥無妨桃仁大黃炒牡丹皮芒硝犀角鎊冬瓜仁研各二錢上水煎入犀角末服牡丹皮散治腸癰腹濡而痛時下膿汁或下血牡丹皮人參天麻白茯苓黃耆炒薏苡仁桃仁白芷炒當歸川芎官桂甘草各五分木香二分上每服三五錢仙方活命飲方見熱毒瘡瘍太乙膏方見跌撲外傷八珍湯方見發熱不止痔瘡痔瘡之症或因稟受胎毒或膏粱食積或母食炙煿厚味所致腫痛者濕熱作癢者風熱便閉者火盛膿潰者血熱濕熱加味槐花散風熱秦艽蒼朮湯便秘清燥湯膿潰黃耆湯熏洗則用蔥湯槐角五倍子等藥或真蒲黃以豬脂調敷如有兼變之症參各門治之一小兒患痔赤腫作痛用黃連解毒湯而痛止又用托裡清肝散及加味槐角丸而瘡愈一小兒因飲食停滯發熱患痔大便不利腫痛寒熱不時發搐此脾氣傷而肝乘之也先用保和丸末二錢以柴胡山梔湯調服食消搐止又用四味肥兒丸數服而愈一小兒十二歲不戒厚味醇酒不時作痛或大便秘結小便澀滯用龍膽瀉肝湯治之而安後飲燒酒前症復發遍身色赤煩躁飲冷醋半鍾赤熱悉退腫痛頓減一小兒因乳母食炙煿之物肛門腫痛用清胃散母子並服子又服四味肥兒丸而愈後因乳母恚怒胸脅作痛頻飲糖酒兒病復作發搐母先服加味小柴胡湯二劑次服加味逍遙散兒服四味肥兒丸而愈一小兒肛門腫痛大便不通服大黃之藥腫痛益甚虛症並作仍欲攻瘡余曰此因脾氣復傷而然也用異功散加升麻柴胡為主佐以加味槐角丸腫痛漸退又用黃連解毒湯而出膿用秦艽蒼朮湯而瘡愈一小兒肛門腫痛發熱飲水口鼻氣熱此脾肺經實熱先用瀉黃散二服而熱退又用枳殼散而痛止用金銀花散而腫痛消後母食膏粱兒患復作母用清胃散而腫痛消一小兒誤吞信石遍身發赤嘔吐煩渴肛門腫痛便秘飲冷服冷米醋一鍾赤暈立消腫痛頓止又用黃連解毒湯金銀花而愈一小兒痔瘡不時腫痛服加味槐角丸而愈至十四而復作發熱體倦肛門堅腫用地黃丸八珍湯堅腫漸消血氣漸愈或間止藥餌勞役不節諸症仍作用前藥隨愈畢姻後肛門腫潰而串臀用補中湯地黃丸臀間漸愈或用追蝕等藥堅核雖消痛傷元氣瘡口不合余用八珍湯地黃丸兩月而斂後不守禁忌又且攻毒以致屢發元氣日虛而歿古人云善服藥不若善保養信夫苦參散治痔瘡腫痛發熱枳殼麩炒黃連大黃甘草荊芥苦參赤芍藥黃芩上水煎熏洗加味槐花散治腸風下血痔瘡腫痛發熱便秘槐花熟地黃白朮青皮荊芥穗川芎各二錢當歸身升麻各四分枳殼麩炒五分上水煎服秦艽蒼朮湯治痔瘡大便堅硬小便頻數內熱作渴秦艽蒼朮各五分澤瀉防風桃仁皂角子仁炒當歸尾黃柏山梔炒各三分上作二劑水煎服清燥湯治大腸風熱血燥秘結不通痔瘡等症生地黃山梔麻子仁研各五分黃芩川芎羌活黃柏郁李仁芍藥當歸尾甘草各四分澤瀉二分上水煎服黃耆散治痔瘡並一切潰瘍虛弱發熱茯苓黃耆炒當歸川芎白芍藥白芷各五分升麻山梔炒各二分上水煎服枳殼散治痔瘡腫痛或下血枳殼去穰麩炒槐花荊芥皂角子仁炒蝟皮炙各等分上為末每服一錢滾湯下作丸亦可加味槐角丸治症同前槐角炒枳殼麩炒當歸黃芩皂角仁炒蝟皮炙秦艽白芷各等分上為末每服一二錢水煎服或蜜丸量兒大小服又方治痔痛不可忍者羊膽一個冰片五分上以冰片為末羊膽塗之丹石散治痔瘡熱痛如神黃丹滑石各等分上為末新汲水調塗日三五次勝雪膏治痔瘡熱痛不可忍片腦鉛白霜各等分上為末好酒研成膏塗之隨手愈又方用生栝萎根研如泥豬油調塗黃連解毒湯方見作痛不止托裡清肝散方見囊癰四味肥兒丸方見貼骨癰加味小柴胡湯方見熱毒瘰癧加味逍遙散方見發熱不止龍膽瀉肝湯方見下疳瘡下疳陰痿下疳陰痿皆屬肝火濕熱或稟賦肝經陰虛腫痛發熱者肝火濕熱也先用加味小柴胡湯再用龍膽瀉肝湯腫痛便赤者肝火陰虛也用加味逍遙散加龍膽草生地黃潰而腫痛不消者小柴胡湯加芎歸黃耆潰而腫痛已消用四物湯加牡丹皮柴胡蓋肝屬木得雨露則森茂遇酷日則萎軟若誤謂虛寒投以熱劑輕則囊莖生瘡重則腐而難斂皆宜滋腎水生肝木清肝火故云肝氣熱則莖痿宗筋弛縱陰莖腫脹或出白液或癢痛裡急筋縮挺縱不收或精出便下此名筋疝俱肝火也黃宗伯季子初生時母棄於水逾日不死復收之遂成喘嗽頷腋臂股各結塊核潰而色紫誤觸之痛徹於心服辛溫化毒等劑不應時已弱冠余曰初生喘嗽者形寒傷肺也既長而咳嗽者肝火刑肺也故結核俱在肝膽部分始用補中益氣湯後用九味蘆薈丸不月諸症悉愈此稟母之肝火而患也一小兒下疳潰爛發熱作渴日晡尤甚此肝疳而脾氣虛也用補中益氣湯後用九味蘆薈丸諸症悉愈一小兒二歲莖萎濕癢時出白津余以為肝火不信或與溫補腎經後陰囊焮腫莖中作痛余用龍膽瀉肝湯六味地黃丸而愈一小兒睪丸作痛小便赤澀寒熱作嘔此肝火濕熱不利用小柴胡湯加山梔車前子茯苓而愈睪丸陰子也一小兒睪丸腫痛小便黃澀寒熱作渴此肝火所致用小柴胡湯加柴胡車前子並九味蘆薈丸間服而消一小兒陰莖腫痛腹內一塊或作痛或上攻小便不調此稟肝火為患用龍膽瀉肝湯九味蘆薈丸愈後形氣消爍發熱作渴此肝火制脾土而然也用益氣湯蘆薈丸異功散而安一小兒陰莖作癢搔破出水小便赤澀此稟肝腎陰虛火動用龍膽瀉肝湯清肝經濕熱佐以地黃丸補腎肝陰虛而愈後乳母惱怒小便澀滯兩肋腫痛兒陰復癢驚搐困倦用異攻散以補脾土用地黃丸以滋腎肝而愈一小兒十五歲患下疳久不愈形氣骨立不時寒熱小便不利飲食少思此稟肝疳虛羸也朝用益氣湯以培胃氣夕用地黃丸以滋腎水為主佐以九味蘆薈丸治疳而痊一女子十五歲面青善怒體瘦作渴天癸未至不時寒熱口舌生瘡後患陰瘡濕癢無寐善驚此稟肝脾虛羸之變症也當先救脾氣遂朝用補中益氣湯夕用加味歸脾湯諸症漸愈卻佐以九味蘆薈丸而痊一女子十四歲稟肝經濕熱肌體消瘦寒熱如瘧下部患瘡先用加味小柴胡湯寒熱頓退但晡熱少食用加味逍遙散為主以九味蘆薈丸為佐而愈出嫁後前症仍作另用雜藥瘡口翻出如菌余用龍膽瀉肝湯加味逍遙散而愈一小兒十五歲患下疳書課過勞即寒熱頭痛形氣殊倦腿足疲軟左關脈洪數左尺脈洪數而無力余謂此稟肝腎陰虛兼飲食勞役之症也宜先調補胃氣以滋化源不信或以為陰虛濕熱下流恪服四苓四物之類諸症益甚余曰陰虛謂脾經虛也脾為至陰以丁火為母虛則宜補丁火以生己土腎屬水以辛金為母腎虛則宜補辛金生癸水也今因脾經陽弱而陰虛反用沉寒之劑復傷陽氣以絕化生之源欲保其不危難矣果歿龍膽瀉肝湯治肝經濕熱不利下部生瘡兩拗腫痛或腹中作痛小便澀滯等症龍膽草酒拌炒黃澤瀉車前子炒木通生地黃酒拌當歸酒拌山梔黃芩炒甘草各等分上水煎食前服加味小柴胡湯即小柴胡加山梔牡丹皮治肝膽經有熱下部濕瘡寒熱晡熱潮熱等症方見熱毒瘰癧六味丸治肝腎陰虛下部生瘡或發熱作渴小便頻數或腎水不足而不能生肝木致血燥筋攣頷項肢節等處結核或潰而不能收斂或肝腎虛弱發熱盜汗肢體消瘦小便赤澀尿血下血或大小便牽痛氣短痰嗽吐血眩暈耳聾口燥齒痛失音腰腿疲軟此皆稟不足也方見作渴不止敷藥必效散治下疳腐潰作痛黃連黃柏龍膽草各一兩輕粉五分上為末油調搽入片腦更效若用當歸膏調敷尤佳如聖散治下疳腐久不愈五倍子二錢片腦一錢黃連五分蘆甘石煅三分上各為末干敷毒未盡者加黃連末三分九味蘆薈丸方見喉痹加味清胃散方見熱毒口瘡聖愈湯方見出血不止補中益氣湯方見肌肉不生八珍湯方見發熱不止加味歸脾湯方見脅癰四君子湯方見腹癰仙方活命飲托裡消毒散二方見熱毒瘡瘍便癰附謂兩拗小腹兩邊拘中患之便癰因肝火肝疳或稟肝經熱毒若初起腫硬作痛者先用龍膽瀉肝湯一二劑腫痛不減用仙方活命飲二劑五七日不減腫尚硬亦用前二藥各一劑如不消或更痛欲成膿也用活命飲一劑卻用托裡消毒散加柴胡山梔一二劑若膿已成而不潰者血氣虛也用托裡消毒一二劑膿已潰而痛不止者毒氣不解也用活命飲一劑若膿已出而反痛者氣益虛也用內補黃耆湯膿已潰而發熱煩躁者氣虛血脫也用當歸補血湯膿已潰而惡寒發熱者血氣俱虛也用十全大補湯膿已潰而惡寒者元氣虛也用補中益氣湯膿已潰而不生肌者脾氣虛也用六君子湯若稟賦怯弱或因飲食勞倦而為患者但用補中益氣湯加射干自消設使不分經絡不別虛實概行攻伐虧損氣血則輕者難治重者必變瘵症甚至不起一小兒腫痛色赤寒熱似瘧小便不通此肝經濕熱用龍膽瀉肝湯一劑小便清利寒熱頓除又用加味逍遙散加龍膽草二劑腫痛悉退而愈一小兒患此腫硬作痛小便澀滯先用龍膽瀉肝湯小便頓利又用活命飲一劑而消後腹腫赤作痛此欲作膿也先用活命飲二劑殺其大勢卻用托裡消毒散加柴胡山梔三劑以指按之腫隨指復起此膿已成也用托裡散一劑翌日針之腫出腫消再用托裡散而愈一小兒患此服大黃等藥瀉而腸鳴腹腫硬痛少食此脾胃復傷而變症也用五味異功散加升麻柴胡木香飲食漸進乃去木香加黃耆當歸數劑而膿成又用托裡散加皂角刺而膿潰乃去皂角刺倍用參耆而愈一小兒瘡勢已成用消毒之藥其腫散漫自汗發熱惡寒少食此氣血虛甚也用大補湯四劑針之膿出腫消卻用托裡散八珍湯間服而愈一小兒膿成不潰誤用大黃之類以下膿泄瀉不止腫硬色白腹痛欲嘔手足並冷此脾氣虛而復傷也用異功散加升麻薑桂四劑乃去薑桂加歸耆二十餘劑膿潰而愈一小兒潰後咬牙呵欠尋衣捻物此肝經氣血虛也先用八珍湯加鉤藤鉤五味子諸症頓愈又用托裡散及八珍湯而痊一小兒潰後驚悸發搐呵欠咬牙此心肝二經氣血俱虛也先用補心湯安神丸虛症尋愈再用八珍湯托裡散肌肉漸生卻用地黃丸而瘡口斂一小兒患此久不愈頭重胸滿飲食少思此稟脾胃虛弱也先用補中益氣湯加蔓荊子諸症尋愈次用八珍湯佐以五味異功散月餘瘡口漸斂仍用十全大補湯而痊一小兒十五歲稟賦虛弱因勞役過度患此寒熱如瘧用補中益氣湯將愈惑於人言誤服大黃之藥吐瀉大作手足厥冷寒熱尤甚余用六君子加薑桂諸症稍愈但赤腫不消此欲作膿也又數劑後朝用益氣湯夕用大補湯五十餘劑而痊一小兒潰後腫硬肌肉不生瘡口不斂余欲滋其化源以生肝血不從仍伐肝清熱以致元氣日虛惡症蜂起而歿夫肺者腎之母脾者肺之母今既不滋肺腎以生肝木又傷脾土以絕肺腎之化源其不死者鮮矣一小兒十四歲每飲食勞倦則惡寒發熱兩拗患腫余用益氣湯而愈彼惑於人言乃服大黃之類發搐口噤手足並冷良久少蘇余用大料益氣湯數劑而安又用二十餘劑而愈一小兒兩拗痛腫小便澄白肢體消瘦發熱眼札此稟肝火之症用龍膽瀉肝湯為主四味肥兒丸為佐又各數服將愈及用地黃丸而痊一小兒兩拗腫痛小便不利或赤白濁此係肝火熾而脾氣傷也朝用補中益氣湯夕用地黃丸各數劑而愈後因過勞盜汗發熱兩拗仍腫用前藥佐以地黃丸而愈一小兒每勞則兩拗腫痛小便白濁夜間發熱此稟肝火脾虛而元氣下陷也用補中益氣湯清心蓮子飲後患下疳用四味肥兒丸加逍遙散而愈一小兒兩拗腫痛小便赤澀或兼澄白此肝脾疳症先用九味蘆薈丸數服諸症漸退次用四味肥兒丸二十餘服而愈一女子兩拗腫痛小腹作癢小便赤澀發熱晡熱月經不調先用加味小柴胡湯四劑腫漸消次用加味逍遙散諸症漸愈佐以四味肥兒丸而愈一小兒十四歲每飲食勞倦隨患寒熱兩拗腫痛服大黃之類發搐口噤手足並冷良久少蘇余用大劑補中益氣湯數劑而安又二十餘劑而腫痛愈一小兒患此腫硬色白形氣俱虛余謂常補脾胃則腫硬自消不信乃以銅器壓之及敷山藥內服伐肝之藥遂致不起夫銅金也山藥屬金金能制木肝經有餘之症當用之今不足之症宜滋腎水而反克之不起宜矣治者不可不察一小兒患此腫硬作痛自汗盜汗體倦少食此稟虛弱也非補元氣不能化腐成膿非補脾胃不能生肌斂口彼嫌迂緩另用萬金散毒從大便出而內消一服嚥下連瀉數次皆飲食再服瀉下鮮血遍身皆青余曰此陰陽二絡俱傷也辭不治經云陽絡傷則血外溢陰絡傷則血內溢信然一小兒十四歲功課過度夢遺惡寒拗間腫痛余用大劑益氣湯而愈彼誤用攻毒之劑患便癰腫硬作痛肉色不變余用益氣湯及大補湯而愈畢姻後復患此服穿山甲大黃之類元氣益虛腫硬如石外敷大黃朴硝虛症蜂起余用蔥熨法豆豉餅及前二劑雖愈終以不謹變瘵症而歿清心蓮子飲治心腎虛熱患便癰發熱口乾小便白濁夜則安晝則發黃芩炒麥門冬地骨皮車前子炒甘草各三錢半石蓮肉茯苓黃耆炒柴胡人參各二錢上每服五錢水煎秘旨安神丸治稟心脾氣血虛弱發熱不安瘡不生肌睡中則驚悸人參半夏湯泡酸棗仁茯神各一錢當歸酒洗橘紅赤芍藥五味子五粒杵甘草炙三分上為末薑汁糊丸芡實大每服一丸薑湯下補中益氣湯治稟元氣虛弱因勞而拗中作痛或患便癰寒熱口乾作渴宜此湯加射干主之如寒熱已退而腫不消此欲作膿也宜用十全大補湯方見肌肉不生十全大補湯治稟元氣虛弱因勞患便癰或拗中作痛服補中益氣湯寒熱退而腫不消散此血氣虛而不能成膿也宜服此湯已成而不能潰或已潰而不能生肌寒熱不止自汗盜汗膿清不斂者但服此藥則元氣自復諸症自愈白茯苓人參當歸白朮炒黃耆炒川芎肉桂去皮白芍藥炒熟地黃自制甘草炒各等分上每服三五錢薑棗水煎服內補黃耆湯方見發熱不止龍膽瀉肝湯方見下疳瘡九味蘆薈丸方見喉痹四味肥兒丸方見貼骨癰補心湯方見胎毒瘡瘍六味地黃丸方見作渴不止加味小柴胡湯方見熱毒瘰癧囊癰謂陰囊患癰囊癰屬肝經濕熱或稟胎肝熱所致初起腫痛小便赤澀者濕熱壅滯也先用龍膽瀉肝湯如不消用仙方活命飲若腫痛數日不止欲作膿也用托裡消毒散若腫未潰而小便不利者毒氣壅滯也當分利之膿已成而小便不利毒氣未解也當針泄之膿出而反痛者氣血虛也當補益之若元氣無虧雖陰囊悉潰睪丸懸露亦不為害若乳母恚怒令兒患此者加味逍遙散肝經氣血虛者八珍散加味柴胡山梔俱加漏蘆子母並服一小兒小便澀滯腫痛寒熱此肝經濕熱也用龍膽瀉肝湯而消但內熱倦怠此兼脾氣虛弱也用四君子加柴胡山梔芎歸而愈一小兒腫痛寒熱用克伐之藥不能成膿用托裡清肝散而膿潰用托裡散而瘡斂後寒熱如瘧小便閉塞用小柴胡湯加山梔龍膽草車前子而愈一小兒患此大潰痛甚煩躁飲冷此餘毒尚在與活命飲二劑腫痛頓退又用四君柴胡山梔四劑諸症悉退及托裡散而痊一小兒陰囊赤腫作痛針而膿出頓安忽發熱作渴此邪氣去而真氣虛也用聖愈湯及八味柴胡山梔將愈因乳母恚怒復作用加味逍遙散加漏蘆與母服其兒頓愈一小兒陰囊每患赤腫必因其母恚怒及飲酒而發余審其因怒用加味逍遙散加漏蘆飲酒用加味清胃散加乾葛神麯與母服之其兒隨愈一小兒陰腫小便赤澀此稟肝經有熱也用加味小柴胡加漏蘆與母服子日飲數滴四劑而愈一小兒患此腫硬不消發熱作痛大便不實飲食無味此消導過多而脾胃傷也先用異功散數劑元氣漸復又用托裡散加柴胡山梔而膿成針之膿出發熱惡寒此血氣俱虛也用大補湯加柴胡山梔寒熱頓止又數劑而漸愈後因勞發熱腫痛用益氣湯托裡散瘡口漸斂而愈一小兒十六歲患此膿清晡熱遺精盜汗此稟元氣虛甚也用大補湯地黃丸料各二十餘劑元氣稍復又各三十餘劑汗止熱退犯房事患處頓黯昏憒吃逆手足並冷此脾氣虛寒之惡症用獨參湯四劑而蘇用大補湯加乾薑四分陽氣漸復乃去乾薑又二十餘劑而痊一小兒患此潰而腫硬不消服敗毒散敷寒涼藥肌肉不生瘡口開張膿清色黯自汗余謂非補脾則肌肉不生彼欲速效乃外用生肌散反助其邪致生瘀肉填塞瘡口半載不愈余用異功散加當歸黃耆三十餘劑又用托裡散隔蒜灸而愈一小兒囊癰出血久不愈左頰色青赤此心肝二經風熱而血不歸經也先用加味逍遙散六味地黃丸清肝熱滋腎水而血止用托裡散而瘡愈一小兒患前症膿清發熱久而不斂左頰青兩頤赤余謂稟肝腎陰虛而兩位青赤脾胃氣虛而膿清不斂當補足三陰為善不悟泛用雜藥後果歿一小兒患前症久不愈面色皎白左頰為甚余謂前症屬肝木面白屬肺金左頰屬肝經乃金來剋木為賊邪況小便如淋乃肝腎二經氣絕也辭不治後果歿於金旺之日蓋肝為腎之子腎為肝之母設預為調補腎水必不致於危也托裡清肝散人參黃耆炒當歸川芎芍藥炒白朮茯苓金銀花白芷炒甘草炒連翹柴胡各七分山梔四分上每服二三錢水煎錢氏蚯蚓散治腎子腫硬先用蔥椒湯煎洗次以干蚯蚓糞津唾調敷須避風冷濕地世傳治小兒陰囊腫大用甘草煎濃汁調蚯蚓糞塗之立效山藥膏治兩拗及小腹腫痛或癢用山藥研爛頻敷患處干則易之補中益氣湯方見肌肉不生異功散方見用敗毒之藥八珍湯加味逍遙散二方見發熱不止活命飲托裡散二方見熱毒瘡瘍加味小柴胡湯方見熱毒瘰癧聖愈湯方見出血不止十全大補湯方見便癰加味清胃散四君子湯二方見腹癰地黃丸方見作渴不止足指凍瘡附耳凍瘡足指凍瘡因受稟虛怯故寒邪易乘氣血凝滯久而不愈則潰爛成瘡治法須壯脾胃溫氣血則死肉自潰良肉自生若骨脫筋連者宜急剪去否則毒延腳面而死蓋肢末之處氣血難到又為外邪遏絕則氣血不能運行若用湯蕩火烘其肉即死而不仁至春必潰腐脫落元氣無虧雖患無害如外敷寒藥內服消毒之劑則元氣受傷必成敗症凡初凍時熱手頻熨之為妙北方凍耳若誤以手觸之其耳即落大寒能裂膚墮指然信矣一女子數歲值嚴寒北上因失所恃而足受冷侍婢用熱湯泡之至春月房中穢氣其父覺之脫襪方見十指俱爛但未墮耳余用托裡之劑助其陽氣潰脫以保其生一小兒仲冬嚴寒兩耳受凍不知痛癢令人以熱手徐徐頻熨內用溫補脾氣之劑及敷白蘞散而愈一小兒七歲冬間足指凍痛用燒湯浸洗至春潰脫瘡口不斂足跌腫痛余謂此元氣虛弱須補胃氣以生肌肉不信乃用寒涼消毒之劑腫消黑色自以為愈余曰此脾胃虛極元氣不能運及患處也後兩腿羸細而歿一少兒撲傷足跌少許遂成凍瘡作痛不止用火烘之肉死至春足脫膿水淋漓不能收斂而歿此症若能調養脾胃使元氣不傷則肌肉自生豈至於死哉白蘞散白蘞一兩黃柏炒黑五錢上為末干搽患處湯火瘡湯火之症若發熱作渴小便赤澀者內熱也用四物加山梔連翹甘草若肉未死而作痛者熱毒也用四君加芎歸山梔連翹若肉已死而不潰者氣血虛也用四君加當歸黃耆外敷當歸膏或柏葉末蠟油調搽至白色其肉自生若因煙燻將死者以生蘿蔔汁灌之即蘇若飲食後被湯火所傷發熱腹脹惡食發搐變症者當參食積驚搐門治之一小兒火傷兩臂焮痛大便不利小便赤澀此火毒蓄於下焦也用生地黃當歸芍藥木通山梔赤茯苓生甘草一劑二便調和而痛止更以四物加山梔參耆白芷甘草而壞肉腐又數劑而新肉生一小兒火傷足脛專用敗毒之劑膿水淋漓日晡腫脹此脾虛下陷也用補中益氣湯及八珍湯而愈一女子沸湯傷胸兩月不斂脈洪大而虛發熱作渴此陰虛火毒所乘用四物加柴胡丹皮熱渴頓止用加味逍遙散腐肉去而新肉生一女子被煙燻痰氣上壅不省人事用蘿蔔汁灌之而蘇但體倦欲睡仍令噙蘿蔔汁乃服六君子湯加桔梗山梔而安傷輕者蘿蔔搗汁飲之亦可一小兒火傷臀間誤用生肌散陰囊潰脫久而不愈此助其藥毒而然也余用當歸膏及四君子加芎歸旬余肉生而痊一小兒火傷其足用冷水浸之腫痛益甚服敗毒藥肉死不潰此脾胃氣傷而血滯也用六君子加芎歸而愈後因勞役寒熱以八珍散加升麻柴胡白芷而痊一小兒火傷腿用寒涼之藥久不愈腿細筋攣食少晡熱此因生肌藥助其邪寒涼損其胃也用益氣湯當歸膏不月而斂一小兒熱湯傷足久不愈膿水清稀口乾足熱患處腫黯晡熱盜汗肢體骨立此稟腎氣虛弱寒藥傷脾而然用益氣湯地黃丸三月餘佐以托裡散如聖餅而愈一小兒沸湯傷腿搽藥結痂難於屈伸痛不可忍用四物加白朮茯苓及當歸膏而愈一小兒沸湯所傷胸腹皆潰久而不愈喜脈弱按之而有力蓋脾主肌肉當調補脾胃為主外敷之藥當緩不信恪用敷貼之而歿一小兒湯傷脛潰而色赤如赭日晡熱甚右關脈浮而數按之則弦此肝木乘脾土血虛而然耳乃外敷內服皆於攻毒後果歿神效當歸膏治湯火等瘡不問已潰未潰肉雖傷而未壞者用之自愈肉已死者用之自潰新肉易生搽至肉色漸白其毒始盡生肌最速蓋當歸生地黃麻油二蠟皆主生肌止痛補血續筋與新肉相宜此方余已刊行治者多驗當歸生地黃各一兩麻油四兩黃蠟一兩如白者止用五錢上先將當歸地黃入油煎枯去渣將蠟熔化候冷攪勻即成膏矣用塗患處將細紙蓋之發背癰疽杖瘡潰爛用之尤效凡死肉潰爛將脫止有些須相連者宜用利刀剪去蓋死肉有毒去遲則傷新肉矣死肉去盡尤宜速貼蓋新肉最畏風寒不可忽也乳香定痛散治傷損及一切瘡瘍潰爛疼痛乳香沒藥各五錢滑石一兩冰片一錢上為細末搽患處痛即止甚效豬蹄湯治一切癰疽杖瘡潰爛消腫毒去惡肉潤瘡口白芷黃芩當歸羌活赤芍藥蜂房多蜂兒者為佳生甘草各五錢上用豬蹄一隻水四五碗煮熟去油渣取清湯入前藥煎數沸去渣溫洗隨用膏藥貼之四物湯方見脅癰六君子湯方見腹癰如聖餅方見流注翻花瘡翻花之症由瘡瘍潰後風寒襲於患處或肝火血燥生風或乳母肝火生風必致瘡口胬肉突出如菌或如指大小長短不同如風邪乘襲者先用補中益氣湯加防風天麻風寒凝滯者先用十宣散加羌活天麻兒肝火生風者先用加味逍遙散加羌活天麻母肝火生風者先用加味小柴胡湯次用加味逍遙散加漏蘆天麻其風邪所乘外用豆豉餅風寒所凝外用蔥熨法更用太乙膏護瘡口突肉不消更以藜蘆膏塗之如瘡口不斂而惡寒發熱者元氣虛也用補中益氣湯晡熱內熱者氣血俱虛也用八珍湯倍加參耆食少難化者脾氣虛也用五味異功散若飲食少思大便不調或肌肉消瘦小便澄白者此兼肝脾疳症也用九味蘆薈丸以清肝火用五味異功散以補脾氣外仍用熨治之法一小兒腿外臁患癰瘡口陷而色黑翻出如菌久而不食此元氣虛弱寒邪滯於患處用十宣散加羌活天麻及附子餅患處漸赤改用蔥熨法而漸白此寒邪去而元氣虛真氣發見也用補中益氣湯及藜蘆膏而痊一小兒臂患癰瘡口色白肉突翻或如菌或如指用追蝕之藥去而復作余謂肝肺氣虛先用益氣湯再用托裡散藜蘆膏而愈一女子脅間患癰瘡口色赤翻出肉如菌寒熱如瘧此肝經血燥生風所致先用加味逍遙散後用加味小柴胡湯及藜蘆膏而愈一小兒患此瘡口色赤腫痛時出血膿此肝經血分有熱用加味逍遙散加生地黃四劑卻以生地易熟地月餘血熱漸退又用八珍湯藜蘆膏而突肉減用十全大補湯而元氣復又用托裡散而瘡瘥一小兒患天蛇毒膿出後指腫大色黯瘡口胬肉手背漫腫而不赤飲食少思大便不實憎寒發熱惟用敗毒行氣之藥余謂此脾胃虛弱不能消化飲食生長肌肉外御風邪非瘡毒使然也朝用益氣湯夕用異功散兩月餘諸症漸愈後因飲食過度吐瀉患處不紅活出清水用異功散蔥熨法藜蘆膏而愈一女子臂癰潰後瘡口突肉如菌用毒藥蝕之突肉益甚面青寒熱經候不調此肝經血燥而生風脾氣虛而不能生肌耳先用加味逍遙散五味異功散兩月餘卻用地黃丸托裡散而愈一小兒患前症用藥腐去瘡口不斂朝惡寒暮發熱余謂因氣血俱虛而然也法當調補脾胃則氣血自生瘡口自斂不悟仍攻其瘡而歿一女子十五歲患前症腐去而復生面色青而或赤余謂此肝膽二經風火妄動蓋肝血為陰為水肝氣為陽為火宜生腎水滋肝血使火自息而風自滅不信乃用祛風之劑致血燥妄行瘡口出血不止而死藜蘆膏治瘡口胬肉凸起或出二三寸肉者藜蘆不拘多少上為末以生豬脂擂和搽凸胬肉上八珍湯加味逍遙散二方見發熱不止補中益氣湯方見肌肉不生托裡散方見熱毒瘡瘍十全大補湯方見便癰五味異功散方見敗毒之藥地黃丸方見作渴不止豆豉餅蔥熨法二方見流注多骨疽多骨疽由瘡瘍久潰脾胃虧損氣血不能營於患處邪氣陷襲久而筋爛骨腐故骨脫出非稟胎所有也當補脾胃壯元氣內用大補湯地黃丸外以附子餅蔥熨法祛散寒邪補接元氣則骨自脫瘡自斂若用克伐之劑復傷真氣鮮有不危嬰兒患之當調補乳母外用蔥熨以歲月除之尤不可用追蝕之藥一小兒足內患之日流清膿惡寒發熱大便去而不了皆元氣虛而下陷也先用補中益氣湯加乾薑肉桂諸症漸復乃用十全大補湯及如聖餅出碎骨而愈一小兒臂患之時出清膿惡寒發熱此元氣虛也朝用補中益氣湯夕用四君歸耆半載常出細骨一塊又用六味丸而愈一小兒患之目睛白多飲食難化手足並冷此稟命門火衰而脾胃虛寒也先用八味丸異功散如聖餅出碎骨乃用六味丸大補湯而愈若攻瘡邪不固元氣必不活矣一小兒十四歲閃足腕間用敗毒之劑腫硬色黑余謂此元氣虛而外寒凝滯也用回陽膏六君肉桂十餘劑腫黯漸消又用沖和膏托裡散餘毒漸軟又佐以大補湯針之出清膿甚多即惡寒發熱此陽隨陰散而氣虛也用六君加肉桂參耆各二錢寒熱頓止卻用八珍湯托裡散豆豉餅而愈一小兒足跗腫硬肉色不變形氣倦怠外敷內服皆敗毒耗氣之藥余謂經云形傷痛氣傷腫乃稟賦足三陰虛羸之症也當滋補元氣若行攻伐虛虛之禍不免矣彼以為迂仍用前藥足跗變黯腫至腳腕余用大補湯異功散各五十劑以調補脾胃及蔥熨患處祛散寒邪補接陽氣漫腫漸消瘡肉赤色旬日而潰此元氣漸復之善症也然固元氣充實瘀肉可腐新肉可生又惑於速效之說敷追蝕生肌之藥患處復黯七惡並臻而歿十全大補湯方見腹癰補中益氣湯方見肌肉不生八珍湯方見發熱不止托裡散方見熱毒瘡瘍如聖餅蔥熨法豆豉餅三方見流注沖和膏一名陰陽散方見寒涼之藥八味丸即六味地黃丸加肉桂附子各一兩方見作渴漏瘡漏瘡之症因稟氣血不足或久病血氣虛弱或兒肝脾食積內熱不能生肌或乳母七情不和脾氣不能收斂當審其所因調補元氣佐以如聖餅蔥熨之類為善若用流氣破血追蝕等藥反為敗症矣余當參各門主之一小兒患在臂間腫硬不消面色痿黃膿水清稀此元氣虧損之症用八珍湯為主六君子湯為佐漸愈因飲食失節惡寒發熱用六君子加升麻柴胡而安用益氣湯加異功散而斂一小兒腿內側患之寒熱發渴此肝脾二經氣血虛症也蓋胃為五臟之本先用五味異功散加升麻柴胡月餘胃氣始復乃用地黃丸補腎水以生肝血而愈一小兒臂間漫腫按之至肉方痛肉色不變形體消瘦面目多白余謂此稟腎經虛症當補脾肺以滋化源反用寒涼克伐之藥脾氣大虛患處肉死又用追蝕之藥死肉雖去瘡口不斂而歿一小兒四歲尚解顱余用地黃丸而顱闔至十六頤間腫硬發熱唾痰余謂屬腎經氣不足水泛而為痰氣傷而為腫不信反用火針敗毒破而出水余曰腎主骨骨而為癰元氣虧敗余何能為後果歿惜哉小兒患在臂外側瘡口開張腫硬色黯發熱惡寒手足時冷此少陽經陽氣虛寒不能生肌收斂也當助胃氣不信仍行攻瘡而歿一小兒十五歲足跟患之二年不愈日出清膿數滴余謂稟腎氣虛弱也不信畢姻後腫硬寒熱仍用攻伐之藥而歿如聖餅蔥熨法二方見流注八珍湯方見發熱不止六君子湯方見腸癰補中益氣湯方見肌肉不生六味地黃丸方見作渴不止五瘤經云肝主筋心主血脾主肉肺主氣腎主骨故云肝為筋瘤心為血瘤脾為肉瘤肺為氣瘤腎為骨瘤小兒患之多因稟賦不足乳母七情起居飲食失調致兒五臟不和內火沸騰血凝氣滯也夫瘤者留也隨氣凝滯臟腑受傷氣血不和所致五瘤之外更有脂瘤粉瘤蝨瘤蟲瘤之類若行氣破血或敷寒涼追蝕之藥或用蛛絲纏芫花線等法以治其外則誤矣一小兒因乳母鬱怒臂前臁腫硬皮色如常日出膿水乃脾肺之虛症也用加味歸脾湯如聖餅三月餘腫漸消後因母怒發熱兒患處復腫用加味逍遙散母服二十餘劑兒日服杯許赤腫漸退仍以前藥久服而愈一小兒頭後患之久不斂目睛多白此稟腎虛之症母子並服六味丸補中湯外以六味丸料加鹿茸作餅熱熨患處每日一次而斂一女子腿外臁一瘤寸許色赤破而血逆漂甚多發熱作渴先用當歸補血湯渴熱漸愈又用加味逍遙散瘡口尋愈一小兒落草大腿外股如指尖一塊肉色如常按之不痛至數月誤觸破出如粉漿內股焮痛寒熱如瘧手足抽搐如急驚狀此膿水出多氣血虛而內生風也先用異功散加鉤藤鉤二劑又用八珍湯加鉤藤鉤而安用托裡散而痊一小兒二歲項間自分娩有一核余謂但調治乳母其兒自愈彼欲速效外塗牡蠣硝黃之類內服海藻蓬朮之類脾胃復傷而歿一小兒九歲項間患之余謂稟腎肝血燥所致當滋水生木不信另用藥破之膿水淋漓仍服散堅之藥而歿一女子腿前腫一小瘤作癢搔破出蟲如蚊而飛去寒熱如瘧乃肝經之症即蝨瘤之類用加味逍遙散而愈又有一種發瘤破開有發屬腎經之症也加味歸脾湯方見腹癰地黃丸方見作渴不止加味逍遙散八珍湯二方見發熱不止托裡散方見熱毒瘡瘍補中益氣湯方見肌肉不生五味異功散方見敗毒之藥如聖餅方見流注
