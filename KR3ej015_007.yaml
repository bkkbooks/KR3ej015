body:
  text: 卷七熱吐經云胃傷則吐小兒熱吐者因多食甘甜炙煿之物或乳母膏粱厚味胃經積熱或夏間暑氣內伏於胃所致若肌肉瞤動煩熱作渴者暑傷胃氣也先用香薷飲次用竹茹湯若吐乳色黃不能受納者胃經有熱也先用瀉黃散次用人參安胃散若吐出酸穢者乳食內停也用保和丸吐乳不消者胃氣弱也用異功散吐而少食腹痛欲按者脾氣虛也用六君子加木香凡諸症當驗其手足熱則胃熱冷則胃寒熱用瀉黃散寒用理中湯不熱不寒異功散調之治驗一小兒夏月吐乳手指發熱作渴飲冷口吐涎水余謂胃氣熱廉泉開而涎出也用瀉黃散而愈後復嘔吐另用克滯之劑口渴飲湯流涎不已余謂胃氣虛寒不能攝涎也用理中丸而愈一小兒七歲嘔吐不食面白指冷此胃氣虛寒也用理中湯嘔吐頓愈又用六君子湯而痊後傷食腹痛發熱嘔吐流涎先用保和丸一服而痛嘔愈再用四君山梔而涎止一小兒食涼粉而嘔吐酸物頭痛發熱此內傷兼外感也用人參養胃湯末二錢薑湯調服諸症皆愈惟吐酸涎用大安丸一服而止一小兒傷食發熱嘔吐酸物手指常冷此胃氣虛寒陰盛隔陽於外虛熱所致也用保和丸末二錢濃薑湯調服而吐止再用六君子湯加山梔而安一小兒嘔吐作渴暑月或用玉露飲子之類而愈又傷食吐酸余先用保和丸一服吐止次用五味異功散飲食漸進又用四君子湯而痊一小兒暑月患吐瀉服香薷飲五苓散之類而止但手足並冷睡而露睛飲食不入腸鳴作嘔欲用清涼之劑余曰此始為熱終為寒也當舍時從症用人參理中丸以薑湯化二服病勢始定次用助胃膏漸安又用六君子湯調理而愈一小兒飲食多即吐余用五味異功散愈之又腹痛嘔吐先服大安丸仍用異功散而愈後症復作另投祛逐之劑吐瀉不食腹中痛甚以手按之則止此脾氣復傷也先用補中益氣湯加茯苓半夏一劑又用六君子升麻柴胡二劑飲食頓進後食生冷挾驚吐瀉手足並冷唇口搐動用六君鉤藤鉤柴胡而愈一小兒吐酸作渴飲冷腹痛發熱用人參養胃湯加黃連一劑吐熱稍定又用保和丸一服腹痛頓止後傷食復吐腹脹大便不通用紫霜丸下之尋愈又感冒咳嗽腹脹另服下藥發熱作吐腹脹手足並冷睡而露睛發搐用六君鉤藤鉤而安又用四君加當歸川芎而愈後患吐瀉手足並冷用助胃膏頓痊一小兒嘔吐發熱用瀉黃散而愈後因乳母飲酒腹脹吐瀉用葛花解醒湯子母服之漸愈大便日去五七次用五味異功散加升麻二劑日去三次乃用四君肉豆蔻而痊一小兒吐酸發熱用保和丸漸愈又用四君山楂神麯而安後因飲食過多嘔吐復作另用下積丸更加作瀉腹脹手足發搐余以為肝木侮脾用五味異功散加柴胡鉤藤鉤而搐止又用六君子湯飲食漸進而痊一小兒夏間嘔吐腹痛大便不通服大黃藥而愈又傷食患吐發熱服瀉黃散等藥嘔吐腹痛按之即止面色青黃手足並冷此脾胃復傷而虛寒也用異功散加木香愈之後又傷食腹脹作痛或用消食丸吐瀉並作小腹重墜午後益甚余朝用補中益氣湯夕用六君子加木香而愈一小兒嘔吐發熱腹痛面赤手熱口乾飲湯按其腹不痛此脾胃氣虛也用異功散加木香乾薑一劑而愈後傷食吐而咽酸腹中作痛按之益甚此飲食內停也用保和丸二服而痊葛花解醒湯治乳母酒醉後乳兒遺熱為患白豆蔻砂仁葛花各五錢乾生薑白朮澤瀉神麯炒黃各二錢白茯苓陳皮人參豬苓木香五分青皮三分上為末每服二錢白湯調服愚按前湯先哲不得已而用之蓋醉酒耗氣又復辛散重損真陰折人長命可不慎哉助胃膏治脾胃虛寒吐瀉等症人參白朮白茯苓甘草炙丁香各五錢砂仁四十個木香三錢白豆蔻十四個乾山藥一兩肉豆蔻四個煨上為末蜜丸芡實大每服十丸米湯化下香薷散方見熱吐竹茹湯五苓散二方並見五淋玉露散補中益氣湯大安丸保和丸四方見虛羸六君子湯四君子湯二方見天釣瀉黃散人參安胃散二方見脾臟理中丸方見冷瀉人參養胃湯方見瘧症寒吐噦逆錢仲陽曰寒吐者由乳母當風取涼或風寒客於乳房其症面目脹額汗出脈沉遲微寒氣停於胃故胃不納而吐出也噦逆者由胃氣虛甚過服克伐使清氣不升濁氣不降以致氣不宣通而作也風寒在胃者用理中丸次服釀乳法若嘔吐清涎夾乳小便清利用大安丸若因乳母食厚味用東垣清胃散若乳母飲醇酒用葛花解醒湯飲燒酒服冷米醋三五杯乳母食生冷而致者用五味異功散乳母停食者母服大安丸子服異功散乳母勞役者子母俱服補中益氣湯乳母怒動肝火者用加味逍遙散乳母鬱怒傷脾者用歸脾湯乳母脾虛血弱者用六君芎歸其子亦服三五滴氣血虛而乳熱者子母俱服八珍散仍參熱吐霍亂治之治驗一小兒因停食腹痛服疏導之藥而愈後復停食又用前藥寒熱不食腹脹後重大便頻而少此脾氣復傷而下陷也先用異功散加升麻數劑後重漸愈再用當歸痊愈後因乳母恚怒致見寒熱發搐作嘔用六君柴胡山梔以治其母兼灌其兒並愈一小兒因乳母感冒風寒發熱兒患嘔吐身發赤暈用東垣人參安胃散而愈又咬牙發搐嘔吐酸腐待其吐止自安一小兒時吐乳食診其母有鬱怒之症用加味歸脾湯加味逍遙散治之而愈一小兒七歲身羸兼吐少食發熱面黃余謂脾臟受傷用六君煨姜二劑而飲食進去姜又數劑而愈一小兒吐乳大便臭穢目睛緩視因乳母交感後飲乳所致用六君木香藿香治之而安一小兒吐乳不食手足搐搦痰涎上湧手足指冷額黑唇青此腎水勝心火也用五味異功散加木香炮姜頓愈去姜又數服而愈一小兒不時乾嘔不乳腹膨此脾胃虛而將成疳也用四味肥兒丸以治疳四君子湯以健中而痊後傷食吐瀉完穀行氣困憊四肢微搐余曰且勿藥次日吐止但搐而瀉青黃此脾土虛而肝木勝也用六君鉤藤鉤而痊釀乳法治嬰兒有胎熱症令乳母服之不可遽用冷藥恐損脾胃若加嘔吐必成大患澤瀉二兩五錢豬苓去黑皮赤茯苓天花粉各一兩半生地黃二兩山茵陳去梗甘草各一兩上每服五錢水煎食後捏去舊乳服茯苓半夏湯治嘔穢心下堅痞膈間有水痰眩驚悸半夏五錢白茯苓二兩上每服三錢姜水煎服二陳湯治痰飲嘔吐噁心或頭眩心悸或中脘不快或因食冷物胃氣不和半夏橘紅各五錢白茯苓三錢甘草炙一錢五分上每服二三錢烏梅一個薑棗水煎服四味肥兒丸治嘔吐不食腹脹成疳或作瀉不止或食積脾疳目生雲翳口舌生瘡牙齦腐爛發熱瘦怯遍身生瘡又治小便澄白腹大青筋一切疳症黃連蕪荑神麯麥芽炒各等分上為末水糊丸桐子大每服一二十丸空心白滾湯送下東垣人參安胃散治服峻劑脾胃虛損或成慢驚泄瀉嘔吐腸胃有熱以致前症方見脾臟東垣清胃散方見內釣理中丸方見咳嗽葛花解醒湯方見熱吐大安丸即保和丸加白朮保和丸補中益氣湯三方見虛羸加味逍遙散加味歸脾丸清胃散六君子湯異功散四君子湯六方見內釣八珍湯方見寒熱人參養胃湯方見瘧症霍亂吐下錢仲陽云吐瀉壯熱不食或乳不消是傷乳也宜白餅子下之後用益黃散和胃若吐瀉身溫不乳大便青白此上實下虛也用益黃散加減治之大凡吐瀉身溫乍涼乍熱氣粗大便黃白吐乳不消此傷風熱也先服大青膏發散後服益黃散和胃若吐瀉身熱多睡能乳吐痰大便黃水胃虛也先用白朮散生津止渴後用大青膏鉤藤飲發散風邪若夏至後吐瀉身熱或吐乳瀉黃此傷熱乳也用玉露散之類凡瀉乳腹痛按之而哭者食積痛也用白餅子下之按之不哭者脾胃氣虛也用五味異功散補之手足指冷者脾氣虛寒也用異功散加木香傷風吐瀉者風木剋土脾也亦用前藥若飲熱乳而瀉黃者濕熱壅滯也用四苓散如不愈或反甚者元氣復傷也用白朮散瀉而腹中重墜者脾氣下陷也用補中益氣湯若服克滯之藥而腹中窄狹者脾氣虛痞也用六君子湯若面黃瀉青脾虛而肝乘之也用六君柴胡升麻木香若多噫瀉黃心脾氣虛也用六君炮薑升麻生下半月旬日內吐者止宜調治其母恐嬰兒臟腑脆弱不勝藥餌故也治驗一小兒盛暑吐瀉米穀不化或用黃連香薷飲之類腹脹作痛手足指冷此脾氣虛而伏陰在內也用五味異功散加木香治之而愈先君嘗云凡暑令吐瀉手足指熱作渴飲冷者屬陽症宜清涼之劑手足指冷作渴飲熱者屬陰症宜溫補之劑故凡病屬陰症誤用寒涼之藥死後手足青黯甚則遍身皆然於此可驗一小兒吐瀉乳食色白不化露睛氣喘此脾肺不足形病俱虛也先用異功散加柴胡桔梗頓愈再用補中益氣湯而安一小兒吐瀉驚悸困倦腹脹此心火虛而脾土怯也用六君茯神酸棗仁而愈又用秘旨保脾湯乃瘥一小兒吐瀉驚搐項強乃脾傷而肝侮形氣虛而病氣實也用異功散加鉤藤鉤補脾平肝而愈一小兒吐瀉呵欠頓悶不語畏明屬脾肺不能生肝腎也用異功散補脾肺地黃丸補肝腎遂痊一小兒吐瀉腹脹不乳此脾胃傷也先用香砂助胃膏而飲食進後用六君子湯而脾胃健一小兒寒熱作嘔飲食不入按其腹則哭此飲食停滯也先用大安丸遂安但唇目抽動大便稀黃此病邪去而脾氣虛弱也用六君子湯以補脾土鉤藤鉤以平肝木悉愈一小兒白睛多唇色白停食吐瀉困睡驚悸久治不愈余曰驚悸為心血虛怯困睡為脾氣虛弱皆稟脾腎不足所致也用補中益氣湯及六味丸加鹿茸而愈一小兒未周歲氣短喘急乳食少進時或吐乳乃脾傷而食積也先用六君山楂枳實漸愈後吐瀉作渴用胃苓膏以治吐瀉白朮散以生胃氣而安一小兒四歲每飲食失節或外驚所忤即吐瀉發搐服鎮驚化痰等藥後患益甚飲食不入藥食到口即嘔余用白朮一味和土炒黃用米泔水濃煎不時灌半匙尚嘔次日微嘔又一日不嘔漸加至半杯月餘而愈一小兒停食吐瀉身熱作渴瀉下紅白或青黃色服香連丸而愈甚兼手足指冷余謂始為實終為虛也用補中益氣湯加木香肉果而愈一小兒傷食吐瀉大便溏泄或青綠色睡而露睛手足指冷額黑唇青此中氣虛弱寒水侮土也用五味異功散加升麻柴胡木香附子一劑而愈後患吐瀉不已先用胃苓散後用異功散而安一小兒寒熱嘔吐或瀉青色余謂脾虛肝木所乘也用六君柴胡升麻治之而愈後因驚寒熱寅卯時益甚小便頻數久而不愈此肝火血虛先以小柴胡湯加白朮茯苓當歸二劑頓止又用地黃丸而愈車前子散治暑月霍亂吐瀉煩悶引飲不止小便不利白茯苓豬苓香薷車前子炒人參各等分上為末燈心湯調下不換金正氣散治脾胃不和寒熱往來臟腑虛熱霍亂吐瀉厚朴薑製藿香陳皮半夏蒼朮米泔浸甘草炙各等分上每服二三錢薑棗水煎服二順散治中暑霍亂吐瀉煩悶燥渴小便赤澀便血肚疼豬苓澤瀉茯苓白朮甘草炙桂乾薑杏仁去皮尖雙仁炒各一兩上為末每服半錢不拘時水調下或水煎服又釀乳法治胃虛吐瀉睡中吐舌搖頭嘔乳額上汗流驚渧面黃令兒飢飲人參木香藿香沉香陳皮神麯麥芽各等分丁香減半上每服四錢姜十片紫蘇十葉棗三枚水煎每服半盞令乳母食後捏去舊乳方服臥少時卻與兒乳胃苓湯又名胃苓散為末蜜丸名胃苓膏治腸胃受濕嘔吐泄瀉白朮茯苓澤瀉厚朴豬苓陳皮甘草炒各等分桂少許上為末每服二錢姜水燈芯陳皮煎湯調下若停食吐瀉小便短少腹脹作痛用此以分利之更用六君子湯以調補脾胃益黃散方見脾臟理中湯方見咳嗽助胃膏方見熱吐一名香砂助胃白餅子方見發搐白朮散方見積痛鉤藤散方見慢驚玉露散方見熱瀉五苓散方見五淋香薷飲方見嘔吐定命飲子異功散六君子湯四君子湯三方並見內釣大青膏方見肝臟補中益氣湯大安丸二方見虛羸即保和丸加白朮香連丸方見諸痢小柴胡湯方見痙症四苓散方見五淋五苓散去桂魃病巢氏云小兒魃病者婦人懷妊時有鬼神觸胎所致其狀微利寒熱往來毛髮爭寧情思不悅宜服龍膽湯又小兒未斷乳母復有胎兒飲其乳羸瘦骨立發黃壯熱大便不調名鬾病又名魃病也用紫霜丸下之益黃散補之令兒斷乳仍服消乳丸異功散有妊而抱他兒亦致此症海藏云魃病者因母有妊兒飲其乳致病如瘧痢腹大或瘥或發他人相近亦能致之北人有取伯勞鳥羽帶之云可愈者竊謂前症因邪氣所觸而患故用紫霜丸下之若元氣被傷吐瀉諸症者當隨各症治之益黃散方見脾臟消乳丸方見調護法異功散六君子湯二方見內釣紫霜丸龍膽湯二方見噤風撮口補中益氣湯方見虛羸冷瀉湯氏云冷瀉者乃脾胃虛寒水穀不化而泄錢仲陽云小兒不能食乳瀉褐色身冷無陽也當用益黃散加減治之大便清白口不煩渴冷積瀉也理中湯主之若口鼻吸風寒之氣脾胃受生冷之食而作者先用理中湯後用異功散命門火衰不能溫蒸中州之氣故脾胃虛寒者用益黃散及八味丸脾胃虛弱者五味異功散脾氣下陷者補中益氣湯脾氣虛寒者人參理中湯寒水侮土者益黃散肝木乘脾者四君柴胡散手足並冷者加木香乾薑治者審之治驗一小兒瀉利青白手冷麵青或時吃逆余用人參理中湯更加腹痛仍以前湯加木香乾薑二劑稍緩又以五味異功加木香漸愈又用五味異功散加升麻調理而痊一小兒腹痛作瀉飲食不化小腹重墜用補中益氣湯加乾薑為末每服錢許米飲調日二三服旬余稍愈又以五味異功散為末米飲調服旬余漸愈又以四君子湯而痊一小兒泄瀉腹痛手足並冷唇青額黑余謂寒水侮土用益黃散痛止再用六君乾薑漏蘆子母服之頓止又用人參理中湯而痊一小兒久瀉兼脘肛小腹重墜四肢浮腫面色痿黃時或兼青諸藥到口即嘔吐審乳母憂鬱傷脾大便不實先用補中益氣湯五味異功散及四神丸調治其母不兩月子母並愈一小兒患瀉乳食不化手足指冷服消乳丸食乳即瀉余用五味異功散加木香母子服之而愈後時搐唇口抽動用異功散加木香鉤藤鉤補脾平肝而痊一小兒泄瀉手足發搐痰涎上湧手足指冷額黑唇青用五味異功散加木香炮姜補心火救脾土而愈一小兒年十四患泄瀉小腹重墜飲食甚少先用六君子湯送四神丸數劑瀉漸止飲食稍進又用補中益氣湯數劑下墜漸愈後因勞發熱自臍而起飢則熱甚用六君炮姜治之稍安又用加味歸脾補中益氣二湯而痊人參理中湯人參白朮炒乾薑炮甘草炙各等分上每服一二錢水煎蜜丸即人參理中丸加附子即附子理中湯益黃散方見脾臟理中湯方見咳嗽四君子湯六君子湯五味異功散三方並見內釣補中益氣湯方見虛羸八味丸方見腎臟即六味丸加肉桂五味子四神丸方見驚瀉熱瀉湯氏云小兒熱瀉者大便黃赤有沫乃臟中有積或蘊結所致若小便赤少口乾煩躁當用四苓散熱甚者四逆散右腮色赤飲冷胃經實熱也用瀉黃丸惡冷喜熱胃經虛熱也用白朮散右腮及額間俱赤心脾翕熱也用瀉黃散加炒黑黃連若左頰右腮俱赤肝火乘脾土也用四君子湯加柴胡若兒暴傷乳食用保和丸乳母尤當忌厚味節飲食若乳母停食所傷致兒吐瀉等病當治其母大抵始病而熱者邪氣勝則實也終變為寒者真氣奪則虛也久病而熱者內真寒而外假熱也久瀉元氣虛寒當參前症治之治驗一小兒夏間食粽傷胃吐而腹痛余用保和丸彼以為緩另用重劑吐瀉並作腹痛益甚按其腹卻不痛余曰此食已消而脾胃虛也當溫補之仍行消導昏憒發搐余用異功散加木香治之漸愈後復傷食另用去積丸吐瀉不食手足並冷睡而露睛變為瘧疾余用六君木香炮姜治之而愈一小兒瀉而大便熱赤小便澀少此熱蘊於內也先用四苓散加炒黃連一劑其熱頓退又用白朮散去木香二劑熱渴頓止以四君升麻調理而痊一小兒食炙煿甘甜之物常作瀉大便熱痛小便赤澀此膏粱積熱所致用四苓散清胃散各四服諸症稍退乃用四味肥兒丸而瘥一小兒九歲食炙煿之物作瀉飲冷諸藥不應肌體消瘦飲食少思余用黃連一兩酒拌炒焦為末入人參末四兩粥丸小豆大每服四五十丸不拘時白湯下服訖漸愈又用五味異功散加升麻服月餘而瘥後不戒厚味患疳積消瘦少食發熱作渴用九味蘆薈丸為主以四味肥兒丸為佐疳症漸退卻以四味肥兒丸為主以五味異功散為佐而痊後又不禁厚味作瀉飲冷仍服肥兒丸異功散而愈一小兒侵晨泄瀉服消疳清熱之劑不應余謂脾腎虛用二神丸治之不信仍服前藥形體骨立復求治用四神六味二丸治之尋愈停藥數日飲食漸減泄瀉仍作至十七歲畢姻瀉渴頓作用前藥治之無效乃用補中益氣湯八味丸而始應一小兒因母怒氣停食患泄瀉服消導之劑更加吐乳先用養胃湯加炒黑黃連一錢吳茱萸二分木香四分治其母子亦灌一二匙悉愈後母傷食患血痢腹痛其子亦然治以四君子加前三味母子俱服因惑於人言但令母服子另服治痢之藥加作嘔不乳手足並冷余用五味異功散加木香炮薑漏蘆母子並服而愈一小兒患瀉身熱作渴瀉下穢氣此為內熱而瀉也用香連丸一服而愈後患瀉服黃連香薷飲益甚余用六君木香肉果而愈一小兒患瀉作渴飲冷手足並熱睡而露睛此為熱瀉用黃芩湯一劑而愈又用白朮散二服而安一小兒患瀉面赤飲冷小便赤色先用四苓散香連丸各一服而便利勢減又用異功散加木香黃連各二分吳茱萸一分二服而愈一小兒瀉而腹痛按之不痛用異功散加升麻而愈後復瀉服消乳丸益加腹痛余謂脾氣傷也復用異功散加木香而痊一小兒吐瀉腹痛睡而露睛小腹重墜手足並冷先用六君升麻乾薑四服而痛墜愈又用異功散加升麻木香而悉愈後又傷食腹痛別服祛逐之劑虛症悉具余用理中丸六君子湯而尋愈但噫氣下氣口角流涎此脾胃虛寒也復用理中六君子二湯而愈黃芩湯治下痢頭痛胸滿口乾或寒熱脅痛不時嘔吐其脈浮大而弦黃芩一兩五錢芍藥甘草炒各一兩上每服二三錢姜水煎嘔加半夏二錢玉露散治吐瀉黃色寒水石石膏各半兩甘草一錢上為末每服半錢白滾湯調服四味肥兒丸方見嘔吐異功散方見內釣二神丸四神丸二方見驚瀉八味丸即六味丸加肉桂五味方見腎臟調中丸即理中湯方見咳嗽白朮散方見積痛四苓散即五苓散去桂方見五淋四逆散方見積滯胃苓湯方見吐瀉養胃湯方見瘧症清胃散四君子湯六君子湯三方見內釣保和丸方見虛羸香連丸方見諸痢食瀉東垣云傷食則惡食小兒食瀉者因飲食傷脾脾氣不能健運故乳食不化而出若噯臭吞酸胸膈脹滿腹痛按之益痛者雖作瀉而所停滯之物尚未消也用保和丸腹痛按之不痛者乳食已消也用異功散脾氣傷而未復不思飲食者用六君子湯所傷生冷之物及喜熱者並加木香乾薑乳食已消腹痛已止瀉尚未止者脾失清升之氣也用補中益氣湯余有別症當參各門治驗一小兒泄瀉不食噯腐酸氣用平胃散一服而瀉止又用五味異功散而飲食增後復傷吐瀉喘嗽手足指冷面色黃白余謂脾虛不能生肺也用六君升麻桔梗而愈一小兒傷食作瀉發熱服寒涼藥熱甚作嘔此胃經虛熱也先用四君子升麻而嘔止又用白朮散而安一小兒乳哺失節泄瀉腹痛自用藥下之反加痰搐又服化痰止搐之藥而痰搐益甚睡而露睛手足微冷余以謂脾胃已虛而重傷之也用異功散加木香鉤藤鉤母子並服三日而痰搐止五日而瀉痛除一小兒傷食瀉青發搐余謂肝木勝脾也用六君木香鉤藤鉤而愈後傷食腹痛別用消食丸唇青額黑瀉益甚此脾氣虧損寒水反來侮土也用六君木香乾薑而痊一小兒面色痿黃傷食作瀉面色頓白氣喘痰湧余謂脾肺氣虛下陷法當升補彼不信別服清氣化痰之藥虛症蜂起余先用補中益氣湯一劑諸症頓退又用五味異功散而痊一小兒泄瀉兩寸脈或短或伏用補中益氣治之頓愈余見患前症不服此藥而危者多矣惜哉一小兒飲食後即瀉先用六君升麻神麯山楂而止又用五味異功散加升麻而痊後傷食吐瀉腹痛用保和丸二服又用異功散調補脾氣而安一小兒傷食作瀉腹脹四肢浮腫小便不利先用五苓散加木香旬余諸症漸退又用五味異功散為主佐以加減腎氣丸又旬日二便調和飲食漸進浮腫旋消乃以異功散調理而愈一小兒十三歲傷食作瀉服克伐之劑胸腹膨脹手足並冷余謂當調補中氣不信後見睡而露睛唇口搐動乃用六君木香鉤藤鉤至四劑搐動頓止又一劑飲食加進以五味異功散加升麻柴胡膈寬瀉止而愈調中湯治傷乳食瀉後脾胃虛噦吐瀉人參茯苓白朮木香乾薑藿香香附炒去毛縮砂仁甘草炙丁香各等分上水煎食前服香橘餅治傷冷積瀉木香青皮各一錢陳皮二錢五分厚朴神麯麥芽炒各半兩上為末蜜丸為餅每服一枚米飲調下保安丸治傷食瀉白殭蠶炮青皮去穰陳皮去白三稜炮蓬朮泡甘草炒各五錢砂仁香附各一錢上為末用麥芽米糊丸綠豆大每服二三丸白湯下四君子湯六君子湯異功散三方並見內釣白朮散方見積痛平胃散方見胃氣虛冷白餅子方見發搐消食丸方見嘔吐乳補中益氣湯保和丸加白朮名保和湯二方見虛羸胃苓散即五苓散平胃散合用薑棗煎服又名胃苓湯金匱加減腎氣丸方見腹脹驚瀉小兒驚瀉者肝主驚肝木也盛則必傳克於脾脾土既衰則乳食不化水道不開故泄瀉色青或兼發搐者蓋青乃肝之色搐乃肝之症也亦有因乳母脾虛受驚及怒動肝火而致者經曰怒則氣逆甚則嘔血及飧泄法當平肝補脾慎勿用峻攻之藥脾氣益虛肝邪彌甚甚至抽搐反張者亦肝火熾盛中州虧損之變症也凡見驚症即宜用四君六君異功散等方加白附子定風柴胡平肝引經以杜漸則必不至瀉搐而自安矣今已見瀉吐驚搐尚不知補脾平肝以保命抱龍鎮驚等藥治之其亦去生遠矣治驗一小兒因驚久瀉面色青黃余謂肝木勝脾土也朝用補中益氣湯夕用五味異功散加木香子母俱服而愈一小兒泄瀉驚搐其母面青脈弦先用小柴胡湯加木香漏蘆一劑次用四君木香鉤藤鉤山梔母子同服而愈一小兒因其母被驚患瀉服藥傷胃反致吐乳余用五味異功散炒黑黃連木香治其母時灌子一二匙俱愈後母因鬱怒停食下痢嘔吐腹痛其子昏憒不食以六君子湯加車前子黃連木香母子俱服而安一小兒久瀉青色腸鳴厥冷余曰此驚泄也脾土既虧則肝木來侮須溫脾平肝然後可愈彼以為迂自用治驚悸等藥腹脹重墜小便不利四肢浮腫始信前言重複請治余先用五味異功散加升麻柴胡數劑諸症稍可又以補中益氣湯數劑飲食少加又因傷食夾驚吐瀉發搐復用異功散加柴胡鉤藤鉤四劑諸症稍退又傷風咳嗽腹脹作瀉或用發散解利之劑手足逆冷睡中發搐余謂此脾土虛而肺金受症重傷真氣故也用異功散加紫蘇一劑以散表邪次以補中益氣湯加茯苓半夏調補真氣而痊一小兒因驚吐瀉腹脹先用六君木香柴胡治之稍可又以五味異功散而愈後因驚搐痰甚或用鎮驚化痰之藥倦怠不食而泄益甚先用異功散加木香鉤藤鉤四劑而愈四神丸治脾虛胃弱大便不實飲食不思或泄痢腹痛肉豆蔻二兩補骨脂四兩五味子二兩吳茱萸二兩上為細末用紅棗六十五枚生薑六兩用水二鍾煮乾取棗肉和丸如桐子大每服五六十丸白湯送下或化服二神丸補骨脂四兩肉豆蔻生用二兩上為末用紅棗四十九枚生薑四兩用水一鍾煮乾取棗肉和丸桐子大每服二三十丸白滾湯下朱君散治吐瀉後有此症並糞青者宜服之即四君子湯加辰砂麝香燈心鉤藤鉤為末每服一錢白湯調下方見內釣太乙丹常服安神鎮驚止夜啼桔梗炒一兩藿香葉白扁豆炒各半兩白芷川芎各二錢上為末蜜丸芡實大辰砂為衣每服一丸薄荷湯磨下糞青者棗湯下夜啼燈心鉤藤鉤湯下加白朮茯苓白芍藥尤妙補中益氣湯方見虛羸六君子湯五味異功散二方並見內釣小柴胡湯至聖保命丹二方並見痙症八味丸即六味丸加五味肉桂方見腎臟諸痢錢仲陽云瀉痢黃赤黑皆熱也瀉痢青白米穀不化皆冷也東垣云白者濕熱傷於氣分赤者濕熱傷於血分赤白相雜氣血俱傷也海藏用四君芎歸治虛弱之痢四君乾薑治虛寒之痢余嘗治手足指熱飲冷者為實熱用香連丸手足指冷飲熱者為虛寒用異功散送香連丸若兼體重肢痛濕熱傷脾也用升陽益胃湯小便不利陰陽不分也用五苓散若濕熱退而久痢不愈者脾氣下陷也用補中益氣湯倍加升麻柴胡瀉痢兼嘔或腹中作痛者脾胃虛寒也用異功散加炮薑木香或變而為瘧者肝克脾也用六君升麻柴胡鉤藤鉤若積滯已去痢仍不止者脾氣虛也用四君子送下香連丸若因乳母膏粱厚味六淫七情致兒為患者當各推其因仍兼治其母並參冷熱瀉及積滯腹痛等症覽之治驗一小兒下痢赤白裡急後重腹時痛用香連丸而痊後傷食復變痢欲嘔少食用五味異功散加木香三分黃連二分吳茱萸一分數劑而愈一小兒患痢口乾發熱用白朮散煎與恣飲時以白朮散送香連丸而安一小兒久痢裡急後重欲去不去手足並冷此胃氣虛寒下陷也用補中益氣湯加木香補骨脂倍加升麻柴胡而愈一小兒久痢作渴發熱飲湯用白朮散為主佐以人參二兩黃連一兩炒黑為丸時服數粒盡劑而痊一小兒作瀉不乳服克伐之劑變痢腹痛後重余用補中益氣湯送香連丸又用香砂助胃膏六君子湯而愈一小兒傷乳食不時嘔吐雜用消導之劑變痢不止先用六君木香漸愈後用七味白朮散而痊一小兒傷乳食吐瀉變赤痢後重腹痛先用香連丸而愈又乳食過多腹痛先用保和丸一服痛止又用五味異功散加木香二劑而愈一小兒下痢腹痛陰冷小便短少用五味異功散加肉豆蔻頓愈復作嘔吐咽酸或用巴豆之藥連瀉五次飲食頓減手足並冷余用五味異功散加木香乾薑飲食少進倍用乾薑又四劑手足溫而痢亦痊一小兒痢後腹脹作嘔大便不實小便不利諸藥不應余先用五味異功散加木香肉果數服二便少調又數劑諸症少愈用八味丸補命門之火腹脹漸消用金匱加減腎氣丸諸症頓退又用四君升麻柴胡而痊安一小兒患痢喘嗽不已此肺氣虛也用六君子加木香為末每服錢許以人參陳米薑湯調服即睡乳食少進又二服而喘嗽頓安乃用四君子湯而痊石蓮散治小兒噤口痢嘔逆不食蓮肉炒去心為末每服一錢米飲調一方山藥末米飲調下胃風湯治風冷客於腸胃乳食不化泄瀉腸鳴腹滿而痛或下如豆汁或瘀血日夜無度白芍藥白朮肉桂人參當歸川芎茯苓上為末每服二錢入粟米水煎空心熱服香連丸黃連十兩用吳茱萸五兩水拌濕入瓷器頓滾湯中半日炒焦黑木香二兩上為末丸如赤豆大每服二三丸白湯下地榆飲治冷熱痢腹痛下痢赤白頻並地榆三分甘草赤芍藥炒枳殼各二分上水煎服黃連解毒湯治時疾三日汗已解若煩悶乾嘔口燥呻吟發熱不臥黃連炒三錢黃柏炒半兩梔子炒四兩黃芩炒二錢上每服二三錢水煎未效再服亦治熱痢湯氏異功散止渴消暑生津澤瀉豬苓去皮三錢陳皮二錢半白朮茯苓人參各五錢辰砂一錢上為末蜜丸芡實大每服一丸燈心竹葉湯化下升陽益胃湯黃耆二錢半夏人參甘草炙各一錢獨活防風白芍藥羌活各五錢陳皮茯苓柴胡澤瀉各三分白朮黃連炒一錢上水二鍾姜三片棗二枚煎四分食遠服五苓散方見五淋愚按前症若津液偏滲於大腸大便瀉而小便少者宜用此藥分利若陰陽已分而小便短少者此脾肺虛而不能生也宜用補中益氣湯加麥門五味虛火上炎而小便赤少者此肺氣受傷而不能生水也用六味地黃丸料加麥門冬五味不可概以小便不利而用滲泄之劑也四君子湯六君子湯異功散三方見內釣補中益氣湯保和丸二方見虛羸香砂助胃膏方見熱吐白朮散方見積痛八味丸方見腎臟即六味丸加肉桂五味子金匱加減腎氣丸方見腹脹諸瘧經曰夏傷於暑秋必痎瘧其證先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲蓋邪氣並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱陰陽上下交爭虛實更作故寒熱間發也有一日一發二日一發三日一發有間一日連二日發有日與夜各發有上半日發下半日發及發於夜者有有汗有無汗此其略也以詳言之當分六經五臟及痰食勞暑鬼瘴之不同邪中三陰之各異如足太陽之瘧令人腰痛頭重寒從背起先寒內熱熇熇暍暍然熱止汗出難已足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病止則善嘔嘔已乃衰足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲開戶而處其病難已足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒此六經瘧也肺瘧者令人心寒寒甚熱熱間善驚如有所見者心瘧者令人煩心甚欲得清水反寒多不甚熱肝瘧者令人色蒼蒼然太息其狀若死者脾瘧者令人心腹中痛熱則腸中鳴鳴已汗出腎瘧者令人灑淅然腰脊痛宛轉大便難目眴眴然手足寒胃瘧者令人且病也善飢而不能食食而支滿腹大此五臟瘧也痰瘧者胸膈先有停痰因而成瘧令人心下脹滿氣逆煩嘔是也食瘧者是飲食傷脾其人噫氣吞酸胸膈不和是也勞瘧者久而不瘥表裡俱虛客邪未散真氣不復故疾雖間遇勞即發是也暑瘧者其人面垢口渴雖熱亦退亦常有汗是也鬼瘧者進退無時是也瘴瘧者感山嵐瘴氣其狀寒熱休作有時是也作於子午卯酉日為少陰瘧作於寅申巳亥日為厥陰瘧作於辰戌丑未日為太陰瘧此所謂三陰各異也久而不愈名曰痎瘧痎瘧老瘧也老瘧不愈結癖於兩脅之間名曰瘧母此先失於解散或復外感風寒內傷飲食故纏綿不已也治法風暑之邪從外而入宜解散之解表後即宜扶持胃氣故丹溪曰無汗要有汗散邪為主有汗要無汗固正氣為主驟發之瘧宜解表久發之瘧宜補脾寒瘧宜溫溫瘧宜和癉瘧宜清挾痰則行痰兼食則消食勞瘧宜安暑瘧宜解鬼瘧宜祛瘴瘧宜散此亦其略也更以詳言之則熱多寒少者小柴胡湯寒多熱少者清脾飲子無汗者桂枝麻黃各半湯有汗者柴胡桂枝湯渴而小便不利者五苓散熱多汗出腹滿便秘者大柴胡湯痰瘧者二陳湯加柴胡黃芩甚者加枳實食瘧者先用大安丸次用異功散勞瘧痎瘧並用補中益氣湯暑瘧者十味香薷飲鬼瘧者鬼哭散瘴瘧者四獸飲瘧母者鱉甲飲凡脾胃虛而患瘧者不拘有汗無汗三陰六經悉以六君子湯為主熱多加柴胡山梔寒多加乾薑肉桂有汗加黃耆浮麥無汗加蒼朮葛根元氣下陷及肝木乘脾並加升麻柴胡為善若用青皮草果常山等藥以為攻截良法正氣益虛邪氣益深是多延綿不止而為勞熱者有矣若乳母七情六慾飲食不調或寒熱似瘧肝火熾盛致兒為患者又當治其乳母斯無誤矣治驗一小兒先因停食腹痛服峻厲之劑後患瘧日晡而作余以為元氣下陷欲治以補中益氣湯不信泛行清熱消導前症益甚食少作瀉余朝用前湯夕用異功散加當歸月餘而愈一小兒每午前先寒後熱久不愈用六君子加炮姜丸芡實大每服一丸旬余而愈一小兒患瘧兼便血盜汗年餘矣審乳母素有鬱怒寒熱便血朝用加味歸脾湯夕用加味逍遙散兒以異功散加酒炒芍藥為末每服三四分米飲下月餘母子並痊一小兒瘧發熱服消導之劑腹脹作嘔四肢浮腫先用五味異功散加木香諸症頓退飲食頓進後因飲食過多作瀉用補中益氣湯加木香又用五味異功散而痊一小兒瘧後腹脹咳嗽倦怠屬脾肺氣虛用補中益氣湯茯苓半夏尋愈後傷食發熱如瘧服寒涼之劑更加便血用四君升麻柴胡便血頓止又用補中益氣湯而愈一小兒瘧將愈飲食過多腹脹發熱大便不通用消積丸保和丸異功散尋愈後飲食不節寒熱吐瀉用異功散柴胡升麻而愈一小兒瘧後少思飲食便血發熱腹脹屬脾虛不能統血先用異功散加升麻柴胡而血止又補中益氣湯飲食頓進仍用異功散而痊一小兒瘧後腹脹用五味異功散四味肥兒丸而漸愈用補中益氣湯而愈後傷食腹脹大便不實小便不利用五味異功散金匱加減腎氣丸而愈一小兒愈後便澀用補中益氣湯加山梔而小便通因勞發熱不食小便不利用補中益氣五味異功散加升麻柴胡而痊後每勞心寒熱如瘧用補中益氣湯飲食失節如瘧用五味異功散隨愈一小兒十四歲瘧後肚腹膨脹小便不利屬脾腎虛寒朝用補中益氣湯夕用金匱腎氣丸而痊畢姻後朝寒暮熱肌體消瘦服滋陰之劑更痰甚發熱腹中作脹小便不利余朝用補中益氣湯夕用金匱加減腎氣丸而愈一小兒瘧疾將愈飲食過多腹脹發熱大便不通用消積丸保和丸異功散調理脾胃而愈後飲食不節寒熱吐瀉先用胃苓散吐瀉止又用異功散柴胡升麻寒熱愈一小兒十五歲瘧後發熱吐痰余謂脾氣所變不信反服黃柏知母之類諸症悉具謂余曰胃火盛而滋水其症益甚何也余曰症在脾陰土喜溫和而惡寒濕前所用藥悉屬沉陰復傷其生氣故病愈甚也先用六君柴胡升麻木香四劑諸症頓愈乃佐以異功散加柴胡升麻元氣漸充又朝用補中益氣湯夕用異功散而愈畢姻後發熱如瘧用補中益氣湯寒熱益甚手足並冷另用清熱等藥大便去則小便牽痛小便去則大便先出余謂此陰精已耗而復傷耳乃腎氣虛寒之危症也用大劑補中益氣湯八味地黃丸喜其遠幃幕而得生柴胡桂枝湯治瘧身熱多汗柴胡八錢黃芩三錢半夏二錢半芍藥甘草桂枝各三錢上每服二三錢薑棗水煎鬼哭散治瘧久不止常山大腹皮白茯苓鱉甲醋炙甘草炙各六錢上入桃柳枝各七寸水煎服清脾飲子治癉瘧脈弦數但熱不寒或熱多寒少膈滿不食口苦舌乾煩渴小便黃赤大腸不利青皮炒厚朴薑製白朮草果柴胡茯苓半夏泡七次黃芩甘草炙各等分上每服二三錢姜水煎服四獸飲治陰陽相勝結聚涎飲為瘧兼治瘴瘧神效半夏茯苓人參白朮草果橘紅各等分甘草減半上用烏梅薑棗濕紙裹煨香熟焙乾入藥每服二錢水煎服鱉甲飲子治瘧久不愈脅下痞滿形容羸瘦腹中結塊時發寒熱名曰瘧母鱉甲醋炙白朮甘草黃耆白芍藥川芎人參養胃湯治外感風寒內傷生冷寒熱如瘧或嘔逆噁心寒瘧加桂枝人參厚朴蒼朮半夏泡藿香草果仁茯苓各五錢甘草橘紅二錢半上每服二三錢姜七片烏梅一個水煎熱服桂枝麻黃各半湯治發熱自汗或無汗桂枝白芍藥生薑甘草炙麻黃各一錢杏仁十粒泡去皮尖上水一鍾大棗二枚煎四分食遠服五苓散方見五淋小柴胡湯大柴胡湯二方見痙症二陳湯方見寒吐大安丸即保和丸加白朮補中益氣湯方見虛羸十味香薷飲方見嘔吐乳六君子湯加味歸脾丸加味逍遙散異功散四方見內釣
