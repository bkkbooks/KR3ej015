body:
  text: 卷十九痘稠密張潔古先生云一發稠密如針頭者形勢重也輕其表而涼其內連翹升麻湯主之然稠密之處各有經絡部分所屬額主心面主胃腹與四肢主脾脅主肝雨腋主肺下部主腎肩背主膀胱當隨見症治之若面色黃大便黑煩躁喘渴或腹脹者瘀血在內也用犀角地黃湯或抱龍丸生犀角汁但根窠分明肥滿者無妨竊謂前症若屬心經用導赤散之類胃經用犀角散之類肝經用柴胡湯之類大凡稠密者熱毒熾盛也若密而不痛用東垣消毒散若密而作痛用仙方活命飲若密而小便不通用八正散若密而大便不通用承氣湯若密而惡寒發熱用麻黃甘草湯一小兒十三歲痘瘡稠密而痛脈洪數而有力先君用仙方活命飲二劑先出者痛頓止後出者隱於肉裡用東垣消毒散二劑隱者悉消又用活命飲一劑脈靜身安而痊一小兒出痘稠密身側尤甚焮赤呻吟飲乳不徹先君謂肝膽之火助邪為患故身側尤多乃乳母肝火傳變也用柴胡梔子散治其母子飲數滴而靨一小兒痘瘡甚密身側尤甚貫膿不滿不紅活或云當歿於十二日余以為氣血虛弱用八珍湯加糯米百粒數劑至十五日而愈一小兒痘密而灰白色始末悉用補托之藥安後飲食過多嘔吐面青白唇目牽動先君以為慢脾風症之漸不信翌日手足時搐用五味異功散加木香乾薑而愈一小兒痘稠密色赤先君以為熱毒用東垣消毒散一劑初出者頓起後出者悉沒再劑如期而靨一小兒稠密色黑煩躁喜冷手足並熱先君謂火極似水令恣飲芹汁煩熱頓止先用犀角地黃湯次用地黃丸料服之而愈一小兒稠密出遲用四聖散而起發用參耆內托散而靨後發熱惡寒用八珍湯而愈一小兒痘密而痛用東垣救苦湯一劑痛頓止用紫草木通湯而愈一小兒痘密身痛如刺用活命飲一劑其痛即止又用犀角消毒散而愈一小兒痘初出密痛用東垣救苦湯痛頓止又用四聖散而發用犀角消毒而愈麻黃甘草湯治表實痘毒焮盛稠密麻黃生甘草上水煎服柴胡梔子散方見作癢抓破柴胡甘草枳殼湯方見痘喘甘桔防風湯方見痘咳嗽東垣消毒散一名救苦湯方見痘身痛紫草木通湯方見小便不利仙方活命飲方見痘癰六味地黃丸方見痘瘡發熱屬陰陽四聖散方見痘腹脹氣促小柴胡湯方見癍症柴胡清肝散即柴胡梔子散一方見痘潮熱紫草散方見頂陷心煩抱龍丸方見痘癇搐犀角消毒散方見痘疔痘吐瀉痘疹方云痘疹吐瀉蓋因脾胃不和飲食不調煩渴嘔吐泄瀉並用白朮散然瘡疹皆賴脾土脾土實則易出易靨萬物得土氣溫暖而生吐瀉則傷脾土遂有更變之症夏月中暑煩渴瀉或腹痛或缺筋用五苓散加藿香傷食吐瀉用小異功散手足並冷者用益黃散豆蔻丸頂陷灰白用木香散瘡正出而吐瀉者或見血者俱為逆症難治竊謂前症雖因脾胃不和然邪實上焦則宜吐邪實下焦則宜瀉如吐瀉噯腐吞酸皆宜宣發但微甚不同耳張翼之云若痘疹吐瀉少食為裡虛陷伏倒靨灰白為表虛二者俱見為表裡俱虛合用十二味異功散救之甚至薑附靈砂亦可用若止裡虛去官桂止表虛減肉豆蔻若能食便祕倒靨為裡實忌補當用錢氏及丹溪法下之皆為能食為裡實裡實而補則結癰毒紅活綻凸為表實表實而補則潰爛不結痂凡痘見癍便忌葛根湯恐發表虛也如有更變當隨症治之一小兒痘初出忽吐瀉飲乳不歇屬脾胃虛弱用人參白朮散作大劑母子並服又用五味異功散為末時以乳調服吐瀉止而靨一小兒出痘作瀉手足並冷用十二味異功散稍愈又用五味異功散加薑桂一劑而止又去姜加木香一劑再用參耆四聖散而靨一小兒痘瘡愈而作瀉不食此脾氣內虛先用五味異功散而瀉止食進後又傷食吐瀉發搐仍以五味異功散加天麻柴胡而愈一小兒痘後作瀉腹中疼痛手足並冷此脾氣虛也用五味異功散加乾薑一劑乃去姜又數劑而痛止又用六君子湯加柴胡而瀉止益黃散治瘡疹因煩渴飲水過多而傷脾胃吐瀉丁香訶子煨青皮陳皮木香各等分上為末每服一錢水煎橘皮湯治嘔吐不止飲食不入陳皮生薑各一錢人參五分上水煎作三四次服之生氣散治脾胃氣虛吐瀉肚腹膨脹飲食不化或腹痛不止丁香甘草各五分白朮青皮木香人參各七分上水煎徐徐服五苓散方見小便不利五味異功散方見寒戰咬牙對金飲治飲食吐瀉方見不靨悶亂豆蔻丸方見泄瀉咬牙十一味木香散十二味異功散二方見頂陷灰白人參白朮散方見發熱屬陰陽參耆四聖散方見腹脹氣促六君子湯方見不靨悶亂痘自汗痘疹方云初起時自汗不妨蓋濕熱熏蒸而然也竊謂前症因邪在經絡自能發散使邪氣外泄若見此症不當用耆桂之屬以實腠理且自汗則痘熱已輕升麻葛根之類在所當禁恐發泄太甚則津液內耗陰隨陽散難以收靨靨後最宜審治若血虛者用當歸補血湯氣虛者用四君子加黃耆氣血不足者十全大補湯若飲食自汗者異功散楊氏云痘瘡一見紅點升麻葛根便不可用此語甚是但此為表虛及無表症者而論若或邪在表痘赤綻焮者又當用麻黃甘草湯汗之腫焮作痛者用活命飲加麻黃散之蓋自汗盜汗為病不同自汗者汗無時而自出也屬陽虛盜汗者睡則汗出寐則汗收也屬陰虛汗者血之所化陰氣不能閉藏所以睡則汗出也痘家當以補血為主若當歸補血湯六味地黃丸八珍湯人參養榮湯之類皆可因症施治又有胃虛者宜用四君及浮麥散食積內熱者宜用四君曲蘖未靨之際恐致氣血虛而不能結痂既靨之後尤防血脫陰虛陽無所附矣一小兒痘將出自汗作渴發搐此心肝二經熱甚用柴胡麥門冬散而熱症退用紫草快癍湯痘悉見又用四聖散而結靨一小兒痘出自汗發搐流涎此木火侮土先用五味異功散加鉤藤鉤諸症頓減次以五味異功散加柴胡而安一女子出痘色赤自汗發搐作嘔此肝火侮土先用五味異功散加柴胡鉤藤鉤熱搐悉愈又用托裡散漿貫而愈一小兒痘出自汗面赤作渴手足並熱大便乾黃此腸胃皆熱用瀉黃散末一服諸症頓退又用托裡散異功散加山梔麥門冬而痊人參養榮湯治氣血俱虛發熱惡寒肢體倦怠食少作瀉或久病虛損口乾咳而下痢驚熱自汗盜汗白芍藥炒一錢半人參陳皮黃耆炒桂心當歸白朮炒甘草炙各一錢熟地黃自制七分五味子杵卅七分遠志五分上每服二三錢薑棗水煎麻黃甘草湯麻黃甘草等分上每服一錢水煎浮麥湯浮麥不拘多少炒香上每服三五錢水煎當歸六黃湯治血氣不足虛火內動煩躁自汗盜汗不止方見煩躁痘癢塌陳文宿先生云痘瘡癢塌若臟腑調和血氣充實外常溫暖內無冷氣必無此症設服宣利之藥所致宜用異功散治之丹溪云痘疹癢塌者於形色脈上分之實則脈有力氣壯虛則脈無力氣怯虛癢則實之更加涼血藥實癢則大便祕結以涼藥下之竊謂前症若色赤而有癢者屬血虛有熱用四物牡丹皮色白而兼癢者屬氣虛有熱用四君加芎歸若發熱大便祕結者用犀角消毒散發熱大便調和者用麥門冬飲寒戰渴瀉喘嗽聲啞氣急先用十一味木香散如未應急用十二味異功散外用敗草散敷之若寒戰咬牙煩熱喘渴足冷灰白內陷腹脹渴瀉者皆不治一小兒出痘六日癢塌寒戰錢密菴謂血氣虛寒用十一味木香散二劑而漿貫用參耆托裡散而靨脫後痕作癢用大補湯而痊一小兒第七日癢塌少食手足俱冷發熱惡寒先君謂陽氣虛寒用十二味異功散一劑而癢止又用托裡散加肉桂四劑而漿貫用十全大補湯而結靨後痕赤作癢此血氣虛熱用八珍湯二十餘劑而愈一婦人出痘熱數日而發見用紫草快癍湯雖紅活而癢塌詢其素勤勞元氣頗不充實用八珍湯煩熱漸止又用托裡散而靨一小兒十六歲第九日痘塌口乾發癢手冷腹脹先君謂脾胃血氣虛弱用五味異功散加歸耆薑桂四劑癢漸止又用十全大補湯六劑漿貫用八珍湯數劑而靨後遍身不時作癢或痘痕色赤用補中益氣湯而痊一小兒痘漿不滿面赤作癢余謂血氣虛而有熱欲與溫補不信服清熱之藥至十三日瘡痕色赤煩渴腹脹不食手足逆冷而歿五味異功散治痘瘡脾胃氣虛癢塌方見寒戰咬牙四物湯方見痘瘡出遲四君子湯即六君子湯去陳皮半夏方見不靨悶亂托裡散犀角消毒散二方見痘癰十全大補湯方見腹脹八珍湯十一木香散十二味異功散三方見頂陷灰白紫草快癍湯方見頂陷心煩倒靨丹溪先生云痘瘡倒陷因真氣虛而毒氣不能盡出者用黃耆人參紫草酒製治之若將成就之際卻淡色者屬血虛用當歸川芎之類或加紅花紫草屬熱毒者用升麻芩連梗翹之類甚者用犀角屑大解痘毒竊謂前症若熱毒方出忽被風寒閉塞肌竅血脈不行身體作痛或四肢微厥癍點不長或變青紫黑色者此為倒靨若胃氣虛弱不能補接榮衛出而覆沒者謂之陷伏誤用解毒之藥必致陷塌若喜熱飲食手足並冷者乃脾胃虧損陽氣虛寒之症宜用辛熱之劑補之喜冷飲食手足並熱乃陽氣實熱之症宜用苦寒之劑瀉之外感風寒者溫散之毒入腹者分利之陽氣虛者溫補之外寒觸犯者熏解之陳宿州先生用十二味異功散以預保脾土於未敗之先實發前人之未發開萬世之矇聵也一小兒痘將愈忽黑陷余謂氣血虛用紫草散加人參當歸又用參耆托裡散而愈一小兒將愈而倒靨咬牙寒戰手足並冷飲沸湯而不知熱用十二味異功散一劑諸症頓退卻用五味異功散倍用參朮數劑而愈一小兒痘飲食多而作吐服枳朮丸色黑將陷用五味異功散加乾薑二劑貫漿而靨一男子發熱昏憒數日發紅點用快癍湯托裡散貫漿將靨忽發熱惡寒瘡黑倒靨手足並冷口渴飲湯此陽氣虛寒也用獨參湯四劑諸症漸愈而靨一小兒兼嘔手足並冷余謂脾氣虛寒欲用十二味異功散不信另用雜藥而歿成都方士禹太和治痘瘡黑陷垂死者用壁間喜蛛如黃豆大者一枚擂爛一歲兒用雄黃一分二歲二分十歲者用一錢入蜘蛛內研勻用好燒酒調服愚意此即木香散異功散之類也若因陽氣虛寒不能榮運周身以致四肢逆冷腹脹唇青黑陷者宜用燒酒若因元氣虛弱色白隱於肌膚而不能起發者宜用陳酒亦不可拘泥於燒酒也若小兒未及周歲或兒大者宜酌量與之不可拘於杯許也又有一等症氣血俱虛者或色淡紅不光澤不起發或驚悸咬牙者加紫草紅花以用之七味白朮散方見發熱屬陰陽十一味木香散十二味異功散二方見痘灰白色癍爛聞人氏云痘癍爛之症因當發散而不發散則毒氣閉塞以致喘促悶亂不當發散而誤發散則毒隨陽氣暴出於外遍身皮膚潰爛治宜調脾胃進飲食大便調和榮衛健旺毒氣自解而無目赤咽痛口瘡吐衄等症竊謂前症若發表過甚大便自利急用理中丸豆蔻丸以救其里亦有痘疹如蚊所齧而色黑乃危症也若大小便祕結煩躁用山梔子湯獖豬尾血調腦子治之自利不食者不可用蓋毒發於表而妄汗之則腠理開泄榮衛益虛轉增瘡爛由是風邪乘虛變症者有之若毒根於裡而妄下之則內氣愈虛毒不能出而反入焉由是土不勝水變黑歸腎身體振寒兩耳尻冷眼合肚脹其瘡黑陷十無一生治者審之一小兒患此發熱作渴手足並冷此脾經熱毒先用瀉黃散五分又用七味白朮散而愈一小兒患此但惡寒發熱體倦頭痛人迎脈大於寸口二三倍此風邪外傷用補中益氣湯加川芎蔓荊子愈而自靨一小兒患此口舌生瘡手足並冷余謂此中氣虛而內熱耳用五味異功散議論不一猶豫未服翌日腹痛口噤余用前藥更加乾薑一劑諸症稍緩再劑而愈一小兒患此或癢或痛發熱口渴先用白朮散次用補中湯而愈後因作課勞心發熱頭痛痘痕焮赤用補中湯加蔓荊子及八珍湯而愈一小兒患此作痛喜飲熱湯發熱惡寒手足並冷余謂此中氣虛而外假熱也用補中湯加參耆各三劑四劑而愈一小兒患之多在兩脅時發寒熱此肝經之症用加味逍遙散而寒熱退又二劑而脅痛止及立效散而痊一小兒患之作渴發熱額間為甚此心經有熱先用導赤散母服漸愈又用柴胡梔子散敷三黃散而痊一小兒患之發熱作渴面目多白尺脈數而無力此稟足三陰虛也用地黃丸補中湯尋愈畢姻後患瘵症服黃柏知母等藥幾危余仍用前藥而痊一小兒患此體倦惡寒此脾胃氣虛也用補中益氣湯數劑而愈後因飲食停滯發熱而痘痕復赤先用陳皮參朮神麯山楂消食仍用補中益氣湯調補脾胃而愈若誤用敗毒之劑決不起矣一小兒痘愈後因勞痘痕作癢搔破膿水淋漓面色皎白脈浮大按之如無余用補中益氣湯漸愈或云先攻其邪而後補之乃用消風散變痓汗出口噤而死惜哉山梔子湯治痘疹及癍毒狀如蚊蚤齧毒盛黑色者梔子仁一兩白蘚皮赤芍藥升麻各一兩寒水石甘草炙各五錢上為末每服一錢水八分入柴草三黃散治疳熱生瘡膿水浸淫膿流處便濕爛松香五倍子黃連黃丹海螵蛸各一錢輕粉雄黃上為末用瑩肌散煎洗滲之乾者香油敷豆蔻丸方見泄瀉咬牙柴胡梔子散即柴胡清肝散五味異功散補中益氣湯二方見寒戰咬牙加味逍遙散方見欲靨不靨地黃丸即六味地黃丸七味白朮散二方見發熱屬陰陽瀉黃散方見靨後發咽痛導赤散立效散二方見風邪搏於肌膚痘癇搐錢氏云痘疹癇搐由內相勝也惟心癍脾疹能作搐蓋疹為脾所主脾虛而不勝土風熱相搏而動於心神心喜熱神氣不安因搐成癇癍為心所生心主熱熱生風風屬於肝二藏相搏風火相爭故發搐當瀉心肝若涼驚用涼驚丸溫驚用粉紅丸海藏云諸痛癢瘡瘍皆屬心火無論虛實皆屬心火上說脾虛則肝氣乘之與心火相合耳若脾土實心火旺而逆乘以致癇者此實邪也便結者瀉青丸便軟者瀉心湯潔古云未出而發搐者是外感風邪之寒內發心火之熱所作也當用解毒丸犀角地黃丸主之世傳云瘡疹欲出身熱煩躁忽發驚搐宜用驅風膏小如聖飲小便不通八正散痰涎壅盛利驚丸抱龍丸丹溪云欲發瘡疹先身熱驚跳搐搦此非驚風宜用發散之藥竊謂前症痘疹未見而先發搐者乃毒氣自心經出也若病勢輕緩或形氣虛弱者不宜用峻厲之劑恐元氣內損則毒氣內陷而瘡不能起發也或外感風寒之邪內因瘡疹之熱而相搏或肝血虛火動而內生風當補元氣為主佐以見症之劑然前方多峻厲之劑審有是症方可用須察其色赤白而以脾胃為主虛則用溫補實則用解毒若先發搐而後發瘡多有生意瘡已瘥而發搐或吐瀉者難治一小兒痘痂脫盡因其穢氣用蔥椒煎湯浴之發熱痰喘用八珍加白殭蠶蟬蛻一劑痰喘頓止又用四君芎歸鉤藤鉤而搐止一小兒痘瘡色赤四肢發搐眉唇牽動此心肝二經熱甚乘脾所致也用四君防風鉤藤鉤而痊一小兒痘後四肢發搐眉稜尤動小便頻數臉目青赤此肝經風熱用四物柴胡山梔少愈但四肢倦怠飲食少思大便不實此脾氣受傷而未復也用四君升麻當歸而痊一小兒痘後寅卯申酉時熱甚或兼搐余謂寅卯時發熱此肝火本症申酉時發搐乃肝木侮金先以四物白朮茯苓鉤藤鉤煎送柴胡二連丸而愈夕用地黃丸朝用四君山梔柴胡及四君子加當歸而痊一小兒痘瘡色赤發搐痰盛服抱龍丸而頓愈又因母大怒兒仍搐母服柴胡梔子散加味逍遙散母子並愈一小兒痘愈後發搐左額青赤唇口牽動余謂肝心二經風熱所致先用柴胡梔子散加鉤藤鉤後用加味逍遙散而搐止再用五味異功散而痘愈一小兒痘將愈發搐痰湧頭目不清脾虛氣弱肝木侮之先用五味異功散加柴胡鉤藤鉤搐愈而靨柴胡二連丸治肝經實火柴胡宣黃連胡黃連各末糊丸桐子大每服二三十丸白湯下補中益氣湯方見寒戰咬牙六君子湯方見不靨悶亂四神丸方見泄瀉咬牙十一味木香散方見頂陷灰白痘風丹溪先生曰痘風分氣血虛實虛則黃耆生血之劑主之佐以風藥實則白芍黃芩為君連翹白芷斷續之頰為佐竊謂前症更當發痘瘡已出未出已靨未靨外邪所傷內虛火動若未出而搐搦熱毒內蘊也紫草快癍湯加鉤藤鉤已出紅綻而搐搦熱毒作痛也東垣消毒散加鉤藤鉤貫膿而搐搦血氣虛也參耆四聖散加鉤藤鉤若靨後而搐搦血氣尤虛也八珍湯加鉤藤鉤或目瞷或直視者風火相搏也柴胡梔子散或六味地黃丸加柴胡山梔或口角流涎者木乘土也五味異功散加升麻柴胡鉤藤鉤或目赤眵淚者肝血虛而生風也四物湯加柴胡鉤藤鉤或角弓反張者水不生木也六味地黃丸加柴胡當歸隨用補中益氣湯加天麻鉤藤鉤不可直用治風之藥蓋風藥能燥血散氣必驗其手足冷熱溫和三症而用補瀉調理之法庶無誤矣如嬰兒當審乳母而治之一小兒痘瘡將愈發搐服牛黃清心丸更口噤流涎此脾胃復傷肝木所侮而涎不能歸經耳先用五味異功散加鉤藤鉤諸症頓減次以五味異功散加柴胡而安一婦人出痘因怒發搐痘痕赤色發躁作渴面目皆赤此汗多亡陽血脫而然也先用當歸補血湯二劑躁渴頓止又用八珍柴胡牡丹皮鉤藤鉤熱搐悉愈又用八珍湯而痊一婦人痘瘡將愈因怒發搐口噤頭痛如裂痘痕皎白用補中益氣湯加蔓荊子鉤藤鉤頓愈又因怒發搐頭暈不食先用補中益氣湯加天麻又六君柴胡而安當歸補血湯治痘瘡血氣虧損發搐熱渴喜飲脈洪大而虛重按如無者方見寒戰咬牙抱龍丸治痘瘡風熱發搐或痰甚者膽星四兩天竺黃一兩雄黃硃砂各五錢麝香少許上為細末用甘草一斤煎膏為丸每一兩作二十丸用薄荷或燈心湯化下按前方肝經清熱豁痰利氣祛風之藥過劑則脾肺復傷而反甚或更加胸腹作脹食少作嘔者宜用人參白朮散倍補中氣造牛膽南星法臘月南星中大者為末用黃牛膽汁拌勻仍入膽殼內以線扎口懸掛當風處陰乾隔年方可用重製二三次者尤妙小柴胡湯方見癍症柴胡二連丸方見前六味地黃丸方見發熱屬陰陽四物湯方見痘瘡出遲十全大補湯方見腹脹氣促痘潮熱張潔古先生云痘疹未有不因潮熱而出者觀其熱之時知自何髒髮出寅卯辰時屬肝出水泡巳午未時屬心出癍瘡申酉戌時屬肺為膿泡亥子丑時屬脾出疹子惟腎獨居腑下不受穢濁故無症耳竊謂前症當察其虛實若壯熱飲水便祕屬實熱也少用清涼飲下之發熱飲冷大便不祕屬虛熱也宜人參白朮散補之若下而發熱愈甚此陰虛而陽無所附也用四物參耆之類補之若下而潮熱面赤者血氣發躁也用當歸補血湯補之若見發搐等症乃肝虛而內生風也用四物天麻鉤藤鉤補之用發散之劑而熱愈甚此表虛而外熱也用四君當歸黃耆補之一小兒先潮熱午前甚面青痘赤出而熱不止或時發搐手足不熱不冷此陽明胃經症為肝木所侮先用補中益氣湯加鉤藤鉤四劑而熱止痘色紅活乃去鉤藤鉤又四劑而貫漿又用八珍湯而痊一小兒痘紅活寅卯時潮熱作渴此肝經風熱症用柴胡梔子散末三服熱止漿貫又用八珍湯山梔丹皮而靨一小兒靨後潮熱手足發冷余謂胃氣虛弱用五味異功散佐以補中益氣湯而愈因飲食過度前症復作更腹脹大便不實小便重墜此脾虛也用補中益氣湯而痊一小兒痘後不時寒熱噫氣飲食吞酸服二陳枳實黃連更寒熱如瘧腹墜下氣此中氣復傷而下陷也朝用補中益氣湯夕用五味異功散各加乾薑木香而愈一儒者先潮熱出痘面青脅痛此肝經之症用四君柴胡當歸山梔二劑脅痛稍緩又佐以加味逍遙散而痛止卻用托裡散漿貫而靨後又潮熱用地黃丸而愈一婦人患此誤服寒涼之劑煩躁作渴飲沸湯而不知熱脈洪數按之微細此血氣俱虛用大劑十全大補湯加薑桂四劑更惡寒咬牙此虛極而藥力未能及也於前藥內更加附子一片二劑諸症頓退乃去附子又二劑將安去薑桂常服而痊一小兒痘愈後潮熱飲食少思面色痿黃久治不愈熱後面與手足如冰余謂脾氣虛寒當用六君薑桂不信而死手足皆黑惜哉柴胡梔子散治痘瘡肝經有熱寅卯時發熱或寒熱往來或發熱驚搐或咬牙不止四肢徑強方見膿水淋漓加味逍遙散即逍遙散加牡丹皮山梔治因乳母肝脾血虛發熱致兒發潮熱瘡不能愈者方見欲靨不靨人參白朮散六味地黃丸二方見發熱屬陰陽八珍湯方見頂陷灰白清涼飲方見大便不通托裡散方見痘癰十全大補湯方見腹脹氣促四君子湯方見不靨悶亂當歸補血湯補中益氣湯五味異功散三方見寒戰咬牙四物湯方見痘出遲痘吐逆世傳方云痘瘡吐逆無痰益黃散有痰二陳湯或橘皮湯半夏湯不止加丁香若吐而瀉者亦宜益黃散及陳氏木香散異功散吐而身熱煩渴腹滿氣促大小便澀而赤者當利小便竊謂前症若手足並冷渴飲熱湯或腹作痛中氣虛寒也宜用益黃散手足不冷吐逆痰涎中氣虛弱也宜用橘皮半夏湯手足並熱熱毒壅滯也宜用導赤散口乾飲乳不徹胃經氣熱也宜用竹薷湯吐逆不乳或吐乳酸穢此脾氣虛而乳食停滯也宜用枳朮丸一小兒痘不紅活手足微冷此陽氣虛弱也先用五味異功散加乾薑肉桂二劑乃去乾薑加木香又二劑而愈一小兒十一歲出痘第九日吐逆不食手足並冷此陽氣虛寒之極也用十二味異功散一劑頓愈用五味異功散而安用參耆四聖散而靨一小兒吐逆作渴手足並熱此胃經有熱也用竹茹湯而熱稍止用人參胃愛湯而吐亦止用化毒湯而貫膿四聖散而結靨一小兒吐逆作瀉腹脹煩渴痘出不快手指微冷用七味白朮散而諸症退用四聖散而諸痘出用人參蟬蛻散而諸痘靨一小兒吐逆腹脹發熱作渴大便乾臭此因腸胃實熱用竹茹湯加黃連枳殼諸症稍退用紫草快癍湯瘡勢頓發如期而靨一小兒痘出甚密嘔逆飲冷手足並熱此胃經熱甚先用葛根麥門冬散一劑熱症頓退又用瀉黃散末一錢用米飯調服而安用白朮散而痊人參胃愛散治痘瘡已發未發吐瀉不止不思飲食或吐逆等症人參藿香紫蘇甘草炒丁香茯苓木瓜各等分糯米上每服三錢薑棗水煎葛根麥門冬散治熱毒癍疹頭痛壯熱心神煩悶亂吐逆者方見頂陷心煩按此陽明胃經之藥也外除表邪內清胃火兼補元氣若非發熱作渴表裡俱實者不可用若表裡俱虛而發熱作渴宜用人參麥門冬散七味竹茹湯橘紅半夏各等分白茯苓二分甘草竹茹黃連姜炒葛根各二分上姜水煎服人參蟬蛻散治小便不利痘瘡不發煩躁作渴咬牙喘滿人參蟬蛻白芍藥木通赤芍藥甘草紫草茸上每服三四錢水煎橘皮半夏湯橘皮半夏等分上每服三錢薑棗水煎化癍湯方見水痘麻痘紫草快癍湯方見痘陷心煩六君子湯方見痘腹脹導赤散方見風邪搏於肌肉十一味木香散十二味異功散二方見痘灰白色六味地黃丸七味白朮散二方見發熱屬陰陽四聖散方見涕唾稠黏五味異功散方見寒戰咬牙痘咳嗽痘疹方云痘瘡未出之先咳嗽升麻湯頭疼身熱惡寒咳嗽參蘇飲嘔吐痰涎白朮湯時氣頭疼咳嗽或靨後餘毒咳嗽惺惺散瘡不起發升麻湯感寒頭痛悶亂咳嗽木香散發熱嗽甚別無他症生地黃散風熱咳嗽五味子湯咽喉不利甘桔防風湯竊謂前症未出欲出之際乃熱毒上熏清道肺氣不寧宜用惺惺散若已出之後則屬元氣虛弱不能固衛腠理風邪乘虛而襲宜用五味異功散加桔梗五味子以補脾肺一男子咳嗽嚏噴腮頰赤白胞皆赤遍身赤癗余謂此心臟痘疹彼疑惑而未用藥旬余皆紅活起發余謂既紅活起發不必服藥至十七日大便下血膿瘡痂而痊一小兒痘赤壯熱咳嗽痰甚煩熱作渴用人參清膈散一劑諸症頓退日用芹菜汁旬余而靨一小兒痘漸愈咳嗽肺脈大而無力用參蘇飲咳嗽漸愈因母飲酒又復咳用五味異功散加桑白皮杏仁山梔母子並服而愈一小兒痘瘡十二日患咳嗽唾痰胸中隱痛肺脈數滑余曰此兼患肺癰也當用桔梗湯不信翌日果吐膿血用桔梗湯而愈一小兒十四歲痘愈後咳嗽脈數而無力朝用補中益氣湯夕用六味丸料各數劑漸愈畢姻後咳嗽發熱仍用前藥及八珍等藥而痊一小兒痘將愈咳嗽面色黃白嗽甚則赤用五味異功散調補而愈生地黃散治小兒癍疹身熱口乾咳嗽心煩等症生地黃半兩麥門冬去心七分杏仁款冬花陳皮各三錢甘草炙二錢半上每服三五錢水煎徐徐服兒大加之若痰氣痘熱內作宜用桔梗甘草防風湯若痰上壅者佐以抱龍丸桔梗湯治久嗽肺氣傷而吐痰有血痰或腥穢或咳吐膿血肺癰等症桔梗炒貝母去心知母桑白皮枳殼各一錢地骨皮栝蔞仁薏苡仁杏仁各五分當歸黃耆微炒各一錢五味子百合炒各一錢五分防己一錢葶藶炒五分上每服三五錢水煎服桔梗防風湯治痘症餘毒瘡毒咽痛桔梗甘草防風上水煎服六味地黃丸七味白朮散二方見發熱屬陰陽五味異功散補中益氣湯當歸補血湯三方見寒戰咬牙十六味清膈散即人參清膈散方見頂陷心煩惺惺散方見癍症五味子湯即小柴胡湯加五味子參蘇飲方見涕唾稠黏痘喘症痘疹方若云痘瘡已出未靨之間喘渴白朮散甚者木香散收靨後腹脹喘渴大便利小便澀葶藶木香散喘嗽五味子湯喘渴靨後餘毒不除大便堅實前胡枳殼散頭疼身熱惡寒微喘是有表邪也用參蘇飲竊謂前症若因脾肺虛弱宜用白朮散脾肺虛寒宜用木香散熱毒內蘊紫草甘草枳殼湯風邪外感用參蘇飲內外壅滯人參清膈散大便自利小便澀滯葶藶木香散大便堅實前胡枳殼散一小兒痰喘痘赤作痛熱渴喜飲冷水大便不利此胃經實熱先用前胡枳殼散諸症漸退又用犀角地黃湯而靨一小兒面赤有痰口乾作渴右寸口脈洪數此心火刑肺金用人參平肺散一劑又用地黃丸料四劑而痊一小兒痘赤而痛喘嗽作渴脈洪數左尺右寸為甚此腎火上炎乘肺為患用地黃丸料煎與恣飲如期而靨一小兒十四歲痘方愈而喘促咳嗽余謂脾肺氣虛用五味子湯而愈後停食發熱喘嗽用五味異功散而安用補中益氣湯而痊一男子出痘愈而喘嗽面赤服參蘇飲面色痘痕皆白此脾肺氣虛而復傷也用補中益氣五味異功散而痊一小兒喘渴面白手足時冷此脾肺氣虛用人參白朮散五味異功散而愈一小兒痘將愈喘渴腹脹大便不結小便澀此脾肺氣虛而然也先用葶藶木香散又用人參白朮散而愈一小兒痘出氣喘大便祕結手足並熱作渴飲冷用前胡枳殼散而安但飲食少面白此邪氣去而真氣虛也用補中益氣湯五味異功散而愈一小兒十四歲痘方愈而喘手足不熱余謂脾肺氣虛用補中益氣湯而愈後停食發熱手足不冷余謂脾氣虛熱而喘嗽用五味異功散二劑而熱退又用補中益氣湯而痊一小兒痘瘡狂喘躁熱作渴飲冷痰涎不利先君謂熱毒壅滯用人參清膈散犀角地黃湯各一劑頓愈又用當歸補血湯而愈一男子痘愈而喘嗽面赤服發表之劑喘嗽益甚面色痘痕皆白手足並冷余謂脾肺之氣復傷而虛寒也用補中益氣湯加乾薑一劑元氣漸復卻佐以八珍湯而痊一男子痘愈而患喘發熱惡寒余用十全大補湯不信反服清熱之劑汗出如雨身熱如炎面目痘痕如赭赤余曰汗多亡陽而虛熱也後果歿六味涼血消毒散犀角如無用升麻牡丹皮當歸生地黃赤芍藥生甘草等分上每服三五錢水煎紫草甘草枳殼湯紫草甘草枳殼各等分上每服一二錢水煎五味子湯參蘇飲前胡枳殼散三方見涕唾稠黏六味地黃丸人參白朮散一名七味白朮散二方見發熱屬陰陽聖濟犀角地黃湯方見頂陷心煩人參清膈散即十六味清膈散方見頂陷心煩十一味木香散方見痘灰白色葶藶木香散方見腹脹氣促
