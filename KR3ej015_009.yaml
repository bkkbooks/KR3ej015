body:
  text: 卷九吐血經曰清者為榮濁者為衛榮行脈中衛行脈外蓋榮者水穀之精氣也和調於五臟灑陳於六腑故能入於脈夫榮者陰血也所主在心統化在脾藏內在肝宣布在肺輸泄在腎灌溉一身滋養百脈諸經由此而生毓焉然血之所統者氣也故曰氣主呴之血主濡之是以氣行則血行氣止則血止陽生陰長夫唱婦隨之道也若氣一傷則變症百出故妄行則吐衄衰涸則虛勞降下則便紅熱陷則溺赤滲於腸胃則為腸風陽虛陰搏則為崩漏此皆氣有殄戾之乖而血乃生滲溢之患也然養陰者可不先知養陽之道乎小兒患之多因稟賦積熱或食膏粱厚味或乳母七情鬱火所致治法若氣虛血弱當以人參補之陽旺則陰生血也若四物湯者獨能主血分受傷為氣不虛也若左寸關脈數而無力血虛也四物湯加參術浮而無力氣虛也補中益氣湯尺脈數而無力腎虛也六味地黃丸右寸關脈數而有力者肺胃熱也犀角地黃湯後用四物湯加參苓白朮尺脈數而無力陰虛也用六味地黃丸若面黃目澀眵多手麻者脾肺虛也用黃耆芍藥湯治驗一小兒年十餘歲鼻衄肝脈弦數肝藏血此肝火血熱而妄行用小柴胡加山梔龍膽草四劑而血止又用四物芩連蘆薈山梔甘草作丸服又以地黃丸滋腎水生肝血而愈一小兒久鼻衄右腮鼻準微赤此脾胃傳熱於肺而不能統也先用六君桔梗當歸山梔而血止次用人參黃耆散以調補脾肺而愈一小兒壯熱吐血或兼衄血右腮鼻準赤色乃肺胃積熱用濟生犀角地黃四劑而血並止後因母飲酒復作用清胃散母子服之而愈一小兒吐血不止鼻準赤色審其乳母有鬱熱用加味歸脾湯加味逍遙散母子並服各數劑血少止又用八珍湯加柴胡牡丹皮而愈一小兒因母屢恚怒發熱吐血或時衄用加味小柴胡湯之類治其母並愈後其母因勞役兼怒氣致兒患驚搐或用抱龍丸又加吐血予以加味逍遙散母子並愈厥後乳母仍勞役發熱此兒即驚搐或吐血或衄血母用補中益氣湯子用犀角地黃湯頓愈一小兒十歲因傷厚味吐血用濟生犀角地黃湯解食毒清胃熱又用四君牡丹皮升麻調補脾胃而愈惟肢體倦怠兩手作麻用黃耆芍藥湯數劑而安一小兒吐血因乳母火鬱發熱兩脅作痛後吐血以加味歸脾湯加吳茱萸制黃連治母兒不時飲數匙月餘並愈後母因怒吐血寒熱兒亦吐血先用加味小柴胡湯二劑後用加味逍遙散治其母悉愈一女子年十四歲因驚寒熱發搐服鎮驚之藥更吐血尋衣撮空身如炙煩躁不眠飲食不入脈洪大而無倫次按之豁然而空用加減八味丸料二劑諸症悉退脈息按之如絲無氣以動用人參一兩煎服不應仍用人參一兩附子五分二劑元氣頓復一女子十三歲因怒吐血咬牙發搐用加味逍遙散加鉤藤鉤而愈次年出嫁懷抱鬱結胸滿食少吐血面赤此因肝火動而血熱氣虛而不能攝血也用六味丸及歸脾湯加山梔貝母而愈一小兒十四歲發熱吐血屬足三陰虛余謂宜補中益氣以滋化源不信仍用寒涼降火前症愈甚或謂曰小兒未有室何腎虛之有參耆補氣奚為用之余述丹溪先生云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則相火翕然而起雖不交會而其精亦暗耗矣又褚氏云男子精未滿而御女以通其精則五臟有不滿之處異日有難狀之疾正此謂也遂用補中益氣湯及六味地黃丸而痊黃耆芍藥湯治衄多歲面黃眼澀多眵手麻黃耆三兩甘草炙升麻葛根芍藥炒黃各一兩羌活半兩上每三錢水煎服愚按此手足太陰陽明藥也然血虛久則陽亦虛矣故血不足則麻木陰虛火動變症百出實非風也此出升陽滋陰例人參黃耆散治虛勞客熱消瘦倦怠口燥咽乾日晡潮熱五心煩熱盜汗胸滿食少作渴咳唾時有膿血天門冬去心三兩半夏知母炒黃桑白皮赤芍藥炒黃耆炒紫菀甘草炙各半兩白茯苓柴胡秦艽生地黃熟地黃地骨皮各二兩人參桔梗各一兩鱉甲醋炙五錢上銼散每服三五錢水煎服大人亦得一方有生薑四物湯方見急驚加味小柴胡湯方見痙症小柴胡湯方見肝臟清胃散加味歸脾湯加味逍遙散四君子湯六君子湯五方見內釣濟生犀角地黃湯方見便血補中益氣湯方見虛羸八珍湯即四君四物二湯合用也六味地黃丸方見腎臟虛羸仲陽云小兒虛羸因脾胃不和不能乳食使肌體瘦弱或大病後脾氣尚弱不能傳化穀氣所致若冷者時時下利唇口清白熱者身溫壯熱肌體微黃更當審其形色察其見證如面赤多啼心之虛羸也面青目札肝之虛羸也耳前後或耳下結核肝經虛火也頸間肉裡結核食積虛熱也面黃痞滿脾之虛羸也面白氣喘肺之虛羸也目睛多白腎之虛羸也仍審相勝而藥之又寒熱二症不可不辨若腹痛瀉利清白不渴喜熱此屬寒症雖在夏月宜木香丸身熱煩躁瀉利焦黃作渴喜冷此屬熱症雖在冬月宜胡黃連丸皆舍時從症之治法也治驗一小兒十三歲面赤驚悸發熱形體羸瘦不時面白噯氣下氣時常停食服保和丸及清熱等藥余曰面赤驚悸心神怯也面白噯氣心火虛也大便下氣脾氣虛也此皆稟心火虛不能生脾土之危症前藥在所當禁者不信又服枳朮丸鎮驚等藥而諸症益甚大便頻數小腹重墜脫肛痰涎飲食日少余先用六君子湯為主佐以補心丸月餘飲食少進痰涎少止又用補中益氣湯送四神而愈畢姻後病復作墜時至仲冬面白或黧色手足冷喜食胡椒姜物腹中不熱脈浮按之微細兩尺微甚乃用八味丸元氣復而形氣漸充年至二十苦畏風寒面目赤色發熱吐痰唇舌赤裂食椒姜之物唇口即破痰熱愈甚腹中卻不熱診其脈或如無或欲絕此寒氣逼陽於外內真寒而外假熱也仍用八味丸而諸症頓愈一小兒八歲面常青色或時色赤日間目札夜睡咬牙二年餘矣服清肝降火之藥益甚形氣日羸余考績到京求治於余曰肝主五色入心則赤自入則青蓋肝屬木而生風故肝氣為陽為火肝血為陰為水此稟肝腎精血不足虛火內動陰血益虛虛而生風風自火出故變面赤目札等症耳非外風也遂用地黃丸以滋腎水生肝木兩月目札咬牙悉止又三月許諸症尋愈而元氣亦充矣凡肝木之症若肝木實熱生風而自病或肺金實熱而剋木者宜用清肝降火之劑以瀉其邪氣若肝經風熱而目直等症用柴胡梔子散以清肝火加味四物湯以養肝血若腎虛而咬牙諸症用六君子湯以健脾土六味地黃丸以滋腎水則愈一小兒脾氣虛弱飲食停滯發熱作渴服瀉黃散不時下痢余先用保和丸二服而愈但不食噁心面青手冷又用六君柴胡升麻四劑面色痿黃食進手溫惟形體羸甚倦怠發熱小腹重墜肛門脫出用補中益氣湯加半夏肉豆蔻二劑而安凡脾胃之症若發熱作渴飲食喜冷或泄瀉色黃睡不露睛者屬形病俱實宜用瀉黃散疏導之若發熱口乾惡冷或泄瀉色白睡而露睛者屬形病俱虛宜用異功散調補之若脾氣下陷者補中益氣湯寒水侮土者益黃散肝木克脾者六君加柴胡若目睛微動潮熱抽搐吐瀉不食宜用秘旨保脾湯凡小兒諸病先當調補脾胃使根本堅固則諸病自退非藥所能盡祛也一小兒五歲形氣虛羸睡中咬牙夜間遺尿日間頻數余以為稟腎氣不足用補中益氣湯加補骨脂地黃丸加鹿茸以補脾腎而痊畢姻後小便頻數作渴發熱日晡益甚恪服黃柏知母等藥以滋陰降火後患腎痿臥床年許余因考績北上仍用前藥喜其慎疾半載而痊一小兒年十一歲面白或赤足軟不能久行用地黃丸加鹿茸年許而瘥畢姻後兩目羞明兩足仍軟用前丸及補中益氣湯而痊後病復發增口渴足熱頭囟覺開視物覺大此腎虛瞳人散大而然也服前藥遠房事則愈因不自保終患腎痿而歿仲陽先生云此症屬腦髓不足不能榮養宜用地黃丸補之有至七八歲或十四五歲氣血既盛而自合若縱盜色欲戕賊真陰亦不盡其壽矣一小兒體素虛弱患咳嗽痰涎服化痰藥而痰益甚余以為脾虛食積先用六君神麯山楂漸愈後傷風咳嗽腹脹不食泄瀉酸臭此食滯傷脾而肺氣虛也用六君桔梗而愈又飲食停滯嘔吐痰涎喘嗽面白余謂脾虛不能消化飲食而為痰肺虛不能攝氣歸源而作喘仍用六君子湯而愈大凡腠理不密外邪所感而肺病者因脾胃氣虛不能相生必用六君子湯若脾胃氣實大腸不利而肺病者用瀉黃散若心火炎爍肺金而喘嗽者用地黃丸一小兒形瘦不時咳嗽自用參蘇散一劑更加喘急驚搐面白或黃余謂此稟脾肺不足而形氣虛羸因前劑峻利外邪雖去而肺氣益虛肺虛則宜補脾先用異功散加桔梗鉤藤鉤一劑痰喘頓定乃去桔梗加半夏當歸再劑驚搐亦去又加酸棗仁治之而安年十五歲發熱痰盛作渴面赤形體羸瘦用地黃丸加五味子及補中益氣湯各百餘劑而形氣漸壯若認為陰火用黃柏知母等藥復傷生化之源其亦不治者矣一小兒五歲尚飲乳耳前後頸間至缺盆以手推尋其筋結小核如貫珠隱於肌肉之間小便不調面色青黃形氣羸瘦此稟母之肝火為患用九味蘆薈丸五味異功散加山梔柴胡與兒飲之又以加味逍遙散與母服之尋愈一小兒患虛羸耳出穢水左手尺關洪數而無力余為清肝補腎耳中雖愈脈未全斂畢姻後患瘵症誤服黃柏知母之類復傷元氣不勝寒暑勞役無日不病幾至危殆余大補脾腎滋養元氣而愈一小兒患症如前肢體消瘦面色痿黃大便酸臭此脾虛食積用四味肥兒丸五味異功散治之而愈一小兒體瘦腹大寒熱嗜臥作渴引飲以白朮散為主佐以四味肥兒丸諸症漸愈乃以異功散六味丸月餘而安一小兒患前症身熱如炙此肝疳之症也朝用異功散夕用四味肥兒丸諸症稍愈佐以蚵蟆丸數服而痊一小兒停食發熱服芩連三稜等劑飲食日少胸腹膨脹肢體羸瘦余謂脾虛飲食停滯元氣復傷先用補中益氣湯加木香鉤藤鉤數劑漸愈又用六君炮姜調理而安一小兒虛羸昏倦咳嗽驚悸自用參蘇散一劑更加喘急此脾肺氣虛而妄發表也用惺惺散微解外邪調和胃氣諸症頓愈但手足逆冷又用六君子湯調補元氣而安一小兒九歲吞酸惡食肌體消瘦腹中作痛余謂食積虛羸也用保和丸而愈後腹中數痛皆服保和丸余曰此因脾胃虛而飲食所傷也當調補脾土以杜後患不信後腹痛喜按余用五味異功散二劑因未應自用平胃散等藥腹脹作痛余仍以異功散加木香四劑而愈若屢用攻伐之劑陰損元氣多致虛羸深可慎也參苓白朮散治脾胃虛弱飲食少思中滿痞噎心忪氣喘嘔吐泄瀉白扁豆二兩半薑汁浸去皮微炒人參白茯苓白朮甘草炒山藥各三兩半蓮肉桔梗炒黃色薏苡仁宿砂仁各二兩上為末每服一錢棗湯調下地黃丸加肉桂一兩名加減八味丸治小兒肝經虛熱血燥或風客淫氣而患瘰癧結核或四肢發搐眠目抽動痰涎上湧又治腎疳腦熱消瘦手足如冷寒熱往來滑瀉腹脹口鼻乾渴齒齦潰爛爪黑麵黧遍身兩耳生瘡或兩耳出水或發熱自汗盜汗便血諸血失喑等症其功不可盡述即六味地黃丸方見腎臟補中益氣湯治中氣虛弱體疲食少或發熱煩渴等症人參黃耆各八分白朮甘草陳皮各五分升麻柴胡各二分當歸一錢上薑棗水煎空心午前服愚按前方若因藥克伐元氣虛損惡寒發熱肢體倦怠飲食少思或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱或寸關獨甚者宜用之凡久病或過服克伐之劑虧損元氣而虛症悉具者最宜前湯若母有脾胃不足之症或陰虛內熱致兒為患者尤宜用之錢氏異功散治脾胃飲食少思吐瀉不食凡虛冷症先與數服以正胃氣即五味異功散見內釣愚按前方治脾胃虛弱吐瀉不食或驚搐痰盛或睡而露睛手足指冷或脾肺虛弱咳嗽吐痰或虛熱上攻口舌生瘡弄舌流涎若母脾胃虛兒患此症亦當服之四君子湯治脾氣虛損吐瀉少食肌肉羸瘦方見內釣保和丸治飲食停滯胸膈痞滿噯氣吞酸或吐瀉腹痛加白朮一兩即大安丸神麯炒山楂半夏茯苓各一兩陳皮連翹蘿蔔子炒五錢上為末粥丸桐子大每服三十丸白湯送下愚按前方行氣克滯之劑若元氣無虧暴停乳食而致斯症者宜用此消導之若元氣虛弱而乳食所傷者必調補胃氣為主而佐以消導若乳食已消而作嘔者乃胃氣被傷當用異功散補之不宜仍用前藥重損胃氣治者審之肥兒丸治肝疳食積肢體消瘦二便不調黃連神麯木香各一兩五錢檳榔二十個肉豆蔻二兩煨使君子酒浸去皮麥芽各四兩上為末神麯糊丸麻子大每服二三十丸米飲下愚按前方若食積五疳發熱口乾大便不調小便不清或頸項結核發稀成穗寒熱作渴宜用之若脾胃稍虛者用五味異功散兼服虛甚者異功散為主佐以前藥枳朮丸方見癖塊六君子湯方見內釣四神丸方見脫肛八味丸方見腎臟柴胡梔子散四物湯二方見急驚九味蘆薈丸方見疳症加味逍遙散方見內釣白朮散方見積滯蝦蟆丸方見疳症胃氣虛寒經曰胃為水穀之海六腑之大源也人身氣血腑臟俱由胃氣而生故東垣之法一以脾胃為主所謂補腎不若補脾正此意也在小兒雖得乳食水穀之氣未全尤仗胃氣胃氣一虛則四臟俱失所養矣故丹溪謂小兒多肝脾之疾也若面色㿠白目無睛光口中氣冷不食吐水肌瘦腹痛此胃氣虛寒之症用五味異功散或六君子湯主之若大便不實兼脾虛也加乾薑溫之中滿不利脾不運也加木香開之喜冷便秘胃實熱也用瀉黃散涼之命門火衰不能生土者用八味丸補之稟賦胃氣不足亦用此丸蓋下焦真陽充盛則上生脾元自能溫蒸水穀矣治驗一小兒傷食吐瀉不已後便泄青色睡而露睛手足指冷額黑唇青余謂大便青色木勝土也或時溏泄脾氣不足也額黑唇青寒水侮土也悉屬中氣虛寒用五味異功散加升麻柴胡木香附子二劑而愈一小兒盛暑嘔吐飧泄服黃連香薷飲益甚用白虎石膏湯而腹脹作痛手足並冷余謂脾氣虛寒且夏月伏陰在內也用五味異功散加木香而愈一小兒因傷乳食雜用消導之藥遂變痢久而不愈先用六君加木香而漸痊後用五味異功散而痊愈一小兒手足常冷腹中作痛飲食難化余謂胃氣虛寒也先用益黃散二服痛止次用六君子湯數劑即愈一小兒九歲素畏風寒飲食少思至秋冬口鼻吸氣陰冷至腹手足如冰飲薑湯及燒酒方快其脈細微兩尺如無余謂此稟命門火衰也用還少丹不應改用八味丸旬余諸症即愈平胃散治脾胃不和不思飲食心腹脹痛口苦短氣噁心噯氣吞酸面黃體瘦嗜臥體痛霍亂吐瀉等症厚朴薑汁製五兩陳皮甘草炙各一兩蒼朮米泔浸焙八兩上為末每服二錢薑棗水煎沸湯點服亦得常服調氣曖胃化宿食消痰飲闢四時不正之氣愚按前症若乳食停滯噯腐吞酸嘔噦噁心者宜服是方若飲食既消脾胃虛弱嘔吐噁心者則宜四君子湯調中丸治脾胃虛寒白朮人參甘草炒各五分八味地黃丸即六味地黃丸加肉桂附子各一兩治稟賦命門火衰不能生土以致脾土虛寒或飲食少思及食而不化腹中疼痛夜多漩溺等症內經謂益火之源以消陰翳正此藥也錢氏益黃散一名補脾散治脾胃虛冷吐瀉方見脾臟愚按前方若脾土虛寒或寒水侮土而嘔吐泄瀉手足並冷或痰涎上湧睡而露睛不思乳食者宜用此方若脾土虛弱吐瀉者用六君柴胡如不應或手足俱冷者屬虛寒加木香炮姜若因乳母脾虛肝侮亦治以前藥若乳母鬱怒致兒患前症者其母兼服加味歸脾湯瀉黃散方見脾臟觀音散方見嘔吐銀白散方見慢驚歸脾湯異功散六君子湯三方見內釣食積寒熱小兒食積者因脾胃虛寒乳食不化久而成積其症至夜發熱天明覆涼腹痛膨脹嘔吐吞酸足冷肚熱喜睡神昏大便酸臭是也有前症而兼寒熱者名曰食積寒熱若食在胃之上口者吐之胃之下口者消之腹痛痞脹按之益痛者下之下後仍痛按之則止者補之夾食傷寒者先散之用參蘇飲熱甚便秘者先利之用大柴胡湯如無外感但只傷食不致於甚保和丸調之蓋脾為至陰之臟也故凡脾病者至夜必熱熱而兼寒則又見所勝者侮所不勝矣食未消者消之則寒熱自止食既消者補之則寒熱自痊若手足並冷喜熱飲食此中州虛寒也宜溫之大便欲去不去脾氣下陷也宜升之若夜間或侵晨泄瀉者脾胃俱虛也用四神丸手足並熱作渴飲水者脾胃實熱也用瀉黃散大便秘結用大柴胡湯手足雖熱口不作渴大便不實者用白朮散仍參腹痛腹脹積痛積滯治之治驗一小兒傷食腹脹胸滿有痰余用異功散而痊後復傷食腹脹作痛或用藥下之痛雖止而脹益甚更加喘粗此脾氣傷而及於肺也用六君桔梗調補而痊一小兒腹脹惡食寒熱噁心症類外感余曰氣口脈大於人迎此飲食停滯也用保和丸一服諸症頓退但腹脹未已用異功散而痊一小兒傷風咳嗽痰湧用六君桔梗桑皮杏仁而愈後飲食停滯腹瀉脹痛又用六君加山楂厚朴而安腹停食作嘔或用藥下之更加咳嗽余謂此脾肺益虛欲行調補彼以為緩乃服發表克滯之藥前症益甚更加搖頭余用天麻散倍加鉤藤鉤及異功散而愈一小兒胸腹脹痛寒熱頓悶以手按腹即哭此飲食停滯也先用保和丸一服前症即愈更加煩渴按其腹不哭此宿食去而脾氣未復也用五味異功散加柴胡治之而瘳一小兒飲食停滯服消導之劑飲食既消熱尚未退此胃經虛熱也用六君子加升麻柴胡四劑而愈一小兒先因飲食停滯服克伐之劑更加腹痛按之則止余用六君子湯而愈後腹傷食服保和丸及三稜檳榔之類更加腹重善噫此脾氣虛而下陷也仍用前湯加升麻柴胡木香而愈一小兒面色青白飲食難化大便頻泄或用消積化痰等藥久不愈余謂脾胃虛弱也用六君子湯漸愈或以為食積宜驅逐之遂反作瀉痰喘發搐余謂脾氣復傷不能生肺肺虛不能平肝而作是症先用六君加鉤藤鉤飲食少進又用五味異功散加升麻而愈一小兒患前症腹痛服攻下之劑發熱不已大便不化按其腹不痛與冷水不飲此食積去而脾氣虛也用五味異功散加當歸升麻而愈三黃枳朮丸治傷肉濕面辛辣味厚之物致填塞悶亂不快枳實麵炒五錢黃連酒浸炒大黃濕紙裹煨白朮各一兩黃芩五錢上為末湯浸𩚫餅為丸如綠豆大每服五十丸白湯下臨時量所傷多少加減服之大柴胡湯方見痙症四神丸方見驚瀉六君子湯五味異功散二方見內釣瀉黃散方見脾臟白朮散方見積滯保和丸方見虛羸加減腎氣丸方見腹脹天麻散方見百晬內嗽即天麻丸腫脹經曰至陰者腎水也少陰者冬脈也其本在腎其末在肺皆積水也又曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故跗腫腹大上為喘呼不得臥者標本俱病也丹溪云惟腎虛不能行水脾虛不能制水胃與脾合又胃為水穀之海因虛而不能傳化腎水氾濫反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫也其狀目胞上下微起肢體重著喘咳怔忡股間清冷小便澀黃皮薄而光手按成窟舉手即滿是也古方有十種論症以短氣不得臥為心水兩脅緊痛為肝水大便鶩溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水下虛上實為大腸水腹急肢瘦為膀胱水小便關泄為胃水小腹急滿為小腸水又有濕氣毒氣傷寒後瀉痢後氣血虛者之五腫及疳氣癥積鎖肚胸膈作膨蛔氣虛冷積者之七脹亦當詳之其受濕氣者由脾胃之氣敦阜四肢頭面皆腫也食毒者脾傷積毒停留於胃也傷寒下早者邪氣乘虛而入也瀉痢後者脾氣虛也皆宜先調胃氣次可治腫其患七脹皆由血氣不足臟腑怯弱表裡俱虛邪正相亂以致四肢浮腫腹肚膨滿亦當先調榮衛分別陰陽治法宜補中行濕利小便凡有熱者水氣在表也可汗之身無熱者水氣在裡也宜下之腰以上腫宜利小便腰已下腫宜發汗此仲景之法也若遍身腫煩渴小便赤澀大便秘結此屬陽水遍身腫不渴大便溏泄小便清利此屬陰水陽水兼陽症者脈必浮數陰水兼陰症者脈必沉遲氣若陷下宜用二陳加升提之藥如腹脹少加木香調之若朝寬暮急屬陰虛朝用四物湯加參術夕用加減腎氣丸朝急暮寬屬陽虛朝用六君子湯夕用加減腎氣丸朝暮皆急陰陽俱虛也用八珍湯主之真陽虛者朝用八味地黃丸夕用補中益氣湯若肚腹痞滿肢體腫脹手足並冷飲食難化或大便泄瀉呼吸氣冷者此真陽衰敗脾肺腎虛寒不能司攝而水泛行也急用加減腎氣丸否則不治惟調補脾土多有生者治驗一小兒傷食膨脹服克伐之劑小便澀滯改服五苓散小便益閉四肢頓腫余謂脾胃虛寒不能通調水道下輸膀胱故也朝用加減金匱腎氣丸夕用補中益氣湯而愈一小兒患前症小便赤頻盜汗發熱朝間用補中益氣湯午間用五味異功散晚間用六味地黃丸而愈後作功課太勞盜汗發熱用八珍湯六味丸而痊一小兒患前症飲食少思大便不實先用補中益氣湯又用五味異功散而愈畢姻後復發更手足並冷飲食難化或吞酸噯腐用六君子炮姜而痊後又發用八味地黃丸補中益氣湯而痊一小兒小腹脹墜小便澀滯午前為甚以補中益氣湯加木香與朝服以五味異功散加升麻柴胡與夕服兩月餘而愈後飲食失節腹脹咽酸用五味異功散四味茱萸丸而痊畢姻後後患如前更惡寒腹冷小便清頻大便不實手足並冷用補中益氣湯八味地黃丸而尋愈二陳湯方見寒吐五苓散方見五淋八珍湯即十全大補湯去黃耆肉桂方見自汗六君子湯方見內釣加減腎氣丸方見腹脹八味地黃丸方見腎臟補中益氣湯方見虛羸蛔蟲巢氏云蛔蟲者九蟲之一也長尺許或五六寸者因臟腑虛弱及食甘肥而動其動則腹中攻痛或作或輟口吐涎水貫心則死用使君子丸之類下之錢仲陽云吐水不心痛者胃冷也吐沫心痛者蟲痛也與癇相似但目不斜手不搐耳安蟲散主之田氏云蟲痛者啼哭俯仰坐臥不安自按心腹時時大叫面色青黃唇色兼白目無睛光口吐涎沫也若因胃冷即吐用理中湯加炒川椒五粒檳榔五分煎下烏梅丸古云蟲蝕上部則上唇有白點蟲蝕下部則下唇有白點腹中諸蟲望前其頭向上望後其蟲向下如欲用藥先以豬肝油炙香令兒聞其香味使蟲頭向上則藥易伏若中氣虛而蟲不安者但調補脾胃自安丹溪先生云冬月吐蟲多是胃氣虛寒用錢氏白朮散加丁香二粒主之治驗一小兒患蟲動心痛先服大蕪荑湯下瘀穢反作嘔少食右腮鼻準白中兼黃此脾肺氣虛也用異功散二服稍應更加炮姜一劑而安一小兒吐瀉將愈心痛吐水手足並冷忽自手按心腹此胃氣虛寒類乎蟲痛也用益黃散而愈一小兒病後吐水心間作痛余謂胃氣虛寒用五味異功散而愈後每吐凡患病飲食不進手足並冷即吐水心痛余用前散加升麻柴胡即愈或用逐蟲之劑前症益甚更加腹痛重墜余用補中益氣湯加炮姜治之而愈使君子丸治五疳脾胃不和心腹膨脹時復作痛不食漸瘦並宜服之使君子肉一兩厚朴制橘紅白芍藥甘草炒川芎各一錢上為末蜜丸如皂角子大每服一丸陳米飲化下安蟲散治蟲痛胡粉炒鶴蝨炒川楝子檳榔各二錢白礬枯二錢半上為末每服三五分米飲調下烏梅丸治蛔厥當吐蛔今反靜而復煩此為臟寒蛔上入其膈故須臾復止得食而嘔又煩蛔聞臭當自吐及治久痢方見傷風咳嗽理中湯方見冷瀉大蕪荑湯方見疳症異功散方見內釣白朮散方見積痛益黃散方見脾臟疝氣小兒陰腫疝氣者多屬肝腎氣虛及坐臥寒濕之地或風邪所傷血氣相搏或啼叫氣逆水道不行或稟父肝經虛熱或妊娠肝氣鬱結或乳母怒動肝火而致者若兒肝經熱用梔子清肝散兒啼躁怒用均氣散乳母恚怒用柴胡清肝散肝火氣逆用加味逍遙散小腹作痛小便澀滯用龍膽瀉肝湯久坐冷地小便不利用四苓散加柴胡山梔車前子不時寒熱者加味小柴胡湯經云肝氣熱則莖痿宗筋弛縱腎莖腫脹或出白液癢痛或裡急筋縮挺縱不收或精隨便下者此名筋疝俱屬肝火不繫於腎宜詳治之治驗一小兒陰囊赤腫余作胎毒治瘥後發熱痰盛等症診其母素有鬱熱用加味歸脾逍遙二藥子母俱服而愈後吐瀉小便赤澀兩目瞤動視其寅卯二關脈赤此肝經風熱也用柴胡清肝散加鉤藤鉤木賊草而愈一小兒陰莖作癢小便頻數此屬肝火之症反服五苓散頸間結核余用柴胡梔子散四味肥兒丸諸症稍愈又用蝦蟆丸而痊一小兒莖痿濕癢後陰囊焮腫莖中作痛時出白津余診之肝火也用龍膽瀉肝湯六味地黃丸而愈一小兒睪丸作痛小便赤澀寒熱作嘔乃肝脾之疝用小柴胡湯加山梔車前子茯苓而愈一小兒睪丸腫硬小便黃澀用小柴胡湯加車前子山梔並蘆薈丸而消一小兒莖中作癢一小兒下疳潰爛作痛發熱一小兒莖中潰痛小便秘澀日晡尤盛一小兒目癢出水連札項間結核陰囊搔癢俱屬肝火之症俱用九味蘆薈丸而愈一小兒小便澀滯陰囊腫痛寒熱此肝經濕熱也用龍膽瀉肝湯而消但內熱倦怠此兼脾氣虛也用四君柴胡山梔芎歸而愈一小兒陰囊赤腫因乳母怒氣及飲酒而發余審之因於怒則用加味逍遙散因於酒則用加味清胃散並加漏蘆乾葛神麯與母子服之隨愈一小兒陰囊腫痛小便赤澀用加味小柴胡湯加漏蘆母子並服而愈一小子稟肝腎虛弱睪丸常腫用六味地黃丸料加柴胡母子並服兩月餘而痊劉武庫子睪丸作痛小便赤澀寒熱作嘔用小柴胡湯加山梔車前子茯苓而愈一小兒腹內一塊攻痛小便不調用龍膽瀉肝湯蘆薈丸而愈後形氣消燥發熱作渴此肝木製脾土也用補中益氣湯及蘆薈丸而愈龍膽瀉肝湯治肝經濕熱兩拘腫痛或腹中作痛或小便澀滯等症龍膽草酒拌炒黃澤瀉各二分車前子炒木通生地黃酒拌當歸酒拌山梔炒黃芩炒甘草各二分上水煎服四君子湯加味逍遙散加味清胃散加味歸脾湯四方見內釣五苓散方見五淋九味蘆薈丸方見疳症補中益氣湯方見虛羸加味小柴胡湯方見痙症六味地黃丸方見腎臟梔子清肝散柴胡清肝散二方見發熱四味肥兒丸方見寒吐四苓散即五苓散去肉桂渴症百問云小兒唇紅如丹即發渴紅甚焦黑則危篤若三焦虛煩作渴者用三黃湯傷寒後唇口焦者用白虎湯竹葉湯瀉痢作渴者用四苓散之類常治暑積心脾煩渴引飲者用白虎湯下痢脾虛作渴者用七味白朮散熱結膀胱小便秘渴者用五苓散上焦虛熱者用四君子湯膏粱積熱者用清胃散脾胃積熱者用瀉黃散中氣虛熱者用異功散腎水虛熱者用六味丸其餘疳症發熱各詳本症胎稟所致者當各審其因若誤用寒涼降火脾胃復傷則腹脹而為敗症矣治驗一小兒發熱作渴用瀉黃散大便重墜口角流涎仍欲瀉火余曰鼻準青白多而黃色少屬脾胃虛寒肝木所侮蓋口角流涎胃氣不能統攝也大便重墜脾氣不能升上也不信另用涼劑果眉唇微動四肢微搐余曰此虛極而變慢驚風矣用六君當歸木香炮薑鉤藤鉤二劑益甚意欲更劑余曰此藥力未及也仍以前藥加附子一片服之即安去附子又二劑而愈一小兒吐瀉後患渴症飲食少思肌體消瘦用七味白朮散渴漸止五味異功散加升麻飲食漸進又用補中益氣湯肌肉頓生一小兒嗜膏粱甘味發熱作渴小便白濁用四味肥兒丸佐以瀉黃散稍愈復傷食吐瀉服消食丸胃氣復傷飲食少思肢體倦怠而渴先用七味白朮散而渴止次用五味異功散而痊一小兒面目色白患渴症唾痰發熱服清熱化痰之藥大便洞瀉小便頻數此脾胃虛而復傷也朝用補中益氣湯夕用四神丸諸症漸愈又佐以六味地黃丸而愈一小兒十五歲用心太過兩足發熱日晡益甚服人參固本丸之類熱益甚痰涎上湧體倦更唾痰服化痰滋陰之劑痰熱益甚更頭目眩暈體倦少食請余治仍欲清熱化痰滋陰余曰兩足發熱腎經陰虛也痰涎上湧腎不能攝也頭目眩暈胃氣不能上升也此稟賦不足勞疫過度而然耳遂朝用補中益氣湯夕用加減八味丸元氣漸復諸症漸愈但用心於功課即頭暈發熱用前藥即愈畢姻後諸症復作服前藥半載而痊後再發更大小便牽痛用補中益氣湯八味地黃丸獨參湯而得生竹葉石膏湯石膏一錢半夏三分甘草人參各二分麥門冬十粒竹葉一握上生薑汁一匙水煎服三黃湯黃芩黃連黃柏各等分上水煎服白虎湯方見發熱五苓散方見五淋七味白朮散方見積滯四君子湯六君子湯清胃散異功散四方見內釣六味丸方見腎臟四苓散即五苓散去肉桂補中益氣湯方見虛羸四味肥兒丸方見寒吐四神丸方見驚瀉消食丸方見嘔吐乳煩躁仲景云火入於肺則煩入於腎則躁夫心者君火也火王則金燔水虧而火獨存故肺腎合而為躁也活人云但煩熱者虛煩也諸虛煩熱與傷寒相似但不惡寒鼻不塞故知非傷寒也頭不痛脈不緊故知非裡寒也不可發汗攻下當與竹葉湯兼嘔者與橘皮湯又心虛則先煩而後渴翕翕發熱其脈浮緊而大是也蓋煩者心中煩擾為內熱故屬陽躁者肢體躁動或裸身欲入井中為外熱故屬陰外熱者無根之火也是以為虛在小兒當辨其嗞煎不安是煩嗞啀不定是躁嗞煎者心經有熱精神恍惚煩滿生驚嗞啀者心經有風煩躁驚搐也熱甚者黃連解毒湯輕者導赤散風熱者至寶丹脈數而實便悶有熱者神芎丸此皆實熱之治法也若煩而頭痛短氣口乾咽燥不渴者虛也用四君加芎歸因藥攻伐而作渴者用竹茹湯煩而不得眠者酸棗仁湯心神顛倒煩熱欲吐者硃砂安神丸面戴陽目內赤六脈洪大按之全無者血虛發躁用當歸補血湯若躁而裸體欲入井中脈沉細或浮大按之如無者此皆陰盛發躁也宜用參附湯有回生之功治驗一小兒煩躁驚悸熱渴飲冷額間色赤此心經實熱所致先用瀉心湯一服稍緩又用柴胡梔子散而愈一小兒痢後發熱煩躁用四君當歸升麻柴胡頓安又用補中益氣湯而愈又傷食作瀉前症復作吞酸先用異功散加吳茱萸木香為末二服吞酸悉止乃去茱萸木香治之而安一小兒潰瘍煩躁驚搐撮空用六味丸料煎服以滋腎肝用五味異功散以補脾肺漸愈又用八珍湯而痊一小兒患癍疹服發汗之藥煩躁作渴先用當歸補血湯及東垣聖愈湯諸症漸安又用八珍湯加麥門冬五味子而愈一小兒痢後煩躁作渴面赤脈大按之如無此血脫煩躁也先用當歸補血湯又用加味異功散加升麻當歸而安又傷食作瀉不已復煩躁用異功散為主佐以八珍湯而安一小兒患瘰癧服下毒之藥發熱煩躁口渴作嘔此元氣復傷用八珍湯倍加參耆歸術治之漸安又用四君當歸升麻而安清熱解毒丸治五臟積熱毒氣上攻胸臆煩悶咽喉腫痛赤眼壅腫頭面發熱唇口乾燥兩頰生瘡精神恍惚心忪悶亂坐臥不寧及傷暑毒面赤身熱心煩躁而渴飲食不下寒水石石膏各八兩青黛四兩上研末入青黛和勻蒸餅七個水調為丸如芡實大每服一丸食後新汲水化下或細嚼生薑湯下如中諸毒並宜服之及驚風潮熱痰涎壅塞心胸煩躁頰赤多渴坐臥不穩每服半粒量大小加減橘皮湯橘皮一兩半甘草炙半兩人參二錢五分竹茹半兩上每服五錢姜水煎食前服東垣聖愈湯治諸瘡出血多而煩躁不得眠熟地黃生地黃川芎人參各五分當歸身黃耆各一錢上水煎服瀉心湯治心經實熱口舌生瘡煩躁發渴宣黃連犀角各等分上水煎服黃連解毒湯方見諸痢竹茹湯方見嘔吐乳酸棗仁湯方見驚癇硃砂安神丸方見諸疳神芎丸至寶丹二方見驚風導赤散方見心臟異功散四君子湯二方見內釣注夏脾為太陰位屬坤土喜燥而惡濕故凡脾胃之氣不足者遇長夏潤溽之令則不能升舉清陽健運中氣又復少陽相火之時熱傷元氣則肢體怠惰不收兩腳痿弱嗜臥發熱精神不足飲食少思口中無味呼吸短乏氣促目中視物𥉂𥉂小便赤數大便不調名曰注夏此皆稟賦陰虛元氣不足之症丹溪補陰論言之詳矣育子者豈可不知冬月養陽之道乎治法用補中益氣湯去升麻柴胡加炒黑黃柏主之若因勞役發熱血虛脈大者用當歸補血湯氣血兩虛者八珍湯肝腎陰虧者地黃丸大便作瀉者人參理中湯若乳母肝火乘脾寒熱少食者柴胡梔子散胃火作渴者竹葉石膏湯小兒多因乳母之氣不調而當戒怒氣調飲食適寒溫則可以遠病矣又如今人夏月皆以香薷湯浸冷代茶飲之殊不知香薷利水大損元陽厚朴克伐大瀉真氣況脾性喜溫而惡寒夏月陰盛於內冷啜傷脾若胃強有火濕熱為病之人固無大害其脾胃虛弱中氣不足者必為腹痛少食泄瀉寒中之疾矣此大人亦所當戒者況小兒乎慎之慎之治驗一小兒每春夏口乾發熱怠惰嗜臥勞則頭痛服清涼化痰之藥喘瀉煩躁不安服香薷飲脈大神思昏憒余用補中益氣湯去升麻柴胡加五味麥門炮姜一劑未愈又加肉桂五分即蘇更用六味丸而愈一小兒稟脾腎虛弱注夏發熱二便不調朝用補中益氣湯夕用地黃丸而愈後因乳母怒氣致兒發熱驚搐用柴胡梔子散母子並服而瘥一小兒素有食積注夏發熱倦怠少食大便不實朝用五味異功散少加升麻柴胡夕用四味肥兒丸而尋愈一小兒稟賦腎虛患注夏之疾因乳母大勞則發熱益甚用補中益氣湯令母子並服而愈後因乳母多食膏粱又患瘡疾煩躁作渴先用竹葉石膏湯及補中益氣湯將瘥母著怒氣大熱發搐用柴胡梔子散加味逍遙散而痊一小兒注夏食生冷之物腹中作痛甚則發搐厥冷用人參理中丸而愈一女子年十四患注夏經行之後發熱晡熱煩躁作渴面赤脈洪大按之如無此血脫髮躁先用當歸補血湯四劑又用八珍湯而安柴胡梔子散當歸補血湯二方見發熱八珍湯方見自汗補中益氣湯方見虛羸地黃丸方見腎臟人參理中湯方見冷瘍竹葉石膏湯方見渴症
