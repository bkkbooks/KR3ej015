body:
  text: 卷八脫肛夫肺與大腸相為表裡肛者大腸之魄門是也巢氏云實熱則大便祕結虛寒則肛門脫出此多因吐瀉脾氣虛肺無所養故大腸之氣虛脫而下陷也用補中益氣或四君子為主若脫出緋赤或作痛者血虛而有熱也用補中益氣湯佐以四物牡丹皮微者或作痛者氣虛而有熱也佐以四君牡丹皮大凡手足指熱者屬胃氣熱手足指寒者屬胃氣寒治驗一小兒痢後脫肛飲食少思面色青黃余謂脾土虧損肝木所勝也不信另服消導克滯之劑腹痛膨脹倦怠作嘔余曰脾氣虛甚矣又不信恪服前藥腹益脹重墜四肢浮腫復請治之仍欲克滯余曰腹脹重墜脾氣下陷也先用五味異功散加木香四劑更手足冷又加乾薑四劑而腹脹諸症漸愈後因飲食過多作瀉脫肛用補中益氣湯加木香及五味異功散而愈一小兒脫肛半載侵晨便泄兩目白多用升補脾氣之劑不應余曰腎開竅於二陰此屬腎虛也用四神地黃二丸及補中益氣湯月餘而愈一小兒痢久脫肛目睛多白面色漸黃余用補中益氣湯六味地黃丸調補脾腎而痊一小兒小便先頻數澀滯次下痢脫肛久而不愈余以為稟父腎虛用六味地黃丸尋愈後患泄瀉咳嗽聲喑亦用前丸而瘥一小兒脫肛用寒涼之藥肢體倦怠飲食少思肛門重墜此脾氣虛而中氣下陷也用補中益氣湯加酒炒芍藥白朮茯苓而瘥一小兒肛門腫痛出血水年餘未愈忽吐血便血皆成紫塊此腸胃積熱用聖濟犀角地黃丸頓止更用金銀花甘草為末白湯調服半載而痊一小兒脫肛雜用除濕祛風收澀等藥面黃體倦少食便血余欲升補脾氣以攝其血反服四物槐花之類而血亦甚更加作嘔余先用四君木香治之形氣漸充便血頓止又用補中益氣湯更以萆麻仁塗頂心而愈一小兒因咳嗽服化痰等藥或作或徹服滾痰丸更吐瀉手足指冷眉目發搐肛門脫而不赤余朝用補中益氣湯夕用六君子湯治之諸症漸愈但脫肛未入恪服補中益氣湯而愈一小兒患痢脫肛色赤或痛用補中益氣湯送香連丸而愈後傷食用瀉肛復脫不入仍用前湯更以萆麻仁研塗頂門而愈澀腸散治小兒久痢腸頭脫出訶子泡赤石脂龍骨各等分上為末臘茶少許和摻腸頭上綿帛揉入四神丸方見驚瀉地黃丸方見腎臟補中益氣湯方見虛羸聖濟犀角地黃湯方見便血尿血即濟生犀角地黃湯四君子湯方見內釣龍膽瀉肝湯方見疝氣肛門作癢小兒肛癢或嗜甘肥大腸濕熱壅滯或濕毒生蟲而蝕肛門若因濕熱壅滯用四味肥兒丸大便祕結者用清涼飲蟲食肛門先用化蟲丸後用四味肥兒丸外以雄黃散納肛內若因病不食蟲無所養而食臟食肛者其齒齦無色舌上盡白四肢倦怠其上唇內有瘡唾血如粟心內懊憹此蟲在上食臟若下唇內有瘡此蟲在下蝕肛門若蝕肛透內者不治諸蟲惟上半月頭向上可用藥追之望後頭向下令患者聞烹食香味蟲頭即向上矣後用藥追之治驗一小兒嗜膏粱甘味患疥瘡余謂當禁其厚味急用清胃之藥以治其積熱不從乃用敷藥以治其外更肛門作癢發熱瘡益甚肌體骨立飲食少思遂用九味蘆薈丸五味異功散加柴胡升麻尋愈一小兒肛門作癢耳前後結小核如貫珠隱於肌肉之間小便不調面色青此稟母之肝火為患用九味蘆薈丸為主佐以五味異功散加山梔柴胡又以加味逍遙散加漏蘆與母服之而愈一小兒十三歲肛門作癢或脫出或大便血遍身生瘡發熱作渴腹大青筋用大蘆薈丸五味異功散其瘡漸愈佐以補中益氣湯熱渴漸止肛門悉愈又用異功散為主佐以補中益氣湯加吳茱萸所制黃連治之而血愈一小兒十五歲兩目白翳遍身似疥非疥肛門作癢晡熱作渴形體骨立余以為肝疳之症也用六味地黃丸而痊後陰莖作癢小便澄白服蟠蔥散肛門腫痛服大黃等藥肛門脫出作癢不可忍雜用降火之藥不應下唇內生小白瘡余以為蟲蝕肛門用九味蘆薈丸而愈一小兒肛門作癢誤以為痔服槐角丸等藥肢體消瘦鼻下濕爛下唇內生瘡此蟲食下部也先用化蟲丸二服乃用五味異功散四劑卻用大蕪荑湯四味肥兒丸而痊一小兒七歲飲食過多即作瀉面色青黃服峻利克劑余謂當節飲食健脾胃為善不信後牙齦赤爛肛門作癢服清熱之劑腹痛膨脹復請欲用前劑余曰此元氣虧損虛火上炎也仍不信後腮間黑腐余曰此脾氣大虛肉死而不知痛也明矣後雖信余已不救矣若初用五味異功散健脾胃為主佐以大蘆薈丸四味肥兒丸清脾濕熱豈有不治之理哉後之患者審之一小兒肛門作癢屬大腸經風熱用槐角丸而愈一小兒肛門連陰囊癢出水漓淋屬肝經濕熱也用龍膽瀉肝湯九味蘆薈丸治之並愈一小兒嗜甘肥肛門作癢發熱作渴雜用清熱之劑腹脹少食鼻下生瘡余謂脾胃濕熱生蟲也不信後下唇內生瘡先用四味肥兒丸諸症漸愈又用大蕪荑湯治之而痊便血尿血經云肺朝百脈之氣肝統諸經之血又云氣主詬之血主濡之蓋榮血為水穀之精氣灌溉五臟六腑四肢百骸若脾胃有傷榮衛虛弱行失常道故上為衄血吐血下為尿血便血若外感風邪則血鮮為腸風內傷則血濁為臟毒又熱入大腸則大便下血熱入小腸則小便出血然小兒多因胎中受熱或乳母六淫七情厚味積熱或兒自食甘肥積熱六淫外侵而成若因母食厚味者加味清胃散怒動肝火者加味小柴胡湯憂思鬱怒者加味歸脾湯稟父腎燥者六味地黃丸兒有積熱小便出血者實熱用清心蓮子飲虛熱用六味地黃丸大便出血者犀角地黃湯風邪外侵者倉廩散病後元氣下陷者補中益氣湯糞前見血者四君加黃連制吳茱萸糞後見血者四君加吳茱萸制黃連若嬰兒以治母為主余當臨症制宜治驗一小兒七歲食菱芡過多腹脹發熱大便不通小便下血先用消積丸大便即通小便血止又用保和丸及異功散而愈一小兒因乳母飲酒小便出血用八正散去大黃加乾葛山梔漏蘆母子服之並愈一小兒小便見血或咳血衄血此脾肺虛熱食後用聖濟犀角地黃湯食前用六味地黃丸頓愈後因食厚味用清胃散及六味地黃丸而愈一小兒稟父氣不足不時便血用六味地黃丸補中益氣湯而愈後因母飲酒炙煿復致前症母服加味清胃散子服六味地黃丸而愈一小兒便血手足發熱齒齦潰臭朝用六味地黃丸暮用異功散加蕪荑月餘漸愈乃佐以補中益氣湯而愈一小兒稟父腎虛便血作渴足熱形瘦用六味丸尋愈後出痘第四日兩足發熱作渴飲冷以前丸料煎與恣飲三劑後足涼渴止其痘安然而靨一小兒便血面青脅痛小便頻數此肝木侮脾土而不能統攝也用異功散加柴胡炒黑龍膽草二劑肝症頓退仍用異功散而血止一小兒便血發熱作渴飲冷用黃連解毒湯一劑熱服諸症頓愈後因飲食過傷下血甚多發熱倦怠飲食少思先用補中益氣湯元氣復而飲食增又用四君加升麻而愈一小兒便血作渴少食先用七味白朮散渴止食進又用補中益氣湯而瘥後食生冷腹脹便祕用保和丸二便下血或時發搐此脾氣傷而肝火動也用異功散加鉤藤鉤柴胡而搐止又加升麻木香而血止一小兒食生冷果品腹脹作痛大便不利小便尿血用茯苓散加黃連二劑大便通而尿血愈一小兒尿血兩足發熱用六味地黃丸而愈後患痢久不愈復尿血作渴飲冷以前丸料煎服兼用補中益氣湯而痊一小兒尿血面青脅痛小便頻數用五味異功散加柴胡炒黑龍膽草次用地黃丸而愈一小兒久患便血屬脾胃虛熱也諸藥不應用人參二兩炒黑黃連吳茱萸各半兩為末米糊作丸佐以補中益氣湯頓痊一小兒便血面黃腹脹用四味肥兒丸及補中益氣湯加吳茱萸制黃連木香蕪荑三十餘劑而愈至夏間患血痢發熱晡熱手足浮腫仍用前藥而痊一小兒八歲腹脹臍凸大便下血如痢小便色赤似血面目皆黃兩腮色赤此食積所傷而肝侮之也蓋脾病則肺虛不能生腎故有是症當先消導積滯遂用越鞠丸加三稜蓬朮薑湯下四服二便通利又用大安丸二服下血亦止後復傷食發熱腹脹小便下血服保和丸四服而愈一小兒十一歲因勞發熱尿血小便不利先用清心蓮子飲二劑後用補中益氣湯加山梔而痊一小兒便血服寒涼藥過多腹脹小便不利其血益甚余朝用補中益氣湯夕用金匱加減腎氣丸而痊甘露飲治小兒胃中客熱齒齦潰爛時出膿血及目赤腫痛口瘡喉腫或身面皆黃大便不調小便黃澀熟地黃麥門冬去心焙枳殼炒茵陳甘草炙枇杷葉石斛黃芩炒生地黃天門冬去心炒各等分上為末每服二錢水煎服聚金丸治大便下血發熱煩躁腹中熱痛作渴妄言舌澀目昏其脈弦數黃連一兩水侵曬乾一兩炒一兩灰火煨一兩生用黃芩防風各一兩上為末每服二錢水煎服愚按前方若肝脾積熱吐血衄血便血發熱作渴大便祕小便赤者宜用之若熱已退而作渴下血未止或日晡益甚者陰血虛也用四物參術主之若熱既退飲食少思肢體倦怠脾氣虛也用四君子當歸主之若概用前方則誤多矣濟生犀角地黃湯治傷寒溫病失於表汗致內有瘀血吐血面色黃大便黑及瘡痘出多以此解之犀角牡丹皮各一兩生地黃八錢赤芍藥七錢上每服二錢水煎服千金地黃丸治小腸積熱臟毒去血黃連四兩生地黃半斤搗取汁連滓拌勻曬乾上為末煉蜜丸桐子大每服一二十丸食後麥門冬湯下量兒加減制黃連吳茱萸法上以黃連吳茱萸各等分熟水拌濕入瓷器內燉湯中良久俟氣味相和取出曬乾炒黃各揀出聽用清心蓮子飲方見白濁小柴胡湯方見痙症加味歸脾湯越鞠丸四君子湯清胃散異功散五方見內釣補中益氣湯保和丸大安丸三方見虛羸即保和丸加白朮加減腎氣丸方見腹脹八正散方見小便不通六味丸方見腎臟茯苓散方見尿白下積丸白朮散二方見積痛四味肥兒丸方見寒吐大便不通嬰童百問云小兒大便不通乃胃與大腸有熱以致祕結不通用清涼飲之類若飲食夾驚及積滯而不通者用大連翹飲之類驚風積熱而不通者用掩臍法此皆治實熱之例也余嘗治之因乳母或兒膏粱積熱及六淫七情鬱火傳兒為患者用清邪解鬱之劑稟賦怯弱早近色欲大便難而小便牽痛者用滋補肺腎之劑褚氏遺書云男子精未滿而御女以通其精則四體有不滿之處異日有難狀之疾老人陰已痿而思色以降其精則精不出而內敗精已耗而復竭之則大小便牽痛如淋今童子即有此患益見今人所稟與古人大徑庭矣人之血氣厚薄既殊而醫之用藥療法又豈可泥執古方而無加減之變乎治驗一小兒食膏粱之味大便不通飲冷發熱用清涼飲加大黃而通後飲食停滯腹痛大便不通用保和丸而痛止再煎檳榔湯送保和丸一服而便通一小兒食粽停滯大便不通痛不可忍手足發搐用大柴胡湯調酒麴末一錢下滯穢甚多作嘔不食用五味異功散加柴胡升麻而愈一小兒大便不通審乳母飲食厚味所致用清胃飲以治母熱兒間飲以一二匙而愈後乳母感寒腹痛食薑酒之物兒大便祕結兼便血仍用清胃散每日數匙而愈一小兒因乳母暴怒大便不通兒亦患之兼用加味小柴胡湯兒先用保和丸二服後用五味異功散加升麻柴胡兒日飲數匙並愈大柴胡湯方見痙症神芎丸方見驚風六味丸方見腎臟清胃散方見內釣小便不通東垣云小便不利有在氣在血之異夫小便者足太陽膀胱之所生長生於申申者金也金能生水肺中伏熱水不能生是絶小便之源也治法用清燥金之正化氣薄之藥茯苓豬苓澤瀉琥珀燈心通草車前瞿麥扁豆之類皆為淡滲能泄肺中之熱而滋水之化源也若不渴熱在下焦是熱澀其流而溺不泄也須用氣味俱厚陰中之陰藥治之二者之病一居上焦在氣分而必渴一居下焦在血分而不渴血中有濕故不渴也二者之殊至易分別耳竊謂前症若津液偏滲於腸胃大便瀉利而小便澀少者宜分利若熱蘊於下焦津液燥而小便不行者宜滲泄若脾胃氣澀不能通調水道者宜順氣若乳母肝心二經有熱者用梔子清肝散肝經怒火者用柴胡梔子散若因父母曾服燥劑而致者用四物麥門甘草數而黃者用四物加山茱萸黃柏知母五味麥門肺虛而短少者用補中益氣加山藥麥門陰挺痿痹而頻數者用地黃丸熱結膀胱而不利者用五淋散脾肺燥不能化生者用黃芩清肺飲膀胱陰虛陽無以生而淋瀝者用滋腎丸若膀胱陽虛陰無以化而淋瀝者用六味丸若因乳母厚味酒面積熱者用清胃散五淋散仍參諸淋覽之治驗一小兒十四歲肢體倦怠發熱晡熱口乾作渴吐痰如湧小便淋瀝或面目赤色身不欲衣此稟賦腎虛陰燥也用補中益氣湯加減八味丸而愈一小兒五歲小便不利用五苓散分利淡泄之藥益加不通小便陰囊漸腫先兄謂前藥復損真陰也用六味丸料加牛膝肉桂車前子佐以補中益氣湯而痊一小兒八歲先小便澀滯服五苓散益甚加木通車前之類腹脹吐痰加枳殼海金砂而胸滿陰腫遍身發浮余用六味丸煎送滋腎丸而痊此皆稟父氣所致其作濕熱痰氣治之而歿者多矣一小兒八歲先因小便黃赤服五苓導赤等散後患便血余以為稟父虛熱也用六味丸及補中益氣湯而痊木通散治小便不通少腹作痛木通滑石各一兩牽牛半兩炒上為末燈心蔥白水煎空心服八正散治蘊熱咽乾口燥大渴引飲心忪面熱煩躁不寧目赤睛疼或咽舌生瘡小便赤閉及熱淋血淋車前子瞿麥炒大黃麵裹煨山梔滑石萹蓄木通甘草炙各一兩上為末每服二三錢入燈心水煎食前服梔子仁散治小便不通臍腹脹悶心神煩熱梔子仁五枚茅根冬葵子各半兩甘草炙二錢上為末每服一錢水煎空心服梔子清肝散柴胡梔子散二方見發熱即柴胡清肝散補中益氣湯方見虛羸黃芩清肺飲方見百晬內嗽加減滋腎丸方見腹脹清胃散方見內釣四物湯方見急驚五苓散方見五淋六味地黃丸方見腎臟諸淋夫小兒諸淋者腎與膀胱熱也二經相為表裡俱主水道水入小腸下行於胞則為溺若膀胱熱則津液內涸水道不通腎氣熱則小便淋瀝或少腹引臍而痛夫淋有五石淋者腎熱化石內塞水道痛引膀胱氣淋者肺氣壅熱小腹脹滿小便澀滯熱淋者三焦有熱傳入腎膀胱流入於胞小便赤澀血淋者心熱血散失其常經溢滲入胞寒淋者膀胱氣冷與正氣交爭寒戰氣解是也亦有因妊母肝熱及乳母恚怒者當分五臟蓄熱治之若心臟有熱者導赤散加黃連肝臟有熱者柴胡梔子散大便不通瀉青丸脾臟有熱者瀉黃散脾氣不足異功散脾氣下陷補中益氣湯肺臟有熱者瀉白散肺氣虛熱異功散加炒黑山梔腎臟有熱者地黃丸或因乳母肝經熱者用梔子清肝散恚怒者用柴胡清肝散乳母厚味者用加味清胃散心小腸熱者用清心蓮子飲或兒早近色欲小便澀滯或作痛及更去後大小便牽痛者皆屬肝腎不足也用六味地黃丸補中益氣湯加牛膝車前肉桂未應當參五臟所勝不可輕用滲泄寒涼之藥大損胃氣仍參前小便不通症覽之治驗一小兒小便不通服五苓之類不應頦間及左腮色赤乃肝腎虛熱也用四物山梔及地黃丸而愈後因感冒誤汗小便仍不利余用補中益氣湯加麥門五味而安一小兒小便不利莖中澀痛時或尿血此稟父胃熱為患也先用五淋散以疏導又用滋腎丸地黃丸補肝腎漸愈後出痘色紫小便短赤頦間右腮或赤或白用補中益氣湯六味地黃丸前症並愈一小兒小便不利衄血鼻色赤屬脾肺有熱也用濟生犀角地黃湯而愈後頦間常赤作渴有痰此稟賦腎氣不足用地黃丸而諸症瘥一小兒十五歲所賦虛怯且近女色小便滴瀝誤服五苓散之類大小便牽痛幾至不起用六味丸而愈金砂散治小便淋瀝不通鬱金海金砂滑石甘草各等分上為末每服一錢煎地膚子湯調下燈心木通亦可又方冬瓜最治實熱小便不通內熱口渴立效散治小兒諸淋不通莖中作痛木通甘草王不留行胡荽滑石海金砂山梔子檳榔各等分上每服一錢水煎五淋散治膀胱有熱水道不通或小腹腫脹赤茯苓赤芍藥各五分山梔炒當歸各三分甘草二分上用燈心十根水煎木通散方見小便不通導赤散方見心臟瀉青丸方見肝臟瀉黃散方見脾臟四物湯方見急驚清胃散異功散二方見內釣補中益氣湯方見虛羸瀉白散方見肺臟地黃丸方見腎臟柴胡清肝散梔子清肝散二方見發熱即柴胡梔子散滋腎丸方見腹脹清心蓮子飲茯苓散二方見白濁五淋散方見五淋聖濟犀角地黃湯方見尿血便血遺尿巢氏云腎主水與足太陽相為表裡經曰膀胱者州都之官津液藏焉臥則陽氣內收腎與膀胱之氣虛寒不能約制故睡中遺出內經謂膀胱不約為遺是也用破故紙散益智散雞腸散之類主之亦有熱客於腎干於足厥陰之經廷孔鬱結而氣血不能宣通則痿痹而無所用故液滲入膀胱而漩溺遺失者用六味地黃丸虛熱亦用前丸脾肺氣虛者用補中益氣湯加補骨脂山茱萸治驗一小兒眼胞微腫咳嗽噁心小便泔白余謂脾疳食積也用五味異功散佐以四味肥兒丸而愈後不節飲食視物不明余曰目為五臟之精脾胃復傷須補養為主不信乃復峻厲之劑變慢脾風竟為不起一小兒三歲素遺尿余視其兩頦微赤此稟父腎與膀胱二經陰虛也與六味丸服之赤色漸退而遺尿亦愈一小兒四歲飲食少思便泄腹痛素遺尿額頦青黑雖盛暑而惡風寒余謂經云熱之不熱是無火也用八味丸治之諸症悉愈破故紙散治膀胱虛冷夜間遺尿或小便不禁破故紙為末每服一錢熱湯調下湯氏雞腸散治小便不禁睡中遺出雞腸草一兩牡蠣粉三錢龍骨煅麥門冬去心白茯苓桑螵蛸炙各半兩上為散每服一錢棗水煎又方五倍子炒焦為末每服半錢白湯調下或糊丸米湯送下益智散方見潮熱即益智丸異功散方見內釣補中益氣湯方見虛羸四味肥兒散方見寒吐六味地黃丸加減八味丸二方見腎臟即六味丸加五味子肉桂白濁仁齋曰小兒尿白久則成疳此因心膈伏熱或乳哺失節傷脾使清濁不分故也全嬰方云小便初溺微赤良久白濁者乃熱疳之症也初溺黃白良久白濁者冷疳之症也冷者益黃散熱者牛黃丸冷熱相兼者蘆薈丸純下白濁者君朴丸諸失津液欲成疳而小便白者茯苓散小便如泔或良久變白亦有脾虛食積濕熱下注者先用茯苓散五七服次用四味肥兒丸若乳食少思或腹肚脹大小便頻數此脾虛元氣下陷也朝用五味異功散夕用四味肥兒丸若肥體色黃小便不調發黃脫落鼻下瘡痍嗜土少食大便青褐者用梔子茯苓湯仍審其乳母飲食七情治之治驗一小兒發熱懶食小便良久變白余用四味肥兒丸即愈或誤以為積熱用清涼祛逐之劑形體頓弱虛症悉至小便如疳用補中益氣湯及四味肥兒丸而愈一小兒面色痿黃眼胞微腫作渴腹脹飲食少思小便澄白大便不實此脾疳之症也用四君子加山梔蕪荑兼用四味肥兒丸而愈一女子小便或青或白後前陰作癢出水此肝經濕熱先用龍膽瀉肝湯一劑又以加味逍遙散加龍膽草而愈一小兒兩耳後腦下各結一核小便白濁面色痿黃體倦口乾大便不調用蘆薈丸而愈後鼻外生瘡作癢小便仍白視物不明用四味肥兒丸而愈一小兒白濁兩耳內耳外生瘡膿水淋漓先用大蘆薈丸而愈後遍身如疥肌體消瘦發熱作渴大便酸臭小便白濁用九味蘆薈丸五味異功散而愈一小兒白濁形氣甚虛發熱作渴余謂肝腎虛羸也用大蘆薈丸地黃丸而愈畢姻後小便仍白唾痰發熱形氣益虛用大劑益氣湯六味丸各五十餘劑而愈一小兒白濁發熱口乾體瘦骨立余謂腎經虛羸朝用補中益氣湯夕用六味地黃丸而愈後兩目或生白翳面黃浮腫小便仍白此變肝脾疳症用四味肥兒丸月餘漸瘥君朴丸治小兒小便白濁久則黃瘦不長肌肉使君子煨厚朴制黃連各一兩木香三錢上為末蒸餅糊丸桐子大每服一二十丸米湯下茯苓散治乳食傷脾或心經伏熱小便白濁三稜煨蓬朮煨砂仁赤茯苓各半兩青皮陳皮滑石甘草各一錢五分上為末每服一錢燈心湯調下三稜散治小兒尿白久則成疳宜補脾消食化積三稜蓬朮各一兩炒益智仁甘草神麯炒麥芽橘皮各半兩上為末每服一錢白湯送下分清飲治小便餘瀝並赤白濁益智仁川萆薢石菖蒲鹽炒烏藥茯苓白芍藥各三分上入燈心水煎清心蓮子飲治發熱口乾小便白濁夜則安靜晝則發熱黃芩麥門冬地骨皮車前子甘草各三錢半石蓮肉茯苓黃耆柴胡人參各二錢五分上每服二錢水煎服梔子茯苓湯即大蕪荑湯方見諸疳症大安丸即保和丸加白朮補中益氣湯二方見虛羸龍膽瀉肝湯方見疝氣加味逍遙散異功散四君子湯三方見內釣益黃散方見脾臟牛黃丸方見驚癇蘆薈丸方見疳症疳症錢仲陽云小兒諸疳皆因病後脾胃虧損或用藥過傷不能傳化乳食內亡津液虛火妄動或乳母六淫七情飲食起居失宜致兒為患五臟之疳不同當各分辨肝疳者一名風疳其症白膜遮睛或瀉血羸瘦心疳者其症面黃頰赤身體壯熱脾疳者一名肥疳其症肢體黃瘦皮膚乾澀多生瘡疥腹大食土肺疳者一名氣疳其症喘嗽不已口鼻生瘡腎疳者一名骨疳其症肢體削瘦遍身瘡疥喜臥濕地楊氏云又有疳傷者五臟蟲疳也其名甚多姑舉其要蟲疳者其蟲如絲出於頭項腹背之間黃白赤者可治青黑者難療蛔疳者皺眉多啼嘔吐青沫腹中作痛肚腹青筋唇口紫黑頭搖齒癢脊疳者身熱羸黃煩渴下利拍背有聲脊骨如鋸齒十指皆瘡頻齧爪甲腦疳者頭皮光急滿頭並瘡腦熱如火髮結如穗遍身多汗腮腫囟高疳渴者日則煩渴飲水不食夜則渴止疳瀉者毛焦唇含額上青紋肚脹腸鳴瀉下糟粕疳痢者停積宿滯水穀不聚瀉下惡物疳腫者虛中有積肚腹緊脹脾復受濕則頭面手足虛浮疳勞者潮熱往來五心煩熱盜汗骨蒸嗽喘枯悴渴瀉飲水肚硬如石面色如銀無辜疳者腦後頸邊有核如彈丸按之轉動軟而不疼其內有蟲不速針出則內食臟腑肢體癰疽便利膿血壯熱羸瘦頭露骨高相傳兒衣夜露為鴟鳥羽所汙亦致此症若手足極細項小骨高尻削體痿腹大臍突號哭胸陷名丁奚若虛熱往來頭骨分開翻食吐蟲煩渴嘔穢名哺露若牙齒蝕爛名走馬疳蓋齒屬腎腎虛受熱疳火上炎致口臭齒黑甚則齦爛牙宣大抵其症雖多要不出於五臟治法肝疳用地黃丸以生腎心疳用安神丸以治心異功散以補脾脾疳用四味肥兒丸以治疳五味異功散以生土肺疳用清肺飲以治肺益氣湯以生金腦疳亦用地黃丸無辜疳用大蕪荑湯蟾蜍丸丁奚哺露用肥兒丸大蘆薈丸走馬疳敷雄黃散服蟾蜍丸若作渴瀉痢腫脹勞瘵等類當詳參方論而治之蓋疳者干也因脾胃津液乾涸而患在小兒為五疳在大人為五勞總以調補胃氣為主治驗更參肛門作癢陳職方孫三歲面頰患瘡沿蝕兩目肚大青筋小便澄白此肝疳之症也用大蕪荑湯二劑而愈陳司廳子遍身生瘡面色痿黃腹脹內熱大便不調飲食少思倦怠口乾為肝脾疳症用大蘆薈丸不月而痊陳工部長孫腹內一塊小便不調或用行氣破血等藥發熱口乾體瘦懶食面黃兼青幾成瘵症以補中益氣湯煎送大蘆薈丸四服又用前湯加車前子煎送六味丸四服又用清肝生血之藥而痊一女子十二歲目生白翳面黃浮腫口乾作瀉用四味肥兒丸而痊一小兒頭搖目札口渴下血此肝經血虛風熱也用地黃丸而痊若肝經濕熱兼用瀉青丸蓋虛則補其母實則瀉其子也一小兒十一歲兩耳後腦下各結一核色不變不痛而面色痿黃體倦口乾去後不調用蘆薈丸治之諸症頓愈一小兒鼻外生瘡不時揉擦延及兩耳又一小兒視物不明鼻內或癢或生瘡用四味肥兒丸並愈一小兒水入耳內耳外生瘡膿水淋漓經歲不愈余謂肝火上炎用大蘆薈丸而愈一小兒遍身如疥或癢或痛肌體消瘦日夜發熱口乾作渴大便不調年餘不愈用九味蘆薈丸而愈一小兒數歲腦後並結二核肉色如故亦不覺痛用大蘆薈丸以清肝脾佐以地黃丸補腎水形體健而核自消一小兒腹內結塊小便不調此肝經內疳也用龍膽瀉肝湯及大味蘆薈丸而痊一小兒自生後兩目赤腫或作癢或生翳此胎稟肝火用蘆薈丸六味地黃丸而痊一小兒患瘰癧小便頻數兩目連札作嘔少食泄瀉後重用補中益氣湯六味地黃丸漸愈佐以蘆薈丸而痊一小兒食泥土困睡泄瀉遍身如疥此脾經內外疳也用六君子湯肥兒丸而愈一小兒面黃頰赤發熱作渴睡中驚悸此心經內外疳也用祕旨安神丸而痊一小兒患前症兼掌心發熱遍身如疥用安神肥兒二丸而愈一小兒咳嗽寒熱咽喉不利鼻上有瘡久而不結痂此肺經疳症也用地黃清肺飲而痊一小兒下疳潰痛爪黑麵黧遍身生疥此肝經內外疳也用地黃蘆薈二丸而愈史少參幼子二歲項後結核不時仰叫或以為熱瘡內潰用針決之服消毒之藥後曲腰啼哭余謂此名無辜疳仰身而哭外瘹症也腰哭而啼內瘹症也元氣敗矣果歿一小兒四肢消瘦肚腹漸大寒熱嗜臥作渴引飲此肝脾疳也名丁奚哺露用白朮散為主佐以十全丹月餘諸症漸愈乃以異功散加當歸及六味丸而痊一小兒患疳虛症悉具熱如火炙病狀不能盡述朝用異功散夕用四味肥兒丸月餘諸症稍愈佐以九味地黃丸自能行立遂朝以六味地黃丸夕以異功散及蚵蟆丸而痊一小兒四肢消瘦肚腹脹大行步不能作渴發熱去後臭穢以十全丹數服諸症漸愈又用異功散肥兒丸調理漸愈大蘆薈丸治疳殺蟲和胃止瀉胡黃連黃連白蕪荑去扇蘆薈木香青皮白雷丸破開赤者不用鶴蝨微炒各半兩麝香二錢另研上為末粟米飯丸緑豆大每服一二十丸米飲下愚按前方肝脾疳積食積發熱目生雲翳或疳熱頸項結核或耳內生瘡肌體消瘦發熱作渴飲食少思肚腹膨脹或牙齦蝕落項腮腐爛陰囊玉莖生瘡或胸脅小腹作痛並效內青皮以龍膽草代之麝香不用尤效六味肥兒丸消疳化蟲退熱黃連陳皮川楝子去核炒神麯炒麥糵炒各一兩白蕪荑半兩上為末糊丸麻子大每服一二十丸空心米飲吞下愚按前方又治脾疳飲食少思肌肉消瘦肚大頸細發稀成穗項間結核發熱作渴精神倦怠大便酸臭嗜食泥土或口鼻頭瘡肚見青筋齧齒下痢便白五疳用此丸加乾蟾一兩蕪荑五錢尤妙蚵蟆丸治無辜疳症一服虛熱退二服煩渴止三服瀉痢住蟾蜍一枚夏月溝渠中腹大不跳不鳴身多癩𤸔者上取糞蛆一杓置桶中以尿浸之桶上要干不令蟲走出卻將蟾蜍撲死投蛆中食一晝夜以布袋盛置浸急水中一宿取出瓦上焙為末入麝一字粳米飯揉丸麻子大每服二十丸米飲下愚按前方又治無辜疳症面黃壯熱不食舌下有蟲或腦後有核軟而不痛中有粉蟲隨氣流散侵蝕臟腑便滑膿血日漸黃瘦頭大發豎手足細軟變生天瘹猢猻鵝口木舌懸癰重齶著噤臍風撮口重舌龜背龜胸一十二種敗症急用蟾蜍丸大蕪荑湯治之多有生者生熟地黃湯治疳眼閉合不開生地黃熟地黃各半兩川芎赤茯苓枳殼制杏仁去皮川黃連半夏曲天麻地骨皮甘草炙各二錢五分上每服二錢黑豆十五粒薑水煎服嚏疳散治疳蘆薈黃連各一錢瓜蒂豬牙皂角蝦蟆灰各五分麝香少許上為末吹入鼻嚏則可療脂連丸治五疳潮熱腹脹發焦胡黃連半兩五靈脂一兩上為末獖豬膽汁丸麻子大米飲下茯苓丸治心疳驚疳茯神蘆薈琥珀川黃連淨赤茯苓各三錢鉤藤皮遠志肉蝦蟆灰各三錢石菖蒲一錢麝香少許上為末粟米丸麻子大薄荷湯下神效換肌丸治脾疳肌瘦潮熱盜汗泄瀉糟粕頭大腹急川黃連炒鱉甲酒炙肉豆蔻煨使君子麵裹煨神麯炒麥芽炒各半兩訶子肉一錢半麝香五分上為末糊丸芥子大米湯下天麻丸治肝疳風疳疳眼青黛川黃連天麻五靈脂夜明砂微炒川芎蘆薈各二錢龍膽草防風蟬蛻去足各一錢半全蠍二枚焙麝香少許乾蟾頭炙焦三錢上為末豬膽汁浸糕丸麻子大每服十丸薄荷湯下化𧈟丸治諸疳生蟲不時啼哭嘔吐清水肚腹脹痛唇口紫黑腸頭濕𧈟蕪荑蘆薈青黛干川芎白芷稍胡黃連川黃連蝦蟆灰各等分上為末豬膽汁浸糕糊丸麻子大每服一二十丸食後臨臥杏仁煎湯下其鼻常用熊膽煎湯筆蘸洗俟前藥各進數服卻用青黛當歸赤小豆瓜蒂地榆黃連蘆薈雄黃為末入鼻瘡斂靈脂丸治脾疳食疳白豆蔻麥芽炒五靈脂宿砂蓬朮煨青皮橘紅使君子焙各二錢蝦蟆炙焦三錢上為末米糊丸麻子大每服十丸米湯下下蟲丸治疳蛔諸蟲新白苦楝根皮酒浸焙緑包貫衆木香桃仁浸去皮焙蕪荑焙雞心檳榔各二錢鶴蝨炒一錢輕粉五分干蝦蟆炙焦三錢使君子五十取肉煨上為末麵糊丸麻子大每服一二十丸天明清肉汁下內加當歸川連各二錢五分龍膽丸治腦疳腦熱瘡龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油發灰各二錢青黛干黃連淨各三錢上為末狁豬膽汁浸糕糊丸麻子大薄荷湯下仍以蘆薈末入鼻黃連丸治疳勞黃連半兩淨狁膽汁浸曬石蓮栝蔞根杏仁浸去皮焙烏梅肉各二錢上為末牛膽汁浸糕糊丸麻子大煎烏梅薑蜜湯下香蔻丸治疳瀉黃連三錢炒肉豆蔻木香訶子肉煨砂仁茯苓各二錢上為末飯丸麻子大米飲下木香丸治疳痢黃連淨三錢木香紫厚朴制夜明砂隔紙炒各二錢訶子肉炒一錢上為末飯丸麻子大干艾生薑煎湯食前下十全丹治丁奚哺露青皮陳皮各去白川芎五靈脂白豆蔻仁雞心檳榔蘆薈各五錢木香使君子焙蝦蟆灰各三分上為末豬膽汁浸糕糊丸麻子大每服一二十丸米飲下有熱薄荷湯下湯氏十全丹治前症檳榔枳殼湯浸去穰麩炒青皮陳皮去白丁香木香炮各二錢五分香附子炒一兩上為末神麯糊丸黍米大每服三十丸空心食前米飲下愚按前症因乳哺不調傷損脾胃不思飲食氣血日損四肢日瘦肚腹漸大是名丁奚呼吸少氣汲汲苦熱謂之哺露屬形病俱虛雖用前藥宜佐以異功散壯脾胃以行藥勢鱉血煎治疳勞蕪荑柴胡川芎各二兩人參半兩使君子二十一個胡黃連宣黃連上用鱉血一盞吳茱萸一兩和二黃連淹一宿次早炒乾去茱萸並血用二連入余藥末粟米糊丸麻子大食前熱水下地黃清肺飲治肺熱疳飲穿孔或生瘜肉或鼻外生瘡桑白皮炒半兩紫蘇前胡赤茯苓防風黃芩當歸天門冬去心連翹桔梗生地黃甘草炙各二錢上每服二錢水煎服次用化𧈟丸九味地黃丸治腎疳熟地黃四錢五分赤茯苓山茱萸肉川楝子當歸川芎牡丹皮山藥使君子肉二錢上為末蜜丸桐子大每服八十丸空心溫酒下東垣大蕪荑湯一名梔子茯苓湯治黃疳土色為濕為熱當利小便今反利知黃色中為燥胃經熱也發黃脫落知膀胱腎俱受土邪乃大濕熱之症鼻下斷作瘡上逆行營氣伏火也能乳胃中有熱也寒則食不入喜食土胃不足也面黑色為寒為痹大便清寒也褐色熱蓄血中間黃色腸胃有熱治當滋榮潤燥外致津液山梔仁三分黃柏甘草炙各二分大蕪荑五分黃連麻黃根一分薑活二分柴胡三分防風一分白朮茯苓各五分當歸四分上水煎服硃砂安神丸治心疳怔忡心中痞悶硃砂四錢黃連生地黃各半兩生甘草二錢半蘭香葉二錢燒灰銅青輕粉各五分上為末干敷上白粉散治疳瘡海螵蛸三分白芨二分輕粉一分上為末先用漿水洗拭干敷六君子湯異功散二方見內釣六味丸方見腎臟四味肥兒丸方見寒吐瀉青丸方見肝臟龍膽瀉肝湯方見疝氣補中益氣湯方見虛羸白朮散方見積滯二便色白祕旨云小兒便如米泔或溺停少頃變作泔濁者此脾胃濕熱也若大便泔白色或如魚凍或帶紅黃黑者此濕熱積滯也宜理脾清滯去濕熱節飲食若忽然變青此是變蒸也不必用藥若久而不愈用補脾制肝若心膈伏熱則成疳矣大抵多因乳哺失節脾氣有傷元氣下陷或乳母飲食七情所致小便如疳或大便泔白者用四味肥兒丸積滯黃黑者用四君子湯加黃連木香色青日久不復或兼泄瀉或腹痛者用六君子湯加木香芍藥若小便小利大便褐色發黃脫落鼻下瘡痍用梔子茯苓湯乳食少思胸腹膨脹大便頻數用四味肥兒丸仍審乳母飲食七情主之治驗一小兒每食停滯大便色白而頻先用大安丸異功散少加炒黑黃連一二服後小水澄久如泔發熱體倦用四味肥兒丸而愈一小兒患前症停食發熱先用大安丸而愈後患腹脹午時發熱用五味異功散而瘥一小兒患前症兼自痢用異功散加升麻柴胡而愈但日晡微熱倦怠用補中益氣湯四味肥兒丸而愈一小兒患前症服驅逐之劑手足並冷作渴少食此脾氣復傷也用六君升麻柴胡而瀉止又四味肥兒丸而愈四君子湯六君子湯加味逍遙散五味異功散四方見內釣龍膽瀉肝湯方見疝氣補中益氣湯大安丸保和丸加白朮二方見虛羸四味肥兒丸方見寒吐梔子茯苓湯即大蕪荑湯方見疳症
