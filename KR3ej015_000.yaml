front:
  text: 序餘一日過薛立齊先生見先生蓬頭執卷紬繹尋思恍然如經生下帷之狀先生以余至乃入戶理衣冠余締觀几案中皆殘編斷簡皮殼脫落及取一卷閲之其點竄注釋較之經生下帷者倍之矣余曰先生苦心哉先生曰醫之道不明世之患夭扎者將何所控訴為也而嬰兒為甚夫嬰兒不能言也傳曰如保赤子心誠求之雖不中不遠矣夫中其欲非難也尤須心誠求之而況於疾痛癢疴變幻百出者邪今之醫者率執數方以求試及其不效則曰命也夫按方以求病非因病以處方此與刻舟膠柱者何異焉顧卒委之命悲夫先生又曰真精合而人生焉是人之一身固五行之軀殼也五行之中土能生物是人之身亦借脾土以生茲蓋主本之論云今嬰兒雖未能言然聲音之所悲號形氣之所宣揚意欲之所指向機未嘗不可見也虛之實之扶之抑之古人之成法俱在或晦而難辨或雜而不分宜乎學醫者之望洋矣余曰願先生纂而約之余將刻以傳焉先生唯唯余又曰頻年以來倭夷弗靖丘墟村落之民耕織之所依者十亡二三也先生幸用心校之倘是書的然可傳則今日之所生全者即不必皆俊秀固亦云漢之遺黎桑榆之耕織也先生有餘仁矣書成於丙辰年正月余不佞為之識其篇端立齊先生名己官太醫院院使蓋三吳世家云嘉靖丙辰歲春正月吉日賜進士第中憲大夫知蘇州府事前工科給事中閩林懋舉書
