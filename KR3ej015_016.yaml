body:
  text: 卷十六跌僕外傷傷損之症若色赤腫痛而血出不止者肝心內熱也用柴胡梔子散色白不痛而血出不止者脾肺氣虛也用補中益氣湯漫腫不消者元氣虛弱也用五味異功散黯腫不散者瘀血凝滯也用加味逍遙散肌肉作痛出血多而煩熱者血脫髮躁也用獨參湯因亡血而煩躁不安者營衛俱傷也用八珍湯加柴胡牡丹皮久痛不止者欲作膿也用托裡散以指按腫而復起者膿已成也宜刺泄之膿出而反痛者氣血內虛也用十全大補湯若骨骨界接而復脫者肝腎虛弱也用地黃丸如兼餘症當參各門治之一小兒傷臂出血作痛面色青赤此因驚而肝火動也先用柴胡清肝散血止痛減次用托裡消毒散患處漸潰又用托裡散而愈後因其母多食膏粱之味又惡寒發熱腫痛色赤誤服敗毒之藥口噤流涎手足並冷余謂脾胃復傷而虛寒也先用六君子湯加薑桂數劑而元氣漸復又用五味異功散月餘而瘡口斂愈一小兒傷指出血過多遂至昏憒口噤手撒時搐此氣虛血脫也用獨參湯數劑而安又用五味異功散及托裡散而愈一小兒傷足潰腐肉白不斂此脾胃虧損而血氣不能達於患也先用五味異功散助其胃次用十全大補湯益其營月餘而愈一小兒傷足內潰成膿食少噁心此脾胃氣虛而成痰也用六君子湯飲食頓進膿亦外泄但體倦晡熱朝用補中益氣湯夕用五味異功散及間服八珍湯而垂愈後因飲食失宜發熱患處大潰出膿口噤振顫或瘈瘲流涎余謂胃氣虛肝火內動外用獨參湯四劑仍如前朝服補中益氣湯夕服五味異功散加柴胡升麻元氣漸復佐以托裡散而瘡斂一小兒傷指敷涼藥腫至手背膿出清稀飲食少思此血氣虛弱故也朝用異功散夕用托裡散膿水漸稠患處紅活又用八珍湯而愈一小兒傷臁青腫不消面色痿黃仍欲行氣破血余謂此因脾氣復傷血滯而不行也不信乃服破血之劑飲食不進寒熱如瘧余朝用補中益氣湯夕用八珍湯及蔥尉法而愈一小兒臂傷潰而寒熱用八珍湯漸愈後因飲食所傷吐瀉不止搖頭咬牙此脾氣虛而肝邪內侮也用六君升麻柴胡而安又用十全大補湯六君子湯而愈一小兒閃足腫痛而肉色不變此陽氣虛弱傷在骨也頻用蔥尉法五更用和血定痛丸日間用八珍湯數日後佐以六味地黃丸三月餘而瘥一小兒臂骨出𫋂接入腫痛發熱用蔥尉法及異功散加柴胡續斷骨碎補四劑又用補中益氣湯而痊一小兒閃足骨痛肉色如故頻用炒蔥尉之五更用和血定痛丸日間用四君芎歸數劑後用地黃丸三月餘而瘥蓋腎主骨故用地黃丸以補腎也一小兒折臂出血過多發躁作渴面目色赤脈洪大而數按之無力此血脫髮躁也服當歸補血湯而安遂令正體科續接服接骨丹翌日睡而驚動此血尚虛也蓋血生於氣乃用五味異功散加柴胡升麻當歸而安後手足微搐眉唇微動此血虛而肝火內動也用四君芎歸鉤藤鉤柴胡漸愈卻用托裡散八珍湯而痊愈血脫髮躁若用四物之類復傷脾氣多致不救誤設白虎湯其危尤速一小兒跌傷臂骨出𫋂翌日接入腫痛發熱不食用蔥尉法其痛即止又用六君黃耆柴胡桔梗續斷骨碎補而食進腫消又用補中益氣湯加麥門五味數劑熱退而愈一小兒十五歲傷腿內潰針出穢膿虛症悉具用大補之劑漸愈後因勞動手撒眼閉汗出如雨急炒熱艾頻尉臍腹及氣海穴更用人參四兩炮附子五錢作一劑水煎徐徐灌服良久臂能少動再劑眼開而能言惟氣不接續乃用參耆歸術四味共八兩附子三錢水煎連進二服氣少復乃減附子又三劑元氣漸復後用獨參湯多服而痊一女子閃右臂寅卯時發熱作痛余決其膽經血虛而火盛先以四物合小柴胡湯四劑而熱退更以四物湯加香附陳皮白朮茯苓各一劑山梔五分芩連甘草各三分二十餘劑腫消而愈一小兒閃臂腫痛發熱惡寒飲食少思余謂脾胃氣虛而壅腫也朝用補中益氣湯夕用五味異功散間服八珍湯三月形氣漸充而愈一小兒因跌傷脛漫腫作痛肉色如故服破血流氣之藥反增腹痛以手按之則痛少止余謂此因脾胃虛弱誤服破血流氣之劑而然非瘀血也未幾患處腫消色黯飲食不入腹痛尤甚手足厥冷余用人參一兩附子一錢數劑脾胃漸復飲食漸進患處腫痛肉色變赤蓋始因元氣不足不能運及故腫消而色黯服藥之後元氣漸充故脛腫而色赤也次用大補湯托裡散三月餘而愈一小兒閃臂腫痛面目夭白恪服流氣飲之類益加腫痛余曰此形病俱虛之症也前藥所當深戒者彼謂腫痛為氣滯血凝非流氣飲不能疏導經絡非破血藥不能消散壅逆余言聱牙而前症益甚發熱煩躁始請治余余曰元氣虛憊七惡蜂生雖盧扁亦不能起矣遂歿一小兒傷臂腫痛內服外敷皆寒涼止痛之藥半載後潰而腫痛余謂此非托裡溫中不能生也不悟確守前藥以致血氣瀝盡而亡一小兒跌腿青腫所服皆行氣破血之藥後骨骨界內潰青腫益深朝寒暮熱余戒之曰此氣血俱虛甚矣須調補脾胃不可不信一小兒閃腰作痛服流氣等藥外腫不赤余曰此兒雖經閃腰然亦稟賦腎氣不足而使之者延久益虛恐後不治彼以迂緩視之後果不起消腫定痛散治跌撲腫痛無名異炒木耳炒大黃炒各五分上為末蜜水調塗腫處內有瘀血者砭去敷之患處潰者用當歸膏敷之尤效經驗方治跌撲瘀血不散腫痛不止或筋骨傷損疼痛黃柏一兩半夏五錢上各另為末用薑汁調塗患處以紙貼之如干再用薑汁潤之日易新藥神效太乙膏治一切瘡疽潰爛玄參白芷當歸肉桂赤芍藥大黃生地黃各一兩上㕮咀用麻油四十兩入銅鍋內煎至藥黑濾去粗徐入淨黃丹一斤再煎滴水中捻軟得中即成膏矣回陽玉龍膏又名抑陰散治跌撲損傷因敷涼藥或人元氣虛寒腫堅不散潰腐不斂及癰腫肉色不變或腫而不潰潰而不斂筋攣骨痛一切冷症方見敷寒涼之藥乳香定痛散治杖瘡金瘡一切瘡瘍潰爛疼痛方見作痛不止豬蹄湯治一切癰疽杖瘡潰爛消腫毒去惡肉潤瘡口白芷黃芩當歸羌活赤芍藥露蜂房孔多者佳生甘草各五錢上用豬蹄一隻水四五碗煮熟去油粗取清湯入前藥煎數沸溫洗隨用膏藥貼之跌僕內傷傷損之症若腹中作痛按之痛甚者瘀血在內也用加味承氣湯下之下後按之仍痛者瘀血未盡也用加味四物湯調之按之不痛者血氣傷也用四物加參耆白朮下後發熱胸脅作痛者肝血傷也用四君加川芎當歸下後惡寒者陽氣虛也用四君加炮乾薑下後發熱者陰血傷也用四物加參朮牡丹皮下後寒熱間作者氣血俱傷也用八珍湯加柴胡欲嘔作嘔者胃氣傷也用六君加當歸半夏有因乘怒跳躍而胸腹悶痛喜手按摸者肝火傷脾也用四君加柴胡山梔畏手按摸者肝血內滯也用四物加桃仁紅花胸脅作痛飲食少思者肝脾氣傷也用四君加柴胡丹皮若胸腹脹滿飲食不思者脾肝氣滯也用六君加柴胡枳殼咬牙發搐者肝盛脾虛也用異功散加川芎山梔鉤藤鉤天麻若用風藥則陰血益傷肝火益盛或飲糖酒則腎水益虛肝火愈熾若用大黃等藥內傷陰絡反致下血壯實者或成痼疾虛弱者多致不起凡傷損之症有瘀血停滯於內者雖裸體亦以手護腹脅蓋畏物觸之而痛也世俗概以內傷陰虛腹痛不辨虛實專用破血之劑以速其危其得不死者亦幸矣一小兒跌撲腹痛作嘔噁心氣口脈大此飲食停滯也用保和丸二服吐出酸食惡寒發熱倦怠不食此脾胃傷也先用六君子湯次用補中益氣湯間服而愈一小兒墜樓良久方蘇呻吟不絶自以手護其腹此內傷瘀血停滯也用當歸導滯散二錢熟酒調下而呻吟頓止次用四物加柴胡牡丹皮而安一小兒跌僕瘀血腹痛用導滯散下之瘀血甚多隨作煩躁面赤作渴欲飲此血脫也用獨參湯而安又用四君當歸黃耆及五味異功散而愈一小兒因怒跳躍脅胸作痛或以為內傷瘀血服大黃之藥純下鮮血其痛益甚按之則痛止此肝脾氣血俱傷也用四君加芎歸四劑而痛止又以異功散加升麻柴胡而飲食進元氣漸復病亦隨愈一女子因怒捶胸腹痛經行如崩作嘔不食面色青赤兩關脈大而虛此肝經火動脾經血傷也用加味逍遙散二劑血止次用異功散加柴胡升麻而愈後因復怒腹痛作瀉面青此肝木乘脾也用六君柴胡升麻而痊一小兒因跌傷臂出血腹痛惡食嘔吐發搐咬牙此因驚駭停食肝火內動而侮於脾也先用保和丸二服嘔吐腹痛悉止又用異功散加柴胡山梔發搐咬牙亦愈卻用托裡散患處潰而悉痊一小兒跌僕發搐吞酸腹痛惡心寸口脈大余謂此飲食內傷也不信服當歸導滯散連瀉五次目直咬牙手足厥冷此脾胃之氣復傷而木火內動也用五味異功散加乾薑一劑稍緩又二劑乃去乾薑加柴胡再服而痊愈一小兒跌僕因服大黃之藥下血發熱腹痛嘔吐按其腹卻不痛用五味異功散加當歸升麻二劑腹痛頓止又二劑而血止又二劑而熱止又二劑而元氣復沒藥丸治打撲傷損作痛等症筋骨疼痛或氣逆血滯肚腹胸脅脹悶沒藥乳香川芎川椒芍藥當歸紅花桃仁血竭各一兩自然銅四錢火煅醋淬七次上為末用黃蠟四兩熔化入前藥急攪勻丸彈子大每服一丸酒一鍾煎化服復原通氣散治打撲傷損及乳癰便毒初起或氣滯作痛尤效木香茴香炒青皮穿山甲酥炙陳皮白芷甘草漏蘆貝母各等分上為細末每服一二錢溫酒調徐徐服加味芎藭湯治打撲僕墜筋骨疼痛血瘀皮膚不破入胃作嘔或為嘔血芎藭當歸百合水浸半日白芍藥炒荊芥穗各二錢上作二三劑酒水煎服當歸導滯散治跌撲瘀血在內胸腹脹滿或大便不通作喘吐血大黃當歸各等分上為末每服一二錢溫酒調徐徐服黑丸子一名和血定痛丸治跌撲僕墜筋骨疼痛瘀血不散壅腫作痛或風寒所傷肢體疼痛若流注鶴膝風初起服之自消如潰而膿清發熱者與補氣血之藥自斂方見流注舌斷唇傷凡舌斷者須乘熱接上急用雞子輕擊周圍去硬殼取膜套舌上以洪寶丹敷膜上自然接續若良久舌已冷不必用接但以洪寶丹敷之其舌自生所斷唇舌雞子膜含護恐風寒傷之外症若寒熱作痛用四物加柴胡晡熱作痛加地骨皮倦怠少食用四君加芎歸柴胡惡寒少食用托裡散加參耆若煩渴發熱用當歸補血湯如不作痛但用四君之類以健脾則肌肉自生旬余可愈不宜用辛熱之劑恐助火而益其痛也一小兒舌斷半寸許敷洪寶丹服四物加柴胡痛定血止次服四君加柴胡山梔月餘而舌自完一小兒十四歲疫病愈後齧舌出血先君謂腎虛則齧舌用地黃丸而愈後唾血咳血發熱痰盛仍用前丸而瘥一小兒唇傷出血不止以藥止之唇面腫大揭去其藥出血甚多腫亦頓消用托裡之劑及當歸膏患處潰而愈一小兒唇傷腫痛發熱服清熱止痛之劑連瀉二次眉目搐動服祛風等藥手指俱冷手足搐動余謂脾土被肝木所侮用異功散加升麻柴胡半夏手溫而搐止仍用前藥佐以托裡散而愈一小兒跌傷唇口發搐咬牙驚哭腹痛此出血過多肝火內動所致也用四物加柴胡山梔而安但焮痛至面此患處欲作膿耳用托裡散四劑頭目腫痛其脈滑數此膿已成氣虛而不能潰出也又用托裡散二劑膿出腫消若初傷時不遽用收斂瘡口之藥則無此患也一小兒傷唇出血發搐目直用柴胡梔子散一劑其搐稍定但傷處焮痛外敷洪寶丹內服逍遙散而愈一小兒跌傷面腫連唇頰出血焮痛發熱以花蕊石散敷之血止痛定次用當歸補血湯而發熱頓止又用加味逍遙散八珍湯而潰托裡散而斂洪寶丹一名濟陰丹治傷損焮痛並接斷天花粉二兩薑黃白芷赤石藥各一兩上為末湯調搽患處一方用亂髮燒灰敷舌上接之又治擦落耳鼻乘熱蘸之接上即愈亦須口含以防其冷當歸補血湯治杖瘡金瘡血氣損傷或妄服峻劑致血氣俱虛肌熱大渴引飲目赤面紅晝夜不息其脈洪大而虛重按之全無經曰脈虛血虛脈實血實蓋血虛發熱是也證似白虎湯惟脈不長實為辨耳若誤服白虎湯必死此病多得於飢飽勞役者方見發熱不止四物湯治一切血虛發熱或因失血太多或克伐太過或潰後發熱煩躁不安並宜服之方見腋癰柴胡梔子散方見脅癰花蕊石散方見後八珍湯加味逍遙散二方見發熱不止托裡散方見熱毒瘡瘍腦骨傷損腦骨傷損者用輕手搏令端正剪去其發若皮不破敷黑龍散或蔥尉法皮破則填乳石散以絹帛包之不可見風著水更用蔥杵爛炒熱頻罨患處為佳一小兒傷腦出血過多發熱煩躁肉瞤筋惕殊類風症欲作風治余曰無風可祛無汗可發法當峻補其血遂用聖愈湯二劑而安又用養血之劑而愈一小兒傷腦腫痛出血外敷花蕊石散內服八珍湯而安後揭瘡痂出血碗許手足發搐寒熱痰盛此血虛兼驚肝火內動而生風也令服地黃丸及加味逍遙散而愈一小兒傷脛骨出血腫痛惡寒少食睡中發搐先用異功散飲食漸進又用逍遙散發搐頓止再用歸脾湯母子並服而愈一小兒被傷手足發搐頓悶咬牙飲食不思此肝經血虛火動生風脾土受侮而然耳用地黃丸異功散諸症漸退用八珍湯托裡散瘡漸愈一小兒被傷面青懶食時作腹痛以手按腹卻不痛余以為脾氣內傷而然不信妄服攻血之藥果吐瀉作嘔手足並冷余先用六君加柴胡升麻生薑又用托裡散異功散而愈一小兒腦側近耳被傷寒熱作痛潰後不斂恪服止痛清熱之劑余曰寒熱作痛因肝經氣血虛也潰而不生肌肉脾經氣血虛遂用地黃丸異功散加歸耆諸症漸愈又用托裡散而斂謙甫花蕊石散治一切金刃箭鏃打撲傷損或死者急搽傷處其血如入臟二便不通用童便和水煎入酒少許調服立效若腹破腸出急宜內入以桑白皮為線縫合摻圍瘡上如瘡干以津潤之硫磺明淨者四兩花蕊石一斤上為末拌勻入瓦罐內用紙筋和泥固濟候泥干漸添火煅至通紅經宿取出細研瓷器盛用加味逍遙散治傷損血虛內熱發熱或遍身瘙癢寒熱或肢體作痛頭目昏重或怔忡頰赤口燥咽乾或發熱盜汗食少不寐或口舌生瘡耳內作痛或胸乳腹脹小便不利方見發熱不止聖愈湯治杖瘡金瘡癰疽膿血出多熱躁不安或晡熱作渴等症方見出血不止十全大補湯治杖瘡瘀穢已出氣血俱虛腫痛不消或腐而不潰潰而不斂或惡寒發熱自汗盜汗飲食少思肢體倦怠若怯弱之人患處青腫肌肉不壞者服之自愈若有瘀血砭刺早者服之自消或潰而膿水清稀肌肉不生或口乾作渴而欲飲湯或砭後發熱惡寒頭痛目暈口乾作渴有似中風之症皆屬氣血虛也並宜服之即四君四物加肉桂黃耆八珍湯一名八物湯治傷損等症失血過多或誤服克伐之劑血氣耗損惡寒發熱煩躁作渴或瘡瘍因氣虛腫痛不消不能潰斂或潰瘍惡寒發熱膿水清稀久而不愈即四君四物黑龍散治跌撲傷損筋骨碎斷先端正其骨以紙攤貼若骨折更以薄木片疏排夾貼卻將小繩緊縛三日再用前法勿去夾板恐搖動患處至骨緊牢方不用板若被刀箭蟲傷成瘡並用薑汁和水調貼如口破以玉珍散填塗枇杷葉去毛入半兩一雲山枇杷根穿山甲六兩炒黃或煉存性上為末薑汁水調或研地黃汁調亦好地黃丸方見作渴不止腹破腸出腹破腸出者急復納入以麻縷縫合外敷花蕊石散如脂已出急以手取去而縫之如已出而復推入則內潰害命矣若腸出乾燥者煮大麥粥取汁洗濕推入不時少以米粥研爛飲之二十日外始可薄粥百日後乃瘥切勿令驚驚則殺人矣用桑皮線尤佳一小兒持碗跌僕腹破腸出即納入以麻線縫完敷花蕊石散而愈一小兒持刀而戲仆地刀入腹腸屎並出不救因腸破故不救也一小兒傷腹發熱作嘔焮痛外敷內服皆止痛清熱之劑日晡益甚余謂脾經氣血益虛朝用補中益氣湯夕用四物參耆歸術諸症漸愈乃用托裡散瘡口自斂一小兒脅傷成瘡膿清不斂寒熱作渴余朝用補中益氣湯培益脾氣夕用六味地黃丸滋補肝血漸愈卻用托裡散異功散而肌肉自生一小兒傷腹出血發熱煩躁先用當歸補血湯而安卻用聖愈湯患處頓愈又用托裡散八珍湯而痊愈花蕊石散方見前益氣湯方見肌肉不生托裡散方見熱毒瘡瘍地黃丸方見作渴不止當歸補血湯方見發熱不止聖愈湯方見出血不止陰囊被傷陰囊皮破出血作痛者敷當歸膏初傷出血不可驟止之血瘀於內則作膿或傷口原小血出不盡而內潰甚至睪丸露出或陰囊盡潰者內服托裡之劑外敷當歸膏則囊自生矣其外傷腐潰及內傷瘀血作膿者皆同囊癰治之惟睪丸碎者不治一小兒傷陰莖出血作痛寒熱發搐咬牙頓悶唇口牽動手足時冷欲用破傷風藥余謂出血諸症肝經主之唇動諸症肝木侮脾土也遂用異功散加升麻柴胡天麻治之頓愈一小兒陰囊被傷腫痛不愈朝寒暮熱飲食少思余謂脾胃復傷之症當用參朮歸耆等藥治之不信別用清熱之藥果作瀉欲嘔手足並冷余先用六君加柴胡升麻而漸愈又用異功散加柴胡升麻而痊愈一小兒持碗仆地誤傷陰囊睪丸露出血出不止寒熱時搐此肝經血虛而火動耳隨敷當歸膏服柴胡清肝散加熟地黃耆及六味丸而愈一小兒被竹篾傷破陰囊出血甚多腹痛發搐咬牙流涎七日矣氣口脈大於人迎二三倍此因驚停食也切忌風藥余用五味異功散加柴胡鉤藤鉤而安凡傷損之症小兒患之多有夾驚夾食者夾食則氣口脈大於人迎或作嘔吐吞酸腹痛瀉穢等症夾驚則左關弦洪而軟或作頓悶咬牙目直項急等症日久不治若成破傷風疾則禍在反掌之間矣一小兒陰莖被傷斷而皮相連寒熱作痛血出不止余謂急當剪去調補肝腎二經則熱自安痛自止矣遂用補中益氣湯加麥門五味子而愈一小子因跌小腹皮破服破血之劑陰囊脹腫作痛發熱按其腹卻不痛余謂當用補血之藥不信遂致不起補中益氣湯治跌撲等症傷損元氣或過用克伐惡寒發熱肢體倦怠或潰後血氣虛弱不能生肌收斂或兼飲食勞役頭痛身熱煩躁作渴脈洪大弦虛或微細濡弱自汗飲食少思尤瘡瘍虛損之聖藥也方見肌肉不生柴胡清肝散方見脅癰地黃丸方見作渴不止金木所傷傷損之症皆肝經主之若青腫不痛或腫不消者氣血虛弱也用十全大補湯血出腫痛或作寒熱者血傷而肝火內動也用四物柴胡山梔血出不止或發寒熱者氣虛而肝火內動也用四君芎歸柴胡寒熱而內痛益甚者此欲潰膿也用參耆內補散若膿出而反痛者氣血虛也用八珍湯瘡口赤而肉突者血虛而肝火生風也用柴胡梔子散若膿出不止瘡口白而肉突者氣虛而寒邪外凝也用補中益氣湯若膿潰而仍痛或潰而不斂皆脾胃虛弱也用六君子湯若不固元氣或敷服寒涼則肉黯不潰或潰而不斂多成敗症矣可不戒哉一小兒傷手腫不消日出膿水少許飲食不思發熱惡寒面色痿黃此脾胃氣虛也朝用補中益氣湯夕用五味異功散加升麻月餘漸愈因飲食停滯服克伐之劑患處漫腫更作嘔惡寒余謂脾胃復傷用六君子湯加升麻柴胡治之而愈一女子因怒作復傷患處出血經行不止臂面青赤右關脈弦數此肝脾二經火動不能統攝其血也先用小柴胡湯二劑又用加味逍遙散二劑血止而安小兒傷內臁成瘡色黯久而不愈此肝脾氣血虛也先用補中益氣湯後用八珍湯加柴胡升麻漸愈再用地黃丸而痊愈一小兒傷臂成瘡久而不愈寒熱作渴瘡口青白不合膿水時流先用參耆歸術寒熱漸愈又用托裡散患處色和再用十全大補湯而愈一小兒傷足成瘡外敷寒涼藥內服敗毒散久不潰腐余謂至陰之處血氣罕到又服克伐之劑所以難腐也雖腐而不能斂也遂用托裡散加肉桂數劑稍知痛而色漸赤減桂又數劑而潰因飲食過多連瀉二日乃用五味異功散加升麻柴胡而瀉止仍用托裡散而愈一女子十五歲傷手成瘡日出清膿少許日晡發熱此元氣虛也先用五味異功散加當歸升麻月餘元氣漸復乃用加味逍遙散及八珍湯異功散而愈一女子十四歲修指甲誤傷焮痛妄敷寒涼及服敗毒之藥遂腫至手背肉色不變余先用內消托裡散手背漸消次以托裡散為主八珍湯為佐服兩月餘而愈其時有同患誤傷成瘡不固元氣專攻其傷者俱致不起沒藥降聖丹治傷損筋骨疼痛或不能屈伸及外邪內傷筋骨緩縱皮內刺痛肩背拘急身體倦怠四肢無力沒藥另研當歸酒洗炒白芍藥生地黃骨碎補撏去皮川烏去皮臍川芎各一兩半自然銅火煅醋淬十二次研末水飛淨一兩上為細末以生薑自然汁與煉蜜和丸每一兩作十丸每服一丸捶碎用水酒各半鍾入蘇木少許煎至八分去蘇木空心服萬金膏治傷損筋骨疼痛龍骨鱉甲炙苦參烏賊魚骨黃柏黃芩黃連白芨豬牙皂角白斂厚朴草烏川芎木鱉子仁當歸白芷沒藥另研乳香另研各半兩槐枝柳枝各四寸長二十一條清油四斤黃丹一斤半炒過淨上除乳沒黃丹外將諸藥於油內慢火煎黑色去渣每油一斤入丹半斤不住手攪令黑色滴水中不黏手乃下乳沒再攪如硬入油些少以不黏手為度接骨散治骨折碎或骨出𫋂先整端正卻服此藥飛禽六畜所傷亦能治之鵬砂一錢五分水粉當歸各一錢上為末每服二錢煎蘇木湯調服後但飲蘇木湯立效又方皮破筋斷以膠香塗之或以金佛草汁頻塗自然相續生蔥切斷一方生薑荊芥土當歸上煎湯溫洗或止用蔥一味煎洗亦可潔古沒藥散止血住痛定粉風化灰各一錢枯白礬三錢另研乳香半錢另研沒藥一字另研上為末搽之塞上治撲損瘀血在內煩悶以熱酒調服蒲黃二錢勝金丹治肌膚傷損青腫用茄子通黃極大者切如指厚新瓦上焙乾為末臨臥酒調服二錢一夜消盡無痕迹也肘後治骨節傷損瘀血不出生鐵一斤酒三升煎服一升飲之若肝經實熱血瘀則肝木自甚或兼口眼牽掣手足抽搐者宜用生鐵借其金氣制之若血虛肝燥生風宜用四物柴胡鉤藤鉤補而清之若肝氣本虛金來剋木宜用瀉白散以清肺六味丸以補肝若腎虛不能生肝亦用地黃丸以滋腎水生肝木不可概用本事內消散治打撲傷損及一切癰腫未破生地黃研如泥木香各等分上以地黃膏隨腫大小攤紙上摻木香一層又依前攤地黃貼腫上三五度即愈治金瘡出血不止以五倍子為末干貼即止神效又方用石灰韭菜石榴寄奴五倍之類乃澀滯收斂止血之劑氣血未耗內無火者用亦有效若血虛內熱宜犀角地黃湯之類凡金瘡出血不止素怯弱者當補氣素有熱者當清血有怒氣者當平肝煩熱作渴昏憒不寧者當補脾氣筋攣搐搦者當養肝血不應用地黃丸以滋腎水自愈治針入肉不出用臘螻蛄捶爛塗上或硫黃中末以紙覆之覺癢時其針即出用雙杏仁搗爛以車脂調敷以紙貼之二日一換三五次或鳥翎三五枚炙焦為末醋調塗之或用白梅入水研爛調象牙末敷之或以象牙和敷之其針皆即出治魚刺入肉嚼吳茱萸封之自爛出丹溪治破傷風血凝心針入肉遊走三症用生寒水石為末調塗之其痛立止補中益氣湯治跌撲等症損傷元氣或過用克伐惡寒發熱肢體倦怠或潰後血氣虛弱不能生肌收斂或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細濡弱自汗飲食少思瘡瘍氣血損之聖藥也方見肌肉不生神應蔥尉法治跌撲傷損腫痛用蔥頭細切杵爛炒熱敷患處如冷易之再尉腫痛即止其效如神二味參蘇飲治出血過多瘀血入肺面黑喘促人參一兩蘇木二兩上每服五錢水煎服桃仁承氣湯加當歸即歸承湯治傷損血滯作痛或發熱發狂等症桃仁研芒硝甘草炙各一錢大黃酒蒸二錢上作二劑水煎更量虛實用之復元活血湯治從高墜下惡血流於脅肋疼痛不已柴胡五錢當歸三錢甘草二錢穿山甲大黃酒浸一兩桃仁去皮尖五十個研爛紅花一錢栝蔞仁二錢上每服二三錢水酒煎五分熱服以利為度利後痛或不止服乳香神應散消毒定痛散治跌撲腫痛無名異炒木耳炒大黃炒各五分上為末蜜水調塗如內有瘀血砭去敷之腐處更用當歸膏敷之尤好藥蛆方治傷損成瘡潰爛成蛆用皂礬煅過為末乾摻其內蛆即死參耆內補散人參黃耆當歸白朮各一錢白芷防風四分川芎六分肉桂甘草炒各五分上水煎作二三服八珍湯方見發熱不止十全大補湯方見便癰蔥尉法方見流注四物湯方見脅癰六君子湯四君子湯二方見腹癰柴胡梔子散小柴胡湯二方見脅癰逍遙散方見發熱不止地黃丸方見作渴不止托裡散方見熱毒瘡瘍五味異功散方見用敗毒之藥漆瘡夫漆屬木木生火而能剋土惟脾虛之人多染之若遍身浮腫或嘔吐者用小柴胡湯加白朮陳皮茯苓若遍身或面目作癢者用前胡湯加連翹山梔若膿水淋漓或癢或痛者用柴胡山梔散若嘔吐不食或泄瀉腹滿者用四君升麻其外治之法當用鐵鏽末調搽或蟹黃塗之或用麻油或浸芒硝淋塌患處或礬石末紫蘇末擦之或人乳汁𥓌之或無名異末水調敷或用好花椒煎湯洗之或生薑汁敷之或乾荷葉濃煎湯洗之並效風犬傷附蛇蟲痛傷丹溪衍義云犬屬陽其性熱大抵熱極生風風熱相搏則為顛狂驚駭之狀此物理之自然者今人治風犬咬傷反以巴豆斑蝥等燥熱之劑瀉毒從小便出如犬之形狀殊不知以熱濟熱血被傷而然非犬之毒也切宜慎之余見吳中凡被犬傷或出血發熱者輒服斑蝥巴豆等藥或至發搐咬牙即以為毒甚服之益堅遂至殞喪殊不知凡被傷受驚之症皆肝經所主肝屬木木生火火生風故發搐咬牙之疾被犬驚傷所致為多不必風犬為然也若為風邪所襲牙關緊急腰背反張宜用定風散童便調服更以漱口水洗淨傷處搽之若出血不止用燈草貼之其有他症從破傷風法治丹溪之戒不可不知若真為猘犬所傷則巴豆斑蝥之藥亦當暫用蓋以毒攻毒理勢自然毒既內中非此不去但病去即止便與調補可保無虞不宜確服耳大凡猘犬之狀必吐舌流涎尾垂眼赤誠為易辨其被傷病甚之時必作犬吠亦自不同不可一概施治也一小兒犬吠出血抽搐痰盛敷玉珍散服抱龍丸而愈一小兒素怯弱犬吠出血惡寒發熱過服斑蝥之藥殊類破傷風與玉珍散敷之服十全大補湯倍加鉤藤鉤而愈一小兒被犬傷面青發搐咬牙此因驚所致或謂風犬致傷用斑蝥等藥而歿一小兒犬傷牙關緊急兼熱發搐余以為急驚風不信乃服斑蝥等藥而歿一方治風犬咬用斑蝥七個去頭翅足將糯米一撮同炒米黃色為度為末空心水調服又法用硃砂雄黃各五錢為末空心香菜油調下玉珍散一名奪命丹治傷損傷風頭痛角弓反張天南星炮防風去蘆根各等分上為末凡破傷風病用藥敷貼瘡口即以溫酒調下一錢服之如牙關緊急童便調服二錢垂死心頭溫者急服三錢用童便一盞煎服治蛇蠍蜈蚣等惡蟲所傷用大蒜切片置痛以艾壯於灸之毒氣頓解痛即止又方用白礬於燈上燒汁滴於痛處或用貝母末酒調服之神效或用南星末醋調上擦之或黃蠟燒滴患處亦妙治蛇入人竅用艾灸蛇尾即出又法以刀破蛇尾少許入花椒自出即用雄黃硃砂為末煎人參湯調灌之內毒即解用白芷末或貝母末酒服尤效治蛇纏人身不解以熱湯淋之或就以身臥倒滾轉亦可解治蛇骨刺人毒氣作痛燒鼠屎為末敷之或食熱酒大蒜亦效治蜈蚣入咽中被咬未死殺雞血灌之更灌以香油探吐血蟲並出治誤吞水蛭用田中干泥一塊小死魚三四個去頭骨和巴豆十粒去殼研爛入泥為丸緑豆大用田中冷水吞下十丸小兒三五丸須臾瀉出卻以四物湯加黃耆煎服以生血氣自愈治蠼螋尿射人生瘡如粟粒四圍赤中有白汁令人惡寒壯熱匝身即磨犀角汁塗之或燕窠中土豬脂苦酒敷之立效鹽湯浸洗亦可治蜘蛛咬一身生癩羊乳一味飲之治蚯蚓呵陰囊腫脹及咬人甚者如大風狀眉髯脫落夜聞蚯蚓之聲鳴於身濃煎鹽湯浸洗即安治螻蛄咬用石灰醋和塗之治毒蟻螫人用雄黃一錢麝香五分研細生麻油調塗之治蛇蟲刺人用豬牙中垢塗患處治蜴蜥齧人用青麻心以手按解取汁塗之治諸蟲入耳用豬肉炙香置耳邊蟲聞香即出如蟲死在耳中用細蘆筒或鵝翎管令人吸出之瘡瘍發痙瘡瘍發痙因氣血虧損外邪所搏或內虛鬱火所致其症牙關緊急四肢徑強腰背反張肢體抽搐有汗不惡寒者名曰柔痙風傷衛故有汗也無汗而惡寒者名曰剛痙寒傷榮故無汗也皆因亡血過多筋無所養傷寒汗下過多及潰瘍産後者多患之此乃敗症也若大補氣血多有復生如作風治速其危矣治在嬰兒尤難調理宜審其稟賦及乳母所致者而治之一小兒瘡潰後患此形氣殊倦用十全大補湯二劑稍緩佐以補中益氣湯數劑而痊一小兒患瘰癧變痙面青或赤此脾經血虛而有熱也用八珍湯加柴胡牡丹皮熱汗漸止又用十全大補湯寒熱漸止又用托裡散附子餅而愈後傷食服克伐藥仍發痙手足如冰余用人參理中丸五味異功散而愈一小兒感冒發散變痙汗出不止手足並冷用補中益氣湯加肉桂四劑而愈一小兒金刃傷腳面出血過多口噤目直此出血過多肝火內動而變症用四物參朮鉤藤鉤四劑其勢稍定又用五味異功散加當歸柴胡變症悉愈又用托裡散八珍湯患處潰而痊一小兒傷手出血煩躁口噤昏憒氣息奄奄先用東垣聖愈湯而安又用托裡散而潰佐以八珍湯而斂一女子十五歲傷手指出血口噤如痙脈浮數肝脾為甚先用加味歸脾湯四劑稍緩又數劑漸蘇卻佐以加味逍遙散月餘而蘇卻用歸脾湯為主八珍湯為佐而愈此等症候用祛風化痰之藥而死者不可枚舉十全大補湯方見便癰補中益氣湯方見肌肉不生人參理中湯五味異功散方見用敗毒之藥附子餅方見貼骨癰托裡散方見熱毒瘡瘍歸脾湯方見脅癰八珍湯加味逍遙散二方見發熱不止破傷風潔古云風症者善行而數變入臟甚速死生反掌之間耳急宜分表裡虛實而治之邪在表者宜羌活防風湯半表半裡者頭有汗而身無汗宜羌活湯傳入者甚則舌強口噤項背反張筋惕搐搦痰涎湧盛胸腹滿悶或便溺赤閉時或汗出其脈洪數而弦者宜大芎黃湯然其汗初出者由風熱鬱甚於里故表熱稍解腠理疏而汗出也宜除熱散結若熱已退臟腑已和而汗仍出者表虛也以白朮防風湯實其表牙關緊急者須撅開口灌之更不時灌以粥飯然小兒患之多因夾驚肝火內熱生風所致夫肝主五色屬木生風察其面色入肝為青入心為赤入脾為黃入肺為白入腎為黑肝經者用柴胡清肝散心經者用梔子清肝散加黃連腎經者用地黃丸加柴胡脾經者用六君加山梔柴胡為主而佐以大補脾胃之藥為善一小兒十四歲患瘰癧因勞心功課頭痛發熱自以為傷風用薑蔥發汗忽腰背反張口噤不語脈浮大按之如無此氣血虛極而變痙非破傷風也灌十全大補湯一劑良久方蘇又數劑而愈後又傷復厥冷汗出如注良久不省用前湯加附子五分一劑而蘇乃去附子服至三十餘劑而愈一小兒患流注面色痿黃忽舌強口噤脈洪大而虛按之如無此脾肺氣虛而變症也先用補中益氣湯四劑稍緩又用十全大補湯數劑而痊一小兒臀癰久不收斂因驚發搐口噤用托裡散內參術各用三錢柴胡五分鉤藤鉤一錢五分四劑而安後停食驚駭目直髮搐口噤流涎手指逆冷用五味異功散此肝木旺脾土受侮飲食內作而然用五味異功散加鉤藤鉤木香乾薑而蘇一小兒潰瘍變痙如前面色青赤此心肝二經血虛而有熱也先用八珍湯加柴胡牡丹皮又用加味逍遙散加五味子漸愈又用八珍湯而安一小兒潰瘍忽汗出不止手足並冷先用補中益氣湯加肉桂五味子數劑諸症漸愈又因飲食過多口噤作嘔用異功散加升麻四劑而安一小兒十六歲癧瘡久不斂因過勞口噤目直脈洪數左關脈弦而無力余謂肝經氣血虛而火內動也用地黃丸料四劑而安卻用補中益氣湯以補脾肺用地黃丸以補腎肝為主佐以九味蘆薈丸以治肝疳而癧瘡愈一小兒十六歲流注久不愈因勞兼怒忽仆地昏憒殊類破傷風面色皎白無氣以動用補中益氣湯內用人參五錢加肉桂一錢不應加乾薑一錢又不應此陽氣虛甚藥力不能勝之也急加附子一錢稍定乃去附子服十餘劑而元氣漸復卻佐以八珍湯豆豉餅半載而痊畢姻後因入試場勞傷元氣前症復發亦類破傷風脈浮大按之如無用參附湯四劑而蘇八珍湯地黃丸料各百餘劑而痊羌活防風湯治破傷風初病邪在表者急服此藥以解之羌活防風甘草炙川芎藁本當歸芍藥各四兩地榆細辛各二兩上每服五錢水煎熱服防風湯治破傷風表症未傳入里急服此防風羌活獨活川芎各等分上每服五錢水煎調蜈蚣散大效蜈蚣散蜈蚣一對鰾三錢上為末用防風湯調下羌活湯治破傷風半表半裡者急宜服此羌活菊花麻黃川芎石膏煨防風前胡黃芩細辛甘草枳殼白茯苓蔓荊子各一兩薄荷白芷各五分上每服五錢生薑水煎日二三服地榆防風散治破傷風在半表半裡頭微汗身無汗不可發汗表裡兼治地榆防風地丁草馬齒莧各等分上為末每服三錢溫米湯調服大芎黃湯治破傷風在內急宜服此湯疏導之川芎羌活黃芩大黃各一兩上每服五錢水煎溫服以臟腑通和為度白朮防風湯治表藥過多有自汗者白朮黃耆各一兩防風二兩上每服五七錢水煎溫服無時臟腑和而自汗者可服此藥若臟腑祕小便赤自汗者宜速下之用大芎黃湯白朮湯治破傷風汗不止筋攣搐搦白朮葛根各二兩升麻黃芩芍藥甘草二錢五分上每服五錢水煎服無時玉真散治破傷風方見風犬傷白丸子治一切風疾壅盛手足頑麻或牙關緊急口眼歪斜半身不遂等症半夏七兩生用川烏去皮臍生用五錢南星二兩上為末用生薑汁調糊丸桐子大每服一丸空心薑湯下余承乏留都各局用此丸及阿膠俱自制但要藥味真正白丸子如急備用不及浸內烏頭以火略炮用之亦效瘈瘲瘈者筋脈急也瘲者筋脈緩也急則引而縮緩則瘲而申或縮或申動而不正是也俗又謂之發搐凡癲癇風痙破傷風三症皆能瘈瘲則有瘡口潰腐出血然潰瘍傷損者多患之若血氣虛肝火內動生風者用八珍黃耆鉤藤鉤佐以地黃丸料如未應專補胃氣肝經血燥生風者用羚羊角散加鉤藤鉤山梔若肝火血燥用加味逍遙散加鉤藤鉤未應須兼服六味丸以補腎水而生肝木若因乳母有鬱怒肝火致兒為患者須調治其母仍參五臟相勝而治之一女子瘰癧瘈瘲服鎮驚之藥面色黃赤呵欠咬牙余謂肝經氣虛血弱而火動生風用五味異功散加柴胡升麻而愈後因怒復作面赤目直大叫項強關脈洪數先用抑肝散次用地黃丸而愈一小兒十四歲患此兼呵欠咬牙手欲尋衣所服皆祛風之藥余謂肝經之血復傷矣當用地黃丸以滋腎水而生肝木不信專於祛風化痰虛症蜂起昏憒如醉此胃氣太虛五臟無所資而然也以四君子湯內用人參一兩一日並進三劑雖蘇而無氣以動至十三劑卻佐以地黃丸料每劑加黃耆五錢又二十餘劑乃愈次年畢姻不月而復發亦用前藥而瘥一小兒潰瘍後瘈瘲因服牛黃丸反加四肢無力項強目直唇白流涎手足厥冷求治於余余曰經云脾之榮在唇口又云脾主四肢又云脾主涎此因前藥妄下胃氣復傷肝木侮土以致前症也當先救胃氣以養五臟因衆議不一尚未用藥翌早果咬牙呵欠困臥驚悸哽氣短氣面色皎白始信余言遂先用五味異功散次用補中益氣湯而愈一女子瘰癧將愈因勤於女紅忽作瘈瘲此胃氣未實而勞傷筋脈耳用補中益氣湯及五味異功散俱加鉤藤鉤而愈後勞役怒氣經行顫振用加味逍遙散及補中益氣湯俱加鉤藤鉤而愈一小兒僕傷潰後患前症面青或赤服風痰之藥咬牙目直仍欲治風余曰凡傷損之症皆肝主之故面色青而瘈瘲咬牙目直皆屬肝經血氣虧損風木翕合火動而生風也無風可祛無痰可逐遂用地黃丸及補中益氣湯而愈一小兒跌傷臁出血誤服大黃等藥患前症或時煩躁自汗手欲撮空此因肝經血虛肝火熾盛耳用地黃丸補中益氣湯而愈方見前各症顫振顫振與瘈瘲相類瘈瘲則手足牽引或伸或屈顫振則但顫動而不伸屈也內經云因胃氣不實諸脈空虛行陰用不復因其所在補肉分間然小兒瘡瘍潰腐或損傷膿血出多屬脾胃氣虛血弱用補中益氣湯五味異功散加白朮當歸升麻主之肝經虛熱用六味丸脾血虛弱用四君子加芎歸胃氣虛弱用補中益氣湯一小兒腿癰內潰出膿碗許即時顫振面白汗出此陽氣虛脫非大補不可也遂用人參一兩煎服之汗愈甚手足並冷再用人參二兩乾薑二錢煎服良久汗乃稍止再劑諸症頓愈卻用補中益氣湯加人參五錢數劑而愈一小兒臂癰潰後顫振少氣脈浮數按之不鼓此元氣虛弱也朝用補中益氣湯夕用異功散各二十餘劑未見效因虛甚而功力未能及耳又用前藥各二十餘劑顫漸愈後佐以托裡散而瘡亦痊一小兒十六歲臀癰潰而顫振遂用大補中氣之藥而顫止因勞發熱癰內潰而復顫脈浮數按之不鼓兩寸脈短小不及本位或欲祛風余曰長則氣治短則氣病此由胃氣虛甚故也先用獨參湯數劑愈乃佐以補中益氣湯各五十餘劑而愈若加附子一片數劑亦可愈矣一女子十六歲臂腫一塊肉色不變按之則痛服敗毒流氣之劑更加發顫時孟春面戴陽光手不畏寒脈浮數按之不鼓而短彼欲攻毒余曰此榮衛虛弱外寒所搏而為患也又加敗毒胃氣虧損豈不加顫耳遂用人參五錢黃耆三錢當歸熟地各三錢升麻柴胡各五分二十餘劑而顫稍緩乃佐以補中益氣湯內用人參五錢又二十餘劑兼蔥尉法而腫亦愈一女子患瘰癧因怒兩手顫振面色或青或赤此肝經血虛火盛而生風也用四物加山梔鉤藤鉤龍膽草甘草而顫振漸愈乃去膽草與地黃丸間服而痊後因勞心發熱兩手復振用補中益氣湯地黃丸而愈一小兒患臂癰面色或黃或赤先用補中益氣湯地黃丸尋愈後因怒氣顫振先用補中益氣湯加鉤藤鉤炒山梔又用加味逍遙散加鉤藤鉤而愈又因飲食停滯吐瀉酸臭更加發搐用五味異功散加鉤藤鉤而愈一女子患流注發熱而顫此肝脾氣血不足經水過期虛火生風之症也先用補中益氣湯加鉤藤鉤漸愈又用加味地黃丸而痊愈一女子不得繼母之心久而鬱怒遂患顫振面赤發熱先用加味小柴胡湯次用加味歸脾湯及加味逍遙散前後間服而尋愈但面色時青又用地黃丸逍遙散而安一女子腹癰患此手足或急或縱先用四物加柴胡山梔丹皮鉤藤鉤以養血清肝火又用地黃丸以滋腎生肝血而愈方見前各症
