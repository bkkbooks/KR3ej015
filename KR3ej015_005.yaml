body:
  text: 卷五鶴膝行遲錢仲陽云鶴膝者乃稟受腎虛血氣不充致肌肉瘦薄骨節呈薄如鶴之膝也行遲者亦因稟受肝腎氣虛肝主筋腎主骨肝藏血腎藏精血不足則筋不榮精不足則骨不立故不能行也鶴膝用六味地黃丸加鹿茸以補其血氣血氣既充則其肌肉自生行遲用地黃丸加牛膝五加皮鹿茸以補其精血精血既足則其筋骨自堅凡此皆肝腎之虛也虛而熱者用六味地黃丸虛而寒者用八味丸若手拳攣者用薏苡仁丸足拳攣者用海桐皮散脾胃虧損腎臟虛弱寒邪所乘而膝漸腫者佐以補中益氣湯及大防風湯治驗一小兒體瘦腿細不能行齒不堅發不茂屬足三陰經虛也用六味丸補中益氣湯年餘諸症悉愈一小兒六歲面色㿠白眼白睛多久患下痢忽聲音不亮腿足無力先用四神丸止其痢後用地黃丸加牛膝五加皮鹿茸補其腎兩月餘漸能行半載後其聲音亮後停食另用消食丸連瀉五六次去後益頻五更侵晨為甚聲音復喑步履復難而腿足作痛仍服前丸兼補中益氣湯而愈一小兒七歲左腿自膝下至脛細小行步無力用地黃丸加鹿茸五味子牛膝為主佐以補中益氣湯半載腿膝漸強而能步畢姻後其腿內熱足心如炙唾痰口渴余謂當補脾腎不信另用滋陰丸痰熱益甚服四物黃柏知母之類飲食日少服二陳青皮枳殼之類胸滿吐血服犀角地黃湯唾血不時大便頻數復請視仍泥實火余辭不能治恪服犀角地黃丸而唾血益甚不時發熱後復懇治余曰兩足心熱唾痰口乾腎虛水泛也飲食少思胸膈痞滿唾血不止脾虛失攝也晝發夜伏夜作晝止不時而熱無根虛火也遂用四君子及八珍湯地黃丸間服而愈四神丸治脾虛胃弱大便不實飲食不思或泄利腹痛等症方見驚瀉薏苡仁丸治稟受肝氣怯弱致兩膝攣縮兩手伸展無力當歸焙秦艽薏苡仁酸棗仁防己羌活各一兩上為末煉蜜丸雞豆大每服一丸麝香荊芥湯下海桐皮散治稟受腎氣不足血氣未榮腳趾拳縮不能伸展海桐皮牡丹皮當歸酒浸熟地黃牛膝酒浸各一兩山茱萸補骨脂各五錢上為末每服一錢蔥白煎湯食前服五加皮散治四五歲不能行真五加皮川牛膝酒浸二日木瓜干各等分上為末每服二錢空心米湯調下一日二服服後再用好酒半盞與兒飲之仍量兒大小益氣養榮湯治氣血損傷四肢頸項等處患腫不問軟硬赤白痛否日晡發熱或潰而不斂者並宜服之人參茯苓陳皮貝母香附當歸酒拌川芎黃耆鹽水拌炒熟地黃酒拌芍藥炒各五分甘草炙桔梗炒柴胡各三分白朮炒一錢上薑水煎服大人倍用八珍湯即四君四物二湯四君見內釣四物見急驚四神丸方見驚渴六味丸八味丸即六味丸加肉桂附子二方見腎臟消食丸方見嘔吐乳補中益氣湯方見虛羸大防風湯方見鶴膝風四君子湯方見內釣齒遲經云齒者腎之標骨之餘也小兒稟受腎氣不足腎主骨髓虛則髓脈不充腎氣不能上營故齒遲也用地黃丸主之治驗一小兒三歲言步未能齒髮尤少骨瘦艱立發熱作渴服肥兒丸不應余曰此腎虛疳症也蓋肥兒丸脾胃經之藥久服則腎益虛其疳益甚不信牙發漸落余用地黃丸加鹿茸五味子半載而元氣壯健一小兒體瘦腿細行步艱辛齒不堅固發稀短少用六味地黃丸補中益氣湯年餘諸症悉愈形體壯實芎藭散治齒生遲或齒嚼物少力芎藭生地黃山藥當歸芍藥炒甘草各等分上各另為末每服二錢白湯調地黃丸方見腎臟補中益氣湯方見虛羸咬牙夫齒屬足少陰腎經牙床屬手足陽明經小兒寤寐不時咬牙其所致之經不同或本於心經之熱或本於肝經之熱或本於脾肺腎經之熱若發熱飲水叫哭而搐者心經實熱也睡因驚悸合面而臥者心經虛熱也面青目札呵欠項強煩悶者肝經實熱也手尋衣領及亂捻物者肝經虛熱也發搐目青面赤肝經風熱也煩悶喘促見於申酉時者肺經熱也胸滿氣急喘嗽上氣肺感風寒也見於亥子丑時者腎經熱也眼目畏明及無睛光或解顱下竄胎稟腎虛也飲水口中氣熱胃經實熱也飲湯口中氣冷胃經虛熱也發搐呵欠面黃脾虛發驚也心經實熱用瀉心湯虛熱用導赤散肝經實熱先用柴胡清肝散治肝火後用六味丸生肝血肝經風熱亦用前藥虛熱則用六味丸肺經實熱用瀉白散虛熱用保肺湯腎經實熱用六味丸減茱萸二兩以生地易熟地虛用地黃丸胃經實熱用瀉黃散虛用異功散脾虛發驚用五味異功散若乳母多食膏粱厚味致兒咬牙者用清胃散治驗一小兒七歲素喜食甘味兩手發熱夜睡咬牙用瀉黃散而愈後不守戒仍作用大黃等藥前症益甚更滯頤弄舌手足冷余謂此脾胃復傷而虛甚也用六君子加柴胡升麻治之漸愈又用五味異功散加柴胡升麻而痊一小兒面素痿黃或時變青飲食過多睡面咬牙服克伐之劑口舌生瘡大便泄青發搐痰盛唇青手冷用六君加木香柴胡升麻數劑而安但飲食後腹膨作噯用四君子湯為細末不時煨薑湯調服少許月餘而痊一小兒十五歲盜汗面赤睡中咬牙自服清胃散前症益甚更遺精晡熱口乾倦怠余用六味地黃丸補中益氣湯而痊一小兒十四歲素食膏粱炙煿睡中咬牙此脾胃積熱先用清胃散及二陳黃連山楂犀角各數劑間服補中益氣湯而愈一女子十四歲發熱作渴月經先期睡中咬牙此肝脾二經虛熱也用加味逍遙散而安後因怒前症俱作用柴胡梔子散而瘥一小兒夜間咬牙或盜汗或便血審其母懷抱鬱結又兼便血用加味歸脾湯加味逍遙散與母兼服其子亦愈一小兒因母食膏粱醇酒睡中咬牙或時鼻衄右腮鼻準色赤先用加味清胃散加味逍遙散與母服兒亦愈一小兒病後不語睡中咬牙驚悸飲水困倦少食用化痰鎮驚等藥益甚余謂屬心脾腎陰虛用六味地黃丸為主佐以五味異功散祕旨安神丸諸症頓愈一小兒感冒風邪咳嗽喘逆不時咬牙右腮色赤此肺經客熱用潔古黃耆湯一劑而痊後因停食腹脹咳嗽鼻塞咬牙用六君子湯加桔梗桑皮杏仁一劑而愈一小兒咬牙審知因母大怒先用小柴胡湯加山梔牡丹皮治之母子並愈潔古黃耆湯人參黃耆茯苓白朮芍藥各一錢乾薑陳皮藿香各五分上水煎服保肺湯方見傷風咳嗽柴胡梔子散柴胡清肝散二方見發熱補中益氣湯方見虛羸小柴胡湯方見痙症二陳湯方見寒吐瀉黃散方見脾臟瀉心湯導赤散祕旨安神丸三方見心臟瀉白散方見肺臟地黃丸方見腎臟六君子湯歸脾湯四君子湯加味逍遙散清胃散異功散六方見內釣語遲錢氏云心之聲為言小兒四五歲不能言者由妊母卒有驚動邪乘兒心致心氣不足故不能言也有稟父腎氣不足而言遲者有乳母五火遺熱閉塞氣道者有病後津液內亡會厭乾涸者亦有脾胃虛弱清氣不升而言遲者心氣不足用菖蒲丸腎氣不足用羚羊角丸閉塞氣道用加味逍遙散津液內亡用七味白朮散脾胃虛弱用補中益氣湯治驗一小兒言遲泄瀉聲音不亮雜用分利清熱等劑喉音如啞飲食少思朝用地黃丸加五味子夕用補中益氣湯其瀉漸止遂專服前丸兩月喉音漸響一小兒白睛多瀉後喉喑口渴兼吐大便不實朝夕服地黃丸而痊後患瀉喉復喑仍服前丸而愈此皆稟賦腎氣不足故用是藥一小兒五歲不能言咸以為廢人矣但其形色悉屬肺腎不足遂用六味地黃丸加五味子鹿茸及補中益氣湯加五味子兩月餘形氣漸健將半載能發一二言至年許始音聲如常菖蒲丸治心虛語遲石菖蒲丹參各一錢赤石脂三錢人參半兩天門冬去心焙一錢上為末煉蜜丸麻子大食後溫水服二三十丸羚羊角丸治行遲羚羊角鎊虎脛骨醋炙黃生地黃焙酸棗仁白茯苓各五錢肉桂防風當歸黃耆各二錢半上為末煉蜜成劑每服一皂子大白湯化下七味白朮散方見腹痛補中益氣湯方見虛羸六味地黃丸方見腎臟加味逍遙散方見內釣喑經云舌者音聲之機也喉者音聲之關也小兒卒然無音者乃寒氣客於會厭則厭不能發發不能下致其門闔不致故無音也若咽喉音聲如故而舌不能轉運言語則為舌喑此乃風冷之邪客於脾之絡或中於舌下廉泉穴所致也蓋舌乃心之苗心發聲為言風邪阻塞其經絡故舌不能轉運也若舌不能轉運言語而喉中聲嘶者則為喉喑此亦為風冷所客使氣道不通故聲不得發而喉無音也然或風痰阻塞或因心驚氣虛或因脾之脈絡受風或因風痰滯於脾之絡或因脾氣不足或胃中清氣不升皆足以致喑大抵此症亦有稟父腎氣不足不能言者有乳母五志之火遺兒熏閉清道不能言者或兒病津液耗損會厭乾涸不能言者或腎氣不充虛火上炎傷肺不能言者有驚風中風不能言者若遺熱與津液耗損者用七味白朮散清氣不升者用補中益氣湯稟腎不足與虛火傷肺者用六味地黃丸若仰首咳嗽肢體羸瘦目白睛多或兼解顱呵欠咬牙等症悉屬腎虛非用地黃丸不能救也治驗一小兒面色目睛多白兩足脛常熱所患之症悉屬腎虛畢姻後唾痰口乾頭暈久瀉忽然失音先君云此亦腎虛也用補中益氣湯八味四神二丸補之尋愈一小兒亦面色目睛多白大便頻泄侵晨作瀉肌體骨立食少唾痰先君謂腎氣不足之故不信後加頭暈聲喑足脛逆冷復請治仍欲祛痰又云頭暈聲喑中氣不能上升也足脛逆冷陽氣不能充達也遂用補中益氣湯及四神八味二丸以補命門之火而愈一小兒患泄瀉聲音不亮雜用清熱等劑聲音如啞飲食少思去後多在侵晨朝用地黃丸加五味子夕用補中益氣湯其瀉頓止卻專服前丸不兩月聲亮而愈一小兒目睛白多黑少吐瀉後喉喑口渴大便不實朝夕悉服地黃丸而痊後患瀉其喉復喑仍服前丸遂愈一小兒十一歲形羸骨立面皎口乾白睛多而黑睛少不能頓言用六味地黃丸補中益氣湯其形漸充年餘而能言一小兒解囟不言其形屬腎虛而兼疳症先用六味地黃丸以補腎水又用補中益氣湯以補肺金半載漸愈年餘疳病痊而能言一小兒喉音不亮至十九歲咽仍不響面色赤白睛多畏明畢姻後頭覺脹視物皆大作渴飲冷亦用前二藥喜其遠幃幕戒厚味二年諸症悉愈其聲響亮世傳通關散治驚風愈後聲啞不能言者以大南星一個炮為末每服二分豬膽汁調下便能言語治要茯苓補心湯治心氣不足善悲愁怒衄血面黃五心煩熱或咽喉痛舌本作強茯苓四錢桂心甘草炒各三分紫石英煅人參各一錢大棗二枚麥門冬去心一錢上水煎服導痰湯半夏南星茯苓陳皮炒枳實炒甘草炒上薑水煎服防風散治脾臟中風多汗惡風身體怠惰四肢不能動色微黃不嗜食舌強語澀口眼喎斜或肌膚不仁腹膨心煩翕翕發熱神思如醉其脈浮緩胸滿痰涎志意昏濁獨活一錢五分防風茯神去木人參附子炮去皮臍前胡沙參半夏湯洗七次黃耆炒旋覆花羚羊角鎊甘草上水煎服半夏湯半夏桂枝甘草各等分上水煎細細呷之雞頭丸治小兒諸病後不能語雄雞頭一個炙鳴蟬三個炙焦大黃錦紋者濕紙裹煅甘草炙一兩木通人參各半兩當歸黃耆川芎遠志去心薑汁製略炒麥門冬去心焙各三分上為末煉蜜丸小豆大平旦米飲下五丸日三服兒大者加之久服取效射干湯治夏秋暴寒喘咳喉啞失聲喉中如梗半夏五錢湯泡生薑四錢泡杏仁三錢去雙仁皮尖射干甘草炙紫菀肉桂枳實炒當歸橘皮獨活麻黃去節泡各二錢上每二三錢水煎服菖蒲丸方見語遲錢氏全蠍散方見偏風噤地黃丸方見腎臟七味白朮散方見積痛補中益氣湯方見虛羸二陳湯方見吐穢滯頤小兒滯頤者涎流出而漬於頤間也脾之液為涎由脾胃虛寒不能收攝耳治用六君子湯加木香凡作渴飲冷者屬實熱宜瀉胃火作渴飲湯者屬虛熱宜補中氣若脾經實熱而廉泉不能約制者用牛黃清心丸脾經虛熱而廉泉不能統攝者用六君子加木香胃經實熱而蟲動津液流出者用瀉黃散虛熱用五味異功散大便祕結用清涼飲中氣下陷用補中益氣湯食積內熱用大安丸仍參口瘡腮腫條互覽之治驗一小兒滯頤面色痿黃余謂當調補中氣不信用清熱之劑更加弄舌乃用五味異功散漸愈後因停乳吐瀉復作先用大安丸消其宿乳次用五味異功散補其中氣而痊一小兒滯頤面色赤手指熱用瀉黃散一服而愈後因乳母飲酒其子復患前症用東垣清胃散加乾葛神麯麥芽母子並服而愈一小兒停食腹痛用疏導之藥痛止左項筋動口角涎流面色痿黃肢體微腫先用六君柴胡升麻山梔四劑次用異功散加升麻而痊一小兒停食腹痛服峻利之藥吐瀉自汗厥冷滯頤用六君升麻柴胡而愈一小兒十一歲滯頤兼噯氣下氣時常停食服消導清熱之劑大便不實小腹重墜此脾氣下陷也用六君升麻柴胡飲食漸進大便漸實又用四神丸而愈一小兒滯頤面色白或黧腹痛手足時冷脈微細此肺腎虛寒也宜先培其脾土用溫胃散二服腹痛頓止又六君子湯諸症並愈後停食挾驚吐瀉發搐滯頤腹痛復作用六君加柴胡鉤藤鉤四劑而痊一小兒吐舌流涎余謂心脾有熱用導赤瀉黃二散而愈後自服清熱化痰等藥更加弄舌余用異功散加鉤藤鉤而安又用六君子湯而愈一小兒滯頤面色白或赤目札咬牙此稟肝腎氣不足內熱而生虛風也用地黃丸以滋腎水異功散以補脾土而安一小兒滯頤面青手按其腹則叫痛此夾食與驚也用異功散加枳實升麻二劑而愈後又停食吐瀉滯澀發搐面色青黃此脾虛而肝木乘之也用異功散加升麻柴胡鉤藤鉤而愈溫胃散治脾冷涎多流滯於頤丁香一兩人參半夏肉豆蔻白朮乾薑甘草各半兩上為末每服一錢薑水煎愚按此方治脾胃虛寒涎流不止或嘔吐腹痛之良劑也脾氣稍溫但服五味異功散六君子湯錢氏異功散四君子湯清胃散四方見內釣四順清涼飲補中益氣湯大安丸保和丸加白朮三方見虛羸瀉黃散方見脾臟牛黃清心丸方見急驚四神丸方見驚瀉導赤散方見心臟腹痛小兒腹痛口中氣冷不思飲食脾土虛寒也用調中丸主之口中氣溫大便酸臭積痛也用下積丸治之面赤壯熱或手足並熱實熱也用瀉黃散瀉之面黃微熱或手足並溫虛熱也用異功散補之若作渴飲湯胃氣虛熱也用白朮散若痛連兩脅肝木乘脾也用四君子湯加柴胡芍藥若腹痛重墜脾氣下陷也用補中益氣湯加升麻若手足指冷或吃逆泄瀉寒水侮土也用六君炮薑肉桂不效急加附子若服克滯之藥致腹作痛按之不痛脾氣復傷也用五味異功散中脘痛者屬脾少腹痛者屬腎按之痛者為積滯不痛者為裡虛積滯者消之裡虛者補之治驗一小兒停食腹痛發熱面赤或用養胃湯枳殼黃連山楂反加腹脹午後發熱按其腹不痛此脾虛而克伐傷之也用六君子湯數劑而瘥一小兒七歲發熱驚悸用化痰藥反抽搐惡寒吐痰喘嗽腹痛少食用抱龍丸大便似痢寒熱往來殊類風症余以為脾氣復損用四君子湯少加升麻柴胡治之月餘而愈一小兒肚腹膨痛食後即瀉手足逆冷此脾氣虛寒也先用人參理中丸後用六君子湯而愈一小兒九歲常患腹痛至冬月因食生冷之物其腹仍痛服理中丸之類輒效至十六歲秋初畢姻後腹痛又作唇面黯爪甲青余先君用八味丸補火隨愈服四兩許痛不再作至二十歲外痛復作服前丸不應乃服附子理中湯而止仍用八味丸而安一小兒腹痛吐舌流涎作渴飲冷便祕用清涼飲下之頓安余謂小兒元氣易虛易實病勢稍安不必再藥不信自用三黃丸一服果吐瀉發搐余用白朮散加鉤藤鉤補脾平肝而愈四七氣湯治七氣所傷痰涎結聚心腹作痛不能飲食半夏制焙五兩人參辣桂去皮各一兩甘草半兩上每服三錢薑棗水煎指迷七氣湯治七情相干陰陽不升降氣道壅滯攻衝作痛青皮陳皮桔梗蓬朮辣桂益智仁各一兩香附子一兩半甘草炙三分半夏制三分上每服三錢薑棗水煎異功散治小兒諸般病症角弓反張胸高臍凸以透明沒藥為末薑湯調下方見天釣即錢氏異功散桔梗枳殼湯治氣壅痞結腹脅疼痛枳殼炒桔梗各二兩甘草炙半兩上每服二三錢薑水煎七味白朮散治積痛和胃氣生津液方見積痛愚按前方若脾胃氣虛作渴飲湯或因吐瀉津液虧損煩渴引飲或脾胃虛弱腹脹瀉渴弄舌流涎手足指冷並宜服之以溫補脾氣化生津液方見積滯六君子湯治脾胃氣虛吐瀉不食肌肉消瘦或肺金虛痰嗽喘促惡寒或肝虛驚搐眩暈自汗諸症並宜服此以滋化源方見內釣瀉黃散方見脾臟四君子湯方見內釣補中益氣湯方見虛羸八味丸方見腎臟附子理中湯人參理中丸二方見冷瀉即理中湯益黃散方見脾臟調中丸方見脾胃虛冷腹脹東垣云寒脹多熱脹少皆主於脾胃虛者宜用六君子湯若喘而氣短者脾肺氣虛也用異功散補之若服克伐之類而喘脹益甚者脾肺之氣復傷也用前湯加半夏升麻若既下而不喘則邪氣去而肺氣寧也不必用藥或病久小便不利或四肢浮腫者脾肺之氣虛不能通調水道也用金匱加減腎氣丸主之或手足逆冷睡而露睛脾胃虛寒也用六君子加炮薑手足不冷睡而露睛脾胃虛弱也用六君子湯若面色青木剋土也用六君木香柴胡更當調治其母節其飲食恐藥餌過劑復傷胃氣故也治驗一小兒腹脹面赤痰喘大便祕壯熱飲冷此形病俱實用紫霜丸一服諸症益甚面色頓白飲湯不絶余以為邪氣退而真氣復傷故面白而喜湯用白朮散大劑煎湯令恣飲良久而睡翌日頓安一小兒傷食腹脹胸滿有痰余治以異功散而痊後復傷食腹脹兼痛或用藥下之痛脹益甚而加氣喘此脾胃傷而致肺虛也用六君子加桔梗調補而痊一小兒腹脹惡食發熱噁心症類外感余曰此飲食停滯也用保和丸一服諸症頓退惟腹脹用異功散而痊一小兒傷食腹脹服克伐之劑小便澀滯又服五苓散之類飲食漸減小便不通四肢頓腫余朝用金匱腎氣丸去附子夕用補中益氣湯而安一小兒傷風咳嗽痰湧用六君桔梗桑皮杏仁而愈復飲食停滯作瀉腹脹仍用六君山楂厚朴而安後停食作嘔或用藥下之更加咳嗽余謂此屬脾肺俱虛欲行調補彼以為緩乃發表克滯前症益甚更加搖頭余用天麻散倍加鉤藤鉤及異功散尋愈一小兒五歲食粽後咬牙欲吐頃間腹脹昏憒鼻青黃赤此脾土傷而食厥也令用雞翎探吐出酸物頓醒節其飲食勿藥而愈一小兒胸腹脹發熱頓悶以手按腹即哭此飲食停滯也先用保和丸一服前症即愈更加煩渴按其腹不哭此宿食去而脾胃復傷也用五味異功散加柴胡治之頓瘳一小兒腹脹大便青白腹左一塊面色痿黃齒齦赤爛食少滯頤余用異功散調補中氣為主佐以大蕪荑湯清疳治熱月餘諸症稍愈仍服異功散及蚵蟆丸外貼阿魏膏兩月塊消左脅微痛用四君子湯九味蘆薈丸而愈褐子丸治疳腫脹蘿蔔子一兩微炒陳皮青皮炒檳榔五靈脂蓬朮煨黑牽牛頭末各半炒赤茯苓木香二錢五分上為末麵糊丸緑豆大每服十五丸紫蘇湯下金匱加減腎氣丸熟地黃八兩乾山藥山茱萸各四兩澤瀉白茯苓牡丹皮各三兩肉桂附子炮車前子炒牛膝酒微炒各一兩上各另為末米糊丸小豆大每服三四十丸空心食前白湯下紫霜丸方見噤風大柴胡湯方見痙症五苓散方見五淋保和丸方見虛羸天麻散方見百晬內嗽大蕪荑湯蚵蟆丸九味蘆薈丸三方見疳症癖塊痞結錢仲陽云癖塊者僻於兩脅痞結者否於中脘此因乳哺失調飲食停滯邪氣相搏而成或乳母六淫七情所致古人多用克伐痞癖既久飲食減少脾氣必虛久而不愈必先以固胃氣為主使養正則積自除若欲直攻其結不為不能善消抑亦損其脾土凡脾土虧損必變症百出矣當參各類及隨見症而主治之治驗一小兒患痞癖服檳榔蓬朮枳實黃連之類痞益甚余曰此脾經血虛痞也不可克伐遂用六君子加當歸數劑胃氣漸復諸症漸愈乃朝用異功散加升麻柴胡夕用異功散加當歸芍藥而愈一小兒素嗜肉食腹痛大便不調半載後右脅結一塊三月後左脅又結一塊腹脹食少作渴小便赤澀大便色穢又半載後頷下亦結一核妄服消塊行滯等藥而元氣益虛用四味肥兒丸五味異功散之類熱渴漸止腹脹漸可佐以九味蘆薈丸結核漸消後用四君子為主佐以四味肥兒丸之類三月餘而痊一小兒停食吐瀉後飲食不節作瀉腹痛膨脹腹中結塊作渴發熱齦爛口臭服消導克滯之藥而前症益甚形體益瘦視其面色黃中隱青乃脾土虧損而肝木所侮也法當調補中氣兼平肝木遂用沖和湯及大蕪荑湯之類半載而愈一小兒患痞結服克滯之藥余謂屬形病俱虛當補中氣彼不信仍行克伐遂致虛火上炎齒齦蝕爛頷下結核余用大蕪荑湯及異功散加減用之而安一小兒患痞結久而四肢消瘦肚腹漸大寒熱嗜臥作渴引飲用白朮散為主佐以四味肥兒丸月餘諸症漸愈又以異功散加當歸並六味地黃丸又月餘而愈一小兒患痞結身熱如火病狀多端不可盡述朝用五味異功散夕用四味肥兒丸月餘諸症稍愈佐以地黃丸自能行立遂朝用地黃丸夕用異功散及蝦蟆丸數服而愈挨痞丸治乳癖谷症腹中塊痛代赭石火煅醋淬研細青皮木香蓬朮煨生地黃各三錢巴豆去油淨六錢上為末醋糊丸麻子大每服二三丸食後薑湯下甘遂破結散甘遂二錢五分煨黃青皮焙黃芩炒大黃炒各半兩上為末每服一錢水煎服仍量兒加減利後以粥補之進食丸治乳食不消心腹脹滿壯熱喘粗嘔吐痰逆腸鳴泄瀉或食症乳癖痃氣痞結並皆治之巴豆霜當歸米泔浸炒硃砂代赭石醋煅焠七次枳殼炒木香各五錢麝香一分上為末糊丸麻子大每服一二丸溫米飲下更量兒加減枳朮丸白朮四兩枳實二兩上為末荷葉包煨爛飯為丸桐子大每服四五十丸空心白滾湯下阿魏膏治一切癖塊痞結更服胡連丸羌活獨活玄參官桂赤芍藥穿山甲生地黃兩頭尖大黃白芷天麻各五錢槐柳桃枝各三錢紅花四錢木鱉十枚去殼亂髮如雞子大一團上用香油二斤四兩煎黑去渣入發煎化仍去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合香油乳香沒藥各五錢麝香三錢調勻即成膏矣攤貼患處內服丸藥黃丹須用真正者效凡貼膏藥先用朴硝隨患處鋪半指厚以紙覆上用熱尉斗尉良久如硝耗再加尉之二時許方貼膏藥若是疳積加蘆薈末同尉六味地黃丸方見腎臟四君子湯異功散六君子湯三方見內釣四味肥兒丸方見嘔吐大蕪荑湯一名沖和湯蝦蟆丸九味蘆薈丸三方見疳症白朮散方見積痛積滯經曰五臟之積曰積六腑之積曰聚凡小兒積滯或作痛皆由乳哺不節過餐生冷脾胃不能克化停滯中脘久而成積或因飽食即臥脾失運化留而成積其症面目黃腫腹痛膨脹壯熱足冷嗜臥不思乳食大便餿臭或祕澀小便如油若吐乳瀉乳所出酸臭者為乳積腹脹作瀉嘔吐噦氣者為食積初患元氣未損之時或腹脹作痛大小便不利者先用白餅子或木香檳榔丸下之下後以白朮散或五味異功散和之渴加乾葛吐加半夏下而熱不退或作嘔作瀉飲食不思此脾胃俱傷也用六君子湯手足指冷喜飲熱湯此脾胃虛寒也前方加炮薑木香面色黃白目無精光脾肺俱虛也用四君子加柴胡升麻腹痛泄利下重或小便不利者用四逆散發熱晡熱或瀉不已脾氣下陷也潮熱口渴大便不調欲變疳症也並用補中益氣湯佐以肥兒丸經云邪之所湊其氣必虛留而不去其病乃實必以調脾為主而以消導佐之古人所謂養正積自除正此意也治驗一小兒每停食身發赤暈用清中解鬱湯而愈後患搖頭咬牙痰盛發搐吐出酸腐待其吐盡翌日先與七味白朮散次與參苓白朮散遂不復作若吐後兒安更不必服藥也一小兒飲食積滯患嘔吐發熱服消導等劑飲食已消而熱未退余以為胃經虛熱用六君升麻柴胡各二分四劑而愈一小兒七歲停食後腹痛服克伐之劑而益加按之不痛此脾氣復傷也用六君子湯而愈後復傷食服保和丸及三稜檳榔之類而更腹痛服瀉黃散體重善噫此脾氣虛而下陷也仍用六君升麻柴胡木香而愈一小兒數歲間每停食輒服峻利之藥後肚腹膨脹嘔吐泄瀉先用六君子湯諸症漸愈又用補中益氣湯而安一小兒腹脹飲食後即瀉手足逆冷此脾氣虛寒也先用人參理中丸後用六君子湯而愈一小兒腹痛以手按之痛益甚此乳食停滯也用保和丸末一錢檳榔末三分下酸臭糞而安後患腹痛別服峻利之劑其痛益甚手按則已面色黃白此因飲食失宜脾氣不調土虛不能生金也用六君子湯而愈一小兒久患腹痛診其母右關脈弦緩乃木剋土也用六君子湯加木香柴胡母子並服而愈一小兒停食腹痛面色白黑睛少手足常冷大便不實口鼻吸氣腹中陰冷此稟命門火衰不能溫蒸中州之氣故脾胃虛寒也用八味丸補中益氣湯而愈一小兒患前症服驅逐之劑更惡寒發熱余朝用補中益氣湯夕用五味異功散尋愈後飲食停滯腹痛便祕別用疏導之劑朝寒暮熱大便頻數余用五味異功散月餘飲食漸進乃佐以八珍湯內芍藥炒焦川芎些少又兩月寒熱漸愈後又傷風服參蘇飲汗出喘嗽發熱服清熱化痰之劑更煩熱不寐尋衣撮空先用六味地黃丸料水煎服諸症頓退再劑而安卻用五味異功散八珍湯而痊後因傷食吐瀉大便欲去而不去欲了而不了先用補中益氣湯數劑不應改用人參五錢白朮三錢陳皮甘草各七分升麻四分乾葛五分三劑又手足並冷急用人參一兩附子五分薑棗水煎一日服二劑手足始溫又二劑諸症漸退仍用前人參五錢之方治之而愈七味白朮散治吐瀉作渴人參二錢五分白茯苓白朮藿香葉各半兩木香二錢甘草一錢乾葛半兩渴加一兩上每服一二錢水煎熱渴甚去木香肚痛加芍藥四逆散治少陰病或腹中痛泄痢下重枳實炒黃甘草炒柴胡芍藥上為細末每服二錢空心米飲調下白餅子方見發搐木香檳榔丸方見積滯五味異功散六君子湯二方見內釣補中益氣湯方見虛羸
