body:
  text: 卷一初誕法小兒在胎稟陰陽五行之氣以生臟腑百骸借胎液以滋養受氣既足自然生育分娩之時口含血塊啼聲一出隨即咽下而毒伏於命門遇天行時氣久熱或飲食停滯或外感風寒驚風發熱等因發為瘡疹須急於未啼時用軟帛裹指挖去其血用黃連豆豉朱蜜甘草解之後雖出痘亦輕矣有咽入即時腹脹嘔吐短氣不乳者用茯苓丸治之但黃連性寒若稟母氣膏粱積熱者宜服若滋味淡薄胎氣元弱者又不宜用其硃砂固能解毒恐金石鎮墜不若只以牛黃分許蜜調與吮為佳世多用犀角解毒丸其胎氣虛寒虛弱者反傷脾胃生氣甚致不育又有嬰兒因其難産或冒風寒而垂危者切不可便斷臍帶急烘綿絮包抱懷中急以胎衣置火中煨燒更用大紙捻於臍帶上往來燎之使暖氣入腹須臾氣復自蘇尤戒沐浴恐腠理不密元氣發泄而外邪乘之也黃連法臨月用黃連細切為末綿裹百沸湯拭口甘草法預以甘草細切少許臨産時以綿裹沸湯泡盞內覆溫收生之際以軟棉裹指蘸甘草汁拭其口次用黃連法朱蜜法朱蜜法用黃連細切沸湯泡良久濾淨拭兒口中吐去惡汁更與硃砂一大豆許細研以蜜一蜆殼抹於兒口服之非獨鎮心定魄安神解毒更能益肝膽除煩熱辟邪氣也又牛黃法與朱蜜同少加牛黃能益肝膽除熱定精神止驚邪辟邪氣除小兒百病茯苓丸赤茯苓黃連胎冷用芍藥枳殼炒各等分上為末煉蜜丸如桐子大每服一丸乳汁化下護養法巢氏云小兒初生肌膚未實宜用舊絮護其背不可太暖更宜數見風日則血氣剛強肌肉緻密若藏於重幃密室或厚衣過暖則筋骨軟脆不任風寒多易致病衣服當隨寒熱加減但令背暖為佳亦勿令出汗恐表虛風邪易傷乳哺亦不宜過飽若宿滯不化用消乳丸治之陳氏所謂忍三分寒吃七分飽頻揉肚少洗澡要肚暖頭涼心胸涼皆至論也須令乳母預慎七情六淫厚味炙煿則乳汁清寧兒不致疾否則陰陽偏勝血氣沸騰乳汁敗壞必生諸症若屢用藥餌則臟腑陰損多致敗症可不慎歟大抵保嬰之法未病則調治乳母既病則審治嬰兒亦必兼治其母為善消乳丸縮砂仁陳皮京三稜煨蓬朮煨神麯麥芽各半兩香附子炒一兩以上為末麵糊丸麻子大每服二三丸白湯下噤風撮口臍風小兒初生噤風者因胎中受熱毒流心脾生下復為風邪所搏致眼閉口噤啼聲不出舌上如粟口吐白沫在百日內見撮口者因胎熱兼風自臍入於心脾致面目黃赤氣息喘急啼聲不出舌強唇青聚口撮面腹脹青筋吊腸牽痛吐白沫者不救法當疏利臍風者因斷臍之後為水濕風邪入於心脾致腹脹臍腫四肢柔直啼不吮乳甚者發搐先用龍膽湯天麻丸之類以去痰涎後用益脾散之類補脾胃若臍邊青黑手拳口噤是為內搐不治受病之源皆因乳母七情氣鬱厚味積熱所致若爪甲黑伸引努力臍突者用大連翹飲子之類又斷臍不盈尺多患此者以舊綿燒灰摻之齒齦有泡如粟以帛裹指蘸溫水擦破口即開不用藥七日內患者百無一生古人治法大率如此又田氏治噤風用天南星末一錢片腦少許以指蘸薑汁擦齦立開丹溪用赤足蜈蚣去足炙為末以豬乳調五分徐徐灌之或用牛黃以竹瀝調服一字隨以豬乳滴於口中聖惠方用鬱金藜蘆瓜蒂為末水調搐鼻中錢氏云撮口因浴後拭臍風邪所入而作用益黃散補之無擇云視其齒齦有泡擦破口即開用真白殭蠶為末蜜調塗口內保嬰集云小兒百日臍風馬牙當作胎毒瀉足陽明火用針挑破以桑樹白汁塗之又云初生小兒時時宜敷桑汁不然多有舌硬撮口之症竊謂臍風果因浴拭外傷皮膚者用綿灰或枯礬抹擦之即愈若因乳母肝脾鬱怒致兒為患當治其母若因剪臍短少或因束縛不緊或因牽動風入臍中或因鐵器斷臍冷氣傳於脾絡以致前症者口內有水泡急掐破去其毒水以艾炙臍中亦有生者千金龍膽湯治月內臍風撮口四肢驚掣發熱吐乳及變蒸客忤鬼氣驚癇加人參當歸龍膽草炒黑鉤藤鉤柴胡黃芩炒桔梗芍藥炒茯苓甘草各二錢五分蜣螂二枚去翅足大黃煨二錢五分上為末每服一二錢水煎量兒加減天麻丸治鉤腸鎖肚撮口天南星炮二錢白附子牙硝天麻五靈脂全蠍焙各一錢輕粉五分巴豆霜一字上為末每服一字薄荷湯調下定命丹治天釣撮口通利痰熱全蠍七枚天麻南星炮白附子各二錢五分硃砂青黛各一錢五分輕粉麝香各五分片腦一字上為末米糊丸緑豆大每服一丸荊芥薄荷湯下先研半丸吹入鼻中銀硃丸治胎風壯熱痰盛翻眼口噤或胎中蘊毒水銀和棗肉研全蠍南星硃砂各一錢白附子一錢五分蘆薈牛黃各三分鉛霜五分和水銀研片腦一字麝香五分真殭蠶炒七個上為末米糊丸芥子大每服三丸薄荷湯下紫霜丸治變蒸發熱不解或食癇先寒後熱或乳哺失節宿滯不化腹痞嘔吐或大便酸臭代赭石煅用醋淬七次赤石脂各二兩杏仁五十個麵炒巴豆仁三十枚去膜油心上先將杏仁巴豆研成膏入代赭石脂末研勻湯浸蒸餅丸粟米大每服三五丸米飲送下消食丸方見黃疸控痰散治風噤先用此藥吐風涎次與益胃散和胃又與辰砂膏利驚握拳噤口者不治蠍尾銅青各五分硃砂一錢膩粉一字麝香少許上為末每服一字茶清調下輕者勿用或以甘草湯吐之甘草湯治撮口甘草生一錢上水煎以綿球蘸吮令出痰涎卻以豬乳點入口中即瘥益胃散白茯苓人參甘草木香濕紙裹煨草果煨陳皮厚朴薑製紫蘇子炒各等分上為末每服一錢薑棗水煎辰砂膏治眼閉口噤啼聲不出吮乳不得口吐白沫辰砂三錢硼砂馬牙硝各一錢五分玄明粉全蠍真珠各一錢麝香一分上為末每服一豆許諸驚薄荷湯下潮熱甘草湯下月內用乳汁調塗乳頭令吮之蔥號散治初生小兒七日不小便蔥白三寸人乳共同搗如泥敷兒口內即與吮乳蠶號散治初生兒七日不乳名撮口殭蠶四個去嘴略炒茯苓少許共為末蜜調敷兒口內殭蠶膏治撮口用真殭蠶三枚去嘴略炒為末蜜調搽口中撮風散治撮口鉤藤鉤硃砂赤腳蜈蚣半條真殭蠶焙蠍稍各一錢麝香一字上為末每服一字竹瀝調下瓜蒂散治臍風撮口瓜蒂七個赤小豆秫米各七粒上為末用一豆許吹兩鼻內令出黃水更調服吐黃水即瘥大連翹湯治胎熱臍風小便不通及諸般瘡毒連翹瞿麥荊芥木通赤芍藥當歸防風柴胡滑石蟬殼甘草炒各一錢山梔子黃芩各五分上為末每服二錢加紫草水煎熱甚加大黃更詳症加減安臍散羚羊角一錢略炒亂髮一團燒令存性蜈蚣一條赤足者炙上為末斷臍後即敷之以絹帕緊束恐犯風也脈法錢仲陽云小兒之脈氣不和則弦急傷食則沉緩虛驚則促急風則浮冷則沉細脈亂者不治水鏡訣云陰陽運合男女成形已分九竅四肢乃生五臟六腑部分既別逆順難明若憑寸口之浮沉必乃橫亡於孩子須明虎口辨別三關消詳用藥始無差誤未至三歲看虎口食指第一節名風關脈初見易治第二節名氣關脈見病深難治第三節名命關脈見死不治三關青是四足驚赤是水驚黑是人驚紫色瀉利黃色雷驚三關通度是極驚之症必死或青或紅有紋如線一直者是乳食傷脾必發驚熱左右一樣者是驚與積齊發有三條或散是肺生風痰或似齁䶎聲有赤是傷寒及嗽如紅火是瀉紅黑相兼主下痢青多白痢紅多赤痢紫色相兼加渴虎口脈紋亂主胃氣不和青是驚與積青黑髮慢驚脈入掌乃內釣指紋曲里風盛彎外食積此論三歲以上之法若三歲以下更用一指按高骨乃分三關定其息數呼吸八至為平脈九至不安十至危困浮主風沉遲主虛冷實主有熱緊主癲癇洪主熱盛沉緩主虛瀉微遲有積有蟲遲澀主胃脘不和沉主乳食難化沉細主乳食停滯緊弦主腹中熱痛牢實主大便祕沉而數者骨中有熱弦長是肝膈有風緊數乃驚風為患四肢掣顫浮洪乃胃口有熱沉緊主腹痛有寒虛濡者有氣又主慢驚芤主大便利血四歲以下用一指依轉尋三部以關為準七八歲移指少許九歲次第依三關部位尋取十一十二歲亦同十四十五歲依大方脈部位診視凡看脈先定浮沉遲數陰陽冷熱沉遲為陰浮數為陽更兼看部位青主驚風白主虛瀉赤主痰熱黑色病甚黃主脾疳以此相按察病治療庶無誤矣又全幼心鑑云小兒半歲之際有病當於額前眉端髮際之間以名中食三指曲按之兒頭在左舉右手在右舉左手食指為上中指為中名指為下三指俱熱主感風邪鼻塞氣粗發熱咳嗽若三指俱冷主外感風寒內傷飲食發熱吐瀉若食中二指熱主上熱下冷名中二指熱主夾驚之疾食指熱主胸滿食滯又當參辨脈形主之流珠形主飲食所傷內熱欲吐或腸鳴自利煩躁啼哭用助胃膏消飲食分陰陽若食消而病仍作用香砂助胃膏以補脾胃環珠形主脾虛停食胸膈脹滿煩渴發熱用五味異功散加山楂枳實健脾消食後用六君子湯調養中氣長珠形主脾傷飲食積滯肚腹作痛寒熱不食先用大安丸消其積滯次以異功散健其脾氣來蛇形主脾胃濕熱中脘不利乾嘔不食此疳邪內作先用四味肥兒丸治疳後用四君子湯補脾去蛇形主脾虛食積吐瀉煩渴氣短喘急不食困睡先用六君子湯加枳實健脾消積次以七味白朮散調補胃氣弓反里形主感冒寒邪哽氣出氣驚悸倦怠四肢稍冷小便赤色咳嗽吐涎先用惺惺散助胃氣祛外邪後以五味異功散加茯神當歸養心血助胃氣若外邪既解而驚悸指冷脾氣受傷也宜用七味白朮散補之若悶亂氣粗喘促哽氣者難治脾虛甚故也弓反外形主痰熱心神恍惚夾驚夾食風癇痰盛先以天麻防風丸祛外邪又用五味異功散調中氣槍形主風熱生痰發搐先用抱龍丸如未應用牛黃清心丸若傳於脾肺或過用風痰之藥而見一切諸症者專調補脾胃魚骨形主驚痰發熱先用抱龍丸治之如未應屬肝火實熱少用抑青丸以清肝隨用六味丸以補肝或發熱少食或痰盛發搐乃肝木克脾土用六君子湯加柴胡補脾土以制肝木水字形主驚風食積胸膈煩躁頓悶少食或夜啼痰盛口噤搐搦此脾胃虛弱飲食積滯而木剋土也先用大安丸消導飲食次以六君鉤藤鉤補中清肝若已服消食化痰等劑而病不愈者用四君升麻柴胡鉤藤鉤升補脾氣平制肝木針形主心肝熱極生風驚悸頓悶困倦不食痰盛搐搦先用抱龍丸祛風化痰次用六君子加鉤藤鉤平肝實脾透關射指形主驚風痰熱聚於胸膈乃脾肺虧損痰邪乘聚先用牛黃清心丸清脾肺化痰涎次用六君子湯加桔梗山藥補脾土益肺金透關射甲形主驚風肝木剋制脾土之敗症急用六君木香鉤藤鉤官桂溫補脾土未應即加附子以回陽氣多得生者嘗聞古人云小兒為芽兒如草之芽水之漚蓋因臟腑脆嫩口不能言最難投劑當首察面色而知其所屬次驗虎口以辨其所因實為治法之簡要也流珠只一點紅色環珠差大長珠圓長以上非謂圈子總皆經脈貫氣之如此來蛇即是長珠散一頭大一頭尖去蛇亦如此分上下朝故曰來去角弓反張向里為順向外為逆槍形直上魚骨分開水字即三脈並行針形即過關一二粒米許射甲命脈向外透指命脈曲里雖然余常治之亦有不專執其形脈而投劑者蓋但有是症即服是藥而亦多驗治驗一小兒發熱吐瀉腹脹不乳其紋如流珠此脾胃氣傷先用香砂助胃膏後用六君子湯痊愈一小兒寒熱作嘔飲食不入按其腹乃哭脈紋如長珠此飲食停滯也用大安丸吐瀉宿滯遂安但唇目抽動大便稀黃此病邪去而虛熱所迫也用六君子湯加鉤藤鉤而愈一小兒胸腹膨脹發熱頓悶脈紋如環珠以手按腹即哭此屬脾胃虛而飲食停滯也先用保和丸一服前症如失更加煩渴按其腹而不哭此宿食去而脾胃復傷也用五味異功散加柴胡治之頓瘳一小兒不時乾嘔乳食不進肚腹膨脹脈形如來蛇此脾胃虛而成疳也用四味肥兒丸治疳佐以四君加蕪荑健中而痊後傷飲食吐瀉完穀形氣甚困四肢微搐視其紋如去蛇余曰且勿用藥次日吐止但搐而瀉青黃此脾土虛而肝木勝也用六君子加鉤藤鉤而瘥一小兒未及周歲氣短喘急乳食少進時或吐乳視其形如去蛇乃脾傷而食積先用六君子加山楂枳實漸愈後乳食復傷吐瀉作渴先與胃苓膏繼與白朮散而愈一小兒睡臥驚悸發熱痰盛脈形如弓之向外此因驚木旺傷脾而食不消也先以天麻防風丸祛風定驚後用五味異功散壯脾止搐全瘥一小兒沉默昏倦肢冷驚悸其紋如弓之向里此屬胃氣虛而外感寒邪也先用惺惺散以解外邪調胃氣諸症頓愈但手足逆冷又用六君子湯調補元氣而安一小兒患咳嗽服牛黃清心丸加喘促腹脹余視其右臉色赤紋指如槍屬脾氣復傷用六君子湯頓安一小兒沉困發熱驚搐不乳視其脈紋如亂魚骨此風熱急驚之症也先用抱龍丸少許祛風化痰後用六君子湯加柴胡壯脾平肝而愈一小兒咳嗽發熱右臉赤色作渴煩悶倦怠少食肚腹作脹脈紋如針此風邪傷肺而飲食傷脾也先用六君子湯加桔梗杏仁柴胡一劑諸症少愈後去杏仁柴胡再劑而安一小兒發熱夜啼乳食不進昏迷抽搐痰盛口噤脈紋如水字此脾肺氣虛風木所乘痰食積於胸腹也先用大安丸後用六君子加鉤藤鉤而愈一小兒發熱右臉赤咳嗽痰盛其脈紋透關射指余以為風邪蘊結於肺而痰作也用二陳加桑皮杏仁桔梗治之自用發散降火之劑風痰不退發熱益甚余曰此脾肺氣虛治失其宜遂用五味異功散加炒桔梗漸愈又用六君子湯而痊一小兒停食發熱服芩連三稜厚朴等劑飲食日少胸腹膨脹其紋透至指甲用補中益氣湯加木香鉤藤鉤溫補脾氣平制肝木數劑漸效又用六君子湯加炮薑治之而安其間間泛用金石腦麝祛逐之劑變驚而歿者不勝枚舉惜哉香砂助胃膏方見熱吐五味異功散六君子湯二方見內釣大安丸方見虛羸四味肥兒丸方見嘔吐四君子湯方見內釣七味白朮散方見腹痛惺惺散天麻防風丸二方見咳嗽抱龍丸方見傷寒牛黃清心丸方見急驚抑青丸方見驚啼六味丸方見腎臟保和丸方見虛羸胃苓湯方見霍亂吐瀉二陳湯方見寒冷嘔吐變蒸巢氏云小兒變蒸者以長氣血也變者上氣蒸者體熱仲陽云變者易也又云變蒸者自內而長自下而上又身熱故每變畢即覺性情有異於前何者長生臟腑意智故也何謂三十二日長骨添精神人有三百六十五骨以象天數以應期歲以分十二經絡自初生至三十二日一變生癸屬足少陰經腎藏精與志六十四日二變一蒸生壬屬足太陽經膀胱腑其發耳與骫冷腎與膀胱合俱主於水天一生水地六成之至九十六日三變生丁屬手少陰經心藏神其性為喜至一百二十八日四變二蒸生丙屬手太陽經小腸腑其發汗出而微驚心與小腸合為火地二生火天七成之至一百六十日五變生乙屬足厥陰經肝藏魂喜哭至一百九十二日六變三蒸生甲屬足少陽經膽腑其發目不閉一作開而赤肝與膽合主木天三生木地八成之至二百二十四日七變生辛屬手太陰經肺藏魄主聲至二百五十六日八變四蒸生庚屬手陽明經大腸腑其髮膚熱而汗或不汗肺與大腸合主金地四生金天九成之至二百八十八日九變生己屬足太陰經脾藏意與智至三百二十日十變五蒸生戊屬足陽明經胃腑其發不食腹痛而吐乳脾與胃主土天五生土地十成之又手厥陰經心包絡為臟手少陽經三焦為腑此一臟一腑俱無狀故不變而不蒸也前十變五蒸乃天地之數以生成之此後如生齒能言知喜怒故云始全也太倉云氣入四肢長碎骨於十變後六十四日為一大蒸計三百八十四日長其經脈手受血故能持物足受血故能行立經云變且蒸謂蒸畢而足一歲之日有餘也師曰不汗而熱者發其汗大吐者微止不可別治又六十四日為二大蒸計四百四十八日又六十四日為三大蒸計五百一十二日至五百七十六日變蒸既畢兒乃成人也變者生五臟也蒸者養六腑也變者上氣蒸者發熱每經一變一蒸情態即異輕則發熱微汗其狀似驚重則壯熱脈亂而數或汗或吐或煩啼躁渴輕者五日解重者七八日解其候與傷寒相似亦有變蒸之餘續感寒邪者但變蒸則耳冷骫冷上唇發泡如濁珠若寒邪搏之則寒熱交爭腹中作痛而啼叫之聲日夜不絶變者易也蒸於肝則目眩微赤蒸於肺則嚏咳毛聳凡五臟六腑筋脈骨循環各有證應其治法平和者解表之實熱者微利之可服紫霜丸黑散子柴胡湯有寒無熱並吐瀉不乳多啼者當歸散調氣散主之變蒸之外小兒體貌情態自然平和大抵人得中和之道以為純粹陰陽得所剛柔兼濟氣血和而百脈順所以心智益通精神俱備臟腑充實形體固壯齒細發黑聲洪睡穩此乃受氣充足稟性得中而無疾爾前症蓋小兒所不免者雖勿藥亦可也前藥峻烈非惟臟腑之不勝抑且反傷氣血余常見一小兒至一變發熱有痰投抱龍丸一粒卒至不救觀此可驗慎之慎之其有不熱不驚略無症候而暗變者蓋受胎氣壯實故也紫霜丸方見撮口紫陽黑散治變蒸解利熱氣麻黃二兩不去節大黃半兩杏仁去皮二分半研上以前三味和一處杵碎略燒存性後入杏仁膏和之蜜盛貯每用一豆許乳汁和咽之柴胡湯治變蒸骨熱心煩啼叫不已人參二錢甘草微炙二錢麥門冬去心二錢龍膽草酒炒黑防風各一錢柴胡五分上每服一錢水煎當歸散治變蒸有寒無熱當歸二錢木香官桂辣者甘草炙人參各一錢上每服一錢薑棗水煎調氣散治變蒸吐瀉不乳多啼欲發慢驚木香香附子人參橘皮藿香甘草炙各一錢上為末每服一錢薑棗水煎服肝臟錢仲陽云肝主風實則目直大叫項急煩悶虛則咬牙呵欠氣熱則外生風氣溫則內生風大青膏散之若能食飲水不止用大黃丸微下之肝熱則目直不搐手尋衣領及亂捻物瀉青丸主之壯熱飲水喘悶瀉白散主之肝病秋見肺怯不能勝肝也當用益黃散補脾瀉青丸治肝肝有風則目連眨得心熱則搐用瀉青丸治肝導赤散治心甚則身反張目直不搐心不受熱也當用地黃丸補腎瀉青丸治肝唇白者不治又張潔古云肝主風自病則風搐拘急若心乘肝為實邪肺乘肝為賊邪腎乘肝為虛邪凡肝得病必先察其肺腎腎者肝之母肺者肝之賊今肝之得病若非腎水不能相生必是肺金鬼邪來克故其來在肺先治其肺攻其鬼也其來在腎先補其腎滋其源也然後審其本臟之虛實而寒溫之竊謂前症若肝經實熱而外生風者宜用大青膏散之若既服而前症仍作或益甚者此邪氣已去而脾氣虧損也宜用異功散加芎歸補之若肝經虛熱或因克伐而內生風者宜用異功散地黃丸補之若風邪入臟能食飲冷大便祕結者此邪氣內實也宜用大黃丸下之若既下而食少飲湯或腹作脹者此脾氣內虛也宜用白朮散補之氣血素弱或因病後或服攻伐之劑而手尋衣領咬牙呵欠目淡青者乃肝經虛甚也急用地黃丸以補腎肝哽氣短氣長出氣乃肺經虛甚也急用異功散以補脾肺若申酉時叫哭直視呵欠頓悶項急驚悸手足搖動發熱飲水者此風火相搏而勝肺金也用柴胡梔子散以治肝火生肝血用異功散補脾土生肺金若唇白者為脾絶不治夫嬰童之症多因妊娠厚味七情或兒乳哺失宜或乳母飲食鬱怒所致病氣既見形氣已虛當推其所因用藥加漏蘆以治其母兒飲一二匙後仿此大青膏治傷風痰熱發搐天麻青黛各一錢白附子烏蛇酒浸取肉焙蠍尾各五分天竺黃煨麝香各一字上為末生蜜丸豆大每用半粒薄荷湯化下大黃丸治風熱裡實口中氣熱二便祕赤飲水不止黑牽牛一半生一半炒川芎各半兩甘草一錢大黃一兩酒洗飯上蒸上為末糊丸麻子大每服數丸溫蜜水乳後服以溏利為度大小用愚按前症既屬裡實二便祕法當疏下若初服雖未通利而病勢已退不可再服如二便未利病勢未退當減數丸研化服之恐過劑則元氣傷而變病也瀉青丸治急驚發搐眼赤睛疼當歸龍膽草炒川芎防風大黃炒羌活梔仁各等分上為末煉蜜丸芡實大每服一丸砂糖湯化下愚按前方足厥陰經解散肌表疏通內熱之藥也若大便祕結煩渴飲冷飲食如常者屬形病俱實宜用此以瀉之若大便調和煩渴飲冷目淡青色屬病氣實而形氣虛宜用抑肝散平之若大便不實作渴飲湯飲食少思肢體倦怠者屬形病俱虛宜用地黃丸補之大抵前症若因肝經血虛風熱先用四物湯加鉤藤鉤以生肝血次用四君子湯以補脾土若因肝經血燥痰盛用地黃丸滋腎水生肝木四君加芍藥實脾土以平肝木若因攻伐而致脾土虛寒者急用六君子湯加丁香木香溫補脾土否則必變慢脾風也抑肝散治肝經虛熱發搐或痰熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡臥不安軟柴胡甘草各五分川芎八分當歸白朮炒茯苓鉤藤鉤各一錢上水煎子母同服如蜜丸名抑青丸小柴胡湯加山梔牡丹皮名加味小柴胡治肝膽經風熱瘰癧寒熱往來口晡發熱潮熱身熱不欲飲食或怒火口苦耳聾咳嗽或脅痛胸滿小便不利或泄瀉吐酸苦水或肢體搐動唇目抽札並宜用之方見變蒸異功散方見天釣地黃丸方見臟腑白朮散方見積滯柴胡梔子散方見諸熱導赤散方見心臟四物湯方見急驚四君子湯六君子湯二方見內釣加味清胃散方見天釣補中益氣湯方見虛羸心臟錢仲陽云心主驚實則叫哭發熱飲水而搐虛則困臥驚悸不安又云熱則睡中口氣溫及上竄咬牙而合面臥有就冷之意皆心熱也導赤散主之若抑面臥者乃心氣實氣不得上下流通也瀉心散主之心病冬見火勝水也當補腎治心輕者病自愈下竄不語者腎虛怯也又張潔古云心主熱若肺乘心為微邪肝乘心為虛邪脾乘心為實邪腎乘心為賊邪凡心臟得病必先調其肝腎肝氣通則心氣和肝氣滯則心氣乏此心病先求其肝清其源也五臟受病必傳其所勝腎之邪必傳於心故先治其腎逐其邪也若肝腎脈俱和然後察其心家虛實治之竊謂仰面臥者因其心胸實熱故喜仰面而向虛也合面臥者因心胸虛熱故喜合臥而就實也實則調治心肝虛則調補脾肺二者別之盡其狀矣其咬牙等症多有雷同不必拘泥如用瀉心導赤等劑邪氣雖去而病仍作當調補元氣或反甚急溫補元氣其心氣冬見或亥子時病益甚或下竄不語者乃腎水虛而心火甚也用地黃丸其乳下嬰兒須母服之錢氏瀉心散治心經實熱黃連上為末每服五分臨臥溫水化下愚按前症若叫哭發熱作渴飲水抽搐有力仰面而睡者屬心經實熱宜用瀉心散或導赤散若發熱飲湯抽搐乏力驚竄咬牙合面而睡者屬心經虛熱用補心散若喘嗽面赤壯熱飲水肺乘心也用瀉白散若搖頭目札身熱抽搐肝乘心也用柴胡清肝散若合目昏睡泄瀉身熱脾乘心也用瀉黃散若竄視驚悸咬牙足熱腎乘心也用安神丸若因乳母致症亦用前藥以治其母導赤散治小腸實熱小便祕赤生地黃木通甘草等分上為末每服一錢入淡竹葉水煎愚按瀉心散導赤散瀉心小腸實火之劑蓋心為脾母脾為心子然心既病則脾土益虛矣用者審之錢氏生犀散治心經虛熱地骨皮赤芍藥柴胡乾葛各一兩甘草五錢犀角二錢鎊上為末每服一二錢水煎新增愚按前方云治心經虛熱其所用藥多屬瀉心瀉肝經之劑虛熱二字恐魯魚也如心經自病而血虛熱者用祕旨安神丸脾虛奪心之氣而熱者用祕旨補脾湯肝木不能生心火而虛熱者用地黃丸祕旨安神丸治心血虛而睡中驚悸或受驚嚇而作人參半夏湯泡酸棗仁炒茯神各一錢當歸酒洗橘紅赤芍炒各七分五味子五粒杵甘草炙三分上為末薑汁糊丸芡實大每服一丸生薑湯下地黃丸方見腎症補心散方見驚啼瀉白散方見肺臟柴胡清肝散方見熱症瀉黃散方見脾臟祕旨補脾湯方見驚啼脾臟錢仲陽云脾主困實則困睡身熱飲水或不飲水虛則吐瀉生風脾胃虛寒則面㿠白目無精光口鼻氣冷肌體瘦弱吐水腹痛不思乳食用益黃散下利用調中丸傷風手足冷者脾臟怯也先用益黃散補脾後用大青膏發散脾病見四季皆仿此順者易治逆者難治脾怯當面赤黃若兼五臟相勝隨症治之又張潔古云脾主濕自病則泄瀉多睡體重昏倦若肝乘脾為賊邪心乘脾為虛邪肺乘脾為實邪腎乘脾為微邪凡脾之得病必先察其肝心二臟蓋肝是脾之鬼心是脾之母肝氣盛則鬼邪有餘心氣虧則生氣不足當用平肝氣益心氣若診其脈肝心俱和則脾家自病察其虛實而治之竊謂前症實者病氣實而形氣虛也若面色㿠白吐瀉腹痛口鼻氣冷屬寒水侮土宜用益黃散若面青唇黯吐瀉手足並冷此脾土虛寒用乾薑理中湯若面色痿黃手足不冷此脾土虛弱用人參理中湯若傷風手足並冷吐痰咳嗽吐瀉腹脹此脾肺氣虛用五味異功散實脾氣加防風升麻散外邪若發於寅卯之時用六君柴胡升麻補脾土平肝木然面黃者脾之本色也面赤者火生土為順面青者木剋土為逆當平其所勝以補元氣為善大青膏方見肝臟調中丸方見脾胃虛寒人參安胃散治脾胃虛弱傷熱乳食嘔吐瀉痢人參一錢黃耆二錢生甘草炙甘草各五分白芍藥酒炒七分白茯苓四分陳皮三分黃連炒二分上為末每服二錢水煎愚按東垣云益黃散內有丁香青皮之辛熱蓋為寒水侮土而設也若因熱藥巴豆之類損其脾胃或因暑熱傷乳食而成吐瀉口鼻氣熱而致慢驚者宜用前散益黃散治脾虛吐瀉不食米穀不化困倦力少滑腸夜起並疳虛盜汗涎流口角陳皮一兩丁香二錢訶子炮去皮青皮去白甘草炙各半兩上為末每服一錢水煎服愚按前症若脾土虛寒或寒水侮土而嘔吐泄瀉手足並冷或痰涎上壅睡而露睛不思乳食宜用此方若因脾土虛弱吐瀉者用六君子湯加柴胡如不應或手足俱冷屬虛寒也更加木香炮薑若因乳母脾虛肝侮必治以前藥若乳母鬱怒致兒患前症母服加味歸脾湯錢氏瀉黃散一名瀉脾散治脾熱吐舌藿香葉甘草各七錢五分山梔仁一兩石膏五錢防風二兩上用蜜酒微炒為末每服一二錢水煎愚按前症若作渴飲冷臥不露睛手足熱甚或遍身發黃屬胃經實熱宜用瀉黃散若作渴飲湯臥而露睛手足並冷屬胃經虛熱宜用異功散若面青搐搦乳食少思肝乘脾也用祕旨補脾湯若面赤驚悸身熱昏睡心乘脾也用祕旨安神丸若面白喘嗽肢體倦怠肺乘脾也用補中益氣湯若唇黑泄瀉手足指冷腎乘脾也用益黃散病後津液不足口乾作渴宜用七味白朮散若乳母膏粱厚味七情鬱火所致當審其因而治其母人參理中湯方見傷寒表裡五味異功散六君子湯二方見天釣內釣肺臟錢仲陽云肺主喘實則悶亂喘促或飲水虛則哽氣出氣短氣若肺盛復感風寒則胸滿氣急喘嗽用瀉白散肺熱則手掐眉目鼻面用甘桔湯肺虛熱則唇色深紅少用瀉白散肺怯則唇色白用阿膠散若悶亂氣粗喘促哽氣者難治肺病久唇白者此脾肺子母皆虛也若白如豬脂者吉白如枯骨者死如肺病春見肺勝肝也用地黃丸補肝腎瀉白散以治肺目淡青必發驚更有赤者當搐為肝怯也又張潔古云肺主燥自病則喘嗽燥則潤之若心乘肺為賊邪肝乘肺為微邪腎乘肺為實邪脾乘肺為虛邪凡肺之得邪必先觀心脾二臟之虛實若心火鑠金當抑心滋肺若脾氣虛冷不能相生而肺氣不足則風邪易感宜補脾肺若脾實中痞熱氣上蒸於肺宜瀉脾氣若心脾平和而肺自病當察虛實治之竊謂肺經鬱熱用瀉白散肺氣自虛用四君子湯外邪所乘用參蘇飲心火炎爍用人參平肺散中焦實痞用大承氣脾不能生肺用異功散夫肺氣盛者肺中之邪氣盛也其脈右寸必浮而有力宜用瀉白散以瀉之若肺虛而有熱者執肺熱傷肺之説而不用人參誤矣仍參某症治之瀉白散化痰止咳寬氣進食地骨皮桑白皮炒各一兩甘草炙一錢上為末每服一二錢入粳米百粒水煎愚按活人方云喘者肺氣盛而有餘然氣盛當認作氣衰有餘當認作不足蓋肺氣盛者肺中之火盛也有餘者肺中之邪有餘也其脈右寸必浮而有力右頰色赤用前藥以瀉之前症若乳母感冒風寒肺經蘊熱致兒為患用參蘇飲若乳母膏粱醇酒積熱致兒是病用清胃散甘桔湯治風熱上攻咽喉疼痛及喉痹妨悶苦梗一兩甘草炒二兩上每服二錢水煎阿膠散治肺虛咳嗽喘急或咳而哽氣喉中有聲阿膠一兩蛤粉炒鼠黏子二錢五分炒香甘草一錢炙馬兜鈴半兩炒杏仁七個去皮尖糯米一兩上每服一二錢水煎愚按前方乃直治肺金之劑經云虛則補其母若前藥未應當用五味異功散以補脾地黃丸方見腎臟四君子湯方見內釣參蘇飲方見諸熱人參平肺散方見咳嗽大承氣湯方見傷寒表裡異功散清胃散二方見天釣內釣腎臟錢仲陽云腎主虛無實症惟痘瘡實則黑陷更當分別症之虛實假如肺病又見肝症咬牙呵欠者易治肝虛不能勝肺也若目直視大叫哭項急煩悶者難治蓋肺病虛冷肝強實而勝肺也視病新久虛實虛則補其母實則瀉其子夫腎虛者由胎氣不盛則神短囟開目多白睛面色㿠白此皆難養縱長不過八八之數若恣色欲不及四旬而亡或有因病而致腎虛者又云腎氣不足則下竄蓋腎虛骨重惟欲墜下而縮身也腎水陰也腎虛則目無精光畏明皆用地黃丸腎病見夏水勝火也輕者病自退重者當驚發搐又張潔古云腎主寒自病則足脛寒而逆腎無實瘡疹黑陷乃實是水制火也若心乘腎為微邪肺乘腎為虛邪肝乘腎為實邪脾乘腎為賊邪本臟虛弱正令不行鬼賊克害當補本臟之正氣假令肺病喘嗽見於初春當補腎見於夏救肺見於秋救脾見於冬補心瀉本臟乃名寒嗽大抵五臟各至本位即氣盛不可更補到所克部位不可更瀉然五行之中惟腎水一臟母盛而反受邪何則肺屬金射於皮毛所主者氣腎屬水主於骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上此物性之自能今肺氣得熱而上蒸則不能下生於腎而受邪矣急服涼藥解之此腎病必先求肺或脾經之濕刑剋於腎宜去脾濕若脾肺平和而腎自病則察其本臟而治之竊謂下竄等症足不喜覆者蓋腰以下皆腎所主乃心氣下行於腎部也法用地黃丸壯腎水以制心火若因脾肺虛而不能生腎水者用補中益氣湯六味地黃丸以滋化源其瘡疹黑陷乃腎虛而邪氣實也尤當用地黃丸地黃丸熟地黃八錢杵膏山茱萸肉乾山藥各四錢澤瀉牡丹皮白茯苓各三錢上為末入地黃膏量加米糊丸桐子大每服數丸溫水空心化下行遲鶴膝加鹿茸牛膝五加皮愚按前丸治腎肝血虛燥熱作渴小便淋祕痰氣上壅或風客淫氣患瘰結核或四肢發搐眼目瞤動或咳嗽吐血頭目眩暈或咽喉燥痛口舌瘡裂或自汗盜汗便血諸血或稟賦不足肢體瘦弱解顱失音或畏明下竄五遲五軟腎疳肝疳或早近女色精血虧耗五臟齊損或屬腎肝諸症不足之症宜用此以滋化源其功不可盡述補中益氣湯方見虛羸
