body:
  text: 卷四風熱風症中風之症西北方有之東南氣溫腠理疏泄人患之者皆類中風也況小兒元氣未充皮毛不固易虛易實外邪乘之則壯熱抽掣氣粗涎湧甚至昏憒口噤即似中風誤以續命等湯投之多至不救大人且無真中況小兒乎凡有前症當辨其因若陽明經氣虛風邪所乘筋脈拘急者為外因足厥陰肝火熾盛筋脈偏急者為內因脾肺虛弱腠理不密外邪乘入或急驚風過服金石之劑耗損肝血或吐瀉後內亡津液不能養肝致口眼喎斜者皆肝血不足肝火生風之類中風之類症也治驗藥方散見各症痙症發痙之症因傷風汗出誤發汗或濕症汗多所致若項背強直腰背反張搖頭掣瘲噤口不語發熱腹痛病在足太陽也若面目赤色無汗惡寒牙關緊急肢體反張痰涎壅盛昏憒煩渴小便赤澀先譫語而發者名剛痙當發汗若大便滑泄不語不渴有汗而不惡寒先手足厥冷而發者名柔痙並以小續命湯加減主之剛痙去附子用麻黃柔痙用附子去麻黃若壯熱譫語口乾手足微寒大便滑泄此兼剛柔無汗用葛根湯有汗用桂枝加葛根湯若痰塞氣盛用南星半夏茯苓以消痰枳實陳皮紫蘇以順氣更審其熱輕者用敗毒散熱盛者用小柴胡湯壯熱有汗胸滿口噤咬牙便閉為內熱以大承氣湯下之後用大柴胡湯解之過三日則難治此皆治六淫外傷元氣形病俱實之法也若小兒多因驚駭停食或乳母六淫七情飲食起居失宜所致更當審之兼治其母大要因驚目直呵欠項強頓悶屬肝經實熱用抑肝散咬牙呵欠手尋衣領屬肝經虛熱用地黃丸若肺金不能平木用異功散脾不能養肝用六君子湯水不能生木用地黃丸治驗一小兒感冒發熱咳嗽咬牙余以為脾肺氣虛不信乃用解散之藥果項強口噤汗出不止手足並冷遂用五味異功散加柴胡木香治之漸愈但日晡微熱睡而露睛用補中益氣湯而痊一小兒因驚發熱誤行表散出汗面白日晡發痙先兄謂脾肺氣虛而肝膽邪盛以六君子加柴胡升麻治之乃發於寅卯時此肝邪自旺也用加味逍遙散一劑其熱頓退又用補中益氣湯六味地黃丸而愈一小兒患瘰癧潰而發痙頓悶咬牙寒熱此屬肝經風熱先用柴胡梔子散一劑寒熱頓止次用四物參耆白朮柴胡漸止又用補中益氣湯加芍藥茯苓而痊一小兒頭患瘡潰而發痙或寒熱作渴或手足厥冷其脈洪大浮緩按之皆微細此元氣虛而邪氣實也用十全大補湯加柴胡山梔數劑諸症漸退而脈漸斂又十餘劑而愈一小兒驚風服抱龍丸保生錠吐涎甚多又汗出發痙仍欲祛痰余曰此肝脾血虛而內生風耳吐痰不止脾肺氣虛不能攝涎也汗出發痙脾肺氣虛而亡陽也用六君子湯加炮薑木香頓愈又用四君子加歸耆而安一小兒傷風發熱服解散之藥汗出不止痓症悉具其脈洪大鼓指按之微細此汗多亡陽脾肺氣虛之症也用異功散加芎歸黃耆其汗頓止又用補中益氣湯而痊一小兒停食腹痛發熱嘔吐服峻厲之劑更吐瀉汗多手足並冷發痙不止其脈浮洪按之如絲用六君子湯加升麻炮薑痙症頓已惟寒熱往來又用四君升麻柴胡而愈少參王陽湖孫女年八歲發痙服降火消導之劑其脈浮洪寒熱如瘧余用四君子加升麻柴胡炮薑鉤藤鉤及補中益氣湯間服漸愈但脅下作痛去炮薑加木香肉桂而痊一小兒因乳母大怒發熱脅痛亦患前症兼汗出作嘔先用小柴胡湯一劑子母俱服頓愈但日晡潮熱以異功散加升麻柴胡治之並愈一小兒因乳母發熱吐瀉一小兒因乳母食厥昏憒同患前症各治其母而子悉愈桂枝加乾葛湯治頭痛項背強𠘧𠘧汗出惡風者桂枝芍藥甘草葛根四錢上每服二錢薑棗水煎小柴胡湯治身熱惡寒風痙項強直急胸脅滿痛嘔噦煩渴寒熱往來或身面皆黃小便不利大便祕澀或驚過不解潮熱不除及瘥後勞復發熱疼痛如瘧發作有時方見肝臟加味小柴胡湯即小柴胡湯加山梔牡丹皮保生錠子治慢驚尚有陽症全蠍白附子炮殭蠶牛膽南星蟬蛻琥珀辰砂各一錢麝香五分防風一錢上為末糊搜和捏成錠子金銀箔為衣用薄荷湯磨服大柴胡湯治表裡熱大便祕澀胸滿脅痛柴胡枳實各二兩二錢半夏一兩五錢赤芍藥一兩八錢黃芩二兩大黃三兩七錢五分上生薑紅棗煎不拘時服小續命湯方見五硬抑肝散方見肝臟地黃丸方見腎臟敗毒散方見發熱六君子湯五味異功散二方見內釣補中益氣湯方見虛羸加味逍遙散方見內釣柴胡梔子散方見發熱四物湯方見急驚十全大補湯八珍湯加黃耆肉桂即四君四物二湯合用抱龍丸方見傷寒四君子湯方見內釣大承氣湯治剛痙胸滿內實口噤咬牙大熱發渴大便祕澀大黃芒硝各五錢厚朴一兩枳實葛根湯治太陽病項強𠘧𠘧惡風無汗及惡寒剛痙葛根四兩麻黃三錢桂一兩上每服二錢水煎夜啼夜啼有二曰脾寒曰心熱也夜屬陰陰勝則脾臟之寒愈盛脾為至陰喜溫而惡寒寒則腹中作痛故曲腰而啼其候面青白手腹俱冷不思乳食是也亦曰胎寒用鉤藤散若見燈愈啼者心熱也心屬火見燈則煩熱內生兩陽相搏故仰身而啼其候面赤手腹俱緩口中氣熱是也用導赤散若面色白黑睛少屬腎氣不足至夜陰虛而啼也宜用六味丸若兼泄瀉不乳脾腎虛弱也用六神散若兼吐瀉少食脾胃虛寒也用六君炮木香大便不化食少腹脹脾氣虛弱也用異功散心血不足者祕旨安神丸木火相搏者柴胡梔子散肝血不足者地黃丸大抵此症或因吐瀉內亡津液或稟賦腎陰不足不能滋養肝木或乳母恚怒肝木侮金當用六君子湯補脾土以生肺金地黃丸壯腎水以滋肝木若乳母鬱悶而致者用加味歸脾湯乳母暴怒者加味小柴胡湯乳母心肝熱搏柴胡梔子散仍宜參客忤驚啼覽之治驗一小兒發熱夜啼乳食不進昏迷抽搐痰盛口噤此脾肺氣虛風木所乘痰食積於胸腹也先用大安丸後用六君鉤藤鉤而痊一小兒三歲面白夜啼小便青而數此肺腎虛弱朝用補中益氣湯加肉桂一分夕用地黃丸而愈大凡小兒面色青黑睛少或解顱足熱者出痘多在腎經預用地黃丸補腎氣多得無恙者一小兒二歲夜啼面色赤黑睛色淡小便頻赤朝用補中益氣湯加山藥五味夕用地黃丸而愈龍齒散治拘哭肚痛驚熱龍齒蟬蛻鉤藤鉤羌活茯苓各等分上為末每服一錢水煎服碧雲散治渾身壯熱夜啼柏葉二分南星殭蠶全蠍鬱金雄黃各一錢上為末每服一字用薄荷湯入蜜調服六神散治腹痛面色青口中氣冷及四肢俱冷曲腰而啼或泄瀉不乳人參山藥白朮各五錢甘草炒二錢茯苓扁豆炒各一兩上為末每服二錢薑二斤棗水煎一方有芍藥當歸人參各二錢五分甘草桔梗陳皮桂各一錢愚按前症悉屬脾土虛寒元氣下陷本方更加柴胡升麻升提元氣而補脾土為善神緑散全蠍去足翅不拘多少青薄荷焙乾上為末每服半錢薄荷湯調下無擇燈花散治心燥夜啼燈花三二顆上研細用燈草煎湯調塗口中乳汁送下日三服一法用燈花塗乳上令兒吮之無燈花用燈草燒灰辰砂少許亦妙或用燈花七枚硼砂一字辰砂少許蜜調塗唇上立安安神散治夜啼蟬蛻四十九枚只用後半段截去前半段並去足翅上為末分四服用鉤藤鉤湯調下人參黃連散治心經蘊熱夜啼人參二錢五分黃連一錢五分炒炙甘草五分竹葉二十片上薑水煎服太乙丹治睡驚夜啼青糞桔梗一兩五錢藿香葉五錢川芎二錢五分白芷三錢白扁豆五錢炒上為末煉蜜丸櫻桃大辰砂麝香為衣每服半丸薄荷湯送下糞色青棗湯下夜啼燈心鉤藤湯下加白朮茯苓白芍藥尤妙地黃散治身熱口乾咳嗽心煩生地黃五錢麥門冬去心七錢杏仁炮去皮尖款冬花陳皮各三錢甘草炙二錢半上為末每服二三錢水煎溫服鉤藤散方見慢驚導赤散方見心臟地黃丸方見腎臟六君子湯五味異功散二方見內釣祕旨安神丸方見發搐即十味安神丸柴胡梔子散方見諸熱症即柴胡清肝散加味歸脾湯方見內釣小柴胡湯方見痘症大安丸即保和丸加白朮方見內釣補中益氣湯方見虛羸悲哭悲哭者肺之聲淚者肝之液也若六脈弦緊者先以溫湯浸其身取汗次以涼膈散之類清其內熱此張子和治法如此若因乳母怒火遺熱於肝肝火炎熾反侮肺金金木相擊故悲哭有聲者宜用六君柴胡山梔以補脾清肝用六味丸以壯水生木有因驚風過服祛風燥血之藥而致者有因吐瀉內亡津液而致者及稟父腎陰不足不能生肝者治各審之若小兒忽然大叫作聲者不治此稟腎陰不足虛火炎上故也用六味丸多有生者仍參覽夜啼客忤驚啼重舌口瘡天釣內釣等症治驗一小兒每忽哭白睛多每悲面色赤余謂稟賦腎虛火妄動而然也用地黃丸半載後雖哭而面色不赤諸症皆愈一周歲兒痰嗽哭不已用抱龍丸少止良久亦然余視其右腮潔白左腮青赤此肺肝二經相擊而作先用瀉白散祛肺邪次用柴胡梔子散平肝木後用地黃丸滋腎水而痊一小兒瘈瘲啼叫額間青黑此驚風肝木乘脾腹中作痛也先用六君子湯加木香柴胡鉤藤鉤啼叫漸緩更加當歸又二劑而安一小兒發熱夜啼乳食不進昏迷抽搐痰盛口噤脈紋如水字此脾肺氣虛風木所乘痰食積於胸腹也先用大安丸後用六君子加鉤藤鉤而痊涼膈散方見瘡傷防風通聖散方見風症六君子湯方見內釣六味地黃丸方見腎臟抱龍丸方見傷寒瀉白散方見肺臟柴胡梔子散方見發熱大安丸即保和丸加白朮方見內釣胎症小兒胎症謂胎熱胎寒胎黃胎肥胎弱是也胎熱者初生旬日之間目閉色赤眼胞腫啼叫驚煩壯熱溺黃此在胎中受熱及膏粱內蘊宜用清胃散之類胎寒者初生百日內或手足攣屈或口噤不開此在胎母過食生冷或感寒氣宜用五味異功散之類胎黃者體目俱黃小便祕澀不乳啼叫或腹膨泄瀉此在胎母過食炙煿辛辣致生濕熱宜用生地黃湯之類熱盛者瀉黃散之類胎肥者肌肉稟厚遍身血色彌月後漸瘦五心煩熱大便不利口吻流涎此受母胃熱所致也乳母服大連翹飲兒用浴體法以疏通其腠理胎弱者面無精光肌體瘦薄身無血色大便白水時時哽氣目無精神亦宜用浴體法消風散治諸風上攻頭目昏眩項背拘急肢體煩疼肌肉顫動耳若蟬鳴鼻塞多嚏皮膚頑麻瘙癢癮疹目澀昏困白茯苓芎藭羌活荊芥穗防風藿香葉白殭蠶炒去絲嘴蟬蛻微炒甘草厚朴去皮薑汁製陳皮炒上為末每服半錢茶清或薄荷湯調下荊芥湯亦可生地黃湯治妊娠食酒面五辛積熱小兒生下遍體面目皆黃也乳母仍忌酒面五辛等物生地黃芍藥川芎當歸各等分上每服五錢水煎産婦服仍滴兒口數滴大連翹飲方見噤風撮口瀉黃散方見脾臟清胃散異功散二方見內釣浴體法方見發搐解顱囟填囟陷錢仲陽云小兒解顱或久不合者因腎氣有虧腦髓不足故兒多愁少喜目睛多白而身瘦蓋人之腦髓如木無根有數歲而成廢人者服錢氏地黃丸更用南星微炮為末米醋調敷緋帛烘熱貼之其柏子仁散三辛散封囟散俱效夫腎主骨腎氣實則腦髓充而囟早合骨脈盛而齒早生腎氣怯則腦髓虛而囟不合此由父母精血不足宜用地黃丸補之若在乳下當兼補其母更以軟帛緊束其首使其易合皆虛火上衝當調補脾腎為喜囟填囟陷亦因所稟腎氣不足及乳哺失宜脾胃虧損所致夫脾主肌肉氣逆上衝而為填脹元氣下陷而為囟陷也並用補中益氣湯地黃丸及用狗頭骨炙黃為末以雞子清調敷囟門亦有瀉痢氣血虛脾胃不能上充者亦用前法若手足並冷前湯加薑桂未應虛寒甚也急加附子緩則多致不救治驗一小兒顱解足軟兩膝漸大不能行履用六味地黃丸加鹿茸治之三月而起一小兒十四歲解囟自覺頭大視物昏大畏日羞明此稟賦腎氣怯弱用六味丸加鹿茸及補中益氣湯加山藥山茱萸半載愈二載而囟合既婚之後仍覺囟門開解足心如炙喜其斷色欲薄滋味日服前藥二劑三載而愈後入房兩腿痿軟又教以服前丸守前戒而愈一小兒年十四歲而近女色發熱吐痰至有室兩目羞明頭覺脹大仍不斷欲其頭漸大囟門忽開用地黃丸益氣湯之類斷色欲年餘而愈一小兒年十三歲患前症內熱晡熱形體倦怠食少作渴用六味丸加鹿茸補之不越月而痊一小兒吐瀉發熱囟陷作渴用七味白朮散母子並服而愈一小兒久病發熱其囟或陷或填手足或溫或冷余用補中益氣湯加蔓荊子炮薑治之而安一小兒囟陷吐瀉手足並冷用白朮散加木香炮薑治之而愈後傷食腹痛手足復冷用六君炮薑治之更加昏憒口角流涎此脾胃虛寒之甚也急加附子遂愈一小兒病後其囟或陷或填此脾胃虛熱也朝用補中益氣湯加蔓荊子炮薑木香治之而囟平但作瀉口乾用白朮散以生胃氣而愈柏子仁散治囟門不合防風一兩五錢柏子仁一兩上為末乳汁調塗囟門十日自合三辛散治腦角骨大囟門不合細辛桂心各五錢乾薑一錢上為末乳汁調塗囟上干時再塗玉乳丹治解顱鍾乳粉如法制熟地黃自法制杵膏柏子仁研膏當歸各半兩防風補骨脂各一錢上各另為末入二膏加煉蜜丸黍米大每服一二十丸煎茴香湯送下加黃耆茯苓亦可封囟散方見發搐地黃丸方見腎臟濟生當歸散方見黃疸目症經曰目者五臟六腑之精榮衛魂魄之所常營也神氣之所常主也又曰諸脈者皆屬於目目得血而能視五臟六腑精氣皆上注於目而為之精故白睛屬肺黑睛屬肝瞳人屬腎上下胞屬脾兩眥屬心而內眥又屬膀胱五臟五色各有所司心主赤赤甚心實熱也用導赤散赤微者心虛熱也用生犀散肝主青青甚者肝熱也用瀉青丸淡青者肝虛也用地黃丸脾主黃黃甚者脾熱也用瀉黃散淡黃者脾虛也用異功散目無睛光及白睛多黑睛少者肝腎俱不足也用地黃丸加鹿茸晝視通明夜視罔見者因稟陽氣衰弱遇夜陰盛則陽愈衰故不能視也用沖和養胃湯凡赤脈翳物從上而下者屬足太陽經用東垣選奇湯從下而上者屬足陽明經用局方流氣飲蓋翳膜者風熱內蘊也邪氣未定謂之熱翳而浮於外邪氣已定謂之冰翳而沉於內邪氣既深謂之陷翳宜升發之退翳之藥佐之若上眼皮下出黑白翳者屬太陽寒水從外至內者屬少陽風熱從下至上緑色者屬足陽明及肺腎合病也疳眼者因肝火濕熱上衝脾氣有虧不能上升清氣故生白翳睫閉不開眵淚如糊久而膿流遂至損目用益氣聰明湯茯苓瀉濕湯及四味肥兒丸目閉不開者因乳食失節或過服寒涼之藥使陽氣下陷不能升舉故目不開用柴胡復生湯若胃氣虧損眼睫無力而不能開者用補中益氣湯暴赤腫痛者肝火熾盛也用龍膽瀉肝湯多淚羞明者肝心積熱也用生犀散亦有肝腎虛熱者用地黃丸風沿爛眼者膈有積熱也用清胃散時時作癢者膿潰生蟲也用點藥紫蘇膏眼睫連札者肝經風熱也用柴胡清肝散若生下目黃壯熱大小便祕結乳食不思面赤眼閉者皆由在胎時感母熱毒所致兒服瀉黃散母服地黃丸若乳母膏粱積熱致兒目黃者令母服清胃散若肢體面目爪甲皆黃小便如屋塵色者難治又有痘疹後餘毒未盡上侵於目者屬腎肝虛也用滋陰腎氣丸前症多宜審治其母兼調其兒厥有未盡悉詳原機啓微中宜參考之治驗一女子年十四因恚怒先月經不行寒熱脅痛後兩目生翳青緑色從外至內余謂寒熱脅痛足厥陰之症也翳從外眥起足少陽之症也左關脈弦數按之而澀肝驚風熱兼血滯也遂以加味逍遙散加防風龍膽草四服而寒熱脅痛頓減用六味丸月餘而翳消一小兒十五歲兩目白翳腹膈遍身似疥非疥晡熱口乾形體骨立此肝疳之症也用六味肥兒丸而痊後陰莖作癢小便澄白瘡疥益焮狀如大風用大蘆薈四味肥兒丸諸症漸愈又用大蕪荑湯而痊一小兒白睛多吐痰發搐先用抑青丸四服而痰搐止後用地黃丸年許而黑睛多一小兒白睛多三歲不能行語聲不暢兩足非熱則冷大便不實朝用補中益氣湯加五味子乾山藥以補脾肺夕用地黃丸加五味子牛膝鹿茸補肝腎不三月而瘥一小兒眼白腿軟兩足熱面似愁容服地黃丸兩月餘漸健服年餘白睛漸黑出痘無恙一小兒雀盲眼札服煮肝丸而目明服四味肥兒丸而目不札一小兒目無光芒視物不了了飲食少思大便不調服大蕪荑湯九味蘆薈丸而愈後飲食停滯妄用消導克伐之劑目症仍作至晚尤甚用人參補胃湯漸愈又用五味異功散四味肥兒丸而痊一小兒九歲素有肝火兩目生翳服蘆薈肥兒等丸隨愈至十四歲後遇用心過度飲食不節即夜視不明用補中益氣湯人參補胃湯四味肥兒丸而愈一小兒眼泡微腫咳嗽噁心小便泔白余謂脾疳食積以五味異功散為主佐以四味肥兒丸而愈後不節飲食夜視不明余曰此脾胃復傷須補養為主不信乃服峻厲之劑後變風症竟不起一小兒因發熱表散出汗眼赤發搐審其母素有肝火發熱以異功散加柴胡升麻子母並服稍愈又用加味逍遙散其熱頓退繼用補中益氣湯六味地黃丸子母尋瘥一小兒目赤作痛咬牙寒熱余謂肝經風熱用柴胡飲子一劑而赤痛止又用四物參耆白朮柴胡而寒熱退又用補中益氣湯而飲食加一小兒眼素白或青患眼赤作痛服降火之劑眼如血貫脈洪大或浮緩按之皆微細用十全大補湯加柴胡山梔數劑外症漸退而脈漸斂又數劑而愈一小兒停食腹痛服巴豆之藥更加目赤作痛寒熱往來飲食少思手足並冷余用六君升麻炮薑諸症頓愈惟寒熱未已用四君柴胡升麻而安一小兒眼赤痛服大黃之藥更加寒熱如瘧余謂脾胃復傷用四君升麻柴胡炮薑鉤藤鉤而寒熱愈又用補中益氣湯間服而目疾痊一小兒因乳母恚怒患發熱等症兒患目痛兼作嘔吐先用小柴胡湯子母俱服頓安但兒晡熱仍嘔以異功散加升麻柴胡治之而瘥一小兒生下目黃三日面赤黃一小兒旬日內目黃而漸至遍身此二者胎稟胃熱各用瀉黃散一服皆愈一小兒旬日面目青黃此胃熱胎黃也用瀉黃散以乳調服少許即愈後復身黃吐舌仍用前散而安一小兒患目黃知其乳母食鬱身黃所致以越鞠丸治母瀉黃散治子並愈一小兒面青寒熱形氣瘦弱眼目生翳用九味蘆薈丸五味異功散目翳漸退乃以四味肥兒丸五味異功散而肌肉生一小兒眼每生翳皆因乳母恚怒而作用九味蘆薈丸柴胡梔子散母子服之並愈一小兒乳哺失節服藥過劑腹脹少食大便不調兩眼生花服治眼之藥漸生浮翳余用異功散加當歸柴胡飲食漸進便利漸調少佐以九味蘆薈丸其眼漸明乃用人參補胃湯肥兒丸而痊一小兒未周歲目內有翳余謂此稟母肝火所致詢其母果素多恚怒現患瘰癧目疾自乳其子余用地黃丸治之其母稍愈後彼無此藥其子遂瞽一小兒十二歲傷寒咳嗽發熱服發散之藥目漸不明服降火等藥飲食日少目漸生翳余謂中氣虛用人參補胃湯飲食漸進又用千金補肝丸及熏眼之法而痊一女子十二歲目生白翳面黃浮腫口乾便泄用四味肥兒丸而痊一小兒目羞明癮澀兩足發熱大便不實食少時咳仍欲治肝祛風余曰兩足發熱小便不調腎肝虛也大便不實食少時咳脾肺虛也朝用補中益氣湯夕用六味地黃丸元氣漸復乃佐以四味肥兒丸又月餘而瘥一小兒目痛恪服瀉火治肝之藥反加羞明癮澀睡中驚悸悲啼此肝經血虛火動傷肺也用五味異功散加山梔補脾肺清肺金用地黃丸滋腎水生肝血而安乃兼服四味肥兒丸而瘥一小兒目青發搐直視叫哭或用牛黃清心丸加咬牙頓悶小便自遺余謂肝經血氣虛甚也用補中益氣湯及六味地黃丸而痊一小兒發搐目札屬肝膽經風熱先用柴胡清肝散治其肝後用地黃丸補其腎而愈一小兒目痛兼癢因膏粱積熱仍口渴飲冷便祕先用瀉青丸疏導肝火更用清胃散煎熟磨生犀角服之以解食毒又用四味肥兒丸以治肝症而瘥一小兒目疾久不愈用大蕪荑湯五劑蟾蜍丸數服又用四味肥兒丸而愈一小兒十四歲用功勞苦半載後自汗盜汗形體殊倦朝用補中益氣湯加五味子蔓荊子夕用十全大補湯尋愈畢姻後因唾痰頭暈恪服清痰理氣之藥忽目不能開余用地黃丸十全大補湯三月餘而痊吳江史萬湖之孫自乳兒時患目疾年二十目札頭搖用金匱腎氣丸愈而復作兩目生翳用聰明益氣湯並前丸既愈而復發形體消瘦脈數洪大用補中益氣湯及前丸而瘥一小兒因驚眼札或搐先用加味小柴胡湯加蕪荑黃連以清肝熱又用地黃丸以滋腎生肝而痊一小兒兩目連札或色赤或時拭眉此肝經風熱欲作肝疳也用四味肥兒丸加龍膽草而瘥一小兒白睛多吐痰發搐用地黃丸為主佐以抑青丸而搐止後用世傳方地黃丸而黑睛多一女子十四歲兩目作痛或發癢或頭暈或頭痛或兩脅作痛或寒熱內熱口渴少食經候不調此肝脾二經氣血虛而有熱也用補中益氣湯柴胡清肝散而愈後左眉上結一核如豆許漸大如栗腐而作痛此肝經火燥而血病也用加味逍遙散月餘腐肉自脫乃用八珍湯及前藥而愈一小兒十三歲目久痛漸生青緑翳後赤爛左關脈弦數用九味蘆薈丸加味逍遙散而愈畢姻後復發用滋陰腎氣丸為主佐以加味逍遙散而痊一小兒十五歲因大勞目赤作痛發熱作渴脈洪大而虛用八珍湯加炒黑山梔一劑諸症頓退又用補中益氣湯而痊後因夢遺目仍赤痛用六味地黃丸料加五味子二劑而痛止又三十餘劑而復明生犀散治心經虛熱生犀取末二錢地骨皮赤芍藥柴胡乾葛各一兩甘草五錢上每服二錢水煎生熟地黃散治眼初患之時因誤築到蹙肝受驚風致目腫赤痛癢生地黃洗熟地黃各一兩麥門冬五錢當歸甘草炙枳殼米泔水浸麵炒防風杏仁湯泡去皮尖用麵炒赤色赤芍藥各二錢五分上每服一錢黑豆七粒水煎犀角飲治脾火眼疼犀角一兩射干草龍膽炒黃芩炒各五錢人參二兩茯苓二錢五分鉤藤鉤七錢五分甘草三錢上每服一錢水煎牛黃丸治肝受驚遂致患目牛黃白附子肉桂全蠍芎藭石膏各三錢五分白芷藿香各五錢辰砂麝香各少許上各另為末煉蜜丸桐子大每服三丸臨臥薄荷湯化下乳母亦忌熱物之類世傳方地黃丸治腎虛目睛多白鹿茸五錢澤瀉茯苓山茱萸熟地黃牡丹皮牛膝各一兩上為末蜜丸桐子大每服二十丸鹽湯下羅氏煮肝丸治疳眼翳膜羞明大人雀目甚效夜明砂青蛤粉穀精草各一兩上為末每服二錢以豬肝批開攤藥在內麻纏定米泔水半碗煮肝熟取出湯傾碗內熏眼候湯溫分肝三服嚼吃就用肝湯下一日二服龍膽飲子治疳眼流膿生翳此濕熱為病青蛤粉五錢羌活草龍膽各三錢炒黃芩二錢蛇蛻五分麻黃二錢五分穀精草五分上為末每服二錢茶清調下東垣人參補胃湯治勞役飲食不節內瘴眼痛神效黃耆根人參各一兩炙甘草八錢蔓荊子一錢白芍藥炒黃柏各三錢酒拌炒四次上每服二三錢水煎稍熱服臨臥三五服千金方治雀盲地膚子五兩決明子一升上為末以米飲和丸每服二三十丸世傳方治雀盲蒼朮四兩米泔浸切片四兩焙上為末豬肝二兩批開摻藥在內用麻系定粟米一合水一碗砂鍋內煮熟熏眼候溫臨臥每服三錢大效聖惠方治雀盲不計時月用蒼朮一兩為末每服一錢本事方治小兒赤熱腫眼大黃白礬各等分上為末冷水調作餅子貼眼立效東垣廣大重明湯治兩瞼或兩眥赤爛熱腫疼痛及眼胞癢極抓之至破爛赤腫眼楞生瘡痂目多眵淚癮澀難開草龍膽防風生甘草根細辛苗葉各一錢上水一碗半煎龍膽至七分入余藥再煎至半碗熱洗日五七次洗畢閣眼須臾瘥東垣助陽和血補氣湯治發後熱壅白睛紅多眵淚癮澀此過服涼藥而真氣不能通九竅也防風七分黃耆一錢蔓荊子三分白芷二分升麻七分甘草炙柴胡當歸身酒洗各五分上㕮咀都作一服水一盞半煎至一盞去渣熱服臨臥避風處睡忌風寒及食冷物潔古方治眼赤暴發腫防風羌活黃芩炒黃連炒各等分上每服一錢水煎服如大便祕加大黃二分痛甚加川歸地黃各二分煩躁不得臥加梔子仁三分保命點眼藥除昏退翳截赤定痛當歸黃連各二錢防風二錢五分細辛五分甘草一錢上水一大碗文武火熬滴水中不散為度入熟蜜少許點用千金補肝散治目失明青羊肝一其去膜薄切以新瓦炙乾決明子蓼香一合熬令香上為末每服方寸匕日二服久而有驗本事方治太陽寒水陷翳膜遮睛防風白蒺藜各一兩羌活一兩半甘菊三兩上為末每服二錢入鹽少許百沸湯點服保命羚羊角散治水翳久不去羚羊角升麻細辛各等分甘草減半上為末一半蜜丸桐子大每服五七十丸一半泔水煎吞送丸子焮發陷翳亦羚羊角散之類用之在人消息若陰虛有熱者兼服神仙退云丸東垣補陽湯治陽不勝其陰乃陰盛陽虛則九竅不通令青白翳見於大眥乃足太陽少陰經中郁遏厥陰肝經之陽氣不得上通於目故青翳內阻也當歸太陽少陰經中是九泉之下以益肝中陽氣沖天上行此乃先補其陽後於足太陰標中瀉足厥陰之火下伏於陽中內經曰陰盛陽虛則當先補其陽後瀉其陰每日空心服升陽湯臨臥服瀉陰丸須預期調養體氣和平天氣晴明服之補其陽使上升通於肝經之末利空竅於目矣羌活獨活當歸身酒洗焙乾甘草稍熟地黃人參黃耆白朮各一兩澤瀉橘紅各半兩生地黃炒白茯苓知母炒黃色各三錢柴胡二兩防風白芍藥各五錢肉桂一錢上每服五錢水煎空心服候藥力行盡方可飲食東垣羌活退翳湯柴胡甘草黃耆各三錢羌活黃連五味子升麻當歸身各二錢防風一錢五分黃芩黃柏酒浸芍藥草龍膽酒洗各五錢石膏二錢五分上分二服水煎入酒少許臨臥熱服忌言語謙甫五秀重明丸治眼翳膜遮睛隱澀昏花常服清利頭目甘菊花五百個荊芥五百穗木賊去節五百根楮實五百枚上為末蜜丸桐子大每服五十丸白湯化下沖和養胃湯治內障初起視覺微昏空中有黑花神水變淡緑色次則視岐睹則成二神水變淡白色久則不睹神水變純白柴胡七錢人參當歸炙甘草乾生薑升麻葛根白朮羌活各一兩防風五錢黃耆一兩五錢白茯苓三錢白芍藥六錢五味子二錢上每服二錢水煎滋陰腎氣丸治神水寬大漸散昏如霧露中行漸睹空中有黑花視物二體久則光不收及內障神水淡白色者熟地黃三兩當歸尾牡丹皮五味子乾山藥柴胡各五錢茯苓澤瀉各二錢半生地黃酒炒四兩上為末蜜丸桐子大辰砂為衣每服十丸空心滾湯化下瀉熱黃連湯治內障有眵淚眊矂黃芩黃連生地黃並酒洗柴胡各一兩升麻五錢龍膽草三錢上每服一錢水煎午前服柴胡復生湯治紅赤羞明淚多眵少腦頂沉重睛珠痛應太陽眼睫無力常欲垂閉久視則痠疼翳陷下者藁本蔓荊子川芎羌活獨活白芷各二分半白芍藥炒炙甘草薄荷桔梗各四分蒼朮茯苓黃芩炒各五分柴胡六分五味子十二粒杵上每服二錢水煎食後服黃連羊肝丸治目中赤脈洪甚眵淚黃連為末白羯羊肝一具先以羊肝竹刀刮下如糊除去筋膜再擂細入黃連丸桐子大每服十丸茶清化下茯苓燥濕湯治小兒易飢而渴腹脹生瘡目痛生翳不開眵淚如膿俗謂疳毒眼白朮人參甘草炒枳殼麩炒茯苓蔓荊子薄荷各二分蒼朮前胡獨活各三分川芎羌活各三分半柴胡四分澤瀉一分半上每服二錢水煎局方菊睛丸治脾腎不足眼花昏暗枸杞子蓯蓉酒浸炒巴戟去心各一兩甘菊花四兩上為末蜜丸桐子大每服十丸空心白湯化下抑青丸方見驚啼加味逍遙散方見內釣大蕪荑湯方見疳症九味蘆薈丸方見諸症異功散方見內釣小柴胡湯方見痙症柴胡梔子散方見發熱蟾蜍丸方見諸疳耳症耳者心腎之竅肝膽之經也心腎主內症精血不足肝膽主外症風熱有餘或聾聵或虛鳴者稟賦虛也或脹痛或膿癢者邪氣客也稟賦不足宜用六味地黃丸肝經風熱宜用柴胡清肝散若因血燥用梔子清肝散未應佐以六味丸間服九味蘆薈丸若因腎肝疳熱朝用六味丸夕用蘆薈丸若因食積內熱用四味肥兒丸若因乳母膏粱積熱而致者宜加味清胃散脾經鬱結而致者加味歸脾湯肝經怒火而致者加味逍遙散皆令乳母服之兼與其兒少許不可專於治外不惟閉塞耳竅抑亦變生他症延留日久遂成終身之聵矣慎之治驗一小兒耳內出膿穢不可近連年不愈口渴足熱或面色微黑余謂腎疳症也用六味地黃丸令母服加味逍遙散而愈後因別服伐肝之藥耳症復作寒熱面青小便頻數此肝火血燥也用柴胡梔子散以清肝六味地黃丸以滋腎遂痊一小兒耳內出膿久不愈視其母兩臉青黃屬乳母鬱怒致之也遂朝用加味歸脾湯夕用加味逍遙散母子皆愈一小兒十二歲素虛羸耳出膿水或痛或癢至十四稍加用心即發熱倦怠兩腿乏力八年矣用補中益氣湯及六味地黃丸稍愈畢姻後朝寒暮熱形氣倦怠兩足心熱氣喘唾痰仍用前二藥佐以六君子湯而愈因後不守禁忌惡寒發熱頭暈唾痰余謂腎虛不能攝水而似痰清氣不能上升而頭暈陽氣不能護守肌膚而寒熱遂用補中益氣湯加蔓荊附子一錢四劑不應遂用人參一兩附子一錢二劑而應乃用十全大補湯百餘劑而痊又因大勞入房喉喑痰湧兩腿不遂用地黃飲子頓愈仍用十全大補湯而安後又起居失宜朝寒暮熱四肢逆冷氣短痰盛兩寸脈短用十全大補湯加附子一錢數劑而愈乃去附子用人參三錢常服始安一小兒耳中流膿項中結核眼目或札或赤痛小便或癢或赤澀皆肝膽經風熱之症也用四味肥兒丸悉愈一小兒因乳母恚怒兼經行之後多食炙煿兒遂耳內作痛出膿余先用加味小柴胡湯次用加味逍遙散令其母服之子母並愈一小兒耳出穢水屬肝腎不足先用九味蘆薈丸而痊畢姻後面黃發熱多病又用黃柏知母等藥更胸膈痞滿飲食少思痰涎上壅又利氣化痰加噫氣下氣余用六君子補中益氣二湯乾薑木香等味治之尋愈田氏紅玉散治小兒聤耳枯礬麝香干胭脂各等分上為末研勻先以綿杖子捻膿淨摻入少許湯氏龍黃散治如前枯礬龍骨黃丹各半兩麝香一錢上製法同前愚按前二方可以治腑症之輕者若系肝經風熱血燥等症必依前方論內服合宜之藥外用此以收膿濕亦無不可若專泥外攻而失內治謬矣六味地黃丸方見腎臟柴胡清肝散方見脅癰梔子清肝散方見熱症九味蘆薈丸方見疳症四味肥兒丸方見嘔吐加味清胃散加味歸脾湯加味逍遙散三方見內釣加味梔子散加味小柴胡湯方見痙症六君子湯四君子湯二方見內釣地黃丸方見腎臟七味白朮散方見積滯補中益氣湯方見虛羸二陳湯方見寒吐鼻塞鼻衄巢氏云鼻乃肺之竅皮毛腠理乃肺之主此因風邪客於肺而鼻塞不利者宜用消風散或用蔥白七莖入油膩粉少許擂攤絹帛上掌中護溫貼囟門因驚僕氣散血無所羈而鼻衄者用異功散加柴胡山梔左臉青而兼赤者先用柴胡清肝散後用地黃丸右臉赤乃肺大腸實熱也用瀉白散鼻色赤乃脾胃實熱也用瀉黃散微赤乃脾經虛熱也用異功散加升麻柴胡色深黃用濟生犀角地黃湯後用楊氏地黃丸淡白色用六君子湯頦間色赤用四物湯加山梔赤甚用五淋散小便赤色用六味丸補中益氣湯唇色白用六君子湯久不愈用麥門冬飲子若初病元氣未虧乳食如常發熱壯熱二便祕結作渴飲水臥不露睛者悉屬形病俱實當治邪氣若病久元氣以虧食少發熱口乾飲湯嘔吐泄瀉肢體畏寒臥而露睛者悉屬形病俱虛當補正氣為要治驗一小兒咳嗽噁心鼻塞流涕右腮青白此乃脾肺氣虛而外邪所乘也先用惺惺散咳嗽頓愈但飲食不思手足指冷用六君子少加升麻一劑而痊一小兒潮熱鼻衄煩渴便祕氣促咳嗽右腮色赤此肺與大腸有熱也用柴胡飲子一服諸症頓退後因驚復作微搐頓悶此肝脾氣血虛也用四君子加芎歸鉤藤鉤而愈一小兒遍身生疥挖鼻出血因肝脾有熱用四味肥兒丸而愈後食炙煿鼻血復出瘡疥復發先用清胃散二劑又用四味肥兒丸月餘而痊一小兒鼻衄滯頤作渴時汗乃胃經實熱也先用瀉黃散二服而滯頤止又用四味肥兒丸數服而鼻血愈後鼻不時作癢發渴便血用聖濟犀角地黃湯四劑母子並服別令兒童更服四味肥兒丸月餘而愈一小兒鼻衄發熱作渴右腮色青余謂肝火乘脾先用加味逍遙散母子並服熱渴漸止另用五味異功散少加柴胡升麻與子服之而愈一小兒鼻衄服止血之劑反見便血右腮色黃或赤此脾氣虛熱不能統血也用補中益氣湯又用五味異功散加柴胡升麻而愈一小兒鼻衄久不愈四肢倦怠飲食少思惡風寒此脾肺虛也先用五味異功散而鼻血止又用補中益氣湯而不畏風寒繼用四君少加柴胡升麻而痊愈一小兒鼻衄兩頦赤余謂稟賦腎氣不足虛火上炎也不信別服清熱涼血之藥病益甚余用地黃丸果效畢姻後虛症悉至用八珍渴地黃丸料尋愈一小兒鼻衄作渴喘嗽面赤此心火刑肺金也用人參平肺散及地黃丸料加五味子麥門冬煎服而痊楊氏地黃散治榮中有熱肺壅鼻衄生地黃赤芍藥當歸身川芎各等分上每服二三錢水煎熟入蒲黃少許春夏衄入地黃汁蒲黃各少許秋冬衄用車前草汁少許麥門冬飲子治吐血久不愈者五味子十粒麥門冬去心黃耆各一錢當歸身人參生地黃各五分上水煎服補中益氣湯方見虛羸清胃散異功散二方見內釣即五味異功散人參平肺散方見咳嗽柴胡清肝散方見熱症瀉白散方見肺臟瀉黃散方見脾臟犀角地黃湯即聖濟犀角地黃湯方見便血臟血五淋散方見五淋四君子湯方見內釣八珍湯即四君四物二湯合服也四君見天釣四物見急驚四物湯方見急驚惺惺散柴胡飲子二方見熱症四味肥兒丸方見嘔吐加味逍遙散方見內釣六味地黃丸方見腎臟龜胸龜背仲陽曰龜胸者肺熱脹滿攻於胸膈或乳母多食五辛及兒食宿乳而成當用龜胸丸或松蕊丹百合丹之類治之龜背者令兒早坐因客風吹脊入於骨髓所致以龜尿點背間骨節取龜尿之法當置龜於荷葉上候龜眼四顧急用鏡照之其尿自出又法當灸肺俞穴在第三椎骨下兩傍各開一寸五分心俞穴在第五椎骨下兩傍各開一寸五分膈俞穴在第七椎骨下兩傍各開一寸五分用艾如小豆大灸二五壯此多因小兒元氣未充腠理不密風邪所乘或痰飲蘊結風熱交攻而致法當調補脾肺為主而以清熱消痰佐之若因乳兒膏粱厚味者當以清胃散治其母子亦服少許龜胸丸大黃一錢煨天門冬去心焙百合杏仁麩炒木通枳殼麩炒桑白皮蜜炒甜葶藶炒朴硝各半兩上為末煉蜜丸芡實大每服一丸溫水食後化下枳殼防風丸枳殼麩炒防風獨活大黃煨前胡當歸酒洗麻黃去節各一錢上為末麵糊丸黍米大每服十丸食後米湯下松蕊丹治龜背花松枳殼防風獨活各一兩麻黃大黃前胡桂心各半兩上為末蜜丸黍米大每服數丸粥飲下量兒加減新增百合丸治龜胸背百合一兩木通朴硝桑白皮蜜炙杏仁去皮尖炒雙仁不用大黃煨天門冬各半兩上為末煉蜜丸緑豆大每服十丸食前溫酒化下
