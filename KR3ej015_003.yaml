body:
  text: 卷三急驚錢仲陽云急驚者因聞大聲或驚而發搐搐止如故此熱生於心身熱面赤引飲口中氣熱二便黃赤甚則發搐蓋熱甚生風陽盛而陰虛也宜以利驚丸除其痰熱不可用巴豆之藥蓋急驚者陽症也俱府受病而屬實乃少陽相火旺經曰熱則生風風生痰痰熱客於心膈間則風火相搏故抽搐發動經所謂木太過曰發生其動掉眩顛疾是也當用利驚丸導赤散瀉青丸等藥搐止與安神鎮驚丸婁全善亦曰急驚屬木火土實木實則搐而有力及目上視動札頻睫土實則身熱面赤而不吐瀉偃睡合睛治法宜涼宜瀉而用涼驚利驚等丸亦有因驚而發者牙關緊急壯熱涎潮竄視反張搐搦顫動唇口眉眼眨引口中熱氣頰赤唇紅二便祕結脈浮洪數緊此內有實熱外挾風邪當截風定搐若痰熱尚作仍微下之痰熱既泄急宜調養胃氣搐定而痰熱少退即宜調補脾氣東垣云若因外物驚者宜黃連安神丸因氣動所驚者宜安神鎮驚丸之類大忌防風丸如因驚而瀉青色宜硃砂丸大忌涼驚丸蓋急驚者風木旺也風木屬肝盛則必傳克於脾欲治其肝當先實脾後瀉風木若用益黃散則誤矣經曰邪氣盛則實正氣奪則虛前所云實者乃病氣有餘而形氣不足也當先瀉而後補虛甚急當補脾為先少以攻邪之藥佐之其所云虛者乃病氣形氣俱不足也當純補真氣為要若肝經風火相搏抽搐目瞤筋急痰盛者當用四物湯以生肝血加鉤藤鉤山梔以清肝火更用四君子以補脾六味丸以滋腎若肺金剋木而兼呵缺者用瀉白散以泄肺邪地黃丸以益肝血若邪入肝則用柴胡清肝散加龍膽草亦可邪入心用梔子清肝散加炒黃連亦通邪入腎用六味地黃丸邪入肺用地骨皮散邪入脾用六君子加柴胡山梔大抵此症屬肝膽經血虛風火相搏而善行數變者為多若不養肝血不補脾氣純用祛風化痰之藥則脾益虛血益損邪氣延綿必傳慢驚矣治驗一小兒九歲因驚發熱抽搐頓悶咬牙作渴飲冷便祕面色青赤而印堂左腮尤赤此心脾二經風熱相搏乃形病俱實之症也先用瀉青丸料炒黃連一劑大便隨利熱搐頓減繼用抑青丸一服諸症悉退但面色痿黃肢體倦怠飲食少思此病氣去而脾氣未復也用補中益氣湯及地黃丸而痊愈一小兒發熱抽搐口噤痰湧此膽經實火為驚風也先用瀉青丸一服六味丸二服諸症即退又用小柴胡湯加芎歸山梔鉤藤鉤次以補中益氣湯而痊一小兒忽然發熱目動咬牙驚搐痰盛或與祛風化痰藥益甚面色青黃乃肝木克脾脾之液為涎虛則涎不能攝上湧而似痰也法當生肝補脾則風自息痰自愈矣遂用六味丸及六君子湯而愈一女子十二歲善怒睡中抽搐遍身作癢飲食少思此肝經風熱脾土受克也用參朮柴苓湯以清肝健脾而愈一小兒三歲患急驚面赤發熱作渴飲冷用瀉青丸一服熱衰大半因見得效翌早又自制一服反加吐瀉發搐面色青白手足指冷此熱既去而妄自傷脾也用六君子薑桂升麻柴胡一劑得安是以前哲謂小兒易為虛實攻伐之藥衰其大半乃止不可過之羅謙甫約方約囊之論恪矣一小兒三歲因驚抽搐發熱痰盛久服抱龍丸等藥面色或赤或青此心肝二經血虛風熱生痰也用六味丸滋腎生血用六君柴胡升麻調補脾胃而安一小兒潮熱發熱左腮青赤此心肝二經血虛之症也用祕旨安神丸及四物湯加防風酸棗仁治之而愈一小兒潮熱發搐痰涎上湧手足指冷申酉時左腮青色隱白用補中益氣湯調補脾肺六味丸滋養肝腎而痊嘉興王一山女七歲因跌傷腿膝兩臁腫潰面色青潔左關無脈余謂驚則氣散而風熱鬱滯於肝故其脈隱伏用四君升麻柴胡鉤藤鉤一劑脈至隨愈一小兒印堂青黑至夜啼搐余謂脾土虛寒也用鉤藤飲而安後因驚發搐夜啼仍用前藥一劑諸症復愈又用異功散而痊一小兒七歲患急驚將愈而發熱驚悸誤服祛風化痰之劑更加驚搐吐痰喘嗽腹脹少食惡寒再用抱龍丸大便似痢寒熱往來殊類風症先君治之以為脾氣虧損諸經無所滋養而然用四君子湯為主少加升麻柴胡以升補陽氣而愈一小兒驚風后痰嗽不止睡臥不寧諸藥無效余用牛黃清心丸少許頓止後復傷風邪痰盛喘急飲食不下仍用牛黃丸少許而安再用異功散加桔梗而愈利驚丸治急驚痰盛發熱潮搐青黛輕粉各二錢牽牛末半兩上為末麵糊丸寒豆大每服十丸薄荷湯化下安神鎮驚丸驚退後調理安心神養氣血和平預防之劑也天竺黃另研人參茯神南星薑製各五錢酸棗仁炒麥門冬當歸酒炒生地黃酒洗赤芍藥炒各三錢薄荷木通黃連薑汁炒山梔炒辰砂另研牛黃另研龍骨煅各二錢青黛一錢另研上為末蜜丸緑豆大每服三五丸量兒大小加減淡薑湯送下四物湯治血虛發熱煩躁或晡熱作渴頭目不清若因脾虛不能生血者用四君子湯當歸熟地黃各二錢芍藥川芎各一錢上水煎服參朮柴苓湯人參白朮茯苓陳皮各一錢柴胡升麻各七分山梔炒八分鉤藤鉤一錢甘草炒五分每服一二錢薑棗水煎黃連安神丸治心經血虛頭暈神魂驚悸黃連酒洗六錢甘草炙五分生地黃當歸各一錢五分硃砂飛過五錢上為末飯糊丸梧桐子大每服十五丸空心白滾湯下如二三服不應當服歸脾湯補之牛黃清心丸治諸風瘛瘲語言蹇澀健忘恍惚頭目眩暈胸中煩郁痰塞喘嗽精神昏憒等症或小兒風熱上壅抽搐發熱或急驚痰盛發搐目反口噤或大人傷寒汗下之後煩躁發熱不解並宜服之牛黃一錢二分半麝香龍腦羚羊角各一錢當歸防風黃芩白朮麥門冬白芍藥各一錢半柴胡桔梗白茯苓杏仁去皮尖芎藭肉桂大豆黃卷阿膠各一錢二分半蒲黃人參神麯各三錢半雄黃八分甘草五分白蘞七分半犀角二錢乾山藥七錢乾薑三錢金箔一百三十片大棗十個蒸熟爛研上為末煉蜜丸每兩作十丸金箔為衣每服一丸溫水化下硃砂丸方見發搐瀉青丸方見肝臟導赤散方見心臟抑青丸方見肝臟補中益氣湯方見虛羸地黃丸方見腎臟小柴胡湯方見發痙六君子湯方見天釣祕旨安神丸方見心臟異功散方見天釣慢驚錢仲陽云慢驚因病後或吐瀉或藥餌傷損脾胃肢體逆冷口鼻氣微手足瘛瘲昏睡露睛此脾虛生風無陽之症也溫白丸主之蓋慢驚者陰症也俱臟受病而屬虛因吐瀉脾肺俱虛肝木所乘而致瘛瘲微搐婁全善所謂木虛則搐而無力經所謂木不及曰委和其病搖頭是也謂手足搐動泄瀉心悸火虛則身寒口中氣冷土虛則吐瀉睡面露睛治宜溫補脾胃用六君子湯五味異功散之類徐用誠云乙木屬陰乃肝臟病故慢而難治況有夾熱夾食夾痰與外感症相似者當宗錢氏方主之保嬰集云急驚屢發而屢用直瀉之藥則脾陰愈消而變為慢驚多矣大率吐瀉痰鳴氣喘眼開神緩昏睡露睛驚跳搐搦乍發乍靜或身熱身冷面淡青白或眉唇青赤其脈遲沉數緩是也當溫補脾氣為主而佐以安心制肝東垣亦云慢驚風由脾胃虛而生脾虛者因火邪乘其土位火旺能實其木木旺故來剋土當於心經中以甘溫補土之源更於脾土中瀉火以甘寒補金以酸涼致脾土中金旺火衰風木自虛矣稟賦不足或久病脾虛及常服克伐之藥者多致此症若因土虛不能生金金不能平木木來侮土而致前症者以五味異功散加當歸酸棗仁佐以鉤藤飲子補土平木若脾土虛寒者用六君子加炮薑木香不應急加附子以回陽氣蓋陰血生於脾土宜四君子當歸酸棗仁凡元氣虧損而至昏憒者急灸百會穴若待下痰不愈而後灸之則元氣脫散而不救矣此乃臟腑傳變已極總歸虛處惟脾受之無風可逐無驚可療因脾虛不能攝涎故津液妄泛而似痰者當依前法自效若不審其因泛用祛風化痰之劑則脾氣益傷陰血益損病邪益盛而危矣治驗舉人余時正子傷食發丹服發表之劑手足抽搐服抱龍丸目瞤痰盛余謂脾胃虧損而變慢驚也無風可祛無痰可逐只宜溫補胃氣遂用六君加附子一劑而愈一小兒抽搐痰涎自流或用驚風之藥益甚視其面色黃白余用六君補中益氣二湯補脾肺而愈一小兒傷風咳嗽痰湧用六君桔梗桑皮杏仁治之而愈後飲食停滯作瀉腹脹用六君加山楂厚朴而安又復停食作嘔或用藥下之更加咳嗽余謂脾肺俱虛宜用調補彼以為緩自服發表克滯前症益甚頭項顫動余用天南星散倍加鉤藤鉤及異功散而愈一小兒遇驚即痰盛咬牙發搐搖頭作瀉恪服腦麝硃砂等藥以致慢驚而卒朮附湯治風濕相搏身體煩疼不能轉側不嘔不渴大便堅硬小便自利及風症頭目眩重等症白朮四兩甘草炒二兩附子炮去皮臍一兩上為末入附子每服三錢姜五片棗一枚水煎服愚按附子溫中回陽為慢脾之聖藥也如元氣未脫用之無有不應須用每隻重一兩三四錢端正不尖底平周圍如蓮花瓣者佳否則誤用川烏也製法切去皮尖以童便浸之秋冬七日春夏五日每日一換浸畢切作四塊以濕草紙包數層微火煨半日取出切開無白星為度如急用炮至裂紋即投童便中良久浸透切片如色白再微炙之氣脫甚者急生用亦效太乙保生丹治慢驚尚有陽症者全蠍青者十四個白附子生用真殭蠶牛膽南星蟬殼琥珀防風硃砂各一錢麝香五分上為末米糊丸桐子大金箔為衣每服一二丸薄荷湯下聚寶丹治慢驚人參茯苓琥珀天麻真殭蠶全蠍炙防風牛膽南星白附子生用烏蛇肉酒洗焙一錢硃砂半錢麝香少許上為末煉蜜丸桐子大每服二丸以菖蒲湯送下金箔鎮心丸治風壅痰熱心神不寧驚悸煩渴唇焦頰赤夜臥不安譫語狂妄硃砂一兩白茯苓人參甘草各半兩山藥一兩半片腦牙硝一錢半麝香五分金箔十二貼為衣草紫河車二錢半黑豆煎煮上為末煉蜜丸每用五錢作五十丸以金箔為衣每服一丸薄荷湯化下含化亦得溫白丸治驅風豁痰定驚人參防風白附子生用真殭蠶全蠍各一錢焙南星湯洗七次焙天麻各二錢上為末水糊丸桐子大每服三五丸薑湯下烏蠍四君子湯即四君子加川烏全蠍各少許為末每服半錢薑棗水煎服次服去川烏天南星散治慢驚驅風豁痰南星重八九錢者一個掘地坑深尺許先用炭五斤燒通紅以好米醋一碗灑坑中即投南星以火炭密蓋又用盆覆時許取出上為末入琥珀全蠍各一錢每服二字煎生薑防風湯下烏沉湯治慢驚驅風助胃天麻二錢人參真川烏生用全蠍焙南星焙木香沉香各一錢甘草炒半錢上右末每服三五分姜水煎服沉香散治助胃氣止吐瀉茯苓二錢沉香丁香木香藿香厚朴制甘草炙各一錢上為末每服一字米飲湯調下蘇青丸蘇合香丸一分青州白丸子二分上和勻每服五分薑湯調下銀白散治胃虛吐瀉糯米炒二兩五錢扁豆蒸二兩藿香二錢白朮炒一兩丁香二錢甘草炙三錢上為末紫蘇米飲調下直指方加炮白附子全蠍木香石蓮姜水煎鉤藤散治吐利脾胃氣虛生風鉤藤鉤二錢蟬殼天麻防風蠍尾去毒人參各半兩麻黃殭蠶炒甘草炙川芎各二錢五分麝香五分上為末水煎服虛寒加附子一錢黑附子湯治慢脾風四肢厥冷附子炒去皮三錢木香人參各一錢五分白附子一錢甘草炙五分上為散每服三錢姜五片水煎若手足既溫即止後服生附四君子湯治吐瀉不思乳食凡虛冷病先與數服以正胃氣人參白朮附子木香茯苓橘紅甘草各等分上為末每服五七分薑棗水煎服辰砂膏治慢脾冷痰壅滯手足冷而微搐者黑附子一枚重一兩以上者去皮臍頂上挖一孔入辰砂末一錢仍用附子塞之炭火燒存性牛膽南星半兩白附子炮五靈脂蠍稍各二錢半上為末煉蜜丸桐子大每服二三錢生薑汁泡湯下七寶辰砂丹治風痰奇效慢驚慢脾以辰砂為主木香佐之用開元錢一個背後上下有兩月片者放鐵匙上炭火內燒少頃成珠子取入盞中作一服用木香煎湯送下人參湯亦可天麻防風丸方見臍風參苓白朮散方見虛羸異功散即五味異功散方見虛羸四君子湯方見天釣益黃散方見脾臟六君子湯方見天釣補中益氣湯方見虛羸驚癇錢仲陽云小兒發癇因血氣未充神氣未實或為風邪所傷或為驚悸所觸亦有因妊娠七情驚怖所致者若眼直目牽口噤涎流肚膨搐背項反張腰脊強徑形如死狀終日不醒則為痓矣如面赤目瞪吐舌齧唇心煩氣短其聲如羊者曰心癇面青唇青兩眼上竄手足攣掣反折其聲如犬者曰肝癇面黑目振吐涎沫形體如尸其聲如豬者曰腎癇面如枯骨目白反視驚跳反折搖頭吐沫其聲如雞者曰肺癇面色痿黃目直腹滿自利四肢不收其聲如牛者曰脾癇五癇通用五色丸為主仍參以各經之藥心癇屬血虛者用養心湯發熱飲冷為實熱用虎睛丸發熱飲湯為虛熱用妙香散肝癇者虛症用地黃丸抽搐有力為實邪用柴胡清肝散大便不通用瀉青丸腎癇者用地黃丸紫河車丸之類腎無瀉法故徑從虛治之肺癇者屬氣虛用補肺散面色痿黃者土不能生也用五味異功散面色赤者陰火上衝於肺也用地黃丸脾癇者用五味異功散若面青瀉利飲食少思用六君子加木香柴胡若發熱搐掣仰臥面色光澤脈浮病在腑為陽易治身冷不搐覆臥面色黯黑脈沉病在臟為陰難治凡有此症先宜看耳後高骨間先有青脈紋抓破出血可免其患此皆元氣不足之症也須以紫河車即小兒胞也丸為主而以補藥佐之設若泛行克伐復傷元氣則必不時舉發久而變危多至不救又有驚風食癇三種詳見後方仍參驚風胎風治之治驗一老人生子方周歲秋初暴冷忽發搐似驚癇過則氣息奄奄此元氣虛弱所致與補中益氣湯而愈一小兒十歲一小兒七歲各有癇症歲發二次後因出痘及飲食停滯舉發頻數用六君子補中益氣二湯而愈一小兒患前症每發吐痰困倦半晌而蘇諸藥不應年至十三而頻發用紫河車生研爛入人參當歸末丸桐子大每服三五十丸日進三五服乳化下一月漸愈又佐八珍湯痊愈一小兒七歲發驚癇每作先君令其恣飲人乳後發漸疏而輕至十四歲復發仍用人乳不應余令用肥厚紫河車研爛人乳調如泥日服二三次至數具而愈後常用加減八味丸而安至二十三歲發而手足厥冷仍用前法佐以八味丸十全大補湯而痊五癇丸治諸癇雄黃真珠各一兩研細硃砂水飛半兩水銀二錢半用鉛二兩熔化入水銀炒結候冷上為末煉蜜丸麻子大每服二三丸金銀煎湯下錢氏蛇黃丸治驚癇因震駭恐怖叫號恍惚是也蛇黃真者三個火煅醋淬鬱金七分一處為末麝香另入一匙上為末飯丸桐子大每服一二丸煎金銀磨刀水化下牛黃丸治風癇因汗出解脫風邪乘虛迷悶搐掣涎潮屈指如計數是也牛膽南星全蠍焙蟬蛻各二錢半防風白附子生用天麻真殭蠶炒各一錢半麝香半字上為末棗肉和丸水銀半錢研細入藥丸緑豆大每服一二丸荊芥生薑湯下妙聖丹治食癇因驚而停食吐乳寒熱大便酸臭是也赭石煅醋淬二錢半巴豆三個去心油三錢雄黃蠍稍硃砂各一錢輕粉麝香各一匙杏仁微炒二錢上為末棗肉丸梧子大每服一二丸木賊草煎湯送下星蘇散治諸風口噤不語天南星略炮銼上每服五七分姜四片紫蘇五葉水煎入雄豬膽少許溫服斷癇丹治癇瘥後復作症候多端連綿不除者黃耆蜜炙鉤藤鉤細辛甘草炙各半兩蛇蛻二寸酒炙蟬蛻四個牛黃一錢另研上為末煮棗肉丸麻子大煎人參湯下每服數丸量兒加減消風丸治風癇先宜此藥牛膽南星二錢羌活獨活防風天麻人參荊芥川芎細辛各一錢上為末蜜丸桐子大每服二丸薄荷紫蘇湯調化下祛風保安丸諸風久遠治之並驗川烏去皮尖二錢半生用五靈脂半兩上為末豬心血丸桐子大每服一二丸薑湯化下雌黃丸治顛癇搐掣惡聲嚼舌雌黃黃丹微炒各五錢麝香五分上為末用牛乳汁三合熬膏杵丸麻子大每服二三丸以溫熟水送下比金丸治驚癇先用此藥人參琥珀白茯苓遠志薑製取肉炒硃砂天麻石菖蒲細蜜者川芎南星青黛各一錢麝香一匙上為末蜜丸桐子大每服一二丸金銀薄荷湯送下虎睛丸治驚癇邪氣入心虎睛細研遠志薑汁浸犀角銼屑大黃濕紙包煨石菖蒲麥門冬各等分蜣螂去足翅炒三枚上為末米糊丸桐子大每服一二丸竹葉煎湯或金銀薄荷煎湯送下清神湯治驚癇犀角銼屑遠志薑汁焙白蘚皮石菖蒲人參甘草炒各一錢半上為末每服五七分麥門冬煎湯調下密陀僧散治心癇不語及諸驚失音用密陀僧為末每服一匙米醋湯調下大人服一錢熱酒下蠍虎散治驚癇褐色生蠍虎一個連血細研上入硃砂麝香末少許同研用薄荷湯調作一服數年者亦效蓋癇疾皆心血虛滯生蠍虎管守其血繼服二陳湯若無生蠍以帶性雄豬心血代用入代赭石散大妙代赭石散治陰陽癇代赭石煅醋淬研為末水飛過曬乾上為末每服半錢以金銀煎湯和金箔銀箔調連進二服腳脛上有赤斑乃邪氣發出可治無赤斑則難治化風丹涼風化痰退熱定搐牛膽南星羌活獨活防風天麻人參川芎荊芥粉草各一錢全蠍一個上為末煉蜜丸皂角子大每服一錢薄荷湯化下茯神湯治膽氣虛寒頭痛目眩心神恐懼不能獨處或是驚癇茯神酸棗仁炒黃耆炒柏子仁炒白芍藥炒五味子炒各一兩桂心熟地黃自制人參甘草炒五分上每服二三錢水煎酸棗仁丸治膽氣實熱驚癇或睡臥不安驚悸怔忡茯神酸棗仁炒遠志柏子仁炒防風枳殼麩炒各半兩生地黃杵膏半兩香竹茹二錢五分上各另為末蜜丸粟米大每服七八十丸白滾湯送下定志丸治心神虛怯所患同前或語言鬼神喜笑驚悸人參茯苓各一兩五錢菖蒲遠志各一兩上各另為末蜜丸如前服養心湯治心血虛怯驚癇或驚悸怔忡盜汗無寐發熱煩躁黃耆白茯苓茯神半夏曲當歸川芎辣桂柏子仁酸棗仁五味子人參各三錢甘草炒四錢上每服一二錢薑棗水煎妙香散治心氣不足驚癇或精神恍惚虛煩少寐盜汗等症辰砂三錢麝香一錢木香煨二錢五分茯苓山藥茯神遠志黃耆炒各一兩桔梗甘草炒人參各五錢上各另為末每服一錢溫酒或白湯調服八味地黃丸即六味地黃丸加附子肉桂各一兩治稟賦命門火衰不能生土以致脾土虛寒或飲食少思或食而不化臍腹疼痛夜多漩溺等症經云益火之源以消陰翳蓋謂此也或乳母命門火衰兒飲其乳致前症者子母並宜服之方見驚癇加減八味丸治稟賦腎陰不足或吐瀉久病津液虧損口乾作渴或口舌生瘡兩足發熱或痰氣上湧或手足厥冷等症即地黃丸加肉桂一兩五味子四兩地黃丸治小兒肝經虛熱血燥或風客淫氣而患瘰癧結核或四肢發搐眼目抽動痰涎上湧又治腎肝腦熱肢體消瘦手足如冰寒熱往來滑泄肚脹口臭乾渴齒齦潰爛爪黑麵黧或遍身兩耳生瘡或耳內出水或發熱自汗盜汗便血諸血失音等症其功不能盡述即六味地黃丸方見腎臟八珍湯治氣血俱虛陰火內熱或因克伐之劑脾胃虧損肌膚消瘦等症即四君四物二湯方見驚癇十全大補湯治氣血虛弱或稟賦不足寒熱自汗食減體瘦發熱作渴頭痛眩暈最宜用之方見熱症補中益氣湯方見虛羸六君子湯方見內釣紫霜丸天麻丸二方見臍風驚風驚風者虛惕怔忡氣怯神散痰涎來去泄瀉色青若驚入心則面赤夜啼用梔子清肝散加黃連入肝則面青眼竄用柴胡清肝散入脾則面黃嘔吐虛汗嗜臥用六君加柴胡山梔入肺則面白喘急用異功散加柴胡桔梗入腎則面黑齧奶咬牙用六味地黃丸若因乳母恚怒肝火或膏粱積熱遺兒為患或兒吐瀉傷脾清氣不升風木陷入太陰傳變等因皆能致此當隨主治否則必成慢脾也須預慎防為善治驗一小兒十五歲御女後復勞役考試失意患癇症三年矣遇勞則發用十全大補湯加味歸脾湯之類更以紫河車生研如膏入蒸糯米為末丸如桐子大每服百丸日三五服而痊後患遺精盜汗發熱仍用前藥及地黃丸而愈此症治不拘男婦老幼皆效一小兒周歲後從桌上仆地良久復蘇發搐吐痰沫服定驚化痰等藥遇驚即復作畢姻後不時發而難愈形氣俱虛面色痿黃服十全大補補中益氣二湯而愈至寶丹治諸驚癇心熱及卒中客忤煩躁風涎搐搦或傷寒狂語伏熱嘔吐生犀角鎊屑生玳瑁琥珀硃砂水飛雄黃水飛各一兩金箔五十片半為衣銀箔五十片片腦一匙麝香一錢牛黃半兩安息香一兩半為末酒掬去砂取一兩酒煎成膏上各另為末和勻入安息香膏如干入熟蜜少許桐子大每服一二丸人參湯化下量兒加減神妙奪命丹七月內取青蒿節內蟲入硃砂麝香為丸麻子大每服三五丸薑湯下人參羌活散治傷風驚熱羌活獨活前胡柴胡川芎白茯苓桔梗枳殼人參地骨皮天麻各等分甘草減半上生薑薄荷水煎治驚熱加蟬蛻防風導赤散治初驚生地黃木通去節防風甘草各等分上每服三錢竹葉少許水煎有熱加黃芩赤芍藥羌活蟬蛻鉤藤飲治肚疼驚啼鉤藤鉤天麻茯苓川芎白芍藥各二錢甘草蟬蛻各一兩上入燈心水煎七寶洗心散治煩熱生瘡兼治驚風生地黃荊芥穗防風甘草黃芩羌活赤芍藥各等分上為末每服一錢燈心薄荷湯調下神芎丸治風熱壅滯頭目昏眩口舌生瘡牙齒疳蝕或遍身瘡疥咬牙驚惕怔忡煩躁作渴或大便澀滯或積熱腹滿驚風潮搐等症大黃生黃芩各二兩生牽牛末二兩滑石四兩黃連薄荷葉川芎各半兩上為末水糊丸桐子大每服三四丸溫水下清心丸治驚熱煩躁人參茯神防風硃砂柴胡各三錢金箔三十片上為末煉蜜丸桐子大每服一二丸竹瀝調下化風丹方見驚癇安神丸方見心臟辰砂膏方見急驚柴胡清肝散方見熱症六味地黃丸方見腎症梔子清肝散方見諸熱十全大補湯即八珍湯加黃耆肉桂異功散方見天釣補中益氣湯方見虛羸六君子湯方見天釣天釣內釣天釣者發時頭目仰視驚悸壯熱兩目反張淚出不流手足搐掣不時悲笑如鬼祟所附甚者爪甲皆青蓋因乳母厚味積毒在胃致兒心肺生熱痰鬱滯或外挾風邪為患法當解利其邪用鉤藤飲上氣喘粗者用烏蠍四君子湯內釣者腹痛多喘唇黑囊腫傴僂反張眼尾赤此胎中受風及外驚所致若內臟抽掣作痛狂叫或泄瀉縮腳內症一作外症亦然極難調理內症服聚寶丹外症服鉤藤飲進乳食者可治若腹痛唇黑囊腫之類用聚寶丹若外驚內臟抽搐之類用鉤藤飲若因乳母醇酒厚味積毒在胃用加味清胃散若因乳母鬱怒積熱在肝用加味逍遙散加味歸脾湯俱加漏蘆子母俱服凡母食膏粱厚味飼兒之時先擠去宿乳然後吮之治驗一小兒因乳母受驚發搐時目赤壯熱腹痛哭而曲腰用四物加柴胡防風又用加味逍遙散加熟地黃以清肝熱生肝血再用地黃丸滋腎水以生肝木母子俱安一小兒曲腰而啼面青唇黑此寒氣所乘內釣腹痛也用五味異功散加木香乾薑一劑與母服之頓愈後因母感寒腹痛而啼用人參理中湯一劑與母服其子亦安一小兒曲腰乾啼手足並冷用六君子加乾薑木香服之未應又加肉桂母子俱服而安一小兒忽乾啼作瀉睡中搐手足冷此脾土虛寒肝木侮之而作發搐乃內釣也用益黃散一劑而安用四君子加柴胡升麻乳食漸進而安一小兒乾啼面青或赤手足並熱或用清熱之劑久不愈診其乳母有肝火氣滯用加味逍遙散越鞠丸以治其母時灌子數滴不旬日子母並愈一小兒患前症服魏香散而愈後復作服祛風鎮驚之藥上氣喘粗此元氣虛寒也余先用烏蠍四君子湯稍愈但倦怠殊甚用補中益氣湯及五味異功散而痊一小兒因母每感寒腹痛飲燒酒發熱痰盛面赤手足並熱屬胃經實熱之天釣也用清胃散子母服之並愈後因傷乳吐瀉面色或青或白手足並冷屬脾氣虛寒用六君子木香乾薑而愈三歲後傷食腹痛唇黑作瀉數去後而無糞或糞少而青此元氣虛寒下陷用補中益氣湯漸愈一小兒啼哭陰囊腫大眼目上翻赤脈流淚此肝熱內釣用柴胡清肝散加鉤藤鉤治之諸症漸愈又用鉤藤飲而痊後復發或用祛病根之藥致乳食日少肚中脹痛手足浮腫余先用六君子升麻柴胡數劑諸症稍愈又傷乳食吐瀉用平胃散一服即愈一小兒因乳母懷抱鬱結腹痛發搐久而不愈用加味歸脾湯加漏蘆母子並服漸愈又母大怒發厥而蘇兒遂食乳腹痛作瀉面青作嘔先用小柴胡湯二劑母子並服少愈其母又咽酸腹脹用越鞠丸加味歸脾湯佐以加味逍遙散而痊鉤藤膏治腹痛乾啼作嘔名盤腸內釣乳香沒藥木香薑黃各一錢木鱉子三個去油上為末蜜丸皂角子大鉤藤鉤湯磨半丸入蜜服未止再服魏香散魏香散阿魏二錢先用溫酒溶化蓬朮五錢上將蓬朮浸阿魏酒中一伏時焙乾為末每服二三分紫蘇米飲調下鉤藤飲治小兒臟寒夜啼陰極發躁此方主之鉤藤茯神茯苓川芎當歸木香甘草芍藥各一錢上為末每服一錢薑棗水煎若心經熱臉紅舌白小便赤澀用鉤藤飲去木香加硃砂末一錢木通湯下乳香丸治驚風內釣腹痛驚啼乳香半錢沒藥沉香各一錢蠍稍十四個雞心檳榔一錢半上為末蜜丸桐子大每服二三錢菖蒲鉤藤鉤煎湯送下木香丸治病同前木香全蠍各五分沒藥茴香鉤藤鉤各一錢上各別為末以大蒜搗爛和丸桐子大曬乾每服二丸鉤藤煎湯下清胃散治胃火牙痛或連頭面升麻五分生地黃牡丹皮黃連當歸各三分上水煎服加柴胡山梔即加味清胃散愚按前方治脾胃實火作渴口舌生瘡或唇口腫痛齒齦潰爛焮連頭面或惡寒發熱或重舌馬牙吐舌流涎等症子母並宜服之若因脾胃氣虛寒涼克伐或虛熱上行口舌生瘡弄舌發熱飲食少思或嘔吐困睡大便不實流涎齦爛者用五味異功散四君子湯治脾氣虛損吐瀉少食人參白朮茯苓甘草各等分上每服二錢薑棗水煎新增愚按前方若胃氣虛弱克伐傷脾飲食少思或食而難化若作嘔作泄尤宜用之如兼痰嗽氣逆肢體倦怠面目浮腫者宜六君子湯六君子湯即四君子加陳皮半夏治脾胃氣虛吐瀉不食肌肉消瘦或肺虛痰嗽喘促惡寒或肝虛驚搐目眩自汗諸症並宜服之以滋化源方見內釣錢氏異功散治吐瀉不食脾胃虛冷者先與數服以益中州之氣人參茯苓白朮甘草炒陳皮各等分上為末每服二三錢薑棗水煎愚按前方治脾胃虛弱吐瀉不食或驚搐痰盛或睡而露睛手足指冷或脾肺虛弱咳嗽吐痰或虛熱上攻口舌生瘡弄舌流涎若母有症致兒患此者子母並服之加味歸脾湯去丹皮山梔即歸脾湯治脾虛弱損健忘驚悸等症人參黃耆茯神去木各一錢甘草白朮炒各一錢木香五分遠志去心酸棗仁龍眼肉當歸牡丹皮山梔炒各一錢上水煎服愚按前方若乳母憂思傷脾血虛發熱食少體倦或脾虛不能統攝以致陰血妄行或健忘怔忡驚悸少寐或心脾作痛自汗盜汗或肢體腫痛大便不調或婦人經候不調晡熱內熱或繭唇流注等症致兒為患者令子母俱服之加味逍遙散去牡丹皮山梔即逍遙散治肝脾血虛等症當歸甘草炙芍藥酒炒茯苓白朮炒柴胡各一錢牡丹皮山梔炒各七分上水煎服愚按前方若乳母肝脾血虛內熱寒熱遍身搔癢肢體作痛頭目昏重怔忡頰赤口燥咽乾或發熱盜汗食少不寐或口舌生瘡耳內作痛胸乳腹脹小便不利致兒為患尤宜用之又治婦人陰虛發熱兒飲其乳以致患瘡者越鞠丸治六郁飲食少思或胸滿吐酸齒痛瘡疥等症蒼朮撫芎香附神麯炒山梔炒麥芽炒山楂各等分上各為末水煮神麯麥芽末糊丸粟米大每服百丸白湯送下鎮心丸治急驚化痰鎮心硃砂龍齒牛黃各一錢鐵粉琥珀人參茯苓防風各二錢全蠍七個焙上為末蜜丸桐子大每服一二丸薄荷湯送下聚寶丹烏蠍四君子湯二方見慢驚平胃散方見胃氣虛寒益黃散方見噤風人參理中湯方見傷寒補中益氣湯方見虛羸六君子湯方見內釣鉤藤散方見慢驚地黃丸方見腎臟柴胡清肝散方見熱症四物湯方見急驚小柴胡湯方見痙症盤腸氣痛小兒盤腸氣者痛則曲腰乾啼額上有汗皆由肝經風邪所搏也肝腎居下故痛則曲腰乾啼者風燥其液故無淚也額上有汗者風木助心火也口閉足冷者脾氣不營也下利青糞者肝木乘脾也皆由産下澡洗受風冷所致當服鉤藤膏之類若乳母及兒受寒邪者用沉香湯之類若兒額間有汗口閉腳冷乃虛寒也用當歸散或沉香降氣湯之類若面赤唇焦小便不通小腹脹痛者乃小腸熱也用人參湯送下三黃丸若痛不止煎蔥湯淋揉其腹就以熱蔥尉臍腹間良久尿出痛止或以乳香沒藥木香各少許水煎灌匙許若因乳母飲食停滯者用保和丸懷抱氣鬱者加味歸脾湯怒動肝火者加味逍遙散子母俱服之並佳治驗一小兒曲腰啼叫右腮青黑此臍腹內痛因脾土虛寒肝木乘之也用六君子加木香鉤藤鉤即愈一小兒因乳母大怒亦患前症面赤而啼小便不利用加味逍遙散加木通車前子母子服之並愈一小兒啼叫面赤手足不冷用鉤藤飲隨愈後因其母飲酒厚味仍作啼手足發熱又用前藥加生地黃而愈後又面青手足冷啼叫吐瀉其糞腥穢用助胃膏一服而安一小兒患前症曲腰而啼額間出汗足冷唇青糞青先用鉤藤膏治愈後復患仍用鉤藤膏而痛減半又煎蔥湯尉洗其腹腹痛遂安一小兒唇青足冷啼聲不絶用助胃膏一服稍安又食生冷之物前症仍作更泄瀉不止先用六君子加木香乾薑一劑乃去木香乾薑又二劑其瀉頓止又用四君子少加升麻四劑飲食加進一小兒十四歲腹痛吐瀉手足常冷肌體瘦弱余謂所稟命門火虛也用六君子湯八味丸漸愈畢姻後因房勞勤讀感冒發汗繼以飲食勞倦朝涼暮熱飲食不思用六君子十全大補二湯尋愈後不慎飲食起居午前臍下熱起則遍身如炙午後自足寒至腰如冰熱時脈洪大按之如無兩尺微甚寒時則六脈微細如絶湯粥稍離火食之即腹中覺冷此亦稟命門火衰之症也用補中益氣湯八味丸各百餘服漸愈後大吐血別誤服犀角地黃丸一劑病益甚飲食頓減面色㿠白手足厥冷或時發熱寒時脈微細而短者陽氣虛微也熱時脈洪大而虛者陰火虛旺也余用十全大補及八珍湯六君子之類但能扶持而血不止復因勞役吐血甚多脈洪大鼓指按之如無而兩寸脈短此陽氣大虛也用人參一兩附子一錢佐以補中益氣湯數劑諸症漸退乃減附子五分又各數劑脈症悉退乃每服人參五錢炮姜五分月餘始愈當歸散治臟寒腹痛面青手冷夜啼不乳當歸白芍藥人參甘草炙二分桔梗橘皮去白各一錢上為末水煎半盞時時少與服沉香降氣湯治氣不升降胸膈痞塞心腹脹滿喘促短氣乾噦煩滿咳嗽痰涎口中無味嗜臥不食香附子二兩半沉香砂仁各一錢甘草七錢半上為末每服一錢入鹽少許沸湯點平旦空心服愚按前方若乳母中氣鬱滯不能升降患此症致兒作痛者亦用之三黃丸方見疝氣加味歸脾湯加味逍遙散鉤藤膏三方見內釣助胃膏方見熱吐魏香散六君子湯二方見內釣四神丸方見脫肛八味丸地黃丸並見腎臟補中益氣湯方見虛羸胎驚小兒胎驚風者因妊婦飲酒忿怒驚跌或外挾風邪內傷於胎兒生下即病也若月內壯熱翻眼握拳噤口出涎腰強搐掣驚怖啼叫腮縮囟開頰赤面青眼合者當散風利驚化痰調氣及貼囟法甚則以朱銀丸下之若面青拳搐用保命丹鉤藤散之類切不可誤作脾風妄用溫藥若眉間色赤或虎口指紋曲里者可治用鉤藤散全蠍散若眉間色黑或指紋反出外者不治大抵小兒臟腑脆弱不可輒用銀粉鎮墜之劑反傷真氣多致不救者且妊娠每月各有經脈滋養一月屬肝二月屬膽三月屬心四月屬小腸五月屬脾六月屬胃七月屬肺八月屬大腸九月屬腎十月屬膀胱多因妊娠時受患而作也須察於某月受病病在某經和其陰陽調其脾胃兼以見症之藥佐之無有不愈治驗一小兒患胎驚諸藥不應用紫河車研爛如泥每用錢許乳化服之更以十全大補湯加鉤藤鉤漏蘆與母服兩月餘舉發漸輕年餘舉發漸稀服年餘不再發至出痘後復發取紫河車研爛入糯米粉丸小豆大每服百丸以乳送下服二具全瘥畢姻又發仍用前丸及十全大補湯六味丸加當歸黃耆肉桂五味子年餘喜其能遠帷幕得痊後因勞役更作又用前丸及十全大補湯等藥不應用大劑獨參湯服數斤然後舉發稍緩乃用人參二兩附子一錢數服頓止仍用前藥間用獨參湯而痊一小兒患胎驚用紫河車丸及十全大補湯及鉤藤膏而愈畢婚後復發用大劑獨參湯六味丸加五味子黃耆當歸煎服半載舉發稍輕年餘不再發後每勞役怒氣仍發即用煎藥隨愈又傷寒愈後復作虛症悉具莫能名狀用紫河車二具獨參煎湯十餘斤而痊後患傷風咳嗽咽乾內熱用六味地黃丸料加五味子煎服及十全大補湯而痊十全大補湯即八珍湯加黃耆肉桂四物四君子合用方見急驚地黃丸方見腎臟朱銀丸方見噤風撮口保命丹方見發搐鉤藤散方見慢驚全蠍散方見偏風口噤貼囟法方見發搐鉤藤膏方見天釣紫河車丸方見前症胎風小兒初生其身有如湯潑火傷者此皆乳母過食膏粱所致也其母宜服清胃散及逍遙散以清其氣血兒亦飲數滴可也有身無皮膚而不焮赤者皆由産母脾氣不足也用粳米粉敷之焮赤發熱者皆由産母胃中火盛也用石膏敷之經謂脾主肌肉肺主皮毛故知病脾肺也如腦額生瘡者火土相合遂成濕熱下流攻擊腎水也難治如腳上有瘡者陰虛火盛也此不滿五歲而斃如未滿月而撮口握拳腰軟如隨者此肝腎中邪勝正弱所致也三日內必不治如男指向里女指向外尚可治眉紅亦不可治可治者用全蠍散鉤藤散等類治之若因大病虧損胃氣而諸臟虛弱所致者用補中益氣湯錢氏地黃丸若面唇赤色正屬腎水不足肝經陰虛火動而內生風熱爾當滋腎水以制陽光其身軟者內稟氣不足肌肉未堅也當參五軟而施治之清胃散逍遙散二方見內釣全蠍散方見口噤鉤藤散方見慢驚補中益氣湯方見虛羸錢氏地黃丸方見腎臟五軟五軟者頭項手足肉口是也夫頭軟者臟腑骨脈皆虛諸陽之氣不足也乃天柱骨弱腎主骨足少陰太陽經虛也手足軟者脾主四肢乃中州之氣不足不能營養四肢故肉少皮寬飲食不為肌膚也口軟者口為脾之竅上下齦屬手足陽明陽明主胃脾胃氣虛舌不能藏而常舒出也夫心主血肝主筋脾主肉肺主氣腎主骨此五者皆因稟五臟之氣虛弱不能滋養充達故骨脈不強肢體痿弱源其要總歸於胃蓋胃水穀之海為五臟之本六腑之大源也治法必先以脾胃為主俱用補中益氣湯以滋化源頭項手足三軟兼服地黃丸凡此症必須多用二藥仍令壯年乳母飲之兼慎風寒調飲食多能全形治驗吳江史萬湖子七歲患吐瀉囟目頓陷天柱骨倒兼面赤色余適在彼先用補中益氣湯加附子一劑其瀉止而諸症愈又用錢氏地黃丸料煎服頓安一小兒七歲夏間過食生冷之物早間患吐瀉面赤作渴手足並熱項軟囟陷午後面色頓白手足並冷脈微欲絶急以六君子湯加附子一劑諸症頓除囟頂頓起而安小兒易虛易實故雖危症若能速用對病之藥亦可回生者一小兒九歲因吐瀉後項軟面白手足並冷脈微細飲食喜熱余先用六君子湯加肉桂五劑未應更加炮姜四劑諸症稍愈面色未復尺脈未起佐以八味丸月餘面色微黃稍有胃氣矣再用前藥又月餘飲食略增熱亦大減乃朝用補中益氣湯食前用八味丸又月餘元氣漸復飲食舉首如常又月餘而肌肉充盛諸病悉愈一小兒十二歲瘧疾後項軟手足冷飲食少思粥湯稍離火食之即腹中覺冷用六君子湯加肉桂乾薑飲食漸加每飲食中加茴香胡椒之類月餘粥食稍可離火又用前藥百劑飲食如常而手足不冷又月餘其首能舉後飲食停滯患吐瀉項乃痿軟朝用補中益氣湯夕用六君子湯及加減八味丸兩月餘而項復舉畢姻後眼目昏花項骨無力頭自覺大用八味丸補中益氣湯三月餘元氣復而諸症退後每入房勞役形氣殊倦盜汗發熱服後二藥即愈一小兒十五歲手足痿軟齒不能嚼堅物內熱晡熱小便澀滯如淋服分利之劑小便如淋服滋陰之劑內熱益甚服燥濕之劑大便重墜余謂此稟腎氣不足早犯色欲所致故精血篇云男子精未滿而御女以通其精五臟有不滿之處異日有難狀之疾老人陰已痿而思色以降其精則精不出而內敗小便澀痛如淋若陰已耗而復竭之則大小便牽痛愈痛則愈便愈便則愈痛正謂此也遂朝用補中益氣湯夕用六味丸加五味子煎服各三十餘劑諸症漸愈後夢遺諸症復作手足時冷痰氣上急用十全大補湯加味八味丸料各八劑二便稍利手足稍溫仍用前二藥三月餘元氣漸復飲食如常又飲食停滯吐瀉腹痛按之不疼此脾胃受傷也用六君子湯加木香肉豆蔻治之其吐未已左尺右關二脈輕診浮大按之如無經云腎開竅於二陰用五味子散四服大便頓止後又傷食咽酸作瀉大便重墜朝用補中益氣湯夕用六君子湯加木香乾薑而痊一老年得子四肢痿軟而惡風寒見日則喜余令乳母日服加減八味丸三次十全大補湯一劑兼與其子年餘肢體漸強至二周而能行一小兒五歲稟父腿軟不便於行早喪天真年至十七畢姻後腿軟頭囟自覺開大喜其自謹寓居道舍遂朝服補中益氣湯夕用地黃丸料加五味子鹿茸煎服年餘而健一小兒項軟服前二藥而愈畢姻後患解顱作渴發熱以二藥作大劑煎熟代茶恣飲兩月餘而渴熱減年餘而顱囟合又年餘而肢體強若非慎疾雖藥不起星附膏治項軟天南星附子各等分上為末用生薑自然汁調敷項間干則潤之六君子湯方見天釣加減八味丸即六味丸加肉桂五味子方見腎臟補中益氣湯方見虛羸地黃丸方見腎臟五味子散五硬五硬者仰頭取氣難以動搖氣壅作痛連於胸膈腳手心冷而硬此陽氣不營於四末也經曰脾主四肢又曰脾主諸陰今手足冷而硬者獨陰無陽也故難治若肚筋青急者木乘土位也急用六君炮薑肉桂柴胡升麻以復其真氣若系風邪當參驚風治之此症從肝脾二臟受病當補脾平肝仍參痙症急慢驚風門治之小續命湯治中風不省人事涎鳴反張失音厥冷麻黃人參黃芩炒川芎芍藥甘草炒杏仁去皮尖炒漢防己官桂去皮各半兩防風七錢五分附子炮去皮臍二錢每服一錢水煎服六君子湯方見天釣
