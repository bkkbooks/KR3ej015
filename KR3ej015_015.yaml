body:
  text: 卷十五作痛不止瘡瘍作痛當審邪之所在症之所因如寒熱而痛邪在表也用人參敗毒散便祕而痛邪在裡也用內疏黃連湯腫焮而痛血凝滯也用仙方活命飲作膿而痛者用托裡消毒散排之膿脹而痛者針之膿潰而痛者補之氣虛而痛則用四君歸耆血虛而痛則用四物參耆大抵形傷痛氣傷腫不知此數者徒以乳香沒藥為止痛之方則非所以為法矣仍審五臟相勝相兼之症而治之後仿此一小兒腿癰潰而作痛服敗毒之藥腫勢益甚更嘔腹痛余謂膿出而反痛攻毒而反嘔其屬胃氣虛弱明矣急宜補之或謂痛無補法仍用前藥諸症蜂起余用六君乾薑木香胃氣漸復再用益氣湯托裡散而愈東垣丹溪云膿出而反痛此為虛也宜補之穢氣所觸和解之風冷所逼者溫養之信矣一小兒臂瘡潰而作痛脈洪數而有力緣乳母食厚味胃經積熱所致母服清胃散子服瀉黃散痛止又母子服加味逍遙散而愈一小兒項患瘡焮腫作痛左頰色赤此膽經熱毒母用仙方活命飲末一服痛止再服而潰又用加味小柴胡湯加味逍遙散母子俱服而斂一小兒左脅腫痛赤色而硬此稟膽經熱毒所致也子服活命飲母服加味小柴胡湯而軟又子服三味解毒散母服加味逍遙散而潰復惡寒不食腹脹吐酸此脾氣弱而飲食停滯也用六君子湯脾氣漸健用托裡散肌肉漸生又嘔吐寒熱面色青白此脾氣虛而肝邪所侮也用異功散加柴胡升麻而安又用異功散加當歸黃耆而愈一小兒臂患瘡赤腫作痛服大黃藥敷鐵箍散腫痛頓消余曰此脾氣虛瘡內陷不知痛耳非毒退而內消也遂朝用益氣湯夕用異功散各數劑色微赤微腫又用蔥尉法及托裡散而瘡消設或再用前藥則患處得寒而愈滯胃氣得寒而不生多致不起矣一小兒臂瘡潰而作痛瘡口色白面赤飲湯此稟腎膀胱陰虛也朝用八珍湯夕用加減八味丸諸症漸退面色頓白此熱退而真虛之色見也用托裡散異功散而愈一小兒胸患瘡作痛發熱大小便祕此邪在裡也先用大連翹飲一服熱痛頓止更以五味異功散加升麻白芷而愈一小兒面患瘡焮腫發熱惡寒此邪在表也先用荊防敗毒散解其表邪次用七味白朮散固其胃氣而愈一小兒背患瘡焮腫大痛發熱飲冷服敗毒之藥其痛益甚此膀胱經熱毒熾盛也用活命飲加麻黃羌活一劑諸症頓退乃去麻黃羌活又二劑而膿潰再用清熱消毒飲而瘡痊次年腹患癰焮腫作痛大便不通其熱雖劇悉屬形病俱實用活命飲加硝黃一劑大便即通腫痛頓止又用清熱消毒散而痊一小兒腿癰潰而膿清脈弱面色痿黃自汗有痰余謂當補脾肺彼以為緩遂降火敗毒嘔吐喘嗽余曰脾肺氣絶不信後果歿一小兒臂癰潰而面黃痰喘余謂稟脾腎氣虛不信乃服四物黃柏知母而歿余治此症用地黃丸補中湯滋其化源多有生者若用四物黃柏之類益傷脾肺乃速其危也神效解毒散治一切瘡瘍作痛不止凡初起腫者服之即消已潰仍腫者服之即退已潰不解者服之即愈嬰兒母亦服自制金銀花一錢甘草節五分黃耆炒皂角刺炒當歸各三錢乳香沒藥各二錢上為末每服三錢酒煎為末溫酒調服亦可如瘡已潰腫痛已止者去乳沒金銀花倍加黃耆黃連解毒湯治瘡瘍煩躁飲冷脈洪數或發狂言黃芩黃柏黃連俱炒山梔各一錢五分上每用一二錢水煎熱服內疏黃連湯治瘡瘍發熱而嘔大便祕結脈洪而實黃連炒芍藥炒當歸各二錢檳榔木香各五分黃芩炒梔子炒薄荷桔梗炒甘草連翹大黃炒各一錢上每服一二錢薑水煎乳香定痛散治瘡瘍潰爛疼痛乳香沒藥各五錢滑石寒水石煅各一兩冰片一錢上為細末干敷患處小柴胡湯加山梔牡丹皮即加味小柴胡湯治肝膽經部分瘡瘍作痛或身熱惡寒頸項強直胸脅作痛方見脅癰三味解毒湯方見出血不止加減八味丸方見作渴不止五味異功散方見敗毒之藥清胃散四物湯四君子湯三方見腹癰大連翹飲方見臂癰荊防敗毒散即人參敗毒散加荊芥防風方見發斑蔥尉法方見流注清熱消毒散方見熱毒口瘡仙方活命飲托裡消毒散托裡散三方見熱毒瘡瘍七味白朮散八珍湯加味逍遙散三方見發熱不止瀉黃散方見頭面瘡作嘔不止丹溪先生云腫瘍時嘔當作毒氣攻心治之潰瘍時嘔當作陰虛補之此論其常耳竊謂前症如腫赤焮痛而嘔者熱毒甚也用仙方活命飲作膿而嘔者胃氣虛也用五味異功散膿脹而嘔者血氣虛也用六君子加歸耆便祕而嘔者熱在臟也用內疏黃連湯寒藥服多而嘔者胃氣傷也用托裡健中湯食少胃寒而嘔者托裡益中湯中虛寒淫而嘔者托裡溫中湯肝氣乘脾而嘔者托裡抑青湯胃虛停痰而嘔者托裡清中湯胃虛自病而嘔者托裡益黃湯鬱結傷脾而嘔者托裡越鞠湯徐阮令云治癰疽不可一日無托裡藥確哉是言也蓋毒氣者熱有餘也陰虛者脾不足也皆因脾氣虛弱以致之但宜調補中氣則正氣復而邪氣自去矣嬰童當兼治其母一小兒臂患瘡服消毒之劑作嘔少食腫硬不消面色痿黃此脾胃氣虛而藥復傷也用六君木香乾薑更增腹痛此虛甚也以前藥入附子一片諸症頓退後飲食停滯作嘔不食先用保和丸一服次用異功散而愈一小兒腿癰膿清作嘔瘡口不斂肝腎二脈洪數此因稟腎水不足而肝火為患用六味地黃丸以補腎九味蘆薈丸以清肝而愈一小兒手患瘡作嘔流涎面色痿黃余謂脾氣虛寒遂用六君乾薑木香而嘔止又用補中益氣湯而涎止不數劑而瘡愈一小兒瘡痛作嘔手足並冷此因痛而胃氣復傷也用六君乾薑藿香痛嘔頓止又用異功散加升麻柴胡而瘡亦消一小兒面患瘡作嘔手足並冷面赤作痛此胃經熱毒所致先用仙方活命飲而痛止又用清熱消毒散而瘡愈一小兒腹患瘡作嘔便祕發熱飲冷蓄熱也用內疏黃連湯而便通嘔止又用清熱消毒散而瘡內消一小兒腿患瘡用護心散嘔吐不食手足並冷余曰此非毒氣內攻乃胃虛耳宜用異功散補之彼反見疑仍索前藥余以異功散為末作護心散與服嘔止食進又用托裡散膿潰而愈後語其故猶不信其效至此也一小兒臂患瘡服護心散嘔吐腹脹余曰此脾胃復傷耳不信仍復攻毒益加泄瀉余先用托裡溫中湯一劑次用六君薑桂又用五味異功散而愈一小兒項患瘡作嘔面黃發熱飲湯余謂胃氣虛熱不信反清熱敗毒更加吐瀉而歿一小兒面患瘡作嘔發熱作渴飲湯余謂胃氣虛而作嘔不能化生津液而作渴不信另用雜藥攻毒致吐瀉吃逆而歿托裡益黃湯治瘡瘍因脾胃虛弱寒水反侮土飲食少思嘔吐泄瀉等症自制人參白朮炒各七分陳皮茯苓半夏炮薑丁香炙甘草各三分上薑水煎服托裡越鞠丸治乳母鬱怒肝脾內熱致兒患瘡瘍母子並服自制人參五分白朮炒一錢陳皮四分川芎半夏山梔炒蒼朮各三分炙甘草二分上薑棗水煎嬰兒乳母並服托裡健中湯治瘡瘍陽氣虛寒腸鳴切痛大便溏泄嘔逆昏憒此寒變而內陷也急用此藥緩則不救潰瘍誤服寒劑多患之自制羌活三分木香附子炮益智丁香沉香各三分茴香五分陳皮炙甘草五分上薑水煎徐徐服之托裡清中湯治瘡瘍脾胃虛弱痰氣不清飲食少思等症自制人參白朮炒陳皮茯苓各五分半夏三分桔梗二分甘草炒柴胡各二分上薑棗水煎服托裡溫中湯治瘡瘍元氣虛弱或因涼藥所傷飲食少思嘔吐泄瀉等症自制人參白朮茯苓各一錢半夏炮薑各四分甘草炒肉桂黃耆炒各一錢五分上每服三五錢薑棗水煎托裡益中湯治瘡瘍中氣虛弱飲食少思或潰而不斂或腫而不消自制人參白朮炒陳皮炒茯苓半夏炮薑各五分木香甘草炒各三分上薑棗水煎托裡益青湯治瘡瘍脾土虛弱肝木所侮以致飲食少思或胸膈不利自制人參白朮炒各五分陳皮炒茯苓半夏各三分芍藥炒一分柴胡二分上薑棗水煎服保和丸六味丸二方見發熱不止九味蘆薈丸方見腮癰六君子湯方見腋癰補中益氣湯方見肌肉不生五味異功散方見用敗毒之藥清熱消毒散方見熱毒口瘡仙方活命飲托裡消毒散托裡散三方見熱毒瘡瘍內疏黃連湯方見作痛不止出血不止瘡口出血有因五臟相勝陰陽不調而血不止者有因乳母六淫七情之氣不平而血妄行者若因肝火內動用四物山梔牡丹皮肝經血虛用六味地黃丸心虛不能統血用四物參朮丹皮酸棗仁脾虛不能統血用四君山梔牡丹皮脾氣鬱滯用歸脾湯脾肺氣虛用補中益氣湯氣血俱虛用十全大補湯腎陰不足而肝火內動用六味地黃丸柴胡梔子散加五味子大凡失血過多而見煩熱發渴等症勿論其脈不問其症急用獨參湯以補其氣經云血生於氣苟非參耆歸術甘溫之藥決不能愈若發熱脈大者多不治一小兒十一歲眉間一核似赤小豆許出血如注發熱倦怠食少體倦此肝經血熱脾經氣虛也用柴芍參苓散九味蘆薈丸而痊一小兒流注出血吃逆腹痛手足並冷用六君子及獨參湯而益甚此陽氣虛寒之甚藥力未能驟及也遂連服數劑諸症漸退用月許將愈因飲食失宜寒熱發搐血出此脾氣虛肝火所乘也用異功散加升麻柴胡而安又用八珍四君而愈後因勞心發熱頭痛另服清熱之劑汗出口噤良久方省服大補湯數劑而安又用八珍湯而愈一女子臂患瘡出血余謂血虛用聖愈湯而愈後因怒復作如前先用聖愈湯又用加味逍遙散將愈因惑於人言別服降火之劑吐瀉腹痛余用異功散聖愈湯而愈一小兒頭瘡出血睡中發搐審其母素有鬱怒發熱用加味逍遙散加味歸脾湯母服之而子自愈一小兒頭面生瘡出血右腮赤色口乾飲冷此胃熱有熱先用清胃散漸愈又用加味解毒散而愈一小兒臂瘡出血脈浮大按之無力右寸關為甚此脾肺氣虛不能攝血歸源先用補中益氣湯而血止又用托裡散而瘡愈一小兒頭面生瘡出血作痛發熱飲冷此胃經熱甚而血妄行也先用仙方活命飲諸症頓愈又用清熱消毒散瘡口漸斂一女子十四歲患瘰癧不時出血面青善怒余謂肝膽經氣虛而血不能歸經也欲滋腎水以生肝木不信反清熱敗毒血不止而歿一小兒患骨疽內潰膿出甚多後瘡口出血惡寒體倦脈之如無余謂陽隨陰散而氣脫用獨參湯補之不信而歿東垣聖愈湯治諸瘡膿血出多心煩不安不得眠睡熟地黃生地黃各二分當歸川芎三分黃耆炒五分人參三分上水煎服歸脾湯治瘡瘍脾氣虛不能攝血歸經而瘡口出血或乳母脾經鬱熱致兒患瘡發熱出血或瘡口不斂方見脅癰獨參湯治瘡瘍潰後氣血俱虛瘡口出血或發熱惡寒作渴煩躁宜用此藥以補氣則血自生而歸經此陽生陰長之理用人參一兩薑十片棗十枚水煎服三味解毒散治瘡瘍熱毒出血或稟熱毒金石毒者尤宜用之自制金銀花一兩甘草五分牛黃一錢量人用之上為末每服五分白湯調下四物湯方見腋癰柴胡梔子散方見脅癰即梔子清肝散柴芍參蘇飲方見熱毒瘰癧六味地黃丸方見作渴不止加味逍遙散當歸補血湯二方見發熱不止補中益氣湯方見肌肉不生十全大補湯方見便癰九味蘆薈丸方見喉痹四君子湯清胃散六君子湯三方見腹癰異功散方見用敗毒之藥托裡散仙方活命飲二方見熱毒瘡瘍清熱消毒散方見熱毒口瘡肌肉不生肌肉乃脾胃所生收斂皆氣血所主二者相濟以成者也若肌肉不生而色赤血熱也用四物山梔牡丹皮晡熱內熱者血虛也用四君歸地牡丹皮膿水清稀者氣血俱虛也用十全大補湯食少體倦者脾氣虛也用補中益氣湯煩熱作渴起居如常者胃熱也用竹葉黃耆湯煩熱作渴小便頻數者腎虛也用六味地黃丸肉腐而不潰者用烏金膏若肉潰而不斂者用六君子湯穢臭脈洪大而作渴乃真氣虛而邪氣實也此為難治大凡瘡瘍久而不愈者皆元氣不足或因邪氣凝滯於患處苟能調補脾胃則元氣自足元氣既足則邪氣自消死肉自潰新肉自生而瘡自斂矣使不保其本而概敷生肌之劑是反助其邪後更潰爛耳一小兒臂癰久不斂日晡倦怠敷追蝕之藥腐壞而不斂余謂因脾氣虛而不能生長肌肉朝用益氣湯夕用異功散月餘而痊一小兒腿癰色赤久不生肌日晡發熱此脾經血虛也用四君歸芎柴胡牡丹皮熱漸止而肌漸生後因停食吐瀉瘡色變此脾氣虛弱用益氣湯異功散而痊一小兒臀瘡久不生肌余曰臀屬膀胱乃氣血難到之所此稟腎虛而患者當調補脾氣滋養陰血遂用五味異功散地黃丸而痊一小兒臀癰潰而不斂發熱作渴小便頻便仍欲降火余謂此稟腎經陰虛而火動耳用補中益氣湯加減八味丸而愈畢姻後臀復患癰欲速效服敗毒散潰而發熱脈洪數而無力腎部為甚仍用益氣湯八味丸為主佐以八珍湯異功散而愈一小兒腿瘡久不生肌腫痛色赤此脾胃虛而濕熱也用益氣湯加黃柏防己漸愈又用四君柴胡升麻而痊一小兒臀瘡腐而作痛不止肌肉不生口乾作渴右關脈洪數此胃經火盛之惡症先用竹葉黃耆湯二劑而痛止又以四君加升麻白芷而愈一小兒臀間腫硬色不變面目皎白余謂稟腎不足反行敗毒日出清膿而歿一小兒頸間腫硬余謂稟肝腎不足不信乃用雜藥後頤間胸脅膝骨皆腫各用火針出水瘡口開張而歿補中益氣湯治小兒稟賦不足榮衛之氣短促寒薄腠理閉鬱而為瘡瘍或因瘡瘍服克伐之劑氣血虧損而不能消散或因已潰氣血虧損而不能生肌或惡寒發熱煩躁倦怠飲食少思等症人參黃耆炒白朮炒甘草炒當歸陳皮各五分柴胡升麻各三分上薑棗水煎服神效烏金膏治瘡瘍肉死不腐塗之即腐未死塗之即生若初起腫痛搽點數處其毒頓消若患頑瘡元氣無虧久不收斂內有毒根者以紙捻蘸紝之即斂其方用巴豆仁一味炒黑研如膏點於患處臨用修合庶不幹耳此方雖不出千方書余制而用之良有奇驗故並籍焉五味異功散方見用敗毒之藥四君子湯方見腹癰加減八味丸即六味丸加五味子四錢肉桂一錢四物湯方見腋癰十全大補湯方見便癰竹葉黃耆湯六味地黃丸二方見作渴不止保和丸方見發熱不止發熱不止瘡瘍發熱初患乃毒氣所焮已成乃內焮作膿已潰乃血氣虧損不可概行敗毒以傷元氣蓋未成者當分邪之在表在裡將成者當分邪之可攻可補已成者當分膿之作與未作膿已成者當分膿之淺深高漫膿已潰者當分痛之止與不止若作痛而發熱者用仙方活命飲作膿而發熱者用托裡消毒散膿脹而發熱者用加味托裡散膿出而發熱用八珍黃耆午前發熱者陽氣虛也用補中益氣湯午後發熱者陰血虛也用四物湯加參耆日晡惡寒發熱者陽氣下陷於陰分也用補中益氣湯發熱作渴小便頻數者腎氣虛弱也加減八味丸膿血多而熱者陽無所附也十全大補湯日將晡而熱者氣血虛也八珍湯若無寐而熱者內補黃耆湯煩躁者血脫也當歸補血湯自汗而熱者胃氣虛也四君子湯惡寒發熱者肺氣虛也補中益氣湯或四君黃耆當歸主之亦有五臟相勝夾食夾驚或乳母六淫七情所致者不能備述治者臨症詳之一小兒腿癰發熱腫痛肉色不赤此形氣虛而病氣實也先用活命飲二劑隨用益氣湯二劑外用蔥尉法而愈一小兒十五歲眉患癰敷服者皆敗毒之藥腹痛腫硬此脾胃復傷而然也朝用異功散夕用大補湯兩月餘而愈一小兒十一歲腿內側患癰漫腫堅硬肉色不變自汗盜汗此稟肝脾虛羸也用大補湯異功散元氣漸復膿潰針之仍服前藥而愈一小兒腿內股患瘡發熱不愈診乳母肝脾血虛有熱用異功散加柴胡升麻及加味逍遙散與乳母服兒日服數匙兩月餘而愈一小兒臂癰腫痛色白余用托裡之劑不從反內外用敗毒之劑發熱不食手足並冷仍欲敗毒余曰此脾胃復傷而變症耳若再行攻毒則胃氣益損五臟皆虛諸症蜂起矣乃用益氣湯佐以異功散而漸安一小兒潰後發熱飲乳不歇面目或赤此胃氣虛熱津液不足而作渴也用白朮散末以乳調服而愈後發熱作嘔吐酸腹脹此乳食停滯先用保和丸異功散各末一服又用托裡散八珍湯而瘡斂一小兒潰後發熱懶食日晡益甚此脾氣虛弱也先用四君升麻歸耆飲食漸進次用八珍牡丹皮發熱漸止後用托裡散而痊一小兒腹癰潰後發熱作渴手足並冷余謂脾胃陽虛用六君薑桂治之不信反清熱敗毒果吃逆腹痛而歿一小兒臀癰潰而發熱面色青白服敗毒藥益甚余謂脾氣虛寒而隔陽於外非熱也用人參理中湯不信後吐瀉手足並冷而歿加味托裡消毒散治潰瘍餘毒發熱作痛人參黃耆炒當歸酒拌各一錢川芎芍藥白芷茯苓各五分金銀花甘草連翹乳香沒藥各三分上作三劑水煎服八珍湯治潰瘍氣血俱虛者用此方主之若因脾氣虛弱而不能生血者宜用異功散當歸一錢川芎五分芍藥炒七分熟地黃酒拌人參白朮茯苓各一錢甘草炙五分上每服三五錢薑棗水煎加味逍遙散治因乳母肝脾血虛發熱致兒患瘡或兒肝脾有熱致瘡不愈當歸甘草炙芍藥酒拌茯苓白朮炒各一錢柴胡牡丹皮山梔炒各七分上作四劑水煎服若乳母肝脾血虛內熱或寒熱遍身瘙癢等症尤宜用之七味白朮散治胃氣虛弱或因克伐或因吐瀉口乾作渴飲食少思作渴飲冷者去木香藿香白朮木香白茯苓甘草炒人參乾葛各等分上每二錢水煎服保和丸治飲食停滯發熱者不可多服神麯炒山楂半夏茯苓陳皮各一兩連翹蘿蔔子各五錢上為末糊丸小桐子大每服二三十丸白湯送下化服亦可加白朮名大安丸當歸補血湯治瘡瘍血氣虧損或妄服峻劑致血氣俱虛肌熱大渴喜飲目赤面紅晝夜不息其脈洪大而虛重按全無其症似宜服白虎湯但脈不長實為可驗耳若服白虎湯必死黃耆炙一兩當歸二錢上水煎徐徐服內補黃耆湯治潰瘍膿水出多或過服敗毒之劑致氣虛血弱發熱無寐或兼盜汗內熱或不生肌自制黃耆炒二錢人參白朮炒茯苓陳皮當歸各一錢半酸棗仁炒一錢五味杵甘草炒各五分上水煎徐徐服十全大補湯方見便癰蔥尉法方見流注補中益氣湯方見肌肉不生四君子湯六君子湯二方見腹癰仙方活命飲五味異功散托裡散托裡消毒散四方見熱毒瘡瘍加減八味丸方見作渴不止大便不通瘡瘍大便不通初起則審所致之因所見之症而行內疏外表之法已潰則分血氣虛實傳變之症而用托裡滋補之法不可泛用苦寒疏導之劑恐復傷真氣則腫者不能消散成膿潰者不能生肌收斂故丹溪先生云腫瘍內外皆壅宜托裡表散為主潰瘍內外皆虛宜托補接為主治者審之一小兒胸患癰腫痛熱渴大便不通脈沉數而有力此形病俱實而邪在內也用涼膈散大便隨通而痛頓減又用活命飲焮痛隨散瘡頭出膿又用托裡消毒散而愈一小兒腹癰腫痛大便不通脈洪數而有力兩寸關為甚此表裡俱有邪也用大連翹飲去大黃一劑大便頓通再用活命飲一劑諸症頓退又用清熱消毒散而消一小兒臂癰腫痛大便乾澀用瀉黃散但面色痿黃此脾經氣血虛也先用補中益氣湯加熟地黃兩月餘大便漸利惡寒發熱此邪氣去而真氣虛也用托裡散八珍湯而痊一小兒臀癰潰而作渴煩熱大便不通脈洪大而虛用當歸補血湯及四物加黃耆各二劑而便通又用八珍湯托裡散而瘡斂一女子患流注大便不通乾澀色赤或黃頭暈惡寒此脾腎氣虛而血弱也用補中益氣湯加桃仁杏仁麻子仁而大便潤去三仁加蔓荊子而頭暈愈又用托裡散而瘡痊一女子患瘰癧便結面赤口乾晡熱此肝腎陰虛而內熱也先用加減八味丸八珍湯兩月餘大便漸通又用加味逍遙散佐以五味異功散而大便通用九味蘆薈丸而瘡愈一小兒十五歲瘰癧二年矣余謂稟腎肝陰虛燥熱用地黃丸之類而愈後大便結燥用通幽湯為主佐以八珍湯之類兩月餘而漸愈彼欲速效另服碑記黑丸子通而不止虛症並臻余仍用前法半載而愈一小兒流注愈而大便祕結發熱作渴兩頤赤色余謂腎肝陰虛用地黃丸通幽湯而愈次年畢姻後大便仍祕用潤腸丸余曰東垣云少陰不得大便以辛潤之以苦泄之不信仍用前藥後果歿一小兒腹癰潰而大便澀滯面赤作渴余謂腎開竅於二陰乃稟腎陰不足不信反用疏導之藥泄瀉不止而歿一小兒臂癰潰而大便不利或利而後重或虛坐努力余謂脾氣虧損用補中益氣湯不悟仍用下利之藥吃逆腹痛而歿涼膈散治實熱大便不通或咽腫作痛口舌生瘡或便溺赤澀發熱譫語睡臥不安妥大黃朴硝甘草連翹山梔黃芩薄荷葉各等分上為末每服少許蜜湯調服大連翹飲方見臂癰清熱消毒飲方見熱毒口瘡加味逍遙散當歸補血湯二方見發熱不止補中益氣湯方見肌肉不生活命飲托裡散二方見熱毒瘡瘍九味蘆薈丸方見喉痹大便不止瘡瘍泄瀉不止或因膿血出多脾氣有傷或命門火衰不能生土或脾氣虛寒不能司攝或稟腎虛不能禁固或乳母脾胃虧損元氣下陷致兒為患若瀉而煩熱無寐脾氣虛也用東垣聖愈湯瀉而口乾飲湯胃氣虛也用錢氏白朮散瀉而煩渴飲水胃經有熱也用東垣瀉黃散瀉而色黃飲食不化或腹中作痛脾氣虛弱也用六君加木香瀉而色黃小腹重墜或大便去而不了脾氣下陷也用補中益氣湯瀉而色青飲食少思腹中作痛肝木侮土也用六君木香升麻柴胡東垣先生云診右關脈弦風邪傷脾也用芍藥甘草湯之類右關脈洪熱邪傷脾也用三黃丸之類右關脈緩本經濕熱傷脾也用平胃散之類右關脈澀燥邪傷脾也用異功散加當歸或四君子湯加熟地黃之類右關脈沉細寒邪傷脾也用益黃散理中丸之類寒甚加附子大凡飲沸湯而不知熱者陽氣虛寒之症也急用四君桂附飲冰水而不知寒者陽氣亢熱之症也急用清涼飲之類又法以手足並冷者為虛寒用五味異功散加薑桂不應急加附子手足不熱者為虛熱用五味異功散七味白朮散手足並熱者為實熱用瀉黃散多有更生者一小兒臂癰久潰飲食後即泄瀉小腹重墜面色或痿黃或皎白兩寸脈短不及本位按之若無此脾氣虛寒下陷不能升化而然用八味丸補命門火佐以益氣湯以倍胃氣月餘漸愈更佐以二神丸兩月餘而瘡愈一小兒腿癰潰後泄瀉飲食少思手足並冷多在侵晨夜間此變脾腎虛寒也用四神丸六君薑桂漸愈以益氣湯間服而愈一小兒便癰久不愈泄瀉面黃手足時冷小腹重墜此脾氣虛弱下陷之惡症也朝用益氣湯內人參五錢白朮二錢夕用異功散內人參三錢白朮二錢更以人參二兩煎湯代茶兩月餘而愈至十七歲畢姻後患便癰泄瀉手足並冷幾危余謂命門火衰用八味丸益氣湯而愈一小兒流注潰後作瀉飲食難化余謂脾氣虛弱用六君子湯而愈後因停食泄瀉手足並冷用六君薑桂不應用人參一兩附子一錢數劑諸症始退卻用獨參湯月許而愈一小兒瘰癧泄瀉面青腹脹審乳母乳頭乳房作痛蓋乳房屬胃經乳頭屬肝經乃肝木勝脾土而然耳兒病正屬是經乃母子同病也朝用益氣湯夕用六君升麻柴胡為主佐以肥兒丸母子同服並愈一小兒瘰癧泄瀉服分利之劑小便不利面黃少食余謂因脾肺氣虛不能分布諸臟朝用益氣湯夕用異功散諸症悉愈一小兒瘰癧作瀉面青腹脹此脾虛而肝侮也用異功散為主以四味肥兒丸為佐諸症漸愈卻用肥兒丸為主異功散為佐而愈一小兒臀癰久不愈大便泄瀉小便不調發熱作渴余謂腎開竅於二陰故二便不調此稟腎氣虛熱而然也用地黃丸益氣湯之類諸症漸退肌肉漸生瘡口自愈一小兒瘰癧兼瀉形氣骨立此肝脾疳症用異功散三劑卻用蚵蟆丸一服月餘而愈一小兒十五歲已近女色患此服十宣散久不愈余謂當大補元氣不信致惡寒發熱或作渴唾痰或頭目眩暈或手足發熱去後大小便牽痛形體骨立余謂此精血未滿而虧損所致用補中益氣湯加減八味丸日以人參二兩煎湯代茶三月餘而愈一小兒十五歲腿癰將愈而作瀉余用補中益氣湯及六君子湯而愈後因功課勞神飲食失節或時復瀉余謂胃氣未復仍用前藥不信另服消導之藥泄瀉不止而歿夫胃氣和平飲食入胃精氣則輸於脾土歸於肺行於百脈而成榮衛若飲食一傷起居不時損其胃氣則上升精華之氣反下降而飧泄非升陽補氣決不能愈八味地黃丸治諸瘡因命門火衰不能生脾土致血氣虛弱不能生肌而瘡口不合或變諸敗症又諸瘡愈後小便頻數大便作泄飲食不入作渴發熱肌肉不生之聖藥但世人未經試驗而不信用惜哉熟地黃用生地黃酒浸透砂器內九蒸九曬仍曬乾八兩山茱萸酒拌取肉山藥各四兩牡丹皮白茯苓澤瀉各三兩炮附子一兩肉桂用厚者括去外皮淨一兩上以地黃酒拌濕杵膏各味為末和勻再入酒糊丸少許量大小白湯送下四神丸治瘡瘍脾虛胃弱大便不實飲食少思或泄瀉腹痛又治腎虛五更初瀉肉豆蔻二兩補骨子四兩五味子二兩吳茱萸一兩上為細末用紅棗六十五枚生薑六兩水二鍾煮乾取棗肉丸桐子大每服二三十丸白湯送下或化服二神丸治瘡瘍因脾腎陰虛泄瀉補骨脂四兩肉豆蔻二兩生用上為末用紅棗四十九枚生薑四兩水一鍾煮乾取棗肉丸桐子大每服二三十丸白滾湯下補中益氣湯方見肌肉不生五味異功散方見用敗毒之藥六味地黃丸方見作渴不止六君子湯方見腋癰獨參湯方見出血不止四味肥兒丸方見貼骨癰蚵蟆湯方見諸疽口瘡即蟾蜍丸小便不通瘡瘍小便不通者其因不一當分經絡虛實而藥之若心小腸熱而不通者用黃連導赤散心經氣虛用養心湯肝經實熱用龍膽瀉肝湯肝經虛熱用地黃丸脾經實熱用瀉黃散脾經虛熱用四君子湯肺經實熱用黃芩清肺飲肺經虛弱用補中益氣湯腎經燥熱用滋腎丸腎經虛熱用地黃丸設若潰而惡寒發熱氣血虛也用八珍湯手足並冷陽氣虛寒也用四君子湯加乾薑升麻手足不冷乃脾氣虛弱也用四君柴胡升麻半夏寒熱往來氣血虛也用十全大補湯大便了而不了脾氣虛而下陷也用補中益氣湯切不可輕用疏導之劑復傷元氣致腫者不能起發腐潰潰者不能生肌收斂須臨症制宜而治庶無誤矣一小兒頭患瘡小便不利胸滿少食此脾肺氣虛也先用益氣湯飲食頓進又用八珍湯加五味子小便頓利末用托裡散而痊一小兒患腹癰小便不利大便乾實此形病俱實先用八正散二劑二便隨通又用加味清胃散二劑再用仙方活命飲一劑而痊一小兒兩脅胸間或兩腿內側患瘡瘍小便不利或作或輟診乳母肝脾脈洪數母服加味逍遙散子服梔子仁散加柴胡而痊一小兒臂瘡服敗毒之藥小便不利腹脹作嘔此胃氣復傷陽氣虛弱而然耳先用六君薑桂一劑嘔脹頓止再用異功散小便如常後用托裡散而瘡愈一小兒患流注小便不利面白口乾手足時冷悉因脾肺氣虛之所致也用益氣湯加山藥五味子諸症漸愈又用托裡散而瘡愈一女子臂瘡飲食少思小便不利余謂脾肺氣虛不能生化先用四君黃耆當歸小便尋利又用五味異功散托裡散而瘡愈一小兒患便癰誤服敗毒之劑虧損元氣不能成膿余用托裡之藥潰之而愈後小便不利面色痿黃四肢時冷余謂脾肺氣虛不能下輸膀胱用補中益氣湯不信另服滲利之藥嘔吐腹痛手足並冷余先用四君薑桂再用補中益氣湯之類元氣漸復小便漸利一小兒患腹癰潰而膿清不斂面色青黃余謂肝木侮脾土用六君柴胡升麻及補中益氣湯之類而愈後小便頻數而少服木通車前之類乃純陰淡滲之味善傷陽氣經曰無陽則陰無以生無陰則陽無以化非純補氣之藥不救不信後果歿一小兒腹癰潰而膿水清稀煩躁時嗽小便如淋仍欲分利余曰此脾肺氣虛之惡症分利導損真陰之所致也急補脾肺脾肺氣旺則小便自調諸症自愈奈何不悟余言仍服前藥以致不起惜哉梔子仁散治小便不通或兼見血或臍腹脹悶煩躁不安梔子仁炒五分茅根冬葵子各三分甘草二分上水煎或為末服亦可八正散治瘡瘍內蘊熱毒大小便不利大黃炒三分山梔炒萹蓄車前子炒二分滑石瞿麥木通各二分上水煎服海金沙散治下焦濕熱不施化而小便不利海金沙鬱金滑石甘草各等分上各為末每服四五分白湯調下清心蓮子飲治發熱口乾小便不利或兼白濁夜則安靜晝則發熱黃芩炒麥門冬地骨皮車前子炒甘草各三錢半石蓮肉搗碎茯苓黃耆炒柴胡人參各二錢五分上每服二錢水煎黃芩清肺散治肺燥而小便不調黃芩炒一錢山梔一個杵上水煎服滋腎丸治腎熱而小便不調黃柏酒拌炒黑三兩知母炒三兩肉桂三錢上為末水糊丸麻子大每服三五十丸白湯下水調服亦可導赤散方見臂癰內疏黃連湯方見作痛不止八珍湯方見發熱不止補中益氣湯方見肌肉不生活命飲托裡散二方見熱毒瘡瘍六君子湯方見腹癰小便不止瘡瘍小便不止有膀胱氣虛而不能禁止者有膀胱虛熱而自遺者有肺經傳熱遺於膀胱而然者有肺虛不能生腎而然者有稟腎虛早近女色而然者治法膀胱氣虛用六味丸六一散膀胱有熱用六味丸滋腎丸肺經遺熱用清肺散六味丸肺氣虛用益氣湯六味丸早近女色而小便不止或大小便牽痛者乃腎肝虧損所致作渴飲冷屬虛熱用六味丸補中益氣湯作渴飲熱屬虛寒用八味丸補中湯精血篇云男子精未滿而御女色以通其精五臟有不滿之處異日有難狀之疾老人陰以痿而思色以降其精則精不出而內敗小便澀痛如淋愈痛則愈便愈便則愈痛若不條分縷析而泛投雜藥則誤矣一小兒項腋結核潰而體瘦發熱小便不止此稟肝膽之精血氣虛熱而然也先用加味逍遙散五味異功散為主以地黃丸為佐月餘以地黃丸為主五味異功散加當歸柴胡為佐諸症漸愈又以四味肥兒丸間服而愈小兒陰囊時腫余謂胎稟肝火不信後患便癰潰後小便淋瀝或時澄白此肝火為患潰久肝氣虛弱而小便如斯也蓋虛則補其母腎為肝之母用地黃丸滋腎水以補肝漸愈因功課勞心兼怒不時寒熱小便如淋用加味逍遙散而寒熱止卻用地黃丸為主佐以四味肥兒丸而愈一小兒流注久潰面白時咳膿水清稀小便短少或如淋不止余謂脾肺氣虛不能生肝腎而然用補中益氣湯六味地黃丸為主佐以托裡散而漸愈又間用豆豉餅而斂一小兒鶴膝風久潰小便頻數後淋瀝不止面色黑或皎白飲食少思四肢倦怠此腎之脾胃虛也朝用補中益氣湯夕用五味異功散飲食漸加肢體漸健卻用地黃丸而愈一小兒早近女色患脅癰潰而小便如淋服分利之劑更加腹脹小便不止莖中作痛大便自遺余謂稟腎陰虛也當急補脾肺以滋化源不信仍服分利之藥而歿黃芩清肺飲滋腎丸二方見小便不通加味逍遙散方見發熱不止四味肥兒丸方見貼骨癰豆豉餅方見流注八味丸方見大便不止五味異功散方見敗毒之藥作渴不止瘡瘍作渴當分經絡所屬及血氣虛實而治若焮痛發熱便利調和者邪在腑也用清熱消毒散腫痛發熱大便祕澀者邪在臟也先用瀉黃散如未應用涼膈散焮痛熾盛邪在經絡也用仙方活命飲右關脈洪數有力者胃火消爍津液也用竹葉石膏湯右關脈數而無力者胃虛津液短少也用補中益氣湯飲食失度胃氣內傷而亡津液者用錢氏白朮散膿血出多而氣血虛弱者用八珍湯加五味子稟腎不足而津液短少者用加減八味丸其餘當臨症制宜一小兒右頰患瘡作渴飲冷目黃唇裂此脾胃實熱也用瀉黃散而愈後傷食作渴遍身皆黃少用瀉黃散黃退而渴益甚此熱退而真氣虛也用白朮散而痊一女子臂癰口乾飲湯小便頻數此脾肺氣虛用四君黃耆乾薑及益氣湯而愈一小兒腹癰潰後作渴飲湯此脾胃氣虛用六君黃耆當歸而渴止用異功散而瘡斂一女子面瘡作渴飲湯麵赤此脾氣虛熱也先用異功散又用益氣湯而愈一小兒素食膏粱口舌生瘡作渴飲冷手足常熱此胃經積熱先用竹葉石膏湯二劑又用竹葉黃耆湯二劑漸愈再用白朮散去木香而愈又一小兒所患同前先用清肺散再用涼膈散而愈一小兒患瘰癧面赤作渴余謂肝腎虛熱用加減八味丸補中益氣湯六味地黃丸月餘諸症頓愈佐以九味蘆薈丸而愈一小兒口乾作渴發冷泄瀉諸藥不效皆謂不起右關脈弦數按之沉伏尋揣腹中隱伏一塊雞卵大此肝脾疳也用蟾蜍丸三月而消兼服地黃丸三月諸症漸退卻以白朮散為主四味肥兒丸為佐而痊一小兒臀疽將愈而作渴小便頻數面色常赤脈洪數按之無力尺脈為甚余謂稟父腎虛不信乃降火生津更作嘔腹痛而歿一小兒十五歲面患瘡兩足發熱作渴余謂腎經虛熱泛服雜藥小便如淋而歿竹葉石膏湯治胃經氣虛內熱患瘡作渴竹葉石膏煅各三錢甘草人參各二錢麥門冬五錢上每服二錢薑水煎嬰兒母同服竹葉黃耆湯治脾胃經熱毒瘡瘍作渴神效淡竹葉黃芩炒麥門冬當歸川芎甘草黃耆芍藥人參半夏石膏煅各一錢生地黃二錢上每服二錢水煎黃耆六一湯治瘡瘍氣虛作渴愈後復渴尤宜服之黃耆炙六錢甘草炙錢上水煎服六味地黃丸加肉桂一兩五味子四兩名加減八味丸熟地黃八兩杵膏山茱萸肉乾山藥各四兩澤瀉牡丹皮白茯苓各三兩上為末入地黃膏量加米糊丸桐子大每服數丸溫水空心送下行遲鶴膝加鹿茸牛膝五加皮若因腎肝血虛發熱作渴小便淋祕痰氣上壅或風客淫氣瘰癧結核或四肢發搐眼目瞤動或咳嗽吐血頭目眩暈或咽喉燥痛口舌破裂或自汗盜汗便血諸血或稟腎氣不足肢體形弱筋攣骨腫或解顱失音畏明下竄或早近女色精血虧耗五臟齊損之症並宜服之瀉黃散治脾胃經實熱患瘡口渴飲冷藿香葉七葉石膏煅五錢甘草防風山梔仁炒各一兩上為末每服二錢水煎入蜜少許嬰兒乳母服之東垣聖愈湯方見出血不止五味異功散方見用敗毒之藥補中益氣湯方見肌肉不生七味白朮散方見發熱不止清熱消毒散方見熱毒口瘡仙方活命飲方見熱毒瘡瘍清胃散方見腹癰敷寒涼藥瘡瘍敷藥當分陰陽虛實而用內治之法不可概敷寒涼之藥若腫痛熱渴脈滑數而有力者其症為純陽宜服濟陰湯外敷抑陽散則熱毒自消瘀滯自散若似腫非腫似痛非痛似赤非赤似潰非潰脈洪數而無力者其症屬半陰半陽宜內服沖和散外敷陰陽散則榮逆自從血鬱自散若微腫微痛色黯堅硬肉色如故久而不潰脈按之沉細舉指虛浮者其症屬純陰宜內服回陽湯外敷抑陰散則寒氣自解陽氣自復凡陽氣虛寒不能消散腐潰或潰而腫不消口不斂者必內外溫補庶可保全若陰寒之症而用寒涼之藥則腠理迷塞氣血凝滯毒氣益深良肉反死瘡口不斂惡症蜂起不可復救矣蓋胃氣得寒則不能運行瘀血得寒則不能消散死肉得寒則不能腐潰新肉得寒則不能化生治者不可不察也一小兒面瘡敷寒涼之藥患處堅實頭面俱腫此脾胃受寒血氣凝滯而不能行耳先用沖和湯陰陽散患處和軟次用托裡消毒散堅硬頓消又用托裡散瘡潰而愈一小兒腹癰敷寒涼之藥腹脹吃逆手足並冷此脾胃復傷而虛寒也用回陽湯抑陰散諸症漸退用托裡散而潰八珍湯而愈一小兒潰瘍敷寒涼之藥肌肉不生膿水不止余謂脾氣虧損而然用異功散加升麻白芷漸愈又用托裡散而痊一小兒臂癰敷服皆寒涼之藥更加腫硬余謂當助脾胃以解凝寒乃用益氣湯加茯苓半夏薄桂及如聖餅尉之而愈大凡瘡瘍久而不愈不問已潰未潰皆因陽氣虛不能運行耳用如聖餅或蔥尉法為善一小兒兩足脛內外赤腫焮連膝上因痘愈之後或謂痘毒欲用寒劑或謂丹毒欲砭出血余曰非也此足三陽經熱毒壅腫耳況痘愈之後元氣未復設若砭劑出血則患處愈傷敷貼涼藥則榮氣愈滯服敗毒之藥則元氣愈虛瘀血愈凝不信竟用前法果兩脛潰而色黯瘡口不斂大便去後如痢欲用治痢之藥余曰此因誤用前法元氣復傷而下陷也非痢非毒遂用補中益氣湯之類而愈一小兒大腿漫腫不赤服敗毒之藥手足並冷吐瀉不食余曰元氣虛而半陰半陽之症也用陰陽散沖和湯腫起色赤此變純陽之吉症也仍用前藥佐以活命飲而消一小兒臂癰面色痿黃飲食少思脈洪數按之軟弱余謂真氣虛而邪氣凝滯也用白芷升麻湯以清胃經熱毒用五味異功散以補胃經元氣不信反用寒涼之劑外敷內服腫硬至手肉色如故腹中作痛脈浮大按之沉細此脾胃之氣復傷而變虛寒之症也當祛散寒邪溫補脾氣仍不信又與敗毒吃逆不食手足並冷此寒氣逼陽於外無根之火泛行耳果死手足俱青患處皆黑一小兒足脛腫硬一塊年餘而潰時出清膿其腫益堅肉色青黯發熱煩躁余謂真氣虛而邪氣實當先調脾胃或以為熱毒凝滯敷寒涼之藥腫硬至膝肉潰腹脹吐瀉而死托裡沖和湯治瘡瘍屬半陰半陽似潰非潰似腫非腫因元氣虛弱失於補托所致自制人參二錢黃耆三錢白朮炒陳皮當歸各一錢甘草炒五分上水煎徐徐服手足冷者加薑桂其熱已退而未消潰用仙方活命飲可內消者再用托裡消毒散可作膿者再用托裡散陰陽散即沖和膏治瘡瘍元氣虛弱似腫非腫似痛不痛似熱不熱屬半陰半陽之症用此以和陰陽內服沖和湯或托裡散以助元氣紫荊皮炒五兩獨活炒三兩赤芍藥炒白芷石菖蒲各二兩上為末用蔥酒調服托裡回陽湯治瘡瘍屬純陰不腫痛不焮赤不腐潰或腹痛泄瀉嘔吐逆冷陽氣既陷急用之多有生者自制乾薑附子重一兩四錢者當歸陳皮白朮黃耆人參甘草炒各二錢柴胡升麻各三分上水煎徐徐服之如不應倍加薑附外敷抑陰散一方名回陽上龍膏抑陰散治瘡瘍元氣虛寒不能消散或腹痛泄瀉嘔吐不食手足或冷或不潰斂筋攣骨痛屬純陰之症以此助陽行陰內服回陽湯以回陽氣草烏炒二兩南星白芷各一兩肉桂五錢赤芍藥炒一兩上各為末蔥湯調塗熱酒亦可解毒濟陰湯治瘡疽臖腫作痛屬純陰者用以此解毒其熱未退用仙方活命飲自制連翹山梔炒黃芩炒黃連炒各一錢赤芍藥一錢五分金銀花三錢甘草一兩上每服二三錢水煎大便祕結者量加炒大黃外敷抑陽散抑陽散即洪寶丹治瘡瘍屬純陽者天花粉三兩薑黃白芷赤芍藥各一兩上為末茶湯搽調患處五味異功散方見敗毒之藥仙方活命飲托裡消毒散托裡散三方見熱毒瘡瘍補中益氣湯方見肌肉不生八珍湯方見發熱不止如聖餅蔥尉法二方見流注服敗毒藥小兒瘡瘍多由胎稟遺熱或乳哺積熱或乳母七情致熱經云五臟不和九竅不通六腑不和留結為癰又云氣主噓之血主濡之治者當察其經絡所因表裡虛實而調和以固其本假如腫痛熱渴大便祕結者邪在內也宜疏通之腫焮作痛寒熱頭疼者邪在表也宜發散之焮腫痛甚者邪在經絡也宜和解之漫腫微痛而不潰者血氣虛弱也宜補托之色黯微痛而不潰或潰而不斂者陽氣虛寒也宜溫補之如是則五臟自和六腑自調氣血自生瘡毒自解此即敗毒之法也若概用寒涼之劑復損脾胃則腫者不能消散潰者不能收斂諸惡蜂起多致不救矣一小兒臂癰腫硬色白寒熱倦怠此因血氣虛耳先用五味異功散加木香乾薑諸症漸減去二味又佐以托裡散如聖餅膿潰而愈一小兒臂癰服敗毒藥腫硬不消汗出不止此脾肺氣虛也用異功散加五味子而汗止佐以蔥尉而膿成用托裡散而瘡愈一小兒腿癰膿水清稀手足時冷余謂脾胃虛寒先用益氣湯加乾薑而手足溫用異功散蔥尉法而膿稠用八珍湯附子餅而瘡愈一小兒面生瘡寒熱頭痛服大黃等藥連瀉數度手足並冷瘡黯吃逆余曰此邪在表誤攻其里下多而亡陰也後果歿一小兒腿癰服麻黃等藥汗出喘急手足並冷余謂此陰虛誤汗而亡陽也後果歿五味異功散治稟賦元氣虛弱肌肉消薄榮衛短促而患瘡瘍不能消散或脾肺氣虛不能生肌收口大凡諸症因脾氣虛而不能愈者皆宜服之調補元氣則自愈矣人參茯苓白朮炒甘草炒陳皮各等分上為末每服二三錢薑棗水煎托裡散方見熱毒瘡瘍蔥尉法如聖餅二方見流注八珍湯方見發熱不止十全大補湯方見便癰補中益氣湯方見肌肉不生附子餅方見貼骨癰用刀針法小兒瘡瘍用針法比之大人尤宜慎重當審經絡表裡之虛實部分肌肉之厚薄而施之夫腫高而軟者發於血脈也腫硬而堅者發於肌肉也肉色不變者發於骨也瘡未成者解散以消其毒已成者托裡以速其膿膿已成者當驗其生熟淺深而後針之以指輕按便痛者膿淺也重按方痛者膿深也按之不起者膿未成也按之即起者膿已成也若膿初生而即針則泄其氣血而膿反難成若膿已熟而不針則腐潰益深而不能收斂若瘡深而針淺則內潰不出外血反傷若瘡淺而針深則其膿雖出良肉亦傷蓋瘡瘍之症氣血已傷肌肉已壞當隨決其毒不可拘泥人神部分其膿一出諸症自退若膿出反痛或煩躁嘔逆者皆由胃氣虧損急宜托裡調補凡膿已成者宜急刺去以紙捻蘸由紝瘡內以膏藥貼之兒安不必服藥如瘡反復未痊多是乳母食厚味或七情火動而然當審所因而調治其母俱藥中加漏蘆令母服之乳中藥過而瘡自愈一小兒患瘡腫硬或用針出血寒熱嘔吐乃胃氣虛而復傷也用異功散而嘔止用八珍湯而血止用托裡散而瘡愈一小兒項間患毒膿成未潰欲急刺之不從至脹痛始針出膿用托裡散而安若及時用針不用藥亦可也一小兒項間患毒膿內潰脹痛此脾肺氣虛而不能外潰也用大補湯四劑針之清膿滴瀝發熱惡寒用獨參湯四劑膿湧泄乃用大補湯托裡散而愈東垣先生云氣血壯實膿自湧出信矣一小兒臂癰用針過深出血不止惡寒口噤脈微細尚可救乃用獨參湯灌之良久咽下半晌而蘇再劑而能言四劑而膿出又用托裡散異功散而愈一小兒項瘡膿成不出兩腮皆白余曰此肝膽經之症腮白乃肺經之色金能剋木當急用針並補脾氣不信竟歿五味異功散方見用敗毒之藥八珍湯方見發熱不止托裡散方見熱毒瘡瘍十全大補湯方見便癰五善七惡瘡瘍之症齊氏陳氏有五善七惡之論又云五善見三則瘥七惡見四則危竊謂前症各有所屬之經各有所主之方蓋五善屬六腑氣血無虧人能調攝不治自愈七惡乃五臟虧損失於滋補所致非瘡瘍自有也調治失宜必致不起如動息自寧飲食知味乃胃氣和平一善也便利調勻乃腸胃調和二善也膿潰腫消水鮮不臭乃邪氣去而胃氣平復三善也神彩精明語言清亮乃心肺氣血無虧四善也體氣平和脾胃無虧五善也作渴發熱或泄瀉淋閉者屬胃火內淫一惡也竹葉黃耆湯氣血俱虛八珍加黃耆麥門冬山茱萸未應佐以加減八味丸料潰而腫痛尤甚膿色臭敗者屬胃虛火熾二惡也人參黃耆湯未應十全大補湯加麥門冬五味子目視不正黑睛緊小白睛青赤瞳子上視者屬肝腎虛火三惡也六味丸料加山梔麥門冬五味子未應八珍湯加山梔麥門冬五味子喘粗氣短恍惚嗜臥者屬脾肺虛火四惡也六君子加薑棗未應用補中益氣湯加麥門五味若心火刑肺人參平肺散陰火傷肺六味丸料加五味子煎服潰後肩背不便四肢沉重者屬脾胃虧損五惡也補中益氣湯加山茱萸山藥五味子如不應用十全大補湯加山茱萸山藥五味子食不下咽服藥而嘔食不知味者屬胃氣虛弱六惡也六君子湯加木香砂仁未應加附子聲嘶色敗唇鼻青赤面目浮腫者脾肺俱虛七惡也用補中益氣湯加薑棗未應加附子若腹痛泄瀉咳逆昏潰者陽氣虛寒之惡症也用托裡溫中湯次以六君子湯加附子薑桂若潰後發熱惡寒作渴怔忡驚悸寤寐不寧牙關緊急或頭痛目赤自汗盜汗寒戰咬牙手撒身熱脈洪大按之微細厚衣仍寒此氣血虛極傳變之惡症也若手足逆冷肚腹疼痛泄瀉腸鳴飲食不入吃逆嘔吐者此陽氣虛寒之惡症也若無汗惡寒口噤足冷腰背反張項頸強直此血氣虛極傳變之惡症也急用參耆歸朮附子救之夫小兒患之因胃氣虛弱或膿血出多虛邪內作或乳母失調血氣不和致兒為患能審其所致之因而主之亦有復生者若更與攻毒乃促其亡也一小兒臂瘡肉腐色紫焮痛作痛右關脈洪數此胃火熾盛之惡症用竹葉黃耆湯而痛止用四君升麻連翹白芷金銀花而愈一小兒流注吐瀉吃逆腹痛手足並冷余謂陽氣虛寒之惡症用六君子獨參湯益甚遂以人參五錢附子五分連服數劑諸症漸退用獨參湯月餘稍愈後飲食失宜寒熱發搐用五味異功散加升麻柴胡而安又因勞發熱脈大而虛面赤作渴用當歸補血湯十全大補湯而安用八珍湯附子餅而愈一小兒腹癰潰而腫痛益甚飲食少思此脾胃復傷之惡症先用五味益功散加木香諸症漸愈乃用異功散加當歸黃耆元氣漸復又用八珍湯托裡散而愈次年畢姻後寒熱往來患處作癢用大補湯地黃丸而愈一小兒脅腫一塊敷寒涼之藥益加腫硬腹中陰冷余謂肌肉受寒而患處腫硬脾氣受寒而腹中陰冷當急溫補脾氣不信仍服前藥加腹痛泄瀉手足並冷余曰變陽氣虛寒之惡症用五味異功散加薑桂二劑諸症漸愈乃去二味服之外用蔥尉之法患處微腫色赤此陰氣散而陽氣至遂朝用補中益氣湯夕用異功散而消一女子股間結一核不作痛不變色服散堅之劑患處腫硬更頭暈吐痰其脈弦數而無力心脾俱虛不信仍用攻伐果吐瀉腹痛發搐吃逆余謂變脾土虛寒之惡症也先用五味異功散加乾薑肉桂脾氣稍復乃用異功散八珍湯而愈一小兒腿癰潰後作渴飲湯瀉利無度此脾胃氣虛之惡症也用益氣湯八珍湯而愈後功課用心口乾作渴小便頻數用益氣湯加五味及黃耆六一湯各五十餘劑而痊一小兒腿癰內潰泄瀉自汗腹痛氣喘余謂脾胃俱虛之惡症用獨參湯喘汗漸止用大補湯諸症悉退後傷食吐瀉用五味異功散加乾薑而愈次年畢姻後患腹癰膿清不斂朝寒暮熱用益氣湯八珍湯各百餘劑而愈一小兒患瘰癧服追毒之藥更惡寒發熱手足並冷右寸脈浮按之而虛用益氣湯百餘劑而稍愈彼欲速效另服石膏之類吐瀉昏憒脈浮大按之微細乃變陽氣虛寒之惡症也用人參二兩附子一錢二劑而蘇數劑而安更以五味異功散月餘而愈一女子十五歲瘰癧發熱晡熱左頰赤甚余謂肝火血虛用加味逍遙散五味異功散九味蘆薈丸而痊後服斑蝥等藥惡症蜂起手足並冷用參附湯二劑六君薑桂四劑乃朝用益氣湯夕用異功散而愈一女子患臁瘡腫痛發熱脈洪大而虛此血虛之惡症也用當歸補血湯煩熱悉止用補中益氣湯佐以加味逍遙散及蔥尉法而痊一女子脅間患癰色白漫腫寒熱不潰余謂稟肝脾虛羸之惡症用補托之藥而愈後因經事過期誤服行血之劑發熱煩躁先用當歸補血湯次用逍遙散八珍湯而愈一小兒十五歲脅癰膿清晡熱盜汗遺精此元氣虛甚之惡症也用大補湯地黃丸料元氣漸復因犯色欲患處色黯昏憒吃逆手足並冷用獨參湯四劑而蘇用大補湯加乾薑六劑陽氣漸復乃去薑又二十餘劑而痊一小兒十四歲面目多白足跟腫硬寸許肉色如常遇勞腫硬宛若一栗口乾面赤余謂稟足三陰經虛症不信外敷內服皆敗毒之劑翻如熟榴煩躁時嗽腹痛泄瀉小便如淋余曰此脾肺氣虛之惡症也不信仍服敗毒更黑睛緊小白睛青赤瞳子上看此肝腎虧損之惡症並矣余欲救其胃氣以滋五臟又為人所阻用千金消毒散更加喘短氣恍惚余曰惡症並臻其何能為或問惡症既甚勿乃攻毒之晚耶余曰邪正不並立一勝一負理之自然胃氣虛則邪氣實也其失在於不預補正氣邪氣勝則惡症集耳東垣先生云但見腫痛參之脈症虛弱便與滋補氣血無虧可保終吉信斯言也一小兒臀間腫硬肉色如故小便短赤而頻服分利之劑膝脛骨腫余曰腎主骨此稟腎虛所致前藥導損腎陰而骨腫耳當調補脾肺以生腎水其骨自消不信仍用前藥而歿一小兒腹癰久不斂余欲滋其化源反清熱敗毒惡症蜂起而歿夫肺者腎之母脾者肺之母前症既不滋腎以生肝木又用寒涼之藥復傷胃氣以絶肺腎之化源不死鮮矣一小兒貼骨癰作瀉余欲施調補不信反服分利兩手撮空肝氣敗也泄瀉無度腎氣敗也痰涎上壅脾氣敗也喘嗽不止肺氣敗也額間汗出心氣敗也辭不治果歿一小兒腿癰腫痛自汗盜汗體倦食少余用托裡之藥而膿成欲針之或用大黃之類令膿從大便出致大瀉腹痛余謂脾胃虛脫之惡症急服大補之劑不信又服前藥而死一女子十五歲外股腫硬連及內股肉色不變右關脈緩弱按之弦數此脾虛而肝乘之氣血虛而色不變也當補脾土為主不信另用流氣飲冰黃散泄瀉腹痛瘡口開張而歿參附湯人參一兩附子制三錢上薑棗水煎不拘時服余方見各症
