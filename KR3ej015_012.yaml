body:
  text: 卷十二疔瘡諸瘡惟疔毒為甚而殺人亦速古云疔有十三種種各不同內三十六疔滿其數即不可救亦有不滿其數而死者乃毒氣走散故也若痘毒染人發於頭面或遍身者又非此類在小兒多因乳母食有毒之物或兒卒中飲食之毒或感四時不正之氣皆能致之其瘡多生頭面四肢形色不一或如小瘡或如水泡或痛或癢或麻木不仁外症寒熱嘔吐噁心肢體拘急大要當分邪之在表在裡急用隔蒜灸法竝解毒之劑若不省人事牙關緊閉急以奪命丹為末熟酒調灌如食生冷之物或用涼水淋洗則輕者難愈重者不治其生於兩足者多有紅絲至臍生於兩手者多有紅絲至心生於唇口之內者多有紅絲入喉急用針挑出惡血以泄其毒可保無虞其在偏僻之處藥難導達者惟灸法有回生之功若投峻厲之劑是促其危矣小兒肌肉脆嫩且不能言痛否灸法須將蒜切薄片著肉一面略剜少空灼艾灸蒜先置大人臂上試其冷熱得宜然後移著瘡上又別灼艾如前法試之以待相易勿令間歇毗陵金文冶子將周歲唇上患疔余用活命飲母子並服更欲隔蒜灸彼不從見腫勢益盛勉灸數壯余誡以多灸為佳又為人所阻而止頭面益腫乃復灸五十餘壯腫勢漸消時與乳母服活命飲瘡出黃水翌日潰而得生一小兒三歲手患紫疔二顆寒熱作痛用仙方活命飲半杯而愈數日後手臂俱腫乃用隔蒜灸服前藥而愈一小兒足患之嘔吐腹脹二日不食欲用護心散診氣口脈大審其大便所出皆酸穢余曰此飲食停滯耳非瘡毒內攻也若用護心等劑則誤矣急投保和丸二服及隔蒜灸而愈其時同患是症用護心敗毒之劑者俱致不救一小兒面上患之寒熱發搐此熱極而肝火動也用荊防敗毒散及隔蒜灸搐止熱退更服異功散加升麻柴胡桔梗而愈一小兒患於胸外敷寒涼內服敗毒更欲嘔不食面色痿黃右關脈浮數按之微細此脾胃復傷所致也急用隔蒜灸服異功散倍加白朮半夏翌日又服活命飲而愈一小兒患前症服敗毒之藥作嘔不食余謂胃氣復傷不信另服護心散嘔甚神思沉困手足並冷脈微細如無急用五味異功散加乾薑二服嘔止食進去姜又四服而愈夫護心散皆寒涼之藥乃宋人為服丹砂蓄熱發疽者而設胃氣有傷即當溫補多因此藥停於胸隔惟覺陰冷作嘔沉困者世人皆謂毒氣攻心而遂概用之其鮮有不敗事者矣一小兒手背患此敷服皆寒涼之劑腹脹痰喘瀉糞穢臭余謂脾胃復傷而飲食停滯也不信仍服治瘡之藥而歿一小兒臂患之色赤腫起恪用化毒丹鐵箍散腫處頓平肉色白陷再日色黯痰喘氣促余謂瘡毒反入於內也辭不治果歿飛龍奪命丹治瘡毒發背腦疽等症真蟾蜍乾者酒化輕粉枯白礬寒水石銅碌乳香沒藥麝香硃砂各六錢蝸牛四十個另研如無亦可上各為末入蟾酥蝸牛或加酒少許糊丸緑豆大每服一二丸溫酒或蔥湯下重者外用隔蒜灸法荊防敗毒散即人參敗毒散加荊芥防風方見流注保和丸方見發熱不止五味異功散方見敗毒之藥仙方活命飲方見熱毒瘡瘍時毒頭面赤腫小兒時毒因感四時不正之氣致鼻面耳項或咽喉赤腫寒熱頭痛甚者恍惚不寧咽喉閉塞狀如傷寒五七日間亦能殺人脈浮數者邪在表脈沉澀者邪在裡在表用葛根牛蒡子湯在裡用梔子仁湯表裡俱病者犀角升麻湯甚則宜砭及用通氣散宜泄其毒旬日自消若不消而欲作膿者用托裡消毒散欲收斂者用托裡散若咽腫不能言頭腫不能食者必死一小兒患此三日二便調和用葛根牛蒡子湯漫腫悉退惟頰間赤腫欲作膿用活命飲二服外用代針膏而膿出再用托裡消毒散而愈一小兒腫赤焮痛此欲作膿也用托裡消毒散二劑膿成針之腫痛頓減又二劑漸愈卻以柴胡梔子散加白芷升麻與母服之而愈一小兒腫焮作痛藥不能下咽先用通氣散連作嚏卻用犀角升麻湯乳食稍進腫痛漸消仍服數劑而膿血漸少母服加味逍遙散而愈一小兒患之咽喉作痛二便自調用葛根牛蒡子湯三劑甘桔湯四劑腫痛漸愈診乳母左關脈弦數用加味逍遙散母子竝服而消一小兒患之赤腫作渴外敷內服皆寒涼之藥余欲洗去敷藥急用發散表邪開通腠理之劑不信仍用前藥遂致不救通氣散治時毒焮痛咽喉不利取嚏以泄其毒玄胡索豬牙皂角川芎各一錢藜蘆五分羊躑躅花三分上為細末用紙捻蘸少許紝鼻內取嚏為效甘桔湯治肺經壅熱胸膈不利咽喉腫痛痰涎壅盛方見時毒犀角升麻湯治風熱口唇頰車連牙腫痛犀角鎊二錢升麻防風羌活川芎白芷各五錢黃芩甘草各一錢白附子四分上每服三五錢梔子仁湯治時毒腫痛大便祕結鬱金枳殼麩炒升麻山梔仁牛蒡子研碎炒大黃炒各等分上為細末每服二三錢蜜水調服葛根牛蒡子湯治時毒腫痛消毒解熱葛根管仲甘草江西豆豉牛蒡子半生半炒研碎各等分上每服三五錢水煎柴胡梔子散方見脅癰托裡消毒散代針膏托裡散仙方活命飲四方並見熱毒瘡瘍加味逍遙散方見發熱不止流注小兒流注乃氣流而注血滯而凝元氣不足之症也或因閃跌墮傷或因肝火氣逆或因六淫內侵或因脾虛食積或因稟賦所致結於四肢節體患於胸腹腰臀或結塊或漫腫或作痛悉用蔥尉之法須固元氣為主閃跌者和血定痛丸肝火者九味蘆薈丸食積者四味肥兒丸藥能對症未成自消已成自潰若膿成不潰者元氣虛也先補而針之庶使毒氣不致內攻氣血不致脫陷若膿出而反痛者氣血虛也用八珍湯作嘔少食者胃氣虛也用四君子湯欲嘔不食或腹作脹者脾氣虛也用六君子湯口噤搐搦者氣血虛極而變症也用十全大補湯內熱晡熱陰血虛也四物參耆白朮表熱惡寒陽氣虛也十全大補湯熱來復去或晝見夜伏晝伏夜發者虛熱也當大補元氣若色赤腫起而膿稠者尚可治不赤硬而膿清或脈洪大寒熱發渴及不受補者皆不可治楊鴻臚子年十二左脅下患此服流氣飲十宣散之類元氣益虛年餘不斂左尺脈數而無力左關脈弦而短此肝經之症因稟腎水不足不能滋養肝木血燥火熾而然耳用六味地黃丸以滋腎水九味蘆薈丸以清肝火而愈一小兒九歲患此久不收斂或咳嗽或寒熱皆服清氣化痰之藥前症益甚至夜作喘口開徹夜不寐手足並冷藥餌到口即嘔余謂悉因脾氣虛甚所致先以人參白朮各五錢炮姜五分以米湯煎之時灌數匙次日能服一杯次日又服一劑諸症漸愈至十餘劑後朝用補中益氣湯夕用異功散而愈李通府子十六歲腰患之三年不愈色黯下陷余曰此腎經症也宜用六味丸滋化源以生腎水更用如聖餅外散寒邪以接陽氣不信別用雜藥元氣益虛七惡蜂起始信余言仍用前藥而愈陳州守子閃右臂腕腫痛用流氣等藥發熱作寒飲食少思口舌乾燥腫痛愈熾形氣益疲余以助胃壯氣為主佐以外治之法而愈黃地官子腿患之腫痛發熱以濕毒治之虛症悉至余謂此元氣虛弱外邪乘之也用十餘大補湯如聖餅而愈一小兒臂肘腫硬用流氣飲肉色不變飲食少思余曰此肝脾虛症也用六君桔梗薄桂茯苓半夏及如聖餅而消一小兒腿腕間患此已半載腫硬色白形氣俱虛余先用五味異功散加當歸三十餘劑卻佐以八珍湯二十餘劑更用蔥尉法腫勢漸消中間一塊仍腫此欲作膿也當補其血氣俱用托裡散為主異功散為佐仍用蔥尉法月許針出稠膿仍用前二藥及豆豉餅三月餘而愈一小兒腿患之腫硬色白惡寒懶食此脾胃陽氣虛而不能成膿也非敷貼敗毒所能療遂用托裡散及蔥尉法月餘患此脹痛發熱膿成針之膿出而安仍用托裡散肢體漸健因飲食內傷泄瀉忽口噤目閉自汗手冷此脾胃虛寒之惡症也以異功散內用人參一兩乾薑一錢半灌之盡劑而蘇又以托裡散內用人參五錢數劑始能動履卻用托裡散大補湯蔥尉法豆豉餅半載而愈一小兒十五歲早喪天真日晡發熱遍身作痛或四肢軟酸唾痰頭暈服祛濕化痰之藥腿之內外肉色腫硬而不變因服攻毒之藥虛症蜂起按褚氏云男子精未滿而御女以通其精五臟有不滿之處異日有難狀之疾正合此論遂用補中益氣湯及地黃丸半年而愈此等症候誤認為實熱而用敗毒之藥者必致不救賈閣老子年十六患此二載矣脈洪大而數膿清熱渴食少體倦夜間盜汗午前畏寒余曰此真氣不足邪氣有餘之症治之無功矣彼懇求治午前勉用四君芎歸炙草午後四君麥門五味逾月諸症漸減有用滲利之劑保其必全者彼信服之形體骨立未幾而歿一小兒右腿腕壅腫形體怯弱余欲以補氣血為主佐以行散之劑彼不信反內服流氣飲外敷寒涼藥加發熱惡寒形體愈瘠始求治於余余曰惡寒發熱脈至洪大乃氣血虛敗之惡症也不可治矣後潰而不斂瀝盡氣血而亡掌教顧東帆子十餘歲秋間腰腿隱隱牽痛面色青中兼黑余曰青是肝虛黑是腎虛當急調補脾腎否則春間必患流注矣不信另用行氣破血之藥至夏腰臀間漫腫五寸許復來請治脈數而滑按之如無此元氣虛極而膿內潰不能起也辭不治後果歿健脾滲濕飲治瘡瘍初起焮腫作痛或濕毒下注或環跳穴痛人參白朮蒼朮防己酒拌黃柏炒川芎陳皮當歸茯苓各五分木瓜不犯鐵器柴胡梢甘草各三分上姜水煎服如三五劑不退加桂少許酒煎亦可小便澀加牛膝身痛加羌活和血定痛丸一名黑丸子治流注膝風或閃跌瘀血肢節腫痛服之自消若潰而發熱與補藥兼服自效百草霜五兩赤小豆半斤川烏炮一兩五錢白蘞八兩白芨南星炮各二兩芍藥當歸牛膝各五兩骨碎補四兩上為末酒糊丸桐子大每服二三十丸白湯下神效蔥尉法治流注結核或骨癰鶴膝等症先用隔蒜灸若余腫尚存用此尉之以助氣行血散其壅滯功效甚速又治跌撲損傷止痛散血消腫之良法也其法用蔥細切搗爛炒熱頻尉患處冷則易之如鶴膝風兼服大防風湯而愈隔蒜灸法治流注及癰疽鶴膝風等症每日灸二三十壯痛者灸至不痛不痛者灸至痛其毒隨火而散蓋火以暢達拔引郁毒此從治之法有回生之功其法用大蒜去皮切三文錢厚安患處用艾壯於蒜上灸之三壯換蒜復灸未成即消已成者亦殺其毒如瘡大用蒜杵爛攤患處將艾鋪上燒之蒜敗再易如不痛或作膿或不起發及瘡屬陰症者尤當多灸凡瘡不痛不作膿不起發者皆氣血虛也多主不治惟患在頭面者不宜多灸論中嬰兒灸法見疔瘡如聖餅治流注及一切瘡瘍不能消散或潰而不斂乳香沒藥木香血竭當歸各等分麝香減半上為末用酒糊和餅二個乘熱尉之毒瘡加蟾酥六味丸一名地黃丸此壯水之劑也夫人之生以腎為主凡病皆由腎虛而致其流注瘰癧屬肝腎二經發熱作渴小便淋祕痰氣壅盛嗽血吐血頭目眩暈小便短少眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰膝痿軟五臟虛損尤宜用之乃水泛為痰之聖藥血虛發熱之神劑也方見發熱不止當歸補血湯治流注及潰瘍肌熱面赤煩渴脈洪大而虛重按全無此血虛症也誤服白虎湯必死方見發熱不止益氣養榮湯治流注氣血虛弱不消散或四肢頸項患腫不問堅軟赤白或痛或不痛日晡發熱或潰而不斂方見鶴膝風十全大補湯治諸瘡血氣虛弱不能消散潰腐收斂或寒熱汗出口眼歪斜肌瘦少食或日晡發熱自汗盜汗或朝寒暮熱瘡口不斂等症方見便癰天蛇毒手指頭生瘡俗名天蛇毒然五指各有經絡拇指屬手太陰肺經食指屬手陽明大腸經中指屬手厥陰心包絡經無名指屬手少陽三焦經少指屬手少陰心經亦有患於足者足趺屬肝膽胃三經大指屬肝脾二經次指屬膽經小指屬膀胱經各當隨經而治其致患之由或因胃中積熱所發或因乳母膏粱厚味所致或因濕熱下流或因風毒外中大率多由所稟足三陰之經虛故邪得以入之也其初患腫痛者先用仙方活命飲次用托裡消毒散元氣下陷重墜作痛久而不潰者用補中益氣湯若服敗毒散及敷寒涼之劑則瘡口變黑或胬肉突出或指皆黑大抵手足為氣血難到之處手屬於胃足屬於脾不可損其真氣丹溪以臀居僻位尚言氣血罕到況肢末乎故寒涼克伐之藥所宜深戒者也一小兒十四歲手大指患之色赤腫痛用奪命丹二粒活命飲一劑將愈因飲酒沐浴而瘡復作發熱咳嗽余謂此毒原屬肺經今肺為濕熱所攻瘡毒乘勢妄行故復作耳先用瀉白散二劑而痰嗽除又用托裡消毒散而瘡愈一小兒食指患之迸出血水瘡口凸腫上連手背久而不愈余曰此元氣虛弱風邪襲於患處血氣不能運及而然用托裡散及蔥尉之法諸症悉退又用豆豉餅異功散加升麻柴胡而愈一小兒患之作痛發熱內外皆用寒涼之藥手背出膿三月不愈面色痿黃此脾氣復傷也先用異功散加升麻柴胡桔梗漸愈又佐以托裡散豆豉餅而痊一小兒十三歲素食膏粱足大指患之腫連腳面喜飲冷水右關脈洪大此脾氣復傷而積熱下注也先用清胃散四劑次用活命飲二劑腫痛漸消又用托裡消毒散數劑膿潰而愈一小兒足大指漫腫上連趺陽色赤腫甚右關脈數而有力此胃經濕熱下注也用活命飲一劑大指本節後始發瘡頭痛亦稍止再劑而漫腫悉退又用消毒散出膿托裡散收斂而愈一小兒足次指患之色赤腫痛上連於腿外塗寒涼之藥反致麻木重陷方知此氣血難到之所又因寒涼遏絶而然急以活命飲加黃耆五錢煎服外以薑蔥湯洗去敷藥用隔蒜灸法半晌知痛其腫頓退再用托裡散加人參三錢數劑膿潰而愈一小兒足大指患之內服外敷皆寒藥也腹痛惡心手足並冷此脾胃之氣復傷而作非瘡毒也先用異功散加柴胡升麻白芷及神方活命飲各一劑諸症頓退又用托裡消毒散膿潰而愈一小兒足大指患之變膿窠之狀良久乾硬痛甚小便頻數此稟父腎經虛熱所致用六味地黃丸而愈一小兒足中指患之耳中腫痛小便頻數此稟父肝腎虛熱為患用六味地黃丸為主佐以柴胡梔子散而愈一小兒不時生瘡𦝨在手足之表年餘不愈審其乳母善怒用加味逍遙散母子服而愈一小兒足大指患之腫痛連腳用活命飲及隔蒜灸其痛不止著肉艾灸數壯方止用活命飲及托裡消毒散而愈一女子十五歲足拇指癢痛敷敗毒之藥勢益甚而色黯余謂脾經鬱結所致彼人略不經意後朝寒暮熱飲食頓減患處微腫足脛漸細而歿錢氏瀉白散方見臂癰奪命丹方見疔瘡消毒散方見胎毒發丹蔥尉法托裡散二方見流注仙方活命飲托裡消毒散二方見熱毒瘡瘍東垣清胃散方見腹癰五味異功散方見敗毒之藥補中益氣湯方見肌肉不生天泡瘡天泡瘡狀如水泡屬肺胃二經風熱若發熱焮痛邪在表也用人參敗毒散發熱咳嗽邪在肺也用加味瀉白散熱渴便祕邪在內也用加味清涼飲此肌膚之症當去毒水以金黃散或黃柏蚯蚓敷之當歸膏亦善既安不必服藥若因攻伐過度元氣虛而變生別症者當參各門治之一小兒患此焮赤惡寒發熱大小便赤澀此邪在表裡之間遂外敷金黃散內服大連翹飲子諸症少愈更加味解毒散而痊一小兒患此焮痛發熱大小便如常此邪在表也挑去毒水敷金黃散用荊防敗毒散治其表柴芍參苓散安其里而愈一小兒患此服敗毒之劑喘嗽唇白此脾肺之氣復傷也先用補中益氣湯一劑諸症悉退後加桔梗白芷二劑而愈一小兒患此服敗毒散敷寒涼藥嘔吐泄瀉猶索敗毒散余佯諾之卻以五味異功散加柴胡升麻而吐瀉愈又用柴芍參苓散而瘡痊一小兒患此服敗毒之藥腹痛泄瀉余意脾氣復傷宜用五味異功散不信仍服敗毒之藥後果不食作嘔流涎泄瀉後重余先用補中益氣湯次用五味異功散而愈一小兒患此服敗毒散作渴飲湯余與七味白朮散治之不信自服敗毒之藥前症益甚更加嘔吐不食來請治余曰嘔吐不食手足並冷痰喘氣促唇色皎白始見虛寒即當溫補反服攻伐元氣之藥虛而又虛令脾肺敗症已見莫能為矣辭之果不治柴芍參苓散治肝膽經分患天泡等瘡或熱毒瘰癧之類柴胡芍藥人參白朮茯苓陳皮當歸各五分牡丹皮山梔炒甘草各三分上每服二錢水煎服加味解毒散治天泡瘡發熱作痛即加味消毒散加金銀花漏蘆玄參連翹升麻芍藥當歸羌活生地黃牛蒡子炒各三錢茯苓甘草各二錢金銀花漏蘆各五錢上每服一二錢水煎服或用蜜丸金黃散治天泡瘡消毒止痛滑石甘草上各另為末和勻敷患處如泡挑去水敷之加黃柏尤好補中益氣湯方見肌肉不生五味異功散方見用敗毒之藥加味瀉白散即瀉白散加山梔杏仁楊梅瘡楊梅瘡乃天行時毒亦有傳染而患之或稟賦所得春受症在肝故多起於下部治失其宜多致蝕傷眼目腐敗腎莖拳攣肢節初起之時上體多者先用荊防敗毒散下體多者先用龍膽瀉肝湯大便祕者用大連翹飲後用換肌消毒散若蝕傷眼目兼用九味蘆薈丸六味地黃丸肢節拳攣兼用蠲痹解毒湯若因脾胃虧損而不能愈者先用異功散後用換肌消毒散若用輕粉之藥多致敗症也一小兒周歲傳染此瘡誤熏銀硃之藥昏憒不乳遍身無皮用緑豆黃柏遍摻席上令兒睡臥更用金銀花生甘草為末白湯調服漸愈若瘡乾燥利用當歸膏誤用輕粉者亦以前藥解之一小兒患此年餘不愈形體消瘦日晡尤甚朝用八珍湯夕用換肌散並太乙膏三月餘而愈一小兒原有肝疳後染前症膿水淋漓腹脹嘔吐小腹重墜余欲用補中益氣湯升補中氣不信仍服消毒之劑更喘嗽流涎余謂脾氣虛而肺氣弱也朝用補中益氣湯夕用五味異功散元氣漸復乃佐以換肌消毒散尋愈一小兒因母曾患此症生下即有用換肌散母服五十餘劑子用當歸膏調金黃散隨患處敷之尋愈一小兒十四歲患此用熏法肢體面目悉皆浮腫數日間遍身皮膚皆潰如無皮狀膿水淋漓先用金銀花甘草煎湯與之恣飲又為末摻遍身及鋪枕席令兒臥之半月許皮膚稍愈卻佐以換肌散而愈又一小兒二歲用熏法吐痰喘躁不及治而死換肌消毒散一名萆薢散治楊梅瘡不拘初患日久並效土茯苓即萆薢當歸白芷甘草皂角刺薏苡仁白蘚皮木瓜不犯鐵器上水煎食前並空心服又方治大人之劑如用前方未應或兒長大宜用此方土茯苓五錢當歸白芷皂角刺炒薏苡仁各一錢白蘚皮木瓜不犯鐵器木通金銀花各七分甘草連翹防風各五分茯苓一錢黃耆炒二錢芍藥炒一錢川芎八分生地黃八分上作二三劑水煎出幼者作一劑煎分兩三次服蠲痹解毒湯薑黃羌活白蘚皮赤芍藥當歸各四分白朮五分茯苓白芷皂角子炒各三分上水煎服九味蘆薈丸方見喉痹當歸膏方見湯火瘡太乙膏方見跌撲外傷金黃散方見泡瘡赤白遊風赤白遊風屬風熱血熱蓋血得熱而遊走耳白屬氣分赤屬血分或因腠理不密風熱相搏怫鬱而成或因乳母食膏粱厚味所致若風熱者用小柴胡湯加防風連翹血熱者用四物湯加柴胡山梔牡丹皮風熱相搏者用人參敗毒散內熱外寒者用加味羌活散胃氣虛弱者用補中益氣湯加羌活防風或消風散血虛者用加味逍遙散如未應用逍遙散六味丸若嬰兒患此當審其受症之因而調治其母一小兒患此其色或赤或白或痛或癢詢之因母食膏粱厚味所致余用東垣清胃散治其母牛黃丸治其兒而愈一小兒患此因母鬱怒所致母用加味小柴胡湯及加味逍遙散兒熱止又以加味歸脾湯而愈一小兒患此嗜膏粱甜味齒齦浮腫漸至蝕爛先用清胃散後以四味肥兒丸間服而愈一小兒患此色赤作癢脈浮數此脾胃二經風熱也用人參消風散而愈又因停食復發色赤作痛先用保和丸後用異功散而消一小兒患此作癢搔破膿水淋漓寒熱往來此肝經血燥而生風先用加味逍遙散肝症頓退倦怠少食用異功散三黃散而愈一女子十五歲患此色赤作癢寒熱脅痛面青或赤此肝火動而血熱也先用加味逍遙散加膽草四劑諸症頓退但體倦少食惡寒欲嘔此脾為肝木所侮而肺氣虛也用五味異功散及加味逍遙散而愈一女子患此寒熱作嘔先用加味小柴胡湯二劑而安再用人參消風散而愈後因怒發熱經行如崩遍身色赤四肢抽搐難以診脈視其面色如赭此肝心二經木火相搏而血妄行耳先用柴胡梔子散再加味逍遙散諸症頓退又用八珍湯而痊一小兒因母感寒腹痛飲燒酒兒遍身皆赤遊走不定昏憒發熱令乳母時飲冷米醋一二杯亦以二三滴塗兒口內周月而愈歸脾湯治小兒因乳母憂思傷脾血虛發熱患前症久不愈食少體倦或便血下血怔忡不寧驚悸少寐或心脾作痛自汗盜汗等症方見遊風人參消風散治赤白遊風或風熱隱疹瘙癢或寒熱作痛人參三錢荊芥穗甘草炙陳皮各五錢白殭蠶茯苓防風芎藭藿香蟬蛻各三錢厚朴三錢薑製羌活三錢上每服一二錢水煎加味逍遙散方見發熱不止二黃散方見黃水瘡柴胡梔子散方見脅癰小柴胡湯方見脅癰加味小柴胡湯方見熱毒瘰癧牛黃解毒散方見頭面瘡發癍潔古云癍疹之病焮腫於外者屬少陽相火也謂之癍小紅𨸏隱於皮膚之中者屬少陰君火也謂之疹癍疹並出則小兒難禁然首尾俱不可下大抵安里之藥多發表之藥少小便祕則微疏之身溫者順身涼者逆大忌外敷寒涼內用疏導無此二者可保無膚一小兒患癍發熱體倦少食此脾肺氣虛外邪相搏也先用消風散二劑隨用補中益氣湯加茯苓芍藥而愈一小兒患癍作痛熱渴服發表之劑益甚形氣倦怠脈浮而數此真氣復損而然耳遂用人參安胃散補中益氣湯而愈一小兒患癍發熱用犀角消毒散一劑吐瀉頓作余曰此邪氣上下俱出矣勿藥自愈未幾果安一小兒素面白患疹作癢鼻塞流涕咳嗽不止用敗毒散膿水淋漓惡寒喘急朝寒暮熱余謂脾肺之氣復傷耳用補中益氣湯稍愈佐以五味異功散而愈一小兒患疹寒熱瘙癢先用消風散治其兒次用加味逍遙散治其母兩月而愈一小兒患癍作渴發熱咳嗽此邪在表宜汗之先用葛根橘皮湯一劑次用玄參橘皮湯而安癸丑歲患此症者余先用葛根橘皮湯散之若邪去而熱未退者加芩連熱已退者用玄參升麻湯無不速效一小兒患癍色赤作痛先用升麻葛根湯而減次用玄參升麻湯而安一小兒因食膏粱醇酒遍身如癍疹用消胃散母子服之而愈一小兒誤吞信石身赤如癍見傷發丹一小兒因母飲燒酒身如赤癍見傷發丹葛根橘皮湯治發癍煩悶嘔吐清汁兼治麻痘等症葛根陳皮杏仁去皮尖麻黃去節知母炒甘草炙黃芩各半兩上每服二三錢水煎服玄參升麻湯治癍疹已發未發或身如錦紋甚則煩躁語言喉閉腫痛玄參升麻甘草各等分上每服二三錢水煎服化癍湯人參石膏知母甘草各一錢上每服二錢入糯米半合水煎六分米熟為度去滓溫服荊芥敗毒散即人參敗毒散加荊芥防風人參敗毒散治瘡瘍邪氣在表應發者若憎寒壯熱項強脊疼或惡咳嗽亦宜用之人參茯苓川芎羌活獨活前胡柴胡枳殼麩皮炒桔梗甘草炒等分上每服二三錢水煎東垣人參安胃散治癍疹因服峻厲之劑脾胃虛熱泄瀉嘔吐飲食少思等症方見喉痹犀角消毒散治癍疹丹毒發熱痛癢及瘡疹等症牛蒡子甘草荊芥防風各五分犀角鎊二分銀花三分上水煎熟入犀角傾出服補中益氣湯方見肌肉不生五味異功散方見敗毒之藥加味逍遙散方見發熱不止黃水黏瘡小兒黃水黏瘡屬肝脾二經風熱積熱所致邪在表而癢痛者輕則犀角消毒散重則連翹防風湯邪在內而大便祕者輕則九味解毒散重則大連翹飲若頭目不清憎寒壯熱作渴便祕者表裡俱有邪也加味清涼飲若誤服克伐之藥而致發熱惡寒者肺氣傷也用四君桔梗柴胡發熱嘔吐胃氣傷也用異功散發熱作瀉脾氣虛也用六君子湯並加柴胡升麻余當隨症裁之一小兒患此膿水淋漓寒熱作痛服抱龍丸敗毒散更加氣喘等症蓋氣喘發搐乃肝火乘脾咬牙流涎乃脾氣虛寒遂朝用補中益氣湯夕用五味異功散外敷立效散而愈一小兒患此發熱驚悸倦怠面黃懶食流涎服清涼之藥更加吐瀉睡而露睛余謂心脾虛熱用六君乾薑一劑頓愈又用異功散立效散而愈一小兒患此或癢或痛膿水瀝淋服表散之劑更惡寒發熱嘔吐不食手足並冷此病氣實而元氣虛也先用異功散加桔梗藿香而嘔吐止又用異功散而寒熱除用人參消風散而瘡愈一小兒所患同前服荊防敗毒散加喘嗽腹脹四肢發搐此脾肺氣虛而肝木乘之用異功散加柴胡升麻桔梗一劑諸症頓退又服異功散二劑而愈一小兒患此服抱龍丸之類汗出喘嗽此肺氣虛而為外邪所乘也用異功散加桔梗二劑又傷風發熱咳嗽其瘡復甚用惺惺散一服外邪頓退又用異功散而痊毛通府子患此卯關脈青兩目時札形體困倦此土虛木旺當用和肝補脾湯反服敗毒散前症益甚更加吐瀉不食遍身發泡余用前湯刺泡出水同緑豆甘草末頻鋪席上任兒睡臥後用神效當歸膏而愈沈尚寶子患此咳嗽惡寒用大連翹飲腹脹少食此表症瀉里致元氣復損非其治也用補中益氣湯而愈一小兒患此作癢發熱膿水淋漓面青惡寒此肝火血熱用加味逍遙散稍愈又用和肝補脾湯而痊一女子十四歲遍身疙瘩搔破膿水淋漓發熱煩躁日晡益甚此血氣虛而有熱也用加味逍遙散而愈大連翹飲治風毒熱毒發熱作痛二便不利表裡俱實方見臂癰柴胡梔子散治肝膽風熱生瘡作痛發熱或搔破而膿水淋漓或發寒熱晡熱即柴胡梔子散方見脅癰犀角消毒散治熱毒積毒發於肌表而頭面生瘡或痛或癢者方見發癍九味解毒散治熱毒胎毒而發瘡瘍之類未潰作痛者黃連炒三分金銀花連翹芍藥各三分山梔四分白芷六分當歸八分防風三分甘草三分上水煎母子並服人參消風散方見赤白遊風加味清涼飲治熱毒積毒在內患瘡瘍大便不通而欲痛作渴當歸赤芍藥甘草炙大黃炒各三分山梔炒三分牛蒡子炒杵各四分上水煎服荊芥敗毒散治風熱相搏邪氣在表患瘡瘍之類寒熱作痛者方見流注補中益氣湯治瘡瘍之類過服敗毒之藥致中氣虛弱發熱或寒者方見發熱不止六君子湯治瘡瘍脾胃虛弱不能飲食更或嘔吐而瘡不愈者方見內釣人參消風散治諸風上攻頭目昏眩項背拘急肢體煩疼肌肉顫動耳若蟬鳴鼻塞多嚏皮膚頑麻瘙癢隱疹目澀昏困方見赤白遊風連翹防風湯治小兒肝脾風熱時毒頭面生瘡連翹研碎防風黃連陳皮芍藥當歸獨活白蒺藜炒去刺荊芥茯苓黃芩甘草牛蒡子炒研等分上每服二錢水煎服惺惺散治風寒瘡疹痰嗽發熱桔梗細辛人參甘草栝蔞根白茯苓上為末每服二錢入薄荷五葉水煎服和肝補脾湯治風熱瘡疹脾土不及肝木太過人參陳皮川芎各五分白朮茯苓芍藥各七分柴胡甘草炙各三分山梔炒四分上作二劑水煎服益脾清肝湯治肝脾風熱瘡寒熱體痛脾胃虛弱人參白朮茯苓甘草川芎當歸黃耆各三分柴胡牡丹皮各二分上水煎服三黃散治風熱疳熱生瘡水浸淫膿流處便濕爛松香五倍子黃連黃丹海螵蛸各一錢輕粉雄黃各少許上為末用瑩肌散煎洗滲之乾者油敷立效散定粉松香黃柏黃連枯礬各一錢上為末用清燭油調搽四君子湯方見腋癰異功散方見敗毒之藥加味逍遙散方見發熱不止頭面瘡人身諸陽之氣會於首而聚於面其患瘡痍者因臟腑不和氣血凝滯於諸陽之經或稟賦腎陰虛肝火或受母胎毒或乳母六淫七情或食膏粱醇酒或兒食甘肥厚味所致其因不同當各辨其經絡審其所因而治之若發於目鋭眥耳前上頰抵鼻至目內眥者皆屬小腸經發於巔及頭角下頰耳後腦左右者皆屬膽經發於頰前鼻孔及人中左右者皆屬大腸經發於鼻之挾孔下唇口反承漿頤後頰車耳前髮際額顱者皆屬胃經發於目內眥上額尖至後腦項者皆屬膀胱經既察其經即當分治若稟腎火者用六味地黃丸胎毒者犀角消毒丸食積疳者四味肥兒丸乳母膏粱者東垣清胃散至於諸腑受病必兼諸臟故患於額間屬心經發熱飲冷者為實熱用導赤散發熱飲湯者屬虛熱用養心湯左腮屬肝經或頸項徑強者為實熱用柴胡清肝散或咬牙頓悶者虛熱用六味地黃丸右腮屬肺經喘嗽飲冷者為實熱瀉白散發熱咳嗽者為火刑金用人參平肺散鼻間屬胃經發熱飲冷大便黃硬者為實熱用瀉黃散發熱飲湯大便青白者為虛熱用異功散患於頦及耳輪者屬膀胱經腎無實症惟用地黃丸若瘡已潰久而不愈則當審其臟氣之相勝病邪之傳變而以調補脾胃為主若因乳母遺熱為患者當先治其母則兒病自愈也一小兒鬢患一瘡腫赤作痛余謂屬手足少陽經風熱用柴胡梔子散不應診其母左寸關脈弦洪而數即以前藥令母服之兒遂愈一小兒十三歲右頰患腫作痛飲冷脈沉實重按則數此積熱在臟也當疏通其內不信乃泛服雜藥兼敷寒涼腫硬下頸內潰復來請治脈已無力矣先用托裡散二劑針之又二劑而膿始出惡寒少頓煩躁發熱作渴痰喘此潰後變症因氣血虛故也先用當歸補血湯二劑諸症頓止又用異功散加山梔胃氣亦健未用托裡消毒散瘡斂而愈一小兒右腮赤腫余謂胃經有熱先用瀉黃散二服又用清胃散而愈後復患之敷石灰等藥致傷其血瘡不能潰余先用活命飲次用托裡消毒散而愈一小兒耳後結數核作痛左腮青赤此肝疳積熱所致用四味肥兒丸柴胡清肝散及五味異功散加柴胡升麻而消一小兒耳赤腫痛寒熱往來此肝經熱毒也用加味小柴胡湯寒熱悉退又用柴胡清肝散而赤腫頓消一小兒頦間赤色作渴目睛白多面常生瘡睡而露睛先君謂稟父陰虛用地黃丸補中益氣湯而愈後出痘亦無虞設不預為調補腎氣則出痘之危其可保耶一小兒四歲太陽連眉不時作癢或生小瘡此屬膽經風熱也先用地黃丸次用柴胡梔子散後專服地黃丸而愈一小兒面常生瘡左頰赤腫或睡中發搐審其母素有鬱怒用加味逍遙散加味歸脾湯母子俱服而愈一小兒面白時或變赤生小瘡兩足發熱先君以為稟賦足三陰虛熱不信專服清涼之藥後出痘果黑陷而歿一小兒久患前症耳下結核余曰此肝脾疳毒也久而不愈則先用五味異功散加柴胡梔子散清其肝火後用四味肥兒丸治其疳而愈一小兒患前症耳後結核大便酸臭飲食減少余謂此脾疳所致先用五味異功散為主異功散為佐而愈一小兒患前症頭皮光急發熱作渴小便頻數余謂此腎肝之疳也用地黃丸為主朝用補中益氣湯夕用五味異功散而愈一小兒患前症鼻準色黃左腮色青食少泄瀉服犀角丸形體瘦弱口渴飲湯余用補中益氣湯健其脾氣佐以四味肥兒丸消其腑毒而愈一小兒患前症痛癢不一右腮鼻準皆赤屬胃經有熱審之果因母飲酒所致先用清胃散次用加味逍遙散治其母熱兒敷大楓膏而愈一小兒因母鬱怒患前症兼發搐疾鼻間左腮皆赤色先用加味小柴胡湯二劑次用加味歸脾湯四劑治其母熱兒亦少飲並愈一小兒因母食厚味頭面患瘡右腮赤色久而不愈用清胃散治其母以牛黃散治其子浹旬而愈一小兒面上患瘡頭忽赤腫口噤不語此胃經熱熾也用活命飲酒調二服稍緩又酒煎一服赤腫漸退後用解毒散而痊一小兒面上患瘡色赤作痛發熱飲冷脾肺脈數而有力用仙方活命飲二劑瘡口出水沿及遍身似大麻風症仍以前飲及清熱消毒散而愈表甥凌雲霄年十五歲壬寅夏見其面赤略燥形體消瘦余曰子病將進矣癸卯冬復見之曰子病將深矣至甲辰春足陽明經部分皆青色此木乘土位之症也先以六君柴胡芍藥山梔蕪荑炒黑黃連數劑稍定又以四味肥兒丸六味地黃丸及用參苓歸朮芍草梔柴肉桂三十餘劑兼用加減八味丸而愈一小兒先眉間作癢搔即成瘡延及頭面敷立效散而愈後因乳母怒氣復癢作謅不安此肝膽二經之熱也兒用牛黃解毒丸母用加味逍遙散而愈一小兒先患眉爛延及遍身如癩久而不愈手足並熱面色常赤此稟母胃火所致子服瀉黃散母服竹葉石膏湯加味逍遙散子又用牛黃散拔毒散母子並愈一小兒頭患瘡如癩或作癢結痂或膿水淋漓二年矣作渴飲冷發熱面赤此稟心與小腸表裡俱有熱也先用導赤散二服卻用活命飲拔毒散漸愈子又服牛黃散母服逍遙散而愈後因母食膏粱復發用清胃散母子服之子又服活命飲而愈一小兒面生瘡作渴飲湯服敗毒散之藥致吐瀉不食手足並冷余謂脾胃氣虛復傷而變症虛寒也先用益黃散而逆症退用異功散而瘡症愈錢氏瀉黃散治瘡瘍作渴飲冷臥不露睛手足並熱屬胃經實熱宜用瀉黃散若作渴飲湯臥而露睛手足並冷屬胃經虛熱宜用五味異功散若誤服攻毒之劑吐瀉不愈手足指冷脾腎虛寒也宜用益黃散若病後津涸不足口乾作渴胃氣虛也宜用七味白朮散藿香葉甘草各七錢五分山梔仁一兩石膏煅五錢防風二兩上用蜜酒微炒為末每服一二錢水煎益黃散治瘡症屬脾胃虛寒吐瀉不止手足並冷者陳皮一兩丁香二錢訶子泡去皮青皮去白甘草炙各半兩上為末每服一錢水煎養心湯治心氣不足虛熱上攻而患瘡瘍者黃耆炒白茯苓半夏曲當歸川芎杵辣桂柏子仁酸棗仁炒五味子杵人參各三錢甘草炒四錢上每服一二錢薑棗水煎為末服亦可牛黃解毒散治胎毒頭面生癩或延及遍身癢痛不安浸淫不愈及眉煉瘡生甘草一兩牛黃五錢膏粱之子必用之金銀花一兩上各為末每服二三分乳汁調服或用甘草煎膏為丸如芡實大每服一丸白湯化下外敷清金散亦可拔毒散治症同前及疥癩瘡癬黃芩黃連白礬三味俱生用雄黃各五錢銅碌二錢癢甚加之松香上各另為末乾摻患處或用油調搽疥瘡宜加枯礬三錢梔子清肝散即柴胡梔子散治三焦及足少陽經風熱耳內作癢生瘡出水或脅肋乳間作痛往來寒熱方見脅癰仙方活命飲治一切瘡毒腫痛或作癢寒熱或紅絲走徹噁心嘔吐等症方見熱毒瘡瘍治疔瘡等症用金銀花杵爛絞汁杯許入熱酒半杯徐徐服之用藤葉亦效無鮮者用枯者煮飲亦可導赤散方見臂癰六味丸即地黃丸加五味子四兩肉桂一兩各加減八味丸竹葉石膏湯二方見作渴不止清胃散方見腹癰人參平肺散方見肺癰當歸補血湯方見發熱不止五味異功散方見敗毒之藥托裡消毒散托裡散二方見熱毒瘡瘍加味歸脾散梔子柴胡湯即梔子清肝散小柴胡湯三方見脅癰人參消風散方見赤白遊風瀉白散方見臂癰大楓膏方見疥瘡加味逍遙散方見發熱不止補中益氣湯方見肌肉不生四味肥兒丸方見貼骨癰眉煉附癩頭瘡眉煉者謂小兒兩眉間生瘡如疥癬當求其因而藥之蓋眉屬膽經若原稟肝膽經熱或乳母肝膽經有熱者用柴胡梔子散或乳母食厚味醇酒者用加味清胃散或乳母有鬱怒者用加味逍遙散俱與乳母服子亦飲少許仍參前症主之一小兒患前症用柴胡清肝散母子服之而愈後因母不戒膏粱厚味復發延及遍身膿水淋漓先用清胃散次用柴胡梔子散與母服子用清金散牛黃解毒丸而愈一小兒嗜膏粱厚味患之漸及肢體兩眉為甚膿水淋漓寒熱往來內用清胃散加味小柴胡湯外敷立效散而愈後眉間復發兩目連札小便白濁將成肝疳用四味肥兒丸九味蘆薈丸而愈一小兒因乳母不戒七情厚味患此延及遍身久而不愈母先用清胃散次用加味逍遙散子用牛黃散解毒丸立效散而愈後兒食厚味眉間作癢搔破成瘡或癢或痛兩目連札用四味肥兒丸佐以加味清胃散而愈一小兒眉間作癢破而成瘡延及遍身兩脅為甚用四味肥兒丸立效散母服柴胡梔子散加味逍遙散而愈一小兒患此服化毒丹乳食不納手足俱冷此藥傷胃氣用五味異功散與母服兒亦時服三五滴母又服加味逍遙散加龍膽草漏蘆兒症漸愈一小兒患此先延兩脅後及遍身此肝火乘脾也診乳母亦有肝火先用加味逍遙散加炒黃連數劑卻去黃連又二十餘劑而痊一小兒患之乳母惱怒其瘡益甚眉稜抽動不經意延及遍身乳母甚怒兒面色赤驚悸咬牙兼之發搐此由心肝二經風熱所致也用加味小柴胡湯加味逍遙散而愈青金散治小兒疥癬眉煉或延及遍身瘙癢或膿水淋漓經年不愈松香二兩真蛤粉五錢青黛二錢五分上為末用燭油調搽或乾摻之或加輕粉枯礬各三錢以治前症及胎毒疥癩尤效立效散方見黃水黏瘡加味逍遙散方見發熱不止牛黃解毒丸方見前四味肥兒丸方見貼骨癰九味蘆薈丸方見喉痹加味清胃散清胃散二方見腹癰小柴胡湯方見脅癰加味小柴胡湯方見熱毒瘰癧導赤散方見臂癰活命飲方見熱毒瘡瘍牛黃解毒散拔毒散二方見頭面瘡
