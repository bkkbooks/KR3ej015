body:
  text: 卷十七痘疹受病之由痘疹之由因兒在胎食母五臟血穢伏於命門或至天行時氣或驚駭跌撲或飲食所傷因而發之狀類傷寒其症面燥腮赤目胞亦赤呵欠頓悶乍涼乍熱咳嗽嚏噴足稍冷耳冷尻冷多睡睡驚耳後有紅絲赤脈此其候也五臟各具一證肝藏水疱肺藏膿疱心藏癍脾藏疹歸腎變黑蓋以太陽起於右腎之下煎熬左腎足太陽膀胱寒水夾脊上流上頭下額逆手太陽丙火不得傳道逆於面上故顯是諸症蓋壬癸寒水克丙丁熱火故也凡瘡疹初起一發便出盡者必重瘡夾疹者半輕半重稀少者輕裡外微紅者輕外黑裡赤者微重外白里黑者太重瘡端里黑點如針孔者勢劇也青乾紫陷睡昏汗出不止煩躁熱渴腹脹啼喘大小便不通者困也痘疹正狀痘疹正病蒸熱一日稍涼現癍一日至三日足心齊漸大如珠結成膿窠飽滿漸至蒼蠟色自初紅癍為始計七日當成靨結痂此則言其大略也人有虛實之不同病有淺深之各異脾胃充實血氣調和皆依期而愈若調治失宜虧損脾胃或寒暄失度必致遷延大抵形勢既正而無他症不必用藥此先哲之格言也鄭氏云凡瘡痘欲出先發熱輕者三日次五日遠者不過七日此約法也一日太陽傳膀胱二日陽明傳胃三日少陽傳膽四日太陰傳脾五日太陰傳腎六日厥陰傳肝七日還經五臟六腑傳遍故七日而止也又有因傷寒至七日以後或已汗或未汗或吐下後熱不除此毒氣盛而未發熱毒入胃發於皮膚成癍者狀如蚊蟲所齧赤者十生一死黑者十死一生及有胃熱發黃者狀如橘色下利者死又有成隱疹者或白泡者此皆傷寒熱毒不除多變此疾故發癍不可用表汗藥也痘疹輕重輕者作兩三次出大小不等頭面稀少胸前眼中皆無根窠紅活肥滿光澤形似水珠不渴瀉不煩躁重者一齊出密如蠶種頂陷如茱萸樣或平頭灰白色渴瀉煩躁頭溫足冷身熱不除治之如法十全八九輕變重所犯者七不忌口味不慎飲食致傷脾胃先曾泄瀉裡虛毒氣不能發出冒風寒所謂春夏之氣為順秋冬之氣為逆大忌感冒風寒損表犯房室餌涼藥宜用滋補血氣壯脾之藥不宜清涼宣利之劑裡寒則毒氣不能攻出穢氣相觸血氣聞香則順聞臭則逆順則易出易靨逆則難愈生人輒至恐外人由生産房室或臨喪而來或帶醉或食腥氣因此穢惡之觸皆為害也重變輕所慎者五謹避風寒及房內有風亦宜避之惟夏不忌如遇狂風輒寒亦宜避之常和暖寒則添衣熱則減去務得中和毋令太過不及節飲食忌柿橘西瓜菱角水蜜等冷物恐內傷胃氣尤忌肥肉油膩恐泄瀉忌咸物恐作渴忌酒蔥蒜魚羊等腥物恐致瘡癢務使脾胃充實其瘡易出易靨也大便稠飲食調和不致泄瀉一日二日一次為調日行二三次為利三四日不行為祕依方調理避風寒節飲食詳證用藥庶不致輕變為重矣不治五症咳嗽聲啞飲食挫喉腹脹氣促悶亂不寧渴瀉不止咬牙寒戰瘡嫩易破癢塌不止紫黑灰色頂陷喘渴紅癍標現之圖一日一日先退熱放標者必輕又放標後一日身涼稀密已定仍熱煩躁尚未盡有兩三次出熱方定紅現者吉或隱或現者凶二日二日如粟米大稀而紅滿者吉二日頂陷灰白色者次之三日三日尖滿如珠者吉灰白色者次之三日必出定已後身反發熱悶亂煩渴者凶標瘡綻灌濃之圖初發有兩三次出大小不一等先出者先灌漿後出者後灌漿如水珠光澤根窠紅活者吉如珠不渴瀉悶煩者不必服藥微渴微癢不瀉者不妨亦不須服藥根活若一齊並出稠密灰白色頂陷煩躁渴瀉者急宜治之瘡已飽滿如膿窠將收漸至蒼蠟色有等無膿有黃白色自放標一日為始至七日收靨至十日收完此為正病有遷延八九日方靨至十四五日方完亦有之但不瀉渴悶亂其瘡飽滿無陷手按之堅硬皆好將收時漸退紅腫或瘡中收靨覺有黃蠟色或外面先靨根下皺皮男從面收至頭背女從面收至胸腹收後離肉不黏易脫俱好有微渴癢痛有身收完足收遲亦不妨身微熱不能食者亦有之只怕瘡嫩易破悶亂癢塌者凶靨後餘症瘡疹收靨之後預宜調理就有出外不避風寒不節飲食偏無病者莫非胃實體壯亦宜仔細病初痊臟腑初安脾胃尚弱動止飲食過度復病喘咳腹脹必凶又血氣尚弱動止太早病復皆凶況肌肉嬌嫩冒風易得感寒頭痛身熱則難治矣腹脹氣促根窠不赤之症陳文宿先生云痘瘡已出未愈之間或瀉渴腹脹氣促其瘡不光澤不起發根窠不紅謂之表虛也先與十一味木香散以和五臟之氣後與十二味異功散送七味肉豆蔻丸以助臟腑之氣竊謂痘瘡既出不光澤不起發不紅活或泄瀉作渴或肚腹作脹或氣促作喘寒戰咬牙或手足指冷肢體攣縮作渴飲湯陽氣虧損內虛寒而外假熱也用十二味異功散若作渴飲湯手足不冷者脾胃虛弱也用五味異功散凡痘瘡先出不如式後出而紅活或成片色赤而穢氣者俱無妨一小兒出痘四日腹脹瀉渴脾胃虛寒也用十二味異功散一劑又用參耆內托散貫膿靨而忽寒熱咬牙此膿貫而陽氣虧損也用參附湯獨參湯而愈一小兒痘四日腹脹瀉渴氣促體倦此脾氣虛也用人參白朮散加木香煎送四神丸一服諸症頓止但膿遲作渴此表裡血氣俱虛用參耆四聖散大補湯而愈一小兒痘瘡作渴腹脹小便不利此邪氣壅滯也用木通芍藥湯一劑諸症稍愈用參耆四聖散其漿漸貫用參耆內托散結靨而愈一小兒痘瘡將愈腹脹手足或冷或熱此陽氣虛寒也先用十二味異功散手足不冷此陽氣漸復也乃用五味異功散加木香而愈一小兒痘瘡大便利而小便祕腹脹作喘手足並冷此脾氣虛也先用葶藶木香一劑又用五味異功散加木香二劑而愈後腹脹不食口角流涎仍用五味異功散而痊一小兒痘瘡將愈忽腹脹泄瀉侵晨為甚飲食不化余謂脾胃虛弱朝用人參白朮散夕用二神丸而瀉止又用參耆內托散兼托裡散而靨一小兒痘瘡腹脹泄瀉飲食不化此脾腎氣虛用人參白朮散豆蔻丸而愈參耆內托散治裡虛發癢瘡不潰倒靨人參黃耆炒當歸川芎厚朴薑製防風各五分桔梗白芷官桂各三分紫草五分木香甘草各三分上入糯米一撮水煎量服之寒戰咬牙飲水瀉渴亦宜服之參耆四聖散治痘瘡已出六七日不能長不生膿或癢塌當歸芍藥炒黃耆川芎各五分白朮茯苓紫草如無紅花代之木通防風各三分糯米二百粒上水煎母同服葶藶木香散治大便自利小便澀滯喘嗽腹脹不能食多服為妙豬苓澤瀉茯苓白朮官桂各五分滑石二錢葶藶木通木香甘草各五分上水煎量大小服之木通芍藥湯治痘瘡作渴腹脹小便不利木通芍藥白朮各五分川芎陳皮乾葛各三分甘草二分上水煎服十全大補湯當歸川芎白芍藥炒熟地黃人參白朮白茯苓甘草炒黃耆炒官桂各等分上水煎量兒大小服參附湯治痘疹陽氣虛寒咬牙寒戰手足並冷或吐瀉不食飲沸湯不知熱用獨參湯加好真附炮如法者每劑先加一錢未應多加之更不應加至四五錢或等分亦不妨但用之以運其陽氣如已脫者不治獨參湯治陽氣虛弱痘瘡不起發不紅活或膿清不滿或結痂遲緩或痘痕色白或嫩軟不固或膿水不幹或時作癢或畏風寒用好人參一兩生薑五片大棗五枚水二鍾煎八分徐徐溫服嬰兒乳母亦服胡荽酒用胡荽一把以好酒二鍾煎一兩沸令乳母含噴兒遍兒頭面並房中須燒胡荽香能闢除穢氣使痘疹出快若痘疹已出而飲食少思宜用棗子燃炙兒聞棗香尤能開胃進飲食解毒氣若因飲食停滯未及消導者不宜用托裡消毒散托裡散二方見痘癰七味白朮散即人參白朮散方見痘瘡屬陰屬陽十一味木香散十二味異功散二方見痘灰白色五味異功散方見痘寒戰咬牙肉豆蔻二神丸四神丸三方見瀉渴咬牙發熱口渴煩躁不止之症陳文宿先生云瘡疹始出一日至十日渾身壯熱大便黃稠是表裡俱實其瘡必光澤起發必肥滿必易靨而不致損傷也又云痘瘡發熱口渴煩躁不止者切不可與冷水蜂蜜柿子西瓜等生物及清涼飲清毒散等藥恐內損脾胃以致腹脹喘滿寒戰咬牙則難治竊謂前症若二便自調飲食溫和口渴飲湯手足不熱是為虛熱不可食生冷之物若二便祕結飲食喜冷口渴飲水手足並熱是為實熱可與冷水飲之凡痘出而熱未止者既出盡則熱自止一小兒腹脹發熱密而根顆不明色不紅活漿不滿先君謂脾氣虛而毒未盡也用參耆四聖散痘果復出熱止紅活分明又用參耆內托散而靨一小兒腹脹作渴發熱成片先君謂脾氣虛弱痘毒未盡用參耆四聖散二劑先出者貫漿後出者穢氣而愈一小兒痘腹脹二便自利手足並冷先君云脾胃虛寒用十二味異功散一服又用五味異功散加木香二劑卻去木香又一服而痊一小兒痘瘡發熱作渴此痘出未盡脾胃虛而熱也用人參麥門冬散一劑痘復出而熱渴止用人參白朮散而飲食進用參耆四聖散而漿潰用托裡散而瘡靨一小兒痘腹脹足冷內熱作渴此胃氣虛而津液不足也余先用五味異功散二劑又用參耆四聖散而膿貫用人參白朮散而靨一産婦出痘寒戰咬牙腹脹作渴足冷身熱此脾胃內虛寒而外假熱先用十全大補湯加桂附四劑乃去附易乾薑又四劑卻用參耆四聖散五味異功散加歸耆而靨一妊婦出痘發熱足冷腹脹此脾胃虛弱而毒未發也用紫草木香散及用八珍散而貫膿倍加參耆又數劑而愈人參麥門冬散一名麥門冬散治痘瘡發渴麥門冬一兩人參甘草陳皮白朮厚朴薑製各半兩上每服三錢水煎量兒大小加減按前方若因熱毒作渴宜用之若因中氣虛弱作渴當用人參白朮散紫草木香散治痘瘡裡虛癢塌黑陷發熱紫草茯苓甘草白朮木香人參各等分糯米上每服三錢水煎清涼散方見大便不通人參白朮散方見發熱屬陰屬陽托裡散方見痘癰十全大補湯方見腹脹氣促十一味木香散十二味異功散二方見痘灰白色參耆四聖散方見腹脹氣促八珍湯方見頂陷灰白色痘瘡出遲屬各經所主陳文宿先生云痘瘡出不快誤言毒氣壅盛用藥宣利解散致臟腑受冷榮衛澀滯則血氣不能充實其瘡不起發不光澤不充滿不結實不能成痂多致癢塌煩躁喘渴而死竊謂海藏云痘瘡出不快如身後出不快者足太陽經也用荊芥甘草防風湯如身前出不快者足陽明經也用升麻葛根湯身側出不快者足少陽經也用防風芍藥甘草湯若便利調和而出不快者熱在表也宜葛根湯微發之又有上中下三部先上部次中部又次下部才出齊而自愈又有作三次而出者錢氏云三日不快不出用消毒之藥仍不出脈平靜者本稀也不必服藥大凡五六日間當解毒補托以盡發於表七八日間毒氣不能盡出而反入於內必用藥驅出之痘疹方云瘡起遲而小便澀滯咳嗽有痰用仙聖散出而不長隱於肌膚用人參透肌散色赤而出不快用紫草透肌散出而不勻用升均湯出而不長不貫用參耆四聖散出而色不紅活用紫草快斑湯出而小便赤澀用紫草木通湯出而漿不回用參耆內托散若色赤而兼癢者屬血虛有熱用四物牡丹皮色白而兼癢者屬氣虛有熱用五味異功散加當歸木香若發熱大便祕者用犀角消毒散發熱大便調和者用人參麥門冬飲寒戰渴瀉飲沸湯口不知熱用十二味異功散作渴飲冰雪口不知寒用四順飲地黃丸手足不冷飲湯溫和者用五味異功散或托裡散一小兒發熱痘出身涼根顆紅活余謂表裡血氣皆實而不用藥後果然凡三四日前先發熱而痘出或熱一次涼一次而痘出者毒勢輕也皆不必用藥其血氣實而托裡血氣虛而宣毒者多致有誤一小兒痘出不快色次紅活此血氣虛弱用參耆四聖散出而色赤再劑色紅活起發又用透肌散而靨一小兒第九日痘將靨而熱不止脈滑而數皆為不治先君謂痘未盡耳非敗症遂用快癍湯一劑果出一番至十七日而痂落一男子發熱咳嗽嚏噴面燥腮頰目胞皆赤遍身赤𤸔余謂此心臟痘疹之狀也彼因疑惑而未用藥餌旬余赤𤸔皆為膿疱且紅活起發余謂痘疹明矣既紅活起發不必服藥至十七日大便下膿血瘡痂而痊紫草透肌散治痘瘡色赤不快或癢塌紫草蟬蛻木通芍藥甘草炙各等分上每服三錢水煎人參透肌散治痘瘡虛而有熱雖能出快而不齊整隱於肌膚間者人參紫草如無紅花代之白朮茯苓當歸芍藥木通蟬腿甘草糯米各等分上每服三錢水一盞半煎半盞徐徐服紫草木通散治痘疹出不快小便赤澀紫草木通人參茯苓糯米各等分甘草減半上每服二錢水煎防風芍藥甘草湯防風芍藥甘草上每服一二錢水煎荊芥甘草防風湯荊芥甘草防風各等分上每服一錢水煎升均湯治痘瘡已出不均或吐瀉熱渴升麻乾葛芍藥人參白朮茯苓甘草紫草茸如無紅花代之上每服三五錢薑水煎量服之四物湯治痘瘡血虛發熱或煩躁不寐作癢色赤當歸熟地黃各二錢芍藥炒川芎各一錢上水煎服仙聖散治痘出不快小便赤澀咳嗽有痰紫草枳殼黃耆甘草木通各等分上每服二錢水煎十二味異功散方見痘灰白色葛根湯參耆內托散二方見腹脹氣促升麻葛根湯方見水痘麻痘紫草快癍湯方見大便不通四物湯方見痘瘡出遲人參麥門冬散方見前參耆四聖散方見腹脹氣促五味異功散方見寒戰咬牙犀角消毒散方見發癍清涼散方見大便不通地黃丸方見痘瘡發熱屬陰屬陽泄瀉咬牙作渴之症陳文秀先生云痘瘡瀉水穀或白色或淡黃者宜服十一味木香散送肉豆蔻丸若瀉多津液內耗血氣不榮其瘡雖起發亦不能結靨如身溫腹脹咬牙喘渴者難治緣津液枯耗而飲水不止蕩散真氣故多死也速與十一味木香散救之如不愈急用十二味異功散竊謂豆蔻丸治陽氣虛寒滑瀉之澀劑蓋腎主大便若因腎氣不固而致前症者宜用十一味木香散或六君子湯送四神丸若欲瀉不瀉脾氣虛而下陷也用補中益氣湯加肉豆蔻飲食不化手足並冷脾氣虛寒也用四君子湯加附子一小兒出痘泄瀉腹脹煩渴飲沸湯而不知熱先君謂陽氣虛寒用十一味木香散二劑泄瀉頓止飲湯嫌熱此陽氣復也乃用六君乾薑木香歸耆而靨一小兒痘瘡愈後泄瀉飲食不化此脾腎氣虛用六君補骨脂肉豆蔻瀉止用參耆四聖散接補元氣而痊一小兒發熱飲冷唇舌皺烈瀉糞穢臭先君以為內蘊用前胡枳殼散一劑稍愈又用竹葉石膏湯加漏蘆乳母服之其兒頓安一小兒痘後作瀉久不愈而肌體骨立此脾腎虛弱也用二神丸五味異功散漸愈因停食吞酸作瀉肚腹重墜此脾氣下陷也先用補中益氣湯為主佐以五味異功散漸愈又用參耆四聖散托裡散治其瘡而痊一小兒出痘發熱燥渴色黯出血足熱腰痛此脾腎虛熱用聖濟犀角地黃湯一劑卻用地黃丸料數劑而貫又用參耆內托散而痊一小兒痘瘡將愈侵晨泄瀉飲食不化余以為腎瀉朝用補中益氣湯夕用二神丸而愈四神丸治脾腎虛弱大便不化飲食不思或泄瀉腹疼等症肉豆蔻二兩補骨脂四兩五味子二兩吳茱萸浸炒一兩上為末用水一鍾生薑八兩紅棗一百枚煮熟取棗肉丸小豆大每服二三十丸食前白湯下去五味子吳茱萸名二神丸二神丸治瘡瘍因脾腎陰虛泄瀉補骨脂四兩肉豆蔻二兩生用上為末用紅棗四十九枚生薑四兩水一鍾煮乾取棗肉丸桐子大每服二三十丸白滾湯下肉豆蔻丸治瀉水穀或白或淡黃不能止者木香縮砂仁各二錢白龍骨煅訶子肉半兩赤石脂七錢半枯白礬七錢半肉豆蔻半兩上為末糊丸黍米大一周歲每服三五十丸三歲兒服百丸米飲下瀉甚者煎木香散或異功散送下竹葉石膏湯治痘瘡胸中煩熱小便赤澀口乾作渴兼有赤癍者亦宜服犀角散方見頂陷心煩七味白朮散即人參白朮散方見後六君子湯四君子湯十一味木香散十二味異功散四方見痘灰白色托裡散方見痘癰五味異功散方見寒戰咬牙前胡枳殼散方見涕唾稠黏痘瘡發熱屬陰屬陽之異陳文宿先生云痘瘡之症有陽盛陰虛有陰盛陽虛陽盛者飲冰雪而不知寒陰盛者飲沸湯而不知熱陽盛則補陰用木香散加丁香官桂陰盛則補陽用異功散加木香當歸竊謂經云大寒而甚熱之不熱是無火也當益火之源以消陰翳大熱而甚寒之不寒是無水也當壯水之主以鎮陽光若前症發熱作渴手足並冷大便自利喜飲熱湯此陰盛也宜用十二味異功散八味丸若發熱作渴大便祕結手足並熱喜飲冷水此陽盛也宜用四順散六味丸若煩熱作渴面赤睛白此為腎經虛熱宜用地黃丸之類治之及時亦有生者京師小兒出痘或作渴喜飲冷水者恣與飲之再不服藥如期而愈亦無痘毒之患蓋北方人臥火炕飲燒酒有熱與水相構而然也小兒面色目睛多白者乃稟腎氣虛也出痘必作渴用地黃丸煎與恣飲多有生者一小兒痘寒戰咬牙瀉渴腹脹手足並冷時當仲夏飲沸湯而不知熱此脾胃虛寒之熱也先用十二味異功散一劑頓安又用六君附子一劑後用五味異功散而愈一男子出痘色紫作渴飲水腰痛足熱耳聾此稟腎氣不足用加減八味丸料煎與恣飲熱渴頓止佐以補中益氣湯加五味子麥門冬滋其化源而愈一小兒十四歲出痘色黯兩足及腰熱痛便祕咽乾口渴引飲先君謂稟腎不足用加減八味丸料作大劑煎與恣飲至二斤諸症悉退又佐以益氣湯及八珍湯各十餘劑而痊一小兒痘瘡發熱作渴腹脹寒戰咬牙飲冰雪而不知寒悉似火症但兩足並冷此陽氣虛寒也先用十二味異功散一劑隨用五味異功散加薑桂漸愈乃去桂又二劑而痊六味地黃丸治腎虛痘瘡發熱作渴等症熟地黃八兩杵膏乾山藥山茱萸肉各四兩澤瀉白茯苓牡丹皮各三兩上為末入地黃膏量加米糊丸如小豆大煎服尤好七味白朮散一名人參白朮散治胃氣虛弱或因克伐或因吐瀉口乾作渴飲食少思如飲冷者去木香藿香白朮木香白茯苓甘草炒人參乾葛上每服五錢水煎徐徐服八珍湯十一味木香散十二味異功散三方見痘灰白色補中益氣湯五味異功散二方見寒戰咬牙加減八味丸即六味地黃丸加五味子肉桂清涼飲方見大便不通痘瘡大便不通之症陳文宿先生云痘疹四五日不大便以肥豬脿白水煮熟切豆大五七塊與食之滋潤臟腑瘡痂易落切不可妄投宣利之藥恐真氣內虛瘡毒入里如六七日身壯熱不大便其脈緊盛與三味消毒飲微利之竊謂前症若毒在肌肉而未能盡發脈浮而緊者最宜此藥疏解其毒若脈沉而緊者宜用前胡枳殼散疏通毒氣以絶其源若口舌咽喉腫痛瘡毒甚也用射干鼠黏子湯若大便既通作渴飲湯脾胃氣虛也用人參白朮散凡燥糞在直腸不能下者宜用豬膽汁導之忌用疏利之劑恐復傷胃氣則瘡未出者不能發出已出者不能貫靨大抵分辨虛實當以手足冷熱或飲水飲湯驗之一小兒大便不通痘赤作痛發熱作渴手足並熱此餘毒內作用前胡枳殼散一劑大便隨通諸症頓退又與六味活血散而愈一小兒痘瘡發熱作渴焮赤脹痛大便祕結此熱毒在內先用清涼飲一劑諸症稍退又用鼠黏子湯一劑諸症全退再用紫草快癍湯而貫膿更用消毒飲而痘靨一小兒痘赤狂喘大便不利此胃經有熱先君治以犀角地黃湯芹萊汁而痊四順清涼飲治積熱頰赤作渴四肢驚掣大便祕澀赤芍藥當歸甘草大黃各等分上每服一錢水煎按清涼飲乃苦甘疏瀉內熱之劑若熱毒在內大便不通表無他症宜用之連翹飲乃苦寒發表內疏之劑若表裡實熱煩渴飲冷大便不通小便祕結者宜用之不可過劑恐妄發則成癍爛妄下則成虛脫也消毒飲荊芥二錢防風牛蒡子各一錢五分甘草一錢上水煎量服之射干鼠黏子湯方見痘咽痛三味消毒飲人參白朮散二方見靨發熱前胡枳殼散方見涕唾稠黏六味活血散方見痘癰紫草快癍湯清涼飲消毒飲三方見大便不通犀角地黃湯方見頂陷心煩欲靨不靨欲落不落之症陳文宿先生云痘瘡自始出至十三日當忌外人恐有卒暴風寒穢惡或狐臭之氣觸之父母仍忌房事若痘欲靨不靨其痂欲落不落若腹脹煩躁忌食水蜜生冷之物若食之轉渴而死急與木香散救之如身熱煩渴者宜服人參麥門冬散身熱大渴人參白朮散如不愈仍服木香散竊謂前症乃脾胃氣虛津液不足所致非實熱為患也如身熱煩躁手足發熱脾胃有熱也用人參麥門冬散身熱作渴手足微冷者脾胃氣虛也用人參白朮散腹脹泄瀉或寒戰咬牙脾胃虛寒也用十一味木香散泄瀉氣促手足並冷脾氣脫陷也用十二味異功散凡瘡結痂作靨皆由元氣充實而內融也若審見虛弱便與滋補血氣無虧可保終吉若見不靨而投補劑恐不及而誤矣一小兒十二歲出痘不靨腹脹泄瀉不食手足並冷先君謂脾氣虛寒用十一味木香散一劑諸症頓愈再劑不時索食但惡寒此脾氣猶虛也用五味異功散加木香及六君子湯而諸症愈又用參耆內托散而痂脫一男子三十歲遍身發熱作痛有赤顆旬余始知為痘用參耆四聖散托裡散各四劑欲靨不靨用十全大補湯數劑而痂脫一妊婦出痘月餘欲靨不靨面赤晡熱此肝脾血虛而有熱也先用加味逍遙散熱退又用八珍牡丹皮而熱止但氣血皆虛用十全大補湯而痂脫一小兒出痘貫膿不靨症如實熱余謂血氣虛甚之假熱也用十全大補湯數劑漸愈忽又惡寒余又曰此邪氣退而真氣遂見虛象也仍用前藥內參耆各五錢數劑而愈十全大補湯治稟賦不足寒熱自汗食少體瘦發熱作渴頭痛眩暈方見氣促逍遙散即加味逍遙散去牡丹皮山梔治乳母肝脾有熱致痘瘡欲靨不靨欲落不落當歸甘草炙芍藥酒炒茯苓白朮炒柴胡各一錢上水煎母子同服十一味木香散十二味異功散二方見痘灰白色六君子湯方見痘灰白色五味異功散方見寒戰咬牙人參麥門冬散方見發熱口渴煩躁不止人參白朮散方見靨發熱參耆托裡散托裡散二方見痘癰涕唾稠黏大便堅實之症陳文宿先生云痘瘡涕唾稠黏身熱鼻乾大便如常小便黃赤用人參清膈散如痰實壯熱胸中煩悶大便堅實臥則喘息用前胡枳殼散竊謂前症若肺胃實熱氣鬱痰滯或大便祕結小便赤澀煩渴飲冷宜用人參清膈散表散外邪疏通內熱使邪不壅滯若毒蘊臟腑大便祕結用前胡枳殼散疏導其里調和榮衛使邪自解散若痰嗽涕唾鼻塞不利宜用惺惺散或參蘇飲發散外邪庶元氣不傷痘瘡輕而易愈一小兒痘瘡涕唾稠黏鼻塞不利此風邪所傷肺用參蘇散一劑稍愈又用惺惺散而痊一小兒痘赤壯熱痰甚煩躁飲冷此脾肺實熱用人參清膈散頓退又用芹菜汁而靨一小兒痘瘡作渴飲冷痰涎不利此上焦熱毒所致先君用人參清膈散犀角地黃湯各一劑熱退痰清又用四聖散而痘起漿貫用參耆四聖散漿回痂脫一小兒涕唾稠黏大便黑屎此胃經熱毒先君用聖濟犀角地黃湯芹菜汁而痊一小兒痘愈後涕唾口乾飲湯腹脹此胃氣虛熱而津液不足也先用人參白朮散二劑後用五味異功散而愈又用參耆四聖散參耆內托散而痊一小兒涕唾稠黏痰喘作渴大便不利此熱毒蘊於內用前胡枳殼散一劑諸症頓退又用濟生犀角地黃湯二劑而愈前胡枳殼散治涕唾稠涎痰實壯熱胸中煩悶大便堅實臥則喘急前胡枳殼麩炒赤茯苓大黃炒甘草炙各等分上每服三錢水煎如身溫脈微並瀉者不可服按前方若肺實胃熱氣鬱痰滯大便祕結小便赤澀煩渴飲冷脈數宜用此方以表散外邪疏通內臟使邪氣不壅滯且痘瘡輕而易愈紫草四聖散治痘瘡出遲倒靨或小便赤澀發熱紫草木通甘草炒黃耆炒各等分上每服二三錢水煎服加款冬花桔梗等分名仙聖散參蘇飲治時氣傷風發熱惡寒咳嗽未明痘疹疑似之間此藥甚為穩當前胡人參紫蘇葉乾葛半夏茯苓各三分枳殼陳皮甘草炙桔梗各二分上水煎服人參白朮散治胃氣虛弱涕唾稠涎或因克伐吐瀉口乾作渴飲食少思方見屬陰屬陽即七味白朮散五味異功散方見寒戰咬牙人參清膈散即十六味清膈散犀角地黃湯二方見頂陷心煩四聖散方見發熱屬陰屬陽參耆四聖散參耆內托散二方見腹脹氣促惺惺散方見癍症頂陷灰白瀉渴之症陳文宿先生云痘瘡出二三日始出如粟米狀或緑豆大似水珠光澤明淨根窠紅者不須服藥若四五日大小不等根窠光澤明淨者亦不須服藥如陷頂灰白瀉渴者服木香散丹溪先生云痘瘡灰白色靜者怯者作寒看躁者勇者焮發者作熱看若初出之時色白者便須大補氣血參耆芎歸朮芍甘草升麻木香丁香瀉者加訶子肉豆蔻若白色將靨如豆殼者蓋因初起飲水過多其靨不齊俗呼倒靨不妨但須實表之劑自愈如毒鬱於里大小便祕者隨通利之竊謂前症不起發不紅活者此因脾胃氣虛用參耆四聖散頂陷灰白瀉渴者脾肺虛寒用木香散異功散若灰白色或癢而膿不貫用紫草四君木香色赤或癢而膿不貫用紫草木通湯貫而膿清稀用參耆內托散不應加附子緩則不救已出危症如出贈痘多有生者一小兒色淡白癢塌此脾肺氣虛血弱也用紫草快癍湯參術各三錢二劑稍應又二劑紅活起發又用托裡散參術各三錢貫膿而愈一小兒九歲痘色白手足冷此脾胃虛弱用六君子湯加木香當歸紫草四劑又用參耆四聖散加參耆各三錢而靨至十七日發熱煩渴脈洪大而虛用八珍湯而愈一小兒十六歲痘色白脈虛浮按之甚微而短形氣倦怠飲食少思此血氣虛弱用紫草木香散內人參五錢十劑色微赤又用獨參湯而貫乃用十全大補湯補中益氣湯共用參二斤余而靨隨入科舉畢發熱痕癢淡赤昏倦不食急灌以獨參湯而蘇又用斤余卻用十全大補湯補中益氣湯而安一小兒痘瘡七日變灰白色手足並冷腹痛瀉渴先君謂陽氣虛寒用十二味異功散不信已而飲沸湯不知熱始投前藥二劑陽氣頓復卻用獨參湯參耆四聖散而愈一小兒十五歲因科舉勞傷元氣出痘色白貫膿不靨眼閉昏憒飲食與之則食手指輕捏不冷重按良久則冷其脈輕診而浮重按如無不及兩寸此陽氣虛弱而無邪耳用人參一兩乾薑一錢棗五枚二日進四劑結靨眼開又二劑其眼常開呻吟不絶再劑卻佐以補中益氣湯二十一日始言但氣短云遍身痛如錐索食月餘而靨始末悉用前二湯更無他餌一孕婦發熱墜胎昏憒遍身見痘灰白色飲食藥餌到口即作嘔惟灌熱湯則飲之乃擇壯年婦乳灌之不輟日灌數碗旬余省索食云胸腹脹滿此脾氣虛而乳食壅滯令細呷濃茶半鍾胸滿即寬四十餘日而靨後因勞心發熱如炙用四君參耆炮薑而痊一男子年三十發熱頭痛四肢拘急服解表之藥熱益甚遍身紅點漸成膿窠已灰白此痘瘡因氣虛耳用參耆四聖散托裡散色赤膿貫而靨一小兒第十日不紅活漿不滿先君謂氣血虛弱用參耆托裡散數劑出贈痘紅活起發又用十全大補湯而愈十一味木香散木香大腹皮人參桂心赤茯苓青皮前胡訶黎勒去核半夏丁香甘草炙各三錢上每服三錢生薑三片水煎量大小服十二味異功散木香官桂各三錢去粗皮當歸三錢半人參茯苓陳皮厚朴白朮各二錢半夏丁香肉豆蔻二錢半附子炮去皮一錢上每服三五錢薑五片棗三枚水煎量大小服此藥家傳五世纍經效驗愚嘗治癰疽陰症凡雜症陽氣脫陷與寒氣逼陽於外者發熱煩躁口乾作渴投以薑桂附子之類津液頓生煩熱頓退其應如響人但不習而察之耳八珍湯治痘瘡氣血俱虛者此方主之若因脾氣虛弱而不能生血者宜用異功散當歸一錢川芎五分芍藥炒七分熟地黃酒拌人參白朮炒茯苓各一錢甘草炙五分上每服二三錢薑棗水煎豆蔻丸方見咬牙內托散即托裡散方見痘癰紫草快癍湯方見大便不通四君子湯六君子湯二方見不靨參耆內托散方見腹脹氣促紫草木香散方見大便不通補中益氣湯方見寒戰咬牙四聖散方見痘出不快參耆四聖散十全大補湯獨參湯三方見腹脹氣促紫草木通湯方見痘出遲寒戰咬牙飲水瀉渴之症陳文宿先生云痘瘡六日至七日肥滿紅活光澤八日至九日肥滿蒼蠟色者皆不須服藥如身溫氣促口乾肚脹足冷寒戰咬牙飲水瀉渴者急用木香散加官桂丁香服之如不愈服異功散蓋咬牙者齒稿也竊謂前症若手足並冷渴飲熱湯大便泄瀉者陽氣虛寒也宣熱補之手足不冷大便不利渴飲溫湯者脾氣虛熱也宜調補之手足不熱大便不利渴飲熱湯者脾胃虛弱也宜溫補之治者審焉一小兒出痘寒戰咬牙四肢蜷縮大便自利手足並冷喜飲熱湯此陽氣虛寒也用十二味異功散末二錢諸症頓退又用人參白朮散參耆四聖散而靨一小兒十四歲面色忽赤忽黑出痘寒戰咬牙作渴煩熱喜飲熱湯此陽氣虛寒也用十全大補湯散煩渴頓止乃以八珍倍加參耆至膿貫又作渴面赤此膿成而血氣虛也用當歸補血湯八珍湯而靨至月餘面赤煩渴或時昏憒痘痕如赭或時作癢脈洪大按之如無此血脫也用大劑當歸補血湯而安一小兒痘瘡寒戰咬牙內熱作渴形氣倦怠雖起發而欠紅活此陽氣虛弱也用參耆四聖散而結痂忽作瀉發熱此脾氣虛也用人參白朮散參耆內托散而靨一小兒痘瘡咬牙面黃飲湯此陽氣虛弱也用五味異功散加木香而愈後仍咬牙面赤作渴至夜為甚此脾腎陰虛也用地黃丸大補湯而愈一小兒膿不貫兼寒戰咬牙腹脹屬脾胃虛弱用四君肉桂歸耆肉豆蔻又用參耆四聖散而痊後用托裡散四君子湯而靨一小兒癢塌寒戰咬牙喜飲溫湯手足不熱屬陽氣虛弱也用參耆四聖散諸症已退用參耆托裡散其漿漸貫用十全大補湯其痂頓靨一小兒十四歲痘將愈忽寒戰手足並冷脈微細而不及兩寸乃脾氣虛熱用五味異功散獨參湯十全大補湯而愈一婦人愈後寒戰脈浮大按之微細此血氣虛也用十全大補湯三十餘劑而愈後因勞寒熱往來寒時手足如冰熱時手足如炙脈浮大重按則細此陽氣虛甚也朝用補中益氣湯加桂附各一錢夕用八味丸料倍加桂附各五十餘劑而安一小兒咬牙作渴面色忽白忽赤脈洪數按之無力左關尺為甚此屬腎虛也用地黃丸補中益氣湯尋愈後因驚面青目赤呵欠咬牙手尋衣領此肝經虛熱用加減八味丸料煎與恣飲頓安又用補中益氣湯而痊一小兒咬牙作渴飲冷大便微祕寒戰痘赤多在身側此屬膽經虛熱也用小柴胡湯柴胡麥門散各一劑又用加味四物湯而痊當歸補血湯治痘瘡血氣虧損或妄服峻劑致血氣俱虛肌熱大渴喜飲目赤面紅晝夜不息其脈洪大而虛重按全無其症似宜服白虎湯但脈不長實為可驗耳若服白虎湯必死黃耆炙一兩當歸二錢上水煎徐徐服補中益氣湯人參黃耆炒白朮甘草當歸陳皮各一錢柴胡升麻各二分上薑棗水煎徐徐服五味異功散人參茯苓白朮炒甘草陳皮上每服二三錢薑棗水煎為末調服亦可加減八味丸即六味丸加五味子四兩肉桂一兩治腎經陰虛虛火上炎作渴咬牙或口舌生瘡或痰涎湧盛六味地黃丸加肉桂附子各一兩名八味丸二方見發熱屬陰屬陽獨參湯方見腹脹氣促小柴胡湯方見癍症十一味木香散十二味異功散二方見痘灰白色十全大補湯方見腹脹氣促八珍湯柴胡麥門冬散二方見頂陷灰白參耆四聖散方見頂陷心煩七味白朮散方見痘發熱即人參白朮散
